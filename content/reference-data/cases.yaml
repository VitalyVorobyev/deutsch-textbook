id: cases
articles:
  - { case: Nominativ, masculine: "der / ein / kein", feminine: "die / eine / keine", neuter: "das / ein / kein", plural: "die / — / keine" }
  - { case: Akkusativ, masculine: "den / einen / keinen", feminine: "die / eine / keine", neuter: "das / ein / kein", plural: "die / — / keine" }
  - { case: Dativ, masculine: "dem / einem / keinem", feminine: "der / einer / keiner", neuter: "dem / einem / keinem", plural: "den (+ -n) / keinen (+ -n)" }
pronouns:
  - { nominative: ich, accusative: mich, dative: mir }
  - { nominative: du, accusative: dich, dative: dir }
  - { nominative: er, accusative: ihn, dative: ihm }
  - { nominative: sie, accusative: sie, dative: ihr }
  - { nominative: es, accusative: es, dative: ihm }
  - { nominative: wir, accusative: uns, dative: uns }
  - { nominative: ihr, accusative: euch, dative: euch }
  - { nominative: sie, accusative: sie, dative: ihnen }
  - { nominative: Sie, accusative: Sie, dative: Ihnen }
prepositions:
  accusative:
    - { form: durch }
    - { form: für }
    - { form: gegen }
    - { form: ohne }
    - { form: um }
  dative:
    - { form: aus, example: "Er kommt aus der Schweiz." }
    - { form: außer, example: "Außer mir kommen alle." }
    - { form: bei, example: "Sie wohnt bei ihren Eltern." }
    - { form: gegenüber, example: "Die Bank ist dem Bahnhof gegenüber." }
    - { form: mit, example: "Wir fahren mit dem Bus." }
    - { form: nach, example: "Nach dem Essen gehen wir spazieren." }
    - { form: seit, example: "Ich lerne seit einem Jahr Deutsch." }
    - { form: von, example: "Das Geschenk ist von meiner Oma." }
    - { form: zu, example: "Ich gehe zum Arzt." }
  two_way:
    - { form: an }
    - { form: auf }
    - { form: hinter }
    - { form: in }
    - { form: neben }
    - { form: über }
    - { form: unter }
    - { form: vor }
    - { form: zwischen }
