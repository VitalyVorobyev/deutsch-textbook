id: pronominal-adverbs
entries:
  - preposition: an
    status: productive
    construction: "an + Akkusativ"
    question: woran?
    thing: daran
    person: "an ihn / an sie"
    example: { de: "Woran denkst du? — Ich denke an den Ausflug. Ich denke daran.", en: "What are you thinking about? — I am thinking about the trip. I am thinking about it.", ru: "О чём ты думаешь? — Я думаю о поездке. Я думаю об этом.", uk: "Про що ти думаєш? — Я думаю про поїздку. Я думаю про це." }
  - preposition: auf
    status: productive
    construction: "auf + Akkusativ"
    question: worauf?
    thing: darauf
    person: "auf ihn / auf sie"
    example: { de: "Worauf wartet ihr? — Wir warten auf den Bus. Wir warten darauf.", en: "What are you waiting for? — We are waiting for the bus. We are waiting for it.", ru: "Чего вы ждёте? — Мы ждём автобус. Мы ждём его.", uk: "На що ви чекаєте? — Ми чекаємо на автобус. Ми чекаємо на нього." }
  - preposition: für
    status: productive
    construction: "für + Akkusativ"
    question: wofür?
    thing: dafür
    person: "für ihn / für sie"
    example: { de: "Wofür interessierst du dich? — Für Fotografie. Ich interessiere mich dafür.", en: "What are you interested in? — Photography. I am interested in it.", ru: "Чем ты интересуешься? — Фотографией. Я этим интересуюсь.", uk: "Чим ти цікавишся? — Фотографією. Я цим цікавлюся." }
  - preposition: mit
    status: productive
    construction: "mit + Dativ"
    question: womit?
    thing: damit
    person: "mit ihm / mit ihr"
    example: { de: "Womit arbeitet Lea? — Mit einer App. Sie arbeitet damit.", en: "What does Lea work with? — An app. She works with it.", ru: "С чем работает Леа? — С приложением. Она работает с ним.", uk: "З чим працює Леа? — Із застосунком. Вона працює з ним." }
  - preposition: über
    status: productive
    construction: "über + Akkusativ"
    question: worüber?
    thing: darüber
    person: "über ihn / über sie"
    example: { de: "Worüber sprecht ihr? — Über den Plan. Wir sprechen darüber.", en: "What are you talking about? — The plan. We are talking about it.", ru: "О чём вы говорите? — О плане. Мы говорим об этом.", uk: "Про що ви говорите? — Про план. Ми говоримо про це." }
  - preposition: von
    status: productive
    construction: "von + Dativ"
    question: wovon?
    thing: davon
    person: "von ihm / von ihr"
    example: { de: "Wovon träumst du? — Von einer Reise. Ich träume davon.", en: "What do you dream of? — A journey. I dream of it.", ru: "О чём ты мечтаешь? — О путешествии. Я мечтаю об этом.", uk: "Про що ти мрієш? — Про подорож. Я мрію про це." }
  - preposition: zu
    status: receptive
    construction: "zu + Dativ"
    question: wozu?
    thing: dazu
    person: "zu ihm / zu ihr"
    example: { de: "Ich möchte etwas dazu sagen. — Wozu genau?", en: "I would like to say something about that. — About what exactly?", ru: "Я хотел бы кое-что сказать по этому поводу. — По какому именно?", uk: "Я хотів би дещо сказати з цього приводу. — З якого саме?" }
  - preposition: um
    status: receptive
    construction: "um + Akkusativ"
    question: worum?
    thing: darum
    person: "um ihn / um sie"
    example: { de: "Worum geht es? — Es geht um unseren Ausflug.", en: "What is it about? — It is about our outing.", ru: "О чём речь? — О нашей поездке.", uk: "Про що йдеться? — Про нашу поїздку." }
  - preposition: bei
    status: receptive
    construction: "bei + Dativ"
    question: wobei?
    thing: dabei
    person: "bei ihm / bei ihr"
    example: { de: "Wobei brauchst du Hilfe? — Beim Planen. Kannst du mir dabei helfen?", en: "What do you need help with? — Planning. Can you help me with it?", ru: "С чем тебе нужна помощь? — С планированием. Можешь мне с этим помочь?", uk: "З чим тобі потрібна допомога? — З плануванням. Можеш мені з цим допомогти?" }
  - preposition: gegen
    status: receptive
    construction: "gegen + Akkusativ"
    question: wogegen?
    thing: dagegen
    person: "gegen ihn / gegen sie"
    example: { de: "Wogegen seid ihr? — Gegen den späten Termin. Wir sind dagegen.", en: "What are you against? — The late time. We are against it.", ru: "Против чего вы? — Против позднего времени. Мы против.", uk: "Проти чого ви? — Проти пізнього часу. Ми проти." }
temporal:
  - form: vorher
    status: productive
    meaning: { en: "before that; the normal everyday choice", ru: "до этого; обычный разговорный вариант", uk: "до цього; звичайний розмовний варіант" }
    example: { de: "Wir treffen uns um acht. Vorher kaufe ich die Tickets.", en: "We meet at eight. Before that I buy the tickets.", ru: "Мы встречаемся в восемь. До этого я куплю билеты.", uk: "Ми зустрічаємося о восьмій. Перед цим я куплю квитки." }
  - form: zuvor
    status: receptive
    meaning: { en: "previously/before that; more written or formal", ru: "ранее/до этого; чаще письменно и формальнее", uk: "раніше/до того; частіше письмово й формальніше" }
    example: { de: "Zuvor hatte die Gruppe einen anderen Plan.", en: "Previously the group had a different plan.", ru: "До этого у группы был другой план.", uk: "До того група мала інший план." }
  - form: danach
    status: productive
    meaning: { en: "after that", ru: "после этого", uk: "після цього" }
    example: { de: "Wir besuchen das Museum. Danach essen wir zusammen.", en: "We visit the museum. After that we eat together.", ru: "Мы идём в музей. После этого едим вместе.", uk: "Ми йдемо до музею. Після цього разом їмо." }
