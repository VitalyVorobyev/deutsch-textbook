id: wenden-familie
kind: family
level: B1
title_de: "Die Wortfamilie wenden"
title:
  en: "The wenden word family"
  ru: "Семья слова wenden"
  uk: "Родина слова wenden"
introduction:
  en: "The shared form is real, but the modern meanings are partly lexicalised. Use the family as a memory structure, not as a rule for decoding every ver- or an- verb."
  ru: "Общая форма реальна, но современные значения частично закрепились отдельно. Используйте семью как опору для памяти, а не как правило расшифровки любого глагола с ver- или an-."
  uk: "Спільна форма реальна, але сучасні значення частково закріпилися окремо. Використовуйте родину як опору для пам'яті, а не як правило розшифрування кожного дієслова з ver- або an-."
members:
  - kind: receptive
    id: wenden
    status: receptive
    de: "wenden"
    gloss: { en: "to turn; turn around", ru: "поворачивать; разворачивать", uk: "повертати; розвертати" }
    usage: { en: "Usually a concrete change of direction, often in sich wenden or etwas wenden.", ru: "Обычно конкретная смена направления; часто sich wenden или etwas wenden.", uk: "Зазвичай конкретна зміна напрямку; часто sich wenden або etwas wenden." }
    collocations: ["das Auto wenden", "sich an jemanden wenden"]
    example: { de: "Hier können Sie das Auto wenden.", en: "You can turn the car around here.", ru: "Здесь можно развернуть машину.", uk: "Тут можна розвернути машину." }
  - kind: receptive
    id: anwenden
    status: receptive
    de: "anwenden"
    gloss: { en: "to apply", ru: "применять", uk: "застосовувати" }
    usage: { en: "Apply a rule, method, technique or knowledge to a case.", ru: "Применить правило, метод, приём или знание к конкретному случаю.", uk: "Застосувати правило, метод, прийом або знання до конкретного випадку." }
    collocations: ["eine Methode anwenden", "eine Regel anwenden"]
    example: { de: "Wir wenden diese Methode im Kurs an.", en: "We apply this method in the course.", ru: "Мы применяем этот метод на курсе.", uk: "Ми застосовуємо цей метод на курсі." }
  - kind: receptive
    id: verwenden
    status: receptive
    de: "verwenden"
    gloss: { en: "to use; employ", ru: "использовать; применять", uk: "використовувати; застосовувати" }
    usage: { en: "Use a material, method, word, device, time or resource for a purpose.", ru: "Использовать материал, метод, слово, устройство, время или ресурс для цели.", uk: "Використовувати матеріал, метод, слово, пристрій, час або ресурс для мети." }
    collocations: ["ein Wort verwenden", "Olivenöl verwenden", "Zeit dafür verwenden"]
    example: { de: "Für die Soße verwende ich Olivenöl.", en: "I use olive oil for the sauce.", ru: "Для соуса я использую оливковое масло.", uk: "Для соусу я використовую оливкову олію." }
  - kind: receptive
    id: anwendung
    status: receptive
    de: "die Anwendung"
    gloss: { en: "application; use; app", ru: "применение; приложение", uk: "застосування; застосунок" }
    usage: { en: "The application of a method, or a software application.", ru: "Применение метода; также программное приложение.", uk: "Застосування методу; також програмний застосунок." }
    collocations: ["praktische Anwendung", "eine Anwendung installieren"]
    example: { de: "Die Anwendung der Regel ist nicht schwer.", en: "Applying the rule is not difficult.", ru: "Применять это правило несложно.", uk: "Застосовувати це правило нескладно." }
  - kind: receptive
    id: verwendung
    status: receptive
    de: "die Verwendung"
    gloss: { en: "use; usage", ru: "использование; употребление", uk: "використання; уживання" }
    usage: { en: "The act or manner of using something.", ru: "Сам факт или способ использования чего-либо.", uk: "Сам факт або спосіб використання чогось." }
    collocations: ["zur Verwendung", "die Verwendung eines Wortes"]
    example: { de: "Die Verwendung dieses Wortes ist formell.", en: "The use of this word is formal.", ru: "Употребление этого слова формальное.", uk: "Уживання цього слова формальне." }
  - kind: receptive
    id: verwendbar
    status: receptive
    de: "verwendbar"
    gloss: { en: "usable; suitable for use", ru: "пригодный к использованию", uk: "придатний до використання" }
    usage: { en: "Something can still be used for the intended purpose.", ru: "Что-то ещё можно использовать по назначению.", uk: "Щось іще можна використати за призначенням." }
    collocations: ["weiter verwendbar", "nicht mehr verwendbar"]
    example: { de: "Das Material ist noch verwendbar.", en: "The material is still usable.", ru: "Материал ещё можно использовать.", uk: "Матеріал іще можна використати." }
relations:
  - from: wenden
    to: verwenden
    type: family
    basis: historical
    explanation: { en: "verwenden belongs historically to the wenden family, but its current meaning must be learned as a lexical verb.", ru: "verwenden исторически относится к семье wenden, но современное значение нужно учить как отдельный лексический глагол.", uk: "verwenden історично належить до родини wenden, але сучасне значення треба вчити як окреме лексичне дієслово." }
    source_note: "Duden, verwenden: Middle High German verwenden = abwenden, umwenden — https://www.duden.de/rechtschreibung/verwenden"
  - from: wenden
    to: verwenden
    type: formation
    basis: mnemonic
    explanation: { en: "Memory bridge: imagine directing an object toward a purpose. This helps recall verwenden, but it is not a productive rule for ver-.", ru: "Мостик для памяти: направить предмет на задачу — использовать. Это помогает вспомнить verwenden, но не является общим правилом для ver-.", uk: "Місток для пам'яті: спрямувати предмет на завдання — використати. Це допомагає згадати verwenden, але не є загальним правилом для ver-." }
  - from: wenden
    to: anwenden
    type: formation
    basis: current-meaning
    explanation: { en: "anwenden means applying something to a case; the separable prefix appears at the clause end.", ru: "anwenden значит применить что-то к случаю; отделяемая приставка уходит в конец предложения.", uk: "anwenden означає застосувати щось до випадку; відокремлюваний префікс іде в кінець речення." }
  - from: anwenden
    to: anwendung
    type: family
    basis: current-meaning
    explanation: { en: "Anwendung is the corresponding noun: application or use.", ru: "Anwendung — соответствующее существительное: применение или приложение.", uk: "Anwendung — відповідний іменник: застосування або застосунок." }
  - from: verwenden
    to: verwendung
    type: family
    basis: current-meaning
    explanation: { en: "Verwendung names the use of something.", ru: "Verwendung называет использование чего-либо.", uk: "Verwendung називає використання чогось." }
  - from: verwenden
    to: verwendbar
    type: formation
    basis: current-meaning
    explanation: { en: "The suffix -bar adds the meaning can be used.", ru: "Суффикс -bar добавляет значение «можно использовать».", uk: "Суфікс -bar додає значення «можна використати»." }
