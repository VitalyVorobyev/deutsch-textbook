topic: praesens-wortstellung
role: probe
title:
  en: "Probe — the verb in position 2"
  ru: "Проверка — глагол на втором месте"
  uk: "Перевірка — дієслово на другому місці"

# Three parallel variants of ONE competence: Verbzweit — the conjugated verb holds
# position 2, whatever comes first. Three different sentence types (fronted time phrase,
# W-question, second clause after dann), one rule, none of them an item from the lesson.
#
# All three are `translate`: word order cannot be probed by a cloze (the gap sits where
# the text already puts it), and free production is the only format that shows whether
# the learner still builds the sentence right.

items:
  - id: variant-a
    outcomes: [praesens-verbzweit]
    type: translate
    focus: verbzweit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "On Monday my sister is learning German."
    prompt_ru: "В понедельник моя сестра учит немецкий."
    prompt_uk: "У понеділок моя сестра вчить німецьку."
    answer: "Am Montag lernt meine Schwester Deutsch."
    key_tokens: ["lernt"]
    accept:
      - "Meine Schwester lernt am Montag Deutsch."
    explain:
      en: "Whatever opens the sentence, the conjugated verb stays in position 2. Putting Am Montag first pushes the subject behind the verb: Am Montag lernt meine Schwester — never Am Montag meine Schwester lernt."
      ru: "Что бы ни стояло в начале, спрягаемый глагол остаётся на втором месте. Если вынести Am Montag вперёд, подлежащее уходит за глагол: Am Montag lernt meine Schwester — но не Am Montag meine Schwester lernt."
      uk: "Хоч би що стояло на початку, відмінюване дієслово лишається на другому місці. Якщо винести Am Montag уперед, підмет іде за дієслово: Am Montag lernt meine Schwester — але не Am Montag meine Schwester lernt."

  - id: variant-b
    outcomes: [praesens-verbzweit]
    type: translate
    focus: verbzweit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "Where does your brother work?"
    prompt_ru: "Где работает твой брат?"
    prompt_uk: "Де працює твій брат?"
    answer: "Wo arbeitet dein Bruder?"
    key_tokens: ["arbeitet"]
    explain:
      en: "In a W-question the question word takes position 1 and the verb follows immediately: Wo arbeitet dein Bruder? English needs a helper verb here (does … work), German never does."
      ru: "В вопросе с вопросительным словом оно занимает первое место, а глагол идёт сразу за ним: Wo arbeitet dein Bruder? Вспомогательный глагол, как в английском (does … work), немецкому не нужен."
      uk: "У питанні з питальним словом воно посідає перше місце, а дієслово йде одразу за ним: Wo arbeitet dein Bruder? Жодного допоміжного дієслова німецькій тут не треба."

  - id: variant-c
    outcomes: [praesens-verbzweit]
    type: translate
    focus: verbzweit
    revision: 2
    instruction:
      en: Translate into German. Begin the second clause with dann.
      ru: Переведите на немецкий. Начните вторую часть предложения с dann.
      uk: Перекладіть німецькою. Почніть другу частину речення з dann.
    prompt_en: "I drink coffee and then I read a book."
    prompt_ru: "Я пью кофе, а потом читаю книгу."
    prompt_uk: "Я п'ю каву, а потім читаю книжку."
    answer: "Ich trinke Kaffee und dann lese ich ein Buch."
    key_tokens: ["lese"]
    accept:
      - "Ich trinke Kaffee, dann lese ich ein Buch."
    explain:
      en: "dann counts as the first element of its own clause, so the verb has to come next and the subject moves behind it: und dann lese ich — never und dann ich lese."
      ru: "dann занимает первое место в своей части предложения, поэтому дальше обязан идти глагол, а подлежащее уходит за него: und dann lese ich — но не und dann ich lese."
      uk: "dann посідає перше місце у своїй частині речення, тому далі мусить іти дієслово, а підмет іде за нього: und dann lese ich — але не und dann ich lese."
