topic: artikel-genus
role: probe
title:
  en: "Probe — der, die or das"
  ru: "Проверка — der, die или das"

# Three parallel variants of ONE competence: giving a known noun its correct article.
# The nouns come from the words the learner already owns at this point in the spine
# (Adresse, Name, Land, Sprache, Buchstabe, Telefonnummer, Wort, Zahl) and none of them
# had its article drilled in the lesson's practice sets — so no variant can be answered
# from memory of a practised item.

items:
  - id: variant-a
    outcomes: [artikel-richtig-verwenden]
    type: translate
    focus: genus
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "The language is difficult, but the country is beautiful."
    prompt_ru: "Язык трудный, но страна красивая."
    answer: "Die Sprache ist schwer, aber das Land ist schön."
    key_tokens: ["Die", "das"]
    explain:
      en: "The article is part of the word and has to be learned with it: die Sprache is feminine, das Land is neuter. Nothing in the meaning predicts either one — and the English the hides the gender completely."
      ru: "Артикль — часть слова, и учить его нужно вместе со словом: die Sprache — женского рода, das Land — среднего. Смысл ничего не подсказывает, и род русского слова тоже: «язык» мужского рода, а «страна» — женского."

  - id: variant-b
    outcomes: [artikel-richtig-verwenden]
    type: translate
    focus: genus
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "The letter is small and the word is long."
    prompt_ru: "Буква маленькая, а слово длинное."
    answer: "Der Buchstabe ist klein und das Wort ist lang."
    key_tokens: ["Der", "das"]
    explain:
      en: "der Buchstabe is masculine, das Wort is neuter — two nouns from the same field with two different genders. The article never depends on the meaning, only on the word."
      ru: "der Buchstabe — мужского рода, das Wort — среднего: два слова из одной области и два разных рода. Артикль зависит не от смысла, а от самого слова."

  - id: variant-c
    outcomes: [artikel-richtig-verwenden]
    type: translate
    focus: genus
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "The telephone number is long, but the first name is short."
    prompt_ru: "Номер телефона длинный, а имя короткое."
    answer: "Die Telefonnummer ist lang, aber der Vorname ist kurz."
    key_tokens: ["Die", "der"]
    explain:
      en: "A compound takes the gender of its last part: die Nummer → die Telefonnummer, der Name → der Vorname. That last element is the one to check."
      ru: "Сложное слово получает род последней части: die Nummer → die Telefonnummer, der Name → der Vorname. Смотреть нужно именно на последний элемент."
