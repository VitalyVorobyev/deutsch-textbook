    prompt: "Sie lesen ein Schild: „Bibliothek. Montag bis Donnerstag: 10–19 Uhr. Freitag: 10–14 Uhr. Samstag und Sonntag: geschlossen.“ Es ist Freitag, 16 Uhr. Was ist richtig?"
    options: ["Die Bibliothek ist jetzt geschlossen.", "Die Bibliothek ist noch drei Stunden geöffnet.", "Die Bibliothek ist bis neunzehn Uhr geöffnet."]
    correct: 0
    translation: { en: "You read a sign at a library. It is Friday, 4 p.m. What is correct?", ru: "Вы читаете табличку у библиотеки. Сейчас пятница, 16 часов. Что верно?", uk: "Ви читаєте табличку біля бібліотеки. Зараз п'ятниця, 16 година. Що правильно?" }
    explain: { en: "Friday has its own, shorter line: 10–14 Uhr. At 16 Uhr that is already past, so the library is closed. The 19 Uhr closing time applies from Monday to Thursday only.", ru: "У пятницы своя, более короткая строка: 10–14 Uhr. В 16 часов это время уже прошло, значит библиотека закрыта. Закрытие в 19 часов относится только к периоду с понедельника по четверг.", uk: "У п'ятниці свій, коротший рядок: 10–14 Uhr. О 16 годині цей час уже минув, отже бібліотека зачинена. Закриття о 19 годині стосується лише періоду з понеділка по четвер." }

  # --- wohnen ---
  - id: wohnen-zimmer-beschreiben
    outcomes: [wohnen-beschreiben]
    type: translate
    focus: kopula-sein
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "My room is small but bright."
    prompt_ru: "Моя комната маленькая, но светлая."
    prompt_uk: "Моя кімната маленька, але світла."
    answer: "Mein Zimmer ist klein, aber hell."
    key_tokens: ["ist"]
    explain: { en: "German cannot leave the linking verb out: an adjective describing the subject always needs sein. And an adjective after sein takes no ending at all — klein and hell stay bare, however the noun behaves.", ru: "В немецком глагол-связку опустить нельзя: прилагательное, описывающее подлежащее, всегда требует sein — «моя комната маленькая» превращается в Mein Zimmer ist klein. При этом после sein прилагательное не получает никакого окончания.", uk: "У німецькій дієслово-зв'язку опустити не можна: прикметник, що описує підмет, завжди вимагає sein — «моя кімната маленька» перетворюється на Mein Zimmer ist klein. При цьому після sein прикметник не отримує жодного закінчення." }

  - id: wohnen-anzeige-lesen
    outcomes: [wohnen-anzeige-verstehen]
    type: mc
    prompt: "Sie lesen eine Anzeige: „2-Zimmer-Wohnung in Leipzig, 54 Quadratmeter, vierter Stock ohne Aufzug. Küche und Bad sind neu. Miete: 590 Euro. Frei ab März.“ Was ist richtig?"
    options: ["Die Wohnung hat keinen Aufzug.", "Die Wohnung ist im ersten Stock.", "Die Wohnung ist ab Mai frei."]
    correct: 0
    translation: { en: "You read a housing advertisement. What is correct?", ru: "Вы читаете объявление о квартире. Что верно?", uk: "Ви читаєте оголошення про квартиру. Що правильно?" }
    explain: { en: "ohne Aufzug means there is no lift, and vierter Stock is the fourth floor, not the first. Frei ab März gives March as the date the flat becomes available.", ru: "ohne Aufzug значит, что лифта нет, а vierter Stock — четвёртый этаж, а не первый. Frei ab März указывает, что квартира освобождается в марте.", uk: "ohne Aufzug означає, що ліфта немає, а vierter Stock — четвертий поверх, а не перший. Frei ab März вказує, що квартира звільняється в березні." }

  # --- stadt-wege ---
  - id: stadt-weg-bahnhof
    outcomes: [stadt-weg-erfragen]
    type: translate
    focus: dativ-praepositionen
    preview: true
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "Excuse me, how do I get to the station?"
    prompt_ru: "Извините, как мне добраться до вокзала?"
    prompt_uk: "Вибачте, як мені дістатися до вокзалу?"
    answer: "Entschuldigung, wie komme ich zum Bahnhof?"
    key_tokens: ["zum"]
    explain: { en: "Asking the way is the fixed question wie komme ich zu …?, and zu merges with the article: zu + dem Bahnhof becomes zum Bahnhof. With a feminine place it would be zur: zur Post.", ru: "Дорогу спрашивают устойчивым вопросом wie komme ich zu …?, а zu сливается с артиклем: zu + dem Bahnhof даёт zum Bahnhof. С женским родом было бы zur: zur Post.", uk: "Дорогу питають сталим питанням wie komme ich zu …?, а zu зливається з артиклем: zu + dem Bahnhof дає zum Bahnhof. З жіночим родом було б zur: zur Post." }

