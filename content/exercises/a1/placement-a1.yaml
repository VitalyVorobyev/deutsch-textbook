  # --- freizeit-koennen ---
  - id: freizeit-koennen-schwimmen
    outcomes: [freizeit-koennen-satz]
    type: translate
    focus: modal-satzklammer
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "My brother can cook very well."
    prompt_ru: "Мой брат умеет очень хорошо готовить."
    prompt_uk: "Мій брат уміє дуже добре готувати."
    answer: "Mein Bruder kann sehr gut kochen."
    key_tokens: ["kann", "kochen"]
    explain: { en: "The modal bracket: kann in position 2 and the infinitive kochen at the very end, with everything else in between. Note also that kann has no -t in the er-form.", ru: "Модальная рамка: kann на втором месте, а инфинитив kochen — в самом конце, всё остальное между ними. Обратите также внимание, что в форме er у kann нет окончания -t.", uk: "Модальна рамка: kann на другому місці, а інфінітив kochen — у самому кінці, усе інше між ними. Зверніть також увагу, що у формі er у kann немає закінчення -t." }

  - id: freizeit-hobbys-gern
    outcomes: [freizeit-hobbys]
    type: translate
    focus: gern-moegen
    instruction: { en: "Translate into German. Use gern.", ru: "Переведите на немецкий. Используйте gern.", uk: "Перекладіть німецькою. Вживайте gern." }
    prompt_en: "I like playing football."
    prompt_ru: "Я люблю играть в футбол."
    prompt_uk: "Я люблю грати у футбол."
    answer: "Ich spiele gern Fußball."
    key_tokens: ["spiele", "gern"]
    explain: { en: "Liking an activity is expressed with the ordinary verb plus gern — the activity is not turned into an object. There is no German sentence built like 'I love to play', so mögen with an infinitive is not the route here.", ru: "Любимое занятие выражается обычным глаголом плюс gern — само занятие не превращается в дополнение. Конструкции вроде «люблю играть» в немецком нет, поэтому mögen с инфинитивом здесь не подходит.", uk: "Улюблене заняття виражається звичайним дієсловом плюс gern — саме заняття не перетворюється на додаток. Конструкції на кшталт «люблю грати» у німецькій немає, тому mögen з інфінітивом тут не підходить." }

  - id: freizeit-verabredung-hoeren
