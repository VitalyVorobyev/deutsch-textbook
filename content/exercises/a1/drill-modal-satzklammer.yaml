topic: freizeit-koennen
role: drill
title:
  en: Drill — the modal bracket, no zu
  ru: Тренажёр — модальная рамка без zu
  uk: Тренажер — модальна рамка без zu
items:
  - id: uebersetzen-kochen
    outcomes: [freizeit-koennen-satz]
    type: translate
    focus: modal-satzklammer
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "My brother can cook very well."
    prompt_ru: "Мой брат умеет очень хорошо готовить."
    prompt_uk: "Мій брат вміє дуже добре готувати."
    answer: "Mein Bruder kann sehr gut kochen."
    key_tokens: ["kann", "kochen"]
    explain:
      en: "The modal kann sits in position 2 and the bare infinitive kochen closes the sentence — nothing between them moves either verb. No zu: English says 'is able TO cook', German never puts zu after a modal."
      ru: "Модальный kann стоит на втором месте, а голый инфинитив kochen закрывает предложение — рамка. Никакого zu: после модального глагола инфинитив всегда голый."
      uk: "Модальне kann стоїть на другому місці, а голий інфінітив kochen закриває речення — рамка. Жодного zu: після модального дієслова інфінітив завжди голий."
  - id: uebersetzen-arbeiten
    outcomes: [freizeit-koennen-satz]
    type: translate
    focus: modal-satzklammer
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "Today I have to work for a long time."
    prompt_ru: "Сегодня мне нужно долго работать."
    prompt_uk: "Сьогодні мені треба довго працювати."
    answer: "Heute muss ich lange arbeiten."
    accept:
      - "Ich muss heute lange arbeiten."
    key_tokens: ["muss", "arbeiten"]
    explain:
      en: "muss in position 2 (after fronted Heute the subject follows the verb), arbeiten bare at the very end. muss … zu arbeiten is the classic trap — modals never take zu."
      ru: "muss на втором месте (после вынесенного Heute подлежащее идёт за глаголом), голый arbeiten в самом конце. muss … zu arbeiten — классическая ловушка: модальные глаголы не сочетаются с zu."
      uk: "muss на другому місці (після винесеного Heute підмет іде за дієсловом), голий arbeiten у самому кінці. muss … zu arbeiten — класична пастка: модальні дієслова не поєднуються з zu."
  - id: uebersetzen-film
    outcomes: [freizeit-koennen-satz]
    type: translate
    focus: modal-satzklammer
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "We want to watch a film this evening."
    prompt_ru: "Мы хотим сегодня вечером посмотреть фильм."
    prompt_uk: "Ми хочемо сьогодні ввечері подивитися фільм."
    answer: "Wir wollen heute Abend einen Film sehen."
    accept:
      - "Heute Abend wollen wir einen Film sehen."
    key_tokens: ["wollen", "sehen"]
    explain:
      en: "English 'want TO watch' plants the trap: German wollen takes a bare infinitive, and it goes to the very end — wollen … sehen, never wollen zu sehen."
      ru: "Английское want TO watch подсказывает ловушку, но по-немецки wollen требует голый инфинитив, и он уходит в самый конец: wollen … sehen, никогда wollen zu sehen."
      uk: "Англійське want TO watch підказує пастку, але німецькою wollen вимагає голий інфінітив, і він іде в самий кінець: wollen … sehen, ніколи wollen zu sehen."
  - id: uebersetzen-fragen
    outcomes: [freizeit-koennen-satz]
    type: translate
    focus: modal-satzklammer
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "May I ask something?"
    prompt_ru: "Можно мне кое-что спросить?"
    prompt_uk: "Можна мені дещо запитати?"
    answer: "Darf ich etwas fragen?"
    key_tokens: ["Darf", "fragen"]
    explain:
      en: "In a yes/no question the modal opens the sentence, but the far end of the bracket stays put: the bare infinitive fragen is still the last word."
      ru: "В вопросе без вопросительного слова модальный глагол выходит на первое место, но дальний конец рамки не двигается: голый инфинитив fragen по-прежнему стоит последним."
      uk: "У питанні без питального слова модальне дієслово виходить на перше місце, але дальній кінець рамки не рухається: голий інфінітив fragen так само стоїть останнім."
  - id: cloze-kein-zu
    outcomes: [freizeit-koennen-satz]
    type: cloze
    focus: modal-satzklammer
    text: "Wir können am Sonntag lange {{schlafen}}. Am Montag müssen wir wieder {{lernen}}."
    translation:
      en: "We can sleep long on Sunday. On Monday we have to study again."
      ru: "В воскресенье мы можем долго спать. В понедельник нам снова нужно заниматься."
      uk: "У неділю ми можемо довго спати. У понеділок нам знову треба вчитися."
    explain:
      en: "Both gaps are the far end of a modal bracket: a bare infinitive, no zu, nothing after it."
      ru: "Оба пропуска — дальний конец модальной рамки: голый инфинитив, без zu, и после него ничего не стоит."
      uk: "Обидва пропуски — дальній кінець модальної рамки: голий інфінітив, без zu, і після нього нічого не стоїть."
  - id: mc-kein-zu
    outcomes: [freizeit-koennen-satz]
    type: mc
    focus: modal-satzklammer
    instruction:
      en: Which sentence is correct?
      ru: Какое предложение построено правильно?
      uk: Яке речення побудоване правильно?
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Ich kann gut kochen."
      - "Ich kann gut zu kochen."
      - "Ich kann zu kochen gut."
    correct: 0
    explain:
      en: "A modal takes a bare infinitive at the very end: kann … kochen. zu never follows a modal — kann zu kochen is not German."
      ru: "После модального глагола — голый инфинитив в самом конце: kann … kochen. zu после модального не ставится — kann zu kochen не по-немецки."
      uk: "Після модального дієслова — голий інфінітив у самому кінці: kann … kochen. zu після модального не ставиться — kann zu kochen не німецькою."
  - id: diktat-musik
    outcomes: [freizeit-koennen-satz]
    type: listen
    focus: modal-satzklammer
    text: "Meine Schwester will heute Musik hören."
    explain:
      en: "will in position 2, the bare infinitive hören at the end — the bracket you hear is the bracket you write."
      ru: "will на втором месте, голый инфинитив hören в конце — рамка, которую слышишь, и есть рамка, которую пишешь."
      uk: "will на другому місці, голий інфінітив hören у кінці — рамка, яку чуєш, і є рамка, яку пишеш."
