topic: erste-schritte
role: pretest
items:
  - id: pre-name
    outcomes: [erste-sich-vorstellen]
    type: cloze
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Ich {{heiße|bin}} Maria. Und wie heißt du?"
    translation:
      en: "My name is Maria. And what is your name?"
      ru: "Меня зовут Мария. А как тебя зовут?"
      uk: "Мене звати Марія. А як тебе звати?"
    explain:
      en: "heißen means to be called: Ich heiße Maria."
      ru: "heißen означает «называться»: Ich heiße Maria."
      uk: "heißen означає «зватися»: Ich heiße Maria."
  - id: pre-origin
    outcomes: [erste-sich-vorstellen]
    type: mc
    prompt: "Ich komme ___ Georgien."
    options: ["aus", "in", "um"]
    correct: 0
    translation: { en: "I come from Georgia.", ru: "Я из Грузии.", uk: "Я з Грузії." }
    explain:
      en: "Use aus for origin: aus Georgien."
      ru: "Для происхождения используется aus: aus Georgien."
      uk: "Для походження вживається aus: aus Georgien."
  - id: pre-number
    outcomes: [erste-zahlen-verstehen]
    type: mc
    prompt: "Welche Zahl ist 7?"
    options: ["sechs", "sieben", "acht"]
    correct: 1
    translation: { en: "Which number is 7?", ru: "Как называется цифра 7?", uk: "Як називається цифра 7?" }
    explain:
      en: "7 is sieben."
      ru: "7 по-немецки sieben."
      uk: "7 німецькою — sieben."
