topic: akkusativ
role: practice
title:
  en: Practice — the accusative case
  ru: Практика — винительный падеж (Akkusativ)
items:
  - id: tabelle-bestimmter-artikel
    outcomes: [akkusativ-objekte]
    type: table
    focus: akkusativ-artikel
    title: "Bestimmter Artikel — Nominativ und Akkusativ"
    instruction:
      en: Fill in the missing definite articles.
      ru: Заполните пропущенные определённые артикли.
    columns: [Nominativ, Akkusativ]
    rows:
      - label: maskulin
        cells: [{ answer: der, given: true }, { answer: den }]
      - label: feminin
        cells: [{ answer: die, given: true }, { answer: die }]
      - label: neutral
        cells: [{ answer: das, given: true }, { answer: das }]
      - label: Plural
        cells: [{ answer: die, given: true }, { answer: die }]
    explain:
      en: "Only the masculine changes in the accusative: der → den. Feminine (die), neuter (das) and plural (die) are identical to the nominative."
      ru: "В Akkusativ меняется только мужской род: der → den. Женский род (die), средний род (das) и множественное число (die) совпадают с именительным падежом."

  - id: cloze-bruder
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: Fill the gap with the correct form of "ein".
      ru: Вставьте правильную форму артикля "ein".
    text: "Ich habe {{einen}} Bruder."
    translation:
      en: I have a brother.
      ru: У меня есть брат.
    explain:
      en: "haben takes the accusative, and der Bruder is masculine: ein → einen."
      ru: "Глагол haben требует Akkusativ, а der Bruder — мужского рода: ein → einen."

  - id: mc-mann
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-artikel
    prompt: "Ich sehe ___ Mann."
    options: ["der", "den", "das"]
    correct: 1
    translation:
      en: I see the man.
      ru: Я вижу мужчину.
    explain:
      en: "The man is the direct object of 'sehen', so the masculine article changes: der → den."
      ru: "Мужчина — прямое дополнение при глаголе 'sehen', поэтому артикль мужского рода меняется: der → den."

  - id: cloze-es-gibt
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: Fill the gap with the correct form of "ein".
      ru: Вставьте правильную форму артикля "ein".
    text: "Es gibt hier {{einen}} Supermarkt."
    translation:
      en: There is a supermarket here.
      ru: Здесь есть супермаркет.
    explain:
      en: "'es gibt' always takes the accusative; der Supermarkt is masculine, so ein → einen."
      ru: "После 'es gibt' всегда стоит Akkusativ; der Supermarkt — мужского рода, поэтому ein → einen."

  - id: match-pronomen
    outcomes: [akkusativ-objekte]
    type: match
    focus: akkusativ-pronomen
    instruction:
      en: Match each nominative pronoun with its accusative form.
      ru: Соедините каждое местоимение в именительном падеже с его формой в винительном.
    pairs:
      - { left: "ich", right: "mich" }
      - { left: "du", right: "dich" }
      - { left: "er", right: "ihn" }
      - { left: "wir", right: "uns" }
      - { left: "ihr", right: "euch" }
    explain:
      en: "Accusative pronouns: ich → mich, du → dich, er → ihn, wir → uns, ihr → euch. Note that sie and es do not change."
      ru: "Местоимения в Akkusativ: ich → mich, du → dich, er → ihn, wir → uns, ihr → euch. Обратите внимание: sie и es не меняются."

  - id: mc-lampe
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-artikel
    prompt: "Wir brauchen ___ Lampe."
    options: ["eine", "einen", "ein"]
    correct: 0
    translation:
      en: We need a lamp.
      ru: Нам нужна лампа.
    explain:
      en: "die Lampe is feminine, and feminine forms do not change in the accusative: eine stays eine. Only the masculine takes -en."
      ru: "die Lampe — женского рода, а женский род в Akkusativ не меняется: eine остаётся eine. Окончание -en получает только мужской род."

  - id: cloze-fruehstueck
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: Fill the gaps with the correct forms of "ein".
      ru: Вставьте правильные формы артикля "ein".
    text: "Er trinkt {{einen}} Kaffee und isst {{ein}} Brötchen."
    translation:
      en: He is drinking a coffee and eating a bread roll.
      ru: Он пьёт кофе и ест булочку.
    explain:
      en: "der Kaffee is masculine (ein → einen), but das Brötchen is neuter and keeps ein unchanged."
      ru: "der Kaffee — мужского рода (ein → einen), а das Brötchen — среднего, поэтому ein не меняется."

  - id: order-stuhl
    outcomes: [akkusativ-objekte]
    type: order
    focus: verbzweit
    instruction:
      en: Arrange the words into a correct sentence. Start with the capitalized word.
      ru: Составьте правильное предложение. Начните со слова с заглавной буквы.
    words: ["Heute", "kaufe", "ich", "einen", "Stuhl."]
    translation:
      en: Today I am buying a chair.
      ru: Сегодня я покупаю стул.
    explain:
      en: "'Heute' takes position 1, so the verb comes second and 'ich' third. The chair is the direct object: der Stuhl → einen Stuhl."
      ru: "'Heute' занимает первое место, поэтому глагол стоит вторым, а 'ich' — третьим. Стул — прямое дополнение: der Stuhl → einen Stuhl."

  - id: mc-pronomen-ihn
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-pronomen
    prompt: "Das ist mein Bruder. Ich sehe ___ oft."
    options: ["er", "ihn", "sie"]
    correct: 1
    translation:
      en: That is my brother. I see him often.
      ru: Это мой брат. Я часто его вижу.
    explain:
      en: "The pronoun is the direct object, so the masculine form changes: er → ihn — just like der → den."
      ru: "Местоимение здесь — прямое дополнение, поэтому мужской род меняется: er → ihn — точно так же, как der → den."

  - id: cloze-kein-hund
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: Fill the gap with the correct form of "kein".
      ru: Вставьте правильную форму отрицания "kein".
    text: "Wir haben {{keinen}} Hund."
    translation:
      en: We don't have a dog.
      ru: У нас нет собаки.
    explain:
      en: "kein follows the same pattern as ein: der Hund is masculine, so in the accusative it becomes keinen."
      ru: "kein изменяется так же, как ein: der Hund — мужского рода, поэтому в Akkusativ получается keinen."

  - id: mc-buch
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-artikel
    instruction:
      en: Which sentence is correct?
      ru: Какое предложение правильное?
    prompt: "Was ist richtig?"
    options:
      - "Ich lese das Buch."
      - "Ich lese den Buch."
      - "Ich lese dem Buch."
    correct: 0
    explain:
      en: "das Buch is neuter, and neuter forms are identical in nominative and accusative: das stays das. The -en change applies only to the masculine."
      ru: "das Buch — среднего рода, а средний род в Nominativ и Akkusativ совпадает: das остаётся das. Изменение на -en касается только мужского рода."

  - id: match-artikel
    outcomes: [akkusativ-objekte]
    type: match
    focus: akkusativ-artikel
    instruction:
      en: Match each nominative form with its accusative form.
      ru: Соедините каждую форму именительного падежа с её формой в винительном.
    pairs:
      - { left: "der", right: "den" }
      - { left: "ein (maskulin)", right: "einen" }
      - { left: "kein (maskulin)", right: "keinen" }
      - { left: "eine", right: "eine (unverändert)" }
      - { left: "das", right: "das (unverändert)" }
    explain:
      en: "The accusative trio to memorize is den – einen – keinen. Feminine and neuter forms stay unchanged."
      ru: "Тройка Akkusativ, которую нужно запомнить: den – einen – keinen. Формы женского и среднего рода не меняются."

  - id: cloze-verstehen
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-pronomen
    instruction:
      en: Fill the gap with the accusative form of the pronoun in brackets.
      ru: Вставьте форму винительного падежа местоимения, указанного в скобках.
    text: "Verstehst du {{mich}}? (ich)"
    translation:
      en: Do you understand me?
      ru: Ты меня понимаешь?
    explain:
      en: "The person being understood is the direct object: ich → mich."
      ru: "Тот, кого понимают, — прямое дополнение: ich → mich."

  - id: tabelle-ein-kein
    outcomes: [akkusativ-objekte]
    type: table
    focus: akkusativ-artikel
    title: "ein / kein im Akkusativ"
    instruction:
      en: Fill in the accusative forms of "ein" and "kein".
      ru: Заполните формы "ein" и "kein" в винительном падеже.
    columns: [maskulin, feminin, neutral]
    rows:
      - label: ein
        cells: [{ answer: einen }, { answer: eine, given: true }, { answer: ein }]
      - label: kein
        cells: [{ answer: keinen }, { answer: keine }, { answer: kein, given: true }]
    explain:
      en: "ein and kein decline the same way: only the masculine adds -en (einen, keinen). Feminine (eine/keine) and neuter (ein/kein) match the nominative."
      ru: "ein и kein склоняются одинаково: окончание -en появляется только в мужском роде (einen, keinen). Женский (eine/keine) и средний род (ein/kein) совпадают с именительным падежом."

  - id: uebersetzen-hund
    outcomes: [akkusativ-objekte]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "I have a dog."
    prompt_ru: "У меня есть собака."
    answer: "Ich habe einen Hund."
    explain:
      en: "haben always takes the accusative, and der Hund is masculine, so ein → einen: Ich habe einen Hund."
      ru: "Глагол haben всегда требует Akkusativ, а der Hund — мужского рода, поэтому ein → einen: Ich habe einen Hund."

  - id: uebersetzen-kaffee
    outcomes: [akkusativ-objekte]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "He is drinking a coffee."
    prompt_ru: "Он пьёт кофе."
    answer: "Er trinkt einen Kaffee."
    explain:
      en: "The coffee is the direct object of trinken, and der Kaffee is masculine: ein → einen. And remember the capital K — every German noun is capitalized."
      ru: "Кофе — прямое дополнение при глаголе trinken, а der Kaffee — мужского рода: ein → einen. И не забудьте заглавную K — все существительные в немецком пишутся с большой буквы."

  - id: uebersetzen-lampe
    outcomes: [akkusativ-objekte]
    type: translate
    focus: verbzweit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Tomorrow I am buying a lamp."
    prompt_ru: "Завтра я куплю лампу."
    answer: "Morgen kaufe ich eine Lampe."
    accept:
      - "Ich kaufe morgen eine Lampe."
    explain:
      en: "Both word orders are correct: Morgen kaufe ich … (the verb stays second, the subject moves behind it) and Ich kaufe morgen …. die Lampe is feminine, so eine does not change in the accusative."
      ru: "Правильны оба порядка слов: Morgen kaufe ich … (глагол остаётся на втором месте, подлежащее уходит за него) и Ich kaufe morgen …. die Lampe — женского рода, поэтому eine в Akkusativ не меняется."
