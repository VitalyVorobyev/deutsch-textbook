topic: akkusativ
role: probe
title:
  en: "Probe — the accusative article"
  ru: "Проверка — артикль в винительном падеже"

# Three parallel variants of ONE competence: the accusative article after a transitive
# verb — der → den, ein → einen, and every other gender unchanged. Each variant puts a
# masculine object (which changes) next to a feminine or neuter one (which does not), so
# each is evidence for all three outcomes: the object case, the article forms, and the
# fact that only the masculine moves.

items:
  - id: variant-a
    outcomes: [akkusativ-artikel, akkusativ-maskulin, akkusativ-objekte]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "I see the teacher and the girl."
    prompt_ru: "Я вижу учителя и девочку."
    answer: "Ich sehe den Lehrer und das Mädchen."
    key_tokens: ["den", "das"]
    explain:
      en: "sehen takes an accusative object. der Lehrer is masculine, so der becomes den; das Mädchen is neuter and keeps das unchanged."
      ru: "sehen требует винительного падежа. der Lehrer — мужского рода, поэтому der превращается в den; das Mädchen — среднего рода, и das остаётся без изменений."

  - id: variant-b
    outcomes: [akkusativ-artikel, akkusativ-maskulin, akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: Fill in the correct article.
      ru: Вставьте правильный артикль.
    text: "Meine Tochter braucht {{einen}} Stuhl, {{eine}} Lampe und {{ein}} Buch."
    explain:
      en: "brauchen takes an accusative object, and all three genders line up in one sentence: einen Stuhl (masculine, changed), eine Lampe (feminine, unchanged), ein Buch (neuter, unchanged)."
      ru: "brauchen требует винительного падежа, и все три рода стоят рядом в одном предложении: einen Stuhl (мужской род — форма изменилась), eine Lampe (женский род — без изменений), ein Buch (средний род — без изменений)."

  - id: variant-c
    outcomes: [akkusativ-artikel, akkusativ-maskulin, akkusativ-objekte]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "My sister has a son and a daughter."
    prompt_ru: "У моей сестры есть сын и дочь."
    answer: "Meine Schwester hat einen Sohn und eine Tochter."
    key_tokens: ["einen", "eine"]
    explain:
      en: "haben always takes an accusative object, even where English says there is: der Sohn → einen Sohn, while die Tochter keeps eine. Only the masculine ever changes."
      ru: "haben всегда управляет винительным падежом, хотя по-русски мы говорим «у сестры есть»: der Sohn → einen Sohn, а die Tochter сохраняет eine. Меняется только мужской род."
