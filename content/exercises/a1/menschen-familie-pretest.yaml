topic: menschen-familie
role: pretest
items:
  - id: pre-meine-schwester
    outcomes: [familie-vorstellen]
    type: cloze
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Ich habe eine Schwester. Das ist {{meine}} Schwester."
    translation:
      en: "I have a sister. This is my sister."
      ru: "У меня есть сестра. Это моя сестра."
      uk: "У мене є сестра. Це моя сестра."
    explain: { en: "Schwester is feminine, so mein takes -e: meine Schwester.", ru: "Schwester женского рода, поэтому mein получает -e: meine Schwester.", uk: "Schwester жіночого роду, тому mein отримує -e: meine Schwester." }
  - id: pre-ihr-vater
    outcomes: [familie-vorstellen]
    type: mc
    prompt: "Anna und ___ Vater wohnen in Bonn."
    options: ["sein", "ihr", "dein"]
    correct: 1
    translation: { en: "Anna and her father live in Bonn.", ru: "Анна и её отец живут в Бонне.", uk: "Анна та її батько живуть у Бонні." }
    explain: { en: "The owner is Anna, so her is ihr: ihr Vater.", ru: "Владелец — Анна, поэтому «её отец» — ihr Vater.", uk: "Власниця — Анна, тому «її батько» — ihr Vater." }
  - id: pre-occupation
    outcomes: [menschen-beschreiben]
    type: mc
    prompt: "Mila ist ___. Das ist ihr Beruf."
    options: ["Ärztin", "Bruder", "blond"]
    correct: 0
    translation: { en: "Mila is a doctor. That is her occupation.", ru: "Мила — врач. Это её профессия.", uk: "Міла — лікарка. Це її професія." }
    explain: { en: "Ärztin is the feminine occupation; after ist it has no article here.", ru: "Ärztin — название профессии в женском роде; после ist артикль здесь не нужен.", uk: "Ärztin — назва професії в жіночому роді; після ist артикль тут не потрібен." }
