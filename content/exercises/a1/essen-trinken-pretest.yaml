topic: essen-trinken
role: pretest
items:
  - id: pre-hunger-haben
    outcomes: [essen-vorlieben]
    type: mc
    focus: haben-wendungen
    prompt: "Ich ___ Hunger. Was gibt es zum Mittagessen?"
    options: ["bin", "habe", "mache"]
    correct: 1
    translation:
      en: I'm hungry. What's for lunch?
      ru: Я голоден. Что на обед?
      uk: Я голодний. Що на обід?
    explain:
      en: 'German expresses hunger and thirst with haben + noun: Ich habe Hunger, ich habe Durst. "Ich bin Hunger" is impossible — and even the adjective version "Ich bin hungrig" sounds bookish. In everyday German you "have" hunger.'
      ru: 'Голод и жажду немецкий выражает через haben + существительное: Ich habe Hunger, ich habe Durst. Сказать "Ich bin Hunger" нельзя, и даже вариант с прилагательным "Ich bin hungrig" звучит книжно — по-немецки голод «имеют».'
      uk: 'Голод і спрагу німецька виражає через haben + іменник: Ich habe Hunger, ich habe Durst. Сказати "Ich bin Hunger" не можна, і навіть варіант з прикметником "Ich bin hungrig" звучить книжно — німецькою голод «мають».'

  - id: pre-trinke-kaffee
    outcomes: [essen-vorlieben]
    type: mc
    focus: verb-endungen
    prompt: "Ich ___ gern Kaffee."
    options: ["trinke", "trinkst", "trinkt"]
    correct: 0
    translation:
      en: I like drinking coffee.
      ru: Я люблю пить кофе.
      uk: Я люблю пити каву.
    explain:
      en: 'With ich, a regular present-tense verb takes -e: ich trinke. The word gern says that you enjoy doing the activity.'
      ru: 'С ich правильный глагол в настоящем времени получает окончание -e: ich trinke. Слово gern показывает, что вам нравится это действие.'
      uk: 'З ich правильне дієслово в теперішньому часі отримує закінчення -e: ich trinke. Слово gern показує, що вам подобається ця дія.'

  - id: pre-obst-singular
    outcomes: [essen-vorlieben]
    type: mc
    focus: genus
    prompt: "___ Obst ist frisch."
    options: ["Das", "Die", "Der"]
    correct: 0
    translation:
      en: The fruit is fresh.
      ru: Фрукты свежие.
      uk: Фрукти свіжі.
    explain:
      en: '"Obst" and "Gemüse" are neuter collective nouns and always singular: das Obst ist frisch, das Gemüse ist gesund. Even though English often uses plurals here ("fruits", "vegetables"), German keeps das + a singular verb.'
      ru: '"Obst" и "Gemüse" — собирательные существительные среднего рода, и они всегда в единственном числе: das Obst ist frisch, das Gemüse ist gesund. По-русски мы говорим «фрукты, овощи» во множественном числе, а по-немецки — das + глагол в единственном.'
      uk: '"Obst" і "Gemüse" — збірні іменники середнього роду, і вони завжди в однині: das Obst ist frisch, das Gemüse ist gesund. Українською ми кажемо «фрукти, овочі» у множині, а німецькою — das + дієслово в однині.'
