topic: menschen-familie
role: probe
title:
  en: "Probe — people and family"
  ru: "Проверка — люди и семья"

items:
  - id: variant-a
    outcomes: [menschen-beschreiben]
    type: translate
    focus: possessivartikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "My sister is a teacher. She is friendly."
    prompt_ru: "Моя сестра — учительница. Она приветливая."
    answer: "Meine Schwester ist Lehrerin. Sie ist freundlich."
    key_tokens: ["Meine"]
    explain:
      en: "German drops the article before a profession: sie ist Lehrerin, not eine Lehrerin. The feminine form takes -in."
      ru: "Перед названием профессии артикль не ставится: sie ist Lehrerin, а не eine Lehrerin. Женская форма образуется суффиксом -in."

  - id: variant-b
    outcomes: [familie-vorstellen]
    type: cloze
    focus: possessivartikel
    instruction:
      en: Fill in the correct possessive.
      ru: Вставьте правильное притяжательное местоимение.
    text: "Das ist {{mein}} Bruder. {{Meine}} Mutter heißt Eva. {{Mein}} Kind ist zwei."
    explain:
      en: "mein takes the same endings as ein: mein Bruder (m), meine Mutter (f), mein Kind (n). The noun's gender decides, not yours."
      ru: "mein склоняется как ein: mein Bruder (м. р.), meine Mutter (ж. р.), mein Kind (ср. р.). Решает род существительного, а не говорящего."

  - id: variant-c
    outcomes: [familie-verstehen]
    type: listen
    instruction:
      en: Listen and type what you hear.
      ru: Послушайте и напишите то, что услышали.
    text: "Mein Vater ist Arzt und meine Mutter ist Ärztin."
    explain:
      en: "Both professions appear without an article, and the feminine form adds -in: Arzt → Ärztin."
      ru: "Обе профессии стоят без артикля, а женская форма получает суффикс -in: Arzt → Ärztin."
