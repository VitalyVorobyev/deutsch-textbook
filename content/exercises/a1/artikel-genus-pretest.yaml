topic: artikel-genus
role: pretest
items:
  - id: pre-genus-buch
    outcomes: [artikel-richtig-verwenden]
    type: cloze
    focus: genus
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "{{Das}} Buch ist sehr interessant."
    translation:
      en: "The book is very interesting."
      ru: "Книга очень интересная."
      uk: "Книжка дуже цікава."
    explain:
      en: "Gender belongs to the German word, not to the thing it names — a noun's translation in another language can never tell you its German gender. Buch happens to be neuter: das Buch. That is why you always learn a noun together with its article."
      ru: "Род — свойство немецкого слова, а не предмета, и из русского он не переносится: «книга» — женского рода, а Buch — среднего, поэтому das Buch. Вот почему существительное всегда учат вместе с артиклем."
      uk: "Рід — властивість німецького слова, а не предмета, і з української він не переноситься: «книжка» — жіночого роду, а Buch — середнього, тому das Buch. Ось чому іменник завжди вчать разом з артиклем."

  - id: pre-plural-die
    outcomes: [artikel-richtig-verwenden]
    type: mc
    focus: plural-artikel
    prompt: "___ Kinder spielen zu Hause."
    options: ["Der", "Die", "Das"]
    correct: 1
    translation:
      en: The children are playing at home.
      ru: Дети играют дома.
      uk: Діти граються вдома.
    explain:
      en: "In the plural the article is always die, whatever the gender of the singular: das Kind → die Kinder, der Mann → die Männer."
      ru: "Во множественном числе артикль всегда die, независимо от рода в единственном: das Kind → die Kinder, der Mann → die Männer."
      uk: "У множині артикль завжди die, незалежно від роду в однині: das Kind → die Kinder, der Mann → die Männer."

  - id: pre-kein
    outcomes: [artikel-richtig-verwenden]
    type: mc
    focus: kein-nicht
    prompt: "Ich habe ___ Katze."
    options: ["nicht eine", "keine", "kein"]
    correct: 1
    translation:
      en: I don't have a cat.
      ru: У меня нет кошки.
      uk: У мене немає кішки.
    explain:
      en: "A noun is negated with kein, never with „nicht ein“: Ich habe keine Katze. And die Katze is feminine, so the form is keine, not kein."
      ru: "Существительное отрицается через kein и никогда через „nicht ein“: Ich habe keine Katze. А die Katze — женского рода, поэтому форма keine, а не kein."
      uk: "Іменник заперечується через kein і ніколи через „nicht ein“: Ich habe keine Katze. А die Katze — жіночого роду, тому форма keine, а не kein."
