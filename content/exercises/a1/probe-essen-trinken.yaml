topic: essen-trinken
role: probe
title:
  en: "Probe — food, drink and ordering"
  ru: "Проверка — еда, напитки и заказ"

items:
  - id: variant-a
    outcomes: [essen-bestellen]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "I would like a tea, please."
    prompt_ru: "Я хотел бы чай, пожалуйста."
    answer: "Ich möchte einen Tee, bitte."
    key_tokens: ["einen"]
    accept:
      - "Ich möchte einen Tee bitte."
      - "Ich nehme einen Tee, bitte."
    explain:
      en: "möchte is the polite way to order. der Tee is masculine and it is the object, so ein becomes einen."
      ru: "möchte — вежливая форма заказа. der Tee мужского рода и стоит в роли дополнения, поэтому ein превращается в einen."

  - id: variant-b
    outcomes: [essen-service-bezahlen]
    type: cloze
    instruction:
      en: Fill the gaps.
      ru: Заполните пропуски.
    text: "Was {{kostet}} der Kaffee? — Ich {{zahle}} bitte."
    explain:
      en: "kosten agrees with its subject: der Kaffee kostet (singular). Zahlen bitte is the fixed chunk for asking for the bill."
      ru: "kosten согласуется с подлежащим: der Kaffee kostet (ед. ч.). Zahlen bitte — устойчивая формула, чтобы попросить счёт."

  - id: variant-c
    outcomes: [essen-grundwortschatz, essen-vorlieben]
    type: listen
    instruction:
      en: Listen and type what you hear.
      ru: Послушайте и напишите то, что услышали.
    text: "Ich trinke gern Milch und esse gern Brot."
    explain:
      en: "gern follows the verb to say what you like doing: ich trinke gern, ich esse gern. The nouns need no article here."
      ru: "gern стоит после глагола и выражает, что вам нравится делать: ich trinke gern, ich esse gern. Артикль здесь не нужен."
