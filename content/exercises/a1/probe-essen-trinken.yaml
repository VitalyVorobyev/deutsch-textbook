topic: essen-trinken
role: probe
title:
  en: "Probe — ordering in a café"
  ru: "Проверка — заказ в кафе"

# Three parallel variants of ONE competence: placing an order — möchte / bestellen /
# nehmen plus an accusative object with the right article. That is the topic's headline
# can-do, and the article is its grammatical hinge. Three different orders, three
# different sets of food and drink, none of them a sentence from the lesson.

items:
  - id: variant-a
    outcomes: [essen-bestellen]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "I would like a salad and a water, please."
    prompt_ru: "Я хотел бы салат и воду, пожалуйста."
    answer: "Ich möchte einen Salat und ein Wasser, bitte."
    key_tokens: ["einen", "ein"]
    accept:
      - "Ich möchte einen Salat und ein Wasser bitte."
      - "Ich nehme einen Salat und ein Wasser, bitte."
    explain:
      en: "möchte is the polite way to order, and what you order is an accusative object: der Salat → einen Salat, while das Wasser keeps ein."
      ru: "möchte — вежливая форма заказа, а то, что вы заказываете, стоит в винительном падеже: der Salat → einen Salat, а das Wasser сохраняет ein."

  - id: variant-b
    outcomes: [essen-bestellen]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "We are ordering a wine and a sausage."
    prompt_ru: "Мы заказываем вино и сосиску."
    answer: "Wir bestellen einen Wein und eine Wurst."
    key_tokens: ["einen", "eine"]
    explain:
      en: "bestellen is the third ordering verb next to möchte and nehmen, and what is ordered is always an accusative object. Only the masculine article moves: der Wein → einen Wein, while die Wurst keeps eine."
      ru: "bestellen — третий глагол заказа наряду с möchte и nehmen, и заказанное всегда стоит в винительном падеже. Форму меняет только мужской род: der Wein → einen Wein, а die Wurst сохраняет eine."

  - id: variant-c
    outcomes: [essen-bestellen]
    type: translate
    focus: akkusativ-artikel
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "I would like a coffee without sugar, please."
    prompt_ru: "Я хотел бы кофе без сахара, пожалуйста."
    answer: "Ich möchte einen Kaffee ohne Zucker, bitte."
    key_tokens: ["einen"]
    accept:
      - "Ich möchte einen Kaffee ohne Zucker bitte."
    explain:
      en: "der Kaffee is the object of möchte, so it appears as einen Kaffee. After ohne, Zucker stands with no article at all — a mass noun ordered as a plain quantity needs none."
      ru: "der Kaffee — дополнение при möchte, поэтому в заказе он звучит как einen Kaffee. После ohne слово Zucker идёт вообще без артикля: с неисчисляемым существительным он здесь не нужен."
