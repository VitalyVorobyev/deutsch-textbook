topic: akkusativ
role: pretest
items:
  - id: pre-den-tisch
    outcomes: [akkusativ-objekte]
    type: cloze
    focus: akkusativ-artikel
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Ich kaufe {{den}} Tisch."
    translation:
      en: I am buying the table.
      ru: Я покупаю стол.
      uk: Я купую стіл.
    explain:
      en: "The thing you buy is the direct object and stands in the Akkusativ: masculine der → den. English never changes 'the', so this switch is easy to miss — and German applies it to every masculine noun, animate or not: den Mann and den Tisch alike."
      ru: "То, что вы покупаете, — прямое дополнение, оно стоит в Akkusativ: мужской род der → den. В отличие от русского, в немецком здесь меняется каждое слово мужского рода, а не только одушевлённые: и den Mann, и den Tisch."
      uk: "Те, що ви купуєте, — прямий додаток, він стоїть в Akkusativ: чоловічий рід der → den. На відміну від української, у німецькій тут змінюється кожне слово чоловічого роду, а не лише назви істот: і den Mann, і den Tisch."

  - id: pre-nur-maskulin
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-artikel
    prompt: "Sie liest ___ Buch."
    options: ["einen", "ein", "eine"]
    correct: 1
    translation:
      en: She is reading a book.
      ru: Она читает книгу.
      uk: Вона читає книжку.
    explain:
      en: "Only the masculine changes in the Akkusativ. Buch is neuter (das Buch), so the article stays ein — „einen Buch“ is a typical over-correction."
      ru: "В Akkusativ меняется только мужской род. Buch — среднего рода (das Buch), поэтому артикль остаётся ein; „einen Buch“ — типичная гиперкоррекция."
      uk: "В Akkusativ змінюється лише чоловічий рід. Buch — середнього роду (das Buch), тому артикль лишається ein; „einen Buch“ — типова гіперкорекція."

  - id: pre-es-gibt
    outcomes: [akkusativ-objekte]
    type: mc
    focus: akkusativ-artikel
    prompt: "Es gibt hier ___ Bahnhof."
    options: ["ein", "einen", "eine"]
    correct: 1
    translation:
      en: There is a train station here.
      ru: Здесь есть вокзал.
      uk: Тут є вокзал.
    explain:
      en: "After „es gibt“ the noun always stands in the Akkusativ — the grammatical subject is „es“. Der Bahnhof is masculine, so ein → einen, even though English „there is a station“ makes the station look like a subject."
      ru: "После „es gibt“ существительное всегда стоит в Akkusativ — грамматическое подлежащее здесь „es“. Der Bahnhof — мужского рода, поэтому ein → einen, хотя английское „there is“ и русское «здесь есть» подсказывают именительный падеж."
      uk: "Після „es gibt“ іменник завжди стоїть в Akkusativ — граматичний підмет тут „es“. Der Bahnhof — чоловічого роду, тому ein → einen, хоча українське «тут є» підказує називний відмінок."
