topic: praesens-wortstellung
role: drill
title:
  en: "Drill — present-tense endings: ich helfe, du hilfst"
  ru: "Тренажёр — окончания в настоящем времени: ich helfe, du hilfst"
  uk: "Тренажер — закінчення в теперішньому часі: ich helfe, du hilfst"
items:
  - id: uebersetzen-ich-helfe
    outcomes: [praesens-konjugation]
    type: translate
    focus: verb-endungen
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "I'm helping at home today."
    prompt_ru: "Я сегодня помогаю дома."
    prompt_uk: "Я сьогодні допомагаю вдома."
    answer: "Ich helfe heute zu Hause."
    key_tokens: ["helfe"]
    accept:
      - "Heute helfe ich zu Hause."
    explain:
      en: "helfen changes its stem only for du and er/sie/es: du hilfst, er hilft. The ich form keeps the e of the infinitive: ich helfe — 'ich hilfe' does not exist."
      ru: "У helfen корень меняется только в формах du и er/sie/es: du hilfst, er hilft. Форма ich сохраняет e инфинитива: ich helfe — «ich hilfe» не существует."
      uk: "У helfen корінь змінюється лише у формах du та er/sie/es: du hilfst, er hilft. Форма ich зберігає e інфінітива: ich helfe — «ich hilfe» не існує."

  - id: uebersetzen-bruder-spricht
    outcomes: [praesens-konjugation]
    type: translate
    focus: verb-endungen
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "My brother speaks a little German."
    prompt_ru: "Мой брат немного говорит по-немецки."
    prompt_uk: "Мій брат трохи розмовляє німецькою."
    answer: "Mein Bruder spricht ein bisschen Deutsch."
    key_tokens: ["spricht"]
    explain:
      en: "sprechen changes e → i in the du and er/sie/es forms: er spricht. 'Er sprecht' uses the wrong stem — sprecht is the ihr form, the er form is spricht."
      ru: "У sprechen e меняется на i в формах du и er/sie/es: er spricht. «Er sprecht» — не та основа: sprecht — форма для ihr, а для er — spricht."
      uk: "У sprechen e змінюється на i у формах du та er/sie/es: er spricht. «Er sprecht» — не та основа: sprecht — форма для ihr, а для er — spricht."

  - id: cloze-du-hilfst
    outcomes: [praesens-konjugation]
    type: cloze
    focus: verb-endungen
    instruction:
      en: Fill the gap with the correct form of the verb in brackets.
      ru: Вставьте правильную форму глагола, указанного в скобках.
      uk: Вставте правильну форму дієслова, поданого в дужках.
    text: "Warum {{hilfst}} (helfen) du nicht? Ich mache alles allein."
    translation:
      en: "Why aren't you helping? I'm doing everything alone."
      ru: "Почему ты не помогаешь? Я всё делаю сам."
      uk: "Чому ти не допомагаєш? Я все роблю сам."
    explain:
      en: "du is exactly where the stem changes: du hilfst (e → i), with the regular -st ending on top. Compare the full row: ich helfe — du hilfst — er hilft — wir helfen."
      ru: "Именно в форме du корень и меняется: du hilfst (e → i) плюс правильное окончание -st. Сравните весь ряд: ich helfe — du hilfst — er hilft — wir helfen."
      uk: "Саме у формі du корінь і змінюється: du hilfst (e → i) плюс звичайне закінчення -st. Порівняйте весь ряд: ich helfe — du hilfst — er hilft — wir helfen."

  - id: cloze-esse-isst
    outcomes: [praesens-konjugation]
    type: cloze
    focus: verb-endungen
    instruction:
      en: Fill the gap with the correct form of the verb in brackets.
      ru: Вставьте правильную форму глагола, указанного в скобках.
      uk: Вставте правильну форму дієслова, поданого в дужках.
    text: "Ich {{esse}} (essen) kein Fleisch, aber mein Bruder isst alles."
    translation:
      en: "I don't eat meat, but my brother eats everything."
      ru: "Я не ем мясо, а мой брат ест всё."
      uk: "Я не їм м'яса, а мій брат їсть усе."
    explain:
      en: "The stem change of essen belongs to du and er/sie/es only: er isst. The ich form keeps the e: ich esse — the two forms stand side by side in this sentence on purpose."
      ru: "Смена корня у essen — только в формах du и er/sie/es: er isst. Форма ich сохраняет e: ich esse — обе формы нарочно стоят в этом предложении рядом."
      uk: "Зміна кореня в essen — лише у формах du та er/sie/es: er isst. Форма ich зберігає e: ich esse — обидві форми навмисно стоять у цьому реченні поряд."

  - id: hoeren-schwester-spricht
    outcomes: [praesens-konjugation]
    type: listen
    focus: verb-endungen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Meine Schwester spricht drei Sprachen."
    translation:
      en: "My sister speaks three languages."
      ru: "Моя сестра говорит на трёх языках."
      uk: "Моя сестра розмовляє трьома мовами."
    explain:
      en: "er/sie spricht — the stem vowel you hear is i, not e. The -t ending is there (a regular verb keeps it), but the stem has changed: sprechen → spricht."
      ru: "er/sie spricht — в корне звучит i, а не e. Окончание -t на месте (у обычного глагола оно сохраняется), но корень изменился: sprechen → spricht."
      uk: "er/sie spricht — у корені звучить i, а не e. Закінчення -t на місці (звичайне дієслово його зберігає), але корінь змінився: sprechen → spricht."
