topic: essen-trinken
role: practice
title:
  en: "Listening — dictation: food and drink"
  ru: "Аудирование — диктант: еда и напитки"
items:
  - id: hoeren-kaffee
    outcomes: [essen-vorlieben]
    type: listen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Ich trinke morgens Kaffee."
    translation:
      en: I drink coffee in the morning.
      ru: По утрам я пью кофе.
    explain:
      en: "Kaffee is a noun, so it is capitalized; morgens (in the mornings) is an adverb and stays lowercase."
      ru: "Kaffee — существительное, поэтому пишется с большой буквы; morgens (по утрам) — наречие, пишется со строчной."

  - id: hoeren-kaese
    outcomes: [essen-vorlieben]
    type: listen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Der Käse schmeckt mir gut."
    translation:
      en: The cheese tastes good to me.
      ru: Сыр мне очень нравится (на вкус).
    explain:
      en: "Learn schmeckt mir gut as one useful restaurant phrase for now. Käse needs its Umlaut: ä, not a."
      ru: "Пока запомните schmeckt mir gut как готовую полезную фразу для кафе. И не забудьте умлаут в Käse: ä, а не a."

  - id: hoeren-pizza
    outcomes: [essen-vorlieben]
    type: listen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Wir essen heute Abend Pizza."
    translation:
      en: We are eating pizza tonight.
      ru: Сегодня вечером мы едим пиццу.
    explain:
      en: "heute Abend is two words, and Abend is a noun — capitalized. Pizza is capitalized too."
      ru: "heute Abend пишется в два слова, причём Abend — существительное, с большой буквы. Pizza тоже с большой."

  - id: hoeren-apfel-brot
    outcomes: [essen-vorlieben]
    type: listen
    focus: akkusativ-artikel
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Ich habe einen Apfel und ein Brot."
    translation:
      en: I have an apple and a (loaf of) bread.
      ru: У меня есть яблоко и хлеб.
    explain:
      en: "After haben the noun stands in the accusative: masculine ein → einen (einen Apfel), but neuter ein stays ein (ein Brot)."
      ru: "После haben существительное стоит в аккузативе: в мужском роде ein → einen (einen Apfel), а в среднем роде ein не меняется (ein Brot)."

  - id: hoeren-brot-frisch
    outcomes: [essen-vorlieben]
    type: listen
    focus: kopula-sein
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Das Brot ist frisch."
    translation:
      en: The bread is fresh.
      ru: Хлеб свежий.
    explain:
      en: "The verb ist must be written out — German never drops sein. frisch is an adjective and stays lowercase."
      ru: "Глагол ist обязательно пишется — в немецком sein никогда не опускается (в отличие от русского «хлеб свежий»). frisch — прилагательное, со строчной буквы."

  - id: hoeren-broetchen
    outcomes: [essen-vorlieben]
    type: listen
    focus: verb-endungen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Er isst ein Brötchen."
    translation:
      en: He is eating a bread roll.
      ru: Он ест булочку.
    explain:
      en: "essen changes its stem: er isst (double s, no e). Brötchen keeps its Umlaut ö — and -chen words are always neuter: ein Brötchen."
      ru: "essen меняет основу: er isst (двойное s, без e). В Brötchen умлаут ö, а слова на -chen всегда среднего рода: ein Brötchen."

  - id: hoeren-tee
    outcomes: [essen-vorlieben]
    type: listen
    focus: akkusativ-artikel
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Ich möchte einen Tee, bitte."
    translation:
      en: I would like a tea, please.
      ru: Я хотел бы чай, пожалуйста.
    explain:
      en: "möchte is spelled with ö. der Tee is masculine, so the accusative article is einen — ich möchte einen Tee."
      ru: "möchte пишется через ö. der Tee — мужского рода, поэтому в аккузативе артикль einen: ich möchte einen Tee."

  - id: hoeren-milch
    outcomes: [essen-vorlieben]
    type: listen
    focus: verb-endungen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
    text: "Trinkst du gern Milch?"
    translation:
      en: Do you like drinking milk?
      ru: Ты любишь пить молоко?
    explain:
      en: "A yes/no question starts with the verb: Trinkst du …? The du-form ends in -st, and gern (gladly) stays lowercase."
      ru: "Общий вопрос начинается с глагола: Trinkst du …? Форма на du оканчивается на -st, а gern (охотно) пишется со строчной буквы."
