topic: man-und-besitz
role: pretest
title:
  en: "Before we start — man and whose it is"
  ru: "Перед началом — man и чьё это"
  uk: "Перед початком — man і чиє це"
items:
  - id: pretest-man-verbform
    outcomes: [regeln-mit-man]
    type: cloze
    focus: indefinitpronomen
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "In der Bibliothek {{muss}} man leise sein. (müssen)"
    translation:
      en: "In the library you have to be quiet."
      ru: "В библиотеке нужно вести себя тихо."
      uk: "У бібліотеці потрібно поводитися тихо."
    explain:
      en: "man is a third-person-singular subject, so it always takes the er-form: man muss, never man müssen or man musst. And unlike Russian or English, German cannot drop it — every sentence needs an explicit subject, so man is what fills the slot when no particular person is meant."
      ru: "man — подлежащее третьего лица единственного числа, поэтому всегда стоит в форме er: man muss, а не man müssen или man musst. И в отличие от русского, немецкий не может его опустить: подлежащее нужно в каждом предложении, и man как раз заполняет это место, когда конкретное лицо не важно."
      uk: "man — підмет третьої особи однини, тому завжди стоїть у формі er: man muss, а не man müssen чи man musst. І на відміну від української, німецька не може його опустити: підмет потрібен у кожному реченні, і man саме заповнює це місце, коли конкретна особа не важлива."

  - id: pretest-apostroph
    outcomes: [besitz-ausdruecken]
    type: mc
    focus: genitiv-eigenname
    prompt: "Welche Schreibweise ist richtig?"
    options:
      - "Annas Auto"
      - "Anna's Auto"
      - "Anna Auto"
      - "Auto von Anna's"
    correct: 0
    explain:
      en: "German writes the -s straight onto the name, with no apostrophe: Annas Auto."
      ru: "Немецкий пишет -s прямо на имени, без апострофа: Annas Auto."
      uk: "Німецька пише -s прямо на імені, без апострофа: Annas Auto."

  - id: pretest-von-dativ
    outcomes: [besitz-ausdruecken]
    type: mc
    focus: genitiv-eigenname
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Das ist das Auto von meinem Bruder."
      - "Das ist das Auto meinem Bruders."
      - "Das ist mein Bruders Auto."
      - "Das ist das Auto von mein Bruder."
    correct: 0
    explain:
      en: "The owner is not a bare name, so -s is not available and von + Dativ takes over — and von governs the dative, so it is meinem, not mein."
      ru: "Владелец здесь не голое имя, поэтому путь через -s закрыт и работает von + Dativ, а von требует дательного: meinem, а не mein."
      uk: "Власник тут не голе ім'я, тому шлях через -s закритий і працює von + Dativ, а von вимагає давального: meinem, а не mein."
