topic: verben-mit-praepositionen
role: practice
title: { en: "Production — agree on the outing", ru: "Практика речи и письма — договоритесь о поездке" }
items:
  - id: schreiben-gruppenplan
    type: write
    outcomes: [verb-praeposition-waehlen, da-wort-sache, person-sache-unterscheiden]
    focus: da-wo-woerter
    prompt: { en: "Your course group proposed a museum visit. Write a short reply to the group.", ru: "Ваша группа курса предложила поход в музей. Напишите группе короткий ответ." }
    goal: { en: "Respond to the plan, ask one question, and refer back without repeating every noun.", ru: "Ответьте на предложение, задайте один вопрос и сошлитесь на него, не повторяя каждое существительное." }
    requirements:
      - { en: "Use one verb + preposition construction.", ru: "Используйте одну конструкцию глагол + предлог." }
      - { en: "Use one wo-question and one da-word for a thing.", ru: "Используйте один вопрос с wo- и одно da-слово для предмета." }
      - { en: "Revise the draft after comparing it with the model.", ru: "Исправьте черновик после сравнения с образцом." }
    min_words: 25
    # No wenn-/dass-clause in the model: `nebensatz-verbende` and `nebensatz-vorfeld` arrive with
    # `nebensaetze-plaene`, two units later. A learner cannot imitate grammar they have not met.
    model_answer: "Ich interessiere mich für die Ausstellung und freue mich darauf. Worauf warten wir noch? Mia hat vielleicht heute Zeit. Dann können wir die Tickets kaufen. Darüber können wir am Abend noch sprechen."
    model_translation: { en: "I am interested in the exhibition and look forward to it. What are we still waiting for? Mia may have time today. Then we can buy the tickets. We can talk about that again this evening.", ru: "Мне интересна выставка, и я жду её с радостью. Чего мы ещё ждём? Возможно, у Мии сегодня есть время. Тогда мы сможем купить билеты. Об этом мы ещё можем поговорить вечером." }
    explain: { en: "A useful reply moves from the named plan to a da-reference, adds a wo-question, then revises any preposition or linking-r error after the model appears.", ru: "Полезный ответ переходит от названного плана к da-отсылке, добавляет вопрос с wo-, а после появления образца исправляет предлог или связующее r." }
  - id: sprechen-plan-vergleichen
    type: speak
    mode: spoken-interaction
    outcomes: [wo-wort-fragen, person-sache-unterscheiden]
    focus: da-wo-woerter
    prompt: { en: "Record a reply to a partner: ask about the plan, then distinguish the plan from one person in the group.", ru: "Запишите ответ партнёру: спросите о плане, затем различите план и одного человека в группе." }
    goal: { en: "Speak for 20–30 seconds, replay the recording, assess it, and record a revised version.", ru: "Говорите 20–30 секунд, прослушайте запись, оцените её и запишите исправленную версию." }
    checklist:
      - { en: "I used a natural wo-question for a thing.", ru: "Я использовал естественный вопрос с wo- о предмете." }
      - { en: "I used a da-word for the plan, but preposition + pronoun for a person.", ru: "Для плана я использовал da-слово, а для человека — предлог + местоимение." }
      - { en: "After replaying, I corrected at least one form or confirmed it carefully.", ru: "После прослушивания я исправил хотя бы одну форму или внимательно подтвердил её." }
    model_answer: "Worüber sprechen wir heute: über das Museum oder über das Konzert? Über den Museumsplan habe ich schon mit Lea gesprochen. Wir sprechen morgen noch einmal darüber. Jonas ist auch dabei; über ihn müssen wir aber nichts entscheiden."
    model_translation: { en: "What are we talking about today: the museum or the concert? I have already spoken with Lea about the museum plan. We will talk about it again tomorrow. Jonas is joining too; but we do not have to decide anything about him.", ru: "О чём мы сегодня говорим: о музее или о концерте? О плане музея я уже говорил с Леа. Завтра мы ещё раз поговорим об этом. Йонас тоже участвует; но о нём нам ничего решать не нужно." }
    explain: { en: "On replay, listen for the contrast: darüber for the plan, über ihn for Jonas. The retry is practice evidence, not an automatic pronunciation score.", ru: "При прослушивании проверьте контраст: darüber для плана, über ihn для Йонаса. Повторная запись — практика, а не автоматическая оценка произношения." }
