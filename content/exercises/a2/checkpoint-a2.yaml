    explain: { en: "One sentence, two verbs, two different addresses. The wrapper Können Sie mir sagen is a main-clause question, so können stands first. The embedded question after the comma keeps interrogative meaning but uses subordinate-clause order: wann der Kurs beginnt, not the direct-question order wann beginnt der Kurs.", ru: "Одно предложение, два глагола, два разных адреса. Рамка Können Sie mir sagen — вопрос в форме главного предложения, поэтому können стоит впереди. Встроенный вопрос после запятой сохраняет вопросительный смысл, но использует порядок придаточного: wann der Kurs beginnt, а не порядок прямого вопроса wann beginnt der Kurs.", uk: "Одне речення, два дієслова, дві різні адреси. Рамка Können Sie mir sagen — питання у формі головного речення, тому können стоїть попереду. Вбудоване питання після коми зберігає питальний зміст, але використовує порядок підрядного: wann der Kurs beginnt, а не порядок прямого питання wann beginnt der Kurs." }
