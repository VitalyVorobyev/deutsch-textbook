topic: aemter-dienstleistungen
role: checkpoint
title: { en: "Checkpoint A2 — the whole level in one test", ru: "Контрольный тест A2 — весь уровень в одном тесте", uk: "Контрольний тест A2 — весь рівень в одному тесті" }
items:
  # --- Hören ---
  - id: hoeren-durchsage-bahnhof
    outcomes: [durchsage-verstehen, verbindung-waehlen]
    type: audio-comprehension
    source:
      kind: tts
      rate: 0.85
      turns:
        - { speaker: "Durchsage", text: "Achtung an Gleis fünf: Der ICE nach Hamburg um zehn Uhr zwanzig fällt heute leider aus. Nehmen Sie bitte den Regionalzug um zehn Uhr fünfzig. Der Regionalzug fährt ab Gleis drei." }
    question: "Was sollen die Reisenden machen?"
    options: ["Den Regionalzug um 10:50 ab Gleis 3 nehmen.", "Auf Gleis 5 auf den ICE warten.", "Mit dem Bus nach Hamburg fahren."]
    correct: 0
    translation: { en: "What should the travellers do?", ru: "Что делать пассажирам?", uk: "Що робити пасажирам?" }
    explain: { en: "The one word that carries the whole announcement is ausfallen — der ICE fällt aus, the train is cancelled, so waiting on platform 5 is pointless. The instruction that follows is an imperative addressed to everyone: Nehmen Sie bitte den Regionalzug. Two numbers are read out and they belong to two different trains — zehn Uhr zwanzig is the cancelled ICE, zehn Uhr fünfzig the replacement. Nothing is said about a bus.", ru: "Всё объявление держится на одном слове: ausfallen — der ICE fällt aus, поезд отменён, так что ждать на пятом пути бессмысленно. Дальше идёт указание в повелительном наклонении, обращённое ко всем: Nehmen Sie bitte den Regionalzug. Прозвучали два времени, и они относятся к разным поездам: zehn Uhr zwanzig — это отменённый ICE, zehn Uhr fünfzig — замена. Про автобус не сказано ни слова.", uk: "Усе оголошення тримається на одному слові: ausfallen — der ICE fällt aus, потяг скасовано, тож чекати на п'ятій колії безглуздо. Далі йде вказівка в наказовому способі, звернена до всіх: Nehmen Sie bitte den Regionalzug. Пролунали два часи, і вони стосуються різних потягів: zehn Uhr zwanzig — це скасований ICE, zehn Uhr fünfzig — заміна. Про автобус не сказано ні слова." }
  - id: hoeren-arztpraxis
    outcomes: [praxis-anweisungen-verstehen]
    type: audio-comprehension
    source:
      kind: tts
      rate: 0.85
      turns:
        - { speaker: "Praxis", text: "Praxis Doktor Wagner, guten Tag." }
        - { speaker: "Herr Roth", text: "Guten Tag, hier ist Martin Roth. Ich habe seit drei Tagen starke Halsschmerzen. Könnte ich heute noch einen Termin bekommen?" }
        - { speaker: "Praxis", text: "Heute ist es leider voll. Kommen Sie bitte morgen um Viertel nach acht. Und bringen Sie Ihre Karte von der Krankenkasse mit." }
    question: "Was soll Herr Roth mitbringen?"
    options: ["Seine Karte von der Krankenkasse.", "Ein Rezept vom Arzt.", "Eine Krankmeldung für seinen Chef."]
    correct: 0
    translation: { en: "What should Mr Roth bring with him?", ru: "Что Господин Рот должен взять с собой?", uk: "Що пан Рот має взяти із собою?" }
    explain: { en: "The instruction is the last thing said, and it is a separable verb split across the whole clause: Bringen Sie Ihre Karte von der Krankenkasse mit. If you only listen for the front of the sentence you hear bringen and miss the mit at the end — and mitbringen is what the question asks about. A Rezept and a Krankmeldung are things you get from the doctor afterwards, not things you take with you.", ru: "Указание звучит в самом конце, и это отделяемый глагол, растянутый на всё предложение: Bringen Sie Ihre Karte von der Krankenkasse mit. Если слушать только начало фразы, вы услышите bringen и пропустите mit в конце — а вопрос как раз про mitbringen. Rezept и Krankmeldung — это то, что получают у врача потом, а не то, что берут с собой.", uk: "Вказівка звучить у самому кінці, і це відокремлюване дієслово, розтягнуте на все речення: Bringen Sie Ihre Karte von der Krankenkasse mit. Якщо слухати лише початок фрази, ви почуєте bringen і пропустите mit у кінці — а питання якраз про mitbringen. Rezept і Krankmeldung — це те, що отримують у лікаря потім, а не те, що беруть із собою." }
  - id: hoeren-buergeramt
    outcomes: [unterlagen-erfragen, formular-verstehen]
    type: audio-comprehension
    source:
      kind: tts
      rate: 0.85
      turns:
        - { speaker: "Herr Sanchez", text: "Guten Tag. Ich bin neu in der Stadt und möchte mich anmelden." }
        - { speaker: "Beamtin", text: "Gern. Haben Sie das Formular schon ausgefüllt?" }
        - { speaker: "Herr Sanchez", text: "Ja, hier ist es. Meinen Pass habe ich auch dabei." }
        - { speaker: "Beamtin", text: "Sehr gut. Ich brauche aber noch den Mietvertrag von Ihrer Wohnung. Ohne den Mietvertrag kann ich Sie leider nicht anmelden." }
    question: "Was fehlt Herrn Sanchez noch?"
    options: ["Der Mietvertrag.", "Das Formular.", "Der Pass."]
    correct: 0
    translation: { en: "What is Mr Sanchez still missing?", ru: "Чего Господину Санчесу ещё не хватает?", uk: "Чого панові Санчесу ще бракує?" }
    explain: { en: "Listen for the little word aber: Ich brauche aber noch den Mietvertrag. It announces that something is still missing, and everything said before it — the form, the passport — Mr Sanchez already has. The clerk then repeats the point with ohne: Ohne den Mietvertrag kann ich Sie nicht anmelden. That is the shape a counter conversation almost always has — first what is fine, then the one document that is not there.", ru: "Слушайте маленькое слово aber: Ich brauche aber noch den Mietvertrag. Оно объявляет, что чего-то не хватает, а всё, что прозвучало до него — бланк, паспорт, — у господина Санчеса уже есть. Затем сотрудница повторяет это через ohne: Ohne den Mietvertrag kann ich Sie nicht anmelden. Разговор у окошка почти всегда так и устроен: сначала то, что в порядке, потом единственный документ, которого нет.", uk: "Слухайте маленьке слово aber: Ich brauche aber noch den Mietvertrag. Воно оголошує, що чогось бракує, а все, що пролунало до нього — бланк, паспорт, — у пана Санчеса вже є. Потім співробітниця повторює це через ohne: Ohne den Mietvertrag kann ich Sie nicht anmelden. Розмова біля віконця майже завжди так і влаштована: спочатку те, що гаразд, потім єдиний документ, якого немає." }
  - id: diktat-tagesablauf
    outcomes: [trennbar-satz, alltag-zeit-haeufigkeit]
    type: listen
    focus: trennbar-wortstellung
    instruction: { en: "Listen and type what you hear.", ru: "Прослушайте и напишите, что вы слышите.", uk: "Прослухайте і напишіть те, що ви чуєте." }
    text: "Ich stehe jeden Tag um sechs Uhr auf."
    translation: { en: "Every day I get up at six o'clock.", ru: "Каждый день я встаю в шесть часов.", uk: "Щодня я встаю о шостій годині." }
    explain: { en: "The verb is aufstehen, and in a main clause it comes apart: stehe takes position 2 and the prefix auf waits at the very end. Write the two halves as two words, in that order — never Ich aufstehe. The frequency phrase jeden Tag and the clock time um sechs Uhr sit comfortably in the middle, between the two halves of the verb.", ru: "Глагол здесь — aufstehen, и в главном предложении он распадается: stehe занимает второе место, а приставка auf ждёт в самом конце. Пишите обе половины отдельными словами и именно в таком порядке — никогда Ich aufstehe. Обозначение частоты jeden Tag и время um sechs Uhr спокойно располагаются посередине, между двумя половинами глагола.", uk: "Дієслово тут — aufstehen, і в головному реченні воно розпадається: stehe займає друге місце, а префікс auf чекає в самому кінці. Пишіть обидві половини окремими словами і саме в такому порядку — ніколи Ich aufstehe. Позначення частоти jeden Tag і час um sechs Uhr спокійно розташовуються посередині, між двома половинами дієслова." }
  - id: diktat-dativ-nachricht
    outcomes: [dativ-artikel]
    type: listen
    focus: dativ-artikel
    instruction: { en: "Listen and type what you hear.", ru: "Прослушайте и напишите, что вы слышите.", uk: "Прослухайте і напишіть те, що ви чуєте." }
    text: "Ich schreibe meinem Chef eine kurze Nachricht."
    translation: { en: "I am writing my boss a short message.", ru: "Я пишу своему начальнику короткое сообщение.", uk: "Я пишу своєму начальникові коротке повідомлення." }
    explain: { en: "schreiben takes two objects: the person in the Dativ, the thing in the Akkusativ. So the boss (der Chef) becomes meinem Chef with -em, and the message (die Nachricht) stays eine kurze Nachricht. The trap is by ear: meinem and meinen differ by one quiet consonant at the end, and it is exactly that consonant which says who receives and what is received.", ru: "Глагол schreiben берёт два дополнения: адресата в Dativ, вещь в Akkusativ. Поэтому начальник (der Chef) превращается в meinem Chef с окончанием -em, а сообщение (die Nachricht) остаётся eine kurze Nachricht. Ловушка именно на слух: meinem и meinen различаются одним тихим согласным на конце — и как раз этот согласный говорит, кто получает, а что получают.", uk: "Дієслово schreiben бере два додатки: адресата в Dativ, річ у Akkusativ. Тому начальник (der Chef) перетворюється на meinem Chef із закінченням -em, а повідомлення (die Nachricht) залишається eine kurze Nachricht. Пастка саме на слух: meinem і meinen різняться одним тихим приголосним на кінці — і якраз цей приголосний каже, хто отримує, а що отримують." }
  # --- Grammatik ---
  - id: luecke-modal-darf-muss
    outcomes: [modal-erlaubnis-notwendigkeit, modal-konjugation]
    type: cloze
    focus: duerfen-muessen
    instruction: { en: "dürfen or müssen? Fill in the correct form.", ru: "dürfen или müssen? Вставьте правильную форму.", uk: "dürfen чи müssen? Вставте правильну форму." }
    text: "Im Museum {{darf}} man nicht fotografieren, und rauchen {{dürfen}} Sie hier auch nicht. Aber keine Sorge: Sie {{müssen}} nichts bezahlen, der Eintritt ist frei."
    translation: { en: "You are not allowed to take photographs in the museum, and you may not smoke here either. But don't worry: you don't have to pay anything, admission is free.", ru: "В музее нельзя фотографировать, и курить здесь тоже нельзя. Но не волнуйтесь: платить ничего не нужно, вход бесплатный.", uk: "У музеї не можна фотографувати, і курити тут теж не можна. Але не хвилюйтеся: платити нічого не треба, вхід безкоштовний." }
    explain: { en: "darf nicht is a prohibition — it is forbidden. muss nicht is the absence of an obligation — nobody is asking you to. The two are worlds apart, and English hides the difference behind the same-looking pair 'must not' / 'don't have to': Sie müssen nichts bezahlen does not forbid paying, it releases you from it. Watch the forms too: man darf (no -t after a modal in the singular), Sie dürfen and Sie müssen (the plural/polite form is the plain infinitive).", ru: "darf nicht — это запрет, «нельзя». muss nicht — это отсутствие обязанности, «не нужно, не обязательно». Разница огромная, и русское «не должен» её как раз затемняет: Sie müssen nichts bezahlen не запрещает платить, а освобождает от оплаты. Следите и за формами: man darf (у модального глагола в единственном числе нет -t), Sie dürfen и Sie müssen (форма вежливого обращения совпадает с инфинитивом).", uk: "darf nicht — це заборона, «не можна». muss nicht — це відсутність обов'язку, «не треба, не обов'язково». Різниця величезна, і українське «не повинен» її якраз затемнює: Sie müssen nichts bezahlen не забороняє платити, а звільняє від оплати. Стежте й за формами: man darf (у модального дієслова в однині немає -t), Sie dürfen і Sie müssen (форма ввічливого звертання збігається з інфінітивом)." }
  - id: luecke-partizip
    outcomes: [perfekt-partizip]
    type: cloze
    focus: partizip2-form
    instruction: { en: "Fill in the Partizip II.", ru: "Вставьте Partizip II.", uk: "Вставте Partizip II." }
    text: "Am Wochenende habe ich viel {{gemacht}}. Ich habe die Wohnung {{geputzt}}, ich habe lange mit meiner Mutter {{telefoniert}} und am Abend bin ich ins Kino {{gegangen}}."
    translation: { en: "I did a lot at the weekend. I cleaned the flat, I talked to my mother on the phone for a long time and in the evening I went to the cinema.", ru: "На выходных я много всего сделал. Я убрал квартиру, долго говорил по телефону с мамой, а вечером сходил в кино.", uk: "На вихідних я багато чого зробив. Я прибрав квартиру, довго говорив по телефону з мамою, а ввечері сходив у кіно." }
    explain: { en: "Four participles, three different patterns. Regular verbs take ge- …-t: machen → gemacht, putzen → geputzt. Verbs in -ieren take no ge- at all: telefonieren → telefoniert — the missing ge- is the whole point, and it is what learners keep adding back. Strong verbs take ge- …-en, often with a new stem vowel: gehen → gegangen. Every one of them lands at the end of the sentence, behind everything else.", ru: "Четыре причастия — три разных модели. Слабые глаголы получают ge- …-t: machen → gemacht, putzen → geputzt. Глаголы на -ieren не получают ge- вовсе: telefonieren → telefoniert — отсутствие ge- и есть главное здесь, и именно его чаще всего возвращают на место по ошибке. Сильные глаголы получают ge- …-en, нередко с новой гласной в корне: gehen → gegangen. И все они встают в самый конец предложения, позади всего остального.", uk: "Чотири дієприкметники — три різні моделі. Слабкі дієслова отримують ge- …-t: machen → gemacht, putzen → geputzt. Дієслова на -ieren не отримують ge- зовсім: telefonieren → telefoniert — відсутність ge- і є головним тут, і саме його найчастіше повертають на місце помилково. Сильні дієслова отримують ge- …-en, нерідко з новою голосною в корені: gehen → gegangen. І всі вони стають у самий кінець речення, позаду всього іншого." }
  - id: luecke-wo-wohin
    outcomes: [wo-wohin-position, wohnung-beschreiben]
    type: cloze
    focus: wo-wohin
    instruction: { en: "Wo? or Wohin? Fill in the article.", ru: "Wo? или Wohin? Вставьте артикль.", uk: "Wo? чи Wohin? Вставте артикль." }
    text: "Wohin stellen wir die Lampe? — Wir stellen sie neben {{das}} Sofa. Und wo steht der Schrank? — Der Schrank steht neben {{dem}} Fenster."
    translation: { en: "Where shall we put the lamp? — We'll put it next to the sofa. And where is the wardrobe? — The wardrobe is next to the window.", ru: "Куда мы поставим лампу? — Поставим её рядом с диваном. А где стоит шкаф? — Шкаф стоит рядом с окном.", uk: "Куди ми поставимо лампу? — Поставимо її поряд із диваном. А де стоїть шафа? — Шафа стоїть поряд із вікном." }
    explain: { en: "neben is a two-way preposition, and the spatial meaning decides its case. Wohin? names the lamp's new relation to the sofa and takes the accusative: neben das Sofa. Wo? names the wardrobe's location and takes the dative: neben dem Fenster. stellen and stehen make that contrast clear here, but movement alone is not the general case test.", ru: "neben — предлог двойного управления, и падеж выбирает пространственный смысл. Wohin? называет новое положение лампы относительно дивана и требует Akkusativ: neben das Sofa. Wo? называет место шкафа и требует Dativ: neben dem Fenster. Здесь контраст ясно показывают stellen и stehen, но само движение не является общим тестом падежа.", uk: "neben — прийменник подвійного керування, і відмінок вибирає просторовий зміст. Wohin? називає нове положення лампи щодо дивана й вимагає Akkusativ: neben das Sofa. Wo? називає місце шафи й вимагає Dativ: neben dem Fenster. Тут контраст чітко показують stellen і stehen, але сам рух не є загальним тестом відмінка." }
  - id: luecke-praeteritum
    outcomes: [praeteritum-war-hatte, lebensstationen-ordnen]
    type: cloze
    focus: praeteritum-sein-haben
    instruction: { en: "Talk about the past: fill in the Präteritum of sein, haben and können.", ru: "Расскажите о прошлом: вставьте Präteritum глаголов sein, haben и können.", uk: "Розкажіть про минуле: вставте Präteritum дієслів sein, haben і können." }
    text: "Vor zehn Jahren {{war}} ich zum ersten Mal in Deutschland. Ich {{hatte}} dort noch keine Wohnung und {{konnte}} fast kein Deutsch."
    translation: { en: "Ten years ago I was in Germany for the first time. I had no flat there yet and could hardly speak any German.", ru: "Десять лет назад я впервые оказался в Германии. Квартиры у меня там ещё не было, и по-немецки я почти не говорил.", uk: "Десять років тому я вперше опинився в Німеччині. Квартири в мене там ще не було, і німецькою я майже не говорив." }
    explain: { en: "This checkpoint tests the neutral productive Präteritum forms of sein, haben and können: war, hatte, konnte. Grammatical Perfekt alternatives exist and vary by region and register, but they are not the target pattern here. vor zehn Jahren locates the situation ten years before now; vor + dative means 'ago'.", ru: "Проверка оценивает нейтральные продуктивные формы Präteritum от sein, haben и können: war, hatte, konnte. Грамматические альтернативы в Perfekt существуют и зависят от региона и регистра, но здесь проверяется не они. vor zehn Jahren помещает ситуацию за десять лет до настоящего; vor + Dativ означает «тому назад».", uk: "Перевірка оцінює нейтральні продуктивні форми Präteritum від sein, haben і können: war, hatte, konnte. Граматичні альтернативи в Perfekt існують і залежать від регіону й регістру, але тут перевіряються не вони. vor zehn Jahren розміщує ситуацію за десять років до теперішнього; vor + Dativ означає «тому»." }
  - id: luecke-imperativ-arzt
    outcomes: [praxis-anweisungen-verstehen, ratschlag-geben]
    type: cloze
    focus: imperativ-form
    instruction: { en: "The doctor is giving you instructions. Fill in the imperative (Sie-form).", ru: "Врач даёт вам указания. Вставьте повелительное наклонение (форма на Sie).", uk: "Лікар дає вам вказівки. Вставте наказовий спосіб (форма на Sie)." }
    text: "{{Nehmen}} Sie die Tabletten dreimal am Tag. {{Trinken}} Sie viel Wasser und {{bleiben}} Sie zwei Tage zu Hause."
    translation: { en: "Take the tablets three times a day. Drink plenty of water and stay at home for two days.", ru: "Принимайте таблетки три раза в день. Пейте много воды и оставайтесь два дня дома.", uk: "Приймайте таблетки тричі на день. Пийте багато води і залишайтеся два дні вдома." }
    explain: { en: "The Sie-imperative is the easiest form in German: take the infinitive, put it first, and keep Sie right behind it — Nehmen Sie …, Trinken Sie …, Bleiben Sie … The pronoun is never dropped, so on paper the instruction looks exactly like a yes/no question — only intonation (in writing, the full stop or question mark) tells them apart: Nehmen Sie die Tabletten. is an instruction, Nehmen Sie die Tabletten? is a question. Every instruction you meet in a surgery, at a counter or on a form is built exactly this way.", ru: "Повелительное наклонение на Sie — самая простая форма в немецком: берёте инфинитив, ставите его на первое место, а Sie идёт сразу за ним — Nehmen Sie …, Trinken Sie …, Bleiben Sie … Местоимение никогда не опускается, поэтому на письме указание выглядит точно как вопрос без вопросительного слова — их различает только интонация (на письме — точка или вопросительный знак): Nehmen Sie die Tabletten. — указание, Nehmen Sie die Tabletten? — вопрос. Все указания, которые вы встретите в поликлинике, у окошка или в анкете, построены ровно так.", uk: "Наказовий спосіб на Sie — найпростіша форма в німецькій: берете інфінітив, ставите його на перше місце, а Sie йде одразу за ним — Nehmen Sie …, Trinken Sie …, Bleiben Sie … Займенник ніколи не опускається, тому на письмі вказівка виглядає точно як питання без питального слова — їх розрізняє лише інтонація (на письмі — крапка або знак питання): Nehmen Sie die Tabletten. — вказівка, Nehmen Sie die Tabletten? — питання. Усі вказівки, які ви зустрінете в поліклініці, біля віконця або в анкеті, побудовані рівно так." }
  - id: mc-weil-verbende
    outcomes: [weil-grund]
    type: mc
    focus: weil-denn
    prompt: "„Warum kommst du nicht mit?“ — Welche Antwort ist richtig?"
    options:
      - "Ich komme nicht mit, weil ich morgen früh arbeiten muss."
      - "Ich komme nicht mit, weil ich muss morgen früh arbeiten."
      - "Ich komme nicht mit, denn ich morgen früh arbeiten muss."
    correct: 0
    translation: { en: "'Why aren't you coming along?' — Which answer is correct?", ru: "«Почему ты не пойдёшь с нами?» — Какой ответ правильный?", uk: "«Чому ти не підеш з нами?» — Яка відповідь правильна?" }
    explain: { en: "weil opens a Nebensatz and sends the conjugated verb to the very end. With two verbs the order is fixed: the infinitive first, the conjugated one right at the wall — weil ich morgen früh arbeiten muss. The second option leaves muss in the middle, which is the collapse this rule exists to prevent. The third option gets the word order of a main clause but puts denn in front of it — and denn never moves a verb, so it needs denn ich muss morgen früh arbeiten.", ru: "weil открывает придаточное и отправляет спрягаемый глагол в самый конец. Если глаголов два, порядок жёсткий: сначала инфинитив, спрягаемый — у самой стены: weil ich morgen früh arbeiten muss. Во втором варианте muss осталось в середине — это и есть та ошибка, ради которой правило существует. В третьем варианте порядок слов как в главном предложении, но перед ним стоит denn — а denn глагол никуда не двигает, и потому нужно denn ich muss morgen früh arbeiten.", uk: "weil відкриває підрядне і відправляє відмінюване дієслово в самий кінець. Якщо дієслів два, порядок жорсткий: спочатку інфінітив, відмінюване — біля самої стіни: weil ich morgen früh arbeiten muss. У другому варіанті muss залишилося в середині — це і є та помилка, заради якої правило існує. У третьому варіанті порядок слів як у головному реченні, але перед ним стоїть denn — а denn дієслово нікуди не рухає, і тому потрібно denn ich muss morgen früh arbeiten." }
  - id: mc-arbeitsanweisung
    outcomes: [arbeitsanweisung-verstehen]
    type: mc
    focus: trennbar-modal
    prompt: "Ihre Chefin sagt: „Sie müssen das Formular heute noch ___.“"
    options: ["ausfüllen", "füllen aus", "ausgefüllt"]
    correct: 0
    translation: { en: "Your boss says: 'You have to fill in the form today.'", ru: "Начальница говорит: «Вы должны сегодня же заполнить этот бланк».", uk: "Начальниця каже: «Ви маєте сьогодні ж заповнити цей бланк»." }
    explain: { en: "A separable verb only comes apart when it is the conjugated verb of the clause. Here müssen already holds position 2, so ausfüllen stays whole and waits at the end as a bare infinitive: Sie müssen das Formular heute noch ausfüllen. füllen aus splits a verb that has no reason to split, and ausgefüllt is a Partizip II — it belongs in the Perfekt (Sie haben das Formular ausgefüllt), never after a modal.", ru: "Отделяемый глагол распадается только тогда, когда он сам является спрягаемым глаголом предложения. Здесь второе место уже занято формой müssen, поэтому ausfüllen остаётся целым и ждёт в конце в виде чистого инфинитива: Sie müssen das Formular heute noch ausfüllen. Вариант füllen aus разделяет глагол, которому делиться незачем, а ausgefüllt — это Partizip II: его место в Perfekt (Sie haben das Formular ausgefüllt), но никак не после модального глагола.", uk: "Відокремлюване дієслово розпадається лише тоді, коли воно саме є відмінюваним дієсловом речення. Тут друге місце вже зайняте формою müssen, тому ausfüllen залишається цілим і чекає в кінці у вигляді чистого інфінітива: Sie müssen das Formular heute noch ausfüllen. Варіант füllen aus розділяє дієслово, якому ділитися нема чого, а ausgefüllt — це Partizip II: його місце в Perfekt (Sie haben das Formular ausgefüllt), але аж ніяк не після модального дієслова." }
  - id: mc-sondern-samstag
    outcomes: [absprachen-aushandeln, einladen-zusagen-absagen]
    type: mc
    focus: aber-sondern
    prompt: "Wir feiern nicht am Freitag, ___ am Samstag."
    options: ["sondern", "aber", "denn"]
    correct: 0
    translation: { en: "We are not celebrating on Friday, but on Saturday.", ru: "Мы празднуем не в пятницу, а в субботу.", uk: "Ми святкуємо не в п'ятницю, а в суботу." }
    explain: { en: "sondern is the word that corrects a negation: something was denied (nicht am Freitag) and sondern names what takes its place (am Samstag). The test is mechanical — is there a nicht or a kein in front of it, and does what follows replace exactly what was denied? Then it is sondern. aber contrasts two things that both stand: Wir feiern am Freitag, aber nur kurz. And denn gives a reason, which is not what this sentence is doing at all.", ru: "sondern — это слово, которое исправляет отрицание: что-то отвергли (nicht am Freitag), и sondern называет то, что встаёт на освободившееся место (am Samstag). Проверка механическая: стоит ли перед ним nicht или kein и заменяет ли следующая часть именно то, что было отвергнуто? Тогда нужно sondern. Союз aber противопоставляет два утверждения, каждое из которых остаётся в силе: Wir feiern am Freitag, aber nur kurz. А denn называет причину — а этого в нашем предложении нет вовсе.", uk: "sondern — це слово, яке виправляє заперечення: щось відкинули (nicht am Freitag), і sondern називає те, що стає на звільнене місце (am Samstag). Перевірка механічна: чи стоїть перед ним nicht або kein і чи замінює наступна частина саме те, що було відкинуте? Тоді потрібне sondern. Сполучник aber протиставляє два твердження, кожне з яких залишається чинним: Wir feiern am Freitag, aber nur kurz. А denn називає причину — а цього в нашому реченні немає зовсім." }
  - id: satz-indirekte-frage
