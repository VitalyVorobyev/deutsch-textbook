    translation: { en: "On the phone: 'Good afternoon, this is Anna Weber. Could you give me an appointment, please?'", ru: "По телефону: «Здравствуйте, это Анна Вебер. Не могли бы вы записать меня на приём?»", uk: "По телефону: «Добрий день, це Анна Вебер. Чи не могли б ви записати мене на прийом?»" }
    explain: { en: "For first contact with an unknown professional, Sie — with a capital S — is the safe neutral default, with the matching form Könnten Sie …? The du/ihr forms fit only after an informal relationship or local du culture has been established. Learn Könnten Sie … as a fixed first-contact chunk.", ru: "При первом контакте с незнакомым специалистом безопасный нейтральный выбор — Sie, с заглавной S, и соответствующая форма Könnten Sie …? Формы du/ihr подходят, только если уже установлены неформальные отношения или местная культура du. Заучите Könnten Sie … как готовый оборот для первого контакта.", uk: "Під час першого контакту з незнайомим фахівцем безпечний нейтральний вибір — Sie, з великої S, і відповідна форма Könnten Sie …? Форми du/ihr підходять лише тоді, коли вже встановлені неформальні стосунки або місцева культура du. Завчіть Könnten Sie … як готовий зворот для першого контакту." }
  - id: uebersetzen-perfekt-italien
    outcomes: [perfekt-vergangenheit-erzaehlen, perfekt-hilfsverb]
    type: translate
    focus: haben-sein
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "Last year I flew to Italy."
    prompt_ru: "В прошлом году я летал в Италию."
    prompt_uk: "Минулого року я літав до Італії."
    answer: "Letztes Jahr bin ich nach Italien geflogen."
    key_tokens: ["bin", "geflogen"]
    accept: ["Ich bin letztes Jahr nach Italien geflogen."]
    explain: { en: "In this directional use, fliegen forms the Perfekt with sein: ich bin … geflogen. Learn common change-of-place verbs such as fahren, gehen, fliegen and kommen with sein in these uses, plus the lexical group bleiben, sein, werden and passieren. This is a productive core, not a claim that every other verb takes haben in every use. The bracket holds: bin is in position 2 and geflogen at the end.", ru: "В этом направленном употреблении fliegen образует Perfekt с sein: ich bin … geflogen. Учите частотные глаголы смены места fahren, gehen, fliegen и kommen с sein в этих употреблениях, а также лексическую группу bleiben, sein, werden и passieren. Это продуктивное ядро, а не утверждение, что любой другой глагол во всех употреблениях берёт haben. Рамка сохраняется: bin на позиции 2, geflogen в конце.", uk: "У цьому напрямленому вживанні fliegen утворює Perfekt із sein: ich bin … geflogen. Учіть частотні дієслова зміни місця fahren, gehen, fliegen і kommen із sein у цих уживаннях, а також лексичну групу bleiben, sein, werden і passieren. Це продуктивне ядро, а не твердження, що будь-яке інше дієслово в усіх уживаннях бере haben. Рамка зберігається: bin на позиції 2, geflogen у кінці." }
  - id: uebersetzen-weil-arbeiten
    outcomes: [weil-grund, arbeitszeit-aushandeln]
    type: translate
    focus: nebensatz-verbende
    revision: 2
    instruction: { en: "Translate into German. Give the reason with weil.", ru: "Переведите на немецкий. Назовите причину с помощью weil.", uk: "Перекладіть німецькою. Назвіть причину за допомогою weil." }
    prompt_en: "I can't come on Friday because I have to work."
    prompt_ru: "В пятницу я не могу прийти, потому что мне нужно работать."
    prompt_uk: "У п'ятницю я не можу прийти, бо мені треба працювати."
    answer: "Ich kann am Freitag nicht kommen, weil ich arbeiten muss."
    key_tokens: ["weil", "muss"]
    accept:
      - "Am Freitag kann ich nicht kommen, weil ich arbeiten muss."
      - "Ich kann nicht am Freitag kommen, weil ich arbeiten muss."
    explain: { en: "Two clauses, two rules. In the main clause the modal kann sits in position 2 and the infinitive kommen waits at the end. In the weil-clause the verbs stack up against the wall in a fixed order: the infinitive arbeiten first, the conjugated muss absolutely last — weil ich arbeiten muss. The classic mistake is to keep the main-clause order after weil (❌ weil ich muss arbeiten): muss is the word that has to land last, and it is the word learners leave in the middle.", ru: "Два предложения — два правила. В главном модальный глагол kann стоит на втором месте, а инфинитив kommen ждёт в конце. В придаточном с weil глаголы выстраиваются у стены в строго определённом порядке: сначала инфинитив arbeiten, спрягаемый muss — самым последним: weil ich arbeiten muss. Классическая ошибка — сохранить после weil порядок главного предложения (❌ weil ich muss arbeiten): приземлиться последним должно именно muss, а его-то и оставляют в середине.", uk: "Два речення — два правила. У головному модальне дієслово kann стоїть на другому місці, а інфінітив kommen чекає в кінці. У підрядному з weil дієслова вишиковуються біля стіни в чітко визначеному порядку: спочатку інфінітив arbeiten, відмінюване muss — найостаннішим: weil ich arbeiten muss. Класична помилка — зберегти після weil порядок головного речення (❌ weil ich muss arbeiten): приземлитися останнім має саме muss, а його ж і залишають у середині." }
  - id: uebersetzen-vergleich-jacke
    outcomes: [produkte-vergleichen, gefallen-passen-sagen]
    type: translate
    focus: komparativ-als
    instruction: { en: "You are in a shop, comparing two jackets. Translate into German.", ru: "Вы в магазине и сравниваете две куртки. Переведите на немецкий.", uk: "Ви в магазині і порівнюєте дві куртки. Перекладіть німецькою." }
    prompt_en: "The blue jacket is more expensive than the grey one."
    prompt_ru: "Синяя куртка дороже серой."
    prompt_uk: "Синя куртка дорожча за сіру."
    answer: "Die blaue Jacke ist teurer als die graue."
    key_tokens: ["teurer", "als"]
    accept:
      - "Die blaue Jacke ist teurer als die graue Jacke."
    explain: { en: "German builds the comparative with an ending, not with a helper word: teuer → teurer, and there is no mehr teuer. What follows the comparison is always als — never wie. (wie belongs to the other comparison, the one that finds two things equal: so teuer wie.) Note the little spelling detail as well: teuer loses its -e- in the comparative, teurer, and the same happens to dunkel → dunkler.", ru: "Немецкий строит сравнительную степень окончанием, а не служебным словом: teuer → teurer, и никакого mehr teuer не бывает. За сравнением всегда следует als — и никогда wie. (wie принадлежит другому сравнению — тому, что приравнивает: so teuer wie.) Обратите внимание и на орфографию: teuer теряет -e- в сравнительной степени и превращается в teurer; так же ведёт себя dunkel → dunkler.", uk: "Німецька будує вищий ступінь закінченням, а не службовим словом: teuer → teurer, і жодного mehr teuer не буває. За порівнянням завжди йде als — і ніколи wie. (wie належить до іншого порівняння — того, що прирівнює: so teuer wie.) Зверніть увагу й на орфографію: teuer втрачає -e- у вищому ступені й перетворюється на teurer; так само поводиться dunkel → dunkler." }
  - id: uebersetzen-amt-anmelden
    outcomes: [anliegen-nennen]
    type: translate
    focus: hoeflich-konjunktiv
    instruction: { en: "You are at the counter of the citizens' office. Say what you have come for — politely.", ru: "Вы у окошка в бюргерамте. Вежливо назовите своё дело.", uk: "Ви біля віконця в бюргерамті. Ввічливо назвіть свою справу." }
    prompt_en: "I would like to register my new address."
    prompt_ru: "Я хотел(а) бы зарегистрировать свой новый адрес."
    prompt_uk: "Я хотів(-ла) би зареєструвати свою нову адресу."
    answer: "Ich würde gern meine neue Adresse anmelden."
    key_tokens: ["würde", "anmelden"]
    accept:
      - "Ich würde gerne meine neue Adresse anmelden."
    explain: { en: "What you are naming is an action, and an action takes würde gern — with the infinitive parked at the very end, exactly like a modal verb: Ich würde gern … anmelden. hätte gern is the other chunk, and it takes a thing: Ich hätte gern eine Bescheinigung is fine, Ich hätte gern anmelden is not a sentence at all. Ich will meine Adresse anmelden says the same thing and says it bluntly — at a counter, the polite chunk is not decoration. gern and gerne are interchangeable.", ru: "Вы называете действие, а действие требует оборота würde gern — с инфинитивом в самом конце, точно как у модального глагола: Ich würde gern … anmelden. Оборот hätte gern — другой, он берёт предмет: Ich hätte gern eine Bescheinigung — нормально, а Ich hätte gern anmelden — вообще не предложение. Фраза Ich will meine Adresse anmelden говорит то же самое, но резко — у окошка вежливый оборот не украшение. Формы gern и gerne равноправны.", uk: "Ви називаєте дію, а дія вимагає звороту würde gern — з інфінітивом у самому кінці, точно як у модального дієслова: Ich würde gern … anmelden. Зворот hätte gern — інший, він бере предмет: Ich hätte gern eine Bescheinigung — нормально, а Ich hätte gern anmelden — узагалі не речення. Фраза Ich will meine Adresse anmelden каже те саме, але різко — біля віконця ввічливий зворот не прикраса. Форми gern і gerne рівноправні." }
  - id: tabelle-da-wo
    outcomes: [da-wort-sache, wo-wort-fragen]
    type: table
    focus: da-wo-woerter
    title: "Da- und Wo-Wörter"
    instruction: { en: "Complete both forms for each preposition.", ru: "Дополните обе формы для каждого предлога.", uk: "Доповніть обидві форми для кожного прийменника." }
    columns: ["Frage", "Sache"]
