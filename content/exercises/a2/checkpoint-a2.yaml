      - { label: "über", cells: [{ answer: "worüber" }, { answer: "darüber" }] }
      - { label: "mit", cells: [{ answer: "womit" }, { answer: "damit" }] }
    explain: { en: "wo(r)- asks about a thing and da(r)- refers back. Insert r before a vowel (auf, über), but not before a consonant (mit).", ru: "wo(r)- спрашивает о предмете, da(r)- отсылает к нему. Перед гласной (auf, über) вставляется r, перед согласной (mit) — нет.", uk: "wo(r)- запитує про предмет, da(r)- відсилає до нього. Перед голосною (auf, über) вставляється r, перед приголосною (mit) — ні." }
  # A different lexical instance from the topic's practice item `translate-person-sache`
  # (sprechen über → darüber / über ihn). A checkpoint that re-presents a practice sentence
  # measures recognition of that sentence, not the competence behind it.
  - id: uebersetzen-sache-person
    outcomes: [person-sache-unterscheiden, da-wort-sache]
    type: translate
    focus: da-wo-woerter
    instruction: { en: "A trip and a man were just mentioned. Translate the reply: first refer to the thing, then to the person.", ru: "Поездку и мужчину только что упомянули. Переведите ответ: сначала сошлитесь на предмет, затем на человека.", uk: "Поїздку і чоловіка щойно згадали. Перекладіть відповідь: спочатку зішліться на предмет, потім на людину." }
    prompt_en: "I often think about it, but I rarely think about him."
    prompt_ru: "Я часто думаю об этом (о поездке), но редко думаю о нём (о человеке)."
    prompt_uk: "Я часто думаю про це (про поїздку), але рідко думаю про нього (про людину)."
    answer: "Ich denke oft daran, aber ich denke selten an ihn."
    # Every rendering here is ordinary German that preserves both graded tokens: dropping the
    # repeated `ich denke` (the more natural of the two), fronting `oft` into the Vorfeld, or
    # both. The item measures the da-word and the person pronoun, not the middle-field order —
    # and a false negative in a *checkpoint* depresses a published level result.
    accept:
      - "Ich denke oft daran, aber selten an ihn."
      - "Oft denke ich daran, aber selten an ihn."
      - "Oft denke ich daran, aber ich denke selten an ihn."
    key_tokens: ["daran", "ihn"]
    explain: { en: "denken selects an. The trip is a thing, so it contracts into daran; the man is a person, so the preposition keeps a pronoun: an ihn.", ru: "denken требует an. Поездка — предмет, поэтому она стягивается в daran; мужчина — человек, поэтому предлог сохраняется с местоимением: an ihn.", uk: "denken вимагає an. Поїздка — предмет, тому вона стягується в daran; чоловік — людина, тому прийменник зберігається із займенником: an ihn." }
  # --- Schreiben ---
  - id: schreiben-krankmeldung
    outcomes: [krankmeldung-schreiben, berufliche-nachricht-schreiben]
    type: write
    prompt: { en: "You are ill and cannot come to work. Write a short message to your boss, Frau Berger.", ru: "Вы заболели и не можете выйти на работу. Напишите короткое сообщение своей начальнице, госпоже Бергер.", uk: "Ви захворіли і не можете вийти на роботу. Напишіть коротке повідомлення своїй начальниці, пані Бергер." }
    goal: { en: "Write four to five sentences: say that you are ill, since when, why you cannot come, and when you will be back in touch.", ru: "Напишите четыре-пять предложений: что вы заболели, с какого дня, почему не можете прийти и когда снова дадите о себе знать.", uk: "Напишіть чотири-п'ять речень: що ви захворіли, з якого дня, чому не можете прийти і коли знову дасте про себе знати." }
    requirements:
      - { en: "Address her formally and stay with Sie throughout — she is your boss, not a friend.", ru: "Обратитесь официально и выдерживайте Sie до конца — это начальница, а не подруга.", uk: "Зверніться офіційно і витримуйте Sie до кінця — це начальниця, а не подруга." }
      - { en: "Say since when you have been ill, with seit + Dativ: seit Montag, seit drei Tagen.", ru: "Скажите, с какого дня вы больны, через seit + Dativ: seit Montag, seit drei Tagen.", uk: "Скажіть, з якого дня ви хворі, через seit + Dativ: seit Montag, seit drei Tagen." }
      - { en: "Give the reason in a weil-clause — the conjugated verb goes to the very end.", ru: "Назовите причину в придаточном с weil — спрягаемый глагол уходит в самый конец.", uk: "Назвіть причину в підрядному з weil — відмінюване дієслово йде в самий кінець." }
      - { en: "Say what happens next: when you will send the sick note, or when you will be in touch again.", ru: "Скажите, что будет дальше: когда вы пришлёте больничный или когда снова свяжетесь.", uk: "Скажіть, що буде далі: коли ви надішлете лікарняний або коли знову зв'яжетеся." }
    min_words: 30
    model_answer: "Guten Morgen, Frau Berger, leider bin ich krank. Ich habe seit Montag Fieber und war heute Morgen beim Arzt. Ich kann diese Woche nicht ins Büro kommen, weil ich noch zwei Tage zu Hause bleiben muss. Die Krankmeldung schicke ich Ihnen heute per E-Mail. Am Donnerstag melde ich mich wieder. Viele Grüße, Anna Weber"
    model_translation: { en: "Good morning, Frau Berger, unfortunately I am ill. I have had a fever since Monday and I went to the doctor this morning. I cannot come to the office this week, because I have to stay at home for another two days. I will send you the sick note by e-mail today. I will be in touch again on Thursday. Kind regards, Anna Weber", ru: "Доброе утро, госпожа Бергер, к сожалению, я заболела. У меня с понедельника температура, и сегодня утром я была у врача. На этой неделе я не смогу прийти в офис, потому что мне нужно побыть дома ещё два дня. Больничный пришлю вам сегодня по электронной почте. В четверг снова дам о себе знать. С уважением, Анна Вебер", uk: "Доброго ранку, пані Бергер, на жаль, я захворіла. У мене з понеділка температура, і сьогодні вранці я була в лікаря. Цього тижня я не зможу прийти в офіс, бо мені треба побути вдома ще два дні. Лікарняний надішлю вам сьогодні електронною поштою. У четвер знову дам про себе знати. З повагою, Анна Вебер" }
    explain: { en: "A sick note to an employer is the most useful thing you can write at A2, and it is built from four moves: the fact (ich bin krank), the time (seit Montag — seit + Dativ, and the illness is still going on), the reason (weil ich zu Hause bleiben muss, verb at the end), and what happens next (die Krankmeldung schicke ich Ihnen heute). Keep Sie and Ihnen capitalized throughout — that capital letter is the register, and it is the first thing a German reader notices.", ru: "Сообщение о болезни начальнику — самое полезное, что вы можете написать на уровне A2, и складывается оно из четырёх шагов: факт (ich bin krank), время (seit Montag — seit + Dativ, и болезнь продолжается), причина (weil ich zu Hause bleiben muss, глагол в конце) и что будет дальше (die Krankmeldung schicke ich Ihnen heute). Пишите Sie и Ihnen с заглавной буквы от начала до конца — эта заглавная буква и есть регистр, и немецкий читатель замечает её первой.", uk: "Повідомлення про хворобу начальникові — найкорисніше, що ви можете написати на рівні A2, і складається воно з чотирьох кроків: факт (ich bin krank), час (seit Montag — seit + Dativ, і хвороба триває), причина (weil ich zu Hause bleiben muss, дієслово в кінці) і що буде далі (die Krankmeldung schicke ich Ihnen heute). Пишіть Sie і Ihnen з великої літери від початку до кінця — ця велика літера і є регістр, і німецький читач помічає її першою." }
