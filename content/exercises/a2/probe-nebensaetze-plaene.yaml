topic: nebensaetze-plaene
role: probe
title:
  en: "Probe — the verb at the end of the Nebensatz"
  ru: "Проверка — глагол в конце придаточного"

# Three PARALLEL variants of ONE competence: the COLLAPSED BRACKET. A Nebensatz with
# two verbs — a modal plus an infinitive, or an auxiliary plus a Partizip II — puts the
# conjugated one LAST, behind the other: weil sie ihre Tochter abholen muss, dass er den
# Zug verpasst hat. That is the hardest thing this unit teaches and the one the article
# calls its headline rule, because it inverts the main-clause bracket the learner has
# just spent two units automating (muss … abholen → abholen muss).
#
# The single-verb case (weil sie keine Zeit hat) is deliberately NOT what is probed:
# it is the easy end of the same rule, it is what all three variants used to ask, and a
# learner can pass it while still writing weil ich muss arbeiten. One variant is drawn
# per due interval (2, 7, 21 days), so the two-verb cluster is measured three times, in
# three situations the learner has not seen — new people, new lexis, one conjunction each.
#
# Deliberately excluded from this family: the fronted Nebensatz (nebensatz-vorfeld) and
# the weil/denn discrimination. They are different competences and would make the three
# delays incomparable; practice is where their evidence comes from.
#
# key_tokens pins ONLY the conjugated verb that the rule drives to the wall — never the
# infinitive or the participle in front of it. Those are lexis, and the tag does not
# grade them: a learner who writes `verpasst` as `verpassen` has made a different mistake
# and must not be logged as a failure of nebensatz-verbende. `accept` is deliberately
# generous, because a probe that marks correct German wrong corrupts the retention curve.

items:
  - id: variant-a
    outcomes: [weil-grund]
    type: translate
    focus: nebensatz-verbende
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Lena is not coming to the cinema today, because she has to pick up her daughter."
    prompt_ru: "Лена сегодня не пойдёт в кино, потому что ей нужно забрать дочь."
    answer: "Lena kommt heute nicht ins Kino, weil sie ihre Tochter abholen muss."
    accept:
      - "Lena geht heute nicht ins Kino, weil sie ihre Tochter abholen muss."
      - "Heute kommt Lena nicht ins Kino, weil sie ihre Tochter abholen muss."
      - "Heute geht Lena nicht ins Kino, weil sie ihre Tochter abholen muss."
    key_tokens: ["muss"]
    explain:
      en: "Two verbs, and only one of them is conjugated: muss. weil opens a Nebensatz, and a Nebensatz ends with its conjugated verb — so muss is the last word of all, and the infinitive abholen queues up in front of it: … weil sie ihre Tochter abholen muss. As a main clause the very same words come out back to front: Sie muss ihre Tochter abholen. That is the whole difficulty here — the conjunction turns the bracket inside out. Note also that abholen keeps its prefix: a separable verb has no position 2 to leave behind in a Nebensatz."
      ru: "Глагола два, но спрягается только один — muss. weil вводит придаточное, а придаточное заканчивается спрягаемым глаголом: значит, muss стоит самым последним, а инфинитив abholen выстраивается перед ним — … weil sie ihre Tochter abholen muss. В главном предложении те же самые слова идут в обратном порядке: Sie muss ihre Tochter abholen. В этом и вся трудность: союз выворачивает рамку наизнанку. Обратите внимание и на abholen — приставка остаётся на месте: в придаточном нет второго места, которое она могла бы покинуть."

  - id: variant-b
    outcomes: [weil-grund]
    type: translate
    focus: nebensatz-verbende
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Mr Bauer says that he has missed the train."
    prompt_ru: "Господин Бауэр говорит, что опоздал на поезд."
    answer: "Herr Bauer sagt, dass er den Zug verpasst hat."
    accept:
      - "Herr Bauer sagt, dass er seinen Zug verpasst hat."
    key_tokens: ["hat"]
    explain:
      en: "In the Perfekt the conjugated verb is the auxiliary — hat — and the participle verpasst is not conjugated at all. dass opens a Nebensatz, so it is the conjugated word that goes to the wall: dass er den Zug verpasst hat. Standing alone the clause would read Er hat den Zug verpasst, with hat in position 2 and the participle at the end; the conjunction swaps the two around. Keep the comma before dass — German never leaves it out."
      ru: "В Perfekt спрягается вспомогательный глагол — hat, — а причастие verpasst не спрягается вовсе. dass вводит придаточное, и к стене уходит именно спрягаемое слово: dass er den Zug verpasst hat. Само по себе это предложение звучало бы Er hat den Zug verpasst — hat на втором месте, причастие в конце; союз меняет их местами. И не теряйте запятую перед dass: в немецком она обязательна."

  - id: variant-c
    outcomes: [weil-grund]
    type: translate
    focus: nebensatz-verbende
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "We'll take a taxi if you have to be at the office at six o'clock."
    prompt_ru: "Мы возьмём такси, если тебе нужно быть в офисе в шесть часов."
    answer: "Wir nehmen ein Taxi, wenn du um sechs Uhr im Büro sein musst."
    accept:
      - "Wir fahren mit dem Taxi, wenn du um sechs Uhr im Büro sein musst."
      - "Wenn du um sechs Uhr im Büro sein musst, nehmen wir ein Taxi."
      - "Wenn du um sechs Uhr im Büro sein musst, fahren wir mit dem Taxi."
    key_tokens: ["musst"]
    explain:
      en: "wenn is the third conjunction of the set and it behaves exactly like the other two: the conjugated verb closes the clause. The conjugated verb is the modal musst, so the infinitive sein stands in front of it — … wenn du um sechs Uhr im Büro sein musst. Everything else, um sechs Uhr and im Büro, simply lines up inside the clause and changes nothing: only the verb has a fixed address. And note the tense — German uses the plain present inside a wenn-clause even when the sentence is about tomorrow."
      ru: "wenn — третий союз из этой тройки, и ведёт он себя точно так же, как два других: спрягаемый глагол закрывает придаточное. Спрягаемый здесь — модальный musst, поэтому инфинитив sein стоит перед ним: … wenn du um sechs Uhr im Büro sein musst. Всё остальное — um sechs Uhr, im Büro — просто выстраивается внутри придаточного и ни на что не влияет: фиксированный адрес есть только у глагола. Обратите внимание и на время: внутри придаточного с wenn немецкий ставит обычное настоящее, даже если речь о завтрашнем дне."
