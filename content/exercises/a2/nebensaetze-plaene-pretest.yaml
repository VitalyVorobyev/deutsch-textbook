topic: nebensaetze-plaene
role: pretest
title:
  en: "Pretest — where does the verb go?"
  ru: "Предтест — где стоит глагол?"
  uk: "Передтест — де стоїть дієслово?"
items:
  - id: pretest-weil-modal
    outcomes: [weil-grund]
    type: cloze
    focus: nebensatz-verbende
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Ich komme nicht mit, weil ich am Sonntag {{arbeiten muss}}. (arbeiten, müssen)"
    translation:
      en: "I am not coming along, because I have to work on Sunday."
      ru: "Я не поеду с вами, потому что в воскресенье мне нужно работать."
      uk: "Я не поїду з вами, бо в неділю мені треба працювати."
    explain:
      en: "weil opens a Nebensatz, and a Nebensatz ends with its conjugated verb. The conjugated verb here is the modal muss, so muss is the last word and the infinitive arbeiten stands in front of it. In a main clause it is the other way round: Ich muss am Sonntag arbeiten."
      ru: "weil вводит придаточное, а придаточное заканчивается спрягаемым глаголом. Спрягаемый здесь — модальный muss, поэтому muss стоит последним, а инфинитив arbeiten — перед ним. В главном предложении всё наоборот: Ich muss am Sonntag arbeiten."
      uk: "weil вводить підрядне, а підрядне закінчується відмінюваним дієсловом. Відмінюване тут — модальне muss, тому muss стоїть останнім, а інфінітив arbeiten — перед ним. У головному реченні все навпаки: Ich muss am Sonntag arbeiten."

  - id: pretest-weil-denn
    outcomes: [weil-grund]
    type: mc
    focus: weil-denn
    instruction:
      en: "Guess which continuation is correct German."
      ru: "Угадайте, какое продолжение — правильный немецкий."
      uk: "Вгадайте, яке продовження — правильна німецька."
    prompt: "Ich bleibe heute zu Hause, ___"
    options:
      - "denn ich bin krank."
      - "denn ich krank bin."
      - "weil ich bin krank."
    correct: 0
    translation:
      en: "I am staying at home today, because I am ill."
      ru: "Сегодня я остаюсь дома, потому что я болен."
      uk: "Сьогодні я залишаюся вдома, бо я хворий."
    explain:
      en: "Both denn and weil can give this reason, but their syntax differs. denn joins two main clauses, so the verb stays in position 2: denn ich bin krank. weil subordinates the reason: weil ich krank bin. The wrong options give each conjunction the other's word order."
      ru: "И denn, и weil могут назвать эту причину, но синтаксис у них разный. denn соединяет два главных предложения, поэтому глагол остаётся на втором месте: denn ich bin krank. weil подчиняет причину: weil ich krank bin. В неверных вариантах каждый союз получил порядок слов другого."
      uk: "І denn, і weil можуть назвати цю причину, але їхній синтаксис різний. denn поєднує два головні речення, тому дієслово лишається на другому місці: denn ich bin krank. weil підпорядковує причину: weil ich krank bin. У неправильних варіантах кожен сполучник отримав порядок слів іншого."

  - id: pretest-vorfeld
    outcomes: [nebensatz-vorfeld-stellung]
    type: mc
    focus: nebensatz-vorfeld
    instruction:
      en: "Guess what follows the comma."
      ru: "Угадайте, что идёт после запятой."
      uk: "Вгадайте, що йде після коми."
    prompt: "Wenn es regnet, ___"
    options:
      - "gehen wir ins Museum."
      - "wir gehen ins Museum."
      - "wir ins Museum gehen."
    correct: 0
    translation:
      en: "If it rains, we will go to the museum."
      ru: "Если пойдёт дождь, мы пойдём в музей."
      uk: "Якщо піде дощ, ми підемо в музей."
    explain:
      en: "The whole wenn-clause counts as position 1 of the sentence, so the conjugated verb of the main clause has to take position 2 — the first slot after the comma — and the subject follows it: gehen wir. It is the same inversion as in Am Sonntag gehen wir ins Museum."
      ru: "Всё придаточное с wenn считается первым местом предложения, поэтому спрягаемый глагол главного обязан занять второе — первый слот после запятой, — а подлежащее идёт за ним: gehen wir. Это та же инверсия, что и в Am Sonntag gehen wir ins Museum."
      uk: "Усе підрядне з wenn вважається першим місцем речення, тому відмінюване дієслово головного зобов'язане зайняти друге — перший слот після коми, — а підмет іде за ним: gehen wir. Це та сама інверсія, що й в Am Sonntag gehen wir ins Museum."
