topic: verben-mit-praepositionen
role: probe
title: { en: "Delayed check — ask about a thing and refer back to it", ru: "Отложенная проверка — спросить о предмете и сослаться на него" }
# One competence, three parallel variants: build the wo-question and the da-reference for a
# thing, with the linking r where the preposition takes a vowel. Every person and every object
# below is new to this topic — none appears in a practice item, a reading sentence or a vocab
# example — so a due variant measures the rule, not memory of a task already performed.
items:
  - id: probe-paket
    type: translate
    outcomes: [wo-wort-fragen, da-wort-sache]
    focus: da-wo-woerter
    instruction: { en: "Translate the exchange.", ru: "Переведите диалог." }
    prompt_en: "What is Nina waiting for? — For the parcel. She has been waiting for it since Monday."
    prompt_ru: "Чего ждёт Нина? — Посылку. Она ждёт её с понедельника."
    answer: "Worauf wartet Nina? — Auf das Paket. Sie wartet seit Montag darauf."
    key_tokens: ["Worauf", "darauf"]
    explain: { en: "warten selects auf, and auf begins with a vowel: the question fuses to worauf and the thing-reference to darauf.", ru: "warten требует auf, а auf начинается с гласной: вопрос сращивается в worauf, а отсылка к предмету — в darauf." }
  - id: probe-musik
    type: translate
    outcomes: [wo-wort-fragen, da-wort-sache]
    focus: da-wo-woerter
    instruction: { en: "Translate the exchange.", ru: "Переведите диалог." }
    prompt_en: "What is Paul interested in? — In music. He has been interested in it for years."
    prompt_ru: "Чем интересуется Пауль? — Музыкой. Он интересуется ею уже много лет."
    answer: "Wofür interessiert sich Paul? — Für Musik. Er interessiert sich seit Jahren dafür."
    key_tokens: ["Wofür", "dafür"]
    explain: { en: "sich interessieren selects für, and für begins with a consonant: no linking r, so wofür and dafür.", ru: "sich interessieren требует für, а für начинается с согласной: связующей r нет — wofür и dafür." }
  - id: probe-haus-am-meer
    type: translate
    outcomes: [wo-wort-fragen, da-wort-sache]
    focus: da-wo-woerter
    instruction: { en: "Translate the exchange.", ru: "Переведите диалог." }
    prompt_en: "What does Frau Weber dream of? — Of a house by the sea. She dreams of it every night."
    prompt_ru: "О чём мечтает госпожа Вебер? — О доме у моря. Она мечтает об этом каждую ночь."
    answer: "Wovon träumt Frau Weber? — Von einem Haus am Meer. Sie träumt jede Nacht davon."
    key_tokens: ["Wovon", "davon"]
    explain: { en: "träumen selects von + Dativ. von begins with a consonant, so the forms are wovon and davon — not worüber/darüber, however natural 'about' sounds.", ru: "träumen требует von + Dativ. von начинается с согласной, поэтому формы — wovon и davon, а не worüber/darüber, как подсказывало бы русское «о чём»." }
