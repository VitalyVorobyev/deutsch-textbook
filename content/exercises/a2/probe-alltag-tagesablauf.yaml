topic: alltag-tagesablauf
role: probe
title:
  en: "Probe — everyday life and daily routine"
  ru: "Проверка — повседневная жизнь и распорядок дня"

# Three PARALLEL variants of ONE competence: choosing the time preposition —
# um + clock time, am + day or part of day, im + month or season, and in der Nacht.
# It is the only thing this topic owns outright (the separable verbs belong to
# trennbare-verben and the verb-second rule to praesens-wortstellung), and nothing
# else the topic teaches is needed as often: you cannot say when you do anything
# without it.

items:
  - id: variant-a
    outcomes: [alltag-zeitpraepositionen]
    type: translate
    focus: um-am-zeit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "On Thursday I do sport at six o'clock."
    prompt_ru: "В четверг я в шесть часов занимаюсь спортом."
    answer: "Am Donnerstag mache ich um sechs Uhr Sport."
    key_tokens: ["Am", "um"]
    accept:
      - "Ich mache am Donnerstag um sechs Uhr Sport."
    explain:
      en: "The kind of time chooses the preposition, not the meaning: am for a day (am Donnerstag), um for a clock time (um sechs Uhr). Both stand in one sentence here, which is exactly where they get swapped. Do not let English 'in the morning' pull you towards im either — a part of the day is still am: am Morgen."
      ru: "Предлог выбирается по типу времени, а не по смыслу: am — с днём недели (am Donnerstag), um — с точным временем (um sechs Uhr). Здесь они стоят в одном предложении, и именно тут их чаще всего путают: по-русски и там и там просто «в», так что подсказки от родного языка ждать не приходится."

  - id: variant-b
    outcomes: [alltag-zeitpraepositionen]
    type: translate
    focus: um-am-zeit
    instruction:
      en: Translate into German. Begin each sentence with the time expression.
      ru: Переведите на немецкий. Начните каждое предложение с обстоятельства времени.
    prompt_en: "In the evening I cook at seven o'clock. At night it is very quiet here."
    prompt_ru: "Вечером я готовлю в семь часов. Ночью здесь очень тихо."
    answer: "Am Abend koche ich um sieben Uhr. In der Nacht ist es hier sehr ruhig."
    key_tokens: ["Am", "um", "In"]
    explain:
      en: "A part of the day counts as a day, not as a period you are inside: am Abend, am Morgen, am Nachmittag — the same am as am Montag, and never the im that English 'in the evening' invites. The clock keeps its own preposition next to it (um sieben Uhr). And the night is the one exception in the system: in der Nacht, memorized as a chunk, because am Nacht does not exist."
      ru: "Часть суток считается за день, а не за отрезок, внутри которого вы находитесь: am Abend, am Morgen, am Nachmittag — тот же am, что и в am Montag. Русское «вечером» никакого предлога не подсказывает, поэтому форму приходится помнить. Точное время рядом сохраняет свой предлог: um sieben Uhr. А ночь — единственное исключение системы: in der Nacht, запоминается целиком, потому что ❌ am Nacht не существует."

  - id: variant-c
    outcomes: [alltag-zeitpraepositionen]
    type: translate
    focus: um-am-zeit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "In winter it is already dark at five o'clock."
    prompt_ru: "Зимой в пять часов уже темно."
    answer: "Im Winter ist es um fünf Uhr schon dunkel."
    key_tokens: ["Im", "um"]
    accept:
      - "Im Winter ist es schon um fünf Uhr dunkel."
    explain:
      en: "A season takes im, like a month: im Winter, im Januar. The clock time next to it still takes um — the two prepositions do not agree with each other, each one follows its own kind of time."
      ru: "Время года требует im — так же, как месяц: im Winter, im Januar. Стоящее рядом точное время всё равно требует um: предлоги не «согласуются» друг с другом, каждый следует своему типу времени."
