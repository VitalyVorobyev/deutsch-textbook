topic: reisen-verkehr
role: practice
title:
  en: "Practice — the train is cancelled: listening, writing, speaking"
  ru: "Практика — поезд отменён: аудирование, письмо, речь"
  uk: "Практика — потяг скасовано: аудіювання, письмо, мовлення"
items:
  - id: hoeren-durchsage-schalter
    outcomes: [durchsage-verstehen]
    type: audio-comprehension
    instruction:
      en: "The story goes on where the Lesetext stopped: Timo has reached Bremen and is waiting for the connection to Hamburg. Listen to the announcement and to the conductor."
      ru: "История продолжается там, где закончился Lesetext: Тимо доехал до Бремена и ждёт пересадку на Гамбург. Послушайте объявление и проводника."
      uk: "Історія продовжується там, де закінчився Lesetext: Тімо доїхав до Бремена й чекає на пересадку на Гамбург. Послухайте оголошення та провідника."
    source:
      kind: tts
      rate: 0.9
      turns:
        - { speaker: "Durchsage", text: "Achtung, bitte. Der Zug nach Hamburg fährt heute nicht von Gleis drei." }
        - { speaker: "Timo", text: "Entschuldigung, ich habe die Durchsage nicht verstanden. Fährt mein Zug nach Hamburg nicht von Gleis drei?" }
        - { speaker: "Schaffner", text: "Nein, heute nicht. Er fährt um zwölf Uhr fünf von Gleis neun ab." }
        - { speaker: "Timo", text: "Und wann bin ich in Hamburg?" }
        - { speaker: "Schaffner", text: "Um vierzehn Uhr zwanzig. Sie kommen mit einer Stunde Verspätung an." }
    question: "Von welchem Gleis fährt der Zug nach Hamburg ab?"
    options:
      - "Von Gleis drei."
      - "Von Gleis neun."
      - "Von Gleis zwölf."
    correct: 1
    translation:
      en: "Which platform does the train to Hamburg leave from?"
      ru: "С какого пути отправляется поезд на Гамбург?"
      uk: "З якої колії відправляється потяг на Гамбург?"
    explain:
      en: "Three numbers are spoken and only one of them is a platform. Gleis drei is the one you hear first, and you hear it twice — and it is precisely the platform the train does not leave from today: „…fährt heute nicht von Gleis drei.“ zwölf belongs to the clock, not to the track: „um zwölf Uhr fünf“. The platform is the last number in the sentence: „Er fährt um zwölf Uhr fünf von Gleis neun ab.“ In a station the loudest, most repeated number is often the wrong one — the sentence has to be followed to its end, and there is no second look."
      ru: "В записи звучат три числа, и только одно из них — номер пути. Gleis drei слышно первым и слышно дважды — и именно с этого пути поезд сегодня не идёт: „…fährt heute nicht von Gleis drei.“ zwölf относится к часам, а не к пути: „um zwölf Uhr fünf“. Номер пути — последнее число в предложении: „Er fährt um zwölf Uhr fünf von Gleis neun ab.“ На вокзале самое громкое и чаще всего повторённое число обычно оказывается не тем: предложение надо дослушать до конца, а перечитать его нельзя."
      uk: "У записі звучать три числа, і лише одне з них — номер колії. Gleis drei чути першим і чути двічі — і саме з цієї колії потяг сьогодні не йде: „…fährt heute nicht von Gleis drei.“ zwölf стосується годинника, а не колії: „um zwölf Uhr fünf“. Номер колії — останнє число в реченні: „Er fährt um zwölf Uhr fünf von Gleis neun ab.“ На вокзалі найгучніше й найчастіше повторене число зазвичай виявляється не тим: речення треба дослухати до кінця, а перечитати його не можна."

  - id: cloze-hilfsverb-gemischt
    outcomes: [reise-berichten]
    type: cloze
    focus: haben-sein
    instruction:
      en: "Timo tells the whole story. Fill each gap with haben or sein in the correct form."
      ru: "Тимо рассказывает всю историю. Вставьте в пропуски haben или sein в правильной форме."
      uk: "Тімо розповідає всю історію. Вставте в пропуски haben або sein у правильній формі."
    text: "Zuerst {{habe}} ich eine Fahrkarte gekauft. Dann {{bin}} ich in Köln eingestiegen. In Hannover {{ist}} mein Zug ausgefallen. Am Ende {{bin}} ich mit einer Stunde Verspätung in Hamburg angekommen."
    translation:
      en: "First I bought a ticket. Then I got on the train in Cologne. In Hanover my train was cancelled. In the end I arrived in Hamburg an hour late."
      ru: "Сначала я купил билет. Потом сел в поезд в Кёльне. В Ганновере мой поезд отменили. В итоге я приехал в Гамбург с опозданием на час."
      uk: "Спочатку я купив квиток. Потім сів у потяг у Кельні. У Ганновері мій потяг скасували. Урешті я приїхав до Гамбурга із запізненням на годину."
    explain:
      en: "Learn the auxiliaries with the verb frames used here: etwas kaufen → hat gekauft; in einen Zug einsteigen → ist eingestiegen; ein Zug fällt aus → ist ausgefallen; in einer Stadt ankommen → ist angekommen. Change of place is a useful cue for einsteigen and ankommen, but it is not a universal auxiliary rule. Watch the subject too: mein Zug requires ist, not bin."
      ru: "Учите вспомогательные глаголы вместе с моделями: etwas kaufen → hat gekauft; in einen Zug einsteigen → ist eingestiegen; ein Zug fällt aus → ist ausgefallen; in einer Stadt ankommen → ist angekommen. Смена места помогает запомнить einsteigen и ankommen, но не является универсальным правилом выбора. Следите и за подлежащим: mein Zug требует ist, а не bin."
      uk: "Учіть допоміжні дієслова разом із моделями: etwas kaufen → hat gekauft; in einen Zug einsteigen → ist eingestiegen; ein Zug fällt aus → ist ausgefallen; in einer Stadt ankommen → ist angekommen. Зміна місця допомагає запам'ятати einsteigen й ankommen, але не є універсальним правилом вибору. Стежте й за підметом: mein Zug вимагає ist, а не bin."

  - id: uebersetzen-nach-der-durchsage
    outcomes: [reise-problem-loesen]
    type: translate
    focus: dativ-praepositionen
    instruction:
      en: "Translate into German."
      ru: "Переведите на немецкий."
      uk: "Перекладіть німецькою."
    prompt_en: "After the announcement I went to the counter."
    prompt_ru: "После объявления я пошёл к кассе."
    prompt_uk: "Після оголошення я пішов до каси."
    answer: "Nach der Durchsage bin ich zum Schalter gegangen."
    key_tokens: ["der", "zum"]
    accept:
      - "Ich bin nach der Durchsage zum Schalter gegangen."
    explain:
      en: "Two dative prepositions: nach der Durchsage and zum Schalter (zu dem → zum). In this change-of-place use, gehen forms the Perfekt with sein: bin gegangen, with the participle at the end."
      ru: "Два предлога с Dativ: nach der Durchsage и zum Schalter (zu dem → zum). В этом употреблении со сменой места gehen образует Perfekt с sein: bin gegangen, а причастие стоит в конце."
      uk: "Два прийменники з Dativ: nach der Durchsage і zum Schalter (zu dem → zum). У цьому вживанні зі зміною місця gehen утворює Perfekt із sein: bin gegangen, а дієприкметник стоїть у кінці."

  - id: uebersetzen-ausgefallen-verpasst
    outcomes: [reise-berichten]
    type: translate
    focus: haben-sein
    instruction:
      en: "Translate into German. Both halves need an auxiliary — and they are not the same one."
      ru: "Переведите на немецкий. В обеих частях нужен вспомогательный глагол — и он разный."
      uk: "Перекладіть німецькою. В обох частинах потрібне допоміжне дієслово — і воно різне."
    prompt_en: "My train was cancelled and I missed the connection."
    prompt_ru: "Мой поезд отменили, и я не успел на пересадку."
    prompt_uk: "Мій потяг скасували, і я не встиг на пересадку."
    answer: "Mein Zug ist ausgefallen und ich habe den Anschluss verpasst."
    key_tokens: ["ist", "ausgefallen", "habe", "verpasst"]
    explain:
      en: "One sentence, both auxiliaries. ausfallen belongs with bleiben and passieren — things that happen by themselves — and takes sein: mein Zug ist ausgefallen. verpassen is an ordinary transitive verb and takes haben: ich habe den Anschluss verpasst. Both participles close their half of the sentence, and neither of them has a ge-: ausgefallen keeps it inside (aus-ge-fallen), verpasst has none at all."
      ru: "Одно предложение — оба вспомогательных глагола. ausfallen стоит в одном ряду с bleiben и passieren (то, что происходит само) и требует sein: mein Zug ist ausgefallen. А verpassen — обычный переходный глагол, он требует haben: ich habe den Anschluss verpasst. Оба причастия замыкают свою половину предложения, и приставки ge- впереди нет ни у одного: у ausgefallen она внутри (aus-ge-fallen), у verpasst её нет вовсе."
      uk: "Одне речення — обидва допоміжні дієслова. ausfallen стоїть в одному ряду з bleiben і passieren (те, що відбувається саме) і вимагає sein: mein Zug ist ausgefallen. А verpassen — звичайне перехідне дієслово, воно вимагає haben: ich habe den Anschluss verpasst. Обидва дієприкметники замикають свою половину речення, і префікса ge- попереду немає в жодного: в ausgefallen він усередині (aus-ge-fallen), у verpasst його немає зовсім."

  - id: schreiben-ankunft-nachricht
    revision: 2
    outcomes: [reise-berichten]
    type: write
    prompt:
      en: "You are Timo. You are sitting in the connecting train to Hamburg. Write a message to your sister Katrin, who is waiting for you at the station."
      ru: "Вы — Тимо. Вы сидите в поезде с пересадкой на Гамбург. Напишите сообщение сестре Катрин, которая ждёт вас на вокзале."
      uk: "Ви — Тімо. Ви сидите в потязі з пересадкою на Гамбург. Напишіть повідомлення сестрі Катрін, яка чекає на вас на вокзалі."
    goal:
      en: "Tell her what happened on the way and when you will arrive."
      ru: "Расскажите ей, что случилось в дороге, и когда вы приедете."
      uk: "Розкажіть їй, що сталося в дорозі, і коли ви приїдете."
    requirements:
      - en: "Say how you got to the station — use mit + Dativ and zu + Dativ (mit dem Bus, zum Bahnhof)."
        ru: "Скажите, как вы добрались до вокзала, — с mit + Dativ и zu + Dativ (mit dem Bus, zum Bahnhof)."
        uk: "Скажіть, як ви дісталися до вокзалу, — з mit + Dativ і zu + Dativ (mit dem Bus, zum Bahnhof)."
      - en: "Report the cancellation in the Perfekt: Mein Zug ist ausgefallen."
        ru: "Сообщите об отмене в перфекте: Mein Zug ist ausgefallen."
        uk: "Повідомте про скасування в перфекті: Mein Zug ist ausgefallen."
      - en: "Use at least three of zuerst, dann, danach, am Ende — and keep the verb in position 2 after them."
        ru: "Используйте минимум три слова из zuerst, dann, danach, am Ende — и оставьте глагол на втором месте после них."
        uk: "Використайте щонайменше три слова із zuerst, dann, danach, am Ende — і залиште дієслово на другому місці після них."
      - en: "Say when you arrive and how big the delay is (Verspätung)."
        ru: "Скажите, когда вы приедете и насколько большое опоздание (Verspätung)."
        uk: "Скажіть, коли ви приїдете й наскільки велике запізнення (Verspätung)."
    min_words: 35
    model_answer: "Hallo Katrin! Zuerst bin ich mit dem Bus zum Hauptbahnhof gefahren. Dann bin ich in Köln eingestiegen. In Hannover ist mein Zug leider ausgefallen. Danach bin ich zum Schalter gegangen. Eine Frau hat mir geholfen. Jetzt fahre ich über Bremen. Am Ende komme ich mit einer Stunde Verspätung in Hamburg an. Ich bin um vierzehn Uhr zwanzig da. Bis bald!"
    model_translation:
      en: "Hi Katrin! First I took the bus to the main station. Then I got on the train in Cologne. In Hanover my train was unfortunately cancelled. After that I went to the counter. A woman helped me. Now I am travelling via Bremen. In the end I will arrive in Hamburg an hour late. I will be there at twenty past two. See you soon!"
      ru: "Привет, Катрин! Сначала я поехал на автобусе на главный вокзал. Потом сел в поезд в Кёльне. В Ганновере мой поезд, к сожалению, отменили. После этого я пошёл к кассе. Мне помогла сотрудница. Сейчас я еду через Бремен. В итоге приеду в Гамбург с опозданием на час. Буду там в четырнадцать двадцать. До скорого!"
      uk: "Привіт, Катрін! Спочатку я поїхав автобусом на головний вокзал. Потім сів у потяг у Кельні. У Ганновері мій потяг, на жаль, скасували. Після цього я пішов до каси. Мені допомогла працівниця. Зараз я їду через Бремен. Урешті приїду до Гамбурга із запізненням на годину. Буду там о чотирнадцятій двадцять. До скорого!"
    explain:
      en: "A journey report runs on connectors and learned verb frames. A fronted connector fills position 1, so the conjugated verb stays second: Zuerst bin ich …, Danach bin ich …. In this model the relevant Perfekt forms are bin gefahren, bin eingestiegen, ist ausgefallen, bin gegangen and hat geholfen. Change of place is a useful cue for several of them, but the reliable habit is to learn the auxiliary with each verb and use. Read your draft once for the connectors and once for the auxiliaries."
      ru: "Рассказ о поездке держится на связках и выученных глагольных моделях. Связка в начале занимает позицию 1, поэтому спрягаемый глагол остаётся вторым: Zuerst bin ich …, Danach bin ich …. В образце нужны формы bin gefahren, bin eingestiegen, ist ausgefallen, bin gegangen и hat geholfen. Смена места помогает запомнить несколько из них, но надёжнее учить вспомогательный глагол вместе с каждым глаголом и его употреблением. Перечитайте черновик один раз ради связок и один раз ради вспомогательных глаголов."
      uk: "Розповідь про поїздку тримається на зв'язках і вивчених дієслівних моделях. Зв'язка на початку займає позицію 1, тому відмінюване дієслово залишається другим: Zuerst bin ich …, Danach bin ich …. У зразку потрібні форми bin gefahren, bin eingestiegen, ist ausgefallen, bin gegangen і hat geholfen. Зміна місця допомагає запам'ятати кілька з них, але надійніше вчити допоміжне дієслово разом із кожним дієсловом та його вживанням. Перечитайте чернетку один раз заради зв'язок і один раз заради допоміжних дієслів."

  - id: sprechen-am-schalter
    outcomes: [reise-problem-loesen]
    type: speak
    mode: spoken-interaction
    prompt:
      en: "You are Timo at the counter in Hanover. Frau Hoffmann asks: „Guten Tag, kann ich Ihnen helfen?“ Answer her aloud."
      ru: "Вы — Тимо у кассы в Ганновере. Фрау Хоффманн спрашивает: «Guten Tag, kann ich Ihnen helfen?» Ответьте ей вслух."
      uk: "Ви — Тімо біля каси в Ганновері. Фрау Гоффманн запитує: «Guten Tag, kann ich Ihnen helfen?» Відповідайте їй уголос."
    goal:
      en: "Explain the problem, ask for a new connection, and find out where you have to change and from which platform the train leaves."
      ru: "Объясните проблему, попросите новую пересадку и выясните, где нужно пересаживаться и с какого пути отправляется поезд."
      uk: "Поясніть проблему, попросіть нову пересадку та з'ясуйте, де потрібно пересідати і з якої колії відправляється потяг."
    checklist:
      - en: "I said what happened, in the Perfekt: Mein Zug ist ausgefallen."
        ru: "Я сказал(а), что случилось, в перфекте: Mein Zug ist ausgefallen."
        uk: "Я сказав (сказала), що сталося, в перфекті: Mein Zug ist ausgefallen."
      - en: "I asked for help with Sie, not du: Können Sie mir helfen?"
        ru: "Я попросил(а) о помощи на Sie, а не на du: Können Sie mir helfen?"
        uk: "Я попросив (попросила) про допомогу на Sie, а не на du: Können Sie mir helfen?"
      - en: "I asked where I have to change: Wo muss ich umsteigen?"
        ru: "Я спросил(а), где нужно делать пересадку: Wo muss ich umsteigen?"
        uk: "Я запитав (запитала), де потрібно робити пересадку: Wo muss ich umsteigen?"
      - en: "I asked about the platform or the departure time (Gleis, abfahren)."
        ru: "Я спросил(а) про путь или время отправления (Gleis, abfahren)."
        uk: "Я запитав (запитала) про колію або час відправлення (Gleis, abfahren)."
    model_answer: "Guten Tag! Mein Zug nach Hamburg ist ausgefallen. Können Sie mir helfen? Wo muss ich jetzt umsteigen? Und von welchem Gleis fährt der Zug ab?"
    model_translation:
      en: "Hello! My train to Hamburg has been cancelled. Can you help me? Where do I have to change now? And which platform does the train leave from?"
      ru: "Здравствуйте! Мой поезд на Гамбург отменили. Вы можете мне помочь? Где мне теперь делать пересадку? И с какого пути отправляется поезд?"
      uk: "Добрий день! Мій потяг на Гамбург скасували. Чи можете ви мені допомогти? Де мені тепер робити пересадку? І з якої колії відправляється потяг?"
    explain:
      en: "Three moves make this turn work: name the problem (Mein Zug ist ausgefallen — sein, because ausfallen belongs with passieren), ask for help (Können Sie mir helfen? — Sie with a stranger, and the dative mir after helfen), then ask the two questions that actually get you moving: where to change and from which platform. Say it a second time and listen for the Sie forms — under pressure the du forms slip out first."
      ru: "Эта реплика работает за счёт трёх шагов: назвать проблему (Mein Zug ist ausgefallen — sein, потому что ausfallen стоит в одном ряду с passieren), попросить о помощи (Können Sie mir helfen? — с незнакомым человеком только Sie, а после helfen — Dativ mir) и задать два вопроса, которые действительно сдвинут вас с места: где пересадка и с какого пути. Проговорите ответ второй раз и вслушайтесь в формы Sie — в стрессовой ситуации первыми вырываются формы на du."
      uk: "Ця репліка працює завдяки трьом крокам: назвати проблему (Mein Zug ist ausgefallen — sein, бо ausfallen стоїть в одному ряду з passieren), попросити про допомогу (Können Sie mir helfen? — з незнайомою людиною тільки Sie, а після helfen — Dativ mir) і поставити два питання, які справді зрушать вас із місця: де пересадка і з якої колії. Проговоріть відповідь удруге і вслухайтеся у форми Sie — у стресовій ситуації першими вириваються форми на du."

  - id: sprechen-reise-berichten
    revision: 2
    outcomes: [reise-berichten]
    type: speak
    mode: spoken-production
    prompt:
      en: "You have arrived. Katrin asks: „Und, wie war die Fahrt?“ Tell her about the journey aloud — from the bus at home to the arrival in Hamburg."
      ru: "Вы приехали. Катрин спрашивает: «Und, wie war die Fahrt?» Расскажите ей о поездке вслух — от автобуса у дома до прибытия в Гамбург."
      uk: "Ви приїхали. Катрін запитує: «Und, wie war die Fahrt?» Розкажіть їй про поїздку вголос — від автобуса біля дому до прибуття в Гамбург."
    goal:
      en: "Report the four stages of the journey in order and say how late you were."
      ru: "Расскажите о четырёх этапах поездки по порядку и скажите, насколько вы опоздали."
      uk: "Розкажіть про чотири етапи поїздки по порядку та скажіть, наскільки ви запізнилися."
    checklist:
      - en: "I ordered the story with zuerst, dann, danach and am Ende."
        ru: "Я выстроил(а) рассказ через zuerst, dann, danach и am Ende."
        uk: "Я вибудував (вибудувала) розповідь через zuerst, dann, danach і am Ende."
      - en: "After each connector the conjugated verb came second: Zuerst bin ich …"
        ru: "После каждой связки спрягаемый глагол стоял на втором месте: Zuerst bin ich …"
        uk: "Після кожної зв'язки відмінюване дієслово стояло на другому місці: Zuerst bin ich …"
      - en: "I used the learned Perfekt frames correctly: bin gefahren, bin umgestiegen, bin angekommen."
        ru: "Я правильно использовал(а) выученные модели Perfekt: bin gefahren, bin umgestiegen, bin angekommen."
        uk: "Я правильно використав (використала) вивчені моделі Perfekt: bin gefahren, bin umgestiegen, bin angekommen."
      - en: "I said how big the delay was: mit einer Stunde Verspätung."
        ru: "Я сказал(а), насколько велико было опоздание: mit einer Stunde Verspätung."
        uk: "Я сказав (сказала), наскільки великим було запізнення: mit einer Stunde Verspätung."
    model_answer: "Zuerst bin ich mit dem Bus zum Bahnhof gefahren. Dann bin ich in Köln eingestiegen. In Hannover ist mein Zug ausgefallen. Danach bin ich über Bremen gefahren. Am Ende bin ich mit einer Stunde Verspätung in Hamburg angekommen."
    model_translation:
      en: "First I took the bus to the station. Then I got on the train in Cologne. In Hanover my train was cancelled. After that I travelled via Bremen. In the end I arrived in Hamburg an hour late."
      ru: "Сначала я поехал на автобусе на вокзал. Потом сел в поезд в Кёльне. В Ганновере мой поезд отменили. После этого я поехал через Бремен. В итоге я приехал в Гамбург с опозданием на час."
      uk: "Спочатку я поїхав автобусом на вокзал. Потім сів у потяг у Кельні. У Ганновері мій потяг скасували. Після цього я поїхав через Бремен. Урешті я приїхав до Гамбурга із запізненням на годину."
    explain:
      en: "The five sentences repeatedly retrieve the learned frames ist gefahren, ist eingestiegen, ist ausgefallen and ist angekommen. Their shared auxiliary makes the story useful practice, but it is a property of these verbs and uses—not a rule for every action involving motion. Say the story twice; the second time, listen only to the conjugated verb after zuerst, dann, danach and am Ende."
      ru: "В пяти предложениях несколько раз извлекаются из памяти модели ist gefahren, ist eingestiegen, ist ausgefallen и ist angekommen. Общий вспомогательный глагол делает рассказ полезной тренировкой, но это свойство данных глаголов и употреблений, а не правило для любого действия с движением. Проговорите рассказ дважды; во второй раз слушайте только спрягаемый глагол после zuerst, dann, danach и am Ende."
      uk: "У п'яти реченнях кілька разів відтворюються з пам'яті моделі ist gefahren, ist eingestiegen, ist ausgefallen та ist angekommen. Спільне допоміжне дієслово робить розповідь корисним тренуванням, але це властивість цих дієслів і вживань, а не правило для будь-якої дії з рухом. Проговоріть розповідь двічі; удруге слухайте лише відмінюване дієслово після zuerst, dann, danach та am Ende."
