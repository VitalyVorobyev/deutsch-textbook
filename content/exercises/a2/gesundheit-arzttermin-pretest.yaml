topic: gesundheit-arzttermin
role: pretest
title:
  en: "Pretest — what hurts, since when, and what to do"
  ru: "Предтест — что болит, с каких пор и что делать"
  uk: "Передтест — що болить, відколи і що робити"
items:
  - id: pretest-mir-tut-weh
    outcomes: [beschwerden-beschreiben]
    type: cloze
    focus: dativ-pronomen
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Ich fühle mich nicht gut. {{Mir}} tut der Kopf weh."
    translation:
      en: "I don't feel well. My head hurts."
      ru: "Мне нехорошо. У меня болит голова."
      uk: "Мені недобре. У мене болить голова."
    explain:
      en: "In this sentence the head is the subject — der Kopf — and the verb tut agrees with it. The person the pain happens to is in the dative: mir. Ich would need a second subject, and mich is the accusative, which this construction never takes."
      ru: "Подлежащее в этом предложении — голова, der Kopf, и глагол tut согласуется именно с ней. Человек, у которого болит, стоит в Dativ: mir. Форма Ich потребовала бы второго подлежащего, а mich — это Akkusativ, который в такой конструкции невозможен."
      uk: "Підмет у цьому реченні — голова, der Kopf, і дієслово tut узгоджується саме з нею. Людина, у якої болить, стоїть у Dativ: mir. Форма Ich потребувала б другого підмета, а mich — це Akkusativ, який у такій конструкції неможливий."

  - id: pretest-seit-vor
    outcomes: [beschwerden-beschreiben]
    type: mc
    focus: seit-vor-zeit
    instruction:
      en: "You are still ill today. Guess the preposition."
      ru: "Вы больны и сегодня. Угадайте предлог."
      uk: "Ви хворі й сьогодні. Вгадайте прийменник."
    prompt: "Ich bin ___ drei Tagen krank."
    options: ["vor", "seit", "in"]
    correct: 1
    translation:
      en: "I have been ill for three days."
      ru: "Я болею уже три дня."
      uk: "Я хворію вже три дні."
    explain:
      en: "The illness began three days ago and continues now, so this duration uses seit + Dativ. vor drei Tagen would locate an event three days before now, for example Vor drei Tagen bin ich krank geworden; it does not by itself say whether the consequences are over. in drei Tagen points three days into the future."
      ru: "Болезнь началась три дня назад и продолжается, поэтому длительность выражается через seit + Dativ. vor drei Tagen помещало бы событие за три дня до настоящего, например Vor drei Tagen bin ich krank geworden; само по себе оно не сообщает, закончились ли последствия. in drei Tagen означает «через три дня»."
      uk: "Хвороба почалася три дні тому й триває, тому тривалість виражається через seit + Dativ. vor drei Tagen розміщувало б подію за три дні до теперішнього, наприклад Vor drei Tagen bin ich krank geworden; саме по собі воно не повідомляє, чи завершилися наслідки. in drei Tagen означає «через три дні»."

  - id: pretest-imperativ-sie
    outcomes: [ratschlag-geben]
    type: mc
    focus: imperativ-form
    instruction:
      en: "The doctor is speaking to a new patient. Guess the form."
      ru: "Врач обращается к новому пациенту. Угадайте форму."
      uk: "Лікар звертається до нового пацієнта. Вгадайте форму."
    prompt: "Der Arzt sagt: „___ Sie viel Wasser!“"
    options: ["Trinken", "Trink", "Trinkt"]
    correct: 0
    translation:
      en: "The doctor says: 'Drink a lot of water!'"
      ru: "Врач говорит: «Пейте много воды!»"
      uk: "Лікар каже: «Пийте багато води!»"
    explain:
      en: "The pronoun Sie is already in the sentence, and only one imperative keeps its pronoun: the polite one, built from the infinitive — Trinken Sie! Trink is the du-form and Trinkt the ihr-form, and neither of them is ever followed by Sie."
      ru: "Местоимение Sie уже стоит в предложении, а сохраняет местоимение только один императив — вежливый, образованный от инфинитива: Trinken Sie! Форма Trink — это du, Trinkt — это ihr, и после них Sie не ставится никогда."
      uk: "Займенник Sie вже стоїть у реченні, а зберігає займенник лише один імператив — ввічливий, утворений від інфінітива: Trinken Sie! Форма Trink — це du, Trinkt — це ihr, і після них Sie не ставиться ніколи."
