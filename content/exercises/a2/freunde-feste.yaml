topic: freunde-feste
role: practice
title:
  en: "Practice — who brings whom what"
  ru: "Практика — кто, кому и что приносит"
  uk: "Практика — хто, кому і що приносить"
items:
  - id: table-dativ-pronomen-wem
    revision: 2
    outcomes: [absprachen-aushandeln]
    type: table
    focus: dativ-pronomen
    title: "Wem bringe ich etwas mit?"
    instruction:
      en: "Fill in the dative form of each pronoun — the form that answers the question Wem?"
      ru: "Впишите форму Dativ каждого местоимения — ту, что отвечает на вопрос Wem?"
      uk: "Впишіть форму Dativ кожного займенника — ту, що відповідає на питання Wem?"
    columns: ["Wem? (Dativ)"]
    rows:
      - label: ich
        cells: [{ answer: mir, given: true }]
      - label: du
        cells: [{ answer: dir }]
      - label: er
        cells: [{ answer: ihm }]
      - label: es
        cells: [{ answer: ihm }]
      - label: sie (Anna)
        cells: [{ answer: ihr }]
      - label: wir
        cells: [{ answer: uns }]
      - label: ihr
        cells: [{ answer: euch }]
      - label: sie (Plural)
        cells: [{ answer: ihnen }]
      - label: Sie (höflich)
        cells: [{ answer: Ihnen }]
    explain:
      en: "These nine rows cover the complete personal-pronoun paradigm used in this lesson. er and es share ihm; plural sie has ihnen, while polite Sie has the same sound but is capitalised: Ihnen. ihr is the dative of singular sie (Anna) and also looks like nominative plural 'you', so the row label and sentence role matter. uns and euch look identical to their accusative forms; the other rows visibly distinguish the cases."
      ru: "Эти девять строк дают полную парадигму личных местоимений, нужную в уроке. er и es имеют общую форму ihm; множественное sie даёт ihnen, а вежливое Sie звучит так же, но пишется с прописной: Ihnen. ihr — Dativ от sie в единственном числе (Anna) и одновременно форма Nominativ «вы» во множественном, поэтому важны подпись и роль в предложении. uns и euch совпадают с Akkusativ; в остальных строках падежи различаются формой."
      uk: "Ці дев'ять рядків дають повну парадигму особових займенників, потрібну в уроці. er та es мають спільну форму ihm; множинне sie дає ihnen, а ввічливе Sie звучить так само, але пишеться з великої: Ihnen. ihr — Dativ від sie в однині (Anna) і водночас форма Nominativ «ви» у множині, тому важливі підпис і роль у реченні. uns та euch збігаються з Akkusativ; в інших рядках відмінки розрізняються формою."

  - id: cloze-chat-wer-bringt-wem
    outcomes: [absprachen-aushandeln, einladen-zusagen-absagen]
    type: cloze
    focus: dativ-pronomen
    instruction:
      en: "The group chat before Anna's birthday. Fill in the dative pronoun."
      ru: "Групповой чат перед днём рождения Анны. Вставьте местоимение в Dativ."
      uk: "Груповий чат перед днем народження Анни. Вставте займенник у Dativ."
    text: "Anna feiert am Samstag. Yusuf schreibt: „Ich schenke {{ihr}} ein Buch.“ Anna fragt Nina: „Bringst du {{mir}} bitte einen Salat mit?“ Nina antwortet: „Klar, ich bringe {{dir}} einen Salat mit. Und Yusuf bringt {{uns}} die Getränke mit.“"
    translation:
      en: "Anna is celebrating on Saturday. Yusuf writes: “I'm giving her a book.” Anna asks Nina: “Could you bring me a salad?” Nina replies: “Sure, I'll bring you a salad. And Yusuf is bringing us the drinks.”"
      ru: "В субботу Анна празднует. Юсуф пишет: «Я подарю ей книгу». Анна спрашивает Нину: «Принесёшь мне, пожалуйста, салат?» Нина отвечает: «Конечно, я принесу тебе салат. А Юсуф принесёт нам напитки»."
      uk: "У суботу Анна святкує. Юсуф пише: «Я подарую їй книгу». Анна запитує Ніну: «Принесеш мені, будь ласка, салат?» Ніна відповідає: «Звісно, я принесу тобі салат. А Юсуф принесе нам напої»."
    explain:
      en: "In these schenken/mitbringen constructions every gap is the recipient, and these verbs assign that role the dative. Read who is speaking to whom and the form follows. Yusuf is talking about Anna, so she is ihr—not sie, which would make Anna the accusative thing being brought or given. Anna asks for herself: mir. Nina answers Anna: dir. uns covers the group. The accompanying things occupy the accusative role: ein Buch, einen Salat, die Getränke. Learn this as the frame of these verbs, not as a rule that people are always dative and things always accusative."
      ru: "В этих конструкциях с schenken/mitbringen каждый пропуск обозначает получателя, а эти глаголы ставят получателя в Dativ. Определите, кто с кем говорит: Юсуф говорит об Анне — ihr, а sie сделало бы Анну предметом в Akkusativ; Анна просит для себя — mir; Нина отвечает Анне — dir; uns охватывает группу. Передаваемые вещи занимают роль Akkusativ: ein Buch, einen Salat, die Getränke. Учите это как модель данных глаголов, а не как общее правило «люди — Dativ, вещи — Akkusativ»."
      uk: "У цих конструкціях із schenken/mitbringen кожен пропуск позначає отримувача, а ці дієслова ставлять отримувача в Dativ. Визначте, хто з ким говорить: Юсуф говорить про Анну — ihr, а sie зробило б Анну предметом в Akkusativ; Анна просить для себе — mir; Ніна відповідає Анні — dir; uns охоплює групу. Передавані речі займають роль Akkusativ: ein Buch, einen Salat, die Getränke. Учіть це як модель цих дієслів, а не як загальне правило «люди — Dativ, речі — Akkusativ»."

  - id: cloze-zwei-nomen-artikel
    outcomes: [absprachen-aushandeln]
    type: cloze
    focus: wechsel-akk-dat
    instruction:
      en: "Two nouns in one sentence — only the article shows which is the person and which is the thing. Fill in the articles."
      ru: "Два существительных в одном предложении — различает их только артикль. Вставьте артикли."
      uk: "Два іменники в одному реченні — розрізняє їх лише артикль. Вставте артиклі."
    text: "Yusuf schenkt {{seiner}} Schwester {{ein}} Buch. Wir kaufen {{dem}} Gastgeber {{eine}} Torte. Anna zeigt {{dem}} Gast {{die}} Wohnung."
    translation:
      en: "Yusuf is giving his sister a book. We are buying the host a cake. Anna is showing the guest the flat."
      ru: "Юсуф дарит сестре книгу. Мы покупаем хозяину праздника торт. Анна показывает гостю квартиру."
      uk: "Юсуф дарує сестрі книгу. Ми купуємо господареві свята торт. Анна показує гостеві квартиру."
    explain:
      en: "For schenken, kaufen and zeigen in these two-object frames, ask Wem? for the recipient (seiner Schwester, dem Gastgeber, dem Gast) and Was? for the transferred or shown thing (ein Buch, eine Torte, die Wohnung). These verb frames assign dative and accusative respectively. Only masculine accusative changes the article visibly, and none of the three things here is masculine, so the forms themselves do not reveal their role."
      ru: "В этих моделях с двумя дополнениями у schenken, kaufen и zeigen задайте Wem? к получателю (seiner Schwester, dem Gastgeber, dem Gast) и Was? к передаваемой или показываемой вещи (ein Buch, eine Torte, die Wohnung). Данные глагольные модели назначают им Dativ и Akkusativ соответственно. Заметно меняется только артикль мужского Akkusativ, а ни одна из трёх вещей здесь не мужского рода, поэтому сама форма роли не выдаёт."
      uk: "У цих моделях із двома додатками для schenken, kaufen і zeigen поставте Wem? до отримувача (seiner Schwester, dem Gastgeber, dem Gast) і Was? до передаваної або показуваної речі (ein Buch, eine Torte, die Wohnung). Ці дієслівні моделі призначають їм Dativ і Akkusativ відповідно. Помітно змінюється лише артикль чоловічого Akkusativ, а жодна з трьох речей тут не чоловічого роду, тому сама форма ролі не показує."

  - id: mc-reihenfolge-person-sache
    outcomes: [absprachen-aushandeln]
    type: mc
    focus: wechsel-akk-dat
    instruction:
      en: "You are answering the group chat. Which sentence is correct?"
      ru: "Вы отвечаете в групповом чате. Какое предложение построено правильно?"
      uk: "Ви відповідаєте в груповому чаті. Яке речення побудоване правильно?"
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Ich bringe einen Kuchen dir mit."
      - "Ich bringe dir einen Kuchen mit."
      - "Ich bringe dich einen Kuchen mit."
    correct: 1
    translation:
      en: "I'll bring you a cake."
      ru: "Я принесу тебе торт."
      uk: "Я принесу тобі торт."
    explain:
      en: "The middle option is the neutral A2 order: an unstressed pronoun normally precedes the noun object, so dir comes before einen Kuchen. The third option also has the wrong case: in the mitbringen frame the recipient is dative (dir), while the thing brought is accusative (einen Kuchen). This is the verb's valency, not a ban on two phrases sharing a case in German generally. In this short neutral clause, separable mit occupies the closing bracket."
      ru: "Средний вариант даёт нейтральный порядок A2: безударное местоимение обычно стоит перед дополнением-существительным, поэтому dir идёт перед einen Kuchen. В третьем варианте неверен и падеж: в модели mitbringen получатель стоит в Dativ (dir), а переносимая вещь — в Akkusativ (einen Kuchen). Это управление данного глагола, а не общий запрет двум группам иметь одинаковый падеж. В этом коротком нейтральном предложении отделяемое mit замыкает рамку."
      uk: "Середній варіант дає нейтральний порядок A2: ненаголошений займенник зазвичай стоїть перед додатком-іменником, тому dir іде перед einen Kuchen. У третьому варіанті неправильний і відмінок: у моделі mitbringen отримувач стоїть у Dativ (dir), а переношувана річ — в Akkusativ (einen Kuchen). Це керування цього дієслова, а не загальна заборона двом групам мати однаковий відмінок. У цьому короткому нейтральному реченні відокремлюване mit замикає рамку."

  - id: mc-modal-mitbringen
    outcomes: [absprachen-aushandeln]
    type: mc
    focus: trennbar-modal
    instruction:
      en: "The same offer, but with a modal verb. Which sentence is correct?"
      ru: "То же предложение, но с модальным глаголом. Какое построено правильно?"
      uk: "Те саме речення, але з модальним дієсловом. Яке побудоване правильно?"
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Ich möchte dir einen Kuchen mitbringen."
      - "Ich möchte dir einen Kuchen bringe mit."
      - "Ich möchte dir bringe einen Kuchen mit."
    correct: 0
    translation:
      en: "I'd like to bring you a cake."
      ru: "Я хотел бы принести тебе торт."
      uk: "Я хотів би принести тобі торт."
    explain:
      en: "A separable verb splits only when it is itself the conjugated verb of the clause — Ich bringe dir einen Kuchen mit. Here the conjugated verb is möchte, and it has taken position 2, so mitbringen is a plain infinitive: it stays in one piece and waits at the very end. Both wrong options conjugate bringe on top of möchte, which gives the clause two finite verbs where German allows exactly one. The objects do not move: dir before einen Kuchen, whatever the verb is doing."
      ru: "Глагол с отделяемой приставкой распадается только тогда, когда сам является спрягаемым сказуемым: Ich bringe dir einen Kuchen mit. Здесь спрягаемое — möchte, оно заняло второе место, а mitbringen остаётся чистым инфинитивом: он не распадается и ждёт в самом конце. Оба неверных варианта спрягают bringe вдобавок к möchte — получается два спрягаемых глагола там, где немецкий допускает ровно один. Дополнения при этом не двигаются: dir перед einen Kuchen, что бы ни делал глагол."
      uk: "Дієслово з відокремлюваним префіксом розпадається лише тоді, коли саме є відмінюваним присудком: Ich bringe dir einen Kuchen mit. Тут відмінюване — möchte, воно зайняло друге місце, а mitbringen залишається чистим інфінітивом: воно не розпадається і чекає в самому кінці. Обидва неправильні варіанти відмінюють bringe додатково до möchte — виходить два відмінювані дієслова там, де німецька допускає рівно одне. Додатки при цьому не рухаються: dir перед einen Kuchen, хоч би що робило дієслово."

  - id: order-absage-weil
    outcomes: [einladen-zusagen-absagen]
    type: order
    focus: nebensatz-verbende
    instruction:
      en: "You have to turn the invitation down. Arrange the words into a correct sentence."
      ru: "Приглашение приходится отклонить. Составьте правильное предложение."
      uk: "Запрошення доводиться відхилити. Складіть правильне речення."
    words: ["Leider", "kann", "ich", "nicht", "kommen,", "weil", "ich", "am", "Samstag", "arbeiten", "muss."]
    translation:
      en: "Unfortunately I can't come, because I have to work on Saturday."
      ru: "К сожалению, я не смогу прийти, потому что в субботу мне нужно работать."
      uk: "На жаль, я не зможу прийти, бо в суботу мені треба працювати."
    explain:
      en: "The sentence has two halves and each obeys a different rule. In the main clause Leider fills position 1, so the modal kann takes position 2 and the subject ich follows it; the infinitive kommen closes that half. In the weil-clause the conjugated verb goes to the very end — and the conjugated verb there is the modal muss, not arbeiten. So arbeiten ends up second-to-last and muss is the final word. That order feels wrong at first because muss carries the meaning, and meaning-bearing words like to come early; in a Nebensatz the finite verb goes last no matter how much it is carrying."
      ru: "В предложении две половины, и каждая подчиняется своему правилу. В главном первое место занято словом Leider, поэтому модальный kann встаёт на второе, а подлежащее ich идёт за ним; инфинитив kommen закрывает эту половину. В придаточном с weil спрягаемый глагол уходит в самый конец — а спрягаемым там оказывается модальный muss, а вовсе не arbeiten. Поэтому arbeiten встаёт предпоследним, а последним словом становится muss. Поначалу такой порядок кажется противоестественным: muss несёт смысл, а смысловые слова хочется поставить раньше. Но в придаточном спрягаемый глагол уходит в конец независимо от того, сколько смысла он несёт."
      uk: "У реченні дві половини, і кожна підпорядковується своєму правилу. У головному перше місце зайняте словом Leider, тому модальне kann стає на друге, а підмет ich іде за ним; інфінітив kommen закриває цю половину. У підрядному з weil відмінюване дієслово йде в самий кінець — а відмінюваним там виявляється модальне muss, а зовсім не arbeiten. Тому arbeiten стає передостаннім, а останнім словом стає muss. Спершу такий порядок здається протиприродним: muss несе зміст, а змістові слова хочеться поставити раніше. Але в підрядному відмінюване дієслово йде в кінець незалежно від того, скільки змісту воно несе."

  - id: cloze-aber-sondern
    outcomes: [einladen-zusagen-absagen]
    type: cloze
    focus: aber-sondern
    instruction:
      en: "Four replies to the invitation. Fill in aber or sondern."
      ru: "Четыре ответа на приглашение. Вставьте aber или sondern."
      uk: "Чотири відповіді на запрошення. Вставте aber або sondern."
    text: "Ich komme gern, {{aber}} ich komme später. Ich bringe keinen Kuchen mit, {{sondern}} einen Salat. Tom kommt nicht, {{aber}} er schickt ein Geschenk. Wir feiern nicht am Freitag, {{sondern}} am Samstag."
    translation:
      en: "I'll gladly come, but I'll come later. I'm not bringing a cake, but a salad. Tom isn't coming, but he is sending a present. We aren't celebrating on Friday, but on Saturday."
      ru: "Я с удовольствием приду, но приду позже. Я принесу не торт, а салат. Том не придёт, но пришлёт подарок. Мы празднуем не в пятницу, а в субботу."
      uk: "Я із задоволенням прийду, але прийду пізніше. Я принесу не торт, а салат. Том не прийде, але надішле подарунок. Ми святкуємо не в п'ятницю, а в суботу."
    explain:
      en: "Look only at the first half of each sentence and ask one question: does the second half replace something the first half denied? In gaps two and four it does — keinen Kuchen is corrected to einen Salat, nicht am Freitag is corrected to am Samstag — and a correction after a negation is always sondern. In gaps one and three nothing is replaced. The third one is the trap: it does contain nicht, so the negation is there, but the present does not take Tom's place — Tom stays absent and the present arrives on top of that. Two things standing side by side, both true: aber. The presence of nicht is not enough; the second half has to be the substitute for what the nicht removed."
      ru: "Смотрите только на первую половину и задавайте один вопрос: заменяет ли вторая половина то, что отрицала первая? Во втором и четвёртом пропусках — да: keinen Kuchen исправляется на einen Salat, nicht am Freitag — на am Samstag, а исправление после отрицания — это всегда sondern. В первом и третьем ничто не заменяется. Третий — ловушка: nicht там есть, отрицание налицо, но подарок не занимает место Тома. Том по-прежнему не придёт, а подарок просто добавляется к этому. Две вещи стоят рядом, и обе верны: aber. Одного лишь nicht недостаточно — нужно, чтобы вторая половина была заменой тому, что этим nicht убрали."
      uk: "Дивіться лише на першу половину і ставте одне питання: чи замінює друга половина те, що заперечувала перша? У другому й четвертому пропусках — так: keinen Kuchen виправляється на einen Salat, nicht am Freitag — на am Samstag, а виправлення після заперечення — це завжди sondern. У першому й третьому ніщо не замінюється. Третій — пастка: nicht там є, заперечення наявне, але подарунок не займає місце Тома. Том, як і раніше, не прийде, а подарунок просто додається до цього. Дві речі стоять поряд, і обидві правдиві: aber. Самого лише nicht недостатньо — потрібно, щоб друга половина була заміною тому, що цим nicht прибрали."

  - id: match-glueckwuensche
    outcomes: [glueckwuensche-formeln]
    type: match
    # Deliberately untagged: these are lexical formulas, not one grammatical confusion.
    # A tag here would file a wrong pairing under a rule the item does not test.
    instruction:
      en: "Five moments, five fixed formulas. Match them."
      ru: "Пять ситуаций, пять готовых формул. Соедините их."
      uk: "П'ять ситуацій, п'ять готових формул. З'єднайте їх."
    pairs:
      - { left: "Deine Freundin hat heute Geburtstag.", right: "Herzlichen Glückwunsch zum Geburtstag!" }
      - { left: "Dein Bruder heiratet am Samstag.", right: "Alles Gute zur Hochzeit!" }
      - { left: "Deine Kollegin hat morgen eine Prüfung.", right: "Viel Glück!" }
      - { left: "Ihr habt alle ein Glas in der Hand.", right: "Prost!" }
      - { left: "Du gehst nach Hause. Die Party geht weiter.", right: "Danke für die Einladung! Feiert schön!" }
    explain:
      en: "None of these is assembled from grammar — they are blocks, and a German speaker reaches for the whole block at once. Two of them share a shape worth noticing: Herzlichen Glückwunsch zum Geburtstag and Alles Gute zur Hochzeit both use zu + Dativ, and the article is what changes. der Geburtstag gives zu dem → zum; die Hochzeit gives zu der → zur. That is the only moving part in the entire list, and it is worth getting right, because für den Geburtstag — the form the preposition für would suggest — is simply not said."
      ru: "Ни одна из этих фраз не собирается из грамматики — это блоки, и немец достаёт блок целиком. У двух формул есть общая структура, на которую стоит обратить внимание: Herzlichen Glückwunsch zum Geburtstag и Alles Gute zur Hochzeit построены на zu + Dativ, а меняется только артикль. der Geburtstag даёт zu dem → zum; die Hochzeit даёт zu der → zur. Это единственная подвижная часть во всём списке, и её стоит запомнить: вариант für den Geburtstag, который напрашивается сам собой, по-немецки просто не говорят."
      uk: "Жодна з цих фраз не збирається з граматики — це блоки, і німець дістає блок цілком. У двох формул є спільна структура, на яку варто звернути увагу: Herzlichen Glückwunsch zum Geburtstag і Alles Gute zur Hochzeit побудовані на zu + Dativ, а змінюється лише артикль. der Geburtstag дає zu dem → zum; die Hochzeit дає zu der → zur. Це єдина рухома частина в усьому списку, і її варто запам'ятати: варіант für den Geburtstag, який напрошується сам собою, німецькою просто не кажуть."

  - id: uebersetzen-kuchen-mitbringen
    revision: 2
    outcomes: [absprachen-aushandeln]
    type: translate
    focus: wechsel-akk-dat
    instruction:
      en: "Translate into German. You are answering Anna in the group chat."
      ru: "Переведите на немецкий. Вы отвечаете Анне в групповом чате."
      uk: "Перекладіть німецькою. Ви відповідаєте Анні в груповому чаті."
    prompt_en: "I'll bring you a cake on Saturday."
    prompt_ru: "В субботу я принесу тебе торт."
    prompt_uk: "У суботу я принесу тобі торт."
    answer: "Ich bringe dir am Samstag einen Kuchen mit."
    # Only `dir` is pinned. The Russian prompt has no article — «торт» is both "a cake" and
    # "the cake" — so `den Kuchen` is a faithful rendering of what the RU learner is shown.
    # Pinning `einen` would score it wrong and log a wechsel-akk-dat error the learner did
    # not make. The dative marking of the person is the decision this tag is about.
    key_tokens: ["dir"]
    # die Torte / eine Torte render the RU/UK prompts' «торт» directly, and bringen without
    # mit- is ordinary German for delivering something to someone — neither is the dative
    # decision this tag grades. Once one -mit-less noun is in, its siblings must be too
    # (Codex, #94): the closure below is both orders × four noun phrases × ±mit.
    accept:
      - "Am Samstag bringe ich dir einen Kuchen mit."
      - "Ich bringe dir einen Kuchen am Samstag mit."
      - "Ich bringe dir am Samstag den Kuchen mit."
      - "Am Samstag bringe ich dir den Kuchen mit."
      - "Ich bringe dir den Kuchen am Samstag mit."
      - "Ich bringe dir am Samstag einen Kuchen."
      - "Am Samstag bringe ich dir einen Kuchen."
      - "Ich bringe dir am Samstag den Kuchen."
      - "Am Samstag bringe ich dir den Kuchen."
      - "Am Samstag bringe ich dir die Torte."
      - "Am Samstag bringe ich dir die Torte mit."
      - "Ich bringe dir am Samstag die Torte."
      - "Ich bringe dir am Samstag die Torte mit."
      - "Am Samstag bringe ich dir eine Torte."
      - "Am Samstag bringe ich dir eine Torte mit."
      - "Ich bringe dir am Samstag eine Torte."
      - "Ich bringe dir am Samstag eine Torte mit."
      - "Ich bringe dir die Torte am Samstag mit."
      - "Ich bringe dir eine Torte am Samstag mit."
      - "Ich bringe dir einen Kuchen am Samstag."
      - "Ich bringe dir den Kuchen am Samstag."
      - "Ich bringe dir die Torte am Samstag."
      - "Ich bringe dir eine Torte am Samstag."
    explain:
      en: "The verb frame assigns two roles: the recipient dir is dative, and the thing einen Kuchen is accusative. The neutral productive order puts the unstressed pronoun before the noun object. You may open with Ich or Am Samstag, and bringe remains in position 2; in this compact clause separable mit closes the bracket. Marked contexts can reorder constituents, but they are not the target of this translation."
      ru: "Модель глагола задаёт две роли: получатель dir стоит в Dativ, а вещь einen Kuchen — в Akkusativ. В нейтральном продуктивном порядке безударное местоимение идёт перед дополнением-существительным. Начать можно с Ich или Am Samstag, а bringe остаётся на позиции 2; в этом компактном предложении отделяемое mit замыкает рамку. Контрастный контекст допускает иной порядок, но здесь он не проверяется."
      uk: "Модель дієслова задає дві ролі: отримувач dir стоїть у Dativ, а річ einen Kuchen — в Akkusativ. У нейтральному продуктивному порядку ненаголошений займенник іде перед додатком-іменником. Почати можна з Ich або Am Samstag, а bringe залишається на позиції 2; у цьому компактному реченні відокремлюване mit замикає рамку. Контрастний контекст допускає інший порядок, але тут він не перевіряється."

  - id: uebersetzen-schenken-schwester
    # Only absprachen-aushandeln: the item builds a two-object sentence and the
    # zum-Geburtstag tail is scenery. Claiming glueckwuensche-formeln here would credit a
    # learner who never produced a congratulation with having produced one.
    outcomes: [absprachen-aushandeln]
    type: translate
    focus: wechsel-akk-dat
    instruction:
      en: "Translate into German. You are telling a friend what Yusuf has planned."
      ru: "Переведите на немецкий. Вы рассказываете подруге, что придумал Юсуф."
      uk: "Перекладіть німецькою. Ви розповідаєте подрузі, що придумав Юсуф."
    prompt_en: "Yusuf is giving his sister a book for her birthday."
    prompt_ru: "Юсуф дарит своей сестре книгу на день рождения."
    prompt_uk: "Юсуф дарує своїй сестрі книгу на день народження."
    answer: "Yusuf schenkt seiner Schwester ein Buch zum Geburtstag."
    # Only `seiner` is pinned. Russian marks no article, so «книгу» is both "a book" and
    # "the book" and `das Buch` is a faithful rendering; pinning `ein` would log a
    # wechsel-akk-dat error for a correct answer. The dative marking of the person is the
    # decision, and it is the one the tag grades.
    key_tokens: ["seiner"]
    accept:
      - "Yusuf schenkt seiner Schwester zum Geburtstag ein Buch."
      - "Zum Geburtstag schenkt Yusuf seiner Schwester ein Buch."
      - "Yusuf schenkt seiner Schwester das Buch zum Geburtstag."
      - "Yusuf schenkt seiner Schwester zum Geburtstag das Buch."
      - "Zum Geburtstag schenkt Yusuf seiner Schwester das Buch."
    explain:
      en: "Here both objects are nouns, so the Dativ comes first and nothing but the article tells the two apart. seiner Schwester is the person — dative. ein Buch is the thing — accusative; das Buch is neuter, so its accusative looks exactly like its nominative and gives you no confirmation at all. That is why the first article has to be right: seine Schwester would say that the sister is what is being given away. And the formula at the end is fixed: zum Geburtstag, never für den Geburtstag."
      ru: "Здесь оба дополнения — существительные, поэтому Dativ идёт первым, а различает их только артикль. seiner Schwester — человек: Dativ. ein Buch — предмет: Akkusativ; das Buch среднего рода, поэтому его Akkusativ выглядит точно так же, как именительный, и никакого подтверждения не даёт. Именно поэтому так важен первый артикль: seine Schwester означало бы, что дарят саму сестру. А формула в конце неизменна: zum Geburtstag, но никогда für den Geburtstag."
      uk: "Тут обидва додатки — іменники, тому Dativ іде першим, а розрізняє їх лише артикль. seiner Schwester — людина: Dativ. ein Buch — предмет: Akkusativ; das Buch середнього роду, тому його Akkusativ виглядає точно так само, як називний, і жодного підтвердження не дає. Саме тому такий важливий перший артикль: seine Schwester означало б, що дарують саму сестру. А формула в кінці незмінна: zum Geburtstag, але ніколи für den Geburtstag."

  - id: uebersetzen-absage-weil
    outcomes: [einladen-zusagen-absagen]
    type: translate
    focus: nebensatz-verbende
    revision: 2
    instruction:
      en: "Translate into German. You have to turn Anna down, and you owe her a reason — give it with weil."
      ru: "Переведите на немецкий. Анне приходится отказать — и причину назвать нужно, с помощью weil."
      uk: "Перекладіть німецькою. Анні доводиться відмовити — і причину назвати треба, за допомогою weil."
    prompt_en: "Unfortunately I can't come, because I have to work on Saturday."
    prompt_ru: "К сожалению, я не смогу прийти, потому что в субботу мне нужно работать."
    prompt_uk: "На жаль, я не зможу прийти, бо в суботу мені треба працювати."
    answer: "Leider kann ich nicht kommen, weil ich am Samstag arbeiten muss."
    key_tokens: ["muss"]
    accept:
      - "Ich kann leider nicht kommen, weil ich am Samstag arbeiten muss."
      - "Weil ich am Samstag arbeiten muss, kann ich leider nicht kommen."
    explain:
      en: "The whole item turns on the last word. weil sends the conjugated verb to the very end of its clause, and in a modal sentence the conjugated verb is the modal — so muss goes last and arbeiten sits in front of it. Writing weil ich am Samstag muss arbeiten leaves the verb where a main clause would have kept it. The main half is ordinary German: Leider takes position 1, kann takes position 2, ich follows the verb, and kommen closes the bracket. The third accepted version puts the whole weil-clause first; then it occupies position 1 on its own and kann has to come straight after the comma."
      ru: "Всё задание держится на последнем слове. weil отправляет спрягаемый глагол в самый конец придаточного, а в предложении с модальным спрягаемым является именно модальный — значит, последним оказывается muss, а arbeiten стоит перед ним. Написать weil ich am Samstag muss arbeiten — значит оставить глагол там, где он стоял бы в главном предложении. Главная половина устроена обычным образом: Leider занимает первое место, kann — второе, ich идёт за глаголом, а kommen закрывает рамку. Третий принятый вариант выносит всё придаточное вперёд: тогда оно само занимает первое место, и kann обязано стоять сразу после запятой."
      uk: "Усе завдання тримається на останньому слові. weil відправляє відмінюване дієслово в самий кінець підрядного, а в реченні з модальним відмінюваним є саме модальне — значить, останнім виявляється muss, а arbeiten стоїть перед ним. Написати weil ich am Samstag muss arbeiten — означає залишити дієслово там, де воно стояло б у головному реченні. Головна половина влаштована звичайним чином: Leider займає перше місце, kann — друге, ich іде за дієсловом, а kommen закриває рамку. Третій прийнятий варіант виносить усе підрядне вперед: тоді воно саме займає перше місце, і kann мусить стояти одразу після коми."
