topic: verben-mit-praepositionen
role: pretest
title: { en: "Pretest — what belongs together?", ru: "Предтест — что с чем сочетается?", uk: "Передтест — що з чим поєднується?" }
items:
  - id: pretest-warten
    outcomes: [verb-praeposition-waehlen]
    type: cloze
    focus: verb-praeposition
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Wir warten {{auf}} Mias Antwort."
    explain: { en: "Learn warten auf as one unit: auf + accusative.", ru: "Учите warten auf как единое целое: auf + Akkusativ.", uk: "Учіть warten auf як єдине ціле: auf + Akkusativ." }
  - id: pretest-worueber
    type: mc
    outcomes: [wo-wort-fragen]
    focus: da-wo-woerter
    prompt: "___ sprecht ihr? — Über den Ausflug."
    options: ["Worüber", "Darüber", "Über ihn"]
    correct: 0
    explain: { en: "A question about a thing uses wo(r)-: worüber?", ru: "Вопрос о предмете строится с wo(r)-: worüber?", uk: "Питання про предмет будується з wo(r)-: worüber?" }
  # Deliberately NOT the practice item `mc-sache-person` with the names swapped: a pretest the
  # practice set then repeats verbatim turns that practice item into a memory test of the pretest.
  # Same competence, different referent — here the thing, not the person, is the answer.
  - id: pretest-person
    type: mc
    outcomes: [person-sache-unterscheiden]
    focus: da-wo-woerter
    prompt: "Tom wartet auf den Bus. Er wartet ___."
    options: ["darauf", "auf ihn", "worauf"]
    correct: 0
    explain: { en: "For neutral reference to the bus as a thing, use the da-word darauf. The productive A2 contrast uses preposition + pronoun for an individual person.", ru: "Для нейтральной отсылки к автобусу как предмету используйте da-слово darauf. Активная модель A2 использует предлог + местоимение для отдельного человека.", uk: "Для нейтрального відсилання до автобуса як предмета використовуйте da-слово darauf. Активна модель A2 використовує прийменник + займенник для окремої людини." }
