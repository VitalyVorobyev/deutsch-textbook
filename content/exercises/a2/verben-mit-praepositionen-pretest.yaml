topic: verben-mit-praepositionen
role: pretest
title: { en: "Pretest — what belongs together?", ru: "Предтест — что с чем сочетается?", uk: "Передтест — що з чим поєднується?" }
items:
  - id: pretest-warten
    type: mc
    outcomes: [verb-praeposition-waehlen]
    focus: verb-praeposition
    prompt: "Wir warten ___ Mias Antwort."
    options: ["auf", "über", "von"]
    correct: 0
    explain: { en: "Learn warten auf as one unit: auf + accusative.", ru: "Учите warten auf как единое целое: auf + Akkusativ.", uk: "Учіть warten auf як єдине ціле: auf + Akkusativ." }
  - id: pretest-worueber
    type: mc
    outcomes: [wo-wort-fragen]
    focus: da-wo-woerter
    prompt: "___ sprecht ihr? — Über den Ausflug."
    options: ["Worüber", "Darüber", "Über ihn"]
    correct: 0
    explain: { en: "A question about a thing uses wo(r)-: worüber?", ru: "Вопрос о предмете строится с wo(r)-: worüber?", uk: "Питання про предмет будується з wo(r)-: worüber?" }
  # Deliberately NOT the practice item `mc-sache-person` with the names swapped: a pretest the
  # practice set then repeats verbatim turns that practice item into a memory test of the pretest.
  # Same competence, different referent — here the thing, not the person, is the answer.
  - id: pretest-person
    type: mc
    outcomes: [person-sache-unterscheiden]
    focus: da-wo-woerter
    prompt: "Tom wartet auf den Bus. Er wartet ___."
    options: ["darauf", "auf ihn", "worauf"]
    correct: 0
    explain: { en: "A bus is a thing, so it contracts into a da-word: darauf. Only a person keeps the preposition and a pronoun.", ru: "Автобус — предмет, поэтому он стягивается в da-слово: darauf. Только для человека предлог сохраняется вместе с местоимением.", uk: "Автобус — предмет, тому він стягується в da-слово: darauf. Лише для людини прийменник зберігається разом із займенником." }
