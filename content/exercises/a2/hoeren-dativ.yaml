topic: dativ
role: practice
title:
  en: "Listening — dictation: hearing the cases"
  ru: "Аудирование — диктант: падежи на слух"
  uk: "Аудіювання — диктант: відмінки на слух"
items:
  - id: hoeren-helfe-mann
    outcomes: [dativ-artikel]
    type: listen
    focus: dativ-artikel
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Ich helfe dem Mann in der Küche."
    translation:
      en: I am helping the man in the kitchen.
      ru: Я помогаю мужчине на кухне.
      uk: Я допомагаю чоловікові на кухні.
    explain:
      en: "helfen takes the dative, so you hear dem Mann, not den Mann — the -m is the case signal to catch. Küche has an Umlaut: ü."
      ru: "helfen требует Dativ, поэтому звучит dem Mann, а не den Mann — конечное -m и есть сигнал падежа. В Küche умлаут: ü."
      uk: "helfen вимагає Dativ, тому звучить dem Mann, а не den Mann — кінцеве -m і є сигналом відмінка. У Küche умлаут: ü."

  - id: hoeren-danke-ihnen
    outcomes: [dativ-pronomen]
    type: listen
    focus: dativ-pronomen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Herr Müller, ich danke Ihnen für alles."
    translation:
      en: Mr Müller, I thank you for everything.
      ru: Господин Мюллер, благодарю Вас за всё.
      uk: Пане Мюллере, дякую Вам за все.
    explain:
      en: "danken takes the dative: Ihnen. The address Herr Müller tells you it is the formal Sie — so Ihnen is capitalized. Müller has an Umlaut: ü."
      ru: "danken требует Dativ: Ihnen. Обращение Herr Müller показывает, что это вежливое Sie, поэтому Ihnen пишется с заглавной буквы. В Müller умлаут: ü."
      uk: "danken вимагає Dativ: Ihnen. Звертання Herr Müller показує, що це ввічливе Sie, тому Ihnen пишеться з великої літери. У Müller умлаут: ü."

  - id: hoeren-suppe-kindern
    outcomes: [dativ-artikel]
    type: listen
    focus: dativ-artikel
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Die Suppe schmeckt den Kindern nicht."
    translation:
      en: The children don't like the soup.
      ru: Детям суп не нравится.
      uk: Дітям суп не смакує.
    explain:
      en: "Dative plural: den Kindern — listen for the extra -n on the noun. schmecken names the taster in the dative."
      ru: "Dativ Plural: den Kindern — на слух ловится дополнительное -n у существительного. При schmecken тот, кому вкусно, стоит в дательном падеже."
      uk: "Dativ Plural: den Kindern — на слух ловиться додаткове -n в іменника. При schmecken той, кому смакує, стоїть у давальному відмінку."

  - id: hoeren-bus-arbeit
    outcomes: [dativ-praepositionen]
    type: listen
    focus: dativ-praepositionen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Sie fährt mit dem Bus zur Arbeit."
    translation:
      en: She takes the bus to work.
      ru: Она едет на работу на автобусе.
      uk: Вона їде на роботу автобусом.
    explain:
      en: "Both prepositions take the dative: mit dem Bus and zur Arbeit (zur = zu der). fährt has an Umlaut: ä."
      ru: "Оба предлога требуют Dativ: mit dem Bus и zur Arbeit (zur = zu der). В fährt умлаут: ä."
      uk: "Обидва прийменники вимагають Dativ: mit dem Bus і zur Arbeit (zur = zu der). У fährt умлаут: ä."

  - id: hoeren-bei-eltern
    outcomes: [dativ-praepositionen]
    type: listen
    focus: dativ-praepositionen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Er wohnt seit einem Jahr bei seinen Eltern."
    translation:
      en: He has been living with his parents for a year.
      ru: Он уже год живёт у родителей.
      uk: Він уже рік живе в батьків.
    explain:
      en: "seit and bei take the dative: seit einem Jahr, bei seinen Eltern — the -m and -n endings are what you must hear and spell."
      ru: "seit и bei требуют Dativ: seit einem Jahr, bei seinen Eltern — окончания -m и -n нужно услышать и записать."
      uk: "seit і bei вимагають Dativ: seit einem Jahr, bei seinen Eltern — закінчення -m і -n треба почути й записати."

  - id: hoeren-film-mir
    outcomes: [dativ-pronomen]
    type: listen
    focus: dativ-pronomen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Der Film gefällt mir sehr gut."
    translation:
      en: I like the film a lot.
      ru: Фильм мне очень нравится.
      uk: Фільм мені дуже подобається.
    explain:
      en: "gefallen puts the person in the dative: mir, not mich — the r/ch difference is clearly audible. gefällt has an Umlaut: ä."
      ru: "При gefallen человек стоит в дательном падеже: mir, а не mich — разница хорошо слышна. В gefällt умлаут: ä."
      uk: "При gefallen людина стоїть у давальному відмінку: mir, а не mich — різниця добре чутна. У gefällt умлаут: ä."

  - id: hoeren-rufst-ihn
    outcomes: [dativ-verben]
    type: listen
    focus: akkusativ-pronomen
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Warum rufst du ihn nicht an?"
    translation:
      en: Why don't you call him?
      ru: Почему ты ему не звонишь?
      uk: Чому ти йому не дзвониш?
    explain:
      en: "anrufen takes the accusative: ihn, not ihm. The prefix an lands at the very end of the question."
      ru: "anrufen требует Akkusativ: ihn, а не ihm — хотя по-русски «звонить (кому?) ему». Приставка an стоит в самом конце вопроса."
      uk: "anrufen вимагає Akkusativ: ihn, а не ihm — хоча українською «дзвонити (кому?) йому». Префікс an стоїть у самому кінці питання."

  - id: hoeren-kind-apfel
    outcomes: [dativ-artikel]
    type: listen
    focus: wechsel-akk-dat
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Ich gebe dem Kind einen Apfel."
    translation:
      en: I give the child an apple.
      ru: Я даю ребёнку яблоко.
      uk: Я даю дитині яблуко.
    explain:
      en: "Two objects: the person is dative (dem Kind), the thing accusative (einen Apfel) — listen for the -m and the -en."
      ru: "Два дополнения: человек — Dativ (dem Kind), предмет — Akkusativ (einen Apfel) — ловите на слух окончания -m и -en."
      uk: "Два додатки: людина — Dativ (dem Kind), предмет — Akkusativ (einen Apfel) — ловіть на слух закінчення -m і -en."
