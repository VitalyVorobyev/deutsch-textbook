topic: perfekt-haben-sein
items:
  - id: pre-sein-gefahren
    type: mc
    focus: haben-sein
    prompt: "Wir ___ am Samstag nach Berlin gefahren."
    options: ["haben", "sind", "ist"]
    correct: 1
    translation:
      en: We went to Berlin on Saturday.
      ru: В субботу мы поехали в Берлин.
    explain:
      en: "Verbs of movement from A to B (fahren, gehen, kommen, fliegen) build the Perfekt with sein, and the auxiliary agrees with the subject: wir sind. English uses 'have' for every perfect tense, which makes haben feel like a safe default — it is not."
      ru: "Глаголы движения из точки А в точку Б (fahren, gehen, kommen, fliegen) образуют перфект с sein, причём вспомогательный глагол согласуется с подлежащим: wir sind. В русском прошедшем времени вспомогательного глагола нет вообще, поэтому haben кажется безопасным выбором — но это не так."

  - id: pre-partizip-ende
    type: mc
    focus: perfekt-satzklammer
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Ich habe gegessen gestern eine Pizza."
      - "Ich gestern habe eine Pizza gegessen."
      - "Ich habe gestern eine Pizza gegessen."
    correct: 2
    translation:
      en: Which sentence is correct? (I ate a pizza yesterday.)
      ru: Какое предложение построено правильно? (Вчера я съел пиццу.)
    explain:
      en: "The Perfekt builds die Satzklammer (sentence bracket): haben/sein sits in position 2 and the Partizip II goes to the very end. Everything else — time, objects — stays inside: „Ich habe gestern eine Pizza gegessen.“"
      ru: "Перфект образует die Satzklammer (глагольную рамку): haben/sein стоит на втором месте, а Partizip II уходит в самый конец. Всё остальное — время, дополнения — остаётся внутри рамки: „Ich habe gestern eine Pizza gegessen.“"

  - id: pre-partizip-ieren
    type: mc
    focus: partizip2-form
    prompt: "Wie heißt das Partizip II von „telefonieren“?"
    options: ["getelefoniert", "telefoniert", "telefonieren"]
    correct: 1
    translation:
      en: What is the past participle of "telefonieren" (to phone)?
      ru: Как звучит Partizip II глагола "telefonieren" (звонить по телефону)?
    explain:
      en: "Regular verbs build the Partizip II as ge-…-t (machen → gemacht), but verbs ending in -ieren take no ge-: telefoniert, studiert. So: „Ich habe mit ihr telefoniert.“"
      ru: "Правильные глаголы образуют Partizip II по схеме ge-…-t (machen → gemacht), но глаголы на -ieren обходятся без ge-: telefoniert, studiert. Поэтому: „Ich habe mit ihr telefoniert.“"
