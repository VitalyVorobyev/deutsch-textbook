topic: aemter-dienstleistungen
role: pretest
title:
  en: "Pretest — politeness at the counter"
  ru: "Предтест — вежливость у окошка"
  uk: "Передтест — ввічливість біля віконця"
items:
  - id: pretest-du-sie
    outcomes: [anliegen-nennen]
    type: cloze
    focus: du-sie
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Könnten {{Sie}} mir bitte helfen?"
    translation:
      en: "Could you please help me?"
      ru: "Не могли бы вы мне помочь?"
      uk: "Чи не могли б ви мені допомогти?"
    explain:
      en: "For first contact with an unknown clerk, Sie is the safe neutral default, and the verb form follows the pronoun: Könnten Sie …? is the conventional polite request. du fits only after an informal relationship or local du culture is established — and at a counter you have neither."
      ru: "При первом контакте с незнакомым сотрудником безопасный нейтральный выбор — Sie, и форма глагола следует за местоимением: Könnten Sie …? — обычная вежливая просьба. du подходит, только если уже установлены неформальные отношения или местная культура du, — а у окошка нет ни того, ни другого."
      uk: "Під час першого контакту з незнайомим працівником безпечний нейтральний вибір — Sie, і форма дієслова йде за займенником: Könnten Sie …? — звичне ввічливе прохання. du підходить лише тоді, коли вже встановлені неформальні стосунки або місцева культура du, — а біля віконця немає ні того, ні іншого."

  - id: pretest-haette-wuerde
    outcomes: [anliegen-nennen]
    type: mc
    focus: hoeflich-konjunktiv
    instruction:
      en: "Guess the missing word."
      ru: "Угадайте пропущенное слово."
      uk: "Вгадайте пропущене слово."
    prompt: "Am Schalter: „Ich ___ gern einen Termin vereinbaren.“"
    options:
      - "würde"
      - "hätte"
      - "könnte"
    correct: 0
    translation:
      en: "At the counter: 'I would like to make an appointment.'"
      ru: "У окошка: «Я хотел(а) бы записаться на приём»."
      uk: "Біля віконця: «Я хотів(ла) би записатися на прийом»."
    explain:
      en: "German has two polite ways of saying what you want, and what follows decides between them. An action — here the infinitive vereinbaren at the end of the sentence — takes würde gern. A thing takes hätte gern, and then no verb follows: Ich hätte gern einen Termin. And könnte belongs to a request aimed at the other person: Könnten Sie …?"
      ru: "В немецком есть два вежливых способа сказать, чего вы хотите, и выбор между ними решает то, что идёт следом. Действие — здесь инфинитив vereinbaren в конце предложения — требует würde gern. Предмет требует hätte gern, и тогда глагола за ним нет: Ich hätte gern einen Termin. А könnte принадлежит просьбе, обращённой к собеседнику: Könnten Sie …?"
      uk: "У німецькій є два ввічливі способи сказати, чого ви хочете, і вибір між ними вирішує те, що йде далі. Дія — тут інфінітив vereinbaren у кінці речення — вимагає würde gern. Предмет вимагає hätte gern, і тоді дієслова за ним немає: Ich hätte gern einen Termin. А könnte належить проханню, зверненому до співрозмовника: Könnten Sie …?"

  - id: pretest-indirekte-frage
    outcomes: [unterlagen-erfragen]
    type: mc
    focus: indirekte-frage
    instruction:
      en: "Guess. Which ending makes a correct German sentence?"
      ru: "Угадывайте. Какое продолжение даёт правильное немецкое предложение?"
      uk: "Вгадуйте. Яке продовження дає правильне німецьке речення?"
    prompt: "Können Sie mir sagen, …?"
    options:
      - "welche Unterlagen ich brauche"
      - "welche Unterlagen brauche ich"
      - "brauche ich welche Unterlagen"
    correct: 0
    translation:
      en: "Can you tell me which documents I need?"
      ru: "Можете сказать, какие документы мне нужны?"
      uk: "Чи можете сказати, які документи мені потрібні?"
    explain:
      en: "On its own the direct question is Welche Unterlagen brauche ich? Tucked into a longer request after Können Sie mir sagen, it remains interrogative in meaning but becomes an embedded subordinate clause: the finite verb goes to the end — welche Unterlagen ich brauche. This is a useful conventional polite frame, not the only polite way to ask."
      ru: "Самостоятельный прямой вопрос звучит Welche Unterlagen brauche ich? Внутри просьбы после Können Sie mir sagen он сохраняет вопросительное значение, но становится вложенным придаточным: спрягаемый глагол уходит в конец — welche Unterlagen ich brauche. Это удобная обычная вежливая рамка, но не единственный вежливый способ спросить."
      uk: "Самостійне пряме питання звучить Welche Unterlagen brauche ich? Усередині прохання після Können Sie mir sagen воно зберігає питальне значення, але стає вкладеним підрядним: відмінюване дієслово йде в кінець — welche Unterlagen ich brauche. Це зручна звична ввічлива рамка, але не єдиний ввічливий спосіб запитати."
