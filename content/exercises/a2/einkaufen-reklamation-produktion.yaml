topic: einkaufen-reklamation
role: practice
title:
  en: "Practice — the return: listening, writing, speaking"
  ru: "Практика — возврат товара: аудирование, письмо, речь"
items:
  - id: hoeren-service-schalter
    outcomes: [umtausch-begruenden]
    type: audio-comprehension
    instruction:
      en: "The zip of Sara's jacket has broken and she is back at the service counter of the Kaufhaus Nordstern. You already know what she wants — listen for why she wants it."
      ru: "У куртки Сары сломалась молния, и она снова стоит у стойки обслуживания универмага «Нордштерн». Чего она хочет, вы уже знаете, — слушайте, почему."
    source:
      kind: tts
      rate: 0.9
      turns:
        - { speaker: "Verkäufer", text: "Guten Tag! Was kann ich für Sie tun?" }
        - { speaker: "Sara", text: "Guten Tag. Ich habe diese Jacke hier gekauft. Der Reißverschluss ist kaputt gegangen." }
        - { speaker: "Verkäufer", text: "Das tut mir leid. Haben Sie den Bon?" }
        - { speaker: "Sara", text: "Ja, hier ist die Quittung." }
        - { speaker: "Verkäufer", text: "Danke. Möchten Sie das Geld zurück? Oder soll die Jacke in die Reparatur gehen?" }
        - { speaker: "Sara", text: "Nein, ich möchte die Jacke umtauschen. Sie passt mir sehr gut, und die Qualität ist besser als im Internet." }
        - { speaker: "Verkäufer", text: "Kein Problem. Ich hole Ihnen eine Jacke in Größe 40." }
    question: "Warum möchte Sara kein Geld zurück?"
    options:
      - "Die Jacke passt ihr gut, und die Qualität ist besser als im Internet."
      - "Der Verkäufer gibt kein Geld zurück."
      - "Sie hat den Bon nicht mehr."
    correct: 0
    translation:
      en: "Why doesn't Sara want her money back?"
      ru: "Почему Сара не хочет вернуть деньги?"
    explain:
      en: "Every option is built out of words you can hear in the dialogue, so catching a single one of them decides nothing — you have to follow who says what. The assistant does offer the money („Möchten Sie das Geld zurück?“), so he is not refusing it. Sara does hand over her receipt („Ja, hier ist die Quittung“), so she has not lost it. She turns the money down for a reason she says herself: „Sie passt mir sehr gut, und die Qualität ist besser als im Internet.“ The jacket is right — only this one is broken, so she wants the same jacket again."
      ru: "Каждый вариант собран из слов, которые в диалоге звучат, поэтому поймать одно знакомое слово недостаточно — нужно проследить, кто что говорит. Деньги продавец как раз предлагает („Möchten Sie das Geld zurück?“), значит, он не отказывает. Чек Сара как раз подаёт („Ja, hier ist die Quittung“), значит, он у неё есть. От денег она отказывается по причине, которую называет сама: „Sie passt mir sehr gut, und die Qualität ist besser als im Internet.“ Куртка ей подходит — сломан только этот экземпляр, поэтому ей нужна такая же."

  - id: cloze-timo-schuhe
    outcomes: [gefallen-passen-sagen]
    type: cloze
    focus: passen-dativ
    instruction:
      en: "Timo is trying on shoes. Fill in passen or gefallen in the correct form."
      ru: "Тимо примеряет ботинки. Вставьте passen или gefallen в правильной форме."
    text: "Timo probiert Größe 44. Die Schuhe {{passen}} ihm gut. Aber sie sind grau, und Grau {{gefällt}} ihm nicht."
    translation:
      en: "Timo tries size 44. The shoes fit him well. But they are grey, and he doesn't like grey."
      ru: "Тимо примеряет размер 44. Ботинки ему впору. Но они серые, а серый цвет ему не нравится."
    explain:
      en: "Two traps in three lines. The shoes are plural, so passen is plural too — die Schuhe passen, not die Schuhe passt. In the second sentence the subject is the colour, a single thing, so gefallen goes back to the singular: Grau gefällt ihm nicht. The verb follows the product, and the product changes number between the sentences; Timo stays in the dative throughout (ihm)."
      ru: "Две ловушки в трёх строчках. Ботинки — множественное число, поэтому и passen во множественном: die Schuhe passen, а не die Schuhe passt. Во втором предложении подлежащее — цвет, то есть одно понятие, и gefallen возвращается в единственное число: Grau gefällt ihm nicht. Глагол согласуется с товаром, а товар меняет число от предложения к предложению; Тимо же всё время стоит в дательном падеже (ihm)."

  - id: mc-gefallen-plural
    outcomes: [gefallen-passen-sagen]
    type: mc
    # gefallen, not passen: this item contains no passen at all, and `passen-dativ`
    # would file a gefallen error under the wrong confusion. gefallen is one of the
    # verbs `verben-mit-dativ` names (introduced by the `dativ` topic).
    focus: verben-mit-dativ
    instruction:
      en: "Choose the correct verb form."
      ru: "Выберите правильную форму глагола."
    prompt: "Die Schuhe ___ mir sehr gut. Ich nehme sie."
    options: ["gefällt", "gefallen", "gefalle"]
    correct: 1
    translation:
      en: "I like the shoes very much. I'll take them."
      ru: "Ботинки мне очень нравятся. Я их беру."
    explain:
      en: "The subject of gefallen is the thing, and here the thing is plural: die Schuhe gefallen. The singular gefällt would need a singular product (der Schuh gefällt mir). gefalle is the ich-form, and it would claim that I am the one being liked — a sentence about me, not about the shoes."
      ru: "Подлежащее при gefallen — вещь, а здесь вещь во множественном числе: die Schuhe gefallen. Форма единственного числа gefällt потребовала бы товара в единственном числе (der Schuh gefällt mir). А gefalle — форма первого лица: она означала бы, что нравлюсь я сам, то есть предложение было бы обо мне, а не о ботинках."

  - id: uebersetzen-guenstiger-aber-besser
    outcomes: [produkte-vergleichen, gefallen-passen-sagen]
    type: translate
    focus: komparativ-als
    instruction:
      en: "Translate into German. You are choosing between two things in a shop."
      ru: "Переведите на немецкий. Вы выбираете в магазине между двумя вещами."
    prompt_en: "This pullover is cheaper, but I like the jacket better."
    prompt_ru: "Этот свитер дешевле, но куртка нравится мне больше."
    answer: "Dieser Pullover ist günstiger, aber die Jacke gefällt mir besser."
    key_tokens: ["günstiger", "besser"]
    accept:
      # billiger is a correct rendering of "cheaper"; without it the learner is marked
      # wrong AND the miss is filed as a komparativ-als error, which it is not.
      - "Dieser Pullover ist billiger, aber die Jacke gefällt mir besser."
      - "Dieser Pullover ist günstiger, aber mir gefällt die Jacke besser."
      - "Dieser Pullover ist billiger, aber mir gefällt die Jacke besser."
    explain:
      en: "Two comparatives, and they are built by two different mechanisms. günstig is regular: günstiger. better is the irregular comparative of gut and comes out as besser — a word you cannot derive, only remember. Neither of them needs als here, because the thing being compared against is already in the sentence. And gefallen keeps its usual shape: the jacket is the subject, the person is in the dative (mir)."
      ru: "Две сравнительные степени — и образованы они по-разному. günstig подчиняется правилу: günstiger. А besser — исключение, сравнительная степень от gut; вывести её нельзя, можно только запомнить. Слово als здесь не нужно ни в одном случае, потому что предмет сравнения уже назван в предложении. И gefallen сохраняет свою обычную схему: подлежащее — куртка, человек — в дательном падеже (mir)."

  - id: schreiben-reklamation-online-shop
    outcomes: [reklamation-schreiben]
    type: write
    prompt:
      en: "You ordered a pullover from an online shop. It arrived on Monday, it is too tight, and there is a fault in the material. Write a short complaint (eine Reklamation) to the shop."
      ru: "Вы заказали свитер в интернет-магазине. Он пришёл в понедельник, оказался тесным, и в материале есть дефект. Напишите короткую рекламацию в магазин."
    goal:
      en: "Say what you ordered and when it arrived, name the two problems, and say what you want the shop to do."
      ru: "Скажите, что вы заказали и когда это пришло, назовите обе проблемы и скажите, чего вы ждёте от магазина."
    requirements:
      - en: "Say what you bought and when it arrived (Ich habe … bestellt / Der Pullover ist am Montag gekommen)."
        ru: "Скажите, что вы купили и когда это пришло (Ich habe … bestellt / Der Pullover ist am Montag gekommen)."
      - en: "Name the size problem with zu + adjective (Der Pullover ist mir zu eng / zu klein)."
        ru: "Назовите проблему с размером через zu + прилагательное (Der Pullover ist mir zu eng / zu klein)."
      - en: "Use one comparative with -er to say what you need instead (eine Größe größer, ein Pullover in Größe 42)."
        ru: "Используйте одну сравнительную степень на -er, чтобы сказать, что вам нужно взамен (eine Größe größer, ein Pullover in Größe 42)."
      - en: "Say what you want, with the accusative article: Ich möchte den Pullover umtauschen — or zurückgeben."
        ru: "Скажите, чего вы хотите, с артиклем в Akkusativ: Ich möchte den Pullover umtauschen — или zurückgeben."
    min_words: 30
    model_answer: "Sehr geehrte Damen und Herren, ich habe bei Ihnen einen Pullover in Größe 40 bestellt. Der Pullover ist am Montag gekommen. Leider ist er mir zu eng. Ich brauche eine Größe größer. Der Pullover hat auch einen Fehler: Er ist am Arm kaputt. Ich möchte den Pullover umtauschen. Die Quittung liegt im Paket. Mit freundlichen Grüßen Sara Berger"
    model_translation:
      en: "Dear Sir or Madam, I ordered a pullover in size 40 from you. The pullover arrived on Monday. Unfortunately it is too tight for me. I need one size bigger. The pullover also has a fault: it is damaged on the sleeve. I would like to exchange the pullover. The receipt is in the parcel. Yours faithfully, Sara Berger"
      ru: "Уважаемые дамы и господа! Я заказала у вас свитер 40-го размера. Свитер пришёл в понедельник. К сожалению, он мне тесен. Мне нужен размер побольше. Кроме того, у свитера дефект: рукав повреждён. Я хотела бы обменять свитер. Квитанция лежит в посылке. С уважением, Сара Бергер"
    explain:
      en: "A complaint is short and it does exactly four things: it says what you bought, it names the problem, it says what you want, and it mentions the receipt. The grammar of this lesson carries all four. zu + adjective states the problem (zu eng — not sehr eng, which would be no reason to complain). The comparative states the remedy (eine Größe größer). And the request needs the accusative article, because umtauschen governs it: den Pullover. Before you send it, read your draft once looking only at der/den — that single letter is what a shop assistant reads first."
      ru: "Рекламация коротка и делает ровно четыре вещи: называет покупку, называет проблему, называет требование и упоминает чек. Вся грамматика этого урока работает именно на них. zu + прилагательное формулирует проблему (zu eng — а не sehr eng, что не было бы причиной для претензии). Сравнительная степень формулирует решение (eine Größe größer). А в самой просьбе нужен артикль в Akkusativ, потому что umtauschen управляет винительным падежом: den Pullover. Перед отправкой перечитайте черновик, глядя только на der/den: именно эта одна буква сразу бросается в глаза сотруднику магазина."

  - id: sprechen-umtausch-sportladen
    outcomes: [umtausch-begruenden, gefallen-passen-sagen]
    type: speak
    mode: spoken-interaction
    prompt:
      en: "A different shop, a different problem: last week you bought running shoes at the sports shop Aktiv. They are too tight, and one shoe is already broken. You are standing at the counter and the assistant asks: „Guten Tag! Was kann ich für Sie tun?“ Answer him aloud."
      ru: "Другой магазин, другая проблема: на прошлой неделе вы купили кроссовки в спортивном магазине «Актив». Они жмут, и один ботинок уже сломался. Вы стоите у стойки, и продавец спрашивает: «Guten Tag! Was kann ich für Sie tun?» Ответьте ему вслух."
    goal:
      en: "Say what you bought and when, give both reasons for the return, and say clearly what you want — an exchange in a bigger size."
      ru: "Скажите, что и когда вы купили, назовите обе причины возврата и чётко сформулируйте, чего вы хотите: обмена на больший размер."
    checklist:
      - en: "I said what I bought and when (Ich habe diese Schuhe letzte Woche hier gekauft)."
        ru: "Я сказал(а), что и когда купил(а) (Ich habe diese Schuhe letzte Woche hier gekauft)."
      - en: "I gave the size reason with passen + Dativ and zu + adjective (Sie passen mir nicht — sie sind zu eng)."
        ru: "Я назвал(а) причину, связанную с размером, через passen + Dativ и zu + прилагательное (Sie passen mir nicht — sie sind zu eng)."
      - en: "I named the defect (Ein Schuh ist kaputt) and offered the receipt (Hier ist der Bon)."
        ru: "Я назвал(а) дефект (Ein Schuh ist kaputt) и предложил(а) чек (Hier ist der Bon)."
      - en: "I said what I want, with a comparative or a size (Ich möchte die Schuhe umtauschen — ich brauche Größe 44)."
        ru: "Я сказал(а), чего хочу, употребив сравнительную степень или размер (Ich möchte die Schuhe umtauschen — ich brauche Größe 44)."
    model_answer: "Guten Tag. Ich habe diese Schuhe letzte Woche hier gekauft. Leider passen sie mir nicht — sie sind mir zu eng. Ich brauche eine Größe größer, also Größe 44. Ein Schuh ist auch kaputt. Hier ist der Bon. Ich möchte die Schuhe umtauschen."
    model_translation:
      en: "Hello. I bought these shoes here last week. Unfortunately they don't fit me — they are too tight for me. I need one size bigger, so size 44. One shoe is also broken. Here is the receipt. I would like to exchange the shoes."
      ru: "Здравствуйте. Я купил эти ботинки здесь на прошлой неделе. К сожалению, они мне не подходят — они мне жмут. Мне нужен размер побольше, то есть 44-й. К тому же один ботинок сломан. Вот чек. Я хотел бы обменять ботинки."
    explain:
      en: "A return is won on three sentences: what you bought, why you are bringing it back, and what you want instead. Say them in that order and the assistant has everything he needs. Watch two forms as you record yourself the second time. The shoes are plural, so it is sie passen mir nicht — never sie passt. And the request is Ich möchte die Schuhe umtauschen, with the separable verb whole and at the end after the modal."
      ru: "Возврат решается тремя предложениями: что вы купили, почему возвращаете и что хотите взамен. Скажите их именно в таком порядке — и продавцу больше ничего не нужно. Записывая себя во второй раз, следите за двумя формами. Ботинки — множественное число, поэтому sie passen mir nicht, а не sie passt. И сама просьба звучит как Ich möchte die Schuhe umtauschen: глагол с отделяемой приставкой остаётся целым и стоит в конце после модального."
