topic: gesundheit-arzttermin
role: probe
title:
  en: "Probe — seit or vor?"
  ru: "Проверка — seit или vor?"

# Three PARALLEL variants of ONE competence: saying how long a complaint has
# lasted — `seit` + Dativ for something still true, `vor` + Dativ for something
# finished — with the Dativ Plural -n on the noun. One variant is drawn per due
# interval (2, 7, 21 days), so the same skill is measured three times, in three
# situations the learner has not seen.
#
# Each variant contains both halves of the choice in one item: a state that still
# holds (seit) and a finished event (vor). Nothing about it can be answered from
# memory of a practice item — those are single-structure sentences in the first
# person, and these are third-person pairs with people, illnesses and time spans
# that appear nowhere else in the topic. What is graded is only the preposition
# and the case-marked time phrase; the Perfekt around it is deliberately not
# pinned, so a fumbled participle is logged as an error but never blamed on this
# confusion.

items:
  - id: variant-a
    outcomes: [beschwerden-beschreiben]
    type: translate
    focus: seit-vor-zeit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Lena has had a fever for two days. She went to the doctor a week ago."
    prompt_ru: "У Лены уже два дня температура. Неделю назад она ходила к врачу."
    answer: "Lena hat seit zwei Tagen Fieber. Sie ist vor einer Woche zum Arzt gegangen."
    accept: ["Lena hat seit zwei Tagen Fieber. Vor einer Woche ist sie zum Arzt gegangen."]
    key_tokens: ["seit", "Tagen", "vor", "einer"]
    explain:
      en: "One question at each time phrase: is it still true? Lena's fever is there now — seit zwei Tagen. The visit happened once and is finished — vor einer Woche. Both prepositions take the dative, so they never differ in form, only in meaning, and the plural noun adds -n: Tagen. The Perfekt in the second sentence is the giveaway: a completed action almost always goes with vor, while a state that still holds stays in the present with seit."
      ru: "У каждого обстоятельства времени задавайте один вопрос: это верно и сейчас? Температура у Лены есть сегодня — seit zwei Tagen. А визит состоялся однажды и уже позади — vor einer Woche. Оба предлога требуют Dativ, поэтому по форме они не различаются — только по смыслу, — а существительное во множественном числе получает -n: Tagen. Perfekt во втором предложении подсказывает: завершённое действие почти всегда идёт с vor, а состояние, которое длится, остаётся в настоящем времени и с seit."

  - id: variant-b
    outcomes: [beschwerden-beschreiben]
    type: translate
    focus: seit-vor-zeit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Jonas has had a cough since Monday. The doctor examined him three days ago."
    prompt_ru: "У Йонаса кашель с понедельника. Три дня назад врач его осмотрел."
    answer: "Jonas hat seit Montag Husten. Der Arzt hat ihn vor drei Tagen untersucht."
    accept: ["Jonas hat seit Montag Husten. Vor drei Tagen hat der Arzt ihn untersucht."]
    key_tokens: ["seit", "vor", "Tagen"]
    explain:
      en: "The cough started on Monday and is still there, so it is seit Montag — a fixed point in time works with seit exactly as a stretch of time does. The examination is over: vor drei Tagen, and the plural adds -n — Tagen, not Tage. Note that seit is not a past tense: German says Jonas hat Husten in the present, because he still has it, where English needs 'has had'."
      ru: "Кашель начался в понедельник и есть до сих пор, поэтому seit Montag: с seit одинаково хорошо работают и точка во времени, и отрезок. А осмотр уже позади: vor drei Tagen, причём множественное число получает -n — Tagen, а не Tage. Обратите внимание: seit не требует прошедшего времени. Немецкий говорит Jonas hat Husten в настоящем, ведь кашель есть и сейчас, — а русское «у него кашель» устроено так же."

  - id: variant-c
    outcomes: [beschwerden-beschreiben]
    type: translate
    focus: seit-vor-zeit
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
    prompt_en: "Mrs Sommer has had a cold for a week. She bought the tablets two days ago."
    prompt_ru: "У госпожи Зоммер уже неделю простуда. Таблетки она купила два дня назад."
    answer: "Frau Sommer hat seit einer Woche eine Erkältung. Sie hat die Tabletten vor zwei Tagen gekauft."
    accept: ["Frau Sommer hat seit einer Woche eine Erkältung. Vor zwei Tagen hat sie die Tabletten gekauft."]
    key_tokens: ["seit", "einer", "vor", "Tagen"]
    explain:
      en: "The cold is still with her today — seit einer Woche, with the dative einer after seit. The purchase is done and behind her — vor zwei Tagen, dative again, and the plural -n on Tagen. The two prepositions look interchangeable because they govern the same case; what separates them is only whether the thing is over. Ask that question before you write either of them. Note the article: eine Erkältung is a countable illness and keeps its article, unlike Husten or Fieber, which follow haben bare."
      ru: "Простуда у неё и сегодня — seit einer Woche, с формой einer в Dativ после seit. А покупка уже позади — vor zwei Tagen, снова Dativ, и снова -n во множественном числе у Tagen. Предлоги выглядят взаимозаменяемыми, потому что управляют одним и тем же падежом; различает их только одно: закончилось ли действие. Задайте этот вопрос прежде, чем написать любой из них. Обратите внимание на артикль: eine Erkältung — исчисляемая болезнь и артикль сохраняет, в отличие от Husten или Fieber, которые стоят после haben без артикля."
