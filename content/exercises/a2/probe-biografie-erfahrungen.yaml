topic: biografie-erfahrungen
role: probe
title:
  en: "Probe — war, hatte and the modal Präteritum"
  ru: "Проверка — war, hatte и Präteritum модальных"
  uk: "Перевірка — war, hatte і Präteritum модальних"

# ONE competence: `praeteritum-sein-haben` — telling a past story in the Perfekt while
# sein, haben and the modals go into the Präteritum (war, hatte, konnte / musste / wollte).
#
# Why this one and not another. It is the thing the lesson is *about*: the split is the only
# structure here that a learner cannot arrive at from A1 plus common sense, and it is the one
# that decays silently — Perfekt keeps working, so a learner who has forgotten the exception
# still produces understandable German (`ich habe keine Zeit gehabt`) and never notices. The
# topic's other outcomes — ordering the stages, asking a partner, writing a portrait — get
# their evidence from practice, which is where outcome mastery comes from anyway.
#
# ALL THREE VARIANTS ARE STRUCTURALLY IDENTICAL, deliberately and to the token:
#   S1  "Vor N Jahren ist NAME nach STADT umgezogen."           Perfekt, sein-aux — NOT pinned
#   S2  "Zuerst war PRON ADJEKTIV."                             pinned: war
#   S3  "PRON hatte keine NOMEN und PRON MODAL + drei Wörter."  pinned: hatte + one modal
# Same clause count, same fronted `Vor …` opener, same `Zuerst` inversion, the same negated
# `keine` + noun — and in every variant the modal governs a THREE-WORD phrase ending in a
# plain, non-separable infinitive (viel Deutsch lernen / nicht gut schlafen / nach Hause
# fahren). No separable prefix in any of them: a separable infinitive after a modal is a
# second competence (`trennbar-modal`), and importing it into one variant only would weld
# that variant's extra difficulty to one specific delay.
#
# The three modals are konnte / musste / wollte — the same difficulty by construction: none
# of them takes an umlaut, and all three are learnt from one row of one table. Every content
# word in all three variants is a headword in some deck of this course (umziehen, allein,
# müde, krank, Arbeit, Wohnung, Freund, lernen, schlafen, fahren, Deutsch). An earlier draft
# leaned on `niemanden` and `nervös`, which are cards nowhere — and since the variants are
# served one per interval (2, 7, 21 days), an unknown word in one of them is a difficulty
# spike welded to one delay. The curve that came out would have been a difficulty curve
# wearing a retention label, which is exactly what this file exists to prevent. Only the
# people, the cities and the elapsed time vary now.
#
# The unpinned Perfekt clause is identical in shape across the three, so a fumbled participle
# costs the learner the item but is never blamed on this tag — an honest gap in the weakness
# signal beats a false entry in it.
#
# `accept` is deliberately generous, and it has to be: a probe that scores correct German
# wrong corrupts the one number this whole apparatus exists to produce. Each variant accepts
# the subject-first rendering of S1, `gezogen` for `umgezogen` (both idiomatic), `Am Anfang`
# for `Zuerst` (the article teaches both, and the produktion cloze drills `Am Anfang`), and
# the dropped subject in the second half of S3 — alone and in combination.
#
# None of the three is answerable from memory of a practice item: the practice sentences are
# first-person (`Damals war ich Student …`, `Vor zwei Jahren konnte ich meine Familie nicht
# besuchen …`), and these are third-person portraits of people, cities and situations that
# appear nowhere else in the topic.

items:
  - id: variant-a
    outcomes: [praeteritum-war-hatte]
    type: translate
    focus: praeteritum-sein-haben
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "Three years ago Mareike moved to Hamburg. At first she was alone. She had no job and she had to learn a lot of German."
    prompt_ru: "Три года назад Марайке переехала в Гамбург. Сначала она была одна. Работы у неё не было, и ей приходилось много учить немецкий."
    prompt_uk: "Три роки тому Марайке переїхала до Гамбурга. Спочатку вона була сама. Роботи в неї не було, і їй доводилося багато вчити німецьку."
    answer: "Vor drei Jahren ist Mareike nach Hamburg umgezogen. Zuerst war sie allein. Sie hatte keine Arbeit und sie musste viel Deutsch lernen."
    accept:
      - "Mareike ist vor drei Jahren nach Hamburg umgezogen. Zuerst war sie allein. Sie hatte keine Arbeit und sie musste viel Deutsch lernen."
      - "Vor drei Jahren ist Mareike nach Hamburg gezogen. Zuerst war sie allein. Sie hatte keine Arbeit und sie musste viel Deutsch lernen."
      - "Vor drei Jahren ist Mareike nach Hamburg umgezogen. Am Anfang war sie allein. Sie hatte keine Arbeit und sie musste viel Deutsch lernen."
      - "Vor drei Jahren ist Mareike nach Hamburg umgezogen. Zuerst war sie allein. Sie hatte keine Arbeit und musste viel Deutsch lernen."
      - "Mareike ist vor drei Jahren nach Hamburg umgezogen. Am Anfang war sie allein. Sie hatte keine Arbeit und musste viel Deutsch lernen."
      - "Vor drei Jahren ist Mareike nach Hamburg gezogen. Am Anfang war sie allein. Sie hatte keine Arbeit und musste viel Deutsch lernen."
    key_tokens: ["war", "hatte", "musste"]
    explain:
      en: "This probe checks the course's neutral productive split: the move uses Perfekt (ist … umgezogen), while sein, haben and the modal use Präteritum (war, hatte, musste). Those are target choices, not claims that grammatical Perfekt alternatives do not exist. Check the modal: musste is past; müsste would express a possibility. The modal bracket ends in lernen, and Zuerst occupies position 1: Zuerst war sie … ."
      ru: "Проверка оценивает нейтральную продуктивную модель курса: переезд стоит в Perfekt (ist … umgezogen), а sein, haben и модальный — в Präteritum (war, hatte, musste). Это целевые варианты, а не утверждение, что грамматических альтернатив в Perfekt не существует. musste — прошедшее, müsste выражало бы возможность. Рамка модального заканчивается на lernen, а Zuerst занимает позицию 1: Zuerst war sie … ."
      uk: "Перевірка оцінює нейтральну продуктивну модель курсу: переїзд стоїть у Perfekt (ist … umgezogen), а sein, haben і модальне — у Präteritum (war, hatte, musste). Це цільові варіанти, а не твердження, що граматичних альтернатив у Perfekt не існує. musste — минуле, müsste виражало б можливість. Рамка модального закінчується на lernen, а Zuerst займає позицію 1: Zuerst war sie … ."

  - id: variant-b
    outcomes: [praeteritum-war-hatte]
    type: translate
    focus: praeteritum-sein-haben
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "Two years ago Tobias moved to Vienna. At first he was tired. He had no flat and he could not sleep well."
    prompt_ru: "Два года назад Тобиас переехал в Вену. Сначала он был уставшим. Квартиры у него не было, и он не мог хорошо спать."
    prompt_uk: "Два роки тому Тобіас переїхав до Відня. Спочатку він був утомлений. Квартири в нього не було, і він не міг добре спати."
    answer: "Vor zwei Jahren ist Tobias nach Wien umgezogen. Zuerst war er müde. Er hatte keine Wohnung und er konnte nicht gut schlafen."
    accept:
      - "Tobias ist vor zwei Jahren nach Wien umgezogen. Zuerst war er müde. Er hatte keine Wohnung und er konnte nicht gut schlafen."
      - "Vor zwei Jahren ist Tobias nach Wien gezogen. Zuerst war er müde. Er hatte keine Wohnung und er konnte nicht gut schlafen."
      - "Vor zwei Jahren ist Tobias nach Wien umgezogen. Am Anfang war er müde. Er hatte keine Wohnung und er konnte nicht gut schlafen."
      - "Vor zwei Jahren ist Tobias nach Wien umgezogen. Zuerst war er müde. Er hatte keine Wohnung und konnte nicht gut schlafen."
      - "Tobias ist vor zwei Jahren nach Wien umgezogen. Am Anfang war er müde. Er hatte keine Wohnung und konnte nicht gut schlafen."
      - "Vor zwei Jahren ist Tobias nach Wien gezogen. Am Anfang war er müde. Er hatte keine Wohnung und konnte nicht gut schlafen."
    key_tokens: ["war", "hatte", "konnte"]
    explain:
      en: "The target register pattern uses Perfekt for the move (ist … umgezogen) and Präteritum for sein, haben and können: war, hatte, konnte. This is the course's productive default rather than a universal state/event rule. konnte has no umlaut; könnte would express a possibility. The modal bracket ends with schlafen."
      ru: "Целевая модель регистра использует Perfekt для переезда (ist … umgezogen), а Präteritum — для sein, haben и können: war, hatte, konnte. Это продуктивная модель курса, а не универсальное правило о состояниях и событиях. В konnte нет умлаута; könnte выражало бы возможность. Рамка модального заканчивается на schlafen."
      uk: "Цільова модель регістру використовує Perfekt для переїзду (ist … umgezogen), а Präteritum — для sein, haben і können: war, hatte, konnte. Це продуктивна модель курсу, а не універсальне правило про стани й події. У konnte немає умлаута; könnte виражало б можливість. Рамка модального закінчується на schlafen."

  - id: variant-c
    outcomes: [praeteritum-war-hatte]
    type: translate
    focus: praeteritum-sein-haben
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "Four years ago Yasmin moved to Munich. At first she was ill. She had no friends and she wanted to go home."
    prompt_ru: "Четыре года назад Ясмин переехала в Мюнхен. Сначала она была больна. Друзей у неё не было, и она хотела уехать домой."
    prompt_uk: "Чотири роки тому Ясмін переїхала до Мюнхена. Спочатку вона була хвора. Друзів у неї не було, і вона хотіла поїхати додому."
    answer: "Vor vier Jahren ist Yasmin nach München umgezogen. Zuerst war sie krank. Sie hatte keine Freunde und sie wollte nach Hause fahren."
    accept:
      - "Yasmin ist vor vier Jahren nach München umgezogen. Zuerst war sie krank. Sie hatte keine Freunde und sie wollte nach Hause fahren."
      - "Vor vier Jahren ist Yasmin nach München gezogen. Zuerst war sie krank. Sie hatte keine Freunde und sie wollte nach Hause fahren."
      - "Vor vier Jahren ist Yasmin nach München umgezogen. Am Anfang war sie krank. Sie hatte keine Freunde und sie wollte nach Hause fahren."
      - "Vor vier Jahren ist Yasmin nach München umgezogen. Zuerst war sie krank. Sie hatte keine Freunde und wollte nach Hause fahren."
      - "Yasmin ist vor vier Jahren nach München umgezogen. Am Anfang war sie krank. Sie hatte keine Freunde und wollte nach Hause fahren."
      - "Vor vier Jahren ist Yasmin nach München gezogen. Am Anfang war sie krank. Sie hatte keine Freunde und wollte nach Hause fahren."
    key_tokens: ["war", "hatte", "wollte"]
    explain:
      en: "The target pattern uses Perfekt for the move (ist … umgezogen) and Präteritum for sein, haben and wollen: war, hatte, wollte. This is the neutral productive default being probed. wollte has no umlaut and places fahren at the end of its bracket. nach Hause names the destination home; zu Hause names the location at home."
      ru: "Целевая модель использует Perfekt для переезда (ist … umgezogen), а Präteritum — для sein, haben и wollen: war, hatte, wollte. Проверяется нейтральная продуктивная модель. В wollte нет умлаута, а fahren стоит в конце рамки. nach Hause называет направление домой; zu Hause — место дома."
      uk: "Цільова модель використовує Perfekt для переїзду (ist … umgezogen), а Präteritum — для sein, haben і wollen: war, hatte, wollte. Перевіряється нейтральна продуктивна модель. У wollte немає умлаута, а fahren стоїть у кінці рамки. nach Hause називає напрямок додому; zu Hause — місце вдома."
