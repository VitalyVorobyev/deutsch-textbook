    question: "Was müssen die Reisenden nach Nürnberg tun?"
    options: ["Zu Gleis sieben gehen.", "Auf Gleis vier warten.", "Einen späteren Zug nehmen."]
    correct: 0
    translation: { en: "What do the passengers to Nuremberg have to do?", ru: "Что нужно сделать пассажирам, едущим в Нюрнберг?", uk: "Що потрібно зробити пасажирам, які їдуть до Нюрнберга?" }
    explain: { en: "The announcement opens on platform four but the point comes at the end: fährt heute von Gleis sieben ab. Station announcements often name the old platform first, so the number that matters is the one after von.", ru: "Объявление начинается с четвёртого пути, но суть — в конце: fährt heute von Gleis sieben ab. На вокзалах часто сначала называют прежний путь, поэтому важен номер после von.", uk: "Оголошення починається з четвертої колії, але суть — у кінці: fährt heute von Gleis sieben ab. На вокзалах часто спочатку називають попередню колію, тому важливий номер після von." }

  - id: reisen-verbindung-mc
    outcomes: [verbindung-waehlen]
    type: mc
    prompt: "Sie lesen den Fahrplan: „Köln ab 8:12 → Frankfurt an 9:20. Köln ab 8:44 → Frankfurt an 10:55, einmal umsteigen in Bonn. Köln ab 9:12 → Frankfurt an 10:20.“ Sie müssen um zehn Uhr in Frankfurt sein. Welche Verbindung passt?"
    options: ["Köln ab 8:12.", "Köln ab 8:44.", "Köln ab 9:12."]
    correct: 0
    translation: { en: "You read a timetable. You have to be in Frankfurt at ten o'clock. Which connection works?", ru: "Вы читаете расписание. Вам нужно быть во Франкфурте в десять часов. Какое соединение подходит?", uk: "Ви читаєте розклад. Вам потрібно бути у Франкфурті о десятій годині. Яке сполучення підходить?" }
    explain: { en: "ab is the departure and an the arrival — the two words a timetable turns on. Only the 8:12 arrives before ten (9:20). The 8:44 leaves earlier than the 9:12 but arrives later, because it involves a change: einmal umsteigen.", ru: "ab — отправление, an — прибытие; на этих двух словах держится всё расписание. До десяти прибывает только поезд в 8:12 (9:20). Поезд в 8:44 отправляется раньше, чем в 9:12, но приходит позже, потому что с пересадкой: einmal umsteigen.", uk: "ab — відправлення, an — прибуття; на цих двох словах тримається весь розклад. До десятої прибуває лише потяг о 8:12 (9:20). Потяг о 8:44 відправляється раніше, ніж о 9:12, але приходить пізніше, бо з пересадкою: einmal umsteigen." }

  # --- einkaufen-reklamation ---
  - id: einkaufen-vergleich-jacke
    outcomes: [produkte-vergleichen]
    type: translate
    focus: komparativ-als
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "This jacket is cheaper than the coat."
    prompt_ru: "Эта куртка дешевле, чем пальто."
    prompt_uk: "Ця куртка дешевша, ніж пальто."
    answer: "Diese Jacke ist billiger als der Mantel."
    key_tokens: ["billiger", "als"]
    explain: { en: "The comparative is the plain -er ending, and the comparison itself is made with als — never with wie, which compares things that are equal (so groß wie). The second item stays in the nominative here: der Mantel.", ru: "Сравнительная степень — это окончание -er, а само сравнение вводится через als, а не через wie: wie сравнивает равные величины (so groß wie). Второй член сравнения остаётся здесь в номинативе: der Mantel.", uk: "Вищий ступінь — це закінчення -er, а саме порівняння вводиться через als, а не через wie: wie порівнює рівні величини (so groß wie). Другий член порівняння залишається тут у номінативі: der Mantel." }

  - id: einkaufen-passen-groesse
    outcomes: [gefallen-passen-sagen]
    type: translate
    focus: passen-dativ
    instruction: { en: "Translate into German. Use passen.", ru: "Переведите на немецкий. Используйте passen.", uk: "Перекладіть німецькою. Вживайте passen." }
    prompt_en: "The jacket doesn't fit me."
    prompt_ru: "Куртка мне не подходит по размеру."
    prompt_uk: "Куртка мені не підходить за розміром."
    answer: "Die Jacke passt mir nicht."
    key_tokens: ["passt", "mir"]
    explain: { en: "passen works like gefallen: the garment is the subject and the person is in the dative, so it is passt mir and never passt mich. The same pattern returns for appointments — Passt es Ihnen am Montag?", ru: "passen устроен как gefallen: подлежащее — сама вещь, а человек стоит в дативе, поэтому passt mir, а не passt mich. Та же схема возвращается при договорённостях о времени: Passt es Ihnen am Montag?", uk: "passen влаштований як gefallen: підмет — сама річ, а людина стоїть у давальному, тому passt mir, а не passt mich. Та сама схема повертається при домовленостях про час: Passt es Ihnen am Montag?" }

  # --- adjektive-deklination ---
  - id: adjektiv-unbestimmt-luecke
    outcomes: [adjektiv-beschreiben]
    type: cloze
    focus: adjektiv-unbestimmt
    instruction: { en: "Fill in neu, groß or klein in the correct form.", ru: "Вставьте neu, groß или klein в правильной форме.", uk: "Вставте neu, groß або klein у правильній формі." }
    text: "Wir haben eine {{neue}} Küche, einen {{großen}} Balkon und ein {{kleines}} Bad."
    translation: { en: "We have a new kitchen, a big balcony and a small bathroom.", ru: "У нас новая кухня, большой балкон и маленькая ванная.", uk: "У нас нова кухня, великий балкон і маленька ванна кімната." }
    explain: { en: "After ein- the adjective has to supply the information the article hides. ein alone shows nothing, so the neuter adjective takes the -es that das would have carried: ein kleines Bad. Feminine and masculine accusative keep their own marks: eine neue, einen großen.", ru: "После ein- прилагательное обязано взять на себя ту информацию, которую артикль не показывает. Само по себе ein не выражает ничего, поэтому в среднем роде прилагательное получает -es, которое несло бы das: ein kleines Bad. Женский род и мужской аккузатив сохраняют свои показатели: eine neue, einen großen.", uk: "Після ein- прикметник зобов'язаний взяти на себе ту інформацію, якої артикль не показує. Саме по собі ein не виражає нічого, тому в середньому роді прикметник отримує -es, яке несло б das: ein kleines Bad. Жіночий рід і чоловічий акузатив зберігають свої показники: eine neue, einen großen." }

  - id: adjektiv-bestimmt-wohnung
    outcomes: [adjektiv-wunsch-sagen]
    type: translate
    focus: adjektiv-bestimmt
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "I'm looking for the small flat with the new kitchen."
    prompt_ru: "Я ищу ту маленькую квартиру с новой кухней."
    prompt_uk: "Я шукаю ту маленьку квартиру з новою кухнею."
    answer: "Ich suche die kleine Wohnung mit der neuen Küche."
    key_tokens: ["kleine", "neuen"]
    explain: { en: "After der/die/das the adjective only ever ends in -e or -en, because the article has already done the work. -e appears in the five boxes at the top of the table, including feminine accusative (die kleine Wohnung); everywhere else, dative included, it is -en: mit der neuen Küche.", ru: "После der/die/das у прилагательного бывает только -e или -en, потому что артикль уже всё показал. -e стоит в пяти клетках в верхней части таблицы, включая женский аккузатив (die kleine Wohnung); во всех остальных, в том числе в дативе, — -en: mit der neuen Küche.", uk: "Після der/die/das у прикметника буває лише -e або -en, бо артикль уже все показав. -e стоїть у п'яти клітинках у верхній частині таблиці, включно з жіночим акузативом (die kleine Wohnung); в усіх інших, зокрема в давальному, — -en: mit der neuen Küche." }

  # --- gesundheit-arzttermin ---
  - id: gesundheit-seit-tagen
    outcomes: [beschwerden-beschreiben]
    type: translate
    focus: seit-vor-zeit
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "I've had a headache for three days."
    prompt_ru: "У меня уже три дня болит голова."
    prompt_uk: "У мене вже три дні болить голова."
    answer: "Ich habe seit drei Tagen Kopfschmerzen."
    key_tokens: ["seit", "Tagen"]
    explain: { en: "seit covers a stretch that started in the past and is still going, and it governs the dative, so drei Tage becomes seit drei Tagen. German keeps this in the present tense — the pain is still there. vor drei Tagen would mean three days ago, finished.", ru: "seit описывает промежуток, который начался в прошлом и продолжается, и требует датива, поэтому drei Tage превращается в seit drei Tagen. Немецкий ставит здесь настоящее время: боль ещё есть. vor drei Tagen значило бы «три дня назад», то есть уже закончилось.", uk: "seit описує проміжок, який почався в минулому й триває, і вимагає давального, тому drei Tage перетворюється на seit drei Tagen. Німецька ставить тут теперішній час: біль ще є. vor drei Tagen означало б «три дні тому», тобто вже закінчилося." }

  - id: gesundheit-anweisung-hoeren
    outcomes: [praxis-anweisungen-verstehen]
    type: audio-comprehension
    source:
      kind: tts
      rate: 0.85
      turns:
        - { speaker: "Apothekerin", text: "Nehmen Sie die Tabletten dreimal am Tag, immer nach dem Essen. Trinken Sie viel Wasser. Wenn es nach drei Tagen nicht besser ist, gehen Sie bitte wieder zum Arzt." }
    question: "Wie soll der Patient die Tabletten nehmen?"
    options: ["Dreimal am Tag nach dem Essen.", "Dreimal am Tag vor dem Essen.", "Einmal am Tag mit viel Wasser."]
    correct: 0
    translation: { en: "How should the patient take the tablets?", ru: "Как пациенту принимать таблетки?", uk: "Як пацієнтові приймати таблетки?" }
    explain: { en: "Two details decide it: dreimal am Tag and nach dem Essen. nach and vor are one syllable apart and change the instruction completely, which is why pharmacy instructions repeat them slowly.", ru: "Решают две детали: dreimal am Tag и nach dem Essen. nach и vor различаются одним слогом и полностью меняют указание — поэтому в аптеке их проговаривают медленно.", uk: "Вирішують дві деталі: dreimal am Tag і nach dem Essen. nach і vor різняться одним складом і повністю змінюють вказівку — тому в аптеці їх промовляють повільно." }

  # --- verben-mit-praepositionen ---
  - id: verb-praeposition-luecke
    outcomes: [verb-praeposition-waehlen]
    type: cloze
    focus: verb-praeposition
    instruction: { en: "Fill in the preposition.", ru: "Вставьте предлог.", uk: "Вставте прийменник." }
    text: "Ich warte {{auf}} den Bus. Meine Tochter träumt {{von}} einem Hund, und wir sprechen oft {{über}} die Zukunft."
    translation: { en: "I am waiting for the bus. My daughter dreams of a dog, and we often talk about the future.", ru: "Я жду автобус. Моя дочь мечтает о собаке, и мы часто говорим о будущем.", uk: "Я чекаю на автобус. Моя донька мріє про собаку, і ми часто говоримо про майбутнє." }
    explain: { en: "The preposition belongs to the verb and has to be learned with it — there is no rule to derive it from, and it rarely matches the one another language would use. Learn the case with it too: warten auf + accusative, träumen von + dative, sprechen über + accusative.", ru: "Предлог принадлежит глаголу и заучивается вместе с ним — вывести его неоткуда, и он редко совпадает с русским: «ждать автобус» без предлога, но warten auf. Падеж запоминается вместе с предлогом: warten auf + Akkusativ, träumen von + Dativ, sprechen über + Akkusativ.", uk: "Прийменник належить дієслову й заучується разом з ним — вивести його немає звідки, і він рідко збігається з українським. Відмінок запам'ятовується разом із прийменником: warten auf + Akkusativ, träumen von + Dativ, sprechen über + Akkusativ." }

  - id: da-wort-freuen
    outcomes: [da-wort-sache]
    type: translate
    focus: da-wo-woerter
    instruction: { en: "Translate into German. Refer back to something already mentioned.", ru: "Переведите на немецкий. Сошлитесь на уже упомянутое.", uk: "Перекладіть німецькою. Пошліться на вже згадане." }
    prompt_en: "I'm looking forward to it."
    prompt_ru: "Я этому очень рад."
    prompt_uk: "Я цьому дуже радий."
    answer: "Ich freue mich darauf."
    key_tokens: ["darauf"]
    explain: { en: "When a prepositional object is a thing rather than a person, German does not use a pronoun after the preposition — it fuses da- with the preposition instead: auf → darauf. The r appears only because auf begins with a vowel; with von it is davon, no r.", ru: "Когда предложное дополнение — вещь, а не человек, немецкий не ставит местоимение после предлога, а сливает da- с предлогом: auf → darauf. Буква r появляется только потому, что auf начинается с гласной; с von получается davon, без r.", uk: "Коли прийменниковий додаток — річ, а не людина, німецька не ставить займенник після прийменника, а зливає da- з прийменником: auf → darauf. Літера r з'являється лише тому, що auf починається з голосної; з von виходить davon, без r." }

