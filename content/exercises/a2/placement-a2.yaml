topic: aemter-dienstleistungen
role: placement
title: { en: "Placement test A2 — what you already know", ru: "Тест на уровень A2 — что вы уже знаете", uk: "Тест на рівень A2 — що ви вже знаєте" }

# The A2 entry test: 46 tasks over 22 topics, two or three each. Same contract as the A1
# test — a topic is placed only when every one of its tasks is answered and the parts-
# weighted ratio reaches 0.8, and every item's outcomes belong to exactly one topic.
#
# Anchored to `aemter-dienstleistungen`, the last A2 topic in the spine, so every focus tag
# used anywhere in A2 passes the curriculum-order check.
#
# Mix: 24 translate, 11 cloze, 6 audio-comprehension, 5 mc. 76% of the test is produced
# rather than picked, against caps of 25% mc and 40% selection. A2 is where the course
# stops being about recognising German and starts being about building it, and a test that
# decides which of those lessons the learner never sees has to ask them to build it.

items:
  # --- dativ ---
  - id: dativ-artikel-luecke
    outcomes: [dativ-artikel]
    type: cloze
    focus: dativ-artikel
    instruction: { en: "Fill in the article in the correct dative form.", ru: "Вставьте артикль в правильной форме датива.", uk: "Вставте артикль у правильній формі давального." }
    text: "Ich fahre mit {{dem}} Bus zur Arbeit. Nach {{der}} Arbeit gehe ich zu {{den}} Nachbarn."
    translation: { en: "I take the bus to work. After work I go to the neighbours'.", ru: "На работу я езжу на автобусе. После работы я захожу к соседям.", uk: "На роботу я їжджу автобусом. Після роботи я заходжу до сусідів." }
    explain: { en: "der Bus becomes dem, die Arbeit becomes der, and the dative plural is den with an -n on the noun itself: den Nachbarn. That extra -n on the noun is the part most often forgotten.", ru: "der Bus превращается в dem, die Arbeit — в der, а датив множественного числа — den, причём -n добавляется и к самому существительному: den Nachbarn. Именно это -n у существительного чаще всего забывают.", uk: "der Bus перетворюється на dem, die Arbeit — на der, а давальний множини — den, причому -n додається й до самого іменника: den Nachbarn. Саме це -n в іменника найчастіше забувають." }

  - id: dativ-pronomen-buch
    outcomes: [dativ-pronomen]
    type: translate
    focus: dativ-pronomen
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "Can you give me the book?"
    prompt_ru: "Ты можешь дать мне книгу?"
    prompt_uk: "Ти можеш дати мені книжку?"
    answer: "Kannst du mir das Buch geben?"
    key_tokens: ["mir"]
    explain: { en: "The person who receives something stands in the dative: ich becomes mir. The thing given stays in the accusative — das Buch. Both objects together are the classic give-somebody-something pattern.", ru: "Тот, кто получает, стоит в дативе: ich превращается в mir. Сам предмет остаётся в аккузативе — das Buch. Два дополнения вместе и образуют классическую схему «дать кому-то что-то».", uk: "Той, хто отримує, стоїть у давальному: ich перетворюється на mir. Сам предмет залишається в акузативі — das Buch. Два додатки разом і утворюють класичну схему «дати комусь щось»." }

  - id: dativ-verben-gefallen
    outcomes: [dativ-verben]
    type: translate
    focus: verben-mit-dativ
    instruction: { en: "Translate into German. Use gefallen.", ru: "Переведите на немецкий. Используйте gefallen.", uk: "Перекладіть німецькою. Вживайте gefallen." }
    prompt_en: "I like the flat very much."
    prompt_ru: "Квартира мне очень нравится."
    prompt_uk: "Квартира мені дуже подобається."
    answer: "Die Wohnung gefällt mir sehr gut."
    key_tokens: ["gefällt", "mir"]
    accept: ["Mir gefällt die Wohnung sehr gut."]
    explain: { en: "gefallen turns the sentence around: the thing that pleases is the subject and the person is in the dative. So it is die Wohnung gefällt mir, not ich gefalle die Wohnung — the English subject becomes the German dative object.", ru: "gefallen переворачивает предложение: подлежащее — то, что нравится, а человек стоит в дативе. Поэтому die Wohnung gefällt mir, а не ich gefalle die Wohnung. Русское «мне нравится» устроено так же, и это редкий случай, когда русский помогает.", uk: "gefallen перевертає речення: підмет — те, що подобається, а людина стоїть у давальному. Тому die Wohnung gefällt mir, а не ich gefalle die Wohnung. Українське «мені подобається» влаштоване так само, і це рідкісний випадок, коли українська допомагає." }

  # --- trennbare-verben ---
  - id: trennbar-aufstehen
    outcomes: [trennbar-satz]
    type: translate
    focus: trennbar-wortstellung
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "I get up at six o'clock every day."
    prompt_ru: "Я встаю каждый день в шесть часов."
    prompt_uk: "Я встаю щодня о шостій годині."
    answer: "Ich stehe jeden Tag um sechs Uhr auf."
    key_tokens: ["stehe", "auf"]
    accept: ["Jeden Tag stehe ich um sechs Uhr auf."]
    explain: { en: "aufstehen splits in a main clause: the conjugated part stays in position 2 and the prefix goes to the very end, however much stands in between. The two halves are one verb, so neither may be dropped.", ru: "aufstehen в главном предложении разделяется: спрягаемая часть остаётся на втором месте, а приставка уходит в самый конец, сколько бы слов между ними ни стояло. Обе половины — один глагол, и опустить нельзя ни одну.", uk: "aufstehen у головному реченні розділяється: відмінювана частина залишається на другому місці, а префікс іде в самий кінець, скільки б слів між ними не стояло. Обидві половини — одне дієслово, і опустити не можна жодну." }

  - id: trennbar-untrennbar-mc
    outcomes: [trennbar-erkennen]
    type: mc
    focus: trennbar-untrennbar
    prompt: "Welcher Satz ist richtig?"
    options: ["Ich verstehe die Frage nicht, aber ich rufe dich später an.", "Ich stehe die Frage nicht ver, aber ich rufe dich später an.", "Ich verstehe die Frage nicht, aber ich anrufe dich später."]
    correct: 0
    translation: { en: "Which sentence is correct?", ru: "Какое предложение верное?", uk: "Яке речення правильне?" }
    explain: { en: "Both verbs are in the same sentence on purpose. ver- is inseparable and never moves, so verstehe stays whole; an- is separable, so anrufen splits and the an goes to the end. The prefix itself tells you which: be-, ver-, er-, ent- and ge- never split.", ru: "Оба глагола стоят в одном предложении намеренно. ver- — неотделяемая приставка и никогда не двигается, поэтому verstehe остаётся целым; an- отделяемая, поэтому anrufen распадается и an уходит в конец. Ответ подсказывает сама приставка: be-, ver-, er-, ent- и ge- не отделяются никогда.", uk: "Обидва дієслова стоять в одному реченні навмисно. ver- — невідокремлюваний префікс і ніколи не рухається, тому verstehe залишається цілим; an- відокремлюваний, тому anrufen розпадається і an іде в кінець. Відповідь підказує сам префікс: be-, ver-, er-, ent- і ge- не відокремлюються ніколи." }

  # --- modalverben ---
  - id: modal-satzklammer-arbeiten
    outcomes: [modal-satzklammer]
    type: translate
    focus: modal-satzklammer
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "Tomorrow I have to work longer."
    prompt_ru: "Завтра мне придётся работать дольше."
    prompt_uk: "Завтра мені доведеться працювати довше."
    answer: "Morgen muss ich länger arbeiten."
    key_tokens: ["muss", "arbeiten"]
    accept: ["Ich muss morgen länger arbeiten."]
    explain: { en: "The modal bracket holds the sentence together: muss in position 2, the bare infinitive arbeiten at the very end. The infinitive never takes zu after a modal, and it never moves forward next to the modal.", ru: "Модальная рамка держит предложение: muss на втором месте, чистый инфинитив arbeiten — в самом конце. После модального глагола инфинитив не получает zu и не переезжает вперёд, к модальному глаголу.", uk: "Модальна рамка тримає речення: muss на другому місці, чистий інфінітив arbeiten — у самому кінці. Після модального дієслова інфінітив не отримує zu й не переїжджає вперед, до модального дієслова." }

  - id: modal-duerfen-muessen-mc
    outcomes: [modal-erlaubnis-notwendigkeit]
    type: mc
    focus: duerfen-muessen
    prompt: "Auf dem Schild steht: „Hier darf man nicht parken.“ Was bedeutet das?"
    options: ["Parken ist hier verboten.", "Man kann hier parken, muss aber nicht.", "Man muss hier einen Parkschein kaufen."]
    correct: 0
    translation: { en: "A sign says: Hier darf man nicht parken. What does it mean?", ru: "На табличке написано: Hier darf man nicht parken. Что это значит?", uk: "На табличці написано: Hier darf man nicht parken. Що це означає?" }
    explain: { en: "darf nicht is a prohibition — it is not allowed. muss nicht is the opposite kind of statement: it says there is no need. The two are easy to swap because a single English or Russian negation covers both.", ru: "darf nicht — это запрет: нельзя. muss nicht говорит совсем другое: не обязательно. Их легко перепутать, потому что русское «не» покрывает оба случая: «нельзя парковаться» и «не нужно парковаться».", uk: "darf nicht — це заборона: не можна. muss nicht каже зовсім інше: не обов'язково. Їх легко переплутати, бо українське «не» покриває обидва випадки: «не можна паркуватися» і «не потрібно паркуватися»." }

  # --- perfekt-haben-sein ---
  - id: perfekt-hilfsverb-luecke
    outcomes: [perfekt-hilfsverb]
    type: cloze
    focus: haben-sein
    instruction: { en: "Fill in haben or sein in the correct form.", ru: "Вставьте haben или sein в правильной форме.", uk: "Вставте haben або sein у правильній формі." }
    text: "Gestern {{bin}} ich nach Hamburg gefahren. Dort {{habe}} ich Freunde getroffen, und am Abend {{sind}} wir ins Theater gegangen."
    translation: { en: "Yesterday I travelled to Hamburg. There I met friends, and in the evening we went to the theatre.", ru: "Вчера я поехал в Гамбург. Там я встретил друзей, а вечером мы пошли в театр.", uk: "Учора я поїхав до Гамбурга. Там я зустрів друзів, а ввечері ми пішли в театр." }
    explain: { en: "fahren and gehen move the subject from one place to another, so they take sein. treffen does not — it takes haben. The auxiliary follows the verb's meaning, not the sentence's, and it agrees with the subject: ich bin, wir sind.", ru: "fahren и gehen перемещают подлежащее из одной точки в другую, поэтому берут sein. У treffen такого перемещения нет — оно берёт haben. Выбор вспомогательного глагола зависит от значения самого глагола, а не от предложения, и он согласуется с подлежащим: ich bin, wir sind.", uk: "fahren і gehen переміщують підмет з однієї точки в іншу, тому беруть sein. У treffen такого переміщення немає — воно бере haben. Вибір допоміжного дієслова залежить від значення самого дієслова, а не від речення, і він узгоджується з підметом: ich bin, wir sind." }

  - id: perfekt-partizip-luecke
    outcomes: [perfekt-partizip]
    type: cloze
    focus: partizip2-form
    instruction: { en: "Fill in the Partizip II of the verb in brackets.", ru: "Вставьте Partizip II глагола, указанного в скобках.", uk: "Вставте Partizip II дієслова, вказаного в дужках." }
    text: "Wir haben zwei Stunden {{telefoniert}} (telefonieren). Danach hat Ana das Fenster {{aufgemacht}} (aufmachen) und ich habe die Tür {{zugemacht}} (zumachen)."
    translation: { en: "We were on the phone for two hours. After that Ana opened the window and I closed the door.", ru: "Мы проговорили по телефону два часа. Потом Ана открыла окно, а я закрыл дверь.", uk: "Ми проговорили телефоном дві години. Потім Ана відчинила вікно, а я зачинив двері." }
    explain: { en: "Verbs in -ieren build the participle without ge-: telefoniert. In a separable verb the ge- does not disappear — it moves inside, between the prefix and the stem: auf-ge-macht, zu-ge-macht.", ru: "Глаголы на -ieren образуют причастие без ge-: telefoniert. У отделяемых глаголов ge- не исчезает, а перемещается внутрь, между приставкой и корнем: auf-ge-macht, zu-ge-macht.", uk: "Дієслова на -ieren утворюють дієприкметник без ge-: telefoniert. У відокремлюваних дієслів ge- не зникає, а переміщується всередину, між префіксом і коренем: auf-ge-macht, zu-ge-macht." }

  - id: perfekt-satzklammer-tisch
    outcomes: [perfekt-satzklammer]
    type: translate
    focus: perfekt-satzklammer
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "Yesterday we bought a new table."
    prompt_ru: "Вчера мы купили новый стол."
    prompt_uk: "Учора ми купили новий стіл."
    answer: "Gestern haben wir einen neuen Tisch gekauft."
    key_tokens: ["haben", "gekauft"]
    accept: ["Wir haben gestern einen neuen Tisch gekauft."]
    explain: { en: "The Perfekt is a bracket like the modal one: haben in position 2, the participle at the very end. Everything the sentence says goes between them, so the participle is the last word however long the sentence grows.", ru: "Перфект образует такую же рамку, как и модальная: haben на втором месте, причастие — в самом конце. Всё содержание предложения помещается между ними, поэтому причастие остаётся последним словом, как бы длинным предложение ни было.", uk: "Перфект утворює таку саму рамку, як і модальна: haben на другому місці, дієприкметник — у самому кінці. Увесь зміст речення розміщується між ними, тому дієприкметник залишається останнім словом, хоч би яким довгим було речення." }

  # --- alltag-tagesablauf ---
  - id: alltag-zeitpraeposition-luecke
    outcomes: [alltag-zeitpraepositionen]
    type: cloze
    focus: um-am-zeit
    instruction: { en: "um, am or im?", ru: "um, am или im?", uk: "um, am чи im?" }
    text: "Ich stehe {{am}} Montag {{um}} halb sieben auf, aber {{im}} Sommer schlafe ich länger."
    translation: { en: "On Monday I get up at half past six, but in summer I sleep longer.", ru: "В понедельник я встаю в половине седьмого, а летом сплю дольше.", uk: "У понеділок я встаю о пів на сьому, а влітку сплю довше." }
    explain: { en: "am for days, um for clock times, im for months and seasons. Watch halb sieben as well: German counts towards the coming hour, so it means 6:30, not 7:30.", ru: "am — для дней, um — для времени по часам, im — для месяцев и времён года. Обратите внимание и на halb sieben: немецкий отсчитывает к наступающему часу, поэтому это 6:30, а не 7:30.", uk: "am — для днів, um — для часу за годинником, im — для місяців і пір року. Зверніть увагу й на halb sieben: німецька відлічує до години, що настає, тому це 6:30, а не 7:30." }

  - id: alltag-einkaufen-nach-arbeit
    outcomes: [alltag-beschreiben]
    type: translate
    focus: trennbar-wortstellung
    instruction: { en: "Translate into German. Use einkaufen.", ru: "Переведите на немецкий. Используйте einkaufen.", uk: "Перекладіть німецькою. Вживайте einkaufen." }
    prompt_en: "After work I go shopping every day."
    prompt_ru: "После работы я каждый день хожу за покупками."
    prompt_uk: "Після роботи я щодня ходжу за покупками."
    answer: "Nach der Arbeit kaufe ich jeden Tag ein."
    key_tokens: ["kaufe", "ein"]
    accept: ["Ich kaufe nach der Arbeit jeden Tag ein."]
    explain: { en: "Two things at once: nach takes the dative (nach der Arbeit), and einkaufen splits, so the ein lands after the time phrase at the end of the clause. The prefix is not optional — kaufen on its own means to buy something specific.", ru: "Здесь сразу два момента: nach требует датива (nach der Arbeit), а einkaufen разделяется, поэтому ein оказывается после обстоятельства времени, в конце предложения. Приставка не факультативна: kaufen без неё значит «покупать что-то конкретное».", uk: "Тут одразу два моменти: nach вимагає давального (nach der Arbeit), а einkaufen розділяється, тому ein опиняється після обставини часу, у кінці речення. Префікс не факультативний: kaufen без нього означає «купувати щось конкретне»." }

  # --- termine-vereinbaren ---
  - id: termine-zeit-hoeren
    outcomes: [termine-zeit-verstehen]
    type: audio-comprehension
    source:
      kind: tts
      rate: 0.85
      turns:
        - { speaker: "Praxis", text: "Praxis Dr. Weber, guten Tag." }
        - { speaker: "Herr Roth", text: "Guten Tag, ich hätte gern einen Termin. Geht es am Dienstag?" }
        - { speaker: "Praxis", text: "Am Dienstag ist leider alles voll. Am Mittwoch um Viertel nach zehn wäre noch etwas frei." }
        - { speaker: "Herr Roth", text: "Mittwoch passt mir gut. Vielen Dank!" }
    question: "Wann hat Herr Roth den Termin?"
    options: ["Am Mittwoch um 10:15 Uhr.", "Am Dienstag um 10:15 Uhr.", "Am Mittwoch um 10:45 Uhr."]
    correct: 0
    translation: { en: "When is Herr Roth's appointment?", ru: "На какое время назначен приём у господина Рота?", uk: "На який час призначено прийом у пана Рота?" }
    explain: { en: "Tuesday is refused — am Dienstag ist leider alles voll — and Wednesday is offered instead. Viertel nach zehn is a quarter past ten, that is 10:15; a quarter to would be Viertel vor.", ru: "Вторник отклоняют — am Dienstag ist leider alles voll — и предлагают среду. Viertel nach zehn — это четверть одиннадцатого, то есть 10:15; «без четверти» было бы Viertel vor.", uk: "Вівторок відхиляють — am Dienstag ist leider alles voll — і пропонують середу. Viertel nach zehn — це чверть на одинадцяту, тобто 10:15; «за чверть» було б Viertel vor." }

  - id: termine-hoeflich-bitten
    outcomes: [termine-hoeflich-telefonieren]
    type: translate
    focus: hoeflich-konjunktiv
    instruction: { en: "Translate into German. Use the polite Sie form.", ru: "Переведите на немецкий. Используйте вежливую форму Sie.", uk: "Перекладіть німецькою. Вживайте ввічливу форму Sie." }
    prompt_en: "Could you give me an appointment on Thursday?"
    prompt_ru: "Не могли бы вы записать меня на четверг?"
    prompt_uk: "Чи не могли б ви записати мене на четвер?"
    answer: "Könnten Sie mir am Donnerstag einen Termin geben?"
    key_tokens: ["Könnten"]
    explain: { en: "könnten is the polite request form and is learned as a chunk — no paradigm to work out. Note that it is not the same as können: Können Sie …? asks whether you are able to, könnten Sie …? asks a favour.", ru: "könnten — вежливая форма просьбы, которая заучивается целиком, без разбора парадигмы. Обратите внимание, что это не то же самое, что können: Können Sie …? спрашивает о возможности, а Könnten Sie …? — это просьба.", uk: "könnten — ввічлива форма прохання, яка заучується цілком, без розбору парадигми. Зверніть увагу, що це не те саме, що können: Können Sie …? питає про можливість, а Könnten Sie …? — це прохання." }

  # --- wohnen-umzug ---
  - id: wohnen-wo-wohin-luecke
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    instruction: { en: "Fill in the article in the correct case.", ru: "Вставьте артикль в правильном падеже.", uk: "Вставте артикль у правильному відмінку." }
    text: "Der Schlüssel liegt auf {{dem}} Tisch. Leg ihn bitte in {{die}} Schublade."
    translation: { en: "The key is lying on the table. Please put it in the drawer.", ru: "Ключ лежит на столе. Положи его, пожалуйста, в ящик.", uk: "Ключ лежить на столі. Поклади його, будь ласка, у шухляду." }
    explain: { en: "The same prepositions take two cases. Ask Wo? and the answer is a position, so dative: auf dem Tisch. Ask Wohin? and the answer is a direction, so accusative: in die Schublade. The verb gives it away — liegen is a position, legen is a movement.", ru: "Одни и те же предлоги управляют двумя падежами. Вопрос Wo? — это положение, значит датив: auf dem Tisch. Вопрос Wohin? — это направление, значит аккузатив: in die Schublade. Подсказывает сам глагол: liegen — положение, legen — перемещение.", uk: "Ті самі прийменники керують двома відмінками. Питання Wo? — це положення, отже давальний: auf dem Tisch. Питання Wohin? — це напрямок, отже акузатив: in die Schublade. Підказує саме дієслово: liegen — положення, legen — переміщення." }

  - id: wohnen-anzeige-mc
    outcomes: [wohnungsanzeige-lesen]
    type: mc
    prompt: "Sie lesen eine Anzeige: „Helle 3-Zimmer-Wohnung, 78 m², Erdgeschoss, mit Balkon. Kaltmiete 640 Euro plus 150 Euro Nebenkosten. Keine Haustiere. Frei ab 1. September.“ Was ist richtig?"
    options: ["Die Wohnung kostet insgesamt 790 Euro im Monat.", "Die Wohnung kostet insgesamt 640 Euro im Monat.", "Man darf in der Wohnung eine Katze halten."]
    correct: 0
    translation: { en: "You read a flat advertisement. What is correct?", ru: "Вы читаете объявление о квартире. Что верно?", uk: "Ви читаєте оголошення про квартиру. Що правильно?" }
    explain: { en: "Kaltmiete is the rent without heating and utilities, so the real monthly cost is Kaltmiete plus Nebenkosten: 640 + 150 = 790. This is the single most useful thing to know when reading German flat ads. Keine Haustiere rules the cat out.", ru: "Kaltmiete — это плата без отопления и коммунальных услуг, поэтому реальная сумма в месяц складывается из Kaltmiete и Nebenkosten: 640 + 150 = 790. Это самое полезное, что нужно знать при чтении немецких объявлений о квартирах. Keine Haustiere исключает кошку.", uk: "Kaltmiete — це плата без опалення та комунальних послуг, тому реальна сума на місяць складається з Kaltmiete та Nebenkosten: 640 + 150 = 790. Це найкорисніше, що треба знати, читаючи німецькі оголошення про квартири. Keine Haustiere виключає кішку." }

