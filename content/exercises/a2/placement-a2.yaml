    type: translate
    focus: nebensatz-verbende
    instruction: { en: "Translate into German. Use weil.", ru: "Переведите на немецкий. Используйте weil.", uk: "Перекладіть німецькою. Вживайте weil." }
    prompt_en: "I can't come because I'm working today."
    prompt_ru: "Я не могу прийти, потому что сегодня работаю."
    prompt_uk: "Я не можу прийти, бо сьогодні працюю."
