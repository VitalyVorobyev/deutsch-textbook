  - id: nebensatz-vorfeld-wenn
    outcomes: [nebensatz-vorfeld-stellung]
    type: translate
    focus: nebensatz-vorfeld
    instruction: { en: "Translate into German. Begin with the wenn-clause.", ru: "Переведите на немецкий. Начните с придаточного с wenn.", uk: "Перекладіть німецькою. Почніть з підрядного з wenn." }
    prompt_en: "When I have time, I read a lot."
    prompt_ru: "Когда у меня есть время, я много читаю."
    prompt_uk: "Коли в мене є час, я багато читаю."
    answer: "Wenn ich Zeit habe, lese ich viel."
    key_tokens: ["habe", "lese"]
    explain: { en: "A fronted subordinate clause is one single element, so it fills position 1 on its own and the main verb comes immediately after the comma: …, lese ich viel. Writing …, ich lese viel is the standard mistake — the subject cannot come first as well.", ru: "Вынесенное вперёд придаточное — это один член предложения, поэтому оно целиком занимает первое место, и главный глагол идёт сразу после запятой: …, lese ich viel. Вариант …, ich lese viel — типичная ошибка: подлежащее не может стоять ещё и перед глаголом.", uk: "Винесене вперед підрядне — це один член речення, тому воно цілком займає перше місце, і головне дієслово йде одразу після коми: …, lese ich viel. Варіант …, ich lese viel — типова помилка: підмет не може стояти ще й перед дієсловом." }

  # --- infinitiv-mit-zu ---
  - id: infinitiv-zu-vorhaben
    outcomes: [plan-zu-infinitiv]
    type: translate
    focus: zu-infinitiv
    instruction: { en: "Translate into German. Use vorhaben.", ru: "Переведите на немецкий. Используйте vorhaben.", uk: "Перекладіть німецькою. Вживайте vorhaben." }
    prompt_en: "I'm planning to call my sister tomorrow."
    prompt_ru: "Завтра я собираюсь позвонить сестре."
    prompt_uk: "Завтра я збираюся зателефонувати сестрі."
    answer: "Ich habe vor, morgen meine Schwester anzurufen."
    key_tokens: ["vor", "anzurufen"]
    explain: { en: "Two separable verbs at once. vorhaben splits, so vor goes to the end of the main clause and the comma follows. anrufen keeps its zu inside the word — an-zu-rufen — because a separable verb wraps around it rather than putting it in front.", ru: "Здесь сразу два отделяемых глагола. vorhaben разделяется, поэтому vor уходит в конец главного предложения, а за ним идёт запятая. У anrufen zu стоит внутри слова — an-zu-rufen: отделяемый глагол обхватывает zu, а не пропускает его вперёд.", uk: "Тут одразу два відокремлювані дієслова. vorhaben розділяється, тому vor іде в кінець головного речення, а за ним кома. У anrufen zu стоїть усередині слова — an-zu-rufen: відокремлюване дієслово обхоплює zu, а не пропускає його вперед." }

  - id: um-zu-oesterreich
    outcomes: [zweck-um-zu]
    type: translate
    focus: um-zu-zweck
    instruction: { en: "Translate into German. Use um … zu.", ru: "Переведите на немецкий. Используйте um … zu.", uk: "Перекладіть німецькою. Вживайте um … zu." }
    prompt_en: "I'm learning German in order to work in Austria."
    prompt_ru: "Я учу немецкий, чтобы работать в Австрии."
    prompt_uk: "Я вчу німецьку, щоб працювати в Австрії."
    answer: "Ich lerne Deutsch, um in Österreich zu arbeiten."
    key_tokens: ["um", "zu", "arbeiten"]
    explain: { en: "Purpose is a two-ended frame: um opens the clause and zu stands directly in front of the infinitive at the end. Both ends are required — um alone is not enough, and für plus an infinitive is not German at all.", ru: "Цель выражается двусторонней рамкой: um открывает придаточное, а zu стоит прямо перед инфинитивом в конце. Нужны оба конца: одного um мало, а конструкции für с инфинитивом в немецком просто нет.", uk: "Мета виражається двобічною рамкою: um відкриває підрядне, а zu стоїть прямо перед інфінітивом у кінці. Потрібні обидва кінці: самого um замало, а конструкції für з інфінітивом у німецькій просто немає." }

  # --- relativsaetze ---
  - id: relativ-kasus-luecke
    outcomes: [relativ-kasus-waehlen]
    type: cloze
    focus: relativpronomen-kasus
    instruction: { en: "Fill in the relative pronoun.", ru: "Вставьте относительное местоимение.", uk: "Вставте відносний займенник." }
    text: "Das ist der Mann, {{der}} nebenan wohnt. Und das ist der Kollege, {{den}} ich gestern getroffen habe."
    translation: { en: "That is the man who lives next door. And that is the colleague whom I met yesterday.", ru: "Это тот мужчина, который живёт по соседству. А это коллега, которого я вчера встретил.", uk: "Це той чоловік, який живе по сусідству. А це колега, якого я вчора зустрів." }
    explain: { en: "Both nouns outside are masculine singular, so the form is decided entirely by the job the pronoun does inside its own clause. In the first it is the subject of wohnt, so der; in the second it is the object of getroffen habe, so den.", ru: "Оба существительных снаружи — мужского рода единственного числа, поэтому форму определяет исключительно роль местоимения внутри его собственного придаточного. В первом оно подлежащее при wohnt — значит der; во втором дополнение при getroffen habe — значит den.", uk: "Обидва іменники ззовні — чоловічого роду однини, тому форму визначає виключно роль займенника всередині його власного підрядного. У першому воно підмет при wohnt — отже der; у другому додаток при getroffen habe — отже den." }

  - id: relativ-kollege-uebersetzen
    outcomes: [person-beschreiben-relativ]
    type: translate
    focus: relativpronomen-kasus
    instruction: { en: "Translate into German. Use a relative clause.", ru: "Переведите на немецкий. Используйте придаточное определительное.", uk: "Перекладіть німецькою. Використайте підрядне означальне." }
    prompt_en: "My colleague who works here is very nice."
    prompt_ru: "Мой коллега, который здесь работает, очень приятный."
    prompt_uk: "Мій колега, який тут працює, дуже приємний."
    answer: "Mein Kollege, der hier arbeitet, ist sehr nett."
    key_tokens: ["der", "arbeitet"]
    explain: { en: "The relative clause is fenced off by commas on both sides, and its verb goes to the end: der hier arbeitet. The main clause simply continues afterwards — ist sehr nett — as if the clause in the middle were not there.", ru: "Придаточное определительное с обеих сторон отделяется запятыми, а его глагол уходит в конец: der hier arbeitet. Главное предложение затем просто продолжается — ist sehr nett, — как если бы вставки посередине не было.", uk: "Підрядне означальне з обох боків відокремлюється комами, а його дієслово йде в кінець: der hier arbeitet. Головне речення потім просто продовжується — ist sehr nett, — ніби вставки посередині не було." }

  # --- biografie-erfahrungen ---
  - id: biografie-praeteritum-luecke
    outcomes: [praeteritum-war-hatte]
    type: cloze
    focus: praeteritum-sein-haben
    instruction: { en: "Fill in war, hatte or konnte in the correct form.", ru: "Вставьте war, hatte или konnte в правильной форме.", uk: "Вставте war, hatte або konnte у правильній формі." }
    text: "Als Kind {{war}} ich oft krank. Ich {{hatte}} keine Geschwister und {{konnte}} noch nicht schwimmen."
    translation: { en: "As a child I was often ill. I had no brothers or sisters and could not swim yet.", ru: "В детстве я часто болел. У меня не было братьев и сестёр, и плавать я ещё не умел.", uk: "У дитинстві я часто хворів. У мене не було братів і сестер, і плавати я ще не вмів." }
    explain: { en: "sein, haben and the modals are the verbs German really does put in the Präteritum in speech — war, hatte, konnte — where every other verb would use the Perfekt. Nobody says ich bin krank gewesen when they can say ich war krank.", ru: "sein, haben и модальные глаголы — это те глаголы, которые немецкий действительно ставит в Präteritum в устной речи: war, hatte, konnte, — тогда как все остальные употребляются в Perfekt. Никто не скажет ich bin krank gewesen, если можно сказать ich war krank.", uk: "sein, haben і модальні дієслова — це ті дієслова, які німецька справді ставить у Präteritum в усному мовленні: war, hatte, konnte, — тоді як усі інші вживаються в Perfekt. Ніхто не скаже ich bin krank gewesen, якщо можна сказати ich war krank." }

  - id: biografie-stationen-uebersetzen
    outcomes: [lebensstationen-ordnen]
    type: translate
    focus: partizip2-form
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "After school he studied in Munich and then worked in Berlin."
    prompt_ru: "После школы он учился в Мюнхене, а потом работал в Берлине."
    prompt_uk: "Після школи він навчався в Мюнхені, а потім працював у Берліні."
    answer: "Nach der Schule hat er in München studiert und dann in Berlin gearbeitet."
    key_tokens: ["studiert", "gearbeitet"]
    explain: { en: "Two participles, two different patterns. studieren ends in -ieren, so it takes no ge-: studiert. arbeiten is a regular verb whose stem ends in -t, so it takes both the ge- and an -et: gearbeitet. One auxiliary at the front serves both.", ru: "Два причастия — две разные модели. studieren оканчивается на -ieren, поэтому ge- не получает: studiert. arbeiten — правильный глагол с основой на -t, поэтому получает и ge-, и -et: gearbeitet. Один вспомогательный глагол в начале обслуживает оба.", uk: "Два дієприкметники — дві різні моделі. studieren закінчується на -ieren, тому ge- не отримує: studiert. arbeiten — правильне дієслово з основою на -t, тому отримує і ge-, і -et: gearbeitet. Одне допоміжне дієслово на початку обслуговує обидва." }

  # --- verbindungen-folgen ---
  - id: verbindungen-deshalb-uebersetzen
    outcomes: [folge-ausdruecken]
    type: translate
    focus: konjunktionaladverb-inversion
    instruction: { en: "Translate into German. Use deshalb.", ru: "Переведите на немецкий. Используйте deshalb.", uk: "Перекладіть німецькою. Вживайте deshalb." }
    prompt_en: "It was raining, so we stayed at home."
    prompt_ru: "Шёл дождь, поэтому мы остались дома."
    prompt_uk: "Ішов дощ, тому ми залишилися вдома."
    answer: "Es hat geregnet, deshalb sind wir zu Hause geblieben."
    key_tokens: ["deshalb", "sind"]
    explain: { en: "deshalb is an adverb, not a conjunction: it takes position 1 in its own clause, so the verb has to come second and the subject moves behind it — deshalb sind wir. Writing deshalb wir sind treats it like weil, which it is not.", ru: "deshalb — наречие, а не союз: оно занимает первое место в своём предложении, поэтому глагол обязан стоять вторым, а подлежащее уходит за него — deshalb sind wir. Вариант deshalb wir sind обращается с ним как с weil, чем оно не является.", uk: "deshalb — прислівник, а не сполучник: воно займає перше місце у своєму реченні, тому дієслово мусить стояти другим, а підмет іде за нього — deshalb sind wir. Варіант deshalb wir sind поводиться з ним як із weil, чим воно не є." }

  - id: verbindungen-als-wenn-luecke
    outcomes: [vergangenheit-erzaehlen]
    type: cloze
    focus: als-wenn-vergangenheit
    instruction: { en: "als or wenn?", ru: "als или wenn?", uk: "als чи wenn?" }
    text: "Ich bin nach Berlin gezogen, {{als}} ich zwölf war. Früher habe ich immer gelacht, {{wenn}} mein Opa Geschichten erzählt hat."
    translation: { en: "I moved to Berlin when I was twelve. I always used to laugh when my grandpa told stories.", ru: "Я переехал в Берлин, когда мне было двенадцать. Раньше я всегда смеялся, когда дедушка рассказывал истории.", uk: "Я переїхав до Берліна, коли мені було дванадцять. Раніше я завжди сміявся, коли дідусь розповідав історії." }
    explain: { en: "In the past, als marks a single occasion that happened once, and wenn a situation that repeated. The signal words give it away: zwölf war happened once, while immer says the laughing happened again and again. Neither English nor Russian marks this difference at all.", ru: "В прошедшем времени als указывает на единичный случай, а wenn — на повторявшуюся ситуацию. Подсказывают слова-сигналы: zwölf war было один раз, а immer говорит, что смех повторялся. Ни английский, ни русский этого различия не выражают — «когда» покрывает оба случая.", uk: "У минулому часі als вказує на одиничний випадок, а wenn — на ситуацію, що повторювалася. Підказують слова-сигнали: zwölf war було один раз, а immer каже, що сміх повторювався. Ні англійська, ні українська цієї різниці не виражають — «коли» покриває обидва випадки." }

  # --- man-und-besitz ---
  - id: man-indefinit-luecke
    outcomes: [regeln-mit-man]
    type: cloze
    focus: indefinitpronomen
    instruction: { en: "Fill in man, niemand or nichts.", ru: "Вставьте man, niemand или nichts.", uk: "Вставте man, niemand або nichts." }
    text: "In der Bibliothek darf {{man}} nicht essen. Gestern war {{niemand}} da, und ich habe {{nichts}} gefunden."
    translation: { en: "You are not allowed to eat in the library. Yesterday nobody was there, and I found nothing.", ru: "В библиотеке нельзя есть. Вчера там никого не было, и я ничего не нашёл.", uk: "У бібліотеці не можна їсти. Учора там нікого не було, і я нічого не знайшов." }
    explain: { en: "man is a subject German cannot leave out, and it takes the er-form of the verb. niemand and nichts already carry the negation themselves, so no second negative word joins them — ich habe nichts gefunden, never ich habe nicht nichts gefunden.", ru: "man — подлежащее, которое немецкий опустить не может, и глагол при нём стоит в форме er. niemand и nichts уже содержат отрицание сами по себе, поэтому второе отрицание к ним не добавляется: ich habe nichts gefunden, а не «я ничего не нашёл» с двумя отрицаниями, как по-русски.", uk: "man — підмет, який німецька опустити не може, і дієслово при ньому стоїть у формі er. niemand і nichts уже містять заперечення самі по собі, тому друге заперечення до них не додається: ich habe nichts gefunden, а не «я нічого не знайшов» із двома запереченнями, як українською." }

  - id: besitz-annas-auto
    outcomes: [besitz-ausdruecken]
    type: translate
    focus: genitiv-eigenname
    instruction: { en: "Translate into German.", ru: "Переведите на немецкий.", uk: "Перекладіть німецькою." }
    prompt_en: "That is Anna's car."
    prompt_ru: "Это машина Анны."
    prompt_uk: "Це машина Анни."
    answer: "Das ist Annas Auto."
    key_tokens: ["Annas"]
    accept: ["Das ist das Auto von Anna."]
    explain: { en: "A name takes a plain -s and no apostrophe: Annas Auto, not Anna's Auto. The possessor comes first, exactly as in English. The spoken alternative von + dative is equally correct and is accepted here.", ru: "К имени добавляется просто -s, без апострофа: Annas Auto, а не Anna's Auto. Владелец стоит впереди. Разговорный вариант von + датив столь же правилен и здесь тоже принимается.", uk: "До імені додається просто -s, без апострофа: Annas Auto, а не Anna's Auto. Власник стоїть попереду. Розмовний варіант von + давальний так само правильний і тут теж приймається." }

