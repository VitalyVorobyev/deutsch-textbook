    explain: { en: "Built into a longer sentence, a question stops being a question in its word order: the verb leaves position 2 and goes to the end. Was bedeutet dieses Wort? on its own becomes …, was dieses Wort bedeutet.", ru: "Встроенный в более длинное предложение вопрос перестаёт быть вопросом по порядку слов: глагол уходит со второго места в конец. Отдельный вопрос Was bedeutet dieses Wort? превращается в …, was dieses Wort bedeutet.", uk: "Вбудоване в довше речення питання перестає бути питанням за порядком слів: дієслово йде з другого місця в кінець. Окреме питання Was bedeutet dieses Wort? перетворюється на …, was dieses Wort bedeutet." }

