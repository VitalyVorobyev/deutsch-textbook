topic: modalverben
role: pretest
items:
  - id: pre-infinitiv-ende
    outcomes: [modal-satzklammer]
    type: mc
    focus: modal-satzklammer
    prompt: "Welcher Satz ist richtig?"
    options:
      - "Ich muss arbeiten heute lange."
      - "Ich muss heute lange arbeiten."
      - "Ich heute muss lange arbeiten."
    correct: 1
    translation:
      en: Which sentence is correct? (I have to work long hours today.)
      ru: Какое предложение построено правильно? (Мне сегодня нужно долго работать.)
      uk: Яке речення побудовано правильно? (Мені сьогодні треба довго працювати.)
    explain:
      en: "A modal verb builds die Satzklammer (sentence bracket): the modal sits in position 2, and the second verb goes to the very end as an infinitive — „Ich muss heute lange arbeiten.“ Nothing may come after the infinitive."
      ru: "Модальный глагол создаёт die Satzklammer (глагольную рамку): он стоит на втором месте, а второй глагол уходит в самый конец предложения в форме инфинитива — „Ich muss heute lange arbeiten.“ После инфинитива ничего стоять не может."
      uk: "Модальне дієслово створює die Satzklammer (дієслівну рамку): воно стоїть на другому місці, а друге дієслово йде в самий кінець речення у формі інфінітива — „Ich muss heute lange arbeiten.“ Після інфінітива нічого стояти не може."

  - id: pre-sie-will
    outcomes: [modal-satzklammer]
    type: mc
    focus: modal-konjugation
    prompt: "Meine Schwester ___ ein neues Fahrrad kaufen."
    options: ["will", "willt", "wollt"]
    correct: 0
    translation:
      en: My sister wants to buy a new bicycle.
      ru: Моя сестра хочет купить новый велосипед.
      uk: Моя сестра хоче купити новий велосипед.
    explain:
      en: "In the singular the ich- and er/sie/es-forms of a modal verb are identical and take no -t: ich will — sie will. „wollt“ does exist, but only for ihr: ihr wollt."
      ru: "В единственном числе формы ich и er/sie/es у модальных глаголов совпадают и не имеют окончания -t: ich will — sie will. Форма „wollt“ существует, но только для ihr: ihr wollt."
      uk: "В однині форми ich та er/sie/es у модальних дієслів збігаються і не мають закінчення -t: ich will — sie will. Форма „wollt“ існує, але тільки для ihr: ihr wollt."

  - id: pre-darf-nicht
    outcomes: [modal-satzklammer]
    type: mc
    focus: duerfen-muessen
    prompt: "Im Krankenhaus ___ man nicht laut sprechen. (Es ist verboten.)"
    options: ["muss", "kann", "darf"]
    correct: 2
    translation:
      en: In the hospital you must not speak loudly. (It is forbidden.)
      ru: В больнице нельзя громко разговаривать. (Это запрещено.)
      uk: У лікарні не можна голосно розмовляти. (Це заборонено.)
    explain:
      en: "Prohibition is dürfen + nicht: „man darf nicht“ = it is forbidden. Beware the English false friend: 'must not' is NOT „muss nicht“ — „muss nicht“ means “don't have to”. A real prohibition is always darf nicht."
      ru: "Запрет — это dürfen + nicht: „man darf nicht“ = запрещено. „muss nicht“ означает совсем другое — «не обязан, необязательно». Русское «нельзя» — это всегда darf nicht и никогда не muss nicht."
      uk: "Заборона — це dürfen + nicht: „man darf nicht“ = заборонено. „muss nicht“ означає зовсім інше — «не зобов'язаний, не обов'язково». Українське «не можна» — це завжди darf nicht і ніколи не muss nicht."
