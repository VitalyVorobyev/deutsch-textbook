topic: biografie-erfahrungen
role: pretest
title:
  en: "Pretest — which past does German speak?"
  ru: "Предтест — каким прошедшим говорит немецкий?"
  uk: "Передтест — яким минулим говорить німецька?"
items:
  - id: pretest-war
    outcomes: [praeteritum-war-hatte]
    type: mc
    focus: praeteritum-sein-haben
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    prompt: "Vor zwei Jahren ___ ich zwei Wochen in Polen."
    options: ["war", "bin", "habe"]
    correct: 0
    translation:
      en: "Two years ago I was in Poland for two weeks."
      ru: "Два года назад я две недели был в Польше."
      uk: "Два роки тому я два тижні був у Польщі."
    explain:
      en: "For neutral productive German, the ordinary choice here is the Präteritum of sein: ich war, du warst, er war. The Perfekt Ich bin zwei Wochen in Polen gewesen is grammatical and its frequency varies regionally, but it is not the target of this A2 pattern. bin and habe alone are present-tense forms. Note also that vor zwei Jahren fills position 1, so the verb follows it."
      ru: "Для нейтральной продуктивной речи здесь выбирайте Präteritum от sein: ich war, du warst, er war. Perfekt Ich bin zwei Wochen in Polen gewesen грамматичен, а его частотность зависит от региона, но это не целевая модель A2. Формы bin и habe сами по себе стоят в настоящем времени. Оборот vor zwei Jahren занимает позицию 1, поэтому за ним идёт глагол."
      uk: "Для нейтрального продуктивного мовлення тут обирайте Präteritum від sein: ich war, du warst, er war. Perfekt Ich bin zwei Wochen in Polen gewesen граматичний, а його частотність залежить від регіону, але це не цільова модель A2. Форми bin і habe самі по собі стоять у теперішньому часі. Зворот vor zwei Jahren займає позицію 1, тому за ним іде дієслово."

  - id: pretest-konnte
    outcomes: [praeteritum-war-hatte]
    type: mc
    focus: praeteritum-sein-haben
    instruction:
      en: "The sentence is about last year. Guess the form."
      ru: "Речь о прошлом годе. Угадайте форму."
      uk: "Ідеться про минулий рік. Вгадайте форму."
    prompt: "Letztes Jahr ___ ich nicht nach Hause fahren."
    options: ["konnte", "könnte", "gekonnt"]
    correct: 0
    translation:
      en: "Last year I could not travel home."
      ru: "В прошлом году я не мог поехать домой."
      uk: "Минулого року я не міг поїхати додому."
    explain:
      en: "The productive A2 choice is the Präteritum: können → konnte, müssen → musste, wollen → wollte. konnte reports a fact about last year; könnte means 'would be able to' and expresses a possibility. gekonnt cannot fill this finite-verb gap. A full standard Perfekt with another verb would use the replacement infinitive: Ich habe nicht nach Hause fahren können."
      ru: "Продуктивная модель A2 — Präteritum: können → konnte, müssen → musste, wollen → wollte. konnte сообщает факт о прошлом, а könnte значит «мог бы» и выражает возможность. gekonnt не может заполнить позицию спрягаемого глагола. Полный стандартный Perfekt с другим глаголом использовал бы Ersatzinfinitiv: Ich habe nicht nach Hause fahren können."
      uk: "Продуктивна модель A2 — Präteritum: können → konnte, müssen → musste, wollen → wollte. konnte повідомляє факт про минуле, а könnte означає «міг би» й виражає можливість. gekonnt не може заповнити позицію відмінюваного дієслова. Повний стандартний Perfekt з іншим дієсловом використав би Ersatzinfinitiv: Ich habe nicht nach Hause fahren können."

  - id: pretest-erzaehlung
    outcomes: [lebensstationen-ordnen]
    type: mc
    focus: praeteritum-sein-haben
    instruction:
      en: "A friend asks what you did last year. Which answer would a German actually say?"
      ru: "Друг спрашивает, чем вы занимались в прошлом году. Что немец сказал бы на самом деле?"
      uk: "Друг запитує, чим ви займалися минулого року. Що німець сказав би насправді?"
    prompt: "Und was hast du letztes Jahr gemacht? — „…“"
    options:
      - "Ich habe in Berlin gearbeitet, aber ich hatte wenig Zeit."
      - "Ich arbeitete in Berlin, aber ich hatte wenig Zeit."
      - "Ich habe in Berlin gearbeitet, aber ich bin wenig Zeit gehabt."
    correct: 0
    translation:
      en: "And what did you do last year? — 'I worked in Berlin, but I had little time.'"
      ru: "А чем ты занимался в прошлом году? — «Я работал в Берлине, но времени у меня было мало»."
      uk: "А чим ти займався минулого року? — «Я працював у Берліні, але часу в мене було мало»."
    explain:
      en: "For the neutral conversational pattern taught here, use Perfekt with arbeiten (ich habe gearbeitet) and Präteritum with haben (ich hatte), so option 1 is the target. Option 2 is grammatical Präteritum and may occur depending on register and region, but it is not this lesson's productive default. Option 3 uses the wrong auxiliary: the Perfekt of haben is formed with haben, not sein."
      ru: "В нейтральной разговорной модели этого урока с arbeiten используйте Perfekt (ich habe gearbeitet), а с haben — Präteritum (ich hatte), поэтому цель — вариант 1. Вариант 2 грамматичен и может встречаться в зависимости от регистра и региона, но это не продуктивная модель урока. В варианте 3 неверный вспомогательный глагол: Perfekt от haben образуется с haben, не с sein."
      uk: "У нейтральній розмовній моделі цього уроку з arbeiten використовуйте Perfekt (ich habe gearbeitet), а з haben — Präteritum (ich hatte), тому ціль — варіант 1. Варіант 2 граматичний і може траплятися залежно від регістру й регіону, але це не продуктивна модель уроку. У варіанті 3 неправильне допоміжне дієслово: Perfekt від haben утворюється з haben, не з sein."
