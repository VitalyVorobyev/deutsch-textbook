topic: wohnen-umzug
role: drill
title:
  en: Drill — Wo? or Wohin?
  ru: Тренажёр — Wo? или Wohin?
  uk: Тренажер — Wo? чи Wohin?
items:
  - id: uebersetzen-bahnhof
    outcomes: [wo-wohin-position]
    type: translate
    focus: wo-wohin
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "I am waiting at the station."
    prompt_ru: "Я жду на вокзале."
    prompt_uk: "Я чекаю на вокзалі."
    answer: "Ich warte am Bahnhof."
    key_tokens: ["am"]
    explain:
      en: "The station phrase names where the waiting happens: Wo? takes the dative, and an + dem contracts to am. English hides the case difference, so run the question test: at the station, not to the station."
      ru: "Группа с вокзалом называет место ожидания: Wo? требует Dativ, an + dem стягивается в am. Работает то же различие, что и в русском: «на вокзале» (где?), а не «на вокзал» (куда?)."
      uk: "Група з вокзалом називає місце очікування: Wo? вимагає Dativ, an + dem стягується в am. Працює те саме розрізнення, що й в українській: «на вокзалі» (де?), а не «на вокзал» (куди?)."
  - id: uebersetzen-stadt
    outcomes: [wo-wohin-position]
    type: translate
    focus: wo-wohin
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "On Saturday we are driving into the city."
    prompt_ru: "В субботу мы едем в город."
    prompt_uk: "У суботу ми їдемо в місто."
    answer: "Am Samstag fahren wir in die Stadt."
    accept:
      - "Wir fahren am Samstag in die Stadt."
    key_tokens: ["die"]
    explain:
      en: "The city is the destination: Wohin? takes the accusative — in die Stadt. The feminine article shows the case here: in der Stadt would name the place where the driving happens."
      ru: "Город здесь цель: Wohin? требует Akkusativ — in die Stadt. Падеж виден по артиклю женского рода: in der Stadt называло бы место, где происходит поездка."
      uk: "Місто тут є ціллю: Wohin? вимагає Akkusativ — in die Stadt. Відмінок видно за артиклем жіночого роду: in der Stadt називало б місце, де відбувається поїздка."
  - id: uebersetzen-garten-wo
    outcomes: [wo-wohin-position]
    type: translate
    focus: wo-wohin
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "The children are in the garden."
    prompt_ru: "Дети в саду."
    prompt_uk: "Діти в саду."
    answer: "Die Kinder sind im Garten."
    key_tokens: ["im"]
    explain:
      en: "The phrase names where the children are: Wo? + Dativ, and in + dem contracts to im — im Garten."
      ru: "Находиться где-то — это положение: Wo? + Dativ, in + dem стягивается в im — im Garten, ровно как русское «в саду» (предложный падеж)."
      uk: "Перебувати десь — це положення: Wo? + Dativ, in + dem стягується в im — im Garten, рівно як українське «в саду» (місцевий відмінок)."
  - id: uebersetzen-garten-wohin
    outcomes: [wo-wohin-position]
    type: translate
    focus: wo-wohin
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "The children are running into the garden."
    prompt_ru: "Дети бегут в сад."
    prompt_uk: "Діти біжать у сад."
    answer: "Die Kinder laufen in den Garten."
    key_tokens: ["den"]
    explain:
      en: "The same garden, but now a direction: Wohin? + Akkusativ — in den Garten. The pair with the previous sentence is the whole rule: im Garten (where) vs in den Garten (where to)."
      ru: "Тот же сад, но теперь направление: Wohin? + Akkusativ — in den Garten. Пара с предыдущим предложением и есть всё правило: im Garten («в саду») против in den Garten («в сад»)."
      uk: "Той самий сад, але тепер напрямок: Wohin? + Akkusativ — in den Garten. Пара з попереднім реченням і є все правило: im Garten («в саду») проти in den Garten («у сад»)."
  - id: cloze-buero-cafe
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    text: "Ich arbeite {{im}} Büro. Nach der Arbeit gehe ich {{ins}} Café."
    translation:
      en: "I work at the office. After work I go to the café."
      ru: "Я работаю в офисе. После работы я иду в кафе."
      uk: "Я працюю в офісі. Після роботи я йду в кафе."
    explain:
      en: "The office is where the work happens (Wo?: im = in + dem); the café is the destination (Wohin?: ins = in + das). The meaning of the whole phrase decides the question and case."
      ru: "Офис — место работы (Wo?: im = in + dem), а кафе — цель (Wohin?: ins = in + das). Вопрос и падеж определяет смысл всей группы."
      uk: "Офіс — місце роботи (Wo?: im = in + dem), а кафе — ціль (Wohin?: ins = in + das). Питання й відмінок визначає зміст усієї групи."
  - id: cloze-sofa-boden
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    text: "Die Katze sitzt auf {{dem}} Sofa. Dann springt sie auf {{den}} Boden."
    translation:
      en: "The cat is sitting on the sofa. Then it jumps onto the floor."
      ru: "Кошка сидит на диване. Потом она прыгает на пол."
      uk: "Кішка сидить на дивані. Потім вона стрибає на підлогу."
    explain:
      en: "sitzen is a position — auf dem Sofa (Dativ); springen is a movement to a goal — auf den Boden (Akkusativ). Same preposition, two cases, two meanings."
      ru: "sitzen — положение: auf dem Sofa (Dativ); springen — движение к цели: auf den Boden (Akkusativ). Один предлог, два падежа, два смысла — как «на диване» и «на пол»."
      uk: "sitzen — положення: auf dem Sofa (Dativ); springen — рух до цілі: auf den Boden (Akkusativ). Один прийменник, два відмінки, два змісти — як «на дивані» і «на підлогу»."
  - id: mc-see
    outcomes: [wo-wohin-position]
    type: mc
    focus: wo-wohin
    instruction:
      en: Choose the correct form.
      ru: Выберите правильную форму.
      uk: Виберіть правильну форму.
    prompt: "Wohin fahrt ihr am Sonntag? — ___ See."
    options:
      - "An den"
      - "Am"
      - "An das"
    correct: 0
    explain:
      en: "The question is Wohin?, so the answer is a direction: an + Akkusativ — an den See. Am See answers a different question (Wo?), and der See is masculine, so an das is out either way."
      ru: "Вопрос Wohin?, значит в ответе направление: an + Akkusativ — an den See. Am See отвечает на другой вопрос (Wo?), а der See мужского рода, так что an das не подходит в любом случае."
      uk: "Питання Wohin?, отже у відповіді напрямок: an + Akkusativ — an den See. Am See відповідає на інше питання (Wo?), а der See чоловічого роду, тож an das не підходить у будь-якому разі."
  - id: diktat-park
    outcomes: [wo-wohin-position]
    type: listen
    focus: wo-wohin
    text: "Wir gehen am Sonntag in den Park."
    explain:
      en: "The park is the destination, so you hear the accusative: in den Park. Writing in dem here is a case choice, not a typo — that is exactly what this dictation grades."
      ru: "Парк здесь цель, поэтому звучит Akkusativ: in den Park. Написать здесь in dem — это выбор падежа, а не опечатка: именно его и проверяет этот диктант."
      uk: "Парк тут є ціллю, тому звучить Akkusativ: in den Park. Написати тут in dem — це вибір відмінка, а не одрук: саме його й перевіряє цей диктант."
