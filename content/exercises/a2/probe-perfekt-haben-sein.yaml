topic: perfekt-haben-sein
role: probe
title:
  en: "Probe — the Perfekt with haben and sein"
  ru: "Проверка — перфект с haben и sein"
  uk: "Перевірка — перфект із haben і sein"

# Three PARALLEL variants of ONE competence: choosing the auxiliary — sein for movement
# from A to B (plus bleiben/sein/passieren), haben for everything else. The topic is
# literally named after that choice, and it is the half of the Perfekt a learner keeps
# getting wrong long after the participles are safe.
#
# Per the focus taxonomy, a haben-sein item grades both halves of the tense, so the
# participle is a key token too: a Perfekt built from the right auxiliary and a broken
# participle is not a Perfekt.

items:
  - id: variant-a
    outcomes: [perfekt-hilfsverb]
    type: translate
    focus: haben-sein
    revision: 2
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "The children ran to school."
    prompt_ru: "Дети побежали в школу."
    prompt_uk: "Діти побігли до школи."
    answer: "Die Kinder sind zur Schule gelaufen."
    key_tokens: ["sind", "gelaufen"]
    accept:
      # "to school" is in die Schule as readily as zur Schule, and «побежали» is rennen
      # as readily as laufen — both keep sein + A→B movement, the graded competence.
      # The participle is a key token, so without these a correct auxiliary choice
      # would be logged as a haben-sein failure.
      - "Die Kinder sind in die Schule gelaufen."
      - "Die Kinder sind zur Schule gerannt."
      - "Die Kinder sind in die Schule gerannt."
    explain:
      en: "laufen moves the subject from one place to another, so the auxiliary is sein: die Kinder sind … gelaufen. haben would be wrong here however ordinary the action looks — what decides is the movement from A to B, not the meaning of the verb in isolation."
      ru: "laufen перемещает подлежащее из одной точки в другую, поэтому вспомогательный глагол — sein: die Kinder sind … gelaufen. haben здесь неверно, каким бы обычным ни казалось действие: решает именно перемещение из точки А в точку Б, а не значение глагола само по себе."
      uk: "laufen переміщує підмет з однієї точки в іншу, тому допоміжне дієслово — sein: die Kinder sind … gelaufen. haben тут неправильно, хай яким звичайним здається дія: вирішує саме переміщення з точки А в точку Б, а не значення дієслова саме по собі."

  - id: variant-b
    outcomes: [perfekt-hilfsverb]
    type: translate
    focus: haben-sein
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "On Sunday I slept for a long time. In the afternoon I went to the swimming pool."
    prompt_ru: "В воскресенье я долго спал. Днём я пошёл в бассейн."
    prompt_uk: "У неділю я довго спав. Удень я пішов у басейн."
    answer: "Am Sonntag habe ich lange geschlafen. Am Nachmittag bin ich ins Schwimmbad gegangen."
    key_tokens: ["habe", "geschlafen", "bin", "gegangen"]
    accept:
      # "went to the pool" is gefahren as readily as gegangen, and the time phrase may stay in
      # the middle field. Both are ordinary German and neither touches the auxiliary — and the
      # participle is a graded token, so without these a learner who chose the right auxiliary
      # would be scored wrong AND logged as a haben-sein failure.
      - "Am Sonntag habe ich lange geschlafen. Am Nachmittag bin ich ins Schwimmbad gefahren."
      - "Ich habe am Sonntag lange geschlafen. Am Nachmittag bin ich ins Schwimmbad gegangen."
      - "Ich habe am Sonntag lange geschlafen. Am Nachmittag bin ich ins Schwimmbad gefahren."
    explain:
      en: "Sleeping feels like a state, and states are where learners reach for sein — but sein is not for states, it is for movement from A to B, plus the three verbs that simply have to be memorized (sein, bleiben, passieren). schlafen is none of those and nobody goes anywhere: haben geschlafen. gehen does take you somewhere, so it takes sein: bin … gegangen. Ask the question about the movement, not about how still the verb sounds."
      ru: "Спать — это состояние, а на состояниях рука и тянется к sein. Но sein нужен не для состояний, а для перемещения из точки А в точку Б плюс для трёх глаголов, которые надо просто запомнить (sein, bleiben, passieren). schlafen — ни то, ни другое, и никто никуда не двигается: haben geschlafen. А gehen действительно переносит вас в другое место, поэтому нужен sein: bin … gegangen. Вопрос задавайте о перемещении, а не о том, насколько «неподвижно» звучит глагол."
      uk: "Спати — це стан, а на станах рука й тягнеться до sein. Але sein потрібен не для станів, а для переміщення з точки А в точку Б плюс для трьох дієслів, які треба просто запам'ятати (sein, bleiben, passieren). schlafen — ні те, ні інше, і ніхто нікуди не рухається: haben geschlafen. А gehen справді переносить вас в інше місце, тому потрібен sein: bin … gegangen. Питання ставте про переміщення, а не про те, наскільки «нерухомо» звучить дієслово."

  - id: variant-c
    outcomes: [perfekt-hilfsverb]
    type: translate
    focus: haben-sein
    instruction:
      en: Translate into German.
      ru: Переведите на немецкий.
      uk: Перекладіть німецькою.
    prompt_en: "On Friday my colleague drove to Hamburg. There he visited his family."
    prompt_ru: "В пятницу мой коллега поехал в Гамбург. Там он навестил свою семью."
    prompt_uk: "У п'ятницю мій колега поїхав до Гамбурга. Там він відвідав свою сім'ю."
    answer: "Am Freitag ist mein Kollege nach Hamburg gefahren. Dort hat er seine Familie besucht."
    key_tokens: ["ist", "gefahren", "hat", "besucht"]
    accept:
      - "Mein Kollege ist am Freitag nach Hamburg gefahren. Dort hat er seine Familie besucht."
    explain:
      en: "Both auxiliaries in one story, and the two sentences differ in exactly one way: fahren nach Hamburg takes the subject from A to B (sein), while besuchen leaves him where he already is (haben). Same past, same person, different auxiliary — the movement is what decides."
      ru: "Оба вспомогательных глагола в одном рассказе, и различаются предложения ровно одним: fahren nach Hamburg переносит подлежащее из точки А в точку Б (sein), а besuchen оставляет его там, где он уже находится (haben). То же прошедшее время, то же лицо — но вспомогательный глагол разный, потому что решает перемещение."
      uk: "Обидва допоміжні дієслова в одній розповіді, і різняться речення рівно одним: fahren nach Hamburg переносить підмет із точки А в точку Б (sein), а besuchen залишає його там, де він уже перебуває (haben). Той самий минулий час, та сама особа — але допоміжне дієслово різне, бо вирішує переміщення."
