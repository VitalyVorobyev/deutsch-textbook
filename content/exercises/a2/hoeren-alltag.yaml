topic: alltag-tagesablauf
role: practice
title:
  en: "Listening — dictation: daily routine"
  ru: "Аудирование — диктант: распорядок дня"
  uk: "Аудіювання — диктант: розпорядок дня"
items:
  - id: hoeren-aufstehen
    outcomes: [alltag-beschreiben]
    type: listen
    focus: trennbar-wortstellung
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Ich stehe jeden Tag um sieben Uhr auf."
    translation:
      en: I get up at seven o'clock every day.
      ru: Я встаю каждый день в семь часов.
      uk: Я встаю щодня о сьомій годині.
    explain:
      en: "aufstehen splits: stehe … auf, with the prefix at the very end. Clock times take um: um sieben Uhr."
      ru: "aufstehen разделяется: stehe … auf, приставка уходит в самый конец. Время по часам — с um: um sieben Uhr."
      uk: "aufstehen розділяється: stehe … auf, префікс іде в самий кінець. Час за годинником — з um: um sieben Uhr."

  - id: hoeren-montag
    outcomes: [alltag-beschreiben]
    type: listen
    focus: trennbar-wortstellung
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Am Montag fange ich früh an."
    translation:
      en: On Monday I start early.
      ru: В понедельник я начинаю рано.
      uk: У понеділок я починаю рано.
    explain:
      en: "Am Montag is fronted, so the verb stays second and the subject follows: fange ich. The prefix an of anfangen goes to the end. früh has an Umlaut: ü."
      ru: "Am Montag вынесено вперёд, поэтому глагол остаётся на втором месте, а подлежащее — после него: fange ich. Приставка an глагола anfangen уходит в конец. В früh умлаут: ü."
      uk: "Am Montag винесено наперед, тому дієслово залишається на другому місці, а підмет — після нього: fange ich. Префікс an дієслова anfangen іде в кінець. У früh умлаут: ü."

  - id: hoeren-einkaufen
    outcomes: [alltag-beschreiben]
    type: listen
    focus: trennbar-wortstellung
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Er kauft am Samstag ein."
    translation:
      en: He does the shopping on Saturday.
      ru: Он делает покупки в субботу.
      uk: Він робить покупки в суботу.
    explain:
      en: "einkaufen (to do the shopping) splits: kauft … ein. Days of the week take am: am Samstag."
      ru: "einkaufen (делать покупки) разделяется: kauft … ein. Дни недели — с am: am Samstag."
      uk: "einkaufen (робити покупки) розділяється: kauft … ein. Дні тижня — з am: am Samstag."

  - id: hoeren-fruehstueck
    outcomes: [alltag-beschreiben]
    type: listen
    focus: um-am-zeit
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Wir frühstücken um acht Uhr."
    translation:
      en: We have breakfast at eight o'clock.
      ru: Мы завтракаем в восемь часов.
      uk: Ми снідаємо о восьмій годині.
    explain:
      en: "frühstücken has two Umlauts (ü, ü) and does not split — it is not a separable verb. Clock time takes um: um acht Uhr."
      ru: "В frühstücken два умлаута (ü, ü), и глагол не разделяется — это не отделяемая приставка. Время по часам — с um: um acht Uhr."
      uk: "У frühstücken два умлаути (ü, ü), і дієслово не розділяється — це не відокремлюваний префікс. Час за годинником — з um: um acht Uhr."

  - id: hoeren-anrufen
    outcomes: [alltag-beschreiben]
    type: listen
    focus: trennbar-wortstellung
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Ich rufe dich am Abend an."
    translation:
      en: I'll call you in the evening.
      ru: Я позвоню тебе вечером.
      uk: Я подзвоню тобі ввечері.
    explain:
      en: "anrufen splits and takes the accusative: Ich rufe dich … an — you call someone, so dich, not dir. Parts of the day take am: am Abend."
      ru: "anrufen разделяется и требует аккузатива: Ich rufe dich … an (не dir — по-немецки «звонить кого-то»). Время суток — с am: am Abend."
      uk: "anrufen розділяється і вимагає акузатива: Ich rufe dich … an (не dir — німецькою «дзвонити когось», не «комусь»). Час доби — з am: am Abend."

  - id: hoeren-wochenende
    outcomes: [alltag-beschreiben]
    type: listen
    focus: um-am-zeit
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Sie steht am Wochenende spät auf."
    translation:
      en: She gets up late at the weekend.
      ru: В выходные она встаёт поздно.
      uk: У вихідні вона встає пізно.
    explain:
      en: "am Wochenende — the weekend takes am. spät has an Umlaut (ä), and the prefix auf stands at the very end."
      ru: "am Wochenende — выходные с am. В spät умлаут (ä), а приставка auf стоит в самом конце."
      uk: "am Wochenende — вихідні з am. У spät умлаут (ä), а префікс auf стоїть у самому кінці."

  - id: hoeren-modal
    outcomes: [alltag-beschreiben]
    type: listen
    focus: trennbar-modal
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Ich muss heute früh aufstehen."
    translation:
      en: I have to get up early today.
      ru: Мне нужно сегодня рано встать.
      uk: Мені треба сьогодні рано встати.
    explain:
      en: "After a modal the separable verb stays in one piece at the end: muss … aufstehen — not muss … stehen auf."
      ru: "После модального глагола отделяемый глагол стоит целиком в конце: muss … aufstehen, а не muss … stehen auf."
      uk: "Після модального дієслова відокремлюване дієслово стоїть цілим у кінці: muss … aufstehen, а не muss … stehen auf."

  - id: hoeren-fernsehen
    outcomes: [alltag-beschreiben]
    type: listen
    focus: verbzweit
    instruction:
      en: Listen and type what you hear.
      ru: Прослушайте и напишите, что вы слышите.
      uk: Прослухайте і напишіть, що ви чуєте.
    text: "Abends sehe ich fern."
    translation:
      en: In the evenings I watch TV.
      ru: По вечерам я смотрю телевизор.
      uk: Вечорами я дивлюся телевізор.
    explain:
      en: "Abends is fronted, so the verb keeps position two and the subject moves behind it: sehe ich. fernsehen splits: sehe … fern."
      ru: "Abends вынесено вперёд, поэтому глагол остаётся на втором месте, а подлежащее — после него: sehe ich. fernsehen разделяется: sehe … fern."
      uk: "Abends винесено наперед, тому дієслово залишається на другому місці, а підмет — після нього: sehe ich. fernsehen розділяється: sehe … fern."
