topic: termine-vereinbaren
role: pretest
items:
  - id: pre-passt-ihnen
    outcomes: [termine-organisieren]
    type: cloze
    focus: passen-dativ
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Guten Tag, Frau Berg. Passt es {{Ihnen}} am Montag um zehn Uhr?"
    translation:
      en: "Hello, Ms Berg. Does Monday at ten work for you?"
      ru: "Здравствуйте, госпожа Берг. Вам удобно в понедельник в десять?"
      uk: "Добрий день, пані Берг. Вам зручно в понеділок о десятій?"
    explain:
      en: '"passen" takes the dative (der Dativ), so the polite pronoun is "Ihnen", never "Sie". Think "does it work FOR you?" — the person is the wem?-answer, and in formal address that is always Ihnen.'
      ru: '"passen" требует дательного падежа (der Dativ), поэтому вежливое местоимение — "Ihnen", а не "Sie". Русский подсказывает то же самое: «подходит вам» — тоже дательный.'
      uk: '"passen" вимагає давального відмінка (der Dativ), тому ввічливий займенник — "Ihnen", а не "Sie". Українська підказує те саме: «підходить вам» — теж давальний.'

  - id: pre-um-am
    outcomes: [termine-organisieren]
    type: mc
    focus: um-am-zeit
    prompt: "Der Zahnarzt hat ___ Mittwoch ___ 11 Uhr einen Termin frei."
    options: ["am … um", "um … am", "im … um"]
    correct: 0
    translation:
      en: The dentist has an appointment free on Wednesday at 11 o'clock.
      ru: У зубного врача есть свободное время в среду в 11 часов.
      uk: У зубного лікаря є вільний час у середу об 11 годині.
    explain:
      en: 'Days of the week take "am" (am Mittwoch), clock times take "um" (um 11 Uhr). "im" is for months and seasons (im Mai, im Winter).'
      ru: 'С днями недели используется "am" (am Mittwoch), со временем по часам — "um" (um 11 Uhr). "im" — для месяцев и времён года (im Mai, im Winter).'
      uk: 'З днями тижня вживається "am" (am Mittwoch), з часом за годинником — "um" (um 11 Uhr). "im" — для місяців і пір року (im Mai, im Winter).'

  - id: pre-du-sie
    outcomes: [termine-organisieren]
    type: mc
    focus: du-sie
    prompt: "Sie rufen in einer Praxis an und möchten einen Termin. Was sagen Sie?"
    options:
      - "Hast du diese Woche einen Termin frei?"
      - "Haben Sie diese Woche einen Termin frei?"
      - "Ich will sofort einen Termin!"
    correct: 1
    translation:
      en: You are calling a practice and would like an appointment. What do you say?
      ru: Вы звоните в приёмную и хотите записаться. Что вы скажете?
      uk: Ви телефонуєте до приймальні і хочете записатися. Що ви скажете?
    explain:
      en: 'On the phone with a practice or any stranger, only the Sie-form works — "du" is rude here. "Ich will sofort …!" sounds like a demand; polite German asks a question with "Sie".'
      ru: 'По телефону с приёмной и вообще с незнакомыми людьми возможна только форма Sie — "du" здесь звучит грубо. "Ich will sofort …!" звучит как требование; вежливо — задать вопрос с "Sie".'
      uk: 'По телефону з приймальнею і взагалі з незнайомими людьми можлива лише форма Sie — "du" тут звучить грубо. "Ich will sofort …!" звучить як вимога; ввічливо — поставити питання із "Sie".'
