topic: wohnen-umzug
role: practice
title:
  en: "Practice — Wo? and Wohin? in Nina's new flat"
  ru: "Практика — Wo? и Wohin? в новой квартире Нины"
  uk: "Практика — Wo? і Wohin? у новій квартирі Ніни"
items:
  - id: table-wo-wohin
    outcomes: [wo-wohin-position]
    type: table
    focus: wo-wohin
    title: "Wo? oder Wohin?"
    instruction:
      en: "Fill in the two forms of each phrase — the position (Wo? + Dativ) and the direction (Wohin? + Akkusativ). Use the contractions im / ins / am / ans where they exist."
      ru: "Впишите обе формы каждого оборота — положение (Wo? + Dativ) и направление (Wohin? + Akkusativ). Там, где есть слитные формы im / ins / am / ans, используйте их."
      uk: "Впишіть обидві форми кожного звороту — положення (Wo? + Dativ) і напрямок (Wohin? + Akkusativ). Там, де є злиті форми im / ins / am / ans, використовуйте їх."
    columns: ["Wo? (Dativ)", "Wohin? (Akkusativ)"]
    rows:
      - label: "in + das Bad"
        cells: [{ answer: "im Bad", given: true }, { answer: "ins Bad" }]
      - label: "in + der Keller"
        cells: [{ answer: "im Keller" }, { answer: "in den Keller" }]
      - label: "in + die Küche"
        cells: [{ answer: "in der Küche" }, { answer: "in die Küche" }]
      - label: "an + die Wand"
        cells: [{ answer: "an der Wand" }, { answer: "an die Wand" }]
      - label: "auf + der Tisch"
        cells: [{ answer: "auf dem Tisch" }, { answer: "auf den Tisch" }]
    explain:
      en: "One preposition, two jobs. The Wo?-column is the Dativ (dem / der / dem), the Wohin?-column is the Akkusativ (den / die / das) — and only the masculine looks dramatic (dem Keller → den Keller). Watch the feminine: der Küche is dative here, not nominative. The contractions belong to the same system: in dem → im, in das → ins, an dem → am, an das → ans."
      ru: "Один предлог — две задачи. Столбец Wo? — это Dativ (dem / der / dem), столбец Wohin? — Akkusativ (den / die / das); заметнее всего меняется мужской род (dem Keller → den Keller). Осторожно с женским: der Küche здесь дательный падеж, а не именительный. Слитные формы — часть той же системы: in dem → im, in das → ins, an dem → am, an das → ans."
      uk: "Один прийменник — два завдання. Стовпець Wo? — це Dativ (dem / der / dem), стовпець Wohin? — Akkusativ (den / die / das); найпомітніше змінюється чоловічий рід (dem Keller → den Keller). Обережно з жіночим: der Küche тут давальний відмінок, а не називний. Злиті форми — частина тієї самої системи: in dem → im, in das → ins, an dem → am, an das → ans."

  - id: cloze-teppich-im-ins
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    instruction:
      en: "Nina is moving in. Fill each gap with im or ins."
      ru: "Нина въезжает в квартиру. Вставьте im или ins."
      uk: "Ніна в'їжджає у квартиру. Вставте im або ins."
    text: "Am Morgen liegt der Teppich noch {{im}} Flur. Am Abend legt Nina den Teppich {{ins}} Wohnzimmer."
    translation:
      en: "In the morning the carpet is still lying in the hallway. In the evening Nina lays the carpet in the living room."
      ru: "Утром ковёр ещё лежит в прихожей. Вечером Нина кладёт ковёр в гостиную."
      uk: "Вранці килим ще лежить у передпокої. Увечері Ніна кладе килим у вітальню."
    explain:
      en: "The first sentence answers Wo? — the carpet is somewhere and nothing moves, so in takes the dative: in dem Flur → im Flur. The second answers Wohin? — Nina moves it, so in takes the accusative: in das Wohnzimmer → ins Wohnzimmer. The two little words im and ins are the whole difference between a place and a movement."
      ru: "Первое предложение отвечает на вопрос Wo? — ковёр просто лежит, движения нет, поэтому in требует Dativ: in dem Flur → im Flur. Второе отвечает на Wohin? — Нина его перекладывает, поэтому in требует Akkusativ: in das Wohnzimmer → ins Wohnzimmer. Два коротких слова, im и ins, и есть вся разница между «где» и «куда»."
      uk: "Перше речення відповідає на питання Wo? — килим просто лежить, руху немає, тому in вимагає Dativ: in dem Flur → im Flur. Друге відповідає на Wohin? — Ніна його перекладає, тому in вимагає Akkusativ: in das Wohnzimmer → ins Wohnzimmer. Два коротких слова, im та ins, і є вся різниця між «де» і «куди»."

  - id: cloze-objekt-akkusativ
    outcomes: [wo-wohin-position]
    type: cloze
    focus: akkusativ-artikel
    instruction:
      en: "Fill in the article of the object being moved."
      ru: "Вставьте артикль предмета, который перемещают."
      uk: "Вставте артикль предмета, який переміщують."
    text: "Tobias stellt {{den}} Schrank ins Schlafzimmer. Dann hängt er {{die}} Lampe über den Tisch."
    translation:
      en: "Tobias puts the wardrobe into the bedroom. Then he hangs the lamp above the table."
      ru: "Тобиас ставит шкаф в спальню. Потом он вешает лампу над столом."
      uk: "Тобіас ставить шафу в спальню. Потім він вішає лампу над столом."
    explain:
      en: "stellen and hängen both have a direct object — the thing that is being moved — and a direct object is accusative: der Schrank → den Schrank, die Lampe → die Lampe (feminine looks the same, and that is fine). Only the masculine changes its shape. Note that the Wohin?-phrases after them (ins Schlafzimmer, über den Tisch) are accusative too, for a different reason: direction."
      ru: "У глаголов stellen и hängen есть прямое дополнение — та вещь, которую перемещают, — а прямое дополнение стоит в Akkusativ: der Schrank → den Schrank, die Lampe → die Lampe (женский род внешне не меняется, так и должно быть). Форму меняет только мужской род. Обратите внимание: группы с Wohin? (ins Schlafzimmer, über den Tisch) тоже в Akkusativ, но по другой причине — направление."
      uk: "У дієслів stellen і hängen є прямий додаток — та річ, яку переміщують, — а прямий додаток стоїть в Akkusativ: der Schrank → den Schrank, die Lampe → die Lampe (жіночий рід зовні не змінюється, так і має бути). Форму змінює лише чоловічий рід. Зверніть увагу: групи з Wohin? (ins Schlafzimmer, über den Tisch) теж в Akkusativ, але з іншої причини — напрямок."

  - id: cloze-position-dativ
    outcomes: [wohnung-beschreiben, wo-wohin-position]
    type: cloze
    focus: dativ-artikel
    instruction:
      en: "The flat is ready. Say where everything is — fill in the dative articles."
      ru: "Квартира готова. Скажите, где что стоит, — вставьте артикли в Dativ."
      uk: "Квартира готова. Скажіть, де що стоїть, — вставте артиклі в Dativ."
    text: "Der Teppich liegt unter {{dem}} Tisch. Das Bild hängt an {{der}} Wand. Die Bücher stehen neben {{den}} Kisten."
    translation:
      en: "The carpet lies under the table. The picture hangs on the wall. The books are standing next to the boxes."
      ru: "Ковёр лежит под столом. Картина висит на стене. Книги стоят рядом с коробками."
      uk: "Килим лежить під столом. Картина висить на стіні. Книжки стоять поряд із коробками."
    explain:
      en: "Three positions, three dative forms: der Tisch → dem, die Wand → der, and the plural die Kisten → den Kisten. The plural is the one to watch — the article becomes den and the noun adds -n (here Kisten already ends in -n, so nothing more happens). None of these things is moving, so every one of them answers Wo?."
      ru: "Три положения — три формы Dativ: der Tisch → dem, die Wand → der, и множественное число die Kisten → den Kisten. Именно множественное требует внимания: артикль становится den, а существительное получает -n (здесь Kisten уже оканчивается на -n, так что больше ничего не меняется). Ничто из перечисленного не движется — все три оборота отвечают на вопрос Wo?."
      uk: "Три положення — три форми Dativ: der Tisch → dem, die Wand → der, і множина die Kisten → den Kisten. Саме множина вимагає уваги: артикль стає den, а іменник отримує -n (тут Kisten уже закінчується на -n, тож більше нічого не змінюється). Ніщо з переліченого не рухається — усі три звороти відповідають на питання Wo?."

  - id: mc-buch-liegt
    outcomes: [wohnung-beschreiben]
    type: mc
    focus: stellen-stehen
    instruction:
      en: "Which verb fits?"
      ru: "Какой глагол подходит?"
      uk: "Яке дієслово підходить?"
    prompt: "Das Buch ___ auf dem Regal."
    options: ["liegt", "legt", "stellt"]
    correct: 0
    translation:
      en: "The book is lying on the shelf."
      ru: "Книга лежит на полке."
      uk: "Книжка лежить на полиці."
    explain:
      en: "There is no object here and nobody doing anything — the book simply is somewhere. That is the position verb liegen: Das Buch liegt. legt and stellt would need somebody to do the moving and something to move (Nina legt das Buch …). The dative auf dem Regal confirms it: position."
      ru: "Здесь нет ни дополнения, ни действующего лица — книга просто где-то находится. Это глагол положения liegen: Das Buch liegt. Формы legt и stellt потребовали бы того, кто перемещает, и того, что перемещают (Nina legt das Buch …). Dativ в auf dem Regal это подтверждает: положение."
      uk: "Тут немає ні додатка, ні дійової особи — книжка просто десь перебуває. Це дієслово положення liegen: Das Buch liegt. Форми legt і stellt потребували б того, хто переміщує, і того, що переміщують (Nina legt das Buch …). Dativ в auf dem Regal це підтверджує: положення."

  - id: mc-bild-an-der-wand
    outcomes: [wohnung-beschreiben]
    type: mc
    focus: wo-wohin
    instruction:
      en: "The picture is already up. Choose the correct form."
      ru: "Картина уже висит. Выберите правильную форму."
      uk: "Картина вже висить. Виберіть правильну форму."
    prompt: "Das Bild hängt ___ Wand."
    options: ["an die", "an der", "auf die"]
    correct: 1
    translation:
      en: "The picture is hanging on the wall."
      ru: "Картина висит на стене."
      uk: "Картина висить на стіні."
    explain:
      en: "The picture is not going anywhere — it hangs. That is Wo?, so an takes the dative: an der Wand. an die Wand is the other half of the pair and needs somebody doing the hanging: Nina hängt das Bild an die Wand. And a picture is an, never auf, a wall."
      ru: "Картина никуда не перемещается — она висит. Это вопрос Wo?, поэтому an требует Dativ: an der Wand. Форма an die Wand — вторая половина пары, и ей нужен тот, кто вешает: Nina hängt das Bild an die Wand. А картина на стене — всегда an, а не auf."
      uk: "Картина нікуди не переміщується — вона висить. Це питання Wo?, тому an вимагає Dativ: an der Wand. Форма an die Wand — друга половина пари, і їй потрібен той, хто вішає: Nina hängt das Bild an die Wand. А картина на стіні — завжди an, а не auf."

  - id: order-stuhl-ans-fenster
    outcomes: [wo-wohin-position]
    type: order
    focus: wo-wohin
    instruction:
      en: "Arrange the words into a correct sentence."
      ru: "Составьте правильное предложение."
      uk: "Складіть правильне речення."
    words: ["Nina", "stellt", "den", "Stuhl", "ans", "Fenster."]
    translation:
      en: "Nina puts the chair by the window."
      ru: "Нина ставит стул к окну."
      uk: "Ніна ставить стілець до вікна."
    explain:
      en: "Two accusatives, and each has its own reason. den Stuhl is the object — the thing being moved. ans Fenster (= an das Fenster) is the direction — Wohin? Once the chair is there, the same sentence turns into position: Der Stuhl steht am Fenster."
      ru: "Здесь два Akkusativ, и у каждого своя причина. den Stuhl — дополнение, то есть предмет, который перемещают. ans Fenster (= an das Fenster) — направление, ответ на Wohin? Когда стул уже стоит, то же самое превращается в положение: Der Stuhl steht am Fenster."
      uk: "Тут два Akkusativ, і в кожного своя причина. den Stuhl — додаток, тобто предмет, який переміщують. ans Fenster (= an das Fenster) — напрямок, відповідь на Wohin? Коли стілець уже стоїть, те саме перетворюється на положення: Der Stuhl steht am Fenster."

  - id: match-verbpaare
    outcomes: [wo-wohin-position]
    type: match
    focus: stellen-stehen
    instruction:
      en: "Match each verb with the sentence it belongs to."
      ru: "Соедините каждый глагол с предложением, к которому он относится."
      uk: "З'єднайте кожне дієслово з реченням, до якого воно належить."
    pairs:
      - { left: "stehen", right: "Wo? — Die Lampe steht auf dem Tisch." }
      - { left: "stellen", right: "Wohin? — Nina stellt die Lampe auf den Tisch." }
      - { left: "liegen", right: "Wo? — Der Teppich liegt im Flur." }
      - { left: "legen", right: "Wohin? — Nina legt den Teppich in den Flur." }
    explain:
      en: "Read the pairs as a system: stehen–stellen for things that stand upright, liegen–legen for things that lie flat. The left-hand verb of each pair has no object and answers Wo? (dative); the right-hand verb has an object and answers Wohin? (accusative). English uses 'be' for the whole left column and 'put' for the whole right one, so the choice has to be made consciously in German."
      ru: "Читайте это как систему: stehen–stellen для вещей, которые стоят, liegen–legen для тех, что лежат. Левый глагол каждой пары не имеет дополнения и отвечает на Wo? (Dativ); правый имеет дополнение и отвечает на Wohin? (Akkusativ). Русский различает то же самое: стоять — ставить, лежать — класть, — так что схема вам знакома, выучить нужно только немецкие формы."
      uk: "Читайте це як систему: stehen–stellen для речей, які стоять, liegen–legen для тих, що лежать. Ліве дієслово кожної пари не має додатка і відповідає на Wo? (Dativ); праве має додаток і відповідає на Wohin? (Akkusativ). Українська розрізняє те саме: стояти — ставити, лежати — класти, — тож схема вам знайома, вивчити треба лише німецькі форми."

  - id: uebersetzen-bild-an-die-wand
    outcomes: [wo-wohin-position]
    type: translate
    focus: wo-wohin
    instruction:
      en: "Translate into German."
      ru: "Переведите на немецкий."
      uk: "Перекладіть німецькою."
    prompt_en: "Nina hangs the picture on the wall."
    prompt_ru: "Нина вешает картину на стену."
    prompt_uk: "Ніна вішає картину на стіну."
    answer: "Nina hängt das Bild an die Wand."
    key_tokens: ["die"]
    explain:
      en: "Nina is doing the hanging, so the picture is on its way somewhere: Wohin? → accusative → an die Wand. If you wrote an der Wand, you described the finished result instead — Das Bild hängt an der Wand — which is a different sentence with a different meaning."
      ru: "Вешает Нина — значит картина перемещается: Wohin? → Akkusativ → an die Wand. Если вы написали an der Wand, вы описали уже готовый результат — Das Bild hängt an der Wand, — а это другое предложение с другим смыслом. Русский здесь подсказывает верно: «на стену», а не «на стене»."
      uk: "Вішає Ніна — отже картина переміщується: Wohin? → Akkusativ → an die Wand. Якщо ви написали an der Wand, ви описали вже готовий результат — Das Bild hängt an der Wand, — а це інше речення з іншим змістом. Українська тут підказує правильно: «на стіну», а не «на стіні»."

  - id: uebersetzen-kiste-keller
    outcomes: [wo-wohin-position]
    type: translate
    focus: stellen-stehen
    instruction:
      en: "Translate into German."
      ru: "Переведите на немецкий."
      uk: "Перекладіть німецькою."
    prompt_en: "Tobias puts the box down in the cellar."
    prompt_ru: "Тобиас ставит коробку в подвал."
    prompt_uk: "Тобіас ставить коробку в підвал."
    answer: "Tobias stellt die Kiste in den Keller."
    key_tokens: ["stellt"]
    explain:
      en: "The verb is the point. There is an object (die Kiste) and somebody moving it, so German needs the placement verb stellen — steht would leave the box standing there by itself, with nobody putting it anywhere. The direction follows automatically: in den Keller, accusative."
      ru: "Всё решает глагол. Есть дополнение (die Kiste) и тот, кто его перемещает, — значит нужен глагол перемещения stellen («ставить»). Форма steht означала бы, что коробка стоит сама по себе и никто её никуда не ставит. Направление получается автоматически: in den Keller, Akkusativ."
      uk: "Усе вирішує дієслово. Є додаток (die Kiste) і той, хто його переміщує, — отже потрібне дієслово переміщення stellen («ставити»). Форма steht означала б, що коробка стоїть сама по собі й ніхто її нікуди не ставить. Напрямок виходить автоматично: in den Keller, Akkusativ."

  - id: uebersetzen-kueche-minimalpaar
    outcomes: [wo-wohin-position]
    type: translate
    focus: wechsel-akk-dat
    # revision 2: accept gained the idiomatic "steht" locative (grading decision, 2026-07-14)
    revision: 2
    instruction:
      en: "Translate both sentences into German."
      ru: "Переведите оба предложения на немецкий."
      uk: "Перекладіть обидва речення німецькою."
    prompt_en: "Nina is in the kitchen. Tobias is going into the kitchen."
    prompt_ru: "Нина на кухне. Тобиас идёт на кухню."
    prompt_uk: "Ніна на кухні. Тобіас іде на кухню."
    answer: "Nina ist in der Küche. Tobias geht in die Küche."
    key_tokens: ["der", "die"]
    accept:
      - "Nina steht in der Küche. Tobias geht in die Küche."
    explain:
      en: "One preposition, one noun, two cases — and only the article tells them apart. Nina is somewhere: Wo? → dative → in der Küche. Tobias is on his way: Wohin? → accusative → in die Küche. English writes 'in the kitchen' and 'into the kitchen' and hides the case completely, so the article is the only place where German shows what it means."
      ru: "Один предлог, одно существительное, два падежа — и различает их только артикль. Нина находится: Wo? → Dativ → in der Küche. Тобиас направляется: Wohin? → Akkusativ → in die Küche. Русский делает то же самое («на кухне» — «на кухню»), так что смысл вам ясен; следите за немецкими формами: der против die."
      uk: "Один прийменник, один іменник, два відмінки — і розрізняє їх лише артикль. Ніна перебуває: Wo? → Dativ → in der Küche. Тобіас прямує: Wohin? → Akkusativ → in die Küche. Українська робить те саме («на кухні» — «на кухню»), тож зміст вам ясний; стежте за німецькими формами: der проти die."

  - id: hoeren-teppich-sofa
    outcomes: [wohnung-beschreiben]
    type: listen
    focus: wo-wohin
    instruction:
      en: "Listen and type the sentence exactly."
      ru: "Прослушайте и запишите предложение точно."
      uk: "Прослухайте і запишіть речення точно."
    text: "Der Teppich liegt vor dem Sofa."
    translation:
      en: "The carpet lies in front of the sofa."
      ru: "Ковёр лежит перед диваном."
      uk: "Килим лежить перед диваном."
    explain:
      en: "Two words carry the whole grammar, and both are easy to miss by ear: liegt (position, not legt) and dem (dative, not das). Nothing moves in this sentence, so vor answers Wo? and takes the dative — vor dem Sofa."
      ru: "Всю грамматику несут два слова, и оба легко пропустить на слух: liegt (положение, а не legt) и dem (Dativ, а не das). В предложении нет движения, поэтому vor отвечает на вопрос Wo? и требует Dativ — vor dem Sofa."
      uk: "Усю граматику несуть два слова, і обидва легко пропустити на слух: liegt (положення, а не legt) і dem (Dativ, а не das). У реченні немає руху, тому vor відповідає на питання Wo? і вимагає Dativ — vor dem Sofa."

  - id: cloze-kontraktionen
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    instruction:
      en: "Fill in the short form: im, ins, am or ans."
      ru: "Вставьте краткую форму: im, ins, am или ans."
      uk: "Вставте коротку форму: im, ins, am або ans."
    text: "Nina geht {{ins}} Bad. Dann trinkt sie Kaffee {{im}} Wohnzimmer. Der Stuhl steht {{am}} Fenster."
    translation:
      en: "Nina goes into the bathroom. Then she drinks coffee in the living room. The chair is standing by the window."
      ru: "Нина идёт в ванную. Потом она пьёт кофе в гостиной. Стул стоит у окна."
      uk: "Ніна йде у ванну. Потім вона п'є каву у вітальні. Стілець стоїть біля вікна."
    explain:
      en: "The contractions keep the case visible, so read them as case marks: ins = in das (accusative, Wohin?), im = in dem (dative, Wo?), ans = an das (accusative), am = an dem (dative). Nina moves into the bathroom, but she drinks her coffee somewhere and the chair merely stands somewhere — dative both times."
      ru: "Слитные формы сохраняют падеж, поэтому читайте их как показатели падежа: ins = in das (Akkusativ, Wohin?), im = in dem (Dativ, Wo?), ans = an das (Akkusativ), am = an dem (Dativ). Нина идёт в ванную — движение; а кофе она пьёт где-то, и стул просто где-то стоит — оба раза Dativ."
      uk: "Злиті форми зберігають відмінок, тому читайте їх як показники відмінка: ins = in das (Akkusativ, Wohin?), im = in dem (Dativ, Wo?), ans = an das (Akkusativ), am = an dem (Dativ). Ніна йде у ванну — рух; а каву вона п'є десь, і стілець просто десь стоїть — обидва рази Dativ."

  - id: cloze-haengen-zwei-leben
    outcomes: [wo-wohin-position]
    type: cloze
    focus: wo-wohin
    instruction:
      en: "The same verb, the same preposition — two different cases. Fill in the articles."
      ru: "Тот же глагол, тот же предлог — два разных падежа. Вставьте артикли."
      uk: "Те саме дієслово, той самий прийменник — два різні відмінки. Вставте артиклі."
    text: "Nina hängt das Bild über {{das}} Sofa. Jetzt hängt das Bild über {{dem}} Sofa."
    translation:
      en: "Nina hangs the picture above the sofa. Now the picture is hanging above the sofa."
      ru: "Нина вешает картину над диваном. Теперь картина висит над диваном."
      uk: "Ніна вішає картину над диваном. Тепер картина висить над диваном."
    explain:
      en: "In the first sentence Nina is hanging something up — the picture travels to a new place, so über takes the accusative: über das Sofa. In the second the picture just hangs there, so über takes the dative: über dem Sofa. Same verb, same preposition; the article alone tells you whether anything is happening."
      ru: "В первом предложении Нина вешает — картина перемещается на новое место, поэтому über требует Akkusativ: über das Sofa. Во втором картина просто висит, поэтому über требует Dativ: über dem Sofa. Тот же глагол, тот же предлог; о том, происходит ли что-нибудь, говорит один только артикль. Русский здесь не поможет: «над диваном» звучит одинаково в обоих случаях."
      uk: "У першому реченні Ніна вішає — картина переміщується на нове місце, тому über вимагає Akkusativ: über das Sofa. У другому картина просто висить, тому über вимагає Dativ: über dem Sofa. Те саме дієслово, той самий прийменник; про те, чи щось відбувається, каже сам лише артикль. Українська тут не допоможе: «над диваном» звучить однаково в обох випадках."
