topic: lernen-verstehen
role: probe
title:
  en: "Probe — the verb at the end of the wrapped question"
  ru: "Проверка — глагол в конце вопроса с рамкой"
  uk: "Перевірка — дієслово в кінці питання з рамкою"

# Three PARALLEL variants of ONE competence: THE INDIRECT QUESTION (`indirekte-frage`).
# A question wrapped in a polite frame remains interrogative in meaning and becomes an
# embedded Nebensatz, so its conjugated verb goes to the very end: Können Sie mir sagen, wann der
# Zug nach Köln FÄHRT? — never … wann fährt der Zug nach Köln. That single decision is
# what this whole unit exists for, and it is the one the learner gets wrong by doing
# nothing: the bare question was right (Wann fährt der Zug?), and leaving its inversion
# standing inside the wrapper produces the classic error.
#
# Why not `nebensatz-verbende`? Because `nebensaetze-plaene` already probes it, and it is a
# different confusion: there a STATEMENT is wrapped (weil/dass/wenn), and nothing in the
# statement had to move except the verb. Here a QUESTION is wrapped, and the learner must
# undo an inversion they have spent two units automating. Same wall, different problem —
# and two families measuring the same tag would tell us nothing new about either.
#
# Why not the `ob`-question? It is the same tag but NOT the same difficulty: wrapping a
# yes/no question asks for one decision more than wrapping a W-question — the learner must
# also SUPPLY the subordinator, which a W-question hands them for free. Variants are served
# one per interval (2, 7, 21 days), so anything that differs between them is confounded with
# the delay: an ob-variant at 7 days would sit lower than its neighbours whatever was
# retained, and the curve would be a difficulty curve wearing a retention label. So all three
# variants wrap a W-question. `ob` gets its evidence from practice, which is where outcome
# mastery comes from anyway.
#
# ALL THREE VARIANTS ARE STRUCTURALLY IDENTICAL, deliberately and to the token:
#   [Können Sie mir sagen,]  +  W-word  +  subject  +  one adverbial/object  +  ONE conjugated verb.
# Same wrapper (so the wrapper contributes zero variance), same clause shape, one verb at the
# wall in each — no modal cluster, no separable prefix, nothing that would import a second
# competence. Only the situation and the lexis move, and all three situations are outside the
# classroom on purpose: a station, a supermarket, a doctor's surgery. None of them can be
# answered from memory of a practice item — the practice frame is the course, and the wrapped
# content here is new every time.
#
# key_tokens pins ONLY the wrapped verb the rule drives to the wall — never the wrapper's
# `Können`, which the learner is given, and never the W-word. `accept` is deliberately
# generous (other polite wrappers, an equally correct verb): a probe that marks correct German
# wrong corrupts the retention curve AND writes a false weakness entry under this tag.

items:
  - id: variant-a
    outcomes: [nachfragen-klaeren]
    type: translate
    focus: indirekte-frage
    instruction:
      en: Translate into German. You are asking a member of staff at the station.
      ru: Переведите на немецкий. Вы спрашиваете сотрудника вокзала.
      uk: Перекладіть німецькою. Ви запитуєте працівника вокзалу.
    prompt_en: "Can you tell me when the train to Cologne leaves?"
    prompt_ru: "Вы не подскажете, когда отправляется поезд на Кёльн?"
    prompt_uk: "Чи не підкажете, коли відправляється потяг на Кельн?"
    answer: "Können Sie mir sagen, wann der Zug nach Köln fährt?"
    accept:
      - "Können Sie mir bitte sagen, wann der Zug nach Köln fährt?"
      - "Können Sie mir sagen, wann der Zug nach Köln abfährt?"
      - "Können Sie mir bitte sagen, wann der Zug nach Köln abfährt?"
      - "Wissen Sie, wann der Zug nach Köln fährt?"
      - "Wissen Sie, wann der Zug nach Köln abfährt?"
    key_tokens: ["fährt"]
    explain:
      en: "Two verbs, two addresses. The wrapper Können Sie mir sagen is a main clause. The embedded question after the comma uses subordinate-clause order: … wann der Zug nach Köln fährt. The direct question is Wann fährt der Zug nach Köln? Keep the interrogative meaning, but do not leave direct-question word order inside the wrapper."
      ru: "Два глагола — два адреса. Рамка Können Sie mir sagen — главное предложение. Встроенный вопрос после запятой использует порядок придаточного: … wann der Zug nach Köln fährt. Прямой вопрос звучит Wann fährt der Zug nach Köln? Вопросительный смысл сохраняется, а порядок прямого вопроса внутри рамки — нет."
      uk: "Два дієслова — дві адреси. Рамка Können Sie mir sagen — головне речення. Вбудоване питання після коми використовує порядок підрядного: … wann der Zug nach Köln fährt. Пряме питання звучить Wann fährt der Zug nach Köln? Питальний зміст зберігається, а порядок прямого питання всередині рамки — ні."

  - id: variant-b
    outcomes: [nachfragen-klaeren]
    type: translate
    focus: indirekte-frage
    instruction:
      en: Translate into German. You are asking an assistant in the supermarket.
      ru: Переведите на немецкий. Вы спрашиваете продавца в супермаркете.
      uk: Перекладіть німецькою. Ви запитуєте продавця в супермаркеті.
    prompt_en: "Can you tell me when the shop closes on Saturday?"
    prompt_ru: "Вы не подскажете, когда магазин закрывается в субботу?"
    prompt_uk: "Чи не підкажете, коли магазин зачиняється в суботу?"
    answer: "Können Sie mir sagen, wann das Geschäft am Samstag schließt?"
    accept:
      - "Können Sie mir bitte sagen, wann das Geschäft am Samstag schließt?"
      - "Können Sie mir sagen, wann der Supermarkt am Samstag schließt?"
      - "Können Sie mir bitte sagen, wann der Supermarkt am Samstag schließt?"
      - "Wissen Sie, wann das Geschäft am Samstag schließt?"
      - "Wissen Sie, wann der Supermarkt am Samstag schließt?"
    key_tokens: ["schließt"]
    explain:
      en: "The wrapper is a question and keeps its own verb second; the wrapped clause is a Nebensatz and ends with its conjugated verb: … wann das Geschäft am Samstag schließt. The time phrase am Samstag simply sits inside the clause and changes nothing — only the verb has a fixed address, and that address is the wall. Wann schließt das Geschäft am Samstag? is the right question to ask on its own and the wrong thing to put behind a comma."
      ru: "Рамка — вопрос, и свой глагол она держит на втором месте; «обёрнутое» придаточное закрывается спрягаемым глаголом: … wann das Geschäft am Samstag schließt. Обстоятельство времени am Samstag просто стоит внутри придаточного и ни на что не влияет: фиксированный адрес есть только у глагола, и этот адрес — стена. Wann schließt das Geschäft am Samstag? — правильный самостоятельный вопрос и неправильное продолжение после запятой."
      uk: "Рамка — питання, і своє дієслово вона тримає на другому місці; «обгорнуте» підрядне закривається відмінюваним дієсловом: … wann das Geschäft am Samstag schließt. Обставина часу am Samstag просто стоїть усередині підрядного і ні на що не впливає: фіксована адреса є лише в дієслова, і ця адреса — стіна. Wann schließt das Geschäft am Samstag? — правильне самостійне питання і неправильне продовження після коми."

  - id: variant-c
    outcomes: [nachfragen-klaeren]
    type: translate
    focus: indirekte-frage
    instruction:
      en: Translate into German. You are asking at the reception of a doctor's surgery.
      ru: Переведите на немецкий. Вы спрашиваете в регистратуре у врача.
      uk: Перекладіть німецькою. Ви запитуєте в реєстратурі в лікаря.
    prompt_en: "Can you tell me when the surgery opens on Friday?"
    prompt_ru: "Вы не подскажете, когда в пятницу открывается врачебная практика?"
    prompt_uk: "Чи не підкажете, коли в п'ятницю відкривається лікарська практика?"
    answer: "Können Sie mir sagen, wann die Praxis am Freitag öffnet?"
    accept:
      - "Können Sie mir bitte sagen, wann die Praxis am Freitag öffnet?"
      - "Können Sie mir sagen, wann die Praxis am Freitag aufmacht?"
      - "Können Sie mir bitte sagen, wann die Praxis am Freitag aufmacht?"
      - "Wissen Sie, wann die Praxis am Freitag öffnet?"
      - "Wissen Sie, wann die Praxis am Freitag aufmacht?"
    key_tokens: ["öffnet"]
    explain:
      en: "Same rule for the third time, in the third place: the wrapper takes position 2 for its own verb, and the wrapped question hands its conjugated verb to the end of the clause — … wann die Praxis am Freitag öffnet. Whether you say öffnet or aufmacht is lexis and both are accepted; where the verb lands is the rule, and only that is graded. If your sentence reads Können Sie mir sagen, wann öffnet die Praxis, the bare question is still sitting inside the wrapper."
      ru: "То же правило в третий раз и в третьем месте: рамка держит свой глагол на втором месте, а «обёрнутый» вопрос отдаёт спрягаемый глагол в конец придаточного — … wann die Praxis am Freitag öffnet. Скажете вы öffnet или aufmacht — дело словаря, оба варианта принимаются; правило говорит лишь о том, где приземляется глагол, и только это и оценивается. Если получилось Können Sie mir sagen, wann öffnet die Praxis, значит внутри рамки по-прежнему сидит самостоятельный вопрос."
      uk: "Те саме правило втретє і в третьому місці: рамка тримає своє дієслово на другому місці, а «обгорнуте» питання віддає відмінюване дієслово в кінець підрядного — … wann die Praxis am Freitag öffnet. Скажете ви öffnet чи aufmacht — справа словника, обидва варіанти приймаються; правило говорить лише про те, де приземляється дієслово, і тільки це й оцінюється. Якщо вийшло Können Sie mir sagen, wann öffnet die Praxis, значить усередині рамки досі сидить самостійне питання."
