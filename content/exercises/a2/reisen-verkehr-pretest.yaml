topic: reisen-verkehr
role: pretest
title:
  en: "Pretest — travel and getting around"
  ru: "Претест — путешествия и транспорт"
  uk: "Претест — подорожі та транспорт"
items:
  - id: pre-sein-gefahren
    outcomes: [reise-berichten]
    type: cloze
    focus: haben-sein
    revision: 2
    instruction:
      en: "Guess. You have not learnt this yet — a wrong guess here is worth more than a right one later."
      ru: "Угадывайте. Вы этого ещё не проходили: неверная догадка сейчас полезнее правильного ответа потом."
      uk: "Вгадуйте. Ви цього ще не проходили: хибний здогад зараз корисніший за правильну відповідь потім."
    text: "Timo {{ist}} am Montag mit dem Zug nach Hamburg gefahren."
    translation:
      en: On Monday Timo travelled to Hamburg by train.
      ru: В понедельник Тимо поехал в Гамбург на поезде.
      uk: У понеділок Тімо поїхав до Гамбурга потягом.
    explain:
      en: "In this directional use, fahren forms the Perfekt with sein: er ist nach Hamburg gefahren. Learn common change-of-place verbs such as fahren, gehen, kommen and fliegen with sein in these uses; 'every movement verb' would be too broad, because auxiliary choice is lexical and can change with a verb's use."
      ru: "В этом направленном употреблении fahren образует Perfekt с sein: er ist nach Hamburg gefahren. Учите частотные глаголы смены места fahren, gehen, kommen и fliegen с sein в таких употреблениях; правило «любой глагол движения» слишком широко, потому что выбор вспомогательного глагола лексичен и может зависеть от употребления."
      uk: "У цьому напрямленому вживанні fahren утворює Perfekt із sein: er ist nach Hamburg gefahren. Учіть частотні дієслова зміни місця fahren, gehen, kommen і fliegen із sein у таких уживаннях; правило «будь-яке дієслово руху» надто широке, бо вибір допоміжного дієслова лексичний і може залежати від уживання."

  - id: pre-mit-dativ
    outcomes: [verbindung-waehlen]
    type: mc
    focus: dativ-praepositionen
    prompt: "Ich fahre ___ Zug nach Bremen."
    options: ["mit der", "mit dem", "mit den"]
    correct: 1
    translation:
      en: I am going to Bremen by train.
      ru: Я еду в Бремен на поезде.
      uk: Я їду до Бремена потягом.
    explain:
      en: "The vehicle is introduced by mit, and mit always takes the dative. der Zug is masculine, so the dative article is dem: mit dem Zug. mit den would be a dative plural (mit den Zügen)."
      ru: "Транспорт вводится предлогом mit, а mit всегда требует Dativ. der Zug — мужского рода, значит артикль в Dativ — dem: mit dem Zug. Форма mit den — это множественное число (mit den Zügen)."
      uk: "Транспорт вводиться прийменником mit, а mit завжди вимагає Dativ. der Zug — чоловічого роду, отже артикль у Dativ — dem: mit dem Zug. Форма mit den — це множина (mit den Zügen)."

  - id: pre-satzklammer
    outcomes: [reise-berichten]
    type: mc
    focus: perfekt-satzklammer
    prompt: "Welcher Satz ist richtig?"
    options:
      - "In Hannover ich bin umgestiegen."
      - "In Hannover bin ich umgestiegen."
      - "In Hannover bin umgestiegen ich."
    correct: 1
    translation:
      en: "Which sentence is correct? (I changed trains in Hanover.)"
      ru: "Какое предложение построено правильно? (В Ганновере я сделал пересадку.)"
      uk: "Яке речення побудоване правильно? (У Ганновері я зробив пересадку.)"
    explain:
      en: "In Hannover fills position 1, so the conjugated verb bin must stand second and the subject ich moves behind it. The Partizip II umgestiegen closes the bracket at the very end — nothing may follow it."
      ru: "In Hannover занимает первое место, поэтому спрягаемый глагол bin стоит вторым, а подлежащее ich уходит за него. Partizip II umgestiegen замыкает рамку в самом конце — после него не стоит ничего."
      uk: "In Hannover займає перше місце, тому відмінюване дієслово bin стоїть другим, а підмет ich іде за нього. Partizip II umgestiegen замикає рамку в самому кінці — після нього не стоїть нічого."
