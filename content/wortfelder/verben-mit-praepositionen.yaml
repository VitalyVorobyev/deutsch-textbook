id: verben-mit-praepositionen
topic: verben-mit-praepositionen
level: A2
title_de: "Verweisen statt wiederholen"
title_en: "Refer back instead of repeating"
title_ru: "Ссылаться вместо повторения"
members:
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "daran denken" }
    role: active
    relations:
      - type: collocation
        de: "an etwas denken · daran denken"
        explanation: { en: "The verb keeps an in both the noun phrase and the da-form.", ru: "Глагол сохраняет an и с существительным, и в da-форме." }
        example_de: "Denk bitte an die Tickets. Denk bitte daran."
        example: { en: "Please remember the tickets. Please remember them.", ru: "Пожалуйста, не забудь билеты. Пожалуйста, помни об этом." }
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "darauf warten" }
    role: active
    relations:
      - type: contrast
        de: "auf eine Sache warten · auf eine Person warten"
        explanation: { en: "A thing can become darauf; a person becomes auf ihn/sie.", ru: "Предмет заменяется на darauf, человек — на auf ihn/sie." }
        example_de: "Ich warte auf den Bus → darauf. Ich warte auf Lea → auf sie."
        example: { en: "I wait for the bus → for it. I wait for Lea → for her.", ru: "Я жду автобус → его. Я жду Леа → её." }
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "darüber sprechen" }
    role: active
    relations:
      - type: formation
        de: "worüber? → darüber"
        explanation: { en: "über begins with a vowel, so both forms insert r.", ru: "über начинается с гласной, поэтому в обеих формах появляется r." }
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "davon träumen" }
    role: active
    relations: []
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "sich dafür interessieren" }
    role: active
    relations:
      - type: family
        de: "wofür? · dafür"
        explanation: { en: "The question and reference share für.", ru: "Вопрос и отсылка сохраняют für." }
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "damit arbeiten" }
    role: active
    relations: []
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "sich daran erinnern" }
    role: active
    relations:
      - type: contrast
        de: "an etwas denken · sich an etwas erinnern"
        explanation: { en: "Both select an; erinnern is reflexive.", ru: "Оба глагола требуют an; erinnern употребляется возвратно." }
  - kind: card
    ref: { deck: verben-mit-praepositionen, de: "sich darauf freuen" }
    role: active
    relations:
      - type: collocation
        de: "sich auf etwas freuen"
        explanation: { en: "This is anticipation of something still ahead.", ru: "Это радостное ожидание того, что ещё впереди." }
  - kind: card
    ref: { deck: redemittel-chunks-a2, de: "dafür sein" }
    role: chunk
    relations: []
  - kind: card
    ref: { deck: redemittel-chunks-a2, de: "dagegen sein" }
    role: chunk
    relations: []
  - kind: card
    ref: { deck: redemittel-chunks-a2, de: "dabei sein" }
    role: chunk
    relations: []
  - kind: card
    ref: { deck: zeitadverbien-a2, de: "vorher" }
    role: active
    relations:
      - type: register
        de: "vorher · zuvor"
        explanation: { en: "Use vorher productively; recognize the more written/formal zuvor.", ru: "Активно используйте vorher; узнавайте более письменное и формальное zuvor." }
  - kind: card
    ref: { deck: alltag-tagesablauf, de: "danach" }
    role: active
    relations: []
  - kind: receptive
    de: zuvor
    en: "previously, before that (more written/formal)"
    ru: "ранее, до этого (чаще письменно/формально)"
  - kind: receptive
    de: dazu
    en: "to it; for that purpose"
    ru: "к этому; для этого"
  - kind: receptive
    de: darum
    en: "about that; that is why (depending on construction)"
    ru: "об этом; поэтому (в зависимости от конструкции)"
  - kind: receptive
    de: wobei
    en: "with what; in doing what"
    ru: "с чем; при чём"
  - kind: receptive
    de: wogegen
    en: "against what"
    ru: "против чего"
