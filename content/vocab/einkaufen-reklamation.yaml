id: einkaufen-reklamation
title_de: "Einkaufen & Reklamation"
title_en: "Shopping & complaints"
title_ru: "Покупки и рекламация"
level: A2
entries:
  # --- Reklamation & Umtausch ---
  - de: Reklamation
    ipa: "ʁeklamaˈtsi̯oːn"
    pos: noun
    gender: f
    plural: "die Reklamationen"
    en: complaint (about a purchase)
    ru: рекламация, претензия (по покупке)
    example_de: Ich schreibe eine Reklamation an den Online-Shop.
    example_en: I am writing a complaint to the online shop.
    example_ru: Я пишу рекламацию в интернет-магазин.
    note:
      en: "A Reklamation is a complaint about goods or a service, not a general grumble. The verb is reklamieren, but at A2 the useful form is the noun: eine Reklamation schreiben."
      ru: "Reklamation — это официальная претензия к товару или услуге, а не жалоба вообще. Глагол — reklamieren, но на уровне A2 полезнее существительное: eine Reklamation schreiben."
  - de: Quittung
    ipa: "ˈkvɪtʊŋ"
    pos: noun
    gender: f
    plural: "die Quittungen"
    en: receipt
    ru: квитанция, чек
    example_de: Ohne Quittung ist ein Umtausch schwer.
    example_en: Without a receipt an exchange is difficult.
    example_ru: Без чека обмен затруднителен.
  - de: Bon
    ipa: "ˈbɔŋ"
    pos: noun
    gender: m
    plural: "die Bons"
    en: till slip, sales receipt
    ru: кассовый чек
    example_de: Der Bon liegt noch in der Jacke.
    example_en: The till slip is still in the jacket.
    example_ru: Кассовый чек ещё лежит в куртке.
    note:
      en: "A French loanword, pronounced with a nasal-sounding ending. Bon and Quittung mean much the same in a shop; Bon is the little slip the till prints."
      ru: "Заимствование из французского, поэтому и произношение необычное. В магазине Bon и Quittung — почти одно и то же; Bon — это тот самый чек, который печатает касса."
  - de: Garantie
    ipa: "gaʁanˈtiː"
    pos: noun
    gender: f
    plural: "die Garantien"
    en: warranty, guarantee
    ru: гарантия
    example_de: Der Wasserkocher hat noch ein Jahr Garantie.
    example_en: The kettle still has one year of warranty.
    example_ru: На чайник ещё год гарантии.
  - de: Fehler
    ipa: "ˈfeːlɐ"
    pos: noun
    gender: m
    plural: "die Fehler"
    en: fault, defect; mistake
    ru: дефект, брак; ошибка
    example_de: Die Jacke hat einen Fehler im Material.
    example_en: The jacket has a defect in the material.
    example_ru: У куртки дефект материала.
    note:
      en: "Same word for a fault in a product and a mistake in an exercise: ein Fehler im Material, ein Fehler im Text."
      ru: "Одно слово и для брака в товаре, и для ошибки в тексте: ein Fehler im Material, ein Fehler im Text."
  - de: Gerät
    ipa: "gəˈʁɛːt"
    pos: noun
    gender: n
    plural: "die Geräte"
    en: device, appliance
    ru: прибор, устройство
    example_de: Das Gerät funktioniert seit gestern nicht mehr.
    example_en: The device has not been working since yesterday.
    example_ru: Прибор со вчерашнего дня не работает.
  - de: Reißverschluss
    ipa: "ˈʁaɪ̯sfɛɐ̯ˌʃlʊs"
    pos: noun
    gender: m
    plural: "die Reißverschlüsse"
    en: zip, zipper
    ru: молния (застёжка)
    example_de: Der Reißverschluss ist kaputt gegangen.
    example_en: The zip has broken.
    example_ru: Молния сломалась.
    note:
      en: "A compound of reißen (to tear) and Verschluss (fastener), with the stress on the first part. It is the defect you will name most often when you take clothes back."
      ru: "Сложное слово из reißen («рвать») и Verschluss («застёжка»), ударение — на первой части. Это самый частый дефект, о котором приходится говорить при возврате одежды."
  - de: umtauschen
    ipa: "ˈʊmˌtaʊ̯ʃn̩"
    pos: verb
    praesens_3sg: tauscht um
    partizip2: umgetauscht
    aux: haben
    valence: "+ Akk"
    en: to exchange (a purchase)
    ru: обменять (покупку)
    example_de: Ich tausche den Pullover um.
    example_en: I am exchanging the pullover.
    example_ru: Я обмениваю свитер.
    note:
      en: "Separable: the prefix um- goes to the end of the clause — ich tausche … um. After a modal the verb stays whole: Ich möchte den Pullover umtauschen."
      ru: "Отделяемая приставка: um- уходит в конец предложения — ich tausche … um. После модального глагола форма остаётся целой: Ich möchte den Pullover umtauschen."
  - de: zurückgeben
    ipa: "tsuˈʁʏkˌgeːbn̩"
    pos: verb
    praesens_3sg: gibt zurück
    partizip2: zurückgegeben
    aux: haben
    valence: "+ Akk"
    en: to give back, to return (an item)
    ru: вернуть, отдать обратно
    example_de: Kann ich die Schuhe zurückgeben?
    example_en: Can I return the shoes?
    example_ru: Могу я вернуть ботинки?
    note:
      en: "umtauschen brings you a different item; zurückgeben brings you your money. Both are separable: ich gebe … zurück."
      ru: "umtauschen — получить другой товар, zurückgeben — вернуть товар и получить деньги. Оба глагола с отделяемой приставкой: ich gebe … zurück."
  # --- Vergleichen & bewerten ---
  - de: vergleichen
    ipa: "fɛɐ̯ˈglaɪ̯çn̩"
    pos: verb
    praesens_3sg: vergleicht
    partizip2: verglichen
    aux: haben
    valence: "+ Akk"
    en: to compare
    ru: сравнивать
    example_de: Ich vergleiche die Preise im Internet.
    example_en: I compare the prices on the internet.
    example_ru: Я сравниваю цены в интернете.
    note:
      en: "Inseparable prefix ver-, so the Partizip II has no ge-: verglichen."
      ru: "Неотделяемая приставка ver-, поэтому в Partizip II нет ge-: verglichen."
  - de: Qualität
    ipa: "kvaliˈtɛːt"
    pos: noun
    gender: f
    plural: "die Qualitäten"
    en: quality
    ru: качество
    example_de: Die Jacke ist teuer, aber die Qualität ist gut.
    example_en: The jacket is expensive, but the quality is good.
    example_ru: Куртка дорогая, но качество хорошее.
  - de: Kaufhaus
    ipa: "ˈkaʊ̯fˌhaʊ̯s"
    pos: noun
    gender: n
    plural: "die Kaufhäuser"
    en: department store
    ru: универмаг
    example_de: Im Kaufhaus gibt es Kleidung, Geräte und Möbel.
    example_en: In the department store there are clothes, appliances and furniture.
    example_ru: В универмаге есть одежда, приборы и мебель.
  - de: günstig
    ipa: "ˈgʏnstɪç"
    pos: adj
    en: cheap, at a good price
    ru: недорогой, выгодный (по цене)
    example_de: Die Jacke dort ist günstiger.
    example_en: The jacket over there is cheaper.
    example_ru: Та куртка дешевле.
    note:
      en: "günstig praises the price; billig can also mean 'cheaply made'. In a shop, günstig is the friendlier word."
      ru: "günstig хвалит цену, тогда как billig может означать и «дешёвка, низкое качество». В магазине günstig звучит куда лучше."
  - de: eng
    ipa: "ˈɛŋ"
    pos: adj
    en: tight, narrow
    ru: узкий, тесный
    example_de: Größe 38 ist mir zu eng.
    example_en: Size 38 is too tight for me.
    example_ru: Размер 38 мне слишком узок.
  - de: bequem
    ipa: "bəˈkveːm"
    pos: adj
    en: comfortable
    ru: удобный, комфортный
    example_de: Diese Schuhe sind bequemer als die Schuhe dort.
    example_en: These shoes are more comfortable than the shoes over there.
    example_ru: Эти ботинки удобнее, чем те.
  - de: leicht
    ipa: "ˈlaɪ̯çt"
    pos: adj
    en: light (in weight); easy
    ru: лёгкий (по весу); лёгкий, простой
    example_de: Die Jacke hier ist leichter als der Mantel.
    example_en: The jacket here is lighter than the coat.
    example_ru: Эта куртка легче, чем пальто.
  - de: zufrieden
    ipa: "tsuˈfʁiːdn̩"
    pos: adj
    en: satisfied, content
    ru: довольный
    example_de: Ich bin mit der Qualität nicht zufrieden.
    example_en: I am not satisfied with the quality.
    example_ru: Я недоволен качеством.
    note:
      en: "Usually with mit + Dativ: zufrieden mit dem Preis, zufrieden mit der Jacke."
      ru: "Обычно с mit + Dativ: zufrieden mit dem Preis, zufrieden mit der Jacke."
  - de: mehr
    ipa: "ˈmeːɐ̯"
    pos: adv
    en: more
    ru: больше
    example_de: Der Mantel kostet mehr als die Jacke.
    example_en: The coat costs more than the jacket.
    example_ru: Пальто стоит больше, чем куртка.
    note:
      en: "mehr is the comparative of viel — it never has an -er ending of its own, and it never stands in front of an adjective (wärmer, not mehr warm)."
      ru: "mehr — сравнительная степень от viel; собственного окончания -er у неё нет. И mehr никогда не ставят перед прилагательным: wärmer, а не mehr warm."
  # --- Chunks ---
  - de: Das passt mir nicht.
    pos: phrase
    en: It doesn't fit me. (about size)
    ru: Это мне не подходит (по размеру).
    example_de: Größe 38? Nein, das passt mir nicht.
    example_en: Size 38? No, that doesn't fit me.
    example_ru: Размер 38? Нет, это мне не подходит.
    note:
      en: "The garment is the subject and the person stands in the dative: Das passt mir. Never 'Ich passe das nicht'."
      ru: "Подлежащее — вещь, а человек стоит в дательном падеже: Das passt mir. Нельзя сказать «Ich passe das nicht»."
  - de: Ich möchte das umtauschen.
    pos: phrase
    en: I would like to exchange this.
    ru: Я хотел бы это обменять.
    example_de: Guten Tag. Ich möchte das umtauschen. Hier ist der Bon.
    example_en: Hello. I would like to exchange this. Here is the receipt.
    example_ru: Здравствуйте. Я хотел бы это обменять. Вот чек.
  - de: Es ist kaputt gegangen.
    pos: phrase
    en: It broke. (it stopped working / it came apart)
    ru: Оно сломалось.
    example_de: Der Reißverschluss ist nach zwei Wochen kaputt gegangen.
    example_en: The zip broke after two weeks.
    example_ru: Молния сломалась через две недели.
    note:
      en: "kaputtgehen describes the moment something breaks; kaputt sein describes the state afterwards. The Perfekt takes sein: Es ist kaputt gegangen."
      ru: "kaputtgehen — момент поломки, kaputt sein — состояние после неё. Перфект образуется с sein: Es ist kaputt gegangen."
