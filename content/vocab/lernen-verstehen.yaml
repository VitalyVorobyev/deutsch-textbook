id: lernen-verstehen
title_de: "Lernen, Verstehen & Nachfragen"
title_en: "Learning, understanding & asking again"
title_ru: "Учёба, понимание и переспрашивание"
level: A2
entries:
  # This topic teaches the SYNTAX of the wrapped question, not a word field, so the deck is
  # deliberately thin. The classroom nouns the unit lives on — Kurs, Unterricht, Aufgabe,
  # Übung, Prüfung, Lehrer, Schule — are already cards in `schule-arbeit`, and Frage,
  # Antwort, bedeuten and wiederholen are already cards in `kommunikation-medien`; the
  # article, the Lesetext and the exercises recycle them freely. What is left is the
  # language of *not* understanding: what a word means, how it sounds, where to look it up —
  # plus five chunks that carry the repair whole, so they can be said without being built.
  # The receptive-only classroom furniture (Tafel, Heft) stays in the Lesetext, glossed:
  # every entry here becomes two flashcards, and a deck cannot teach for recognition alone.

  # --- Was ein Wort bedeutet ---
  - de: Bedeutung
    ipa: "bəˈdɔʏ̯tʊŋ"
    pos: noun
    gender: f
    plural: "die Bedeutungen"
    en: meaning
    ru: значение, смысл
    example_de: Ich kenne das Wort, aber ich weiß nicht, was die Bedeutung ist.
    example_en: I know the word, but I do not know what its meaning is.
    example_ru: Слово я знаю, но не знаю, каково его значение.
    note:
      en: "The verb bedeuten goes with it: Was bedeutet dieses Wort? Nouns in -ung are always feminine — die Bedeutung, die Übung, die Prüfung."
      ru: "Однокоренной глагол — bedeuten: Was bedeutet dieses Wort? Существительные на -ung всегда женского рода: die Bedeutung, die Übung, die Prüfung."
  - de: Wort
    ipa: "ˈvɔʁt"
    pos: noun
    gender: n
    plural: "die Wörter"
    en: word
    ru: слово
    example_de: Dieses Wort ist neu für mich.
    example_en: This word is new to me.
    example_ru: Это слово для меня новое.
    note:
      en: "Two plurals, two meanings: die Wörter are separate words (as in a dictionary), die Worte are words that belong together (a speech, a message). In a course you almost always need die Wörter."
      ru: "Две формы множественного числа и два значения: die Wörter — отдельные слова (как в словаре), die Worte — связная речь (слова напутствия, речь). На курсе почти всегда нужна форма die Wörter."
  - de: Beispiel
    ipa: "ˈbaɪ̯ʃpiːl"
    pos: noun
    gender: n
    plural: "die Beispiele"
    en: example
    ru: пример
    example_de: "Können Sie mir ein Beispiel geben? Dann verstehe ich die Regel."
    example_en: "Can you give me an example? Then I will understand the rule."
    example_ru: "Не могли бы вы привести пример? Тогда я пойму правило."
    note:
      en: "zum Beispiel (often written z. B.) = 'for example'. It is one of the most useful things you can say when you are explaining what you mean."
      ru: "zum Beispiel (на письме часто z. B.) — «например». Один из самых полезных оборотов, когда вы объясняете, что имеете в виду."
  - de: Regel
    ipa: "ˈʁeːgl̩"
    pos: noun
    gender: f
    plural: "die Regeln"
    en: rule
    ru: правило
    example_de: Die Regel ist nicht schwer, aber ich brauche ein Beispiel.
    example_en: The rule is not difficult, but I need an example.
    example_ru: Правило несложное, но мне нужен пример.

  # --- Wie ein Wort klingt und wo es steht ---
  - de: Aussprache
    ipa: "ˈaʊ̯sˌʃpʁaːxə"
    pos: noun
    gender: f
    plural: "—"
    en: pronunciation
    ru: произношение
    example_de: Meine Aussprache ist noch nicht gut. Deshalb lese ich jeden Tag laut.
    example_en: My pronunciation is not good yet. That is why I read aloud every day.
    example_ru: Произношение у меня пока не очень. Поэтому я каждый день читаю вслух.
    note:
      en: "A compound of aus + Sprache, and the stress sits on the first part: AUS-sprache. The plural is practically never used."
      ru: "Сложное слово из aus + Sprache, ударение падает на первую часть: AUS-sprache. Множественное число практически не употребляется."
  - de: Wörterbuch
    ipa: "ˈvœʁtɐˌbuːx"
    pos: noun
    gender: n
    plural: "die Wörterbücher"
    en: dictionary
    ru: словарь
    example_de: Das Wort steht nicht im Wörterbuch.
    example_en: The word is not in the dictionary.
    example_ru: Этого слова нет в словаре.
    note:
      en: "Wörter + Buch: the gender comes from the last part, so it is das Buch, das Wörterbuch. The stress is on the first part: WÖR-terbuch."
      ru: "Wörter + Buch: род сложного слова определяет последняя часть, поэтому das Buch — и das Wörterbuch. Ударение на первой части: WÖR-terbuch."
  - de: Sprachschule
    ipa: "ˈʃpʁaːxˌʃuːlə"
    pos: noun
    gender: f
    plural: "die Sprachschulen"
    en: language school
    ru: языковая школа
    example_de: Ich möchte wissen, ob die Sprachschule im Sommer einen Kurs hat.
    example_en: I would like to know whether the language school has a course in the summer.
    example_ru: Хотелось бы узнать, есть ли у языковой школы курс летом.

  # --- Was man mit einer Sprache macht ---
  - de: üben
    ipa: "ˈyːbn̩"
    pos: verb
    en: to practise
    ru: тренироваться, отрабатывать
    example_de: Ich übe jeden Tag zwanzig Minuten.
    example_en: I practise for twenty minutes every day.
    example_ru: Я занимаюсь по двадцать минут каждый день.
    partizip2: geübt
    aux: haben
    praesens_3sg: übt
    valence: "+ Akk"
    note:
      en: "üben is what you do with a skill you already have and want to make automatic; lernen is what you do with something new. Ich lerne ein neues Wort — ich übe die Aussprache."
      ru: "üben — отрабатывать то, что уже знаешь, доводя до автоматизма; lernen — узнавать новое. Ich lerne ein neues Wort — ich übe die Aussprache."
  - de: notieren
    ipa: "noˈtiːʁən"
    pos: verb
    en: to note down, to write down
    ru: записывать, помечать
    example_de: Ich notiere das neue Wort und suche es zu Hause.
    example_en: I write the new word down and look it up at home.
    example_ru: Я записываю новое слово и ищу его дома.
    partizip2: notiert
    aux: haben
    praesens_3sg: notiert
    valence: "+ Akk"
    note:
      en: "Verbs in -ieren build the Partizip II without ge-: notiert, not genotiert. Same for telefonieren, studieren, passieren."
      ru: "Глаголы на -ieren образуют Partizip II без ge-: notiert, а не genotiert. Так же ведут себя telefonieren, studieren, passieren."
  - de: übersetzen
    ipa: "yːbɐˈzɛtsn̩"
    pos: verb
    en: to translate
    ru: переводить
    example_de: Können Sie mir sagen, wie man diesen Satz übersetzt?
    example_en: Can you tell me how you translate this sentence?
    example_ru: Не подскажете, как перевести это предложение?
    partizip2: übersetzt
    aux: haben
    praesens_3sg: übersetzt
    valence: "+ Akk"
    note:
      en: "The prefix über- does not split here and the Partizip II takes no ge-: Ich habe den Text übersetzt — never Ich setze den Text über."
      ru: "Приставка über- здесь неотделяемая, и в Partizip II нет ge-: Ich habe den Text übersetzt — но никогда Ich setze den Text über."
  - de: nachfragen
    ipa: "ˈnaːxˌfʁaːgn̩"
    pos: verb
    en: to ask again, to check by asking
    ru: переспрашивать, уточнять
    example_de: Wenn ich etwas nicht verstehe, frage ich nach.
    example_en: If I do not understand something, I ask again.
    example_ru: Если я чего-то не понимаю, я переспрашиваю.
    partizip2: nachgefragt
    aux: haben
    praesens_3sg: fragt nach
    note:
      en: "Separable: the prefix goes to the end of the main clause — Ich frage lieber nach. In a Nebensatz there is no position 2 to leave it behind in, so the verb goes to the wall in one piece: …, weil ich nachfrage."
      ru: "Глагол отделяемый: приставка уходит в конец главного предложения — Ich frage lieber nach. В придаточном второго места, которое она покидала бы, нет, поэтому глагол уходит к стене целиком: …, weil ich nachfrage."

  # --- Wie jemand spricht ---
  - de: langsam
    ipa: "ˈlaŋzaːm"
    pos: adv
    en: slow, slowly
    ru: медленно, медленный
    example_de: Können Sie bitte langsamer sprechen?
    example_en: Could you speak more slowly, please?
    example_ru: Вы не могли бы говорить помедленнее?
    note:
      en: "The comparative langsamer is what you actually need in a course: you are not asking for slow speech, you are asking for slower speech than you just heard."
      ru: "В курсе вам понадобится именно сравнительная форма langsamer: вы просите не «говорить медленно», а «говорить помедленнее», чем только что."
  - de: deutlich
    ipa: "ˈdɔʏ̯tlɪç"
    pos: adv
    en: clear, clearly, distinctly
    ru: чётко, отчётливо, ясно
    example_de: Die Kursleiterin spricht sehr deutlich. Deshalb verstehe ich sie gut.
    example_en: The course teacher speaks very clearly. That is why I understand her well.
    example_ru: Преподавательница говорит очень чётко. Поэтому я хорошо её понимаю.

  # --- Bausteine für die Reparatur (chunks: say them, do not build them) ---
  - de: "Wie bitte?"
    ipa: "viː ˈbɪtə"
    pos: phrase
    en: Sorry? Pardon?
    ru: Простите, что?
    example_de: "Wie bitte? Ich habe die Frage nicht gehört."
    example_en: "Sorry? I did not hear the question."
    example_ru: "Простите, что? Я не расслышал вопрос."
    note:
      en: "The shortest repair there is, and the one you need when you caught nothing at all. It is not rude — it is what German speakers say to each other every day."
      ru: "Самый короткий способ переспросить — на случай, когда вы не уловили вообще ничего. Это не грубо: немцы говорят так друг другу каждый день."
  - de: "Was bedeutet das?"
    ipa: "vas bəˈdɔʏ̯tət das"
    pos: phrase
    en: What does that mean?
    ru: Что это значит?
    example_de: "„Nachfragen“ — was bedeutet das?"
    example_en: "'Nachfragen' — what does that mean?"
    example_ru: "«Nachfragen» — что это значит?"
    note:
      en: "Name the word and you get a precise answer: Was bedeutet „Bedeutung“? A bare Ich verstehe nicht leaves the other person guessing which part lost you."
      ru: "Назовите слово — и получите точный ответ: Was bedeutet «Bedeutung»? Голое Ich verstehe nicht заставляет собеседника гадать, что именно осталось непонятным."
  - de: "Können Sie das bitte wiederholen?"
    pos: phrase
    en: Could you repeat that, please?
    ru: Вы не могли бы это повторить?
    example_de: "Entschuldigung, können Sie das bitte wiederholen?"
    example_en: "Excuse me, could you repeat that, please?"
    example_ru: "Извините, вы не могли бы это повторить?"
    note:
      en: "An ordinary main clause: können in position 2, the infinitive wiederholen at the very end. To a classmate it becomes Kannst du das bitte wiederholen?"
      ru: "Обычное главное предложение: können на втором месте, инфинитив wiederholen — в самом конце. Соседу по курсу вы скажете Kannst du das bitte wiederholen?"
  - de: "Wie schreibt man das?"
    pos: phrase
    en: How do you write that?
    ru: Как это пишется?
    example_de: "Ein schönes Wort! Wie schreibt man das?"
    example_en: "A lovely word! How do you write it?"
    example_ru: "Красивое слово! А как оно пишется?"
    note:
      en: "man is the impersonal 'one/you in general', and it always takes the er/sie/es form: man schreibt, man sagt, man macht. If you need the letters, follow up with Können Sie das bitte buchstabieren?"
      ru: "man — безличное «как это пишется вообще», и глагол при нём всегда в форме er/sie/es: man schreibt, man sagt, man macht. Если нужны буквы, добавьте Können Sie das bitte buchstabieren?"
  - de: "Können Sie mir sagen, wo der Kurs ist?"
    pos: phrase
    en: Can you tell me where the course is?
    ru: Вы не подскажете, где проходит курс?
    example_de: "Entschuldigung, können Sie mir sagen, wo der Kurs ist?"
    example_en: "Excuse me, can you tell me where the course is?"
    example_ru: "Извините, вы не подскажете, где проходит курс?"
    note:
      en: "The chunk carries the whole pattern: the wrapper keeps its verb in position 2 (Können), and the wrapped question hands its verb to the very end (ist). Swap in any content — Können Sie mir sagen, wann die Prüfung beginnt? Never … wo ist der Kurs."
      ru: "Готовый образец всей конструкции: у рамки глагол на втором месте (Können), а «обёрнутый» вопрос отдаёт свой глагол в самый конец (ist). Содержание можно менять: Können Sie mir sagen, wann die Prüfung beginnt? Но никогда … wo ist der Kurs."
