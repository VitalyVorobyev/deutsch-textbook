# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the emotions and
# reflexive verbs of the personen-familie-gefuehle manifest section.
id: gefuehle-reflexive-a2
title_de: "Gefühle & reflexive Verben"
title_en: "Feelings & reflexive verbs"
title_ru: "Чувства и возвратные глаголы"
title_uk: "Почуття та зворотні дієслова"
level: A2
entries:
  - de: ärgern
    ipa: "ˈɛʁgɐn"
    pos: verb
    praesens_3sg: ärgert sich
    partizip2: sich geärgert
    aux: haben
    valence: "sich ärgern über + Akk"
    accept: ["sich ärgern"]
    en: to be annoyed, to get cross (about)
    ru: злиться, сердиться (на что-л.)
    uk: злитися, сердитися (на щось)
    example_de: Ich ärgere mich über meinen Chef.
    example_en: I am annoyed with my boss.
    example_ru: Я злюсь на своего начальника.
    example_uk: Я злюся на свого начальника.
    note:
      en: 'The reflexive pronoun stands in the Akkusativ and changes with the person: ich ärgere mich, du ärgerst dich, er/sie ärgert sich, wir ärgern uns, ihr ärgert euch, sie/Sie ärgern sich. It belongs to the verb and is never dropped. What annoys you follows über + Akkusativ, and you point back to it with darüber: Ich ärgere mich darüber.'
      ru: 'Возвратное местоимение стоит в Akkusativ и меняется по лицам: ich ärgere mich, du ärgerst dich, er/sie ärgert sich, wir ärgern uns, ihr ärgert euch, sie/Sie ärgern sich. Русское «-ся» приклеено к глаголу и не меняется никогда; немецкое местоимение — отдельное слово, и для каждого лица оно своё. Опускать его нельзя. Причину вводит über + Akkusativ, а сослаться на неё можно словом darüber: Ich ärgere mich darüber.'
      uk: 'Зворотний займенник стоїть в Akkusativ і змінюється за особами: ich ärgere mich, du ärgerst dich, er/sie ärgert sich, wir ärgern uns, ihr ärgert euch, sie/Sie ärgern sich. Українське «-ся» приклеєне до дієслова й не змінюється ніколи; німецький займенник — окреме слово, і для кожної особи він свій. Опускати його не можна. Причину вводить über + Akkusativ, а послатися на неї можна словом darüber: Ich ärgere mich darüber.'
  - de: bedanken
    ipa: "bəˈdaŋkən"
    pos: verb
    praesens_3sg: bedankt sich
    partizip2: sich bedankt
    aux: haben
    valence: "sich bedanken bei + Dat (für + Akk)"
    accept: ["sich bedanken"]
    en: to say thank you, to thank
    ru: благодарить, говорить спасибо
    uk: дякувати, говорити спасибі
    example_de: Ich bedanke mich bei meiner Kollegin für die Hilfe.
    example_en: I want to thank my colleague for her help.
    example_ru: Я благодарю коллегу за помощь.
    example_uk: Я дякую колезі за допомогу.
    note:
      en: 'Two prepositions, two roles: bei + Dativ names the person you thank, für + Akkusativ names what for. The prefix be- is inseparable, so the Partizip II has no ge-: hat sich bedankt. A shorter, non-reflexive alternative exists — danken + Dativ (Ich danke dir).'
      ru: 'Два предлога — две роли: bei + Dativ называет того, кого благодарят, für + Akkusativ — за что. Приставка be- неотделяемая, поэтому Partizip II без ge-: hat sich bedankt. Есть и короткий невозвратный вариант — danken + Dativ (Ich danke dir).'
      uk: 'Два прийменники — дві ролі: bei + Dativ називає того, кому дякують, für + Akkusativ — за що. Префікс be- невідокремлюваний, тому Partizip II без ge-: hat sich bedankt. Є й короткий незворотний варіант — danken + Dativ (Ich danke dir).'
  - de: beeilen
    ipa: "bəˈʔaɪ̯lən"
    pos: verb
    praesens_3sg: beeilt sich
    partizip2: sich beeilt
    aux: haben
    valence: "sich beeilen"
    accept: ["sich beeilen"]
    en: to hurry, to hurry up
    ru: торопиться, спешить
    uk: поспішати, квапитися
    example_de: Beeil dich, der Zug fährt in fünf Minuten!
    example_en: Hurry up, the train leaves in five minutes!
    example_ru: Поторопись, поезд отходит через пять минут!
    example_uk: Поквапся, потяг відходить за п’ять хвилин!
    note:
      en: 'One of the few reflexive verbs with no preposition at all — just the pronoun: ich beeile mich, beeil dich, beeilen Sie sich. The imperative Beeil dich! is what you will actually hear. Inseparable be-, so no ge- in the Partizip II: hat sich beeilt.'
      ru: 'Один из немногих возвратных глаголов вообще без предлога — только местоимение: ich beeile mich, beeil dich, beeilen Sie sich. В речи чаще всего звучит именно императив Beeil dich! Приставка be- неотделяемая, значит, Partizip II без ge-: hat sich beeilt.'
      uk: 'Один із небагатьох зворотних дієслів узагалі без прийменника — лише займенник: ich beeile mich, beeil dich, beeilen Sie sich. У мовленні найчастіше звучить саме імператив Beeil dich! Префікс be- невідокремлюваний, отже Partizip II без ge-: hat sich beeilt.'
  - de: beschweren
    ipa: "bəˈʃveːʁən"
    pos: verb
    praesens_3sg: beschwert sich
    partizip2: sich beschwert
    aux: haben
    valence: "sich beschweren über + Akk (bei + Dat)"
    accept: ["sich beschweren"]
    en: to complain
    ru: жаловаться
    uk: скаржитися
    example_de: Die Nachbarn beschweren sich über den Lärm.
    example_en: The neighbours are complaining about the noise.
    example_ru: Соседи жалуются на шум.
    example_uk: Сусіди скаржаться на шум.
    note:
      en: 'über + Akkusativ names the problem, bei + Dativ the person you take it to: Ich beschwere mich beim Vermieter über die Heizung. Keep the two apart — the complaint is über, never bei.'
      ru: 'über + Akkusativ называет саму проблему, bei + Dativ — того, кому жалуются: Ich beschwere mich beim Vermieter über die Heizung («Я жалуюсь арендодателю на отопление»). Не путайте: предмет жалобы — всегда über, никогда bei.'
      uk: 'über + Akkusativ називає саму проблему, bei + Dativ — того, кому скаржаться: Ich beschwere mich beim Vermieter über die Heizung («Я скаржуся орендодавцеві на опалення»). Не плутайте: предмет скарги — завжди über, ніколи bei.'
  - de: entschuldigen
    ipa: "ɛntˈʃʊldɪgən"
    pos: verb
    praesens_3sg: entschuldigt sich
    partizip2: sich entschuldigt
    aux: haben
    valence: "sich entschuldigen bei + Dat (für + Akk)"
    accept: ["sich entschuldigen"]
    en: to apologize
    ru: извиняться
    uk: вибачатися, перепрошувати
    example_de: Er entschuldigt sich bei der Lehrerin für die Verspätung.
    example_en: He apologizes to the teacher for being late.
    example_ru: Он извиняется перед учительницей за опоздание.
    example_uk: Він вибачається перед учителькою за запізнення.
    note:
      en: 'The person you apologize to takes bei + Dativ — Ich entschuldige mich bei dir — and the reason takes für + Akkusativ. The inseparable ent- gives a Partizip II without ge-: hat sich entschuldigt. Without the pronoun the verb means something else: jemanden entschuldigen is to excuse somebody.'
      ru: 'Тот, перед кем извиняются, стоит с предлогом bei + Dativ — Ich entschuldige mich bei dir, — а причина с für + Akkusativ. Неотделяемая приставка ent- даёт Partizip II без ge-: hat sich entschuldigt. Без местоимения глагол значит другое: jemanden entschuldigen — «извинить кого-то».'
      uk: 'Той, перед ким вибачаються, стоїть із прийменником bei + Dativ — Ich entschuldige mich bei dir, — а причина з für + Akkusativ. Невідокремлюваний префікс ent- дає Partizip II без ge-: hat sich entschuldigt. Без займенника дієслово означає інше: jemanden entschuldigen — «вибачити когось».'
  - de: erinnern
    ipa: "ɛɐ̯ˈʔɪnɐn"
    pos: verb
    praesens_3sg: erinnert sich
    partizip2: sich erinnert
    aux: haben
    valence: "sich erinnern an + Akk"
    accept: ["sich erinnern"]
    en: to remember
    ru: помнить, вспоминать
    uk: пам’ятати, пригадувати
    example_de: Erinnerst du dich noch an meinen Bruder?
    example_en: Do you still remember my brother?
    example_ru: Ты ещё помнишь моего брата?
    example_uk: Ти ще пам’ятаєш мого брата?
    note:
      en: 'Always an + Akkusativ, never von: Ich erinnere mich an den Termin. For a thing already mentioned, use the da-word: Ich erinnere mich daran. Without the reflexive pronoun the verb reverses direction — jemanden an etwas erinnern is to remind somebody: Erinnere mich bitte an den Termin!'
      ru: 'Только an + Akkusativ, никогда не von: Ich erinnere mich an den Termin. О том, что уже названо, говорят da-словом: Ich erinnere mich daran («Я об этом помню»). Без возвратного местоимения глагол меняет направление: jemanden an etwas erinnern — «напомнить кому-то»: Erinnere mich bitte an den Termin!'
      uk: 'Тільки an + Akkusativ, ніколи не von: Ich erinnere mich an den Termin. Про те, що вже названо, кажуть da-словом: Ich erinnere mich daran («Я про це пам’ятаю»). Без зворотного займенника дієслово змінює напрямок: jemanden an etwas erinnern — «нагадати комусь»: Erinnere mich bitte an den Termin!'
  - de: freuen
    ipa: "ˈfʁɔʏ̯ən"
    pos: verb
    praesens_3sg: freut sich
    partizip2: sich gefreut
    aux: haben
    valence: "sich freuen auf + Akk (future) / über + Akk (past)"
    accept: ["sich freuen"]
    en: to look forward to (auf); to be pleased about (über)
    ru: ждать с нетерпением (auf); радоваться (über)
    uk: чекати з нетерпінням (auf); радіти (über)
    example_de: Ich freue mich auf das Wochenende.
    example_en: I am looking forward to the weekend.
    example_ru: Я жду выходных с нетерпением.
    example_uk: Я чекаю на вихідні з нетерпінням.
    note:
      en: 'Two prepositions, two points in time. auf + Akkusativ is for something still ahead: Ich freue mich auf den Urlaub. über + Akkusativ is for something that has already happened: Ich freue mich über dein Geschenk. Using über for a future event is the classic A2 slip. Both take a da-word when the thing is known: Ich freue mich darauf / darüber.'
      ru: 'Два предлога — два момента времени. auf + Akkusativ — о том, что ещё впереди: Ich freue mich auf den Urlaub («жду отпуск с нетерпением»). über + Akkusativ — о том, что уже случилось: Ich freue mich über dein Geschenk («рад твоему подарку»). Поставить über там, где речь о будущем, — классическая ошибка на уровне A2. Обоим соответствует da-слово, если предмет уже назван: Ich freue mich darauf / darüber.'
      uk: 'Два прийменники — два моменти часу. auf + Akkusativ — про те, що ще попереду: Ich freue mich auf den Urlaub («чекаю на відпустку з нетерпінням»). über + Akkusativ — про те, що вже сталося: Ich freue mich über dein Geschenk («радий твоєму подарунку»). Поставити über там, де йдеться про майбутнє, — класична помилка на рівні A2. Обом відповідає da-слово, якщо предмет уже названо: Ich freue mich darauf / darüber.'
  - de: interessieren
    ipa: "ɪntəʁɛˈsiːʁən"
    pos: verb
    praesens_3sg: interessiert sich
    partizip2: sich interessiert
    aux: haben
    valence: "sich interessieren für + Akk"
    accept: ["sich interessieren"]
    en: to be interested in
    ru: интересоваться
    uk: цікавитися
    example_de: Meine Schwester interessiert sich für Musik.
    example_en: My sister is interested in music.
    example_ru: Моя сестра интересуется музыкой.
    example_uk: Моя сестра цікавиться музикою.
    note:
      en: 'The verb takes für + Akkusativ, but the noun das Interesse takes an + Dativ: Ich interessiere mich für den Kurs = Ich habe Interesse an dem Kurs. Same meaning, different prepositions — learn them as a pair. An -ieren verb, so the Partizip II has no ge-: hat sich interessiert.'
      ru: 'У глагола предлог für + Akkusativ, а у существительного das Interesse — an + Dativ: Ich interessiere mich für den Kurs = Ich habe Interesse an dem Kurs. Смысл один, предлоги разные — учите их парой. Глагол на -ieren, поэтому Partizip II без ge-: hat sich interessiert.'
      uk: 'У дієслова прийменник für + Akkusativ, а в іменника das Interesse — an + Dativ: Ich interessiere mich für den Kurs = Ich habe Interesse an dem Kurs. Зміст один, прийменники різні — учіть їх парою. Дієслово на -ieren, тому Partizip II без ge-: hat sich interessiert.'
  - de: kümmern
    ipa: "ˈkʏmɐn"
    pos: verb
    praesens_3sg: kümmert sich
    partizip2: sich gekümmert
    aux: haben
    valence: "sich kümmern um + Akk"
    accept: ["sich kümmern"]
    en: to take care of, to look after
    ru: заботиться, присматривать
    uk: піклуватися, доглядати
    example_de: Am Wochenende kümmert sich mein Mann um die Kinder.
    example_en: At the weekend my husband looks after the children.
    example_ru: По выходным о детях заботится мой муж.
    example_uk: По вихідних про дітей піклується мій чоловік.
    note:
      en: 'um + Akkusativ names whoever or whatever you are looking after — people (um die Kinder) as well as matters (um die Tickets). Watch the word order when something else opens the sentence: the verb keeps position 2 and the pronoun follows immediately after it — Am Wochenende kümmert sich mein Mann um die Kinder.'
      ru: 'um + Akkusativ называет того или то, о чём заботятся, — и людей (um die Kinder), и дела (um die Tickets — «взять на себя билеты»). Следите за порядком слов, если предложение начинается не с подлежащего: глагол остаётся на втором месте, а местоимение идёт сразу за ним — Am Wochenende kümmert sich mein Mann um die Kinder.'
      uk: 'um + Akkusativ називає того чи те, про що піклуються, — і людей (um die Kinder), і справи (um die Tickets — «взяти на себе квитки»). Слідкуйте за порядком слів, якщо речення починається не з підмета: дієслово залишається на другому місці, а займенник іде одразу за ним — Am Wochenende kümmert sich mein Mann um die Kinder.'
  - de: streiten
    ipa: "ˈʃtʁaɪ̯tn̩"
    pos: verb
    praesens_3sg: streitet sich
    partizip2: sich gestritten
    aux: haben
    valence: "sich streiten mit + Dat (über + Akk)"
    accept: ["sich streiten"]
    en: to argue, to quarrel
    ru: ссориться, спорить
    uk: сваритися, сперечатися
    example_de: Mein Bruder streitet sich oft mit seiner Frau über Geld.
    example_en: My brother often argues with his wife about money.
    example_ru: Мой брат часто ссорится с женой из-за денег.
    example_uk: Мій брат часто свариться з дружиною через гроші.
    note:
      en: 'The other party takes mit + Dativ, the subject of the quarrel über + Akkusativ. A strong verb: streiten – stritt – gestritten. The Partizip II is gestritten, never a regular form built with -t.'
      ru: 'Собеседник по ссоре вводится через mit + Dativ, а предмет спора — через über + Akkusativ. Глагол сильный: streiten – stritt – gestritten. Partizip II — gestritten, а не «правильная» форма на -t.'
      uk: 'Співрозмовник у сварці вводиться через mit + Dativ, а предмет суперечки — через über + Akkusativ. Дієслово сильне: streiten – stritt – gestritten. Partizip II — gestritten, а не «правильна» форма на -t.'
  - de: verlieben
    ipa: "fɛɐ̯ˈliːbn̩"
    pos: verb
    praesens_3sg: verliebt sich
    partizip2: sich verliebt
    aux: haben
    valence: "sich verlieben in + Akk"
    accept: ["sich verlieben"]
    en: to fall in love (with)
    ru: влюбляться
    uk: закохуватися
    example_de: Sie hat sich in einen Kollegen verliebt.
    example_en: She has fallen in love with a colleague.
    example_ru: Она влюбилась в коллегу.
    example_uk: Вона закохалася в колегу.
    note:
      en: 'in + Akkusativ, because falling in love is a movement into a new state — the same logic as Wohin? + Akkusativ. Inseparable ver-, so the Partizip II has no ge-: hat sich verliebt. Once it has happened, the state is verliebt sein in + Akkusativ: Er ist in sie verliebt.'
      ru: 'in + Akkusativ, потому что влюбиться — это переход в новое состояние, движение, а не положение: та же логика, что у вопроса Wohin? Приставка ver- неотделяемая, поэтому Partizip II без ge-: hat sich verliebt. Само состояние — verliebt sein in + Akkusativ: Er ist in sie verliebt («Он в неё влюблён»).'
      uk: 'in + Akkusativ, бо закохатися — це перехід у новий стан, рух, а не положення: та сама логіка, що й у питання Wohin? Префікс ver- невідокремлюваний, тому Partizip II без ge-: hat sich verliebt. Сам стан — verliebt sein in + Akkusativ: Er ist in sie verliebt («Він у неї закоханий»).'
  - de: schimpfen
    ipa: "ˈʃɪmpfn̩"
    pos: verb
    praesens_3sg: schimpft
    partizip2: geschimpft
    aux: haben
    valence: "mit + Dat / über + Akk"
    en: to tell somebody off; to grumble (about)
    ru: ругать (кого-л.); ругаться, ворчать (на что-л.)
    uk: лаяти (когось); лаятися, буркотіти (на щось)
    example_de: Der Trainer schimpft mit den Spielern.
    example_en: The coach is telling the players off.
    example_ru: Тренер ругает игроков.
    example_uk: Тренер лає гравців.
    note:
      en: 'Not reflexive — there is no sich here, unlike most of the verbs in this deck. Two patterns: mit + Dativ is to tell a person off (Die Mutter schimpft mit dem Kind), über + Akkusativ is to grumble about something (Er schimpft über das Wetter).'
      ru: 'Глагол невозвратный — никакого sich, в отличие от большинства глаголов этой колоды. Две модели: mit + Dativ — «ругать кого-то» (Die Mutter schimpft mit dem Kind), über + Akkusativ — «ругаться, ворчать на что-то» (Er schimpft über das Wetter).'
      uk: 'Дієслово незворотне — жодного sich, на відміну від більшості дієслів цієї колоди. Дві моделі: mit + Dativ — «лаяти когось» (Die Mutter schimpft mit dem Kind), über + Akkusativ — «лаятися, буркотіти на щось» (Er schimpft über das Wetter).'
  - de: träumen
    ipa: "ˈtʁɔʏ̯mən"
    pos: verb
    praesens_3sg: träumt
    partizip2: geträumt
    aux: haben
    valence: "von + Dat"
    en: to dream (of)
    ru: мечтать; видеть во сне
    uk: мріяти; бачити уві сні
    example_de: Meine Tochter träumt von einem Pferd.
    example_en: My daughter dreams of having a horse.
    example_ru: Моя дочь мечтает о лошади.
    example_uk: Моя дочка мріє про коня.
    note:
      en: 'Not reflexive, and the preposition is von + Dativ for both meanings: what you dream at night (Ich habe von dir geträumt) and what you wish for (Er träumt von einer Weltreise). Never über. The noun is der Traum.'
      ru: 'Глагол невозвратный, предлог один на оба значения — von + Dativ: и о ночном сне (Ich habe von dir geträumt — «Ты мне снился»), и о мечте (Er träumt von einer Weltreise — «Он мечтает о кругосветном путешествии»). Не über. Существительное — der Traum.'
      uk: 'Дієслово незворотне, прийменник один на обидва значення — von + Dativ: і про нічний сон (Ich habe von dir geträumt — «Ти мені снився»), і про мрію (Er träumt von einer Weltreise — «Він мріє про навколосвітню подорож»). Не über. Іменник — der Traum.'
  - de: Ahnung
    ipa: "ˈaːnʊŋ"
    pos: noun
    gender: f
    plural: "die Ahnungen"
    en: idea, clue
    ru: представление, понятие
    uk: уявлення, поняття
    example_de: Keine Ahnung, wo mein Schlüssel ist!
    example_en: No idea where my key is!
    example_ru: Понятия не имею, где мой ключ!
    example_uk: Уявлення не маю, де мій ключ!
    note:
      en: 'You will meet this noun almost only in the fixed phrase Keine Ahnung! — the everyday answer to a question you cannot answer. The full sentence is Ich habe keine Ahnung. With von + Dativ it means knowing nothing about a subject: Ich habe keine Ahnung von Autos.'
      ru: 'Это существительное встречается почти только в устойчивом обороте Keine Ahnung! — обычный ответ на вопрос, на который вы ответить не можете. Полная форма — Ich habe keine Ahnung. С von + Dativ значит «ничего не смыслить в чём-то»: Ich habe keine Ahnung von Autos.'
      uk: 'Цей іменник трапляється майже лише в стійкому звороті Keine Ahnung! — звичайна відповідь на питання, на яке ви відповісти не можете. Повна форма — Ich habe keine Ahnung. Із von + Dativ означає «нічого не тямити в чомусь»: Ich habe keine Ahnung von Autos.'
  - de: Angst
    ipa: "ˈaŋst"
    pos: noun
    gender: f
    plural: "die Ängste"
    en: fear
    ru: страх, боязнь
    uk: страх, боязнь
    example_de: Mein Sohn hat Angst vor Hunden.
    example_en: My son is afraid of dogs.
    example_ru: Мой сын боится собак.
    example_uk: Мій син боїться собак.
    note:
      en: 'German says fear with a verb and a noun: Angst haben vor + Dativ. There is no adjective involved, so a sentence built on sein is simply wrong — the pattern is the same one as Hunger haben and Durst haben. To reassure somebody: Keine Angst! And note the umlaut in the plural: die Ängste.'
      ru: 'Страх по-немецки выражается связкой «глагол + существительное»: Angst haben vor + Dativ. Прилагательного здесь нет, поэтому конструкция с sein невозможна — работает та же модель, что у Hunger haben и Durst haben. Успокоить собеседника: Keine Angst! («Не бойся!»). Во множественном числе умлаут: die Ängste.'
      uk: 'Страх німецькою виражається зв’язкою «дієслово + іменник»: Angst haben vor + Dativ. Прикметника тут немає, тому конструкція з sein неможлива — працює та сама модель, що й у Hunger haben і Durst haben. Заспокоїти співрозмовника: Keine Angst! («Не бійся!»). У множині умлаут: die Ängste.'
  - de: Glück
    ipa: "ˈglʏk"
    pos: noun
    gender: n
    plural: "—"
    en: luck; happiness
    ru: удача; счастье
    uk: удача; щастя
    example_de: Ich wünsche dir viel Glück bei der Prüfung!
    example_en: I wish you the best of luck in the exam!
    example_ru: Желаю тебе удачи на экзамене!
    example_uk: Бажаю тобі удачі на іспиті!
    note:
      en: 'One word, two meanings. Luck: Viel Glück! and Glück haben — Wir haben Glück gehabt (we were lucky). Happiness: Geld allein macht nicht glücklich. No plural, and no article after viel: viel Glück. The adjective is glücklich.'
      ru: 'Одно слово — два значения. Удача: Viel Glück! («Удачи!») и Glück haben — Wir haben Glück gehabt («Нам повезло»). И счастье: Geld allein macht nicht glücklich («Не в деньгах счастье»). Множественного числа нет, после viel артикль не ставится: viel Glück. Прилагательное — glücklich.'
      uk: 'Одне слово — два значення. Удача: Viel Glück! («Щасти!») і Glück haben — Wir haben Glück gehabt («Нам пощастило»). І щастя: Geld allein macht nicht glücklich («Не в грошах щастя»). Множини немає, після viel артикль не ставиться: viel Glück. Прикметник — glücklich.'
  - de: Interesse
    ipa: "ɪntəˈʁɛsə"
    pos: noun
    gender: n
    plural: "die Interessen"
    en: interest
    ru: интерес
    uk: інтерес, зацікавлення
    example_de: Ich habe Interesse an dem Kurs.
    example_en: I am interested in the course.
    example_ru: Этот курс мне интересен.
    example_uk: Цей курс мені цікавий.
    note:
      en: 'The noun works with an + Dativ: Interesse an etwas haben. The matching verb takes a different preposition — sich interessieren für + Akkusativ. Same idea, two constructions, and swapping the prepositions is the usual mistake. In the plural die Interessen means hobbies: Meine Interessen sind Musik und Sport.'
      ru: 'Существительное требует an + Dativ: Interesse an etwas haben. У родственного глагола предлог другой — sich interessieren für + Akkusativ. Мысль одна, конструкции две, и обычная ошибка — перепутать предлоги. Во множественном числе die Interessen значит «увлечения»: Meine Interessen sind Musik und Sport.'
      uk: 'Іменник вимагає an + Dativ: Interesse an etwas haben. У спорідненого дієслова прийменник інший — sich interessieren für + Akkusativ. Думка одна, конструкції дві, і звична помилка — переплутати прийменники. У множині die Interessen означає «захоплення»: Meine Interessen sind Musik und Sport.'
  - de: Stress
    ipa: "ˈʃtʁɛs"
    pos: noun
    gender: m
    plural: "—"
    en: stress
    ru: стресс
    uk: стрес
    example_de: Im Büro habe ich im Moment viel Stress.
    example_en: Things are very stressful at the office at the moment.
    example_ru: Сейчас на работе у меня много стресса.
    example_uk: Зараз на роботі в мене багато стресу.
    note:
      en: 'German borrowed the English word but pronounces it in German: the initial st- sounds like ʃt, not st. Masculine, no plural, and no article after viel: viel Stress. Everyday chunks: Stress haben, im Stress sein. The adjective is stressig.'
      ru: 'Немецкий заимствовал английское слово, но произносит его по-своему: начальное st- звучит как [шт], а не [ст]. Мужской род, множественного числа нет, после viel артикля не бывает: viel Stress. Готовые обороты: Stress haben, im Stress sein. Прилагательное — stressig.'
      uk: 'Німецька запозичила англійське слово, але вимовляє його по-своєму: початкове st- звучить як [шт], а не [ст]. Чоловічого роду, множини немає, після viel артикля не буває: viel Stress. Готові звороти: Stress haben, im Stress sein. Прикметник — stressig.'
  - de: Traum
    ipa: "ˈtʁaʊ̯m"
    pos: noun
    gender: m
    plural: "die Träume"
    en: dream
    ru: сон; мечта
    uk: сон; мрія
    example_de: Eine Reise nach Japan ist mein Traum.
    example_en: A trip to Japan is my dream.
    example_ru: Поездка в Японию — моя мечта.
    example_uk: Подорож до Японії — моя мрія.
    note:
      en: 'der Traum covers both the dream you have at night and the one you have for your life. The verb belonging to it is träumen von + Dativ. Umlaut in the plural: die Träume.'
      ru: 'der Traum — это и сон, который снится ночью, и мечта всей жизни. Родственный глагол — träumen von + Dativ. Во множественном числе умлаут: die Träume.'
      uk: 'der Traum — це і сон, який сниться вночі, і мрія всього життя. Споріднене дієслово — träumen von + Dativ. У множині умлаут: die Träume.'
  - de: Wunsch
    ipa: "ˈvʊnʃ"
    pos: noun
    gender: m
    plural: "die Wünsche"
    en: wish
    ru: желание
    uk: бажання
    example_de: Haben Sie noch einen Wunsch?
    example_en: Is there anything else you would like?
    example_ru: Желаете что-нибудь ещё?
    example_uk: Бажаєте ще щось?
    note:
      en: 'In a shop or a restaurant, Haben Sie noch einen Wunsch? simply means anything else. The verb is wünschen: Ich wünsche dir alles Gute! Umlaut in the plural: die Wünsche.'
      ru: 'В магазине или ресторане фраза Haben Sie noch einen Wunsch? значит просто «Что-нибудь ещё?». Родственный глагол — wünschen: Ich wünsche dir alles Gute! («Желаю тебе всего хорошего!»). Во множественном числе умлаут: die Wünsche.'
      uk: 'У магазині чи ресторані фраза Haben Sie noch einen Wunsch? означає просто «Щось іще?». Споріднене дієслово — wünschen: Ich wünsche dir alles Gute! («Бажаю тобі всього найкращого!»). У множині умлаут: die Wünsche.'
  - de: böse
    ipa: "ˈbøːzə"
    pos: adj
    en: cross, angry; evil, wicked
    ru: сердитый, злой; злой, дурной
    uk: сердитий, злий; злий, лихий
    example_de: Bist du böse auf mich?
    example_en: Are you cross with me?
    example_ru: Ты на меня сердишься?
    example_uk: Ти на мене сердишся?
    note:
      en: 'Two senses. About somebody in a bad mood it means cross or angry, and the preposition is auf + Akkusativ: Sie ist böse auf ihren Bruder. In stories it means evil or wicked: die böse Hexe. sauer works the same way and takes the same preposition, but sounds more informal.'
      ru: 'Два значения. О человеке в дурном настроении — «сердитый, злой», и предлог здесь auf + Akkusativ: Sie ist böse auf ihren Bruder («Она сердита на брата»). В сказках — «злой, дурной»: die böse Hexe («злая ведьма»). Слово sauer работает так же и с тем же предлогом, но звучит разговорнее.'
      uk: 'Два значення. Про людину в поганому настрої — «сердитий, злий», і прийменник тут auf + Akkusativ: Sie ist böse auf ihren Bruder («Вона сердита на брата»). У казках — «злий, лихий»: die böse Hexe («зла відьма»). Слово sauer працює так само й із тим самим прийменником, але звучить розмовніше.'
  - de: froh
    ipa: "ˈfʁoː"
    pos: adj
    en: glad, pleased
    ru: рад, довольный
    uk: радий, задоволений
    example_de: Ich bin froh, dass du da bist.
    example_en: I am glad you are here.
    example_ru: Я рад, что ты здесь.
    example_uk: Я радий, що ти тут.
    note:
      en: 'froh is the gladness of a moment, usually with a dass-clause (Ich bin froh, dass …) or with über + Akkusativ. glücklich runs deeper and lasts longer: eine glückliche Familie.'
      ru: 'froh — это радость момента: обычно с придаточным dass (Ich bin froh, dass …) или с über + Akkusativ. glücklich — глубже и надолго: eine glückliche Familie («счастливая семья»).'
      uk: 'froh — це радість моменту: зазвичай із підрядним dass (Ich bin froh, dass …) або з über + Akkusativ. glücklich — глибше й надовго: eine glückliche Familie («щаслива сім’я»).'
  - de: glücklich
    ipa: "ˈglʏklɪç"
    pos: adj
    en: happy
    ru: счастливый
    uk: щасливий
    example_de: Nach der Hochzeit waren sie sehr glücklich.
    example_en: After the wedding they were very happy.
    example_ru: После свадьбы они были очень счастливы.
    example_uk: Після весілля вони були дуже щасливі.
    note:
      en: 'Built from das Glück with the ending -lich. It describes lasting happiness; for a passing gladness use froh. And do not use it for luck — that is Glück haben: Ich hatte Glück, not Ich war glücklich.'
      ru: 'Образовано от das Glück суффиксом -lich. Описывает счастье как длительное состояние; мимолётная радость — это froh. И не используйте его в значении «повезло»: для этого есть Glück haben — Ich hatte Glück, а не Ich war glücklich.'
      uk: 'Утворене від das Glück суфіксом -lich. Описує щастя як тривалий стан; миттєва радість — це froh. І не використовуйте його у значенні «пощастило»: для цього є Glück haben — Ich hatte Glück, а не Ich war glücklich.'
  - de: nervös
    ipa: "nɛʁˈvøːs"
    pos: adj
    en: nervous, edgy
    ru: нервный, взволнованный
    uk: нервовий, схвильований
    example_de: Vor der Prüfung bin ich immer nervös.
    example_en: I always get nervous before an exam.
    example_ru: Перед экзаменом я всегда нервничаю.
    example_uk: Перед іспитом я завжди нервую.
    note:
      en: 'Stress on the second syllable, and the ö is long. German has no separate verb for this state — you say it with sein: Ich bin nervös. To make somebody nervous is jemanden nervös machen: Der Lärm macht mich nervös.'
      ru: 'Ударение на втором слоге, ö долгое. Отдельного глагола «нервничать» в немецком нет — состояние передаётся через sein: Ich bin nervös. «Действовать на нервы» — jemanden nervös machen: Der Lärm macht mich nervös.'
      uk: 'Наголос на другому складі, ö довге. Окремого дієслова «нервувати» в німецькій немає — стан передається через sein: Ich bin nervös. «Діяти на нерви» — jemanden nervös machen: Der Lärm macht mich nervös.'
  - de: sauer
    ipa: "ˈzaʊ̯ɐ"
    pos: adj
    en: sour; annoyed, cross (of a person)
    ru: кислый; сердитый, недовольный
    uk: кислий; сердитий, невдоволений
    example_de: Mein Chef ist sauer auf mich.
    example_en: My boss is annoyed with me.
    example_ru: Начальник на меня сердит.
    example_uk: Начальник на мене сердитий.
    note:
      en: 'Literally sour — saure Sahne, saure Gurken. About a person it is the everyday, slightly informal word for annoyed or cross, with auf + Akkusativ: Er ist sauer auf seinen Kollegen. Both senses belong to A2; only the context tells them apart.'
      ru: 'Буквально «кислый» — saure Sahne («сметана»), saure Gurken («солёные огурцы»). О человеке — обиходное, слегка разговорное «сердитый, злой»: sauer auf + Akkusativ — Er ist sauer auf seinen Kollegen. Оба значения нужны на A2; различает их только контекст.'
      uk: 'Буквально «кислий» — saure Sahne («сметана»), saure Gurken («солоні огірки»). Про людину — звичне, трохи розмовне «сердитий, злий»: sauer auf + Akkusativ — Er ist sauer auf seinen Kollegen. Обидва значення потрібні на A2; розрізняє їх лише контекст.'
  - de: stressig
    ipa: "ˈʃtʁɛsɪç"
    pos: adj
    en: stressful
    ru: напряжённый, нервный (о дне, работе)
    uk: напружений, нервовий (про день, роботу)
    example_de: Gestern war ein stressiger Tag.
    example_en: Yesterday was a stressful day.
    example_ru: Вчерашний день выдался очень напряжённым.
    example_uk: Учорашній день видався дуже напруженим.
    note:
      en: 'Formed from der Stress. It describes the situation, not the person: ein stressiger Tag, eine stressige Woche. The person who feels it says Ich habe Stress or Ich bin im Stress — Ich bin stressig would mean that you are the one causing it.'
      ru: 'Образовано от der Stress. Описывает ситуацию, а не человека: ein stressiger Tag, eine stressige Woche. Сам человек скажет Ich habe Stress или Ich bin im Stress; фраза Ich bin stressig означала бы, что стресс создаёте вы.'
      uk: 'Утворене від der Stress. Описує ситуацію, а не людину: ein stressiger Tag, eine stressige Woche. Сама людина скаже Ich habe Stress або Ich bin im Stress; фраза Ich bin stressig означала б, що стрес створюєте ви.'
  - de: traurig
    ipa: "ˈtʁaʊ̯ʁɪç"
    pos: adj
    en: sad
    ru: грустный, печальный
    uk: сумний, журливий
    example_de: Der Film war sehr traurig.
    example_en: The film was very sad.
    example_ru: Фильм был очень грустный.
    example_uk: Фільм був дуже сумний.
    note:
      en: 'traurig describes people and things alike: ein trauriges Lied, ein trauriger Tag, Sie sieht traurig aus. The cause is introduced with über + Akkusativ: Er ist traurig über die Nachricht. Its opposite is froh.'
      ru: 'traurig описывает и людей, и вещи: ein trauriges Lied («грустная песня»), ein trauriger Tag, Sie sieht traurig aus («Она выглядит грустной»). Причину вводит über + Akkusativ: Er ist traurig über die Nachricht. Антоним — froh.'
      uk: 'traurig описує і людей, і речі: ein trauriges Lied («сумна пісня»), ein trauriger Tag, Sie sieht traurig aus («Вона виглядає сумною»). Причину вводить über + Akkusativ: Er ist traurig über die Nachricht. Антонім — froh.'
