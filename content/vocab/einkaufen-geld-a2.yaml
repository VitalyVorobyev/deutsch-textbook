# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the
# einkaufen-geld-dienstleistungen manifest section.
id: einkaufen-geld-a2
title_de: "Einkaufen & Geld"
title_en: "Shopping & money"
title_ru: "Покупки и деньги"
title_uk: "Покупки та гроші"
level: A2
entries:
  - de: "Geldbörse"
    ipa: "ˈgɛltˌbœʁzə"
    pos: noun
    gender: f
    plural: "die Geldbörsen"
    en: "wallet, purse"
    ru: "кошелёк"
    uk: "гаманець"
    example_de: "Meine Geldbörse liegt noch in der Tasche."
    example_en: "My wallet is still in my bag."
    example_ru: "Мой кошелёк всё ещё в сумке."
    example_uk: "Мій гаманець усе ще в сумці."
    note:
      en: "A compound of das Geld and die Börse, so it takes the gender of the last part: die Geldbörse. In everyday speech people also say das Portemonnaie or der Geldbeutel."
      ru: "Сложное слово из das Geld и die Börse, поэтому род — по последней части: die Geldbörse. В разговоре говорят также das Portemonnaie или der Geldbeutel."
      uk: "Складне слово з das Geld і die Börse, тому рід — за останньою частиною: die Geldbörse. У розмові кажуть також das Portemonnaie або der Geldbeutel."
  - de: "Gehalt"
    ipa: "gəˈhalt"
    pos: noun
    gender: n
    plural: "die Gehälter"
    en: "salary, pay"
    ru: "зарплата, оклад"
    uk: "зарплата, оклад"
    example_de: "Mein Gehalt kommt immer am Monatsende auf das Konto."
    example_en: "My salary always arrives in my account at the end of the month."
    example_ru: "Моя зарплата всегда приходит на счёт в конце месяца."
    example_uk: "Моя зарплата завжди надходить на рахунок наприкінці місяця."
    note:
      en: "Neuter for the money you earn — das Gehalt, die Gehälter (with an umlaut in the plural). There is a second word der Gehalt, which means the content of something; only the neuter one is about pay."
      ru: "Среднего рода, когда речь о заработке: das Gehalt, die Gehälter (во множественном — с умлаутом). Существует и der Gehalt — «содержание (чего-либо)»; о зарплате говорит только средний род."
      uk: "Середнього роду, коли йдеться про заробіток: das Gehalt, die Gehälter (у множині — з умлаутом). Існує й der Gehalt — «вміст (чогось)»; про зарплату говорить лише середній рід."
  - de: "Konto"
    ipa: "ˈkɔnto"
    pos: noun
    gender: n
    plural: "die Konten"
    en: "(bank) account"
    ru: "счёт (банковский)"
    uk: "рахунок (банківський)"
    example_de: "Ich möchte ein Konto bei Ihrer Bank eröffnen."
    example_en: "I would like to open an account with your bank."
    example_ru: "Я хотел бы открыть счёт в вашем банке."
    example_uk: "Я хотів би відкрити рахунок у вашому банку."
    note:
      en: "Neuter, with an irregular plural: das Konto, die Konten — never \"die Kontos\". Money goes auf das Konto (Akkusativ, direction) and sits then auf dem Konto (Dativ, position)."
      ru: "Среднего рода, с неправильным множественным: das Konto, die Konten, а не «die Kontos». Деньги поступают auf das Konto (Akkusativ, направление), а лежат потом auf dem Konto (Dativ, местоположение)."
      uk: "Середнього роду, з неправильною множиною: das Konto, die Konten, а не «die Kontos». Гроші надходять auf das Konto (Akkusativ, напрямок), а лежать потім auf dem Konto (Dativ, місцеположення)."
  - de: "Kredit"
    ipa: "kʁeˈdiːt"
    pos: noun
    gender: m
    plural: "die Kredite"
    en: "loan, credit"
    ru: "кредит, ссуда"
    uk: "кредит, позика"
    example_de: "Für das Auto haben wir einen Kredit bei der Bank aufgenommen."
    example_en: "We took out a bank loan for the car."
    example_ru: "На машину мы взяли кредит в банке."
    example_uk: "На машину ми взяли кредит у банку."
    note:
      en: "Masculine, with the stress on the last syllable: kʁeˈdiːt. You take one out with einen Kredit aufnehmen and pay it back with zurückzahlen. A bank card is die Kreditkarte."
      ru: "Мужского рода, ударение на последний слог: kʁeˈdiːt. Взять кредит — einen Kredit aufnehmen, выплатить — zurückzahlen. Банковская карта — die Kreditkarte."
      uk: "Чоловічого роду, наголос на останній склад: kʁeˈdiːt. Взяти кредит — einen Kredit aufnehmen, виплатити — zurückzahlen. Банківська картка — die Kreditkarte."
  - de: "Paket"
    ipa: "paˈkeːt"
    pos: noun
    gender: n
    plural: "die Pakete"
    en: "parcel, package"
    ru: "посылка, пакет (почтовый)"
    uk: "посилка, пакунок (поштовий)"
    example_de: "Das Paket ist gestern mit der Post gekommen."
    example_en: "The parcel arrived by post yesterday."
    example_ru: "Посылка пришла вчера по почте."
    example_uk: "Посилка прийшла вчора поштою."
    note:
      en: "Neuter: das Paket, die Pakete. It is the box you send or receive by post — a small one is das Päckchen. Do not confuse it with die Packung, the packaging a product is sold in."
      ru: "Среднего рода: das Paket, die Pakete. Это коробка, которую отправляют или получают по почте; маленькая — das Päckchen. Не путать с die Packung — упаковкой, в которой продаётся товар."
      uk: "Середнього роду: das Paket, die Pakete. Це коробка, яку відправляють або отримують поштою; маленька — das Päckchen. Не плутати з die Packung — упаковкою, у якій продається товар."
  - de: "Prospekt"
    ipa: "pʁɔˈspɛkt"
    pos: noun
    gender: m
    plural: "die Prospekte"
    en: "brochure, leaflet (advertising)"
    ru: "рекламный проспект, буклет"
    uk: "рекламний проспект, буклет"
    example_de: "Im Prospekt vom Supermarkt stehen die Angebote der Woche."
    example_en: "The supermarket leaflet lists this week's special offers."
    example_ru: "В проспекте супермаркета указаны предложения недели."
    example_uk: "У проспекті супермаркету зазначені пропозиції тижня."
    note:
      en: "Masculine: der Prospekt, die Prospekte. It is the printed advertising booklet a shop or a travel agency hands out — not a street. A false friend for many learners."
      ru: "Мужского рода: der Prospekt, die Prospekte. Это печатный рекламный буклет магазина или турфирмы, а вовсе не проспект-улица. Классический «ложный друг»."
      uk: "Чоловічого роду: der Prospekt, die Prospekte. Це друкований рекламний буклет магазину або турфірми, а зовсім не проспект-вулиця. Класичний «оманливий друг»."
  - de: "Reinigung"
    ipa: "ˈʁaɪ̯nɪgʊŋ"
    pos: noun
    gender: f
    plural: "die Reinigungen"
    en: "dry cleaner's; cleaning"
    ru: "химчистка; уборка, чистка"
    uk: "хімчистка; прибирання, чищення"
    example_de: "Ich bringe den Mantel in die Reinigung."
    example_en: "I am taking the coat to the dry cleaner's."
    example_ru: "Я отношу пальто в химчистку."
    example_uk: "Я відношу пальто до хімчистки."
    note:
      en: "Every -ung noun is feminine: die Reinigung. Here it is the shop that cleans clothes — you take something in die Reinigung (Akkusativ, direction) and pick it up in der Reinigung (Dativ, position)."
      ru: "Все существительные на -ung женского рода: die Reinigung. Здесь это заведение, где чистят одежду: относят in die Reinigung (Akkusativ, направление), а забирают in der Reinigung (Dativ, местоположение)."
      uk: "Усі іменники на -ung жіночого роду: die Reinigung. Тут це заклад, де чистять одяг: відносять in die Reinigung (Akkusativ, напрямок), а забирають in der Reinigung (Dativ, місцеположення)."
  - de: "Rest"
    ipa: "ˈʁɛst"
    pos: noun
    gender: m
    plural: "die Reste"
    en: "rest, remainder; leftovers"
    ru: "остаток; остатки"
    uk: "решта; залишки"
    example_de: "Den Rest vom Geld gebe ich dir morgen."
    example_en: "I will give you the rest of the money tomorrow."
    example_ru: "Остаток денег я отдам тебе завтра."
    example_uk: "Решту грошей я віддам тобі завтра."
    note:
      en: "Masculine: der Rest. In the singular it is what is left of one thing (der Rest vom Kuchen); in the plural die Reste are leftovers from a meal. At A2 say the rest of something with von + Dativ."
      ru: "Мужского рода: der Rest. В единственном числе — остаток чего-то одного (der Rest vom Kuchen); во множественном die Reste — остатки еды. На уровне A2 «остаток чего-то» выражается через von + Dativ."
      uk: "Чоловічого роду: der Rest. В однині — залишок чогось одного (der Rest vom Kuchen); у множині die Reste — рештки їжі. На рівні A2 «залишок чогось» виражається через von + Dativ."
  - de: "Service"
    ipa: "ˈzøːɐ̯vɪs"
    pos: noun
    gender: m
    plural: "—"
    en: "service (in a shop, hotel or restaurant)"
    ru: "обслуживание, сервис"
    uk: "обслуговування, сервіс"
    example_de: "Der Service in diesem Hotel ist wirklich gut."
    example_en: "The service at this hotel is really good."
    example_ru: "Обслуживание в этой гостинице действительно хорошее."
    example_uk: "Обслуговування в цьому готелі справді добре."
    note:
      en: "An English loan, but spoken with a German first syllable: ˈzøːɐ̯vɪs. Masculine and used without a plural — it names the quality of how you are looked after."
      ru: "Заимствование из английского, но первый слог произносится по-немецки: ˈzøːɐ̯vɪs. Мужского рода и без множественного числа — обозначает качество обслуживания."
      uk: "Запозичення з англійської, але перший склад вимовляється по-німецьки: ˈzøːɐ̯vɪs. Чоловічого роду й без множини — позначає якість обслуговування."
  - de: "Einkaufszentrum"
    ipa: "ˈaɪ̯nkaʊ̯fsˌtsɛntʁʊm"
    pos: noun
    gender: n
    plural: "die Einkaufszentren"
    en: "shopping centre, mall"
    ru: "торговый центр"
    uk: "торговельний центр"
    example_de: "Am Samstag treffen wir uns im Einkaufszentrum."
    example_en: "On Saturday we are meeting at the shopping centre."
    example_ru: "В субботу мы встречаемся в торговом центре."
    example_uk: "У суботу ми зустрічаємося в торговельному центрі."
    note:
      en: "Neuter, from das Zentrum, and the plural is irregular: die Einkaufszentren — never \"die Einkaufszentrums\". Long compounds keep the gender of their last part."
      ru: "Среднего рода — по слову das Zentrum, — а множественное неправильное: die Einkaufszentren, а не «die Einkaufszentrums». Длинные сложные слова берут род последней части."
      uk: "Середнього роду — за словом das Zentrum, — а множина неправильна: die Einkaufszentren, а не «die Einkaufszentrums». Довгі складні слова беруть рід останньої частини."
  - de: "Ermäßigung"
    ipa: "ɛɐ̯ˈmɛːsɪgʊŋ"
    pos: noun
    gender: f
    plural: "die Ermäßigungen"
    en: "reduction, discount (for students, children)"
    ru: "скидка, льготный тариф"
    uk: "знижка, пільговий тариф"
    example_de: "Studenten bekommen eine Ermäßigung von zwanzig Prozent."
    example_en: "Students get a twenty percent reduction."
    example_ru: "Студенты получают скидку двадцать процентов."
    example_uk: "Студенти отримують знижку двадцять відсотків."
    note:
      en: "The word on ticket counters: a lower price for a particular group — students, children, pensioners. -ung, so feminine. The related adjective is ermäßigt: ein ermäßigtes Ticket."
      ru: "Слово из билетных касс: пониженная цена для определённой группы — студентов, детей, пенсионеров. Суффикс -ung, значит женский род. Родственное прилагательное — ermäßigt: ein ermäßigtes Ticket."
      uk: "Слово з квиткових кас: знижена ціна для певної групи — студентів, дітей, пенсіонерів. Суфікс -ung, отже жіночий рід. Споріднений прикметник — ermäßigt: ein ermäßigtes Ticket."
  - de: "Taschengeld"
    ipa: "ˈtaʃn̩ˌgɛlt"
    pos: noun
    gender: n
    plural: "—"
    en: "pocket money, allowance"
    ru: "карманные деньги"
    uk: "кишенькові гроші"
    example_de: "Unser Sohn bekommt jeden Monat zwanzig Euro Taschengeld."
    example_en: "Our son gets twenty euros of pocket money every month."
    example_ru: "Наш сын получает двадцать евро карманных денег каждый месяц."
    example_uk: "Наш син отримує двадцять євро кишенькових грошей щомісяця."
    note:
      en: "Money a child gets to spend freely. Neuter, from das Geld, and used without a plural."
      ru: "Деньги, которые ребёнок тратит по своему усмотрению. Среднего рода — по слову das Geld — и без множественного числа."
      uk: "Гроші, які дитина витрачає на власний розсуд. Середнього роду — за словом das Geld — і без множини."
  - de: "ausgeben"
    ipa: "ˈaʊ̯sˌgeːbn̩"
    pos: verb
    praesens_3sg: "gibt aus"
    partizip2: "ausgegeben"
    aux: "haben"
    valence: "+ Akk"
    en: "to spend (money)"
    ru: "тратить (деньги)"
    uk: "витрачати (гроші)"
    example_de: "Im Urlaub haben wir zu viel Geld ausgegeben."
    example_en: "We spent too much money on holiday."
    example_ru: "В отпуске мы потратили слишком много денег."
    example_uk: "У відпустці ми витратили забагато грошей."
    note:
      en: "Separable aus- + the stem change of geben: er gibt aus, Perfekt hat ausgegeben, with the -ge- inside. Only money is ausgegeben — time you spend is verbringen: Wir verbringen den Abend zu Hause."
      ru: "Отделяемая приставка aus- + чередование, как у geben: er gibt aus, перфект hat ausgegeben, где -ge- стоит внутри слова. ausgeben — только о деньгах; «проводить время» — verbringen: Wir verbringen den Abend zu Hause."
      uk: "Відокремлюваний префікс aus- + чергування, як у geben: er gibt aus, перфект hat ausgegeben, де -ge- стоїть усередині слова. ausgeben — лише про гроші; «проводити час» — verbringen: Wir verbringen den Abend zu Hause."
  - de: "bar"
    ipa: "ˈbaːɐ̯"
    pos: adj
    en: "cash (in cash)"
    ru: "наличными"
    uk: "готівкою"
    example_de: "Zahlen Sie bar oder mit Karte?"
    example_en: "Are you paying cash or by card?"
    example_ru: "Вы платите наличными или картой?"
    example_uk: "Ви платите готівкою чи карткою?"
    note:
      en: "In practice you will only ever meet it next to the verb: bar zahlen, bar bezahlen — pay in cash. The question Zahlen Sie bar oder mit Karte? is asked at every till, and the noun for the cash itself is das Bargeld."
      ru: "На практике встречается только рядом с глаголом: bar zahlen, bar bezahlen — платить наличными. Вопрос Zahlen Sie bar oder mit Karte? звучит на любой кассе, а сами наличные — das Bargeld."
      uk: "На практиці трапляється лише поряд із дієсловом: bar zahlen, bar bezahlen — платити готівкою. Питання Zahlen Sie bar oder mit Karte? звучить на будь-якій касі, а сама готівка — das Bargeld."
  - de: "kostenlos"
    ipa: "ˈkɔstn̩ˌloːs"
    pos: adj
    en: "free, free of charge"
    ru: "бесплатный"
    uk: "безкоштовний"
    example_de: "Das WLAN im Hotel ist kostenlos."
    example_en: "The wifi at the hotel is free of charge."
    example_ru: "Wi-Fi в гостинице бесплатный."
    example_uk: "Wi-Fi у готелі безкоштовний."
    note:
      en: "Built from die Kosten (costs) + the ending -los (without) — literally cost-less. The word gratis means the same and is just as common. Careful: frei means free as in unoccupied or at liberty, not free of charge."
      ru: "Образовано от die Kosten («расходы») + суффикс -los («без»), то есть буквально «без затрат». Слово gratis значит то же самое и столь же употребительно. Осторожно: frei — это «свободный, незанятый», а не «бесплатный»."
      uk: "Утворене від die Kosten («витрати») + суфікс -los («без»), тобто буквально «без витрат». Слово gratis означає те саме й так само вживане. Обережно: frei — це «вільний, незайнятий», а не «безкоштовний»."
  - de: "sparen"
    ipa: "ˈʃpaːʁən"
    pos: verb
    praesens_3sg: "spart"
    partizip2: "gespart"
    aux: "haben"
    en: "to save (money); to economize"
    ru: "копить, экономить"
    uk: "заощаджувати, збирати гроші"
    example_de: "Wir sparen für eine neue Küche."
    example_en: "We are saving up for a new kitchen."
    example_ru: "Мы копим на новую кухню."
    example_uk: "Ми збираємо на нову кухню."
    note:
      en: "A weak verb: spart, hat gespart. What you are saving up for comes with für + Akkusativ: für ein Auto sparen. It also means to use less of something: Strom sparen, Zeit sparen."
      ru: "Слабый глагол: spart, hat gespart. Цель накоплений вводится через für + Akkusativ: für ein Auto sparen. Второе значение — «экономить»: Strom sparen, Zeit sparen."
      uk: "Слабке дієслово: spart, hat gespart. Мета накопичень вводиться через für + Akkusativ: für ein Auto sparen. Друге значення — «заощаджувати»: Strom sparen, Zeit sparen."
  - de: "überweisen"
    ipa: "yːbɐˈvaɪ̯zn̩"
    pos: verb
    praesens_3sg: "überweist"
    partizip2: "überwiesen"
    aux: "haben"
    valence: "+ Akk"
    en: "to transfer (money)"
    ru: "переводить (деньги)"
    uk: "переказувати (гроші)"
    example_de: "Bitte überweisen Sie die Miete bis zum dritten."
    example_en: "Please transfer the rent by the third of the month."
    example_ru: "Пожалуйста, переведите арендную плату до третьего числа."
    example_uk: "Будь ласка, перекажіть орендну плату до третього числа."
    note:
      en: "The über- here is inseparable and unstressed, so the prefix never moves and the Partizip II takes no ge-: er überweist das Geld, er hat das Geld überwiesen. The noun is die Überweisung."
      ru: "Приставка über- здесь неотделяемая и безударная: она никогда не отрывается, а причастие идёт без ge-: er überweist das Geld, er hat das Geld überwiesen. Существительное — die Überweisung."
      uk: "Префікс über- тут невідокремлюваний і ненаголошений: він ніколи не відривається, а дієприкметник іде без ge-: er überweist das Geld, er hat das Geld überwiesen. Іменник — die Überweisung."
  - de: "zahlen"
    ipa: "ˈtsaːlən"
    pos: verb
    praesens_3sg: "zahlt"
    partizip2: "gezahlt"
    aux: "haben"
    en: "to pay"
    ru: "платить"
    uk: "платити"
    example_de: "Zahlen bitte! Wir möchten zusammen zahlen."
    example_en: "The bill, please! We would like to pay together."
    example_ru: "Счёт, пожалуйста! Мы хотели бы заплатить вместе."
    example_uk: "Рахунок, будь ласка! Ми хотіли б заплатити разом."
    note:
      en: "zahlen and bezahlen are close, and the difference is what follows. zahlen stands happily alone or with an amount — Zahlen bitte! Ich zahle hundert Euro. bezahlen wants an object: die Rechnung bezahlen, das Essen bezahlen."
      ru: "zahlen и bezahlen очень близки, разница в том, что идёт после. zahlen спокойно стоит без дополнения или с суммой: Zahlen bitte! Ich zahle hundert Euro. bezahlen требует дополнения: die Rechnung bezahlen, das Essen bezahlen."
      uk: "zahlen і bezahlen дуже близькі, різниця в тому, що йде після. zahlen спокійно стоїть без додатка або із сумою: Zahlen bitte! Ich zahle hundert Euro. bezahlen вимагає додатка: die Rechnung bezahlen, das Essen bezahlen."
  - de: "wechseln"
    ipa: "ˈvɛksl̩n"
    pos: verb
    praesens_3sg: "wechselt"
    partizip2: "gewechselt"
    aux: "haben"
    valence: "+ Akk"
    en: "to change (money, a job, a flat)"
    ru: "менять, обменивать"
    uk: "міняти, обмінювати"
    example_de: "Können Sie mir hundert Euro wechseln?"
    example_en: "Could you change a hundred euros for me?"
    example_ru: "Вы можете разменять мне сто евро?"
    example_uk: "Ви можете розміняти мені сто євро?"
    note:
      en: "Swapping one thing for another of the same kind: Geld wechseln (into coins or another currency), den Job wechseln, die Wohnung wechseln. ändern, by contrast, alters a thing without replacing it: die Pläne ändern."
      ru: "Замена одного другим того же рода: Geld wechseln (разменять или обменять валюту), den Job wechseln, die Wohnung wechseln. А ändern — изменить что-то, не заменяя: die Pläne ändern."
      uk: "Заміна одного іншим того самого роду: Geld wechseln (розміняти або обміняти валюту), den Job wechseln, die Wohnung wechseln. А ändern — змінити щось, не замінюючи: die Pläne ändern."
  - de: "liefern"
    ipa: "ˈliːfɐn"
    pos: verb
    praesens_3sg: "liefert"
    partizip2: "geliefert"
    aux: "haben"
    valence: "+ Akk"
    en: "to deliver"
    ru: "доставлять, поставлять"
    uk: "доставляти, постачати"
    example_de: "Der Supermarkt liefert die Getränke bis vor die Tür."
    example_en: "The supermarket delivers the drinks right to your door."
    example_ru: "Супермаркет доставляет напитки прямо к двери."
    example_uk: "Супермаркет доставляє напої прямо до дверей."
    note:
      en: "A firm delivers goods to a customer: liefern. A postman handing out mail on foot is austragen, and the noun for the delivery itself is die Lieferung."
      ru: "Так доставляет товар фирма: liefern. Почтальон, разносящий почту по адресам, — austragen; сама доставка — die Lieferung."
      uk: "Так доставляє товар фірма: liefern. Листоноша, що розносить пошту за адресами, — austragen; сама доставка — die Lieferung."
  - de: "austauschen"
    ipa: "ˈaʊ̯sˌtaʊ̯ʃn̩"
    pos: verb
    praesens_3sg: "tauscht aus"
    partizip2: "ausgetauscht"
    aux: "haben"
    valence: "+ Akk"
    en: "to exchange, to swap, to replace"
    ru: "обменять, заменить"
    uk: "обміняти, замінити"
    example_de: "Kann ich die Hose austauschen? Sie ist zu klein."
    example_en: "Can I exchange these trousers? They are too small."
    example_ru: "Могу я обменять эти брюки? Они слишком маленькие."
    example_uk: "Чи можу я обміняти ці штани? Вони затісні."
    note:
      en: "Separable aus-, so the prefix goes to the end (Ich tausche die Hose aus) and the Partizip II puts -ge- inside: ausgetauscht. In a shop it means giving an item back and getting another one — bring the Kassenbon."
      ru: "Отделяемая приставка aus-: она уходит в конец (Ich tausche die Hose aus), а в причастии -ge- стоит внутри: ausgetauscht. В магазине значит «вернуть вещь и получить другую» — возьмите с собой чек (der Kassenbon)."
      uk: "Відокремлюваний префікс aus-: він іде в кінець (Ich tausche die Hose aus), а в дієприкметнику -ge- стоїть усередині: ausgetauscht. У магазині означає «повернути річ і отримати іншу» — візьміть із собою чек (der Kassenbon)."
  - de: "preiswert"
    ipa: "ˈpʁaɪ̯sˌveːɐ̯t"
    pos: adj
    en: "good value, reasonably priced"
    ru: "недорогой, выгодный по цене"
    uk: "недорогий, вигідний за ціною"
    example_de: "In diesem Lokal isst man sehr preiswert."
    example_en: "You eat very well for the money at this place."
    example_ru: "В этом заведении можно поесть очень выгодно."
    example_uk: "У цьому закладі можна поїсти дуже вигідно."
    note:
      en: "Literally worth its price — der Preis + wert. It is a compliment: you got good quality for what you paid. billig only says the price was low, and it often hints that the quality was low too, so a shopkeeper will call the goods preiswert and never billig."
      ru: "Буквально «стоящий своей цены» — der Preis + wert. Это похвала: за свои деньги вы получили хорошее качество. billig говорит лишь о низкой цене и часто намекает, что и качество такое же, поэтому продавец назовёт товар preiswert и никогда — billig."
      uk: "Буквально «вартий своєї ціни» — der Preis + wert. Це похвала: за свої гроші ви отримали добру якість. billig говорить лише про низьку ціну й часто натякає, що і якість така сама, тому продавець назве товар preiswert і ніколи — billig."
  - de: "reich"
    ipa: "ˈʁaɪ̯ç"
    pos: adj
    en: "rich, wealthy"
    ru: "богатый"
    uk: "багатий"
    example_de: "Man muss nicht reich sein, um glücklich zu sein."
    example_en: "You do not have to be rich to be happy."
    example_ru: "Не обязательно быть богатым, чтобы быть счастливым."
    example_uk: "Не обов’язково бути багатим, щоб бути щасливим."
    note:
      en: "The opposite is arm (poor). Careful with the look-alike verb reichen, which means to be enough: Das Geld reicht nicht bis zum Monatsende."
      ru: "Противоположность — arm («бедный»). Осторожно с похожим глаголом reichen — «хватать»: Das Geld reicht nicht bis zum Monatsende («денег не хватает до конца месяца»)."
      uk: "Протилежність — arm («бідний»). Обережно зі схожим дієсловом reichen — «вистачати»: Das Geld reicht nicht bis zum Monatsende («грошей не вистачає до кінця місяця»)."
  - de: "Flohmarkt"
    ipa: "ˈfloːˌmaʁkt"
    pos: noun
    gender: m
    plural: "die Flohmärkte"
    en: "flea market"
    ru: "блошиный рынок, барахолка"
    uk: "блошиний ринок, барахолка"
    example_de: "Auf dem Flohmarkt habe ich einen alten Tisch gekauft."
    example_en: "I bought an old table at the flea market."
    example_ru: "На блошином рынке я купил старый стол."
    example_uk: "На блошиному ринку я купив старий стіл."
    note:
      en: "A compound of der Floh (the flea) and der Markt, so it is masculine with an umlaut plural: die Flohmärkte. People sell used things there, and haggling is expected."
      ru: "Сложное слово из der Floh («блоха») и der Markt, поэтому мужского рода, а во множественном — с умлаутом: die Flohmärkte. Там продают подержанные вещи, и торговаться — в порядке вещей."
      uk: "Складне слово з der Floh («блоха») і der Markt, тому чоловічого роду, а в множині — з умлаутом: die Flohmärkte. Там продають вживані речі, і торгуватися — звична річ."
  - de: "Messe"
    ipa: "ˈmɛsə"
    pos: noun
    gender: f
    plural: "die Messen"
    en: "trade fair"
    ru: "ярмарка, выставка (торговая)"
    uk: "ярмарок, виставка (торгова)"
    example_de: "Nächste Woche fahre ich zur Messe nach Frankfurt."
    example_en: "Next week I am travelling to the trade fair in Frankfurt."
    example_ru: "На следующей неделе я еду на ярмарку во Франкфурт."
    example_uk: "Наступного тижня я їду на ярмарок до Франкфурта."
    note:
      en: "A big trade fair where companies show their products — die Buchmesse, die Automesse. The same word also means a church Mass; this card is the trade fair. You go there with zu + Dativ: zur Messe fahren."
      ru: "Крупная торговая выставка, где фирмы показывают свою продукцию: die Buchmesse, die Automesse. Тем же словом называют церковную мессу, но карточка — про выставку. Ехать туда — zu + Dativ: zur Messe fahren."
      uk: "Велика торгова виставка, де фірми показують свою продукцію: die Buchmesse, die Automesse. Тим самим словом називають церковну месу, але картка — про виставку. Їхати туди — zu + Dativ: zur Messe fahren."
  - de: "Empfänger"
    ipa: "ɛmˈpfɛŋɐ"
    pos: noun
    gender: m
    plural: "die Empfänger"
    en: "recipient, addressee"
    ru: "получатель, адресат"
    uk: "одержувач, адресат"
    example_de: "Auf dem Paket stehen der Empfänger und die Adresse."
    example_en: "The recipient and the address are written on the parcel."
    example_ru: "На посылке указаны получатель и адрес."
    example_uk: "На посилці зазначені одержувач та адреса."
    note:
      en: "The person who gets a parcel, a letter or a bank transfer — the form asks for den Empfänger. Masculine, plural unchanged: der Empfänger, die Empfänger. The one who sends it is der Absender."
      ru: "Тот, кто получает посылку, письмо или банковский перевод: в бланке требуется den Empfänger. Мужского рода, множественное не меняется: der Empfänger, die Empfänger. Отправитель — der Absender."
      uk: "Той, хто отримує посилку, лист або банківський переказ: у бланку потрібно den Empfänger. Чоловічого роду, множина не змінюється: der Empfänger, die Empfänger. Відправник — der Absender."
