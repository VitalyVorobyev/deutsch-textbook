id: kernwortschatz-a2
title_de: "Kernwortschatz A2"
title_en: "Core vocabulary A2"
title_ru: "Базовая лексика A2"
level: A2
entries:
  - de: brauchen
    pos: verb
    praesens_3sg: braucht
    partizip2: gebraucht
    aux: haben
    valence: "+ Akk"
    en: to need
    ru: нуждаться (в чём-либо)
    example_de: Ich brauche einen neuen Computer.
    example_en: I need a new computer.
    example_ru: Мне нужен новый компьютер.
    note:
      en: 'What you need is a plain direct object: Ich brauche Hilfe.'
      ru: 'То, что нужно, — прямое дополнение в Akkusativ: Ich brauche Hilfe («мне нужна помощь»).'
  - de: glauben
    pos: verb
    praesens_3sg: glaubt
    partizip2: geglaubt
    aux: haben
    en: to believe, to think
    ru: полагать, верить
    example_de: Ich glaube, das ist richtig.
    example_en: I think that is right.
    example_ru: Я думаю, это правильно.
  - de: wissen
    pos: verb
    praesens_3sg: weiß
    partizip2: gewusst
    aux: haben
    en: to know (a fact)
    ru: знать (факт)
    example_de: Ich weiß es nicht.
    example_en: I don't know.
    example_ru: Я не знаю.
    note:
      en: 'Irregular like a modal: ich weiß, du weißt, er weiß. Facts → wissen; people/places → kennen.'
      ru: 'Спрягается как модальный: ich weiß, du weißt, er weiß. Факты → wissen; люди и места → kennen.'
  - de: kennen
    pos: verb
    praesens_3sg: kennt
    partizip2: gekannt
    aux: haben
    valence: "+ Akk"
    en: to know (a person, a place)
    ru: знать, быть знакомым (с кем-либо, чем-либо)
    example_de: Kennst du diesen Mann?
    example_en: Do you know this man?
    example_ru: Ты знаешь этого мужчину?
  - de: denken
    pos: verb
    praesens_3sg: denkt
    partizip2: gedacht
    aux: haben
    en: to think
    ru: думать
    example_de: Ich denke oft an meine Familie.
    example_en: I often think of my family.
    example_ru: Я часто думаю о своей семье.
    note:
      en: 'denken an + Akk: Ich denke an dich.'
      ru: 'denken an + Akk: Ich denke an dich («думаю о тебе»).'
  - de: sagen
    pos: verb
    praesens_3sg: sagt
    partizip2: gesagt
    aux: haben
    en: to say
    ru: говорить, сказать
    example_de: Was hast du gesagt?
    example_en: What did you say?
    example_ru: Что ты сказал?
  - de: fragen
    pos: verb
    praesens_3sg: fragt
    partizip2: gefragt
    aux: haben
    valence: "+ Akk"
    en: to ask
    ru: спрашивать
    example_de: Darf ich Sie etwas fragen?
    example_en: May I ask you something?
    example_ru: Можно Вас кое о чём спросить?
    note:
      en: 'Accusative: jemanden fragen — ich frage dich, never "dir".'
      ru: 'Akkusativ, как и в русском «спросить (кого?)»: jemanden fragen — ich frage dich.'
  - de: zeigen
    pos: verb
    praesens_3sg: zeigt
    partizip2: gezeigt
    aux: haben
    valence: "+ Dat + Akk"
    en: to show
    ru: показывать
    example_de: Ich zeige dir die Fotos.
    example_en: I'll show you the photos.
    example_ru: Я покажу тебе фотографии.
    note:
      en: 'Two objects: the person is dative, the thing accusative — Ich zeige dem Gast die Wohnung.'
      ru: 'Два дополнения: человек — Dativ, предмет — Akkusativ: Ich zeige dem Gast die Wohnung.'
  - de: erklären
    pos: verb
    praesens_3sg: erklärt
    partizip2: erklärt
    aux: haben
    valence: "+ Dat + Akk"
    en: to explain
    ru: объяснять
    example_de: Die Lehrerin erklärt uns die Regel.
    example_en: The teacher explains the rule to us.
    example_ru: Учительница объясняет нам правило.
    note:
      en: 'Inseparable er- prefix — Partizip II without ge-: hat erklärt.'
      ru: 'Неотделяемая приставка er- — Partizip II без ge-: hat erklärt.'
  - de: schenken
    pos: verb
    praesens_3sg: schenkt
    partizip2: geschenkt
    aux: haben
    valence: "+ Dat + Akk"
    en: to give (as a present)
    ru: дарить
    example_de: Was schenkst du deiner Mutter zum Geburtstag?
    example_en: What are you giving your mother for her birthday?
    example_ru: Что ты подаришь маме на день рождения?
  - de: suchen
    pos: verb
    praesens_3sg: sucht
    partizip2: gesucht
    aux: haben
    valence: "+ Akk"
    en: to look for
    ru: искать
    example_de: Ich suche meine Brille.
    example_en: I'm looking for my glasses.
    example_ru: Я ищу свои очки.
    note:
      en: 'No preposition, unlike "look FOR": etwas suchen — ich suche den Schlüssel.'
      ru: 'Без предлога, как и в русском: «искать (что?)» — ich suche den Schlüssel.'
  - de: versuchen
    pos: verb
    praesens_3sg: versucht
    partizip2: versucht
    aux: haben
    en: to try
    ru: пытаться, пробовать
    example_de: Ich versuche, jeden Tag Deutsch zu lernen.
    example_en: I try to learn German every day.
    example_ru: Я стараюсь заниматься немецким каждый день.
    note:
      en: 'Inseparable ver- prefix — Partizip II without ge-: hat versucht.'
      ru: 'Неотделяемая приставка ver- — Partizip II без ge-: hat versucht.'
  - de: wohnen
    pos: verb
    praesens_3sg: wohnt
    partizip2: gewohnt
    aux: haben
    en: to live, to reside
    ru: жить, проживать
    example_de: Wir wohnen seit einem Jahr in München.
    example_en: We have been living in Munich for a year.
    example_ru: Мы уже год живём в Мюнхене.
  - de: lernen
    pos: verb
    praesens_3sg: lernt
    partizip2: gelernt
    aux: haben
    en: to learn, to study
    ru: учить, учиться
    example_de: Ich lerne jeden Tag zwanzig Minuten Deutsch.
    example_en: I study German for twenty minutes every day.
    example_ru: Я занимаюсь немецким по двадцать минут каждый день.
  - de: wünschen
    pos: verb
    praesens_3sg: wünscht
    partizip2: gewünscht
    aux: haben
    valence: "+ Dat + Akk"
    en: to wish
    ru: желать
    example_de: Ich wünsche dir viel Glück!
    example_en: I wish you good luck!
    example_ru: Желаю тебе удачи!
  - de: weil
    pos: conj
    en: because
    ru: потому что
    example_de: Ich bleibe zu Hause, weil ich krank bin.
    example_en: I'm staying at home because I'm ill.
    example_ru: Я остаюсь дома, потому что болею.
    note:
      en: 'weil sends the verb to the end of its clause: … weil ich krank bin.'
      ru: 'weil отправляет глагол в конец придаточного: … weil ich krank bin.'
  - de: dass
    pos: conj
    en: that
    ru: что (союз)
    example_de: Ich glaube, dass er heute kommt.
    example_en: I think that he is coming today.
    example_ru: Я думаю, что он сегодня придёт.
    note:
      en: 'dass sends the verb to the end: … dass er heute kommt. Not to confuse with the article das.'
      ru: 'dass отправляет глагол в конец: … dass er heute kommt. Не путать с артиклем das.'
  - de: wenn
    pos: conj
    en: when, if
    ru: когда, если
    example_de: Wenn es regnet, bleiben wir zu Hause.
    example_en: If it rains, we'll stay at home.
    example_ru: Если пойдёт дождь, мы останемся дома.
    note:
      en: 'The wenn-clause puts its verb last; the main clause then starts with the verb: …, bleiben wir …'
      ru: 'В придаточном с wenn глагол в конце; главное предложение после него начинается с глагола: …, bleiben wir …'
  - de: denn
    pos: conj
    en: because, for
    ru: так как, ведь
    example_de: Ich gehe ins Bett, denn ich bin müde.
    example_en: I'm going to bed because I'm tired.
    example_ru: Я иду спать, ведь я устал.
    note:
      en: 'Same meaning as weil, but denn does NOT move the verb: … denn ich bin müde.'
      ru: 'Значит то же, что weil, но НЕ двигает глагол: … denn ich bin müde.'
  - de: vielleicht
    pos: adv
    en: maybe, perhaps
    ru: может быть, возможно
    example_de: Vielleicht kommt er morgen.
    example_en: Maybe he'll come tomorrow.
    example_ru: Может быть, он придёт завтра.
    note:
      en: 'Fronted vielleicht still keeps the verb second: Vielleicht kommt er.'
      ru: 'Если vielleicht стоит в начале, глагол всё равно на втором месте: Vielleicht kommt er.'
  - de: zusammen
    pos: adv
    en: together
    ru: вместе
    example_de: Wir kochen heute zusammen.
    example_en: We're cooking together today.
    example_ru: Сегодня мы готовим вместе.
  - de: allein
    pos: adv
    en: alone
    ru: один, в одиночку
    example_de: Sie wohnt allein in der Stadt.
    example_en: She lives alone in the city.
    example_ru: Она живёт в городе одна.
  - de: wieder
    pos: adv
    en: again
    ru: снова, опять
    example_de: Bist du wieder krank?
    example_en: Are you ill again?
    example_ru: Ты опять болеешь?
  - de: bald
    pos: adv
    en: soon
    ru: скоро
    example_de: Bis bald! Wir sehen uns nächste Woche.
    example_en: See you soon! We'll meet next week.
    example_ru: До скорого! Увидимся на следующей неделе.
  - de: wichtig
    pos: adj
    en: important
    ru: важный
    example_de: Das ist ein wichtiger Termin.
    example_en: That is an important appointment.
    example_ru: Это важная встреча.
  - de: einfach
    pos: adj
    en: easy, simple
    ru: простой, лёгкий
    example_de: Die Aufgabe ist ganz einfach.
    example_en: The task is quite easy.
    example_ru: Задание совсем простое.
  - de: schwierig
    pos: adj
    en: difficult
    ru: трудный, сложный
    example_de: Deutsche Grammatik ist manchmal schwierig.
    example_en: German grammar is sometimes difficult.
    example_ru: Немецкая грамматика иногда трудная.
  - de: müde
    pos: adj
    en: tired
    ru: усталый
    example_de: Nach der Arbeit bin ich immer müde.
    example_en: After work I'm always tired.
    example_ru: После работы я всегда усталый.
    note:
      en: 'Don''t drop the verb: Ich BIN müde — German always needs sein here.'
      ru: 'Не опускайте глагол: Ich BIN müde — по-немецки «быть» обязательно, в отличие от русского «я устал».'
  - de: krank
    pos: adj
    en: ill, sick
    ru: больной
    example_de: Ich bin heute krank und bleibe im Bett.
    example_en: I'm ill today and staying in bed.
    example_ru: Я сегодня болею и остаюсь в постели.
  - de: gesund
    pos: adj
    en: healthy
    ru: здоровый
    example_de: Obst und Gemüse sind gesund.
    example_en: Fruit and vegetables are healthy.
    example_ru: Фрукты и овощи полезны для здоровья.
