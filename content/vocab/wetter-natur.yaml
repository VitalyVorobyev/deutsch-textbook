id: wetter-natur
title_de: "Wetter & Natur"
title_en: "Weather & nature"
title_ru: "Погода и природа"
level: A1
entries:
  - { de: "Wetter", ipa: "ˈvɛtɐ", pos: noun, gender: n, plural: "—", en: "weather", ru: "погода", example_de: "Wie ist das Wetter heute?", example_en: "How is the weather today?", example_ru: "Какая сегодня погода?" }
  - { de: "Sonne", ipa: "ˈzɔnə", pos: noun, gender: f, plural: "die Sonnen", en: "sun", ru: "солнце", example_de: "Im Sommer scheint die Sonne oft.", example_en: "In summer the sun often shines.", example_ru: "Летом солнце часто светит." }
  - { de: "Regen", ipa: "ˈʁeːgn̩", pos: noun, gender: m, plural: "—", en: "rain", ru: "дождь", example_de: "Der Regen ist kalt.", example_en: "The rain is cold.", example_ru: "Дождь холодный." }
  - { de: "Schnee", ipa: "ˈʃneː", pos: noun, gender: m, plural: "—", en: "snow", ru: "снег", example_de: "Im Winter liegt oft Schnee.", example_en: "In winter there is often snow.", example_ru: "Зимой часто лежит снег." }
  - { de: "Wind", ipa: "ˈvɪnt", pos: noun, gender: m, plural: "die Winde", en: "wind", ru: "ветер", example_de: "Der Wind ist heute stark.", example_en: "The wind is strong today.", example_ru: "Сегодня сильный ветер." }
  - { de: "Wolke", ipa: "ˈvɔlkə", pos: noun, gender: f, plural: "die Wolken", en: "cloud", ru: "облако", example_de: "Am Himmel sind viele Wolken.", example_en: "There are many clouds in the sky.", example_ru: "На небе много облаков." }
  - { de: "Grad", ipa: "ˈgʁaːt", pos: noun, gender: m, plural: "die Grade", en: "degree", ru: "градус", example_de: "Heute sind es dreißig Grad.", example_en: "Today it is thirty degrees.", example_ru: "Сегодня тридцать градусов.", note: { en: "After a cardinal number, Grad stays unchanged: dreißig Grad, not dreißig Grade — the -e plural only appears without a number (hohe Grade der Hitze).", ru: "После числительного Grad не меняется: dreißig Grad, а не dreißig Grade — форма с -e (Grade) появляется только без числительного." } }
  - { de: "warm", ipa: "ˈvaʁm", pos: adj, en: "warm", ru: "тёплый", example_de: "Im Sommer ist es warm.", example_en: "In summer it is warm.", example_ru: "Летом тепло." }
  - { de: "kalt", ipa: "ˈkalt", pos: adj, en: "cold", ru: "холодный", example_de: "Im Winter ist es kalt.", example_en: "In winter it is cold.", example_ru: "Зимой холодно." }
  - { de: "heiß", ipa: "ˈhaɪ̯s", pos: adj, en: "hot", ru: "жаркий; горячий", example_de: "Heute ist es sehr heiß.", example_en: "Today it is very hot.", example_ru: "Сегодня очень жарко." }
  - { de: "kühl", ipa: "ˈkyːl", pos: adj, en: "cool", ru: "прохладный", example_de: "Am Abend ist es kühl.", example_en: "In the evening it is cool.", example_ru: "Вечером прохладно." }
  - { de: "regnen", ipa: "ˈʁeːgnən", pos: verb, en: "to rain", ru: "идти (о дожде)", example_de: "Es regnet den ganzen Tag.", example_en: "It rains all day.", example_ru: "Весь день идёт дождь.", partizip2: "geregnet", aux: "haben", praesens_3sg: "regnet", note: { en: "Impersonal verb: it only ever has the dummy subject es, never a real subject like der Regen.", ru: "Безличный глагол: подлежащим всегда служит только формальное es — в отличие от русской конструкции «дождь идёт», где дождь является подлежащим." } }
  - { de: "schneien", ipa: "ˈʃnaɪ̯ən", pos: verb, en: "to snow", ru: "идти (о снеге)", example_de: "Im Winter schneit es oft.", example_en: "In winter it often snows.", example_ru: "Зимой часто идёт снег.", partizip2: "geschneit", aux: "haben", praesens_3sg: "schneit", note: { en: "Impersonal like regnen: only used with es.", ru: "Безличный глагол, как и regnen: используется только с es." } }
  - { de: "scheinen", ipa: "ˈʃaɪ̯nən", pos: verb, en: "to shine", ru: "светить", example_de: "Die Sonne scheint den ganzen Tag.", example_en: "The sun shines all day.", example_ru: "Солнце светит весь день.", partizip2: "geschienen", aux: "haben", praesens_3sg: "scheint", note: { en: "scheinen also means \"to seem\" (Das scheint gut.); here it is the weather sense, \"to shine\".", ru: "scheinen может значить и «казаться» — здесь используется значение «светить» (о солнце)." } }
  - { de: "Klima", ipa: "ˈkliːma", pos: noun, gender: n, plural: "die Klimas", en: "climate", ru: "климат", example_de: "Das Klima in Deutschland ist mild.", example_en: "The climate in Germany is mild.", example_ru: "Климат в Германии мягкий." }
  - { de: "Natur", ipa: "naˈtuːɐ̯", pos: noun, gender: f, plural: "—", en: "nature", ru: "природа", example_de: "Die Natur ist im Herbst schön.", example_en: "Nature is beautiful in autumn.", example_ru: "Природа осенью красивая." }
  - { de: "Baum", ipa: "ˈbaʊ̯m", pos: noun, gender: m, plural: "die Bäume", en: "tree", ru: "дерево", example_de: "Der Baum ist sehr groß.", example_en: "The tree is very big.", example_ru: "Дерево очень большое." }
  - { de: "Blume", ipa: "ˈbluːmə", pos: noun, gender: f, plural: "die Blumen", en: "flower", ru: "цветок", example_de: "Die Blume ist rot.", example_en: "The flower is red.", example_ru: "Цветок красный." }
  - { de: "Meer", ipa: "ˈmeːɐ̯", pos: noun, gender: n, plural: "die Meere", en: "sea; ocean", ru: "море", example_de: "Das Meer ist blau.", example_en: "The sea is blue.", example_ru: "Море синее." }
  - { de: "See", ipa: "ˈzeː", pos: noun, gender: m, plural: "die Seen", en: "lake", ru: "озеро", example_de: "Der See ist ruhig.", example_en: "The lake is calm.", example_ru: "Озеро спокойное.", note: { en: "Gender changes the meaning: der See = lake (masculine, this entry), but die See = sea (feminine, mainly northern-German/nautical usage), close to das Meer.", ru: "Род меняет значение: der See = озеро (мужской род, это слово), а die See = море (женский род, употребляется в основном на севере Германии), близко к das Meer." } }
  - { de: "Fluss", ipa: "ˈflʊs", pos: noun, gender: m, plural: "die Flüsse", en: "river", ru: "река", example_de: "Der Fluss ist lang.", example_en: "The river is long.", example_ru: "Река длинная." }
  - { de: "Berg", ipa: "ˈbɛʁk", pos: noun, gender: m, plural: "die Berge", en: "mountain", ru: "гора", example_de: "Der Berg ist hoch.", example_en: "The mountain is high.", example_ru: "Гора высокая." }
  - { de: "Wald", ipa: "ˈvalt", pos: noun, gender: m, plural: "die Wälder", en: "forest; woods", ru: "лес", example_de: "Der Wald ist grün.", example_en: "The forest is green.", example_ru: "Лес зелёный." }
  - { de: "Himmel", ipa: "ˈhɪməl", pos: noun, gender: m, plural: "—", en: "sky", ru: "небо", example_de: "Der Himmel ist heute grau.", example_en: "The sky is grey today.", example_ru: "Небо сегодня серое." }
  - { de: "Luft", ipa: "ˈlʊft", pos: noun, gender: f, plural: "—", en: "air", ru: "воздух", example_de: "Die Luft ist frisch.", example_en: "The air is fresh.", example_ru: "Воздух свежий." }
  - { de: "Landschaft", ipa: "ˈlantʃaft", pos: noun, gender: f, plural: "die Landschaften", en: "landscape; countryside", ru: "пейзаж; местность", example_de: "Die Landschaft ist wunderschön.", example_en: "The landscape is wonderful.", example_ru: "Пейзаж прекрасный." }
