id: trennbare-verben
title_de: "Trennbare Verben"
title_en: "Separable verbs"
title_ru: "Глаголы с отделяемыми приставками"
level: A2
entries:
  - de: anrufen
    ipa: "ˈanˌʁuːfn̩"
    pos: verb
    praesens_3sg: ruft an
    partizip2: angerufen
    aux: haben
    valence: "+ Akk"
    en: to call (on the phone)
    ru: звонить (по телефону)
    example_de: Ich rufe dich heute Abend an.
    example_en: I'll call you tonight.
    example_ru: Я позвоню тебе сегодня вечером.
    note:
      en: 'Accusative, as in English "call SOMEONE": jemanden anrufen — ich rufe ihn an.'
      ru: 'Ловушка: по-русски «звонить (кому?)», а по-немецки Akkusativ — jemanden anrufen: ich rufe ihn an.'
  - de: anfangen
    ipa: "ˈanˌfaŋən"
    pos: verb
    praesens_3sg: fängt an
    partizip2: angefangen
    aux: haben
    en: to begin, to start
    ru: начинать(ся)
    example_de: Der Kurs fängt um neun Uhr an.
    example_en: The course starts at nine o'clock.
    example_ru: Курс начинается в девять часов.
    note:
      en: 'Stem change + separable prefix: er fängt an; Perfekt hat angefangen.'
      ru: 'Смена гласной + отделяемая приставка: er fängt an; перфект — hat angefangen.'
  - de: aufhören
    ipa: "ˈaʊ̯fˌhøːʁən"
    pos: verb
    praesens_3sg: hört auf
    partizip2: aufgehört
    aux: haben
    en: to stop, to quit
    ru: прекращать, переставать
    example_de: Der Regen hört bald auf.
    example_en: The rain will stop soon.
    example_ru: Дождь скоро прекратится.
  - de: abholen
    ipa: "ˈapˌhoːlən"
    pos: verb
    praesens_3sg: holt ab
    partizip2: abgeholt
    aux: haben
    valence: "+ Akk"
    en: to pick up (someone/something)
    ru: забирать, встречать
    example_de: Ich hole dich vom Bahnhof ab.
    example_en: I'll pick you up from the station.
    example_ru: Я встречу тебя на вокзале.
  - de: ankommen
    ipa: "ˈanˌkɔmən"
    pos: verb
    praesens_3sg: kommt an
    partizip2: angekommen
    aux: sein
    en: to arrive
    ru: прибывать
    example_de: Der Zug kommt um acht Uhr an.
    example_en: The train arrives at eight o'clock.
    example_ru: Поезд прибывает в восемь часов.
    note:
      en: 'Movement → sein: Wir sind spät angekommen.'
      ru: 'Движение → sein: Wir sind spät angekommen.'
  - de: abfahren
    ipa: "ˈapˌfaːʁən"
    pos: verb
    praesens_3sg: fährt ab
    partizip2: abgefahren
    aux: sein
    en: to depart, to leave
    ru: отправляться, отъезжать
    example_de: Der Bus fährt in fünf Minuten ab.
    example_en: The bus leaves in five minutes.
    example_ru: Автобус отправляется через пять минут.
  - de: einsteigen
    ipa: "ˈaɪ̯nˌʃtaɪ̯gn̩"
    pos: verb
    praesens_3sg: steigt ein
    partizip2: eingestiegen
    aux: sein
    en: to get on, to board
    ru: садиться (в транспорт)
    example_de: Wir steigen in den Bus ein.
    example_en: We get on the bus.
    example_ru: Мы садимся в автобус.
  - de: aussteigen
    ipa: "ˈaʊ̯sˌʃtaɪ̯gn̩"
    pos: verb
    praesens_3sg: steigt aus
    partizip2: ausgestiegen
    aux: sein
    en: to get off
    ru: выходить (из транспорта)
    example_de: Ich steige an der nächsten Haltestelle aus.
    example_en: I get off at the next stop.
    example_ru: Я выхожу на следующей остановке.
  - de: umsteigen
    ipa: "ˈʊmˌʃtaɪ̯gn̩"
    pos: verb
    praesens_3sg: steigt um
    partizip2: umgestiegen
    aux: sein
    en: to change (trains, buses)
    ru: делать пересадку
    example_de: In Köln müssen Sie umsteigen.
    example_en: You have to change trains in Cologne.
    example_ru: В Кёльне вам нужно сделать пересадку.
    note:
      en: 'After a modal the separable verb stays whole at the end: Sie müssen umsteigen.'
      ru: 'После модального глагола отделяемый глагол стоит целиком в конце: Sie müssen umsteigen.'
  - de: einladen
    ipa: "ˈaɪ̯nˌlaːdn̩"
    pos: verb
    praesens_3sg: lädt ein
    partizip2: eingeladen
    aux: haben
    valence: "+ Akk"
    en: to invite
    ru: приглашать
    example_de: Ich lade dich zu meiner Party ein.
    example_en: I'm inviting you to my party.
    example_ru: Я приглашаю тебя на свою вечеринку.
    note:
      en: 'Stem change: er lädt ein. The guest is accusative: Ich lade Sie ein.'
      ru: 'Смена гласной: er lädt ein. Гость — в Akkusativ: Ich lade Sie ein.'
  - de: mitbringen
    ipa: "ˈmɪtˌbʁɪŋən"
    pos: verb
    praesens_3sg: bringt mit
    partizip2: mitgebracht
    aux: haben
    valence: "+ Dat + Akk"
    en: to bring along
    ru: приносить с собой
    example_de: Ich bringe dir einen Kaffee mit.
    example_en: I'll bring you a coffee.
    example_ru: Я принесу тебе кофе.
  - de: mitkommen
    ipa: "ˈmɪtˌkɔmən"
    pos: verb
    praesens_3sg: kommt mit
    partizip2: mitgekommen
    aux: sein
    en: to come along
    ru: идти вместе (с кем-то)
    example_de: Kommst du mit ins Kino?
    example_en: Are you coming along to the cinema?
    example_ru: Пойдёшь с нами в кино?
  - de: ausgehen
    ipa: "ˈaʊ̯sˌgeːən"
    pos: verb
    praesens_3sg: geht aus
    partizip2: ausgegangen
    aux: sein
    en: to go out
    ru: выходить в свет, идти развлекаться
    example_de: Am Samstag gehen wir zusammen aus.
    example_en: On Saturday we're going out together.
    example_ru: В субботу мы вместе идём развлекаться.
  - de: umziehen
    ipa: "ˈʊmˌtsiːən"
    pos: verb
    praesens_3sg: zieht um
    partizip2: umgezogen
    aux: sein
    en: to move (house)
    ru: переезжать
    example_de: Wir ziehen nächsten Monat nach Berlin um.
    example_en: We are moving to Berlin next month.
    example_ru: В следующем месяце мы переезжаем в Берлин.
  - de: aufmachen
    ipa: "ˈaʊ̯fˌmaxn̩"
    pos: verb
    praesens_3sg: macht auf
    partizip2: aufgemacht
    aux: haben
    valence: "+ Akk"
    en: to open
    ru: открывать
    example_de: Machst du bitte das Fenster auf?
    example_en: Will you open the window, please?
    example_ru: Открой, пожалуйста, окно.
  - de: zumachen
    ipa: "ˈtsuːˌmaxn̩"
    pos: verb
    praesens_3sg: macht zu
    partizip2: zugemacht
    aux: haben
    valence: "+ Akk"
    en: to close
    ru: закрывать
    example_de: Der Supermarkt macht um zwanzig Uhr zu.
    example_en: The supermarket closes at eight p.m.
    example_ru: Супермаркет закрывается в восемь вечера.
