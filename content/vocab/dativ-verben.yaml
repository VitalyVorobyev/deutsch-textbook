id: dativ-verben
title_de: "Verben mit Dativ"
title_en: "Verbs with the dative"
title_ru: "Глаголы с дательным падежом"
level: A2
entries:
  - de: helfen
    pos: verb
    praesens_3sg: hilft
    partizip2: geholfen
    aux: haben
    valence: "+ Dat"
    en: to help
    ru: помогать
    example_de: Kannst du mir bitte helfen?
    example_en: Can you please help me?
    example_ru: Ты можешь мне помочь, пожалуйста?
    note:
      en: 'English "help HIM" looks like a direct object, but helfen takes the dative: Ich helfe ihm. Stem change: du hilfst, er hilft.'
      ru: 'Падеж совпадает с русским: «помогать (кому?) ему» — Ich helfe ihm. Смена гласной: du hilfst, er hilft.'
  - de: danken
    pos: verb
    praesens_3sg: dankt
    partizip2: gedankt
    aux: haben
    valence: "+ Dat"
    en: to thank
    ru: благодарить
    example_de: Ich danke dir für das Geschenk.
    example_en: Thank you for the present.
    example_ru: Спасибо тебе за подарок.
    note:
      en: 'English "thank YOU" looks like a direct object, but danken takes the dative: Ich danke Ihnen — never "Ich danke Sie".'
      ru: 'Ловушка: по-русски «благодарить (кого?) вас» — винительный, а в немецком только Dativ: Ich danke Ihnen.'
  - de: gefallen
    pos: verb
    praesens_3sg: gefällt
    partizip2: gefallen
    aux: haben
    valence: "+ Dat"
    en: to please, to be liked
    ru: нравиться
    example_de: Die Wohnung gefällt mir sehr.
    example_en: I like the flat a lot.
    example_ru: Квартира мне очень нравится.
    note:
      en: 'The thing you like is the subject, the person is dative — like "it appeals to me": Das Buch gefällt mir.'
      ru: 'Устроен как русское «нравиться»: что нравится — подлежащее, кому — Dativ: Das Buch gefällt mir.'
  - de: gehören
    pos: verb
    praesens_3sg: gehört
    partizip2: gehört
    aux: haben
    valence: "+ Dat"
    en: to belong to
    ru: принадлежать
    example_de: Das Auto gehört meiner Schwester.
    example_en: The car belongs to my sister.
    example_ru: Машина принадлежит моей сестре.
    note:
      en: 'The owner is the wem?-answer: it belongs TO her — Es gehört ihr.'
      ru: 'Как в русском: «принадлежит (кому?) ей» — Es gehört ihr.'
  - de: antworten
    pos: verb
    praesens_3sg: antwortet
    partizip2: geantwortet
    aux: haben
    valence: "+ Dat"
    en: to answer
    ru: отвечать
    example_de: Warum antwortest du mir nicht?
    example_en: Why don't you answer me?
    example_ru: Почему ты мне не отвечаешь?
    note:
      en: 'English "answer HER" looks accusative, but German insists on the dative: Sie antwortet der Lehrerin.'
      ru: 'Падеж совпадает с русским: «отвечать (кому?) учительнице» — Sie antwortet der Lehrerin.'
  - de: gratulieren
    pos: verb
    praesens_3sg: gratuliert
    partizip2: gratuliert
    aux: haben
    valence: "+ Dat"
    en: to congratulate
    ru: поздравлять
    example_de: Wir gratulieren dir zum Geburtstag!
    example_en: We congratulate you on your birthday!
    example_ru: Поздравляем тебя с днём рождения!
    note:
      en: '-ieren verb — Partizip II without ge-: hat gratuliert. The person is dative: Ich gratuliere Ihnen.'
      ru: 'Глагол на -ieren — Partizip II без ge-: hat gratuliert. По-русски «поздравлять (кого?)», по-немецки Dativ: Ich gratuliere Ihnen.'
  - de: zuhören
    pos: verb
    praesens_3sg: hört zu
    partizip2: zugehört
    aux: haben
    valence: "+ Dat"
    en: to listen (to someone)
    ru: слушать (кого-либо, внимательно)
    example_de: Bitte hör mir gut zu!
    example_en: Please listen to me carefully!
    example_ru: Пожалуйста, слушай меня внимательно!
    note:
      en: 'Separable: Ich höre dir zu. English "listen TO someone" is a good hook for the dative.'
      ru: 'Отделяемая приставка: Ich höre dir zu. По-русски «слушать (кого?)» — винительный, а здесь Dativ.'
  - de: fehlen
    pos: verb
    praesens_3sg: fehlt
    partizip2: gefehlt
    aux: haben
    valence: "+ Dat"
    en: to be missing; to be missed
    ru: недоставать; вызывать тоску
    example_de: Du fehlst mir sehr.
    example_en: I miss you a lot.
    example_ru: Я очень по тебе скучаю.
    note:
      en: '"I miss you" flips in German: the missed person is the subject — Du fehlst mir, literally "you are missing to me".'
      ru: '«Я скучаю по тебе» переворачивается: тот, кого не хватает, — подлежащее: Du fehlst mir («ты мне недостаёшь»).'
