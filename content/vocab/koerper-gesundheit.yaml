id: koerper-gesundheit
title_de: "Körper & Gesundheit"
title_en: "Body & health"
title_ru: "Тело и здоровье"
level: A1
entries:
  - { de: "Körper", ipa: "ˈkœʁpɐ", pos: noun, gender: m, plural: "die Körper", en: "body", ru: "тело", example_de: "Sport ist gut für den Körper.", example_en: "Sport is good for the body.", example_ru: "Спорт полезен для тела." }
  - { de: "Kopf", ipa: "ˈkɔpf", pos: noun, gender: m, plural: "die Köpfe", en: "head", ru: "голова", example_de: "Ich wasche meinen Kopf jeden Tag.", example_en: "I wash my head every day.", example_ru: "Я мою голову каждый день." }
  - { de: "Auge", ipa: "ˈaʊ̯gə", pos: noun, gender: n, plural: "die Augen", en: "eye", ru: "глаз", example_de: "Ihre Augen sind blau.", example_en: "Her eyes are blue.", example_ru: "Её глаза голубые." }
  - { de: "Ohr", ipa: "ˈoːɐ̯", pos: noun, gender: n, plural: "die Ohren", en: "ear", ru: "ухо", example_de: "Die Ohren sind klein.", example_en: "The ears are small.", example_ru: "Уши маленькие." }
  - { de: "Nase", ipa: "ˈnaːzə", pos: noun, gender: f, plural: "die Nasen", en: "nose", ru: "нос", example_de: "Die Nase ist rot.", example_en: "The nose is red.", example_ru: "Нос красный." }
  - { de: "Mund", ipa: "ˈmʊnt", pos: noun, gender: m, plural: "die Münder", en: "mouth", ru: "рот", example_de: "Der Mund ist klein.", example_en: "The mouth is small.", example_ru: "Рот маленький." }
  - { de: "Zahn", ipa: "ˈtsaːn", pos: noun, gender: m, plural: "die Zähne", en: "tooth", ru: "зуб", example_de: "Ich putze meine Zähne.", example_en: "I brush my teeth.", example_ru: "Я чищу зубы." }
  - { de: "Hals", ipa: "ˈhals", pos: noun, gender: m, plural: "die Hälse", en: "neck; throat", ru: "шея; горло", example_de: "Der Hals ist lang.", example_en: "The neck is long.", example_ru: "Шея длинная." }
  - { de: "Arm", ipa: "ˈaʁm", pos: noun, gender: m, plural: "die Arme", en: "arm", ru: "рука", example_de: "Der Arm ist stark.", example_en: "The arm is strong.", example_ru: "Рука сильная." }
  - { de: "Hand", ipa: "ˈhant", pos: noun, gender: f, plural: "die Hände", en: "hand", ru: "рука; кисть", example_de: "Ich wasche meine Hände vor dem Essen.", example_en: "I wash my hands before eating.", example_ru: "Я мою руки перед едой.", note: { en: "Hand is only the part below the wrist — the whole limb is der Arm.", ru: "Русское «рука» покрывает и Arm (от плеча до кисти), и Hand (кисть) — в немецком это два разных слова." } }
  - { de: "Finger", ipa: "ˈfɪŋɐ", pos: noun, gender: m, plural: "die Finger", en: "finger", ru: "палец (на руке)", example_de: "Ich habe zehn Finger.", example_en: "I have ten fingers.", example_ru: "У меня десять пальцев." }
  - { de: "Bauch", ipa: "ˈbaʊ̯x", pos: noun, gender: m, plural: "die Bäuche", en: "belly; stomach", ru: "живот", example_de: "Mein Bauch ist voll.", example_en: "My belly is full.", example_ru: "Мой живот полный." }
  - { de: "Bein", ipa: "ˈbaɪ̯n", pos: noun, gender: n, plural: "die Beine", en: "leg", ru: "нога", example_de: "Die Beine sind lang.", example_en: "The legs are long.", example_ru: "Ноги длинные." }
  - { de: "Fuß", ipa: "ˈfuːs", pos: noun, gender: m, plural: "die Füße", en: "foot", ru: "нога; стопа", example_de: "Die Füße sind kalt.", example_en: "The feet are cold.", example_ru: "Ноги холодные.", note: { en: "Fuß is only the foot — the whole limb is das Bein.", ru: "Русское «нога» покрывает и Bein (нога целиком), и Fuß (стопа) — в немецком это разные слова." } }
  - { de: "Rücken", ipa: "ˈʁʏkn̩", pos: noun, gender: m, plural: "die Rücken", en: "back", ru: "спина", example_de: "Der Rücken ist stark.", example_en: "The back is strong.", example_ru: "Спина сильная." }
  - { de: "Haar", ipa: "ˈhaːɐ̯", pos: noun, gender: n, plural: "die Haare", en: "hair", ru: "волос; волосы", example_de: "Sie hat lange Haare.", example_en: "She has long hair.", example_ru: "У неё длинные волосы." }
  - { de: "Gesundheit", ipa: "gəˈzʊnthaɪ̯t", pos: noun, gender: f, plural: "—", en: "health", ru: "здоровье", example_de: "Die Gesundheit ist wichtig für alle.", example_en: "Health is important for everyone.", example_ru: "Здоровье важно для всех." }
  - { de: "Krankheit", ipa: "ˈkʁaŋkhaɪ̯t", pos: noun, gender: f, plural: "die Krankheiten", en: "illness; disease", ru: "болезнь", example_de: "Diese Krankheit ist nicht gefährlich.", example_en: "This illness is not dangerous.", example_ru: "Эта болезнь не опасна." }
  - { de: "Schmerzen", ipa: "ˈʃmɛʁtsn̩", pos: noun, gender: m, plural: "die Schmerzen", en: "pain", ru: "боль", example_de: "Ich habe Schmerzen im Rücken.", example_en: "I have pain in my back.", example_ru: "У меня болит спина.", note: { en: "Almost always used in the plural, even for pain in one place: Schmerzen im Rücken.", ru: "Почти всегда употребляется во множественном числе, даже если боль в одном месте: Schmerzen im Rücken." } }
  - { de: "Kopfschmerzen", ipa: "ˈkɔpfˌʃmɛʁtsn̩", pos: noun, gender: m, plural: "—", en: "headache", ru: "головная боль", example_de: "Ich habe Kopfschmerzen.", example_en: "I have a headache.", example_ru: "У меня болит голова.", note: { en: "Almost always used in the plural: Kopfschmerzen, not \"ein Kopfschmerz\".", ru: "Почти всегда употребляется во множественном числе: Kopfschmerzen, а не «ein Kopfschmerz»." } }
  - { de: "Fieber", ipa: "ˈfiːbɐ", pos: noun, gender: n, plural: "—", en: "fever", ru: "температура; жар", example_de: "Ich habe Fieber.", example_en: "I have a fever.", example_ru: "У меня температура." }
  - { de: "Grippe", ipa: "ˈgʁɪpə", pos: noun, gender: f, plural: "—", en: "flu", ru: "грипп", example_de: "Meine Schwester hat die Grippe.", example_en: "My sister has the flu.", example_ru: "Моя сестра болеет гриппом." }
  - { de: "Erkältung", ipa: "ɛɐ̯ˈkɛltʊŋ", pos: noun, gender: f, plural: "die Erkältungen", en: "cold", ru: "простуда", example_de: "Ich habe eine Erkältung.", example_en: "I have a cold.", example_ru: "У меня простуда." }
  - { de: "Medikament", ipa: "medikaˈmɛnt", pos: noun, gender: n, plural: "die Medikamente", en: "medicine; medication", ru: "лекарство", example_de: "Ich nehme jeden Tag ein Medikament.", example_en: "I take medicine every day.", example_ru: "Я принимаю лекарство каждый день." }
  - { de: "Tablette", ipa: "taˈblɛtə", pos: noun, gender: f, plural: "die Tabletten", en: "pill; tablet", ru: "таблетка", example_de: "Ich nehme eine Tablette.", example_en: "I take a pill.", example_ru: "Я принимаю таблетку." }
  - { de: "Krankenhaus", ipa: "ˈkʁaŋkn̩ˌhaʊ̯s", pos: noun, gender: n, plural: "die Krankenhäuser", en: "hospital", ru: "больница", example_de: "Das Krankenhaus ist in der Stadt.", example_en: "The hospital is in the city.", example_ru: "Больница находится в городе." }
  - { de: "Krankenkasse", ipa: "ˈkʁaŋkn̩ˌkasə", pos: noun, gender: f, plural: "die Krankenkassen", en: "health insurance fund", ru: "касса медицинского страхования", example_de: "Ich habe eine neue Krankenkasse.", example_en: "I have new health insurance.", example_ru: "У меня новая касса медицинского страхования.", note: { en: "Germany's (usually statutory) health insurance fund, not a literal cashbox — it pays your medical bills.", ru: "Не «касса» в бытовом смысле — это (обычно государственная) касса медицинского страхования, которая оплачивает лечение." } }
  - { de: "wehtun", ipa: "ˈveːˌtuːn", pos: verb, en: "to hurt", ru: "болеть (о части тела)", example_de: "Mein Kopf tut weh.", example_en: "My head hurts.", example_ru: "У меня болит голова.", partizip2: "wehgetan", aux: "haben", praesens_3sg: "tut weh", note: { en: "Separable: the prefix weh- goes to the end. Usually takes a dative person (mir tut der Kopf weh) — this example names only the body part.", ru: "Отделяемая приставка weh- уходит в конец. Обычно требует Dativ лица (mir tut der Kopf weh) — в этом примере дательный падеж не используется, назван только орган." } }
  - { de: "Doktor", ipa: "ˈdɔktoːɐ̯", pos: noun, gender: m, plural: "die Doktoren", en: "doctor", ru: "доктор; врач", example_de: "Ich gehe zum Doktor.", example_en: "I'm going to the doctor.", example_ru: "Я иду к врачу." }
