id: koerper-gesundheit
title_de: "Körper & Gesundheit"
title_en: "Body & health"
title_ru: "Тело и здоровье"
title_uk: "Тіло та здоров'я"
level: A1
entries:
  - { de: "Körper", ipa: "ˈkœʁpɐ", pos: noun, gender: m, plural: "die Körper", en: "body", ru: "тело", uk: "тіло", example_de: "Sport ist gut für den Körper.", example_en: "Sport is good for the body.", example_ru: "Спорт полезен для тела.", example_uk: "Спорт корисний для тіла." }
  - { de: "Kopf", ipa: "ˈkɔpf", pos: noun, gender: m, plural: "die Köpfe", en: "head", ru: "голова", uk: "голова", example_de: "Ich wasche meinen Kopf jeden Tag.", example_en: "I wash my head every day.", example_ru: "Я мою голову каждый день.", example_uk: "Я мию голову щодня." }
  - { de: "Auge", ipa: "ˈaʊ̯gə", pos: noun, gender: n, plural: "die Augen", en: "eye", ru: "глаз", uk: "око", example_de: "Ihre Augen sind blau.", example_en: "Her eyes are blue.", example_ru: "Её глаза голубые.", example_uk: "Її очі блакитні." }
  - { de: "Ohr", ipa: "ˈoːɐ̯", pos: noun, gender: n, plural: "die Ohren", en: "ear", ru: "ухо", uk: "вухо", example_de: "Die Ohren sind klein.", example_en: "The ears are small.", example_ru: "Уши маленькие.", example_uk: "Вуха маленькі." }
  - { de: "Nase", ipa: "ˈnaːzə", pos: noun, gender: f, plural: "die Nasen", en: "nose", ru: "нос", uk: "ніс", example_de: "Die Nase ist rot.", example_en: "The nose is red.", example_ru: "Нос красный.", example_uk: "Ніс червоний." }
  - { de: "Mund", ipa: "ˈmʊnt", pos: noun, gender: m, plural: "die Münder", en: "mouth", ru: "рот", uk: "рот", example_de: "Der Mund ist klein.", example_en: "The mouth is small.", example_ru: "Рот маленький.", example_uk: "Рот маленький." }
  - { de: "Zahn", ipa: "ˈtsaːn", pos: noun, gender: m, plural: "die Zähne", en: "tooth", ru: "зуб", uk: "зуб", example_de: "Ich putze meine Zähne.", example_en: "I brush my teeth.", example_ru: "Я чищу зубы.", example_uk: "Я чищу зуби." }
  - { de: "Hals", ipa: "ˈhals", pos: noun, gender: m, plural: "die Hälse", en: "neck; throat", ru: "шея; горло", uk: "шия; горло", example_de: "Der Hals ist lang.", example_en: "The neck is long.", example_ru: "Шея длинная.", example_uk: "Шия довга." }
  - { de: "Arm", ipa: "ˈaʁm", pos: noun, gender: m, plural: "die Arme", en: "arm", ru: "рука", uk: "рука", example_de: "Der Arm ist stark.", example_en: "The arm is strong.", example_ru: "Рука сильная.", example_uk: "Рука сильна." }
  - { de: "Hand", ipa: "ˈhant", pos: noun, gender: f, plural: "die Hände", en: "hand", ru: "рука; кисть", uk: "рука; кисть", example_de: "Ich wasche meine Hände vor dem Essen.", example_en: "I wash my hands before eating.", example_ru: "Я мою руки перед едой.", example_uk: "Я мию руки перед їжею.", note: { en: "Hand is only the part below the wrist — the whole limb is der Arm.", ru: "Русское «рука» покрывает и Arm (от плеча до кисти), и Hand (кисть) — в немецком это два разных слова.", uk: "Українське «рука» покриває і Arm (від плеча до кисті), і Hand (кисть) — у німецькій це два різні слова." } }
  - { de: "Finger", ipa: "ˈfɪŋɐ", pos: noun, gender: m, plural: "die Finger", en: "finger", ru: "палец (на руке)", uk: "палець (на руці)", example_de: "Ich habe zehn Finger.", example_en: "I have ten fingers.", example_ru: "У меня десять пальцев.", example_uk: "У мене десять пальців." }
  - { de: "Bauch", ipa: "ˈbaʊ̯x", pos: noun, gender: m, plural: "die Bäuche", en: "belly; stomach", ru: "живот", uk: "живіт", example_de: "Mein Bauch ist voll.", example_en: "My belly is full.", example_ru: "Мой живот полный.", example_uk: "Мій живіт повний." }
  - { de: "Bein", ipa: "ˈbaɪ̯n", pos: noun, gender: n, plural: "die Beine", en: "leg", ru: "нога", uk: "нога", example_de: "Die Beine sind lang.", example_en: "The legs are long.", example_ru: "Ноги длинные.", example_uk: "Ноги довгі." }
  - { de: "Fuß", ipa: "ˈfuːs", pos: noun, gender: m, plural: "die Füße", en: "foot", ru: "нога; стопа", uk: "нога; стопа", example_de: "Die Füße sind kalt.", example_en: "The feet are cold.", example_ru: "Ноги холодные.", example_uk: "Ноги холодні.", note: { en: "Fuß is only the foot — the whole limb is das Bein.", ru: "Русское «нога» покрывает и Bein (нога целиком), и Fuß (стопа) — в немецком это разные слова.", uk: "Українське «нога» покриває і Bein (ногу цілком), і Fuß (стопу) — у німецькій це різні слова." } }
  - { de: "Rücken", ipa: "ˈʁʏkn̩", pos: noun, gender: m, plural: "die Rücken", en: "back", ru: "спина", uk: "спина", example_de: "Der Rücken ist stark.", example_en: "The back is strong.", example_ru: "Спина сильная.", example_uk: "Спина сильна." }
  - { de: "Haar", ipa: "ˈhaːɐ̯", pos: noun, gender: n, plural: "die Haare", en: "hair", ru: "волос; волосы", uk: "волосина; волосся", example_de: "Sie hat lange Haare.", example_en: "She has long hair.", example_ru: "У неё длинные волосы.", example_uk: "У неї довге волосся." }
  - { de: "Gesundheit", ipa: "gəˈzʊnthaɪ̯t", pos: noun, gender: f, plural: "—", en: "health", ru: "здоровье", uk: "здоров'я", example_de: "Die Gesundheit ist wichtig für alle.", example_en: "Health is important for everyone.", example_ru: "Здоровье важно для всех.", example_uk: "Здоров'я важливе для всіх." }
  - { de: "Krankheit", ipa: "ˈkʁaŋkhaɪ̯t", pos: noun, gender: f, plural: "die Krankheiten", en: "illness; disease", ru: "болезнь", uk: "хвороба", example_de: "Diese Krankheit ist nicht gefährlich.", example_en: "This illness is not dangerous.", example_ru: "Эта болезнь не опасна.", example_uk: "Ця хвороба не небезпечна." }
  - { de: "Schmerzen", ipa: "ˈʃmɛʁtsn̩", pos: noun, gender: m, plural: "die Schmerzen", en: "pain", ru: "боль", uk: "біль", example_de: "Ich habe Schmerzen im Rücken.", example_en: "I have pain in my back.", example_ru: "У меня болит спина.", example_uk: "У мене болить спина.", note: { en: "Almost always used in the plural, even for pain in one place: Schmerzen im Rücken.", ru: "Почти всегда употребляется во множественном числе, даже если боль в одном месте: Schmerzen im Rücken.", uk: "Майже завжди вживається у множині, навіть якщо болить в одному місці: Schmerzen im Rücken." } }
  - { de: "Kopfschmerzen", ipa: "ˈkɔpfˌʃmɛʁtsn̩", pos: noun, gender: m, plural: "—", en: "headache", ru: "головная боль", uk: "головний біль", example_de: "Ich habe Kopfschmerzen.", example_en: "I have a headache.", example_ru: "У меня болит голова.", example_uk: "У мене болить голова.", note: { en: "Almost always used in the plural: Kopfschmerzen, not \"ein Kopfschmerz\".", ru: "Почти всегда употребляется во множественном числе: Kopfschmerzen, а не «ein Kopfschmerz».", uk: "Майже завжди вживається у множині: Kopfschmerzen, а не «ein Kopfschmerz»." } }
  - { de: "Fieber", ipa: "ˈfiːbɐ", pos: noun, gender: n, plural: "—", en: "fever", ru: "температура; жар", uk: "температура; жар", example_de: "Ich habe Fieber.", example_en: "I have a fever.", example_ru: "У меня температура.", example_uk: "У мене температура." }
  - { de: "Grippe", ipa: "ˈgʁɪpə", pos: noun, gender: f, plural: "—", en: "flu", ru: "грипп", uk: "грип", example_de: "Meine Schwester hat die Grippe.", example_en: "My sister has the flu.", example_ru: "Моя сестра болеет гриппом.", example_uk: "Моя сестра хворіє на грип." }
  - { de: "Erkältung", ipa: "ɛɐ̯ˈkɛltʊŋ", pos: noun, gender: f, plural: "die Erkältungen", en: "cold", ru: "простуда", uk: "застуда", example_de: "Ich habe eine Erkältung.", example_en: "I have a cold.", example_ru: "У меня простуда.", example_uk: "У мене застуда." }
  - { de: "Medikament", ipa: "medikaˈmɛnt", pos: noun, gender: n, plural: "die Medikamente", en: "medicine; medication", ru: "лекарство", uk: "ліки", example_de: "Ich nehme jeden Tag ein Medikament.", example_en: "I take medicine every day.", example_ru: "Я принимаю лекарство каждый день.", example_uk: "Я приймаю ліки щодня." }
  - { de: "Tablette", ipa: "taˈblɛtə", pos: noun, gender: f, plural: "die Tabletten", en: "pill; tablet", ru: "таблетка", uk: "таблетка", example_de: "Ich nehme eine Tablette.", example_en: "I take a pill.", example_ru: "Я принимаю таблетку.", example_uk: "Я приймаю таблетку." }
  - { de: "Krankenhaus", ipa: "ˈkʁaŋkn̩ˌhaʊ̯s", pos: noun, gender: n, plural: "die Krankenhäuser", en: "hospital", ru: "больница", uk: "лікарня", example_de: "Das Krankenhaus ist in der Stadt.", example_en: "The hospital is in the city.", example_ru: "Больница находится в городе.", example_uk: "Лікарня розташована в місті." }
  - { de: "Krankenkasse", ipa: "ˈkʁaŋkn̩ˌkasə", pos: noun, gender: f, plural: "die Krankenkassen", en: "health insurance fund", ru: "касса медицинского страхования", uk: "лікарняна каса (медичне страхування)", example_de: "Ich habe eine neue Krankenkasse.", example_en: "I have new health insurance.", example_ru: "У меня новая касса медицинского страхования.", example_uk: "У мене нова лікарняна каса.", note: { en: "Germany's (usually statutory) health insurance fund, not a literal cashbox — it pays your medical bills.", ru: "Не «касса» в бытовом смысле — это (обычно государственная) касса медицинского страхования, которая оплачивает лечение.", uk: "Не «каса» в побутовому сенсі — це (зазвичай державна) каса медичного страхування, яка оплачує лікування." } }
  - { de: "wehtun", ipa: "ˈveːˌtuːn", pos: verb, en: "to hurt", ru: "болеть (о части тела)", uk: "боліти (про частину тіла)", example_de: "Mein Kopf tut weh.", example_en: "My head hurts.", example_ru: "У меня болит голова.", example_uk: "У мене болить голова.", partizip2: "wehgetan", aux: "haben", praesens_3sg: "tut weh", note: { en: "Separable: the prefix weh- goes to the end. Usually takes a dative person (mir tut der Kopf weh) — this example names only the body part.", ru: "Отделяемая приставка weh- уходит в конец. Обычно требует Dativ лица (mir tut der Kopf weh) — в этом примере дательный падеж не используется, назван только орган.", uk: "Відокремлюваний префікс weh- іде в кінець. Зазвичай потребує Dativ особи (mir tut der Kopf weh) — у цьому прикладі давальний відмінок не вжито, названо лише орган." } }
  - { de: "Doktor", ipa: "ˈdɔktoːɐ̯", pos: noun, gender: m, plural: "die Doktoren", en: "doctor", ru: "доктор; врач", uk: "доктор; лікар", example_de: "Ich gehe zum Doktor.", example_en: "I'm going to the doctor.", example_ru: "Я иду к врачу.", example_uk: "Я йду до лікаря." }
