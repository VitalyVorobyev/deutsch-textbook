id: kleidung-farben
title_de: "Kleidung & Farben"
title_en: "Clothing & colours"
title_ru: "Одежда и цвета"
level: A1
entries:
  - { de: "Kleidung", ipa: "ˈklaɪ̯dʊŋ", pos: noun, gender: f, plural: "—", en: "clothing; clothes", ru: "одежда", example_de: "Die Kleidung ist neu.", example_en: "The clothing is new.", example_ru: "Одежда новая.", note: { en: "Uncountable in this sense, like English 'clothing' — no plural: die Kleidung, not die Kleidungen.", ru: "Собирательное существительное без множественного числа, как русское «одежда»: die Kleidung, не die Kleidungen." } }
  - { de: "Hemd", ipa: "ˈhɛmt", pos: noun, gender: n, plural: "die Hemden", en: "shirt", ru: "рубашка", example_de: "Das Hemd ist sauber.", example_en: "The shirt is clean.", example_ru: "Рубашка чистая." }
  - { de: "Hose", ipa: "ˈhoːzə", pos: noun, gender: f, plural: "die Hosen", en: "trousers; pants", ru: "брюки; штаны", example_de: "Die Hose ist lang.", example_en: "The trousers are long.", example_ru: "Брюки длинные.", note: { en: "Die Hose is grammatically singular in German even though English 'trousers' is plural: die Hose ist lang, not die Hosen sind lang.", ru: "Die Hose — существительное единственного числа в немецком, хотя по-русски «брюки» звучит во множественном числе: die Hose ist lang." } }
  - { de: "Rock", ipa: "ˈʁɔk", pos: noun, gender: m, plural: "die Röcke", en: "skirt", ru: "юбка", example_de: "Der Rock ist kurz.", example_en: "The skirt is short.", example_ru: "Юбка короткая." }
  - { de: "Kleid", ipa: "ˈklaɪ̯t", pos: noun, gender: n, plural: "die Kleider", en: "dress", ru: "платье", example_de: "Das Kleid ist schön.", example_en: "The dress is beautiful.", example_ru: "Платье красивое." }
  - { de: "Jacke", ipa: "ˈjakə", pos: noun, gender: f, plural: "die Jacken", en: "jacket", ru: "куртка", example_de: "Die Jacke ist warm.", example_en: "The jacket is warm.", example_ru: "Куртка тёплая." }
  - { de: "Mantel", ipa: "ˈmantl̩", pos: noun, gender: m, plural: "die Mäntel", en: "coat", ru: "пальто", example_de: "Der Mantel ist lang.", example_en: "The coat is long.", example_ru: "Пальто длинное." }
  - { de: "Pullover", ipa: "pʊˈloːvɐ", pos: noun, gender: m, plural: "die Pullover", en: "pullover; sweater", ru: "свитер", example_de: "Der Pullover ist weich.", example_en: "The sweater is soft.", example_ru: "Свитер мягкий." }
  - { de: "T-Shirt", ipa: "ˈtiːˌʃœːɐ̯t", pos: noun, gender: n, plural: "die T-Shirts", en: "T-shirt", ru: "футболка", example_de: "Das T-Shirt ist bequem.", example_en: "The T-shirt is comfortable.", example_ru: "Футболка удобная." }
  - { de: "Schuh", ipa: "ˈʃuː", pos: noun, gender: m, plural: "die Schuhe", en: "shoe", ru: "туфля; ботинок", example_de: "Der Schuh ist neu.", example_en: "The shoe is new.", example_ru: "Ботинок новый." }
  - { de: "Strumpf", ipa: "ˈʃtʁʊmpf", pos: noun, gender: m, plural: "die Strümpfe", en: "stocking; sock", ru: "чулок; носок", example_de: "Der Strumpf ist warm.", example_en: "The stocking is warm.", example_ru: "Чулок тёплый." }
  - { de: "Bluse", ipa: "ˈbluːzə", pos: noun, gender: f, plural: "die Blusen", en: "blouse", ru: "блузка", example_de: "Die Bluse ist schön.", example_en: "The blouse is beautiful.", example_ru: "Блузка красивая." }
  - { de: "Größe", ipa: "ˈgʁøːsə", pos: noun, gender: f, plural: "die Größen", en: "size", ru: "размер", example_de: "Welche Größe brauchst du?", example_en: "What size do you need?", example_ru: "Какой размер тебе нужен?" }
  - { de: "tragen", ipa: "ˈtʁaːgn̩", pos: verb, en: "to wear; to carry", ru: "носить", example_de: "Er trägt einen Mantel.", example_en: "He is wearing a coat.", example_ru: "Он носит пальто.", partizip2: "getragen", aux: haben, praesens_3sg: "trägt", valence: "+ Akk", note: { en: "Stem vowel change in the du/er forms: du trägst, er trägt (infinitive tragen).", ru: "Смена гласной в формах du/er: du trägst, er trägt (в инфинитиве — tragen)." } }
  - { de: "anziehen", ipa: "ˈanˌtsiːən", pos: verb, en: "to put on (clothing)", ru: "надевать", example_de: "Ich ziehe die Jacke an.", example_en: "I put on the jacket.", example_ru: "Я надеваю куртку.", partizip2: "angezogen", aux: haben, praesens_3sg: "zieht an", valence: "+ Akk", note: { en: "Separable verb: the prefix an- splits off and goes to the end of the clause — ich ziehe … an, not ich anziehe.", ru: "Глагол с отделяемой приставкой: an- отделяется и уходит в конец предложения — ich ziehe … an, а не ich anziehe." } }
  - { de: "ausziehen", ipa: "ˈaʊ̯sˌtsiːən", pos: verb, en: "to take off (clothing)", ru: "снимать", example_de: "Ich ziehe die Schuhe aus.", example_en: "I take off my shoes.", example_ru: "Я снимаю ботинки.", partizip2: "ausgezogen", aux: haben, praesens_3sg: "zieht aus", valence: "+ Akk", note: { en: "Separable verb, like anziehen: the prefix aus- goes to the end of the clause — ich ziehe … aus.", ru: "Тоже глагол с отделяемой приставкой: aus- уходит в конец предложения — ich ziehe … aus." } }
  - { de: "Farbe", ipa: "ˈfaʁbə", pos: noun, gender: f, plural: "die Farben", en: "colour", ru: "цвет", example_de: "Welche Farbe hat die Jacke?", example_en: "What colour is the jacket?", example_ru: "Какого цвета куртка?" }
  - { de: "blau", ipa: "ˈblaʊ̯", pos: adj, en: "blue", ru: "синий; голубой", example_de: "Die Hose ist blau.", example_en: "The trousers are blue.", example_ru: "Брюки синие." }
  - { de: "braun", ipa: "ˈbʁaʊ̯n", pos: adj, en: "brown", ru: "коричневый", example_de: "Der Mantel ist braun.", example_en: "The coat is brown.", example_ru: "Пальто коричневое." }
  - { de: "gelb", ipa: "ˈgɛlp", pos: adj, en: "yellow", ru: "жёлтый", example_de: "Das Kleid ist gelb.", example_en: "The dress is yellow.", example_ru: "Платье жёлтое." }
  - { de: "grau", ipa: "ˈgʁaʊ̯", pos: adj, en: "grey", ru: "серый", example_de: "Der Rock ist grau.", example_en: "The skirt is grey.", example_ru: "Юбка серая." }
  - { de: "grün", ipa: "ˈgʁyːn", pos: adj, en: "green", ru: "зелёный", example_de: "Die Bluse ist grün.", example_en: "The blouse is green.", example_ru: "Блузка зелёная." }
  - { de: "rot", ipa: "ˈʁoːt", pos: adj, en: "red", ru: "красный", example_de: "Das Hemd ist rot.", example_en: "The shirt is red.", example_ru: "Рубашка красная." }
  - { de: "schwarz", ipa: "ˈʃvaʁts", pos: adj, en: "black", ru: "чёрный", example_de: "Der Schuh ist schwarz.", example_en: "The shoe is black.", example_ru: "Ботинок чёрный." }
  - { de: "weiß", ipa: "ˈvaɪ̯s", pos: adj, en: "white", ru: "белый", example_de: "Der Pullover ist weiß.", example_en: "The sweater is white.", example_ru: "Свитер белый." }
  - { de: "modern", ipa: "moˈdɛʁn", pos: adj, en: "modern", ru: "современный", example_de: "Die Kleidung ist modern.", example_en: "The clothing is modern.", example_ru: "Одежда современная." }
