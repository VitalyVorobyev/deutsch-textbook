id: wohnen-umzug
title_de: "Wohnen & Umzug"
title_en: "Housing & moving"
title_ru: "Жильё и переезд"
level: A2
entries:
  - de: "Umzug"
    ipa: "ˈʊmˌtsuːk"
    pos: noun
    gender: m
    plural: "die Umzüge"
    en: "move (into a new home)"
    ru: "переезд"
    example_de: "Der Umzug ist am Samstag."
    example_en: "The move is on Saturday."
    example_ru: "Переезд в субботу."

  - de: "einziehen"
    ipa: "ˈaɪ̯nˌtsiːən"
    pos: verb
    partizip2: "eingezogen"
    aux: sein
    praesens_3sg: "zieht ein"
    en: "to move in"
    ru: "въезжать; вселяться"
    example_de: "Nina zieht am Samstag in die Wohnung ein."
    example_en: "Nina is moving into the flat on Saturday."
    example_ru: "Нина въезжает в квартиру в субботу."
    note:
      en: "Separable: the prefix ein- goes to the end of the clause, and the Perfekt takes sein — Nina ist eingezogen."
      ru: "Отделяемый глагол: приставка ein- уходит в конец предложения, а Perfekt строится с sein — Nina ist eingezogen."

  - de: "Vermieter"
    ipa: "fɛɐ̯ˈmiːtɐ"
    pos: noun
    gender: m
    plural: "die Vermieter"
    en: "landlord"
    ru: "арендодатель; хозяин квартиры"
    example_de: "Der Vermieter heißt Herr Weber."
    example_en: "The landlord's name is Mr Weber."
    example_ru: "Арендодателя зовут господин Вебер."

  - de: "Nachbar"
    ipa: "ˈnaxbaːɐ̯"
    pos: noun
    gender: m
    plural: "die Nachbarn"
    en: "neighbour"
    ru: "сосед"
    example_de: "Der Nachbar wohnt im Erdgeschoss."
    example_en: "The neighbour lives on the ground floor."
    example_ru: "Сосед живёт на первом этаже."
    note:
      en: "Nachbar adds -n in every case except the nominative singular: den Nachbarn, dem Nachbarn, die Nachbarn."
      ru: "Nachbar получает -n во всех падежах, кроме именительного единственного числа: den Nachbarn, dem Nachbarn, die Nachbarn."

  - de: "Nachbarin"
    ipa: "ˈnaxbaːʁɪn"
    pos: noun
    gender: f
    plural: "die Nachbarinnen"
    en: "neighbour (female)"
    ru: "соседка"
    example_de: "Die Nachbarin heißt Frau Kern."
    example_en: "The neighbour's name is Mrs Kern."
    example_ru: "Соседку зовут госпожа Керн."

  - de: "Kaution"
    ipa: "kaʊ̯ˈtsi̯oːn"
    pos: noun
    gender: f
    plural: "die Kautionen"
    en: "deposit (paid to the landlord)"
    ru: "залог (за квартиру)"
    example_de: "Die Kaution ist hoch: zwei Monatsmieten."
    example_en: "The deposit is high: two months' rent."
    example_ru: "Залог большой: две месячные аренды."
    note:
      en: "You pay it before you move in and get it back when you leave the flat in good condition."
      ru: "Залог платят до въезда и получают обратно при выезде, если квартира в порядке."

  - de: "Nebenkosten"
    ipa: "ˈneːbn̩ˌkɔstn̩"
    pos: phrase
    en: "utility costs (on top of the rent)"
    ru: "коммунальные платежи (сверх аренды)"
    example_de: "Die Miete kostet 620 Euro plus Nebenkosten."
    example_en: "The rent is 620 euros plus utility costs."
    example_ru: "Аренда стоит 620 евро плюс коммунальные платежи."
    note:
      en: "Always plural. It covers heating, water and rubbish collection — a listing that says 'plus NK' means these are not included."
      ru: "Всегда во множественном числе. Сюда входят отопление, вода и вывоз мусора — если в объявлении стоит «plus NK», это значит, что они не включены в аренду."

  - de: "Möbel"
    ipa: "ˈmøːbl̩"
    pos: phrase
    en: "furniture"
    ru: "мебель"
    example_de: "Die Möbel stehen noch im Flur."
    example_en: "The furniture is still standing in the hallway."
    example_ru: "Мебель всё ещё стоит в прихожей."
    note:
      en: "German counts furniture: die Möbel is plural and takes a plural verb — die Möbel sind neu."
      ru: "В немецком мебель исчисляема: die Möbel — множественное число и требует глагола во множественном: die Möbel sind neu (а не «мебель новая» в единственном)."

  - de: "Regal"
    ipa: "ʁeˈgaːl"
    pos: noun
    gender: n
    plural: "die Regale"
    en: "shelf; shelving unit"
    ru: "полка; стеллаж"
    example_de: "Das Regal steht neben dem Fenster."
    example_en: "The shelf stands next to the window."
    example_ru: "Стеллаж стоит рядом с окном."

  - de: "Teppich"
    ipa: "ˈtɛpɪç"
    pos: noun
    gender: m
    plural: "die Teppiche"
    en: "carpet; rug"
    ru: "ковёр"
    example_de: "Der Teppich liegt vor dem Sofa."
    example_en: "The carpet lies in front of the sofa."
    example_ru: "Ковёр лежит перед диваном."

  - de: "Bild"
    ipa: "ˈbɪlt"
    pos: noun
    gender: n
    plural: "die Bilder"
    en: "picture"
    ru: "картина; фотография"
    example_de: "Das Bild hängt über dem Sofa."
    example_en: "The picture hangs above the sofa."
    example_ru: "Картина висит над диваном."

  - de: "Wand"
    ipa: "ˈvant"
    pos: noun
    gender: f
    plural: "die Wände"
    en: "wall (inside a room)"
    ru: "стена (внутри помещения)"
    example_de: "Nina hängt das Bild an die Wand."
    example_en: "Nina hangs the picture on the wall."
    example_ru: "Нина вешает картину на стену."

  - de: "Kiste"
    ipa: "ˈkɪstə"
    pos: noun
    gender: f
    plural: "die Kisten"
    en: "box; crate"
    ru: "коробка; ящик"
    example_de: "Die Kiste steht im Flur."
    example_en: "The box is standing in the hallway."
    example_ru: "Коробка стоит в прихожей."

  - de: "hängen"
    ipa: "ˈhɛŋən"
    pos: verb
    partizip2: "gehängt"
    aux: haben
    praesens_3sg: "hängt"
    valence: "+ Akk"
    en: "to hang (something up)"
    ru: "вешать (что-либо)"
    example_de: "Tobias hängt die Lampe über den Tisch."
    example_en: "Tobias hangs the lamp above the table."
    example_ru: "Тобиас вешает лампу над столом."
    note:
      en: "hängen is two verbs in one shape. With an object it means 'hang something up' and answers Wohin? (an die Wand, Partizip II gehängt). Without an object it means 'be hanging' and answers Wo? (an der Wand, Partizip II gehangen)."
      ru: "hängen — это два глагола с одинаковой формой. С дополнением это «вешать»: отвечает на Wohin? (an die Wand, Partizip II — gehängt). Без дополнения — «висеть»: отвечает на Wo? (an der Wand, Partizip II — gehangen)."

  - de: "Keller"
    ipa: "ˈkɛlɐ"
    pos: noun
    gender: m
    plural: "die Keller"
    en: "cellar; basement"
    ru: "подвал"
    example_de: "Im Keller ist es kalt."
    example_en: "It is cold in the cellar."
    example_ru: "В подвале холодно."

  - de: "Treppe"
    ipa: "ˈtʁɛpə"
    pos: noun
    gender: f
    plural: "die Treppen"
    en: "stairs; staircase"
    ru: "лестница"
    example_de: "Die Treppe ist dunkel."
    example_en: "The staircase is dark."
    example_ru: "Лестница тёмная."

  - de: "Aufzug"
    ipa: "ˈaʊ̯fˌtsuːk"
    pos: noun
    gender: m
    plural: "die Aufzüge"
    en: "lift; elevator"
    ru: "лифт"
    example_de: "Im Haus gibt es keinen Aufzug."
    example_en: "There is no lift in the building."
    example_ru: "В доме нет лифта."

  - de: "Erdgeschoss"
    ipa: "ˈeːɐ̯tgəˌʃɔs"
    pos: noun
    gender: n
    plural: "die Erdgeschosse"
    en: "ground floor"
    ru: "первый этаж (уровень земли)"
    example_de: "Frau Kern wohnt im Erdgeschoss."
    example_en: "Mrs Kern lives on the ground floor."
    example_ru: "Госпожа Керн живёт на первом этаже."
    note:
      en: "German counts floors from the one above street level: das Erdgeschoss is the street-level floor, and the floor above it is der erste Stock."
      ru: "Немцы считают этажи не так, как в России: уровень земли — das Erdgeschoss, а следующий этаж (наш второй) — der erste Stock."

  - de: "Reparatur"
    ipa: "ʁepaʁaˈtuːɐ̯"
    pos: noun
    gender: f
    plural: "die Reparaturen"
    en: "repair"
    ru: "ремонт (починка)"
    example_de: "Der Vermieter bezahlt die Reparatur."
    example_en: "The landlord pays for the repair."
    example_ru: "Арендодатель оплачивает ремонт."

  - de: "renovieren"
    ipa: "ʁenoˈviːʁən"
    pos: verb
    partizip2: "renoviert"
    aux: haben
    praesens_3sg: "renoviert"
    valence: "+ Akk"
    en: "to renovate; to redecorate"
    ru: "делать ремонт; обновлять"
    example_de: "Herr Weber hat die Küche renoviert."
    example_en: "Mr Weber has renovated the kitchen."
    example_ru: "Господин Вебер сделал ремонт на кухне."
    note:
      en: "Verbs in -ieren build their Partizip II without ge-: renoviert, not gerenoviert."
      ru: "Глаголы на -ieren образуют Partizip II без ge-: renoviert, а не gerenoviert."

  - de: "Ruhe"
    ipa: "ˈʁuːə"
    pos: noun
    gender: f
    plural: "—"
    en: "quiet; peace"
    ru: "тишина; покой"
    example_de: "Nach zweiundzwanzig Uhr ist Ruhe im Haus."
    example_en: "After ten p.m. there is quiet in the building."
    example_ru: "После двадцати двух часов в доме тишина."
    note:
      en: "German house rules protect the Ruhe: no loud music or drilling at night or on Sundays."
      ru: "Правила немецкого дома охраняют Ruhe: ночью и по воскресеньям нельзя шуметь, сверлить и громко слушать музыку."

  - de: "im dritten Stock"
    ipa: "ɪm ˈdʁɪtn̩ ˈʃtɔk"
    pos: phrase
    en: "on the third floor"
    ru: "на третьем этаже (по немецкому счёту)"
    example_de: "Die Wohnung liegt im dritten Stock."
    example_en: "The flat is on the third floor."
    example_ru: "Квартира находится на третьем этаже."
    note:
      en: "Learn the whole phrase as a chunk: im ersten / zweiten / dritten Stock. It answers Wo?, so the preposition in takes the dative — im."
      ru: "Учите оборот целиком: im ersten / zweiten / dritten Stock. Он отвечает на вопрос Wo?, поэтому предлог in требует Dativ — im."

  - de: "Wie hoch ist die Miete?"
    pos: phrase
    en: "How much is the rent?"
    ru: "Какая арендная плата?"
    example_de: "Guten Tag! Wie hoch ist die Miete?"
    example_en: "Hello! How much is the rent?"
    example_ru: "Здравствуйте! Какая здесь арендная плата?"
    note:
      en: "German asks 'how high' a price is, not 'how much': Wie hoch ist die Miete? — 620 Euro plus Nebenkosten."
      ru: "О цене по-немецки спрашивают «как высока», а не «сколько»: Wie hoch ist die Miete? — 620 Euro plus Nebenkosten."

  - de: "Könnten Sie bitte die Heizung reparieren?"
    pos: phrase
    en: "Could you please repair the heating?"
    ru: "Не могли бы вы починить отопление?"
    example_de: "Guten Tag, Herr Weber. Die Heizung ist kaputt. Könnten Sie bitte die Heizung reparieren?"
    example_en: "Good afternoon, Mr Weber. The heating is broken. Could you please repair the heating?"
    example_ru: "Добрый день, господин Вебер. Отопление сломалось. Не могли бы вы починить отопление?"
    note:
      en: "Könnten Sie bitte …? is the polite request formula — learn it as a chunk and put any infinitive at the end: Könnten Sie bitte den Aufzug reparieren?"
      ru: "Könnten Sie bitte …? — формула вежливой просьбы. Учите её как готовый оборот и ставьте любой инфинитив в конец: Könnten Sie bitte den Aufzug reparieren?"
