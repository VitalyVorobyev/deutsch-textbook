# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the concrete nouns of
# the alltag-handlungen manifest section.
id: dinge-sachen-a2
title_de: "Dinge & Sachen"
title_en: "Things & objects"
title_ru: "Вещи и предметы"
title_uk: "Речі та предмети"
level: A2
entries:
  - de: "Zettel"
    ipa: "ˈtsɛtl̩"
    pos: noun
    gender: m
    plural: "die Zettel"
    en: "note; slip of paper"
    ru: "записка; листок бумаги"
    uk: "записка; папірець"
    example_de: "Ich schreibe dir einen Zettel und lege ihn auf den Tisch."
    example_en: "I will write you a note and leave it on the table."
    example_ru: "Я напишу тебе записку и положу её на стол."
    example_uk: "Я напишу тобі записку й покладу її на стіл."
    note:
      en: "A Zettel is a small loose piece of paper — the note on the fridge, the shopping list, the slip pinned to a door. The message itself, however it is sent, is die Nachricht."
      ru: "Zettel — небольшой отдельный листок: записка на холодильнике, список покупок, объявление на двери. Само сообщение, независимо от носителя, — это die Nachricht."
      uk: "Zettel — невеликий окремий папірець: записка на холодильнику, список покупок, оголошення на дверях. Саме повідомлення, незалежно від носія, — це die Nachricht."

  - de: "Schere"
    ipa: "ˈʃeːʁə"
    pos: noun
    gender: f
    plural: "die Scheren"
    en: "scissors (one pair)"
    ru: "ножницы (одни)"
    uk: "ножиці (одні)"
    example_de: "Kannst du mir bitte die Schere geben?"
    example_en: "Could you pass me the scissors, please?"
    example_ru: "Можешь дать мне ножницы, пожалуйста?"
    example_uk: "Можеш дати мені ножиці, будь ласка?"
    note:
      en: "One pair of scissors is one Schere — a singular noun with a singular verb: Die Schere ist scharf. English counts the two blades and says \"scissors\"; German counts the object. Two pairs are zwei Scheren."
      ru: "Одни ножницы по-немецки — die Schere, единственное число и глагол в единственном: Die Schere ist scharf. Русское «ножницы» стоит во множественном, немецкое слово — нет. Две штуки — zwei Scheren."
      uk: "Одні ножиці німецькою — die Schere, однина й дієслово в однині: Die Schere ist scharf. Українське «ножиці» стоїть у множині, а німецьке слово — ні. Дві штуки — zwei Scheren."

  # Plural-only in this sense, so it is declared like Beschwerden, Eltern and Ferien:
  # pos: phrase, no gender and no plural. As a noun it would have to declare a plural
  # that merely repeats itself (plural: "die Papiere"), and the EN/RU→DE production
  # card — which demands the article for a noun — would ask for one for a word that has
  # no singular to take it.
  - de: "Papiere"
    ipa: "paˈpiːʁə"
    pos: phrase
    en: "papers; identity documents"
    ru: "документы (удостоверяющие личность)"
    uk: "документи (що посвідчують особу)"
    example_de: "Bitte zeigen Sie mir Ihre Papiere."
    example_en: "Please show me your documents."
    example_ru: "Пожалуйста, покажите мне ваши документы."
    example_uk: "Будь ласка, покажіть мені ваші документи."
    note:
      en: "In the sense of documents — passport, residence permit, insurance card — the word is always plural: Meine Papiere sind in der Tasche. The singular das Papier is the material you write on."
      ru: "В значении «документы» — паспорт, вид на жительство, страховой полис — слово всегда во множественном числе: Meine Papiere sind in der Tasche. Единственное число das Papier — это бумага как материал."
      uk: "У значенні «документи» — паспорт, посвідка на проживання, страховий поліс — слово завжди у множині: Meine Papiere sind in der Tasche. Однина das Papier — це папір як матеріал."

  - de: "Ring"
    ipa: "ˈʁɪŋ"
    pos: noun
    gender: m
    plural: "die Ringe"
    en: "ring"
    ru: "кольцо"
    uk: "перстень, каблучка"
    example_de: "Zum Geburtstag bekommt sie einen Ring von ihrem Mann."
    example_en: "For her birthday she is getting a ring from her husband."
    example_ru: "На день рождения муж дарит ей кольцо."
    example_uk: "На день народження чоловік дарує їй каблучку."

  - de: "Kette"
    ipa: "ˈkɛtə"
    pos: noun
    gender: f
    plural: "die Ketten"
    en: "necklace; chain"
    ru: "цепочка; цепь"
    uk: "ланцюжок; ланцюг"
    example_de: "Die Kette aus Silber gefällt mir sehr gut."
    example_en: "I like the silver necklace very much."
    example_ru: "Серебряная цепочка мне очень нравится."
    example_uk: "Срібний ланцюжок мені дуже подобається."
    note:
      en: "The same word does both jobs: the piece of jewellery around the neck (often die Halskette) and a real chain, for instance on a bicycle. What it is made of is added with aus: eine Kette aus Gold."
      ru: "Одно слово на две работы: украшение на шее (часто die Halskette) и настоящая цепь, например велосипедная. Материал добавляется через aus: eine Kette aus Gold."
      uk: "Одне слово на дві роботи: прикраса на шиї (часто die Halskette) і справжній ланцюг, наприклад велосипедний. Матеріал додається через aus: eine Kette aus Gold."

  - de: "Schirm"
    ipa: "ˈʃɪʁm"
    pos: noun
    gender: m
    plural: "die Schirme"
    en: "umbrella"
    ru: "зонт"
    uk: "парасолька"
    example_de: "Nimm einen Schirm mit, es regnet gleich."
    example_en: "Take an umbrella with you, it is going to rain any minute."
    example_ru: "Возьми зонт, сейчас пойдёт дождь."
    example_uk: "Візьми парасольку, зараз піде дощ."
    note:
      en: "Short for der Regenschirm, and the form people actually say. The one you put up on the beach is der Sonnenschirm."
      ru: "Сокращение от der Regenschirm — именно так говорят в быту. Пляжный зонт от солнца — der Sonnenschirm."
      uk: "Скорочення від der Regenschirm — саме так кажуть у побуті. Пляжна парасоля від сонця — der Sonnenschirm."

  - de: "Ding"
    ipa: "ˈdɪŋ"
    pos: noun
    gender: n
    plural: "die Dinge"
    en: "thing (abstract or unnamed)"
    ru: "вещь; штука (о чём-то неопределённом)"
    uk: "річ; штука (про щось невизначене)"
    example_de: "Über solche Dinge spreche ich nicht gern."
    example_en: "I do not like talking about things like that."
    example_ru: "О таких вещах я не люблю говорить."
    example_uk: "Про такі речі я не люблю говорити."
    note:
      en: "Ding is the vaguer of the two words for \"thing\": matters and questions in general (die wichtigen Dinge im Leben), or an object whose name escapes you (Was ist das für ein Ding?). Your belongings are never Dinge — those are Sachen."
      ru: "Ding — более отвлечённое из двух слов для «вещи»: дела и вопросы вообще (die wichtigen Dinge im Leben) или предмет, названия которого вы не знаете (Was ist das für ein Ding?). Личные вещи так не называют — для них есть Sachen."
      uk: "Ding — більш абстрактне з двох слів для «речі»: справи й питання загалом (die wichtigen Dinge im Leben) або предмет, назви якого ви не знаєте (Was ist das für ein Ding?). Особисті речі так не називають — для них є Sachen."

  - de: "Sache"
    ipa: "ˈzaxə"
    pos: noun
    gender: f
    plural: "die Sachen"
    en: "thing; matter (plural: belongings, stuff)"
    ru: "вещь; дело (мн. ч.: вещи, пожитки)"
    uk: "річ; справа (мн.: речі, манатки)"
    example_de: "Meine Sachen liegen noch im Auto."
    example_en: "My things are still in the car."
    example_ru: "Мои вещи ещё в машине."
    example_uk: "Мої речі ще в машині."
    note:
      en: "Sache is the everyday word. In the plural it means the concrete things you own or carry: Nimm deine Sachen mit! In the singular it means an affair or a matter: Das ist meine Sache. The vaguer, more abstract partner word is Ding."
      ru: "Sache — обиходное слово. Во множественном числе это конкретные вещи, которые у вас с собой или дома: Nimm deine Sachen mit! В единственном — «дело»: Das ist meine Sache. Более отвлечённая пара к нему — Ding."
      uk: "Sache — звичне слово. У множині це конкретні речі, які у вас із собою чи вдома: Nimm deine Sachen mit! В однині — «справа»: Das ist meine Sache. Більш абстрактна пара до нього — Ding."

  - de: "Situation"
    ipa: "zituaˈtsi̯oːn"
    pos: noun
    gender: f
    plural: "die Situationen"
    en: "situation"
    ru: "ситуация; положение"
    uk: "ситуація; становище"
    example_de: "In dieser Situation kann ich dir leider nicht helfen."
    example_en: "In this situation I unfortunately cannot help you."
    example_ru: "В этой ситуации я, к сожалению, не могу тебе помочь."
    example_uk: "У цій ситуації я, на жаль, не можу тобі допомогти."
    note:
      en: "Like every noun ending in -tion, it is feminine, stressed on the last syllable, and forms its plural with -en: die Situation — die Situationen, and likewise die Information, die Station."
      ru: "Как все существительные на -tion, слово женского рода, с ударением на последнем слоге и множественным на -en: die Situation — die Situationen; так же die Information, die Station."
      uk: "Як усі іменники на -tion, слово жіночого роду, з наголосом на останньому складі й множиною на -en: die Situation — die Situationen; так само die Information, die Station."

  - de: "Produkt"
    ipa: "pʁoˈdʊkt"
    pos: noun
    gender: n
    plural: "die Produkte"
    en: "product"
    ru: "продукт; товар; изделие"
    uk: "продукт; товар; виріб"
    example_de: "Dieses Produkt ist heute im Angebot."
    example_en: "This product is on special offer today."
    example_ru: "Этот товар сегодня по акции."
    example_uk: "Цей товар сьогодні за акцією."
    note:
      en: "Produkt is what a company makes and a shop sells — a thing in a range, not food specifically. For groceries in the trolley say Lebensmittel."
      ru: "Produkt — то, что производит фирма и продаёт магазин: товар в ассортименте, а не еда как таковая. Продукты питания в тележке — это Lebensmittel."
      uk: "Produkt — те, що виробляє фірма й продає магазин: товар в асортименті, а не їжа як така. Продукти харчування у візку — це Lebensmittel."

  - de: "Unterschied"
    ipa: "ˈʊntɐˌʃiːt"
    pos: noun
    gender: m
    plural: "die Unterschiede"
    en: "difference"
    ru: "разница; различие"
    uk: "різниця; відмінність"
    example_de: "Was ist der Unterschied zwischen diesen zwei Handys?"
    example_en: "What is the difference between these two phones?"
    example_ru: "В чём разница между этими двумя телефонами?"
    example_uk: "У чому різниця між цими двома телефонами?"
    note:
      en: "The frame is der Unterschied zwischen A und B, and zwischen takes the Dativ: der Unterschied zwischen dem Bus und der Bahn. To say it does not matter: Das macht keinen Unterschied."
      ru: "Готовая рамка — der Unterschied zwischen A und B, причём zwischen требует Dativ: der Unterschied zwischen dem Bus und der Bahn. «Это неважно» — Das macht keinen Unterschied."
      uk: "Готова рамка — der Unterschied zwischen A und B, причому zwischen вимагає Dativ: der Unterschied zwischen dem Bus und der Bahn. «Це неважливо» — Das macht keinen Unterschied."

  - de: "Gegenteil"
    ipa: "ˈgeːgn̩ˌtaɪ̯l"
    pos: noun
    gender: n
    plural: "die Gegenteile"
    en: "opposite"
    ru: "противоположность"
    uk: "протилежність"
    example_de: "Kalt ist das Gegenteil von warm."
    example_en: "Cold is the opposite of warm."
    example_ru: "Холодный — противоположность тёплому."
    example_uk: "Холодний — протилежність теплому."
    note:
      en: "The frame is das Gegenteil von + Dativ: das Gegenteil von teuer. On its own, Im Gegenteil! contradicts what was just said — \"On the contrary!\""
      ru: "Рамка — das Gegenteil von + Dativ: das Gegenteil von teuer. Отдельной репликой Im Gegenteil! опровергает только что сказанное — «Наоборот!»."
      uk: "Рамка — das Gegenteil von + Dativ: das Gegenteil von teuer. Окремою реплікою Im Gegenteil! спростовує щойно сказане — «Навпаки!»."

  - de: "Mittel"
    ipa: "ˈmɪtl̩"
    pos: noun
    gender: n
    plural: "die Mittel"
    en: "remedy; means"
    ru: "средство"
    uk: "засіб"
    example_de: "Haben Sie ein Mittel gegen Husten?"
    example_en: "Do you have something for a cough?"
    example_ru: "У вас есть средство от кашля?"
    example_uk: "У вас є засіб від кашлю?"
    note:
      en: "In the pharmacy the frame is ein Mittel gegen + Akkusativ: ein Mittel gegen Kopfschmerzen, ein Mittel gegen Fieber. More widely it is a means to an end — Das Auto ist kein Mittel, es ist ein Problem."
      ru: "В аптеке работает рамка ein Mittel gegen + Akkusativ: ein Mittel gegen Kopfschmerzen, ein Mittel gegen Fieber. Шире — «средство» для достижения цели: Das Fahrrad ist ein gutes Mittel gegen Stress."
      uk: "В аптеці працює рамка ein Mittel gegen + Akkusativ: ein Mittel gegen Kopfschmerzen, ein Mittel gegen Fieber. Ширше — «засіб» для досягнення мети: Das Fahrrad ist ein gutes Mittel gegen Stress."

  - de: "Apparat"
    ipa: "apaˈʁaːt"
    pos: noun
    gender: m
    plural: "die Apparate"
    en: "device; apparatus"
    ru: "аппарат; прибор"
    uk: "апарат; прилад"
    example_de: "Dieser Apparat ist sehr alt, aber er funktioniert noch."
    example_en: "This device is very old, but it still works."
    example_ru: "Этот прибор очень старый, но он ещё работает."
    example_uk: "Цей прилад дуже старий, але він ще працює."
    note:
      en: "An Apparat is a smallish technical device you operate — a measuring instrument, an old telephone. A Maschine is bigger and does the work for you. On the phone the fixed line is Am Apparat! (\"Speaking!\") and Bleiben Sie bitte am Apparat (\"Please hold\")."
      ru: "Apparat — сравнительно небольшой технический прибор, которым управляют: измерительный аппарат, старый телефон. Maschine — крупнее и работает за вас. По телефону есть готовые формулы: Am Apparat! («У аппарата!») и Bleiben Sie bitte am Apparat («Не кладите трубку»)."
      uk: "Apparat — порівняно невеликий технічний прилад, яким керують: вимірювальний апарат, старий телефон. Maschine — більша й працює за вас. По телефону є готові формули: Am Apparat! («Біля апарата!») і Bleiben Sie bitte am Apparat («Не кладіть слухавку»)."

  - de: "Maschine"
    ipa: "maˈʃiːnə"
    pos: noun
    gender: f
    plural: "die Maschinen"
    en: "machine"
    ru: "машина (станок, механизм)"
    uk: "машина (верстат, механізм)"
    example_de: "Die Maschine in der Fabrik läuft den ganzen Tag."
    example_en: "The machine in the factory runs all day long."
    example_ru: "Станок на фабрике работает целый день."
    example_uk: "Верстат на фабриці працює цілий день."
    note:
      en: "A Maschine does physical work: die Waschmaschine, die Spülmaschine, the machines on a factory floor. A small instrument you handle yourself is rather ein Apparat. A car is never a Maschine — that is das Auto."
      ru: "Maschine выполняет физическую работу: die Waschmaschine, die Spülmaschine, станки на заводе. Небольшой прибор в руках — скорее ein Apparat. И главное: автомобиль по-немецки никогда не Maschine, а das Auto — русское «машина» здесь сбивает с толку."
      uk: "Maschine виконує фізичну роботу: die Waschmaschine, die Spülmaschine, верстати на заводі. Невеликий прилад у руках — радше ein Apparat. І головне: автомобіль німецькою ніколи не Maschine, а das Auto — українське «машина» тут збиває з пантелику."

  - de: "Seite"
    ipa: "ˈzaɪ̯tə"
    pos: noun
    gender: f
    plural: "die Seiten"
    en: "page; side"
    ru: "страница; сторона"
    uk: "сторінка; бік"
    example_de: "Die Antwort steht auf Seite zwölf."
    example_en: "The answer is on page twelve."
    example_ru: "Ответ на двенадцатой странице."
    example_uk: "Відповідь на дванадцятій сторінці."
    note:
      en: "Three everyday senses, all the same word: a page of a book (auf Seite zwölf), a side (auf der linken Seite, auf der anderen Seite der Straße), and a page on the internet — die Webseite, die Internetseite."
      ru: "Три обиходных значения у одного слова: страница книги (auf Seite zwölf), сторона (auf der linken Seite, auf der anderen Seite der Straße) и страница в интернете — die Webseite, die Internetseite."
      uk: "Три звичні значення в одного слова: сторінка книжки (auf Seite zwölf), бік (auf der linken Seite, auf der anderen Seite der Straße) і сторінка в інтернеті — die Webseite, die Internetseite."

  - de: "Mütze"
    ipa: "ˈmʏtsə"
    pos: noun
    gender: f
    plural: "die Mützen"
    en: "cap; woolly hat"
    ru: "шапка"
    uk: "шапка"
    example_de: "Im Winter trage ich immer eine warme Mütze."
    example_en: "In winter I always wear a warm hat."
    example_ru: "Зимой я всегда ношу тёплую шапку."
    example_uk: "Узимку я завжди ношу теплу шапку."
    note:
      en: "A Mütze is soft and has no brim — the knitted hat you pull on in the cold. A hat with a brim is der Hut."
      ru: "Mütze — мягкий головной убор без полей, вязаная шапка, которую надевают в холод. Шляпа с полями — der Hut."
      uk: "Mütze — м’який головний убір без крисів, в’язана шапка, яку вдягають у холод. Капелюх із крисами — der Hut."

  - de: "Stiefel"
    ipa: "ˈʃtiːfl̩"
    pos: noun
    gender: m
    plural: "die Stiefel"
    en: "boot"
    ru: "сапог"
    uk: "чобіт"
    example_de: "Meine Stiefel sind nass, es hat den ganzen Tag geregnet."
    example_en: "My boots are wet; it rained all day."
    example_ru: "Мои сапоги промокли, дождь шёл весь день."
    example_uk: "Мої чоботи промокли, дощ ішов увесь день."
    note:
      en: "Like most masculine nouns in -el, the plural does not change: der Stiefel — die Stiefel. Shoes come in twos, so you buy ein Paar Stiefel."
      ru: "Как у большинства слов мужского рода на -el, множественное число не меняется: der Stiefel — die Stiefel. Обувь считают парами: ein Paar Stiefel."
      uk: "Як у більшості слів чоловічого роду на -el, множина не змінюється: der Stiefel — die Stiefel. Взуття рахують парами: ein Paar Stiefel."

  - de: "Anzug"
    ipa: "ˈanˌtsuːk"
    pos: noun
    gender: m
    plural: "die Anzüge"
    en: "suit (men's)"
    ru: "костюм (мужской)"
    uk: "костюм (чоловічий)"
    example_de: "Zur Hochzeit trägt mein Bruder einen Anzug."
    example_en: "My brother is wearing a suit to the wedding."
    example_ru: "На свадьбу мой брат наденет костюм."
    example_uk: "На весілля мій брат одягне костюм."
    note:
      en: "Jacket and trousers together, worn to a wedding or an interview. The word comes from anziehen (to put on), and the plural takes an umlaut: die Anzüge."
      ru: "Пиджак и брюки вместе — то, что надевают на свадьбу или на собеседование. Слово образовано от anziehen («надевать»), а во множественном числе появляется умлаут: die Anzüge."
      uk: "Піджак і штани разом — те, що вдягають на весілля або на співбесіду. Слово утворене від anziehen («вдягати»), а в множині з’являється умлаут: die Anzüge."

  - de: "Jeans"
    ipa: "ˈdʒiːns"
    pos: noun
    gender: f
    plural: "die Jeans"
    en: "jeans (one pair)"
    ru: "джинсы (одни)"
    uk: "джинси (одні)"
    example_de: "Die Jeans passt gut, ich nehme sie."
    example_en: "The jeans fit well; I will take them."
    example_ru: "Джинсы хорошо сидят, я их возьму."
    example_uk: "Джинси добре сидять, я їх візьму."
    note:
      en: "The form never changes: die Jeans in the singular, die Jeans in the plural. German treats one pair as one feminine noun with a singular verb — Die Jeans ist neu, not \"sind neu\" — even though the English word is plural. Two pairs are zwei Jeans."
      ru: "Форма не меняется: die Jeans и в единственном, и во множественном числе. Одна пара — это по-немецки одно существительное женского рода с глаголом в единственном числе: Die Jeans ist neu, а не «sind neu», хотя по-русски «джинсы» во множественном. Две пары — zwei Jeans."
      uk: "Форма не змінюється: die Jeans і в однині, і в множині. Одна пара — це німецькою один іменник жіночого роду з дієсловом в однині: Die Jeans ist neu, а не «sind neu», хоча українською «джинси» у множині. Дві пари — zwei Jeans."

  - de: "Brille"
    ipa: "ˈbʁɪlə"
    pos: noun
    gender: f
    plural: "die Brillen"
    en: "glasses; spectacles (one pair)"
    ru: "очки (одни)"
    uk: "окуляри (одні)"
    example_de: "Meine Brille ist kaputt, ich sehe fast nichts."
    example_en: "My glasses are broken; I can hardly see a thing."
    example_ru: "Мои очки сломались, я почти ничего не вижу."
    example_uk: "Мої окуляри зламалися, я майже нічого не бачу."
    note:
      en: "One pair of glasses is one Brille — a singular noun that takes a singular verb and a singular possessive: Meine Brille ist neu, never \"sind neu\". English \"glasses\" counts the two lenses; German counts the object you put on your nose. Two pairs are zwei Brillen, and you say eine Brille tragen or eine Brille aufsetzen."
      ru: "Одни очки — это по-немецки одна die Brille: существительное в единственном числе с глаголом и притяжательным в единственном числе — Meine Brille ist neu, но не «sind neu». Русское «очки» стоит во множественном, и это самая частая ошибка. Двое очков — zwei Brillen; носят их — eine Brille tragen, надевают — eine Brille aufsetzen."
      uk: "Одні окуляри — це німецькою одна die Brille: іменник в однині з дієсловом і присвійним в однині — Meine Brille ist neu, але не «sind neu». Українське «окуляри» стоїть у множині, і це найчастіша помилка. Двоє окулярів — zwei Brillen; носять їх — eine Brille tragen, вдягають — eine Brille aufsetzen."

  # Plural-only, so it is declared like Papiere above and like Beschwerden in
  # gesundheit-arzttermin: pos: phrase, no gender and no plural. A noun entry would
  # have to declare a plural that repeats itself, and the production card would demand
  # an article for a word with no singular to take one.
  - de: "Fundsachen"
    ipa: "ˈfʊntˌzaxn̩"
    pos: phrase
    en: "lost property; lost-and-found items"
    ru: "найденные вещи; бюро находок (вещи)"
    uk: "знайдені речі; загублені речі (бюро знахідок)"
    example_de: "Die Fundsachen liegen im Büro neben dem Eingang."
    example_en: "The lost property is kept in the office next to the entrance."
    example_ru: "Найденные вещи хранятся в бюро рядом со входом."
    example_uk: "Знайдені речі зберігаються в бюро поряд зі входом."
    note:
      en: "Literally the found Sachen, and always plural: Sind meine Handschuhe bei den Fundsachen? The counter or office where you go and ask for them is das Fundbüro — the sign you look for at a station."
      ru: "Буквально «найденные Sachen», и всегда во множественном числе: Sind meine Handschuhe bei den Fundsachen? Стойка или кабинет, куда за ними идут, — das Fundbüro; именно эту табличку ищут на вокзале."
      uk: "Буквально «знайдені Sachen», і завжди у множині: Sind meine Handschuhe bei den Fundsachen? Стійка чи кабінет, куди за ними йдуть, — das Fundbüro; саме цю табличку шукають на вокзалі."

  - de: "Tafel"
    ipa: "ˈtaːfl̩"
    pos: noun
    gender: f
    plural: "die Tafeln"
    en: "board (classroom); bar (of chocolate)"
    ru: "доска (классная); плитка (шоколада)"
    uk: "дошка (класна); плитка (шоколаду)"
    example_de: "Der Lehrer schreibt das neue Wort an die Tafel."
    example_en: "The teacher writes the new word on the board."
    example_ru: "Учитель пишет новое слово на доске."
    example_uk: "Учитель пише нове слово на дошці."
    note:
      en: "Two senses worth knowing. In the classroom it is the board: an die Tafel schreiben (Wohin? — Akkusativ), but an der Tafel stehen (Wo? — Dativ). In the supermarket eine Tafel Schokolade is a bar of chocolate — the same word, and it surprises everybody once."
      ru: "Два значения, оба нужны. В классе это доска: an die Tafel schreiben (Wohin? — Akkusativ), но an der Tafel stehen (Wo? — Dativ). В магазине eine Tafel Schokolade — плитка шоколада; то же самое слово, и это всех однажды удивляет."
      uk: "Два значення, обидва потрібні. У класі це дошка: an die Tafel schreiben (Wohin? — Akkusativ), але an der Tafel stehen (Wo? — Dativ). У магазині eine Tafel Schokolade — плитка шоколаду; те саме слово, і це всіх одного разу дивує."
