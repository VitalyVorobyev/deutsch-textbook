id: reisen-urlaub
title_de: "Reisen & Unterwegs"
title_en: "Travel & getting around"
title_ru: "Путешествия и в пути"
level: A1
entries:
  - { de: "Reise", ipa: "ˈʁaɪ̯zə", pos: noun, gender: f, plural: "die Reisen", en: "trip; journey", ru: "поездка; путешествие", example_de: "Die Reise nach Italien ist lang.", example_en: "The trip to Italy is long.", example_ru: "Поездка в Италию долгая." }
  - { de: "reisen", ipa: "ˈʁaɪ̯zn̩", pos: verb, en: "to travel", ru: "путешествовать", example_de: "Wir reisen gern nach Spanien.", example_en: "We like to travel to Spain.", example_ru: "Мы любим путешествовать в Испанию.", partizip2: "gereist", aux: "sein", praesens_3sg: "reist", note: { en: "Movement verb, like fahren or gehen — Perfekt with sein: Ich bin nach Spanien gereist, not habe gereist.", ru: "Глагол движения, как fahren или gehen — Perfekt с sein: Ich bin nach Spanien gereist, а не habe gereist." } }
  - { de: "Urlaub", ipa: "ˈuːɐ̯laʊ̯p", pos: noun, gender: m, plural: "die Urlaube", en: "vacation; holiday (from work)", ru: "отпуск", example_de: "Der Urlaub beginnt am Montag.", example_en: "The vacation starts on Monday.", example_ru: "Отпуск начинается в понедельник.", note: { en: "Urlaub is time off work; school and university breaks are Ferien.", ru: "Urlaub — отпуск с работы; каникулы в школе или университете называются Ferien." } }
  - { de: "Ferien", ipa: "ˈfeːʁiən", pos: phrase, en: "holidays (school/university break)", ru: "каникулы", example_de: "Die Ferien dauern sechs Wochen.", example_en: "The holidays last six weeks.", example_ru: "Каникулы длятся шесть недель.", note: { en: "Always plural; used for school and university breaks — time off work is Urlaub.", ru: "Всегда во множественном числе; используется для каникул в школе или вузе — отпуск с работы называется Urlaub." } }
  - { de: "Zimmer frei", ipa: "ˈtsɪmɐ ˈfʁaɪ̯", pos: phrase, en: "Vacancy (sign: rooms available)", ru: "Есть свободные номера (вывеска)", example_de: "Vor der Pension hängt ein Schild: Zimmer frei.", example_en: "In front of the guesthouse hangs a sign: Vacancy.", example_ru: "Перед пансионом висит табличка: Есть свободные номера.", note: { en: "A fixed sign, not a full sentence — short for Hier sind Zimmer frei.", ru: "Устойчивая вывеска, а не полное предложение — сокращение от Hier sind Zimmer frei." } }
  - { de: "Rezeption", ipa: "ʁetsɛpˈtsjoːn", pos: noun, gender: f, plural: "die Rezeptionen", en: "reception (desk)", ru: "стойка регистрации; ресепшен", example_de: "Die Rezeption ist immer geöffnet.", example_en: "The reception is always open.", example_ru: "Стойка регистрации всегда открыта." }
  - { de: "buchen", ipa: "ˈbuːxn̩", pos: verb, en: "to book", ru: "бронировать; заказывать (заранее)", example_de: "Ich buche ein Zimmer für zwei Nächte.", example_en: "I book a room for two nights.", example_ru: "Я бронирую номер на две ночи.", partizip2: "gebucht", aux: "haben", praesens_3sg: "bucht", valence: "+ Akk" }
  - { de: "reservieren", ipa: "ʁezɛʁˈviːʁən", pos: verb, en: "to reserve", ru: "резервировать; бронировать (место, столик)", example_de: "Wir reservieren einen Tisch im Restaurant.", example_en: "We reserve a table at the restaurant.", example_ru: "Мы бронируем столик в ресторане.", partizip2: "reserviert", aux: "haben", praesens_3sg: "reserviert", valence: "+ Akk", note: { en: "-ieren verb — Partizip II without ge-: hat reserviert.", ru: "Глагол на -ieren — Partizip II без ge-: hat reserviert." } }
  - { de: "Gast", ipa: "ˈgast", pos: noun, gender: m, plural: "die Gäste", en: "guest", ru: "гость", example_de: "Das Hotel hat heute viele Gäste.", example_en: "The hotel has many guests today.", example_ru: "В отеле сегодня много гостей." }
  - { de: "Koffer", ipa: "ˈkɔfɐ", pos: noun, gender: m, plural: "die Koffer", en: "suitcase", ru: "чемодан", example_de: "Mein Koffer ist schwer.", example_en: "My suitcase is heavy.", example_ru: "Мой чемодан тяжёлый." }
  - { de: "Gepäck", ipa: "gəˈpɛk", pos: noun, gender: n, plural: "—", en: "luggage; baggage", ru: "багаж", example_de: "Wir haben viel Gepäck.", example_en: "We have a lot of luggage.", example_ru: "У нас много багажа." }
  - { de: "packen", ipa: "ˈpakn̩", pos: verb, en: "to pack", ru: "паковать; собирать (чемодан)", example_de: "Ich packe meinen Koffer für die Reise.", example_en: "I pack my suitcase for the trip.", example_ru: "Я собираю чемодан для поездки.", partizip2: "gepackt", aux: "haben", praesens_3sg: "packt", valence: "+ Akk" }
  - { de: "Pass", ipa: "ˈpas", pos: noun, gender: m, plural: "die Pässe", en: "passport; ID", ru: "паспорт", example_de: "Zeigen Sie bitte Ihren Pass.", example_en: "Please show your passport.", example_ru: "Покажите, пожалуйста, ваш паспорт.", note: { en: "Everyday short word for Reisepass; also the general term for an official ID document.", ru: "Разговорное короткое слово для Reisepass; также общий термин для официального удостоверения личности." } }
  - { de: "Reisepass", ipa: "ˈʁaɪ̯zəˌpas", pos: noun, gender: m, plural: "die Reisepässe", en: "passport", ru: "заграничный паспорт", example_de: "Der Reisepass ist noch fünf Jahre gültig.", example_en: "The passport is valid for five more years.", example_ru: "Загранпаспорт действителен ещё пять лет." }
  - { de: "Visum", ipa: "ˈviːzʊm", pos: noun, gender: n, plural: "die Visa", en: "visa", ru: "виза", example_de: "Brauche ich ein Visum für Deutschland?", example_en: "Do I need a visa for Germany?", example_ru: "Нужна ли мне виза в Германию?", note: { en: "Latin-style plural: das Visum → die Visa.", ru: "Множественное число по латинской модели: das Visum → die Visa." } }
  - { de: "Ausland", ipa: "ˈaʊ̯sˌlant", pos: noun, gender: n, plural: "—", en: "abroad; foreign countries", ru: "заграница; за рубежом", example_de: "Meine Schwester lebt im Ausland.", example_en: "My sister lives abroad.", example_ru: "Моя сестра живёт за границей.", note: { en: "Fixed with prepositions: im Ausland (location) and ins Ausland (direction).", ru: "Устойчиво с предлогами: im Ausland (где) и ins Ausland (куда)." } }
  - { de: "Flughafen", ipa: "ˈfluːkˌhaːfn̩", pos: noun, gender: m, plural: "die Flughäfen", en: "airport", ru: "аэропорт", example_de: "Der Flughafen ist groß und modern.", example_en: "The airport is big and modern.", example_ru: "Аэропорт большой и современный." }
  - { de: "Flugzeug", ipa: "ˈfluːkˌtsɔʏ̯k", pos: noun, gender: n, plural: "die Flugzeuge", en: "airplane", ru: "самолёт", example_de: "Das Flugzeug landet pünktlich.", example_en: "The airplane lands on time.", example_ru: "Самолёт приземляется вовремя." }
  - { de: "Flug", ipa: "ˈfluːk", pos: noun, gender: m, plural: "die Flüge", en: "flight", ru: "рейс; полёт", example_de: "Unser Flug nach Rom dauert zwei Stunden.", example_en: "Our flight to Rome takes two hours.", example_ru: "Наш рейс до Рима длится два часа." }
  - { de: "Bahn", ipa: "ˈbaːn", pos: noun, gender: f, plural: "die Bahnen", en: "train; railway", ru: "поезд; железная дорога", example_de: "Wir fahren mit der Bahn nach München.", example_en: "We are going to Munich by train.", example_ru: "Мы едем в Мюнхен на поезде.", note: { en: "Everyday word for the railway (and the company Deutsche Bahn); Zug is the concrete train you board.", ru: "Разговорное слово для железной дороги (и компании Deutsche Bahn); Zug — это конкретный поезд, в который садишься." } }
  - { de: "Zug", ipa: "ˈtsuːk", pos: noun, gender: m, plural: "die Züge", en: "train", ru: "поезд", example_de: "Der Zug fährt um neun Uhr ab.", example_en: "The train departs at nine o'clock.", example_ru: "Поезд отправляется в девять часов." }
  - { de: "Bahnsteig", ipa: "ˈbaːnˌʃtaɪ̯k", pos: noun, gender: m, plural: "die Bahnsteige", en: "platform (railway)", ru: "перрон; платформа", example_de: "Auf dem Bahnsteig warten viele Leute.", example_en: "Many people are waiting on the platform.", example_ru: "На платформе ждут много людей." }
  - { de: "Gleis", ipa: "ˈglaɪ̯s", pos: noun, gender: n, plural: "die Gleise", en: "track; platform number", ru: "путь; номер платформы", example_de: "Der Zug fährt auf Gleis fünf ab.", example_en: "The train departs from track five.", example_ru: "Поезд отправляется с пятого пути.", note: { en: "Gleis is the numbered track; Bahnsteig is the platform you stand on.", ru: "Gleis — номер пути, Bahnsteig — платформа, на которой стоишь." } }
  - { de: "Abfahrt", ipa: "ˈapˌfaːɐ̯t", pos: noun, gender: f, plural: "die Abfahrten", en: "departure", ru: "отправление; отъезд", example_de: "Die Abfahrt ist um acht Uhr fünfzehn.", example_en: "The departure is at eight fifteen.", example_ru: "Отправление в восемь пятнадцать." }
  - { de: "Ankunft", ipa: "ˈanˌkʊnft", pos: noun, gender: f, plural: "die Ankünfte", en: "arrival", ru: "прибытие", example_de: "Der Zug kommt um zehn Uhr an.", example_en: "The train arrives at ten o'clock.", example_ru: "Поезд прибывает в десять часов." }
  - { de: "Fahrkarte", ipa: "ˈfaːɐ̯ˌkaʁtə", pos: noun, gender: f, plural: "die Fahrkarten", en: "ticket (train, bus, tram)", ru: "билет (на поезд, автобус)", example_de: "Ich kaufe eine Fahrkarte nach Hamburg.", example_en: "I buy a ticket to Hamburg.", example_ru: "Я покупаю билет до Гамбурга." }
  - { de: "Ticket", ipa: "ˈtɪkət", pos: noun, gender: n, plural: "die Tickets", en: "ticket (flight, event)", ru: "билет (обычно на самолёт, на мероприятие)", example_de: "Das Ticket für den Flug ist teuer.", example_en: "The ticket for the flight is expensive.", example_ru: "Билет на самолёт дорогой.", note: { en: "Ticket is the loanword for flights and events; Fahrkarte is the everyday word for bus and train.", ru: "Ticket — заимствование для самолётов и мероприятий; Fahrkarte — обычное слово для автобуса и поезда." } }
  - { de: "Fahrplan", ipa: "ˈfaːɐ̯ˌplaːn", pos: noun, gender: m, plural: "die Fahrpläne", en: "timetable; schedule", ru: "расписание", example_de: "Der Fahrplan hängt am Bahnsteig.", example_en: "The timetable is posted on the platform.", example_ru: "Расписание висит на платформе." }
  - { de: "Auskunft", ipa: "ˈaʊ̯sˌkʊnft", pos: noun, gender: f, plural: "die Auskünfte", en: "information; information desk", ru: "справка; справочное бюро", example_de: "Die Auskunft ist neben dem Eingang.", example_en: "The information desk is next to the entrance.", example_ru: "Справочное бюро находится рядом со входом." }
  - { de: "Schiff", ipa: "ˈʃɪf", pos: noun, gender: n, plural: "die Schiffe", en: "ship", ru: "корабль", example_de: "Das Schiff fährt nach Norwegen.", example_en: "The ship sails to Norway.", example_ru: "Корабль плывёт в Норвегию." }
  - { de: "Grenze", ipa: "ˈgʁɛntsə", pos: noun, gender: f, plural: "die Grenzen", en: "border", ru: "граница", example_de: "Die Grenze ist nicht weit von hier.", example_en: "The border is not far from here.", example_ru: "Граница недалеко отсюда." }
  - { de: "Zoll", ipa: "ˈtsɔl", pos: noun, gender: m, plural: "die Zölle", en: "customs", ru: "таможня", example_de: "Am Zoll zeigen wir unsere Pässe.", example_en: "At customs we show our passports.", example_ru: "На таможне мы показываем наши паспорта." }
  - { de: "willkommen", ipa: "vɪlˈkɔmən", pos: adj, en: "welcome", ru: "добро пожаловать", example_de: "Herzlich willkommen in Berlin!", example_en: "Welcome to Berlin!", example_ru: "Добро пожаловать в Берлин!", note: { en: "Used as a fixed greeting (Herzlich willkommen!), not conjugated like a verb.", ru: "Используется как устойчивое приветствие (Herzlich willkommen!), не спрягается как глагол." } }
  - { de: "Straßenbahn", ipa: "ˈʃtʁaːsn̩ˌbaːn", pos: noun, gender: f, plural: "die Straßenbahnen", en: "tram", ru: "трамвай", example_de: "Die Straßenbahn hält an der Ecke.", example_en: "The tram stops at the corner.", example_ru: "Трамвай останавливается на углу." }
  - { de: "Ampel", ipa: "ˈampl̩", pos: noun, gender: f, plural: "die Ampeln", en: "traffic light", ru: "светофор", example_de: "An der Ampel ist es rot.", example_en: "The traffic light is red.", example_ru: "На светофоре красный свет." }
  - { de: "Ecke", ipa: "ˈɛkə", pos: noun, gender: f, plural: "die Ecken", en: "corner", ru: "угол", example_de: "Die Bibliothek ist an der Ecke.", example_en: "The library is on the corner.", example_ru: "Библиотека находится на углу." }
  - { de: "Kirche", ipa: "ˈkɪʁçə", pos: noun, gender: f, plural: "die Kirchen", en: "church", ru: "церковь", example_de: "Die Kirche ist sehr alt.", example_en: "The church is very old.", example_ru: "Церковь очень старая." }
  - { de: "Museum", ipa: "muˈzeːʊm", pos: noun, gender: n, plural: "die Museen", en: "museum", ru: "музей", example_de: "Das Museum ist am Sonntag geöffnet.", example_en: "The museum is open on Sunday.", example_ru: "Музей открыт в воскресенье.", note: { en: "Latin-style plural: das Museum → die Museen (like das Visum → die Visa).", ru: "Множественное число по латинской модели: das Museum → die Museen (как das Visum → die Visa)." } }
  - { de: "Theater", ipa: "teˈʔaːtɐ", pos: noun, gender: n, plural: "die Theater", en: "theatre", ru: "театр", example_de: "Das Theater ist heute Abend geöffnet.", example_en: "The theatre is open tonight.", example_ru: "Театр сегодня вечером открыт." }
  - { de: "Bibliothek", ipa: "biblioˈteːk", pos: noun, gender: f, plural: "die Bibliotheken", en: "library", ru: "библиотека", example_de: "Die Bibliothek hat viele Bücher.", example_en: "The library has many books.", example_ru: "В библиотеке много книг." }
  - { de: "Rathaus", ipa: "ˈʁaːtˌhaʊ̯s", pos: noun, gender: n, plural: "die Rathäuser", en: "city hall; town hall", ru: "ратуша; мэрия", example_de: "Das Rathaus steht am Marktplatz.", example_en: "The town hall stands on the market square.", example_ru: "Ратуша стоит на рыночной площади." }
  - { de: "Polizei", ipa: "poliˈtsaɪ̯", pos: noun, gender: f, plural: "—", en: "police", ru: "полиция", example_de: "Die Polizei ist schnell da.", example_en: "The police are there quickly.", example_ru: "Полиция быстро приезжает.", note: { en: "Singular collective noun, like English \"police\" — no plural form.", ru: "Собирательное существительное только в единственном числе, как в русском «полиция»." } }
  - { de: "Feuerwehr", ipa: "ˈfɔʏ̯ɐˌveːɐ̯", pos: noun, gender: f, plural: "—", en: "fire department; fire brigade", ru: "пожарная служба", example_de: "Die Feuerwehr kommt in fünf Minuten.", example_en: "The fire department arrives in five minutes.", example_ru: "Пожарная служба приедет через пять минут." }
  - { de: "Toilette", ipa: "toaˈlɛtə", pos: noun, gender: f, plural: "die Toiletten", en: "toilet; restroom", ru: "туалет", example_de: "Die Toilette ist hier links.", example_en: "The toilet is here on the left.", example_ru: "Туалет здесь налево." }
  - { de: "Ausflug", ipa: "ˈaʊ̯sˌfluːk", pos: noun, gender: m, plural: "die Ausflüge", en: "excursion; day trip", ru: "экскурсия; прогулка (за город)", example_de: "Am Wochenende machen wir einen Ausflug.", example_en: "On the weekend we go on a day trip.", example_ru: "На выходных мы отправляемся на экскурсию." }
