id: freizeit-koennen
title_de: "Freizeit & Können"
title_en: "Free time & können"
title_ru: "Свободное время и können"
level: A1
entries:
  - { de: "Hobby", ipa: "ˈhɔbi", pos: noun, gender: n, plural: "die Hobbys", en: "hobby", ru: "хобби; увлечение", example_de: "Was sind deine Hobbys?", example_en: "What are your hobbies?", example_ru: "Какие у тебя хобби?" }
  - { de: "Sport", ipa: "ˈʃpɔʁt", pos: noun, gender: m, plural: "—", en: "sport; exercise", ru: "спорт", example_de: "Ich mache gern Sport.", example_en: "I like doing sport.", example_ru: "Я люблю заниматься спортом.", note: { en: "Sport machen = to do sport, to exercise.", ru: "Sport machen — «заниматься спортом»." } }
  - { de: "Fußball", ipa: "ˈfuːsˌbal", pos: noun, gender: m, plural: "die Fußbälle", en: "football; soccer", ru: "футбол; футбольный мяч", example_de: "Ich spiele gern Fußball.", example_en: "I like playing football.", example_ru: "Я люблю играть в футбол.", note: { en: "The game takes no article after spielen: Ich spiele Fußball. The plural die Fußbälle means the balls.", ru: "Название игры после spielen идёт без артикля: Ich spiele Fußball. Множественное число die Fußbälle — про мячи." } }
  - { de: "Musik", ipa: "muˈziːk", pos: noun, gender: f, plural: "—", en: "music", ru: "музыка", example_de: "Wir hören zusammen Musik.", example_en: "We listen to music together.", example_ru: "Мы вместе слушаем музыку." }
  - { de: "Kino", ipa: "ˈkiːno", pos: noun, gender: n, plural: "die Kinos", en: "cinema", ru: "кино; кинотеатр", example_de: "Gehen wir heute ins Kino?", example_en: "Shall we go to the cinema today?", example_ru: "Пойдём сегодня в кино?" }
  - { de: "Film", ipa: "ˈfɪlm", pos: noun, gender: m, plural: "die Filme", en: "film; movie", ru: "фильм", example_de: "Der Film ist super.", example_en: "The film is great.", example_ru: "Фильм отличный." }
  - { de: "Park", ipa: "ˈpaʁk", pos: noun, gender: m, plural: "die Parks", en: "park", ru: "парк", example_de: "Wir spielen im Park Fußball.", example_en: "We play football in the park.", example_ru: "Мы играем в парке в футбол." }
  - { de: "Schwimmbad", ipa: "ˈʃvɪmˌbaːt", pos: noun, gender: n, plural: "die Schwimmbäder", en: "swimming pool", ru: "бассейн", example_de: "Das Schwimmbad ist heute geöffnet.", example_en: "The swimming pool is open today.", example_ru: "Бассейн сегодня открыт." }
  - { de: "Einladung", ipa: "ˈaɪ̯nˌlaːdʊŋ", pos: noun, gender: f, plural: "die Einladungen", en: "invitation", ru: "приглашение", example_de: "Danke für die Einladung!", example_en: "Thank you for the invitation!", example_ru: "Спасибо за приглашение!", note: { en: "-ung nouns are always die: die Einladung.", ru: "Существительные на -ung всегда с die: die Einladung." } }
  - { de: "Konzert", ipa: "kɔnˈtsɛʁt", pos: noun, gender: n, plural: "die Konzerte", en: "concert", ru: "концерт", example_de: "Das Konzert beginnt um acht Uhr.", example_en: "The concert starts at eight o'clock.", example_ru: "Концерт начинается в восемь часов." }
  - { de: "Party", ipa: "ˈpaːɐ̯ti", pos: noun, gender: f, plural: "die Partys", en: "party", ru: "вечеринка", example_de: "Wir machen am Samstag eine Party.", example_en: "We are having a party on Saturday.", example_ru: "В субботу мы устраиваем вечеринку." }
  - { de: "Café", ipa: "kaˈfeː", pos: noun, gender: n, plural: "die Cafés", en: "café", ru: "кафе", example_de: "Das Café ist im Zentrum.", example_en: "The café is in the centre.", example_ru: "Кафе находится в центре." }
  - { de: "Gitarre", ipa: "giˈtaʁə", pos: noun, gender: f, plural: "die Gitarren", en: "guitar", ru: "гитара", example_de: "Kannst du Gitarre spielen?", example_en: "Can you play the guitar?", example_ru: "Ты умеешь играть на гитаре?", note: { en: "Instruments take no article after spielen: Ich spiele Gitarre.", ru: "Инструменты после spielen идут без артикля: Ich spiele Gitarre." } }
  - { de: "schwimmen", ipa: "ˈʃvɪmən", pos: verb, partizip2: "geschwommen", aux: sein, praesens_3sg: "schwimmt", en: "to swim", ru: "плавать", example_de: "Ich kann gut schwimmen.", example_en: "I can swim well.", example_ru: "Я умею хорошо плавать." }
  - { de: "tanzen", ipa: "ˈtantsn̩", pos: verb, partizip2: "getanzt", aux: haben, praesens_3sg: "tanzt", en: "to dance", ru: "танцевать", example_de: "Kannst du tanzen?", example_en: "Can you dance?", example_ru: "Ты умеешь танцевать?" }
  - { de: "singen", ipa: "ˈzɪŋən", pos: verb, partizip2: "gesungen", aux: haben, praesens_3sg: "singt", en: "to sing", ru: "петь", example_de: "Sie singt gern.", example_en: "She likes singing.", example_ru: "Она любит петь." }
  - { de: "spielen", ipa: "ˈʃpiːlən", pos: verb, partizip2: "gespielt", aux: haben, praesens_3sg: "spielt", en: "to play", ru: "играть", example_de: "Die Kinder spielen im Park.", example_en: "The children are playing in the park.", example_ru: "Дети играют в парке." }
  - { de: "hören", ipa: "ˈhøːʁən", pos: verb, partizip2: "gehört", aux: haben, praesens_3sg: "hört", en: "to hear; to listen to", ru: "слышать; слушать", example_de: "Ich höre gern Musik.", example_en: "I like listening to music.", example_ru: "Я люблю слушать музыку." }
  - { de: "wandern", ipa: "ˈvandɐn", pos: verb, partizip2: "gewandert", aux: sein, praesens_3sg: "wandert", en: "to hike", ru: "ходить в поход; гулять по горам", example_de: "Wir wandern am Sonntag.", example_en: "We are going hiking on Sunday.", example_ru: "В воскресенье мы идём в поход." }
  - { de: "malen", ipa: "ˈmaːlən", pos: verb, partizip2: "gemalt", aux: haben, praesens_3sg: "malt", en: "to paint; to draw", ru: "рисовать", example_de: "Anna malt gern.", example_en: "Anna likes painting.", example_ru: "Анна любит рисовать." }
  - { de: "fotografieren", ipa: "fotogʁaˈfiːʁən", pos: verb, partizip2: "fotografiert", aux: haben, praesens_3sg: "fotografiert", en: "to take photos", ru: "фотографировать", example_de: "Er fotografiert gern.", example_en: "He likes taking photos.", example_ru: "Он любит фотографировать.", note: { en: "-ieren verbs build the Partizip II without ge-: fotografiert.", ru: "Глаголы на -ieren образуют Partizip II без ge-: fotografiert." } }
  - { de: "gern", ipa: "ˈgɛʁn", pos: adv, en: "gladly; (verb + gern) to like doing something", ru: "охотно; (глагол + gern) любить что-то делать", example_de: "Was machst du gern?", example_en: "What do you like doing?", example_ru: "Что ты любишь делать?", note: { en: "gern stands after the conjugated verb: Ich spiele gern Fußball. gerne is an equally correct variant.", ru: "gern стоит после спрягаемого глагола: Ich spiele gern Fußball. gerne — равноправный вариант." } }
  - { de: "lieber", ipa: "ˈliːbɐ", pos: adv, en: "rather; (verb + lieber) to prefer doing something", ru: "охотнее; (глагол + lieber) предпочитать", example_de: "Ich schwimme gern, aber ich tanze lieber.", example_en: "I like swimming, but I prefer dancing.", example_ru: "Я люблю плавать, но танцевать мне нравится больше.", note: { en: "lieber is the comparative of gern.", ru: "lieber — сравнительная степень от gern." } }
  - { de: "Hast du Zeit?", ipa: "hast du ˈtsaɪ̯t", pos: phrase, en: "Do you have time?", ru: "У тебя есть время?", example_de: "Hast du am Samstag Zeit?", example_en: "Do you have time on Saturday?", example_ru: "У тебя есть время в субботу?" }
  - { de: "Ja, gern!", ipa: "ˌjaː ˈgɛʁn", pos: phrase, en: "Yes, with pleasure!", ru: "Да, с удовольствием!", example_de: "Gehen wir ins Kino? — Ja, gern!", example_en: "Shall we go to the cinema? — Yes, with pleasure!", example_ru: "Пойдём в кино? — Да, с удовольствием!" }
  - { de: "Leider kann ich nicht.", pos: phrase, en: "Unfortunately I can't.", ru: "К сожалению, я не могу.", example_de: "Kommst du am Freitag? — Leider kann ich nicht.", example_en: "Are you coming on Friday? — Unfortunately I can't.", example_ru: "Ты придёшь в пятницу? — К сожалению, я не могу." }
  - { de: "Gehen wir ins Kino?", pos: phrase, en: "Shall we go to the cinema?", ru: "Пойдём в кино?", example_de: "Gehen wir heute Abend ins Kino?", example_en: "Shall we go to the cinema this evening?", example_ru: "Пойдём сегодня вечером в кино?", note: { en: "Gehen wir …? with the verb first is the standard way to suggest doing something together.", ru: "Gehen wir …? с глаголом на первом месте — стандартное предложение сделать что-то вместе." } }
  - { de: "Ball", ipa: "ˈbal", pos: noun, gender: m, plural: "die Bälle", en: "ball", ru: "мяч", example_de: "Wir spielen mit dem Ball im Park.", example_en: "We play with the ball in the park.", example_ru: "Мы играем с мячом в парке." }
  - { de: "Besuch", ipa: "bəˈzuːx", pos: noun, gender: m, plural: "die Besuche", en: "visit", ru: "визит; посещение", example_de: "Sein Besuch dauert eine Woche.", example_en: "His visit lasts one week.", example_ru: "Его визит длится неделю." }
  - { de: "Fest", ipa: "ˈfɛst", pos: noun, gender: n, plural: "die Feste", en: "festival; celebration", ru: "праздник", example_de: "Am Wochenende ist ein großes Fest.", example_en: "There is a big celebration at the weekend.", example_ru: "На выходных большой праздник." }
  - { de: "feiern", ipa: "ˈfaɪ̯ɐn", pos: verb, partizip2: "gefeiert", aux: haben, praesens_3sg: "feiert", en: "to celebrate", ru: "праздновать", example_de: "Wir feiern seinen Geburtstag.", example_en: "We are celebrating his birthday.", example_ru: "Мы празднуем его день рождения." }
  - { de: "Spiel", ipa: "ˈʃpiːl", pos: noun, gender: n, plural: "die Spiele", en: "game", ru: "игра", example_de: "Das Spiel ist sehr spannend.", example_en: "The game is very exciting.", example_ru: "Игра очень увлекательная." }
