id: freizeit-koennen
title_de: "Freizeit & Können"
title_en: "Free time & können"
title_ru: "Свободное время и können"
title_uk: "Вільний час і können"
level: A1
entries:
  - { de: "Hobby", ipa: "ˈhɔbi", pos: noun, gender: n, plural: "die Hobbys", en: "hobby", ru: "хобби; увлечение", uk: "хобі; захоплення", example_de: "Was sind deine Hobbys?", example_en: "What are your hobbies?", example_ru: "Какие у тебя хобби?", example_uk: "Які в тебе хобі?" }
  - { de: "Sport", ipa: "ˈʃpɔʁt", pos: noun, gender: m, plural: "—", en: "sport; exercise", ru: "спорт", uk: "спорт", example_de: "Ich mache gern Sport.", example_en: "I like doing sport.", example_ru: "Я люблю заниматься спортом.", example_uk: "Я люблю займатися спортом.", note: { en: "Sport machen = to do sport, to exercise.", ru: "Sport machen — «заниматься спортом».", uk: "Sport machen — «займатися спортом»." } }
  - { de: "Fußball", ipa: "ˈfuːsˌbal", pos: noun, gender: m, plural: "die Fußbälle", en: "football; soccer", ru: "футбол; футбольный мяч", uk: "футбол; футбольний м'яч", example_de: "Ich spiele gern Fußball.", example_en: "I like playing football.", example_ru: "Я люблю играть в футбол.", example_uk: "Я люблю грати у футбол.", note: { en: "The game takes no article after spielen: Ich spiele Fußball. The plural die Fußbälle means the balls.", ru: "Название игры после spielen идёт без артикля: Ich spiele Fußball. Множественное число die Fußbälle — про мячи.", uk: "Назва гри після spielen іде без артикля: Ich spiele Fußball. Множина die Fußbälle — про м'ячі." } }
  - { de: "Musik", ipa: "muˈziːk", pos: noun, gender: f, plural: "—", en: "music", ru: "музыка", uk: "музика", example_de: "Wir hören zusammen Musik.", example_en: "We listen to music together.", example_ru: "Мы вместе слушаем музыку.", example_uk: "Ми разом слухаємо музику." }
  - { de: "Kino", ipa: "ˈkiːno", pos: noun, gender: n, plural: "die Kinos", en: "cinema", ru: "кино; кинотеатр", uk: "кіно; кінотеатр", example_de: "Gehen wir heute ins Kino?", example_en: "Shall we go to the cinema today?", example_ru: "Пойдём сегодня в кино?", example_uk: "Підемо сьогодні в кіно?" }
  - { de: "Film", ipa: "ˈfɪlm", pos: noun, gender: m, plural: "die Filme", en: "film; movie", ru: "фильм", uk: "фільм", example_de: "Der Film ist super.", example_en: "The film is great.", example_ru: "Фильм отличный.", example_uk: "Фільм чудовий." }
  - { de: "Park", ipa: "ˈpaʁk", pos: noun, gender: m, plural: "die Parks", en: "park", ru: "парк", uk: "парк", example_de: "Wir spielen im Park Fußball.", example_en: "We play football in the park.", example_ru: "Мы играем в парке в футбол.", example_uk: "Ми граємо в парку у футбол." }
  - { de: "Schwimmbad", ipa: "ˈʃvɪmˌbaːt", pos: noun, gender: n, plural: "die Schwimmbäder", en: "swimming pool", ru: "бассейн", uk: "басейн", example_de: "Das Schwimmbad ist heute geöffnet.", example_en: "The swimming pool is open today.", example_ru: "Бассейн сегодня открыт.", example_uk: "Басейн сьогодні відчинений." }
  - { de: "Einladung", ipa: "ˈaɪ̯nˌlaːdʊŋ", pos: noun, gender: f, plural: "die Einladungen", en: "invitation", ru: "приглашение", uk: "запрошення", example_de: "Danke für die Einladung!", example_en: "Thank you for the invitation!", example_ru: "Спасибо за приглашение!", example_uk: "Дякую за запрошення!", note: { en: "-ung nouns are always die: die Einladung.", ru: "Существительные на -ung всегда с die: die Einladung.", uk: "Іменники на -ung завжди з die: die Einladung." } }
  - { de: "Konzert", ipa: "kɔnˈtsɛʁt", pos: noun, gender: n, plural: "die Konzerte", en: "concert", ru: "концерт", uk: "концерт", example_de: "Das Konzert beginnt um acht Uhr.", example_en: "The concert starts at eight o'clock.", example_ru: "Концерт начинается в восемь часов.", example_uk: "Концерт починається о восьмій годині." }
  - { de: "Party", ipa: "ˈpaːɐ̯ti", pos: noun, gender: f, plural: "die Partys", en: "party", ru: "вечеринка", uk: "вечірка", example_de: "Wir machen am Samstag eine Party.", example_en: "We are having a party on Saturday.", example_ru: "В субботу мы устраиваем вечеринку.", example_uk: "У суботу ми влаштовуємо вечірку." }
  # `accept` carries the accent-less spelling: the é is a French diacritic on a
  # loanword, not German orthography like ä/ö/ü/ß, and `das Cafe` is written
  # widely enough that rejecting it grades keyboard layout rather than German.
  # The é is on the input bar (GERMAN_INPUT_KEYS) so the standard spelling stays
  # producible — the learner reported the card as unanswerable without it.
  - { de: "Café", ipa: "kaˈfeː", pos: noun, gender: n, plural: "die Cafés", en: "café", ru: "кафе", uk: "кафе", accept: ["das Cafe"], example_de: "Das Café ist im Zentrum.", example_en: "The café is in the centre.", example_ru: "Кафе находится в центре.", example_uk: "Кафе розташоване в центрі." }
  - { de: "Gitarre", ipa: "giˈtaʁə", pos: noun, gender: f, plural: "die Gitarren", en: "guitar", ru: "гитара", uk: "гітара", example_de: "Kannst du Gitarre spielen?", example_en: "Can you play the guitar?", example_ru: "Ты умеешь играть на гитаре?", example_uk: "Ти вмієш грати на гітарі?", note: { en: "Instruments take no article after spielen: Ich spiele Gitarre.", ru: "Инструменты после spielen идут без артикля: Ich spiele Gitarre.", uk: "Інструменти після spielen ідуть без артикля: Ich spiele Gitarre." } }
  - { de: "schwimmen", ipa: "ˈʃvɪmən", pos: verb, partizip2: "geschwommen", aux: sein, praesens_3sg: "schwimmt", en: "to swim", ru: "плавать", uk: "плавати", example_de: "Ich kann gut schwimmen.", example_en: "I can swim well.", example_ru: "Я умею хорошо плавать.", example_uk: "Я вмію добре плавати." }
  - { de: "tanzen", ipa: "ˈtantsn̩", pos: verb, partizip2: "getanzt", aux: haben, praesens_3sg: "tanzt", en: "to dance", ru: "танцевать", uk: "танцювати", example_de: "Kannst du tanzen?", example_en: "Can you dance?", example_ru: "Ты умеешь танцевать?", example_uk: "Ти вмієш танцювати?" }
  - { de: "singen", ipa: "ˈzɪŋən", pos: verb, partizip2: "gesungen", aux: haben, praesens_3sg: "singt", en: "to sing", ru: "петь", uk: "співати", example_de: "Sie singt gern.", example_en: "She likes singing.", example_ru: "Она любит петь.", example_uk: "Вона любить співати." }
  - { de: "spielen", ipa: "ˈʃpiːlən", pos: verb, partizip2: "gespielt", aux: haben, praesens_3sg: "spielt", en: "to play", ru: "играть", uk: "грати", example_de: "Die Kinder spielen im Park.", example_en: "The children are playing in the park.", example_ru: "Дети играют в парке.", example_uk: "Діти граються в парку." }
  - { de: "hören", ipa: "ˈhøːʁən", pos: verb, partizip2: "gehört", aux: haben, praesens_3sg: "hört", en: "to hear; to listen to", ru: "слышать; слушать", uk: "чути; слухати", example_de: "Ich höre gern Musik.", example_en: "I like listening to music.", example_ru: "Я люблю слушать музыку.", example_uk: "Я люблю слухати музику." }
  - { de: "wandern", ipa: "ˈvandɐn", pos: verb, partizip2: "gewandert", aux: sein, praesens_3sg: "wandert", en: "to hike", ru: "ходить в поход; гулять по горам", uk: "ходити в похід; мандрувати пішки", example_de: "Wir wandern am Sonntag.", example_en: "We are going hiking on Sunday.", example_ru: "В воскресенье мы идём в поход.", example_uk: "У неділю ми йдемо в похід." }
  - { de: "malen", ipa: "ˈmaːlən", pos: verb, partizip2: "gemalt", aux: haben, praesens_3sg: "malt", en: "to paint; to draw", ru: "рисовать", uk: "малювати", example_de: "Anna malt gern.", example_en: "Anna likes painting.", example_ru: "Анна любит рисовать.", example_uk: "Анна любить малювати." }
  - { de: "fotografieren", ipa: "fotogʁaˈfiːʁən", pos: verb, partizip2: "fotografiert", aux: haben, praesens_3sg: "fotografiert", en: "to take photos", ru: "фотографировать", uk: "фотографувати", example_de: "Er fotografiert gern.", example_en: "He likes taking photos.", example_ru: "Он любит фотографировать.", example_uk: "Він любить фотографувати.", note: { en: "-ieren verbs build the Partizip II without ge-: fotografiert.", ru: "Глаголы на -ieren образуют Partizip II без ge-: fotografiert.", uk: "Дієслова на -ieren утворюють Partizip II без ge-: fotografiert." } }
  - { de: "gern", ipa: "ˈgɛʁn", pos: adv, en: "gladly, willingly", ru: "охотно, с удовольствием", uk: "охоче, залюбки", accept: ["gerne"], example_de: "Was machst du gern?", example_en: "What do you like doing?", example_ru: "Что ты любишь делать?", example_uk: "Що ти любиш робити?", note: { en: "gern stands after the conjugated verb: Ich spiele gern Fußball. gerne is an equally correct variant.", ru: "gern стоит после спрягаемого глагола: Ich spiele gern Fußball. gerne — равноправный вариант.", uk: "gern стоїть після відмінюваного дієслова: Ich spiele gern Fußball. gerne — рівноправний варіант." } }
  - { de: "lieber", ipa: "ˈliːbɐ", pos: adv, en: "rather, preferably", ru: "охотнее, предпочтительнее", uk: "охочіше, радше", example_de: "Ich schwimme gern, aber ich tanze lieber.", example_en: "I like swimming, but I prefer dancing.", example_ru: "Я люблю плавать, но танцевать мне нравится больше.", example_uk: "Я люблю плавати, але танцювати мені подобається більше.", note: { en: "lieber is the comparative of gern.", ru: "lieber — сравнительная степень от gern.", uk: "lieber — вищий ступінь від gern." } }
  - { de: "Hast du Zeit?", ipa: "hast du ˈtsaɪ̯t", pos: phrase, en: "Do you have time?", ru: "У тебя есть время?", uk: "У тебе є час?", example_de: "Hast du am Samstag Zeit?", example_en: "Do you have time on Saturday?", example_ru: "У тебя есть время в субботу?", example_uk: "У тебе є час у суботу?" }
  - { de: "Ja, gern!", ipa: "ˌjaː ˈgɛʁn", pos: phrase, en: "Yes, with pleasure!", ru: "Да, с удовольствием!", uk: "Так, залюбки!", example_de: "Gehen wir ins Kino? — Ja, gern!", example_en: "Shall we go to the cinema? — Yes, with pleasure!", example_ru: "Пойдём в кино? — Да, с удовольствием!", example_uk: "Підемо в кіно? — Так, залюбки!" }
  - { de: "Leider kann ich nicht.", pos: phrase, en: "Unfortunately I can't.", ru: "К сожалению, я не могу.", uk: "На жаль, я не можу.", example_de: "Kommst du am Freitag? — Leider kann ich nicht.", example_en: "Are you coming on Friday? — Unfortunately I can't.", example_ru: "Ты придёшь в пятницу? — К сожалению, я не могу.", example_uk: "Ти прийдеш у п'ятницю? — На жаль, я не можу." }
  - { de: "Gehen wir ins Kino?", pos: phrase, en: "Shall we go to the cinema?", ru: "Пойдём в кино?", uk: "Підемо в кіно?", example_de: "Gehen wir heute Abend ins Kino?", example_en: "Shall we go to the cinema this evening?", example_ru: "Пойдём сегодня вечером в кино?", example_uk: "Підемо сьогодні ввечері в кіно?", note: { en: "Gehen wir …? with the verb first is the standard way to suggest doing something together.", ru: "Gehen wir …? с глаголом на первом месте — стандартное предложение сделать что-то вместе.", uk: "Gehen wir …? з дієсловом на першому місці — стандартна пропозиція зробити щось разом." } }
  - { de: "Ball", ipa: "ˈbal", pos: noun, gender: m, plural: "die Bälle", en: "ball", ru: "мяч", uk: "м'яч", example_de: "Wir spielen mit dem Ball im Park.", example_en: "We play with the ball in the park.", example_ru: "Мы играем с мячом в парке.", example_uk: "Ми граємо з м'ячем у парку." }
  - { de: "Besuch", ipa: "bəˈzuːx", pos: noun, gender: m, plural: "die Besuche", en: "visit", ru: "визит; посещение", uk: "візит; відвідини", example_de: "Sein Besuch dauert eine Woche.", example_en: "His visit lasts one week.", example_ru: "Его визит длится неделю.", example_uk: "Його візит триває тиждень." }
  - { de: "Fest", ipa: "ˈfɛst", pos: noun, gender: n, plural: "die Feste", en: "festival; celebration", ru: "праздник", uk: "свято", example_de: "Am Wochenende ist ein großes Fest.", example_en: "There is a big celebration at the weekend.", example_ru: "На выходных большой праздник.", example_uk: "На вихідних велике свято." }
  - { de: "feiern", ipa: "ˈfaɪ̯ɐn", pos: verb, partizip2: "gefeiert", aux: haben, praesens_3sg: "feiert", en: "to celebrate", ru: "праздновать", uk: "святкувати", example_de: "Wir feiern seinen Geburtstag.", example_en: "We are celebrating his birthday.", example_ru: "Мы празднуем его день рождения.", example_uk: "Ми святкуємо його день народження." }
  - { de: "Spiel", ipa: "ˈʃpiːl", pos: noun, gender: n, plural: "die Spiele", en: "game", ru: "игра", uk: "гра", example_de: "Das Spiel ist sehr spannend.", example_en: "The game is very exciting.", example_ru: "Игра очень увлекательная.", example_uk: "Гра дуже захоплива." }
