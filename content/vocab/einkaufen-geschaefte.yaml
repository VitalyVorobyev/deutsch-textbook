id: einkaufen-geschaefte
title_de: "Einkaufen & Geschäfte"
title_en: "Shopping & shops"
title_ru: "Покупки и магазины"
title_uk: "Покупки та магазини"
level: A1
entries:
  - { de: "Einkauf", ipa: "ˈaɪ̯nˌkaʊ̯f", pos: noun, gender: m, plural: "die Einkäufe", en: "shopping trip; purchase", ru: "поход за покупками; покупка", uk: "похід за покупками; покупка", example_de: "Der Einkauf dauert eine Stunde.", example_en: "The shopping trip takes an hour.", example_ru: "Поход за покупками занимает час.", example_uk: "Похід за покупками триває годину." }
  - { de: "Geschäft", ipa: "gəˈʃɛft", pos: noun, gender: n, plural: "die Geschäfte", en: "shop; store", ru: "магазин", uk: "магазин; крамниця", example_de: "Das Geschäft ist in der Stadt.", example_en: "The shop is in the city.", example_ru: "Магазин находится в городе.", example_uk: "Магазин розташований у місті." }
  - { de: "Laden", ipa: "ˈlaːdn̩", pos: noun, gender: m, plural: "die Läden", en: "shop; store", ru: "магазин; лавка", uk: "крамниця; магазинчик", example_de: "Der Laden ist klein, aber gut.", example_en: "The shop is small but good.", example_ru: "Магазин маленький, но хороший.", example_uk: "Крамниця маленька, але хороша." }
  - { de: "Markt", ipa: "ˈmaʁkt", pos: noun, gender: m, plural: "die Märkte", en: "market", ru: "рынок", uk: "ринок", example_de: "Ich kaufe Obst auf dem Markt.", example_en: "I buy fruit at the market.", example_ru: "Я покупаю фрукты на рынке.", example_uk: "Я купую фрукти на ринку." }
  - { de: "Bäckerei", ipa: "bɛkəˈʁaɪ̯", pos: noun, gender: f, plural: "die Bäckereien", en: "bakery", ru: "булочная; пекарня", uk: "пекарня; булочна", example_de: "Die Bäckerei ist um die Ecke.", example_en: "The bakery is around the corner.", example_ru: "Булочная за углом.", example_uk: "Пекарня за рогом." }
  - { de: "Kiosk", ipa: "ˈkiːɔsk", pos: noun, gender: m, plural: "die Kioske", en: "kiosk; newsstand", ru: "киоск", uk: "кіоск", example_de: "Der Kiosk verkauft Zeitungen und Getränke.", example_en: "The kiosk sells newspapers and drinks.", example_ru: "Киоск продаёт газеты и напитки.", example_uk: "Кіоск продає газети й напої." }
  - { de: "Automat", ipa: "aʊ̯toˈmaːt", pos: noun, gender: m, plural: "die Automaten", en: "vending machine", ru: "автомат (торговый)", uk: "автомат (торговельний)", example_de: "Der Automat verkauft Kaffee und Snacks.", example_en: "The vending machine sells coffee and snacks.", example_ru: "Автомат продаёт кофе и снеки.", example_uk: "Автомат продає каву та снеки." }
  - { de: "offen", ipa: "ˈɔfn̩", pos: adj, en: "open", ru: "открытый", uk: "відчинений", example_de: "Der Laden ist heute offen.", example_en: "The shop is open today.", example_ru: "Магазин сегодня открыт.", example_uk: "Крамниця сьогодні відчинена." }
  - { de: "Öffnungszeiten", ipa: "ˈœfnʊŋsˌtsaɪ̯tn̩", pos: phrase, en: "opening hours", ru: "часы работы", uk: "години роботи", example_de: "Die Öffnungszeiten stehen an der Tür.", example_en: "The opening hours are posted on the door.", example_ru: "Часы работы указаны на двери.", example_uk: "Години роботи вказані на дверях." }
  - { de: "Kunde", ipa: "ˈkʊndə", pos: noun, gender: m, plural: "die Kunden", en: "customer (male)", ru: "клиент", uk: "клієнт; покупець", example_de: "Der Kunde sucht ein Geschenk.", example_en: "The customer is looking for a gift.", example_ru: "Клиент ищет подарок.", example_uk: "Клієнт шукає подарунок.", note: { en: "n-declension: der Kunde in the nominative, but den/dem/des Kunden in every other case.", ru: "Слабое склонение (n-Deklination): der Kunde в номинативе, но во всех остальных падежах Kunden.", uk: "Слабка відміна (n-Deklination): der Kunde у називному відмінку, але в усіх інших відмінках Kunden." } }
  - { de: "Kundin", ipa: "ˈkʊndɪn", pos: noun, gender: f, plural: "die Kundinnen", en: "customer (female)", ru: "клиентка", uk: "клієнтка; покупчиня", example_de: "Die Kundin trägt eine Tasche.", example_en: "The (female) customer is carrying a bag.", example_ru: "Покупательница несёт сумку.", example_uk: "Покупчиня несе сумку." }
  - { de: "Verkäufer", ipa: "fɛɐ̯ˈkɔʏ̯fɐ", pos: noun, gender: m, plural: "die Verkäufer", en: "salesman; shop assistant", ru: "продавец", uk: "продавець", example_de: "Der Verkäufer ist sehr freundlich.", example_en: "The shop assistant is very friendly.", example_ru: "Продавец очень приветливый.", example_uk: "Продавець дуже привітний." }
  - { de: "Verkäuferin", ipa: "fɛɐ̯ˈkɔʏ̯fəʁɪn", pos: noun, gender: f, plural: "die Verkäuferinnen", en: "saleswoman; shop assistant", ru: "продавщица", uk: "продавчиня", example_de: "Die Verkäuferin arbeitet im Geschäft.", example_en: "The shop assistant works in the store.", example_ru: "Продавщица работает в магазине.", example_uk: "Продавчиня працює в магазині." }
  - { de: "verkaufen", ipa: "fɛɐ̯ˈkaʊ̯fn̩", pos: verb, en: "to sell", ru: "продавать", uk: "продавати", example_de: "Die Verkäuferin verkauft Obst und Gemüse.", example_en: "The shop assistant sells fruit and vegetables.", example_ru: "Продавщица продаёт фрукты и овощи.", example_uk: "Продавчиня продає фрукти й овочі.", partizip2: "verkauft", aux: "haben", praesens_3sg: "verkauft" }
  - { de: "kaufen", ipa: "ˈkaʊ̯fn̩", pos: verb, en: "to buy", ru: "покупать", uk: "купувати", example_de: "Ich kaufe Brot in der Bäckerei.", example_en: "I buy bread at the bakery.", example_ru: "Я покупаю хлеб в булочной.", example_uk: "Я купую хліб у пекарні.", partizip2: "gekauft", aux: "haben", praesens_3sg: "kauft" }
  - { de: "Angebot", ipa: "ˈangəˌboːt", pos: noun, gender: n, plural: "die Angebote", en: "offer; special deal", ru: "предложение; акция", uk: "пропозиція; акція", example_de: "Der Kiosk hat heute ein Angebot.", example_en: "The kiosk has a special offer today.", example_ru: "У киоска сегодня акция.", example_uk: "У кіоску сьогодні акція." }
  - { de: "Tasche", ipa: "ˈtaʃə", pos: noun, gender: f, plural: "die Taschen", en: "bag", ru: "сумка", uk: "сумка", example_de: "Ich habe eine Tasche für den Einkauf.", example_en: "I have a bag for the shopping.", example_ru: "У меня есть сумка для покупок.", example_uk: "У мене є сумка для покупок." }
  - { de: "Tüte", ipa: "ˈtyːtə", pos: noun, gender: f, plural: "die Tüten", en: "bag (paper or plastic)", ru: "пакет", uk: "пакет", example_de: "Die Tüte ist aus Papier.", example_en: "The bag is made of paper.", example_ru: "Пакет бумажный.", example_uk: "Пакет паперовий." }
  - { de: "Dose", ipa: "ˈdoːzə", pos: noun, gender: f, plural: "die Dosen", en: "can; tin", ru: "банка (консервная)", uk: "бляшанка; консервна банка", example_de: "Die Dose Tomaten kostet einen Euro.", example_en: "The can of tomatoes costs one euro.", example_ru: "Банка помидоров стоит один евро.", example_uk: "Бляшанка помідорів коштує один євро." }
  - { de: "Packung", ipa: "ˈpakʊŋ", pos: noun, gender: f, plural: "die Packungen", en: "pack; package", ru: "упаковка; пачка", uk: "упаковка; пачка", example_de: "Ich kaufe eine Packung Reis.", example_en: "I buy a package of rice.", example_ru: "Я покупаю пачку риса.", example_uk: "Я купую пачку рису." }
  - { de: "Gramm", ipa: "ˈgʁam", pos: noun, gender: n, plural: "die Gramm", en: "gram", ru: "грамм", uk: "грам", example_de: "Ich kaufe zweihundert Gramm Käse.", example_en: "I buy two hundred grams of cheese.", example_ru: "Я покупаю двести граммов сыра.", example_uk: "Я купую двісті грамів сиру.", note: { en: "Gramm stays unchanged after a number: zweihundert Gramm, not Gramme. Liter behaves the same way.", ru: "После числительного Gramm не меняется: zweihundert Gramm, а не Gramme. Liter ведёт себя так же.", uk: "Після числівника Gramm не змінюється: zweihundert Gramm, а не Gramme. Liter поводиться так само." } }
  - { de: "Liter", ipa: "ˈliːtɐ", pos: noun, gender: m, plural: "die Liter", en: "liter", ru: "литр", uk: "літр", example_de: "Ich trinke zwei Liter Wasser am Tag.", example_en: "I drink two liters of water a day.", example_ru: "Я пью два литра воды в день.", example_uk: "Я п'ю два літри води на день." }
  - { de: "Banane", ipa: "baˈnaːnə", pos: noun, gender: f, plural: "die Bananen", en: "banana", ru: "банан", uk: "банан", example_de: "Ich kaufe drei Bananen.", example_en: "I buy three bananas.", example_ru: "Я покупаю три банана.", example_uk: "Я купую три банани." }
  - { de: "Orange", ipa: "oˈʁɑ̃ːʒə", pos: noun, gender: f, plural: "die Orangen", en: "orange", ru: "апельсин", uk: "апельсин", example_de: "Die Orangen sind süß.", example_en: "The oranges are sweet.", example_ru: "Апельсины сладкие.", example_uk: "Апельсини солодкі." }
  - { de: "Tomate", ipa: "toˈmaːtə", pos: noun, gender: f, plural: "die Tomaten", en: "tomato", ru: "помидор", uk: "помідор", example_de: "Die Tomate ist rot und frisch.", example_en: "The tomato is red and fresh.", example_ru: "Помидор красный и свежий.", example_uk: "Помідор червоний і свіжий." }
  - { de: "Kuchen", ipa: "ˈkuːxn̩", pos: noun, gender: m, plural: "die Kuchen", en: "cake", ru: "торт; пирог", uk: "пиріг; торт", example_de: "Der Kuchen aus der Bäckerei schmeckt gut.", example_en: "The cake from the bakery tastes good.", example_ru: "Пирог из булочной вкусный.", example_uk: "Пиріг із пекарні смачний." }
  - { de: "Schokolade", ipa: "ʃokoˈlaːdə", pos: noun, gender: f, plural: "die Schokoladen", en: "chocolate", ru: "шоколад", uk: "шоколад", example_de: "Ich esse gern Schokolade.", example_en: "I like eating chocolate.", example_ru: "Я люблю шоколад.", example_uk: "Я залюбки їм шоколад." }
  - { de: "Eis", ipa: "ˈaɪ̯s", pos: noun, gender: n, plural: "—", en: "ice cream", ru: "мороженое", uk: "морозиво", example_de: "Im Sommer esse ich gern Eis.", example_en: "In summer I like eating ice cream.", example_ru: "Летом я люблю мороженое.", example_uk: "Улітку я залюбки їм морозиво." }
