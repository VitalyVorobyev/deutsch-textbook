# Goethe-A2 Wortliste completion deck — deliberately **unowned by any topic**.
#
# It drains the chunk/Floskel tail of the `funktionswoerter-chunks` section of
# data/goethe-a2-wortliste.txt: the set phrases (zum Beispiel, auf jeden Fall),
# the everyday "state" chunks built on sein (Das Licht ist an. Der Laden ist zu.),
# and the greeting/politeness nouns (die Bitte, der Dank, der Gruß, Bescheid).
# No A2 topic lists it in `vocab:` — listing it would gate its fresh cards on that
# topic having been opened, and these words belong to the whole level, not to one
# lesson. Its cards are released by the learner's level instead.
id: redemittel-chunks-a2
title_de: "Redemittel & feste Wendungen"
title_en: "Set phrases & fixed expressions"
title_ru: "Речевые формулы и устойчивые обороты"
title_uk: "Мовленнєві звороти та сталі вирази"
level: A2
entries:
  - de: zum Beispiel
    ipa: "tsʊm ˈbaɪ̯ʃpiːl"
    pos: phrase
    en: for example
    ru: например
    uk: наприклад
    example_de: Ich treibe gern Sport, zum Beispiel Schwimmen und Radfahren.
    example_en: I like doing sport, for example swimming and cycling.
    example_ru: Я люблю спорт, например плавание и велосипед.
    example_uk: Я люблю спорт, наприклад плавання та велосипед.
    note:
      en: 'Abbreviated z. B. in writing, and always spoken out in full.'
      ru: 'На письме сокращается до z. B., но вслух всегда произносится полностью.'
      uk: 'На письмі скорочується до z. B., але вголос завжди вимовляється повністю.'

  - de: Bitte
    ipa: "ˈbɪtə"
    pos: noun
    gender: f
    plural: "die Bitten"
    en: request, favour
    ru: просьба
    uk: прохання
    example_de: "Ich habe eine Bitte an dich: Kannst du mich morgen abholen?"
    example_en: "I have a favour to ask you: could you pick me up tomorrow?"
    example_ru: "У меня к тебе просьба: ты можешь меня завтра забрать?"
    example_uk: "У мене до тебе прохання: ти можеш мене завтра забрати?"
    note:
      en: 'Capitalized die Bitte is a noun — a request you make of someone (eine Bitte an jemanden haben). It is NOT the little word bitte ("please"), which is a particle and is taught in its own deck. Same letters, different word class.'
      ru: 'С большой буквы die Bitte — существительное «просьба» (eine Bitte an jemanden haben). Это НЕ словечко bitte («пожалуйста»): то — частица, и она изучается в другой колоде. Буквы те же, часть речи другая.'
      uk: 'З великої літери die Bitte — іменник «прохання» (eine Bitte an jemanden haben). Це НЕ словечко bitte («будь ласка»): те — частка, і вона вивчається в іншій колоді. Літери ті самі, частина мови інша.'

  - de: Dank
    ipa: "ˈdaŋk"
    pos: noun
    gender: m
    plural: "—"
    en: thanks, gratitude
    ru: благодарность
    uk: подяка
    example_de: Vielen Dank für Ihre Hilfe!
    example_en: Many thanks for your help!
    example_ru: Большое спасибо за Вашу помощь!
    example_uk: Щиро дякую за Вашу допомогу!
    note:
      en: 'Capitalized der Dank is a noun ("gratitude"), and in practice it lives almost only inside two fixed phrases: Vielen Dank! and Herzlichen Dank! It is NOT the verb form danke ("thank you"), which is taught in its own deck. Note the accusative: it is Vielen Dank, never "Vieler Dank".'
      ru: 'С большой буквы der Dank — существительное «благодарность», и живёт оно на практике почти только в двух готовых оборотах: Vielen Dank! и Herzlichen Dank! Это НЕ глагольная форма danke («спасибо»), которая изучается в другой колоде. Обратите внимание на Akkusativ: говорят Vielen Dank, а не «Vieler Dank».'
      uk: 'З великої літери der Dank — іменник «подяка», і живе він на практиці майже тільки у двох готових зворотах: Vielen Dank! і Herzlichen Dank! Це НЕ дієслівна форма danke («дякую»), яка вивчається в іншій колоді. Зверніть увагу на Akkusativ: кажуть Vielen Dank, а не «Vieler Dank».'

  - de: Gruß
    ipa: "ˈgʁuːs"
    pos: noun
    gender: m
    plural: "die Grüße"
    en: greeting, regards
    ru: привет, приветствие
    uk: вітання, привіт
    example_de: Viele Grüße aus Berlin!
    example_en: Greetings from Berlin!
    example_ru: Привет из Берлина!
    example_uk: Вітання з Берліна!
    note:
      en: 'The plural closes a letter or an e-mail: Viele Grüße or Liebe Grüße among friends, Mit freundlichen Grüßen in a formal message.'
      ru: 'Множественное число служит подписью в письме или e-mail: Viele Grüße или Liebe Grüße между друзьями, Mit freundlichen Grüßen — в официальном письме.'
      uk: 'Множина слугує підписом у листі чи e-mail: Viele Grüße або Liebe Grüße між друзями, Mit freundlichen Grüßen — в офіційному листі.'

  - de: herzlich
    ipa: "ˈhɛʁtslɪç"
    pos: adj
    en: warm, cordial; warmly
    ru: сердечный; сердечно, тепло
    uk: сердечний; сердечно, тепло
    example_de: Der Chef hat die neuen Kollegen herzlich begrüßt.
    example_en: The boss gave the new colleagues a warm welcome.
    example_ru: Начальник тепло поприветствовал новых коллег.
    example_uk: Начальник тепло привітав нових колег.
    note:
      en: 'It carries the warmth in a whole family of set phrases: Herzlichen Dank! Herzlichen Glückwunsch! Herzlich willkommen!'
      ru: 'Именно это слово придаёт теплоту целому ряду формул: Herzlichen Dank! Herzlichen Glückwunsch! Herzlich willkommen!'
      uk: 'Саме це слово надає теплоти цілій низці формул: Herzlichen Dank! Herzlichen Glückwunsch! Herzlich willkommen!'

  - de: hoffentlich
    ipa: "ˈhɔfn̩tlɪç"
    pos: adv
    en: hopefully, I hope
    ru: надеюсь; будем надеяться
    uk: сподіваюся; будемо сподіватися
    example_de: Hoffentlich regnet es am Wochenende nicht.
    example_en: Hopefully it won't rain at the weekend.
    example_ru: Надеюсь, в выходные не будет дождя.
    example_uk: Сподіваюся, на вихідних не буде дощу.
    note:
      en: 'One word does the work of a whole clause. And it is an adverb, so if it opens the sentence the verb still comes second: Hoffentlich kommt sie bald.'
      ru: 'Одно слово заменяет целое придаточное. Это наречие, поэтому в начале предложения глагол всё равно остаётся на втором месте: Hoffentlich kommt sie bald.'
      uk: 'Одне слово замінює ціле підрядне. Це прислівник, тому на початку речення дієслово все одно лишається на другому місці: Hoffentlich kommt sie bald.'

  - de: an sein
    ipa: "ˈan zaɪ̯n"
    pos: phrase
    en: to be on (switched on)
    ru: быть включённым, работать (о приборе)
    uk: бути ввімкненим, працювати (про прилад)
    example_de: Das Licht im Bad ist noch an.
    example_en: The light in the bathroom is still on.
    example_ru: Свет в ванной ещё горит.
    example_uk: Світло у ванній ще горить.
    note:
      en: 'The everyday way to say a device is running: Der Fernseher ist an. Its opposite is aus sein. To switch it, use the separable verbs anmachen / ausmachen.'
      ru: 'Обиходный способ сказать, что прибор работает: Der Fernseher ist an. Противоположность — aus sein. Само переключение — отделяемые глаголы anmachen / ausmachen.'
      uk: 'Звичний спосіб сказати, що прилад працює: Der Fernseher ist an. Протилежність — aus sein. Саме перемикання — відокремлювані дієслова anmachen / ausmachen.'

  - de: aus sein
    ipa: "ˈaʊ̯s zaɪ̯n"
    pos: phrase
    en: to be off (switched off); to be over
    ru: быть выключенным; закончиться
    uk: бути вимкненим; закінчитися
    example_de: Der Computer ist schon aus.
    example_en: The computer is already off.
    example_ru: Компьютер уже выключен.
    example_uk: Комп’ютер уже вимкнено.
    note:
      en: 'Of a device it is the opposite of an sein. Of an event it means "over": Der Film ist aus.'
      ru: 'О приборе — противоположность an sein. О событии значит «закончился»: Der Film ist aus.'
      uk: 'Про прилад — протилежність an sein. Про подію означає «закінчився»: Der Film ist aus.'

  - de: auf sein
    ipa: "ˈaʊ̯f zaɪ̯n"
    pos: phrase
    en: to be open; to be up (out of bed)
    ru: быть открытым; быть на ногах (не в постели)
    uk: бути відчиненим; бути на ногах (не в ліжку)
    example_de: Die Bäckerei ist schon um sechs Uhr auf.
    example_en: The bakery is open as early as six o'clock.
    example_ru: Пекарня открыта уже в шесть утра.
    example_uk: Пекарня відчинена вже о шостій ранку.
    note:
      en: 'Of a shop, a door or a window, auf = open and zu = closed: Der Laden ist auf. This spoken pair replaces geöffnet / geschlossen, which is what the sign on the door says. Of a person, auf sein means to be up and about: Ich bin seit sechs auf.'
      ru: 'О магазине, двери или окне: auf = открыто, zu = закрыто — Der Laden ist auf. Эта разговорная пара заменяет geöffnet / geschlossen, которые пишут на табличке. О человеке auf sein значит «быть на ногах, уже встать»: Ich bin seit sechs auf.'
      uk: 'Про магазин, двері чи вікно: auf = відчинено, zu = зачинено — Der Laden ist auf. Ця розмовна пара замінює geöffnet / geschlossen, які пишуть на табличці. Про людину auf sein означає «бути на ногах, уже встати»: Ich bin seit sechs auf.'

  - de: zu sein
    ipa: "ˈtsuː zaɪ̯n"
    pos: phrase
    en: to be closed, to be shut
    ru: быть закрытым
    uk: бути зачиненим
    example_de: Am Sonntag sind die Geschäfte zu.
    example_en: On Sundays the shops are closed.
    example_ru: По воскресеньям магазины закрыты.
    example_uk: По неділях магазини зачинені.
    note:
      en: 'The everyday opposite of auf sein: Der Laden ist zu. Mach bitte das Fenster zu closes it (zumachen); ist zu describes the state.'
      ru: 'Обиходная противоположность auf sein: Der Laden ist zu. Mach bitte das Fenster zu — действие (zumachen); ist zu — состояние.'
      uk: 'Звична протилежність auf sein: Der Laden ist zu. Mach bitte das Fenster zu — дія (zumachen); ist zu — стан.'

  - de: weg sein
    ipa: "ˈvɛk zaɪ̯n"
    pos: phrase
    en: to be gone, to be missing; to be away
    ru: пропасть, исчезнуть; отсутствовать
    uk: зникнути, пропасти; бути відсутнім
    example_de: Mein Handy ist weg. Hast du es gesehen?
    example_en: My phone is gone. Have you seen it?
    example_ru: Мой телефон пропал. Ты его не видел?
    example_uk: Мій телефон зник. Ти його не бачив?
    note:
      en: 'Two everyday senses: a thing has vanished (Der Schlüssel ist weg) or a person is not here (Sie ist schon weg).'
      ru: 'Два обиходных значения: вещь пропала (Der Schlüssel ist weg) или человека нет на месте, он ушёл (Sie ist schon weg).'
      uk: 'Два звичні значення: річ зникла (Der Schlüssel ist weg) або людини немає на місці, вона пішла (Sie ist schon weg).'

  - de: dabei sein
    ipa: "daˈbaɪ̯ zaɪ̯n"
    pos: phrase
    en: to be there, to take part, to be in
    ru: быть с нами, участвовать
    uk: бути з нами, брати участь
    example_de: Am Samstag machen wir eine Wanderung. Bist du dabei?
    example_en: We're going on a hike on Saturday. Are you in?
    example_ru: В субботу мы идём в поход. Ты с нами?
    example_uk: У суботу ми йдемо в похід. Ти з нами?
    note:
      en: 'Either being present (Er war gestern nicht dabei) or joining in (Ich bin dabei!). Nothing follows it — the da- already stands for the plan just mentioned.'
      ru: 'Либо присутствовать (Er war gestern nicht dabei), либо участвовать (Ich bin dabei!). Дополнение после него не нужно: da- уже указывает на только что названный план.'
      uk: 'Або бути присутнім (Er war gestern nicht dabei), або брати участь (Ich bin dabei!). Додаток після нього не потрібен: da- уже вказує на щойно названий план.'

  - de: dafür sein
    ipa: "daˈfyːɐ̯ zaɪ̯n"
    pos: phrase
    en: to be in favour of it, to be for it
    ru: быть за (что-то)
    uk: бути за (щось)
    example_de: Wir wollen im Park grillen. Ich bin dafür!
    example_en: We want to have a barbecue in the park. I'm all for it!
    example_ru: Мы хотим устроить барбекю в парке. Я за!
    example_uk: Ми хочемо влаштувати барбекю в парку. Я за!
    note:
      en: 'Taking a side in a discussion: Ich bin dafür. The opposite is dagegen sein. The da- replaces the whole proposal, so no object follows — never "Ich bin dafür den Plan".'
      ru: 'Так занимают позицию в обсуждении: Ich bin dafür. Противоположность — dagegen sein. Частица da- заменяет всё предложение целиком, поэтому дополнения после неё нет — никогда «Ich bin dafür den Plan».'
      uk: 'Так займають позицію в обговоренні: Ich bin dafür. Протилежність — dagegen sein. Частка da- замінює всю пропозицію цілком, тому додатка після неї немає — ніколи «Ich bin dafür den Plan».'

  - de: dagegen sein
    ipa: "daˈgeːgn̩ zaɪ̯n"
    pos: phrase
    en: to be against it
    ru: быть против (чего-то)
    uk: бути проти (чогось)
    example_de: Meine Kollegen sind dagegen, aber ich finde die Idee gut.
    example_en: My colleagues are against it, but I think the idea is a good one.
    example_ru: Мои коллеги против, но мне идея нравится.
    example_uk: Мої колеги проти, але мені ідея подобається.
    note:
      en: 'The exact opposite of dafür sein, and used the same way — as a short, complete answer: Ich bin dagegen.'
      ru: 'Полная противоположность dafür sein и употребляется так же — как краткий, самодостаточный ответ: Ich bin dagegen.'
      uk: 'Повна протилежність dafür sein і вживається так само — як коротка, самодостатня відповідь: Ich bin dagegen.'

  - de: einverstanden sein
    ipa: "ˈaɪ̯nfɛɐ̯ˌʃtandn̩ zaɪ̯n"
    pos: phrase
    en: to agree, to be okay with something
    ru: быть согласным
    uk: бути згодним, погоджуватися
    example_de: Bist du mit dem Termin einverstanden?
    example_en: Are you okay with the appointment?
    example_ru: Ты согласен на эту дату?
    example_uk: Ти згоден на цю дату?
    note:
      en: 'What you agree with goes in the dative after mit: Ich bin mit dem Preis einverstanden. On its own, Einverstanden! is a complete "Agreed!"'
      ru: 'То, с чем вы согласны, идёт после mit в Dativ: Ich bin mit dem Preis einverstanden. Само по себе Einverstanden! — законченное «Договорились!»'
      uk: 'Те, з чим ви згодні, йде після mit у Dativ: Ich bin mit dem Preis einverstanden. Само по собі Einverstanden! — закінчене «Домовилися!»'

  - de: auf jeden Fall
    ipa: "aʊ̯f ˈjeːdn̩ ˈfal"
    pos: phrase
    en: definitely, in any case
    ru: обязательно, в любом случае
    uk: обов’язково, у будь-якому разі
    example_de: Ich komme auf jeden Fall zu deiner Party.
    example_en: I'll definitely come to your party.
    example_ru: Я обязательно приду на твою вечеринку.
    example_uk: Я обов’язково прийду на твою вечірку.
    note:
      en: 'Fall takes the accusative here (jeden, not jedem). If the phrase opens the sentence, the verb still comes second: Auf jeden Fall komme ich.'
      ru: 'Fall стоит здесь в Akkusativ (jeden, а не jedem). Если оборот открывает предложение, глагол всё равно на втором месте: Auf jeden Fall komme ich.'
      uk: 'Fall стоїть тут в Akkusativ (jeden, а не jedem). Якщо зворот відкриває речення, дієслово все одно на другому місці: Auf jeden Fall komme ich.'

  - de: auf keinen Fall
    ipa: "aʊ̯f ˈkaɪ̯nən ˈfal"
    pos: phrase
    en: on no account, absolutely not
    ru: ни в коем случае
    uk: у жодному разі
    example_de: Auf keinen Fall darfst du hier parken.
    example_en: You must not park here under any circumstances.
    example_ru: Здесь ни в коем случае нельзя парковаться.
    example_uk: Тут у жодному разі не можна паркуватися.
    note:
      en: 'The flat negative twin of auf jeden Fall. It is the strongest everyday "no" — stronger than a plain nicht.'
      ru: 'Отрицательный близнец оборота auf jeden Fall. Самое сильное обиходное «нет» — сильнее простого nicht.'
      uk: 'Заперечний близнюк звороту auf jeden Fall. Найсильніше звичне «ні» — сильніше за просте nicht.'

  - de: Bescheid
    ipa: "bəˈʃaɪ̯t"
    pos: noun
    gender: m
    plural: "—"
    en: information, notice
    ru: уведомление, известие
    uk: повідомлення, звістка
    example_de: Sag mir bitte Bescheid, wenn du ankommst.
    example_en: Please let me know when you arrive.
    example_ru: Дай мне, пожалуйста, знать, когда приедешь.
    example_uk: Дай мені, будь ласка, знати, коли приїдеш.
    note:
      en: 'Almost never used alone. It lives inside three verb phrases and takes no article in any of them: Bescheid sagen / Bescheid geben (to let someone know) and Bescheid wissen (to be in the know). The person you tell goes in the dative: Ich sage dir Bescheid.'
      ru: 'Почти не употребляется в одиночку. Живёт в трёх глагольных оборотах и ни в одном не берёт артикль: Bescheid sagen / Bescheid geben («сообщить») и Bescheid wissen («быть в курсе»). Тот, кому сообщают, стоит в Dativ: Ich sage dir Bescheid.'
      uk: 'Майже не вживається окремо. Живе у трьох дієслівних зворотах і в жодному не бере артикль: Bescheid sagen / Bescheid geben («повідомити») і Bescheid wissen («бути в курсі»). Той, кому повідомляють, стоїть у Dativ: Ich sage dir Bescheid.'

  - de: recht haben
    ipa: "ˈʁɛçt haːbn̩"
    pos: phrase
    en: to be right
    ru: быть правым
    uk: мати рацію
    example_de: Du hast recht, der Kurs beginnt erst um neun.
    example_en: You're right, the course doesn't start until nine.
    example_ru: Ты прав, курс начинается только в девять.
    example_uk: Ти маєш рацію, курс починається лише о дев’ятій.
    note:
      en: 'German HAS right, it does not BE right: Du hast recht — never "Du bist recht". The verb is haben, exactly as in Hunger haben, Durst haben or Angst haben, where English also reaches for "to be".'
      ru: 'Немецкий правоту «имеет», а не «есть»: Du hast recht — никогда «Du bist recht». Глагол haben, ровно как в Hunger haben, Durst haben, Angst haben, — а по-русски мы говорим «ты прав», через прилагательное. Это типичная ошибка.'
      uk: 'Німецька правоту «має», а не «є»: Du hast recht — ніколи «Du bist recht». Дієслово haben, так само як у Hunger haben, Durst haben, Angst haben. Українською тут зручна паралель: ми теж кажемо «мати рацію», через дієслово «мати», а не «бути».'

  - de: Wiederhören
    ipa: "ˈviːdɐˌhøːʁən"
    pos: noun
    gender: n
    plural: "—"
    en: hearing each other again (only in the phone goodbye)
    ru: новая встреча по телефону (только в формуле прощания)
    uk: нова розмова по телефону (тільки у формулі прощання)
    example_de: Vielen Dank für den Anruf. Auf Wiederhören!
    example_en: Thank you for your call. Goodbye!
    example_ru: Спасибо за звонок. До свидания!
    example_uk: Дякую за дзвінок. До побачення!
    note:
      en: 'The noun inside Auf Wiederhören! — the goodbye you use ON THE PHONE, literally "until we hear each other again". Face to face you say Auf Wiedersehen! (until we SEE each other again). Ending a call with Auf Wiedersehen is the classic slip: nobody has seen anybody.'
      ru: 'Существительное из формулы Auf Wiederhören! — прощание ПО ТЕЛЕФОНУ, буквально «до нового услышания». При личной встрече говорят Auf Wiedersehen! (до нового свидания). Закончить разговор по телефону словами Auf Wiedersehen — классическая ошибка: друг друга никто не видел.'
      uk: 'Іменник зі звороту Auf Wiederhören! — прощання ПО ТЕЛЕФОНУ, буквально «доки знову не почуємося». При особистій зустрічі кажуть Auf Wiedersehen! (доки знову не побачимося). Закінчити телефонну розмову словами Auf Wiedersehen — класична помилка: одне одного ніхто не бачив.'

