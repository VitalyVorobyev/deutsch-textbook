# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the person-describing
# adjectives of the personen-familie-gefuehle manifest section.
id: charakter-eigenschaften-a2
title_de: "Charakter & Aussehen"
title_en: "Character & appearance"
title_ru: "Характер и внешность"
title_uk: "Характер та зовнішність"
level: A2
entries:
  - de: jung
    ipa: "ˈjʊŋ"
    pos: adj
    en: young
    ru: молодой
    uk: молодий
    example_de: Unser neuer Kollege ist noch sehr jung.
    example_en: Our new colleague is still very young.
    example_ru: Наш новый коллега ещё совсем молодой.
    example_uk: Наш новий колега ще зовсім молодий.
    note:
      en: 'Comparison takes an umlaut: jung – jünger – am jüngsten. "My younger brother" is mein jüngerer Bruder.'
      ru: 'Степени сравнения с умлаутом: jung – jünger – am jüngsten. «Мой младший брат» — mein jüngerer Bruder.'
      uk: 'Ступені порівняння з умлаутом: jung – jünger – am jüngsten. «Мій молодший брат» — mein jüngerer Bruder.'
  - de: männlich
    ipa: "ˈmɛnlɪç"
    pos: adj
    en: male
    ru: мужской, мужского пола
    uk: чоловічий, чоловічої статі
    example_de: Auf dem Formular kreuzt er bei Geschlecht männlich an.
    example_en: On the form he ticks male under gender.
    example_ru: В анкете в графе «пол» он отмечает «мужской».
    example_uk: В анкеті у графі «стать» він позначає «чоловіча».
    note:
      en: 'männlich and weiblich are the category words — they belong on forms (Geschlecht: männlich/weiblich), in statistics and with animals. About a person you normally just say Mann or Frau, never "Er ist männlich" as a description.'
      ru: 'männlich и weiblich — слова-категории: они уместны в анкетах (Geschlecht: männlich/weiblich), в статистике и о животных. О человеке обычно просто говорят Mann или Frau, а не «Er ist männlich».'
      uk: 'männlich і weiblich — слова-категорії: вони доречні в анкетах (Geschlecht: männlich/weiblich), у статистиці та про тварин. Про людину зазвичай просто кажуть Mann або Frau, а не «Er ist männlich».'
  - de: weiblich
    ipa: "ˈvaɪ̯plɪç"
    pos: adj
    en: female
    ru: женский, женского пола
    uk: жіночий, жіночої статі
    example_de: Unsere Katze ist weiblich und heißt Mia.
    example_en: Our cat is female and her name is Mia.
    example_ru: Наша кошка женского пола, её зовут Мия.
    example_uk: Наша кішка жіночої статі, її звати Мія.
    note:
      en: 'The counterpart of männlich, and used the same way: on forms, in statistics, about animals. The b is written but spoken as a p, because it stands at the end of the syllable.'
      ru: 'Пара к männlich и употребляется так же: в анкетах, в статистике, о животных. Буква b пишется, но произносится как p, потому что стоит в конце слога.'
      uk: 'Пара до männlich і вживається так само: в анкетах, у статистиці, про тварин. Літера b пишеться, але вимовляється як p, бо стоїть у кінці складу.'
  - de: schwanger
    ipa: "ˈʃvaŋɐ"
    pos: adj
    en: pregnant
    ru: беременная
    uk: вагітна
    example_de: Meine Nachbarin ist schwanger und freut sich sehr.
    example_en: My neighbour is pregnant and very happy about it.
    example_ru: Моя соседка беременна и очень этому рада.
    example_uk: Моя сусідка вагітна і дуже цьому рада.
    note:
      en: 'schwanger is a plain adjective and needs nothing but sein: Sie ist schwanger. German builds no participle here — the change of state is schwanger werden (to get pregnant), and the month is added with im: Sie ist im vierten Monat schwanger.'
      ru: 'schwanger — обычное прилагательное, и кроме sein ему ничего не нужно: Sie ist schwanger. Никаких причастий: «забеременеть» — это schwanger werden, а срок добавляют через im: Sie ist im vierten Monat schwanger.'
      uk: 'schwanger — звичайний прикметник, і крім sein йому нічого не потрібно: Sie ist schwanger. Жодних дієприкметників: «завагітніти» — це schwanger werden, а термін додають через im: Sie ist im vierten Monat schwanger.'
  - de: aufregend
    ipa: "ˈaʊ̯fˌʁeːgn̩t"
    pos: adj
    en: exciting, thrilling
    ru: волнующий, захватывающий
    uk: хвилюючий, захопливий
    example_de: Die erste Woche in der neuen Stadt war aufregend.
    example_en: The first week in the new city was exciting.
    example_ru: Первая неделя в новом городе была полна впечатлений.
    example_uk: Перший тиждень у новому місті був сповнений вражень.
    note:
      en: 'aufregend describes the thing that stirs you up (eine aufregende Reise); aufgeregt describes the person who is stirred up (Ich bin ganz aufgeregt — I am all nervous). One verb, aufregen, but two adjectives that must not be swapped.'
      ru: 'aufregend — о том, что волнует (eine aufregende Reise); aufgeregt — о человеке, который взволнован (Ich bin ganz aufgeregt — «я весь на нервах»). Глагол один, aufregen, но прилагательных два, и путать их нельзя.'
      uk: 'aufregend — про те, що хвилює (eine aufregende Reise); aufgeregt — про людину, яка схвильована (Ich bin ganz aufgeregt — «я весь на нервах»). Дієслово одне, aufregen, але прикметників два, і плутати їх не можна.'
  - de: beliebt
    ipa: "bəˈliːpt"
    pos: adj
    en: popular, well-liked
    ru: популярный, любимый
    uk: популярний, улюблений
    example_de: Unser Mathelehrer ist bei allen Schülern beliebt.
    example_en: Our maths teacher is popular with all the pupils.
    example_ru: Нашего учителя математики любят все ученики.
    example_uk: Нашого вчителя математики люблять усі учні.
    note:
      en: 'The people who do the liking come in with bei + Dativ: beliebt bei den Kollegen, beliebt bei Kindern. beliebt says that people like something; bekannt only says that they know it.'
      ru: 'Те, кому нравится, вводятся через bei + Dativ: beliebt bei den Kollegen, beliebt bei Kindern. beliebt значит, что человека или вещь любят; bekannt лишь значит, что о них знают.'
      uk: 'Ті, кому подобається, вводяться через bei + Dativ: beliebt bei den Kollegen, beliebt bei Kindern. beliebt означає, що людину чи річ люблять; bekannt лише означає, що про них знають.'
  - de: berühmt
    ipa: "bəˈʁyːmt"
    pos: adj
    en: famous
    ru: знаменитый
    uk: знаменитий, славетний
    example_de: Diese Stadt ist berühmt für ihren Weihnachtsmarkt.
    example_en: This town is famous for its Christmas market.
    example_ru: Этот город знаменит своим рождественским рынком.
    example_uk: Це місто знамените своїм різдвяним ярмарком.
    note:
      en: 'berühmt (famous) is not bekannt (known): a film star is berühmt, while the woman at the bakery is bekannt because you see her every day. The reason for the fame follows berühmt für + Akkusativ.'
      ru: 'berühmt («знаменитый») — не то же, что bekannt («известный, знакомый»): кинозвезда berühmt, а женщина из булочной bekannt, потому что вы видите её каждый день. Причина славы вводится через berühmt für + Akkusativ.'
      uk: 'berühmt («знаменитий») — не те саме, що bekannt («відомий, знайомий»): кінозірка berühmt, а жінка з булочної bekannt, бо ви бачите її щодня. Причина слави вводиться через berühmt für + Akkusativ.'
  - de: bekannt
    ipa: "bəˈkant"
    pos: adj
    en: known, familiar
    ru: известный, знакомый
    uk: відомий, знайомий
    example_de: Ihr Gesicht ist mir bekannt, aber den Namen weiß ich nicht.
    example_en: Her face is familiar to me, but I do not know her name.
    example_ru: Её лицо мне знакомо, но имени я не знаю.
    example_uk: Її обличчя мені знайоме, але імені я не знаю.
    note:
      en: 'Two uses. "Known" about places and facts (Das Restaurant ist bekannt), and "familiar to somebody" with the Dativ (Das Lied ist mir bekannt). The noun ein Bekannter / eine Bekannte is an acquaintance — someone you know, but not a close friend. None of this is berühmt, which means famous.'
      ru: 'Два употребления. «Известный» о местах и фактах (Das Restaurant ist bekannt) и «знаком кому-то» с Dativ (Das Lied ist mir bekannt). Существительное ein Bekannter / eine Bekannte — «знакомый», а не близкий друг. И всё это не berühmt, которое значит «знаменитый».'
      uk: 'Два вживання. «Відомий» про місця й факти (Das Restaurant ist bekannt) і «знайомий комусь» з Dativ (Das Lied ist mir bekannt). Іменник ein Bekannter / eine Bekannte — «знайомий», а не близький друг. І все це не berühmt, яке означає «знаменитий».'
  - de: fleißig
    ipa: "ˈflaɪ̯sɪç"
    pos: adj
    en: hardworking, diligent
    ru: прилежный, трудолюбивый
    uk: старанний, працьовитий
    example_de: Meine Kollegin ist sehr fleißig und hilft immer gern.
    example_en: My colleague is very hardworking and always happy to help.
    example_ru: Моя коллега очень трудолюбивая и всегда охотно помогает.
    example_uk: Моя колега дуже працьовита й завжди охоче допомагає.
    note:
      en: 'fleißig is the standard compliment about work and study. It is not the English "busy" — that is beschäftigt, and it says nothing about how well somebody works. The opposite of fleißig is faul.'
      ru: 'fleißig — обычная похвала за работу и учёбу. Это не «занятый» (для этого есть beschäftigt): beschäftigt ничего не говорит о том, как человек работает. Противоположность fleißig — faul.'
      uk: 'fleißig — звичайна похвала за роботу й навчання. Це не «зайнятий» (для цього є beschäftigt): beschäftigt нічого не каже про те, як людина працює. Протилежність fleißig — faul.'
  - de: intelligent
    ipa: "ɪntɛliˈgɛnt"
    pos: adj
    en: intelligent, bright
    ru: умный, сообразительный
    uk: розумний, кмітливий
    example_de: Sie stellt immer intelligente Fragen.
    example_en: She always asks intelligent questions.
    example_ru: Она всегда задаёт умные вопросы.
    example_uk: Вона завжди ставить розумні запитання.
    note:
      en: 'intelligent and klug are close synonyms, but klug is the everyday German word and intelligent sounds a shade more technical. The stress falls on the last syllable: in-tel-li-GENT.'
      ru: 'intelligent и klug — почти синонимы, но klug — обычное разговорное слово, а intelligent звучит суховатее. Осторожно: немецкое intelligent значит «умный», а не «интеллигентный» (воспитанный, культурный). Ударение на последнем слоге: in-tel-li-GENT.'
      uk: 'intelligent і klug — майже синоніми, але klug — звичайне розмовне слово, а intelligent звучить сухіше. Обережно: німецьке intelligent означає «розумний», а не «інтелігентний» (вихований, культурний). Наголос на останньому складі: in-tel-li-GENT.'
  - de: komisch
    ipa: "ˈkoːmɪʃ"
    pos: adj
    en: strange, odd
    ru: странный
    uk: дивний
    example_de: Der Kuchen schmeckt komisch. Ist die Milch noch gut?
    example_en: The cake tastes odd. Is the milk still fresh?
    example_ru: Пирог странный на вкус. Молоко ещё не испортилось?
    example_uk: Пиріг дивний на смак. Молоко ще не зіпсувалося?
    note:
      en: 'A false friend. komisch almost always means "strange, odd", not "comical": Das ist komisch = "That is odd", and Mir ist komisch = "I feel funny", meaning slightly unwell. When you mean funny, the words are lustig and witzig.'
      ru: 'Ложный друг. komisch почти всегда значит «странный», а не «комичный»: Das ist komisch — «это странно», а Mir ist komisch — «мне как-то нехорошо». «Смешной» — это lustig или witzig.'
      uk: 'Оманливий друг. komisch майже завжди означає «дивний», а не «комічний»: Das ist komisch — «це дивно», а Mir ist komisch — «мені якось недобре». «Смішний» — це lustig або witzig.'
  - de: klug
    ipa: "ˈkluːk"
    pos: adj
    en: clever, smart
    ru: умный, разумный
    uk: розумний, кмітливий
    example_de: Das war eine kluge Entscheidung.
    example_en: That was a clever decision.
    example_ru: Это было умное решение.
    example_uk: Це було розумне рішення.
    note:
      en: 'klug is the everyday word for clever, and it fits people and decisions alike (ein kluger Mensch, eine kluge Idee). intelligent means much the same but sounds more formal. Comparison takes an umlaut: klug – klüger – am klügsten.'
      ru: 'klug — обычное слово для «умный», годится и о людях, и о решениях (ein kluger Mensch, eine kluge Idee). intelligent значит примерно то же, но звучит более книжно. Сравнение с умлаутом: klug – klüger – am klügsten.'
      uk: 'klug — звичайне слово для «розумний», годиться і про людей, і про рішення (ein kluger Mensch, eine kluge Idee). intelligent означає приблизно те саме, але звучить книжніше. Порівняння з умлаутом: klug – klüger – am klügsten.'
  - de: lustig
    ipa: "ˈlʊstɪç"
    pos: adj
    en: funny, cheerful, good fun
    ru: весёлый, забавный
    uk: веселий, кумедний
    example_de: Der Abend mit den Nachbarn war richtig lustig.
    example_en: The evening with the neighbours was really good fun.
    example_ru: Вечер с соседями получился очень весёлым.
    example_uk: Вечір із сусідами вийшов дуже веселий.
    note:
      en: 'lustig is about a cheerful, easy mood: a party, an evening, a person who is fun to be around. witzig is sharper — it means witty, the kind of funny that actually makes people laugh. Both are the right word where komisch (odd) is not.'
      ru: 'lustig — про весёлое, лёгкое настроение: вечеринка, вечер, человек, с которым весело. witzig острее — «остроумный», тот, кто по-настоящему смешит. Оба слова годятся там, где komisch («странный») не подходит.'
      uk: 'lustig — про веселий, легкий настрій: вечірка, вечір, людина, з якою весело. witzig гостріше — «дотепний», той, хто по-справжньому смішить. Обидва слова годяться там, де komisch («дивний») не підходить.'
  - de: nett
    ipa: "ˈnɛt"
    pos: adj
    en: nice, kind
    ru: милый, любезный
    uk: милий, люб’язний
    example_de: Das ist wirklich nett von dir, vielen Dank!
    example_en: That is really kind of you, thank you very much!
    example_ru: Это очень мило с твоей стороны, большое спасибо!
    example_uk: Це дуже мило з твого боку, велике спасибі!
    note:
      en: 'nett is about people and how they behave: ein netter Mensch, nett von dir, Sei nett zu ihm. A beautiful object is schön and a great one is toll — nett about a thing sounds faintly disappointed, roughly "nice enough, I suppose".'
      ru: 'nett — о людях и их поведении: ein netter Mensch, nett von dir, Sei nett zu ihm. Красивую вещь называют schön, а классную — toll; nett о предмете звучит сдержанно, почти как «ну, ничего так».'
      uk: 'nett — про людей і їхню поведінку: ein netter Mensch, nett von dir, Sei nett zu ihm. Гарну річ називають schön, а класну — toll; nett про предмет звучить стримано, майже як «ну, нічого так».'
  - de: schwach
    ipa: "ˈʃvax"
    pos: adj
    en: weak
    ru: слабый
    uk: слабкий
    example_de: Nach der Grippe war ich noch eine Woche lang schwach.
    example_en: After the flu I was still weak for a week.
    example_ru: После гриппа я ещё неделю чувствовал себя слабым.
    example_uk: Після грипу я ще тиждень почувався слабким.
    note:
      en: 'The opposite of stark, and it stretches to anything short of force: ein schwacher Kaffee, ein schwaches WLAN, schwache Augen. Comparison takes an umlaut: schwach – schwächer – am schwächsten.'
      ru: 'Противоположность stark, и значение растягивается на всё, чему не хватает силы: ein schwacher Kaffee («слабый кофе»), ein schwaches WLAN, schwache Augen. Сравнение с умлаутом: schwach – schwächer – am schwächsten.'
      uk: 'Протилежність stark, і значення розтягується на все, чому бракує сили: ein schwacher Kaffee («слабка кава»), ein schwaches WLAN, schwache Augen. Порівняння з умлаутом: schwach – schwächer – am schwächsten.'
  - de: stark
    ipa: "ˈʃtaʁk"
    pos: adj
    en: strong
    ru: сильный, крепкий
    uk: сильний, міцний
    example_de: Mein Bruder ist stark und trägt den Koffer allein.
    example_en: My brother is strong and carries the suitcase on his own.
    example_ru: Мой брат сильный и несёт чемодан сам.
    example_uk: Мій брат сильний і несе валізу сам.
    note:
      en: 'The opposite of schwach, and just as elastic: starker Kaffee, starke Schmerzen, starker Regen. On its own, Stark! is everyday praise — "Great!". Comparison takes an umlaut: stark – stärker – am stärksten.'
      ru: 'Противоположность schwach и такое же растяжимое: starker Kaffee («крепкий кофе»), starke Schmerzen («сильная боль»), starker Regen. Отдельным словом Stark! — обычная похвала: «Класс!». Сравнение с умлаутом: stark – stärker – am stärksten.'
      uk: 'Протилежність schwach і таке саме розтяжне: starker Kaffee («міцна кава»), starke Schmerzen («сильний біль»), starker Regen. Окремим словом Stark! — звичайна похвала: «Клас!». Порівняння з умлаутом: stark – stärker – am stärksten.'
  - de: sympathisch
    ipa: "zʏmˈpaːtɪʃ"
    pos: adj
    en: likeable, easy to get on with
    ru: приятный, располагающий к себе
    uk: приємний, симпатичний (у поведінці)
    example_de: Die neue Nachbarin ist mir gleich sympathisch.
    example_en: I took to the new neighbour straight away.
    example_ru: Новая соседка сразу мне понравилась.
    example_uk: Нова сусідка одразу мені сподобалася.
    note:
      en: 'A false friend: sympathisch means likeable, not "sympathetic" — somebody who feels for you is mitfühlend or verständnisvoll. It normally takes the Dativ of the person who feels the liking: Er ist mir sympathisch.'
      ru: 'Ложный друг: sympathisch значит «приятный, располагающий к себе», а не «симпатичный» о внешности — красивого человека называют hübsch или attraktiv. Обычно с Dativ того, кому человек приятен: Er ist mir sympathisch.'
      uk: 'Оманливий друг: sympathisch означає «приємний, той, що викликає симпатію», а не «симпатичний» про зовнішність — гарну людину називають hübsch або attraktiv. Зазвичай із Dativ того, кому людина приємна: Er ist mir sympathisch.'
  - de: witzig
    ipa: "ˈvɪtsɪç"
    pos: adj
    en: witty, funny
    ru: остроумный, смешной
    uk: дотепний, смішний
    example_de: Deine Schwester erzählt witzige Geschichten.
    example_en: Your sister tells witty stories.
    example_ru: Твоя сестра рассказывает остроумные истории.
    example_uk: Твоя сестра розповідає дотепні історії.
    note:
      en: 'witzig comes from der Witz (the joke): quick, clever, and genuinely making people laugh. lustig is broader and calmer — a cheerful mood rather than a sharp remark. Neither of the two is komisch, which means odd.'
      ru: 'witzig — от der Witz («шутка»): остроумный, тот, кто действительно смешит. lustig шире и спокойнее — скорее про весёлое настроение, чем про меткую реплику. И ни то ни другое не komisch, которое значит «странный».'
      uk: 'witzig — від der Witz («жарт»): дотепний, той, хто справді смішить. lustig ширше й спокійніше — радше про веселий настрій, ніж про влучну репліку. І ні те, ні інше не komisch, яке означає «дивний».'
  - de: faul
    ipa: "ˈfaʊ̯l"
    pos: adj
    en: lazy; rotten (of food)
    ru: ленивый; испорченный, гнилой (о продуктах)
    uk: лінивий; зіпсований, гнилий (про продукти)
    example_de: Am Sonntag bin ich faul und bleibe lange im Bett.
    example_en: On Sundays I am lazy and stay in bed for ages.
    example_ru: По воскресеньям я ленюсь и подолгу валяюсь в постели.
    example_uk: По неділях я лінуюся й довго вилежуюся в ліжку.
    note:
      en: 'Two senses, and the context decides. About a person, faul is "lazy" — the opposite of fleißig. About food, it is "rotten": ein fauler Apfel is one you throw away, not one that refuses to work.'
      ru: 'Два значения, и выбирает их контекст. О человеке faul — «ленивый», противоположность fleißig. О еде — «гнилой, испорченный»: ein fauler Apfel — яблоко, которое выбрасывают, а не ленивое яблоко.'
      uk: 'Два значення, і вибирає їх контекст. Про людину faul — «лінивий», протилежність fleißig. Про їжу — «гнилий, зіпсований»: ein fauler Apfel — яблуко, яке викидають, а не ліниве яблуко.'
  - de: streng
    ipa: "ˈʃtʁɛŋ"
    pos: adj
    en: strict
    ru: строгий
    uk: суворий
    example_de: Unsere Lehrerin ist streng, aber fair.
    example_en: Our teacher is strict but fair.
    example_ru: Наша учительница строгая, но справедливая.
    example_uk: Наша вчителька сувора, але справедлива.
    note:
      en: 'streng means strict: strenge Regeln, ein strenger Chef, streng mit sich selbst. It looks like the English "strong", and it is not — strong is stark.'
      ru: 'streng значит «строгий»: strenge Regeln, ein strenger Chef, streng mit sich selbst. Не путайте со stark («сильный»), на которое оно похоже.'
      uk: 'streng означає «суворий»: strenge Regeln, ein strenger Chef, streng mit sich selbst. Не плутайте зі stark («сильний»), на яке воно схоже.'
  - de: romantisch
    ipa: "ʁoˈmantɪʃ"
    pos: adj
    en: romantic
    ru: романтичный, романтический
    uk: романтичний
    example_de: Zum Geburtstag hat er ein romantisches Essen gekocht.
    example_en: For her birthday he cooked a romantic dinner.
    example_ru: На день рождения он приготовил романтический ужин.
    example_uk: На день народження він приготував романтичну вечерю.
    note:
      en: 'The stress sits on the middle syllable: ro-MAN-tisch. It works for films, evenings, places and people alike.'
      ru: 'Ударение на среднем слоге: ro-MAN-tisch. Годится и о фильмах, и о вечерах, и о местах, и о людях.'
      uk: 'Наголос на середньому складі: ro-MAN-tisch. Годиться і про фільми, і про вечори, і про місця, і про людей.'
  - de: aktiv
    ipa: "akˈtiːf"
    pos: adj
    en: active
    ru: активный
    uk: активний
    example_de: Meine Großmutter ist mit achtzig noch sehr aktiv.
    example_en: My grandmother is still very active at eighty.
    example_ru: Моей бабушке восемьдесят, и она всё ещё очень активна.
    example_uk: Моїй бабусі вісімдесят, і вона все ще дуже активна.
    note:
      en: 'The final -v is spoken like an f: aktiv sounds like "ak-TIEF", with the stress on the second syllable. As soon as an ending is added, the real v comes back: eine aktive Gruppe, ein aktives Leben.'
      ru: 'Конечное -v звучит как f: aktiv произносится «ак-ТИФ», ударение на втором слоге. Как только появляется окончание, возвращается звук v: eine aktive Gruppe, ein aktives Leben.'
      uk: 'Кінцеве -v звучить як f: aktiv вимовляється «ак-ТІФ», наголос на другому складі. Щойно з’являється закінчення, повертається звук v: eine aktive Gruppe, ein aktives Leben.'
  - de: arm
    ipa: "ˈaʁm"
    pos: adj
    en: poor (having little money)
    ru: бедный
    uk: бідний
    example_de: Die Familie ist arm, aber die Kinder sind glücklich.
    example_en: The family is poor, but the children are happy.
    example_ru: Семья бедная, но дети счастливые.
    example_uk: Сім’я бідна, але діти щасливі.
    note:
      en: 'Careful: arm and der Arm are two different words that are spelled and pronounced exactly alike, and only the capital letter and the article tell them apart. Lowercase arm is this adjective, "poor" (Die Familie ist arm, ein armes Land). Capitalized der Arm is the noun, the body part (Mein Arm tut weh, ich hebe den Arm). German capitalizes every noun, so the written form always shows which of the two you mean; in speech only the sentence does.'
      ru: 'Внимание: arm и der Arm — два разных слова, которые пишутся и произносятся совершенно одинаково, а различить их можно только по заглавной букве и артиклю. Со строчной буквы arm — это прилагательное «бедный» (Die Familie ist arm, ein armes Land). С заглавной der Arm — существительное «рука» (Mein Arm tut weh, ich hebe den Arm). В немецком все существительные пишутся с большой буквы, поэтому на письме всегда видно, о каком слове речь; в устной речи это показывает только предложение.'
      uk: 'Увага: arm і der Arm — два різні слова, які пишуться й вимовляються цілком однаково, а розрізнити їх можна лише за великою літерою та артиклем. З малої літери arm — це прикметник «бідний» (Die Familie ist arm, ein armes Land). З великої der Arm — іменник «рука» (Mein Arm tut weh, ich hebe den Arm). У німецькій усі іменники пишуться з великої літери, тому на письмі завжди видно, про яке слово йдеться; в усному мовленні це показує лише речення.'
  - de: dick
    ipa: "ˈdɪk"
    pos: adj
    en: thick; fat
    ru: толстый
    uk: товстий
    example_de: Im Winter trage ich eine dicke Jacke.
    example_en: In winter I wear a thick jacket.
    example_ru: Зимой я ношу толстую куртку.
    example_uk: Узимку я ношу товсту куртку.
    note:
      en: 'About things dick is simply "thick": ein dickes Buch, eine dicke Jacke, dicker Schnee. About a person it is blunt and can hurt; the polite words are kräftig and vollschlank. Its opposite is dünn.'
      ru: 'О вещах dick — просто «толстый»: ein dickes Buch, eine dicke Jacke, dicker Schnee. О человеке звучит грубовато; вежливые слова — kräftig и vollschlank. Противоположность — dünn.'
      uk: 'Про речі dick — просто «товстий»: ein dickes Buch, eine dicke Jacke, dicker Schnee. Про людину звучить грубувато; ввічливі слова — kräftig і vollschlank. Протилежність — dünn.'
  - de: dumm
    ipa: "ˈdʊm"
    pos: adj
    en: stupid, foolish
    ru: глупый
    uk: дурний, нерозумний
    example_de: Das war ein dummer Fehler, aber wir können ihn korrigieren.
    example_en: That was a stupid mistake, but we can fix it.
    example_ru: Это была глупая ошибка, но мы можем её исправить.
    example_uk: Це була дурна помилка, але ми можемо її виправити.
    note:
      en: 'Said about a person, dumm is an insult. It is far more common — and far safer — about a thing that went wrong: ein dummer Fehler, eine dumme Situation, Das ist dumm gelaufen (that turned out badly). Its opposite is klug.'
      ru: 'О человеке dumm — оскорбление. Гораздо чаще и безопаснее это слово говорят о неудачной вещи: ein dummer Fehler, eine dumme Situation, Das ist dumm gelaufen («не повезло»). Противоположность — klug.'
      uk: 'Про людину dumm — образа. Набагато частіше й безпечніше це слово кажуть про невдалу річ: ein dummer Fehler, eine dumme Situation, Das ist dumm gelaufen («не пощастило»). Протилежність — klug.'
  - de: dünn
    ipa: "ˈdʏn"
    pos: adj
    en: thin
    ru: тонкий; худой
    uk: тонкий; худий
    example_de: Die Jacke ist zu dünn für diesen Winter.
    example_en: The jacket is too thin for this winter.
    example_ru: Эта куртка слишком тонкая для такой зимы.
    example_uk: Ця куртка занадто тонка для такої зими.
    note:
      en: 'dünn is "thin" about things: paper, a jacket, a slice of bread. About a person the friendly word is schlank (slim) — dünn sounds more like a worry about their health. Its opposite is dick.'
      ru: 'dünn — «тонкий» о вещах: бумага, куртка, ломтик хлеба. О человеке лучше сказать schlank («стройный»): dünn звучит скорее как беспокойство о здоровье. Противоположность — dick.'
      uk: 'dünn — «тонкий» про речі: папір, куртка, скибка хліба. Про людину краще сказати schlank («стрункий»): dünn звучить радше як тривога за здоров’я. Протилежність — dick.'
  - de: freiwillig
    ipa: "ˈfʁaɪ̯vɪlɪç"
    pos: adj
    en: voluntary; voluntarily, of one's own accord
    ru: добровольный; добровольно
    uk: добровільний; добровільно
    example_de: Am Wochenende arbeitet sie freiwillig im Tierheim.
    example_en: At weekends she works at the animal shelter as a volunteer.
    example_ru: По выходным она добровольно работает в приюте для животных.
    example_uk: По вихідних вона добровільно працює в притулку для тварин.
    note:
      en: 'Built from frei (free) and der Wille (the will): doing something because you choose to, not because you have to. It doubles as the adverb "voluntarily" (Er kam freiwillig), and the noun ein Freiwilliger / eine Freiwillige is a volunteer.'
      ru: 'Составлено из frei («свободный») и der Wille («воля»): делать что-то по собственному желанию, а не по обязанности. Служит и наречием «добровольно» (Er kam freiwillig), а существительное ein Freiwilliger / eine Freiwillige значит «доброволец, волонтёр».'
      uk: 'Складено з frei («вільний») і der Wille («воля»): робити щось за власним бажанням, а не з обов’язку. Служить і прислівником «добровільно» (Er kam freiwillig), а іменник ein Freiwilliger / eine Freiwillige означає «доброволець, волонтер».'
  - de: vorsichtig
    ipa: "ˈfoːɐ̯zɪçtɪç"
    pos: adj
    en: careful, cautious
    ru: осторожный, осмотрительный
    uk: обережний, обачний
    example_de: Sei vorsichtig, die Tasse ist noch heiß!
    example_en: Be careful, the cup is still hot!
    example_ru: Осторожно, чашка ещё горячая!
    example_uk: Обережно, чашка ще гаряча!
    note:
      en: 'The warning called out on its own is the noun: Vorsicht! ("Look out!"). The adjective takes normal endings and doubles as the adverb: ein vorsichtiger Fahrer, fahr bitte vorsichtig. Note the spelling trap — vor- is written with v but spoken with an f.'
      ru: 'Само предупреждение — существительное: Vorsicht! («Осторожно!»). Прилагательное получает обычные окончания и служит также наречием: ein vorsichtiger Fahrer, fahr bitte vorsichtig. Ловушка в чтении: vor- пишется через v, но произносится как f.'
      uk: 'Саме попередження — іменник: Vorsicht! («Обережно!»). Прикметник отримує звичайні закінчення й служить також прислівником: ein vorsichtiger Fahrer, fahr bitte vorsichtig. Пастка у читанні: vor- пишеться через v, але вимовляється як f.'
