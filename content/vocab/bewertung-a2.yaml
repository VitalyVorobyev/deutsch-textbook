# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the evaluative
# adjectives and particles of the eigenschaften-bewertung / funktionswoerter sections.
id: bewertung-a2
title_de: "Bewerten & Meinung sagen"
title_en: "Evaluating & giving an opinion"
title_ru: "Оценка и мнение"
level: A2
entries:
  - de: super
    ipa: "ˈzuːpɐ"
    pos: adj
    en: great, super
    ru: супер, отличный
    example_de: Der Film war super — wir gehen nächste Woche noch einmal hin.
    example_en: The film was great — we are going again next week.
    example_ru: Фильм был супер — на следующей неделе сходим ещё раз.
    note:
      en: 'super never takes an ending, not even before a noun: ein super Film, eine super Idee. On its own it is the quickest way to praise something: Super! It is informal but friendly, and safe with colleagues.'
      ru: 'super не получает окончаний даже перед существительным: ein super Film, eine super Idee. Отдельным словом Super! — самый быстрый способ похвалить. Разговорное, но не грубое.'
  - de: total
    ipa: "toˈtaːl"
    pos: adv
    en: totally, completely
    ru: совершенно, полностью
    example_de: Meine neue Wohnung ist klein, aber ich bin total zufrieden.
    example_en: My new flat is small, but I am completely happy with it.
    example_ru: Моя новая квартира маленькая, но я полностью доволен.
    note:
      en: 'In everyday speech total is an intensifier in front of an adjective — "totally", much like sehr or ganz — and it takes no ending there: total müde, total nett, total langweilig. As a real adjective it means "complete" and does inflect: ein totales Chaos.'
      ru: 'В разговорной речи total — усилитель перед прилагательным («совершенно», как sehr): total müde, total nett, total langweilig; окончания не получает. Настоящее прилагательное total («полный») склоняется: ein totales Chaos.'
  - de: egal
    ipa: "eˈgaːl"
    pos: adj
    en: all the same, of no importance
    ru: всё равно, безразлично
    example_de: Kino oder Theater — das ist mir egal.
    example_en: Cinema or theatre — either is fine by me.
    example_ru: Кино или театр — мне всё равно.
    note:
      en: 'The person who does not mind stands in the Dativ: Das ist mir egal, Das ist ihm egal. "Ich bin egal" is a different (and unflattering) claim — it would mean that nobody cares about me. With a clause: Es ist mir egal, ob wir heute oder morgen gehen.'
      ru: 'Тот, кому всё равно, стоит в Dativ: Das ist mir egal, Das ist ihm egal. Сказать «Ich bin egal» нельзя — это значило бы «я никому не важен». С придаточным: Es ist mir egal, ob wir heute oder morgen gehen.'
  - de: klar
    ipa: "ˈklaːɐ̯"
    pos: adj
    en: clear, plain
    ru: ясный, понятный
    example_de: Die Erklärung im Kurs war kurz und klar.
    example_en: The explanation in the course was short and clear.
    example_ru: Объяснение на курсе было коротким и понятным.
    note:
      en: 'On its own, Klar! is an everyday way of agreeing: "Sure!", "Of course!" (Kommst du mit? — Klar!). The fixed question Alles klar? asks whether everything is understood, or simply whether all is well.'
      ru: 'Отдельным словом Klar! — обычное разговорное согласие: «Конечно!», «Ясно!» (Kommst du mit? — Klar!). Устойчивый вопрос Alles klar? значит «Всё понятно?» или просто «Всё в порядке?».'
  - de: natürlich
    ipa: "naˈtyːɐ̯lɪç"
    pos: adv
    en: of course, naturally
    ru: конечно, разумеется
    example_de: Natürlich helfe ich dir beim Umzug.
    example_en: Of course I will help you with the move.
    example_ru: Конечно, я помогу тебе с переездом.
    note:
      en: 'As an answer word natürlich means "of course". Fronted, it fills position 1, so the conjugated verb comes straight after it: Natürlich helfe ich dir — never "Natürlich ich helfe dir". The same word is also the adjective "natural": natürliches Licht.'
      ru: 'Как ответное слово natürlich значит «конечно». В начале предложения оно занимает первое место, поэтому глагол идёт сразу за ним: Natürlich helfe ich dir, но не «Natürlich ich helfe dir». То же слово — прилагательное «естественный»: natürliches Licht.'
  - de: sicher
    ipa: "ˈzɪçɐ"
    pos: adj
    en: sure, certain; safe
    ru: уверенный; безопасный
    example_de: Bist du sicher, dass der Kurs um sechs anfängt?
    example_en: Are you sure the course starts at six?
    example_ru: Ты уверен, что курс начинается в шесть?
    note:
      en: 'Two senses. Of a person it is "sure": Ich bin (mir) sicher. Of a thing it is "safe": Hier steht das Fahrrad sicher. Used adverbially it means "surely, no doubt" — Sicher kommt er noch says he is bound to turn up, not that he arrives safely.'
      ru: 'Два значения. О человеке — «уверен»: Ich bin (mir) sicher. О вещи — «безопасный»: Hier steht das Fahrrad sicher. В наречном употреблении — «наверняка»: Sicher kommt er noch («он наверняка ещё придёт»).'
  - de: spannend
    ipa: "ˈʃpanənt"
    pos: adj
    en: exciting, gripping
    ru: захватывающий, увлекательный
    example_de: Der Krimi gestern Abend im Fernsehen war sehr spannend.
    example_en: The crime drama on TV last night was very gripping.
    example_ru: Вчерашний детектив по телевизору был очень захватывающим.
    note:
      en: 'spannend is the exact opposite of langweilig and describes the thing, not the viewer: ein spannender Film, ein spannendes Spiel. A person who is excited is aufgeregt — "Ich bin spannend" would claim that other people find you gripping.'
      ru: 'spannend — прямая противоположность langweilig и описывает вещь, а не зрителя: ein spannender Film, ein spannendes Spiel. «Мне интересно» — это Ich finde es spannend; «Ich bin spannend» значит «я увлекателен для других».'
  - de: langweilig
    ipa: "ˈlaŋvaɪ̯lɪç"
    pos: adj
    en: boring, dull
    ru: скучный
    example_de: Der Film war lang und langweilig, nach einer Stunde sind wir gegangen.
    example_en: The film was long and boring; after an hour we walked out.
    example_ru: Фильм был длинный и скучный, через час мы ушли.
    note:
      en: 'langweilig describes the thing that bores you: ein langweiliger Film, ein langweiliger Abend. The bored person says Mir ist langweilig or Ich langweile mich — "Ich bin langweilig" means "I am a boring person".'
      ru: 'langweilig описывает то, что нагоняет скуку: ein langweiliger Film, ein langweiliger Abend. Тот, кому скучно, говорит Mir ist langweilig или Ich langweile mich; «Ich bin langweilig» означает «я скучный человек».'
  - de: interessant
    ipa: "ɪntəʁɛˈsant"
    pos: adj
    en: interesting
    ru: интересный
    example_de: Der Deutschkurs ist interessant, und die Lehrerin erklärt sehr gut.
    example_en: The German course is interesting, and the teacher explains things very well.
    example_ru: Курс немецкого интересный, и преподавательница объясняет очень хорошо.
    note:
      en: 'The thing is interessant; the person is interessiert: Ich bin an Geschichte interessiert. "Ich bin interessant" claims that other people find you fascinating — to say that something interests you, use Ich finde das interessant.'
      ru: 'Вещь — interessant, человек — interessiert: Ich bin an Geschichte interessiert («мне интересна история»). «Ich bin interessant» значит «я интересен другим», а не «мне интересно»; для этого — Ich finde das interessant.'
  - de: wunderbar
    ipa: "ˈvʊndɐˌbaːɐ̯"
    pos: adj
    en: wonderful, marvellous
    ru: чудесный, замечательный
    example_de: Die neue Wohnung hat einen wunderbaren Balkon.
    example_en: The new flat has a wonderful balcony.
    example_ru: В новой квартире чудесный балкон.
    note:
      en: 'wunderbar is warm praise — a step above gut, a little calmer than fantastisch. Before a noun it takes the normal adjective endings: ein wunderbarer Abend, einen wunderbaren Balkon.'
      ru: 'wunderbar — тёплая похвала: сильнее, чем gut, но спокойнее, чем fantastisch. Перед существительным получает обычные окончания прилагательного: ein wunderbarer Abend, einen wunderbaren Balkon.'
  - de: blöd
    ipa: "ˈbløːt"
    pos: adj
    en: stupid, annoying (informal)
    ru: дурацкий, глупый (разг.)
    example_de: Es ist blöd, dass der Kurs am Samstag stattfindet.
    example_en: It is annoying that the course takes place on a Saturday.
    example_ru: Обидно, что курс проходит в субботу.
    note:
      en: 'blöd is informal and mildly rude. About a thing or a situation it is fine among friends (ein blöder Film, so ein blöder Tag); aimed at a person it insults. It is not the English "blind" and has nothing to do with blood — the neutral words are dumm (stupid) and ärgerlich (annoying). In writing, or with a boss, say schade or ärgerlich instead.'
      ru: 'blöd — разговорное и грубоватое. О вещи или ситуации между друзьями звучит нормально (ein blöder Film, so ein blöder Tag), о человеке — оскорбительно. В письме или с начальником лучше schade или ärgerlich.'
  - de: echt
    ipa: "ˈɛçt"
    pos: adv
    en: really (informal intensifier); genuine
    ru: реально, правда (разг.); настоящий
    example_de: Das Essen in der Kantine ist echt gut.
    example_en: The food in the canteen is really good.
    example_ru: Еда в столовой правда вкусная.
    note:
      en: 'Two lives. As an adjective echt means "genuine, real": echtes Gold, eine echte Frage. In front of another adjective it turns into an informal intensifier, "really": echt gut, echt teuer, echt schade. The neutral intensifier is wirklich or sehr.'
      ru: 'Две жизни. Как прилагательное echt значит «настоящий, подлинный»: echtes Gold, eine echte Frage. Перед другим прилагательным становится разговорным усилителем «реально, правда»: echt gut, echt teuer, echt schade. Нейтральный усилитель — wirklich или sehr.'
  - de: falsch
    ipa: "ˈfalʃ"
    pos: adj
    en: wrong, incorrect
    ru: неправильный, неверный
    example_de: Meine Antwort war falsch, aber die Erklärung hat mir geholfen.
    example_en: My answer was wrong, but the explanation helped me.
    example_ru: Мой ответ был неправильным, но объяснение мне помогло.
    note:
      en: 'falsch is the opposite of richtig — not correct (eine falsche Antwort), and also "the wrong one" (der falsche Zug, im falschen Haus). Careful with people: ein falscher Freund is not a mistaken friend but a two-faced one.'
      ru: 'falsch — противоположность richtig: «неправильный» (eine falsche Antwort) и «не тот» (der falsche Zug, im falschen Haus). С людьми осторожно: ein falscher Freund — не «ошибочный друг», а двуличный человек.'
  - de: fantastisch
    ipa: "fanˈtastɪʃ"
    pos: adj
    en: fantastic, brilliant
    ru: потрясающий, великолепный
    example_de: Das Konzert gestern Abend war einfach fantastisch.
    example_en: The concert last night was simply fantastic.
    example_ru: Вчерашний концерт был просто великолепным.
    note:
      en: 'Strong praise — stronger than gut or schön, about as strong as toll and super. The cognate is safe, but the spelling is not: German writes fantastisch with f and ends it in -isch.'
      ru: 'Сильная похвала — сильнее gut и schön, примерно на уровне toll и super. Внимание к значению: русское «фантастический» часто указывает на жанр фантастики, а немецкое fantastisch — это оценка, «потрясающий». Жанр называется Science-Fiction.'
  - de: furchtbar
    ipa: "ˈfʊʁçtˌbaːɐ̯"
    pos: adj
    en: terrible, dreadful
    ru: ужасный, страшный
    example_de: Der Lärm von der Straße ist furchtbar.
    example_en: The noise from the street is dreadful.
    example_ru: Шум с улицы просто ужасный.
    note:
      en: 'furchtbar and schrecklich are near-synonyms and swap freely. Both also work as bare intensifiers, and there the "terrible" meaning disappears: furchtbar müde is just "dead tired", and someone can be furchtbar nett — terribly nice, which is a compliment.'
      ru: 'furchtbar и schrecklich — почти синонимы и свободно заменяют друг друга. Оба употребляются и как чистые усилители, и тогда значение ужаса пропадает: furchtbar müde — просто «страшно уставший», а furchtbar nett — «ужасно милый», то есть комплимент.'
  - de: gut
    ipa: "ˈguːt"
    pos: adj
    en: good; well
    ru: хороший; хорошо
    example_de: Der Kurs ist gut, aber der letzte war noch besser.
    example_en: The course is good, but the last one was even better.
    example_ru: Курс хороший, но прошлый был ещё лучше.
    note:
      en: 'gut compares irregularly: gut → besser → am besten. The word that introduces the comparison is als, never wie: Dieser Kurs ist besser als der letzte. The adverb "well" is the same form: Sie erklärt gut.'
      ru: 'Степени сравнения у gut нерегулярные: gut → besser → am besten. Сравнение вводится словом als, а не wie: Dieser Kurs ist besser als der letzte. Наречие «хорошо» — та же форма: Sie erklärt gut.'
  - de: hässlich
    ipa: "ˈhɛslɪç"
    pos: adj
    en: ugly
    ru: уродливый, некрасивый
    example_de: Das Haus ist alt und von außen ziemlich hässlich.
    example_en: The building is old and rather ugly from the outside.
    example_ru: Дом старый и снаружи довольно некрасивый.
    note:
      en: 'hässlich is the opposite of schön, and it is a hard word: about a building, a piece of furniture or the weather it is normal, about a person it is an insult. If a thing is merely not to your taste, say nicht schön.'
      ru: 'hässlich — противоположность schön и слово резкое: о доме, мебели или погоде звучит нормально, о человеке — как оскорбление. Если вещь просто «не очень», лучше сказать nicht schön.'
  - de: nützlich
    ipa: "ˈnʏtslɪç"
    pos: adj
    en: useful, helpful
    ru: полезный
    example_de: Die App ist wirklich nützlich, wenn man Vokabeln lernen will.
    example_en: The app is genuinely useful if you want to learn vocabulary.
    example_ru: Приложение действительно полезное, если хочешь учить слова.
    note:
      en: 'nützlich says that something does you good: ein nützlicher Tipp, ein nützliches Buch. Its opposite is nutzlos. Keep it apart from praktisch: praktisch praises how easy a thing is to handle, nützlich praises what it is good for.'
      ru: 'nützlich значит «приносящий пользу»: ein nützlicher Tipp, ein nützliches Buch. Противоположность — nutzlos. Не путать с praktisch: praktisch хвалит удобство в обращении, nützlich — пользу.'
  - de: praktisch
    ipa: "ˈpʁaktɪʃ"
    pos: adj
    en: practical, handy
    ru: удобный, практичный
    example_de: Die Wohnung ist klein, aber die Küche ist sehr praktisch.
    example_en: The flat is small, but the kitchen is very practical.
    example_ru: Квартира маленькая, но кухня очень удобная.
    note:
      en: 'praktisch praises how convenient something is to use: eine praktische Tasche, praktische Schuhe. As an adverb it also means "practically, almost": Die Arbeit ist praktisch fertig.'
      ru: 'praktisch хвалит удобство в использовании: eine praktische Tasche, praktische Schuhe. Как наречие значит ещё «практически, почти»: Die Arbeit ist praktisch fertig.'
  - de: richtig
    ipa: "ˈʁɪçtɪç"
    pos: adj
    en: correct, right
    ru: правильный, верный
    example_de: Deine Antwort war richtig, und die Aussprache war richtig gut.
    example_en: Your answer was correct, and your pronunciation was really good.
    example_ru: Твой ответ был правильным, а произношение — очень хорошим.
    note:
      en: 'Two jobs, both in the example. As an adjective richtig is "correct", the opposite of falsch: die richtige Antwort, der richtige Zug. In front of another adjective it becomes an intensifier, "really": richtig gut, richtig kalt, richtig müde.'
      ru: 'Две работы, обе в примере. Как прилагательное richtig — «правильный», противоположность falsch: die richtige Antwort, der richtige Zug. Перед другим прилагательным становится усилителем «прямо-таки, очень»: richtig gut, richtig kalt.'
  - de: schade
    ipa: "ˈʃaːdə"
    pos: adj
    en: a pity, a shame
    ru: жаль, досадно
    example_de: Schade, dass du am Freitag nicht mitkommen kannst!
    example_en: What a shame you cannot come along on Friday!
    example_ru: Жаль, что в пятницу ты не сможешь пойти с нами!
    note:
      en: 'schade voices regret — on its own (Schade!) or with a dass-clause, where the verb goes to the very end: Es ist schade, dass der Kurs schon zu Ende ist. It never stands in front of a noun; there is no "ein schades Buch".'
      ru: 'schade выражает сожаление — отдельным словом (Schade!) или с придаточным dass, где глагол уходит в самый конец: Es ist schade, dass der Kurs schon zu Ende ist. Перед существительным не ставится: «ein schades Buch» невозможно.'
  - de: schlecht
    ipa: "ˈʃlɛçt"
    pos: adj
    en: bad, poor (in quality)
    ru: плохой (по качеству)
    example_de: Der Film hat schlechte Kritiken bekommen, aber uns hat er gefallen.
    example_en: The film got bad reviews, but we liked it.
    example_ru: Фильм получил плохие отзывы, но нам он понравился.
    note:
      en: 'schlecht is bad quality — the plain opposite of gut: ein schlechter Film, schlechtes Wetter, schlecht schlafen. Do not reach for schlimm here: schlimm measures how serious something is, not how good it is. And note Das ist nicht schlecht is praise ("not bad at all"), while Das ist nicht schlimm means "no harm done".'
      ru: 'schlecht — «плохой» по качеству, прямая противоположность gut: ein schlechter Film, schlechtes Wetter, schlecht schlafen. Не путайте со schlimm: schlimm измеряет серьёзность, а не качество. Русское «плохо» покрывает оба слова — отсюда ошибка.'
  - de: schlimm
    ipa: "ˈʃlɪm"
    pos: adj
    en: serious, grave, bad (in consequences)
    ru: серьёзный, страшный (по последствиям)
    example_de: Ich habe den Termin vergessen. — Das ist nicht schlimm, wir machen einen neuen.
    example_en: I forgot the appointment. — Never mind, we will make a new one.
    example_ru: Я забыл про встречу. — Ничего страшного, договоримся о новой.
    note:
      en: 'schlimm asks how serious something is, not how good it is: ein schlimmer Fehler, eine schlimme Nachricht. The everyday reply Das ist nicht schlimm means "no harm done" and is one of the most useful phrases at A2 — it is not the same as Das ist nicht schlecht, which praises the quality of a thing.'
      ru: 'schlimm говорит о серьёзности, а не о качестве: ein schlimmer Fehler, eine schlimme Nachricht. Ответ Das ist nicht schlimm — «ничего страшного», один из самых нужных оборотов на A2. А Das ist nicht schlecht — это похвала качеству («неплохо»). Русское «плохой» переводится то как schlecht, то как schlimm, поэтому пару нужно разводить сознательно.'
  - de: schrecklich
    ipa: "ˈʃʁɛklɪç"
    pos: adj
    en: awful, horrible
    ru: ужасный, кошмарный
    example_de: Das Wetter im Urlaub war schrecklich — es hat jeden Tag geregnet.
    example_en: The weather on holiday was awful — it rained every single day.
    example_ru: Погода в отпуске была ужасная — дождь шёл каждый день.
    note:
      en: 'schrecklich and furchtbar mean the same thing and can be swapped. Like furchtbar it also serves as a plain intensifier: Es tut mir schrecklich leid. Save it for a real complaint — for a small mishap the German reflex is nicht schlimm.'
      ru: 'schrecklich и furchtbar значат одно и то же и легко заменяют друг друга. Как и furchtbar, слово работает просто усилителем: Es tut mir schrecklich leid («мне ужасно жаль»). Для мелкой неприятности немец скажет не schrecklich, а nicht schlimm.'
  - de: toll
    ipa: "ˈtɔl"
    pos: adj
    en: great, terrific
    ru: классный, здорово
    example_de: Du hast die Prüfung bestanden? Toll!
    example_en: You passed the exam? That is great!
    example_ru: Ты сдал экзамен? Здорово!
    note:
      en: 'toll is everyday praise, about as strong as super and a shade below fantastisch. Before a noun it inflects normally: ein toller Abend, eine tolle Idee. Informal but not rude — safe with colleagues.'
      ru: 'toll — обиходная похвала, по силе примерно как super и чуть слабее fantastisch. Перед существительным склоняется как обычно: ein toller Abend, eine tolle Idee. Разговорное, но не грубое — можно и с коллегами.'
  - de: wahr
    ipa: "ˈvaːɐ̯"
    pos: adj
    en: true (of a statement)
    ru: истинный, правдивый (о высказывании)
    example_de: Ist es wahr, dass der Kurs im Juli nicht stattfindet?
    example_en: Is it true that the course is not running in July?
    example_ru: Правда, что в июле курса не будет?
    note:
      en: 'wahr says that a statement matches the facts: eine wahre Geschichte, Das ist leider wahr. An answer or a form is not wahr but richtig (correct) — keep the two apart. The tag ..., nicht wahr? at the end of a sentence invites agreement, exactly like the English tag question in "The film was good, was it not?": Der Film war gut, nicht wahr?'
      ru: 'wahr значит, что высказывание соответствует действительности: eine wahre Geschichte, Das ist leider wahr. Ответ или заполненный бланк бывает не wahr, а richtig («правильный») — эти два слова нужно различать. Оборот ..., nicht wahr? в конце фразы приглашает согласиться: Der Film war gut, nicht wahr? — «правда ведь?».'
