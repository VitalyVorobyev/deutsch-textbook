id: biografie-erfahrungen
title_de: "Biografie & Erfahrungen"
title_en: "Life story & experience"
title_ru: "Биография и опыт"
title_uk: "Біографія та досвід"
level: A2
entries:
  - de: "Leben"
    ipa: "ˈleːbn̩"
    pos: noun
    gender: n
    plural: "die Leben"
    en: "life"
    ru: "жизнь"
    uk: "життя"
    example_de: "Mein Leben in Deutschland hat vor drei Jahren angefangen."
    example_en: "My life in Germany began three years ago."
    example_ru: "Моя жизнь в Германии началась три года назад."
    example_uk: "Моє життя в Німеччині почалося три роки тому."
    note:
      en: "The noun das Leben and the verb leben share a stem, so watch the capital letter: Ich lebe hier. — Das ist mein Leben."
      ru: "Существительное das Leben и глагол leben — одного корня, поэтому следите за заглавной буквой: Ich lebe hier. — Das ist mein Leben."
      uk: "Іменник das Leben і дієслово leben — одного кореня, тому стежте за великою літерою: Ich lebe hier. — Das ist mein Leben."

  - de: "Lebenslauf"
    ipa: "ˈleːbn̩sˌlaʊ̯f"
    pos: noun
    gender: m
    plural: "die Lebensläufe"
    en: "CV; the course of a life"
    ru: "биография; резюме"
    uk: "біографія; резюме"
    example_de: "In meinem Lebenslauf gibt es eine Pause von zwei Jahren."
    example_en: "There is a two-year gap in my CV."
    example_ru: "В моей биографии есть перерыв на два года."
    example_uk: "У моїй біографії є перерва на два роки."
    note:
      en: "Literally 'the run of a life'. It is both the document you send with an application and the story of the stages you have been through."
      ru: "Буквально «ход жизни». Это и документ, который прикладывают к заявлению, и сама история пройденных этапов."
      uk: "Буквально «плин життя». Це й документ, який додають до заяви, і сама історія пройдених етапів."

  - de: "Station"
    ipa: "ʃtaˈtsi̯oːn"
    pos: noun
    gender: f
    plural: "die Stationen"
    en: "stage, stop (in a life or on a journey)"
    ru: "этап; станция"
    uk: "етап; станція"
    example_de: "Jede Station in meinem Leben war wichtig."
    example_en: "Every stage in my life was important."
    example_ru: "Каждый этап в моей жизни был важен."
    example_uk: "Кожен етап у моєму житті був важливий."
    note:
      en: "A biography is told as a chain of Stationen: school, training, first job, the move abroad. The same word is also the stop on a bus or metro line."
      ru: "Биографию рассказывают как цепочку Stationen: школа, обучение, первая работа, переезд. Это же слово означает остановку автобуса или станцию метро."
      uk: "Біографію розповідають як ланцюжок Stationen: школа, навчання, перша робота, переїзд. Це саме слово означає зупинку автобуса або станцію метро."

  - de: "Erfahrung"
    ipa: "ɛɐ̯ˈfaːʁʊŋ"
    pos: noun
    gender: f
    plural: "die Erfahrungen"
    en: "experience"
    ru: "опыт"
    uk: "досвід"
    example_de: "Ich habe viel Erfahrung mit Kindern."
    example_en: "I have a lot of experience with children."
    example_ru: "У меня большой опыт работы с детьми."
    example_uk: "У мене великий досвід роботи з дітьми."
    note:
      en: "In the singular it is the experience you have gathered; in the plural, the individual things that happened to you: Ich habe gute Erfahrungen gemacht."
      ru: "В единственном числе — накопленный опыт; во множественном — отдельные пережитые случаи: Ich habe gute Erfahrungen gemacht («у меня был удачный опыт»)."
      uk: "В однині — накопичений досвід; у множині — окремі пережиті випадки: Ich habe gute Erfahrungen gemacht («у мене був вдалий досвід»)."

  - de: "Ausbildung"
    ipa: "ˈaʊ̯sˌbɪldʊŋ"
    pos: noun
    gender: f
    plural: "die Ausbildungen"
    en: "vocational training, apprenticeship"
    ru: "профессиональное обучение"
    uk: "професійне навчання"
    example_de: "Nach der Schule habe ich eine Ausbildung gemacht."
    example_en: "After school I did an apprenticeship."
    example_ru: "После школы я получил профессию."
    example_uk: "Після школи я здобув професію."
    note:
      en: "Not a university degree: an Ausbildung is two or three years of paid training in a company plus a vocational school. Going to university is studieren."
      ru: "Это не университет: Ausbildung — два-три года оплачиваемого обучения на предприятии плюс профучилище. Учиться в вузе — studieren."
      uk: "Це не університет: Ausbildung — два-три роки оплачуваного навчання на підприємстві плюс профтехучилище. Навчатися у виші — studieren."

  - de: "Abschluss"
    ipa: "ˈapʃlʊs"
    pos: noun
    gender: m
    plural: "die Abschlüsse"
    en: "qualification; final certificate"
    ru: "диплом; аттестат"
    uk: "диплом; атестат"
    example_de: "Für diese Stelle brauchen Sie einen Abschluss."
    example_en: "You need a qualification for this job."
    example_ru: "Для этой должности нужен диплом."
    example_uk: "Для цієї посади потрібен диплом."

  - de: "Kindheit"
    ipa: "ˈkɪnthaɪ̯t"
    pos: noun
    gender: f
    plural: "—"
    en: "childhood"
    ru: "детство"
    uk: "дитинство"
    example_de: "Meine Kindheit war sehr schön."
    example_en: "My childhood was very nice."
    example_ru: "Моё детство было очень счастливым."
    example_uk: "Моє дитинство було дуже щасливим."
    note:
      en: "Used in the singular only. The natural partner of war and hatte: In meiner Kindheit hatten wir kein Auto."
      ru: "Употребляется только в единственном числе. Естественный спутник war и hatte: In meiner Kindheit hatten wir kein Auto."
      uk: "Уживається лише в однині. Природний супутник war і hatte: In meiner Kindheit hatten wir kein Auto."

  - de: "Heimat"
    ipa: "ˈhaɪ̯maːt"
    pos: noun
    gender: f
    plural: "—"
    en: "home country; where somebody comes from"
    ru: "родина"
    uk: "батьківщина"
    example_de: "Vor fünf Jahren habe ich meine Heimat verlassen."
    example_en: "Five years ago I left my home country."
    example_ru: "Пять лет назад я покинул родину."
    example_uk: "П'ять років тому я покинув батьківщину."
    note:
      en: "Warmer than Land: the place you feel you come from, not the one on your passport. It has no plural."
      ru: "Теплее, чем Land: это место, откуда вы себя ведёте, а не то, что записано в паспорте. Множественного числа не имеет."
      uk: "Тепліше, ніж Land: це місце, звідки ви себе відчуваєте, а не те, що записано в паспорті. Множини не має."

  - de: "Muttersprache"
    ipa: "ˈmʊtɐˌʃpʁaːxə"
    pos: noun
    gender: f
    plural: "die Muttersprachen"
    en: "native language"
    ru: "родной язык"
    uk: "рідна мова"
    example_de: "Meine Muttersprache ist Polnisch."
    example_en: "My native language is Polish."
    example_ru: "Мой родной язык — польский."
    example_uk: "Моя рідна мова — польська."

  - de: "aufwachsen"
    ipa: "ˈaʊ̯fˌvaksn̩"
    pos: verb
    partizip2: "aufgewachsen"
    aux: sein
    praesens_3sg: "wächst auf"
    en: "to grow up"
    ru: "расти, вырасти (о человеке)"
    uk: "рости, вирости (про людину)"
    example_de: "Ich bin in einem Dorf aufgewachsen."
    example_en: "I grew up in a village."
    example_ru: "Я вырос в деревне."
    example_uk: "Я виріс у селі."
    note:
      en: "Separable, and it takes sein in the Perfekt: growing up is a change of state, so it follows the same rule as kommen and bleiben. In the present the prefix splits off — Sie wächst in Berlin auf."
      ru: "Отделяемый, а в Perfekt берёт sein: взросление — это переход из одного состояния в другое, поэтому правило то же, что у kommen и bleiben. В настоящем времени приставка отрывается: Sie wächst in Berlin auf."
      uk: "Відокремлюваний, а в Perfekt бере sein: дорослішання — це перехід з одного стану в інший, тому правило те саме, що в kommen і bleiben. У теперішньому часі префікс відривається: Sie wächst in Berlin auf."

  - de: "kennenlernen"
    ipa: "ˈkɛnənˌlɛʁnən"
    pos: verb
    partizip2: "kennengelernt"
    aux: haben
    praesens_3sg: "lernt kennen"
    valence: "+ Akk"
    en: "to get to know; to meet for the first time"
    ru: "познакомиться (с кем-л.)"
    uk: "познайомитися (з кимось)"
    example_de: "Wo hast du deine Frau kennengelernt?"
    example_en: "Where did you meet your wife?"
    example_ru: "Где ты познакомился с женой?"
    example_uk: "Де ти познайомився з дружиною?"
    note:
      en: "Separable, so the two halves come apart in the present: Ich lerne hier viele Leute kennen. In the Perfekt they stay together as one word: kennengelernt."
      ru: "Отделяемый, поэтому в настоящем времени половинки расходятся: Ich lerne hier viele Leute kennen. А в Perfekt они снова сливаются в одно слово: kennengelernt."
      uk: "Відокремлюваний, тому в теперішньому часі половинки розходяться: Ich lerne hier viele Leute kennen. А в Perfekt вони знову зливаються в одне слово: kennengelernt."

  - de: "verlassen"
    ipa: "fɛɐ̯ˈlasn̩"
    pos: verb
    partizip2: "verlassen"
    aux: haben
    praesens_3sg: "verlässt"
    valence: "+ Akk"
    en: "to leave (a place or a person)"
    ru: "покидать, уходить (откуда-л., от кого-л.)"
    uk: "покидати, залишати (звідкись, когось)"
    example_de: "Mit achtzehn habe ich mein Dorf verlassen."
    example_en: "At eighteen I left my village."
    example_ru: "В восемнадцать лет я уехал из своей деревни."
    example_uk: "У вісімнадцять років я поїхав зі свого села."
    note:
      en: "The prefix ver- is inseparable, so nothing splits off and the Partizip II has no ge-: Ich habe die Stadt verlassen. The verb always needs an object — you leave something, and gehen is what you do without one."
      ru: "Приставка ver- неотделяемая, поэтому ничего не отрывается, а Partizip II образуется без ge-: Ich habe die Stadt verlassen. Глаголу всегда нужно дополнение: покидают что-то или кого-то, а просто «уйти» — это gehen."
      uk: "Префікс ver- невідокремлюваний, тому нічого не відривається, а Partizip II утворюється без ge-: Ich habe die Stadt verlassen. Дієслову завжди потрібен додаток: покидають щось або когось, а просто «піти» — це gehen."

  - de: "damals"
    ipa: "ˈdaːmaːls"
    pos: adv
    en: "back then, at that time"
    ru: "тогда, в то время"
    uk: "тоді, у той час"
    example_de: "Damals war ich noch Student."
    example_en: "Back then I was still a student."
    example_ru: "Тогда я ещё был студентом."
    example_uk: "Тоді я ще був студентом."
    note:
      en: "damals points at one stretch of the past and is the natural partner of war, hatte and the modal Präteritum: Damals hatte ich kein Auto. Damals konnte ich kein Deutsch."
      ru: "damals указывает на определённый отрезок прошлого и естественно сочетается с war, hatte и Präteritum модальных: Damals hatte ich kein Auto. Damals konnte ich kein Deutsch."
      uk: "damals указує на певний відрізок минулого і природно поєднується з war, hatte і Präteritum модальних: Damals hatte ich kein Auto. Damals konnte ich kein Deutsch."

  - de: "früher"
    ipa: "ˈfʁyːɐ"
    pos: adv
    en: "in the past; formerly"
    ru: "раньше; в прошлом"
    uk: "раніше; у минулому"
    example_de: "Früher habe ich viel Sport gemacht."
    example_en: "In the past I did a lot of sport."
    example_ru: "Раньше я много занимался спортом."
    example_uk: "Раніше я багато займався спортом."
    note:
      en: "früher sets the past against today: Früher war alles anders. Heute ist es besser. It is also the comparative of früh (early), so the context decides: Ich stehe früher auf means I get up earlier."
      ru: "früher противопоставляет прошлое сегодняшнему дню: Früher war alles anders. Heute ist es besser. Это же слово — сравнительная степень от früh («рано»), и различает их контекст: Ich stehe früher auf значит «я встаю раньше»."
      uk: "früher протиставляє минуле сьогоднішньому дню: Früher war alles anders. Heute ist es besser. Це саме слово — вищий ступінь від früh («рано»), і розрізняє їх контекст: Ich stehe früher auf значить «я встаю раніше»."

  - de: "später"
    ipa: "ˈʃpɛːtɐ"
    pos: adv
    en: "later, afterwards"
    ru: "позже, потом"
    uk: "пізніше, потім"
    example_de: "Später habe ich meinen Mann kennengelernt."
    example_en: "Later I met my husband."
    example_ru: "Позже я познакомилась с мужем."
    example_uk: "Пізніше я познайомилася з чоловіком."
    note:
      en: "One of the five words that hold a life story together: zuerst, dann, danach, später, heute. Each of them fills position 1, so the verb comes straight after it."
      ru: "Одно из пяти слов, на которых держится рассказ о жизни: zuerst, dann, danach, später, heute. Каждое из них занимает первое место, поэтому глагол идёт сразу за ним."
      uk: "Одне з п'яти слів, на яких тримається розповідь про життя: zuerst, dann, danach, später, heute. Кожне з них займає перше місце, тому дієслово йде одразу за ним."

  - de: "Als Kind"
    ipa: "als ˈkɪnt"
    pos: phrase
    en: "as a child, when I was a child"
    ru: "в детстве"
    uk: "у дитинстві"
    example_de: "Als Kind war ich oft krank."
    example_en: "As a child I was often ill."
    example_ru: "В детстве я часто болел."
    example_uk: "У дитинстві я часто хворів."
    note:
      en: "Learn it as one fixed block and let war, hatte or a modal follow it: Als Kind hatte ich einen Hund. Als Kind konnte ich nicht schwimmen."
      ru: "Заучите как один готовый блок, за которым идёт war, hatte или модальный глагол: Als Kind hatte ich einen Hund. Als Kind konnte ich nicht schwimmen."
      uk: "Заучіть як один готовий блок, за яким іде war, hatte або модальне дієслово: Als Kind hatte ich einen Hund. Als Kind konnte ich nicht schwimmen."

  - de: "Damals hatte ich keine Zeit."
    pos: phrase
    en: "Back then I had no time."
    ru: "Тогда у меня не было времени."
    uk: "Тоді в мене не було часу."
    example_de: "Ich wollte studieren, aber damals hatte ich keine Zeit."
    example_en: "I wanted to study, but back then I had no time."
    example_ru: "Я хотел учиться, но тогда у меня не было времени."
    example_uk: "Я хотів навчатися, але тоді в мене не було часу."
    note:
      en: "The everyday past of haben is hatte, not habe … gehabt. This one sentence carries the whole rule: keep it ready and swap the noun — Damals hatte ich kein Geld. Damals hatte ich keine Wohnung."
      ru: "Обиходное прошедшее от haben — это hatte, а не habe … gehabt. В одной этой фразе всё правило: держите её наготове и меняйте существительное — Damals hatte ich kein Geld. Damals hatte ich keine Wohnung."
      uk: "Побутове минуле від haben — це hatte, а не habe … gehabt. В одній цій фразі все правило: тримайте її напоготові і міняйте іменник — Damals hatte ich kein Geld. Damals hatte ich keine Wohnung."

  - de: "Was hast du nach der Schule gemacht?"
    pos: phrase
    en: "What did you do after school?"
    ru: "Чем ты занимался после школы?"
    uk: "Чим ти займався після школи?"
    example_de: "Erzähl mal: Was hast du nach der Schule gemacht?"
    example_en: "Tell me: what did you do after school?"
    example_ru: "Расскажи: чем ты занимался после школы?"
    example_uk: "Розкажи: чим ти займався після школи?"
    note:
      en: "The question that opens every conversation about somebody's life. The event is asked for in the Perfekt; a state would be asked for with war or hatte — Warst du zufrieden? Hattest du einen Plan?"
      ru: "Вопрос, с которого начинается любой разговор о чужой жизни. О событии спрашивают в Perfekt, а о состоянии спросили бы через war или hatte — Warst du zufrieden? Hattest du einen Plan?"
      uk: "Питання, з якого починається будь-яка розмова про чуже життя. Про подію запитують у Perfekt, а про стан запитали б через war або hatte — Warst du zufrieden? Hattest du einen Plan?"
