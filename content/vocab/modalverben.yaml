id: modalverben
title_de: "Die Modalverben"
title_en: "The modal verbs"
title_ru: "Модальные глаголы"
title_uk: "Модальні дієслова"
level: A2
entries:
  - de: können
    ipa: "ˈkœnən"
    pos: verb
    praesens_3sg: kann
    partizip2: gekonnt
    aux: haben
    en: can, to be able to
    ru: мочь, уметь
    uk: могти, уміти
    example_de: Ich kann gut schwimmen.
    example_en: I can swim well.
    example_ru: Я хорошо умею плавать.
    example_uk: Я добре вмію плавати.
    note:
      en: 'No -t in the singular: ich kann, er kann. The vowel changes only in the singular: wir können.'
      ru: 'Без -t в единственном числе: ich kann, er kann. Гласная меняется только в единственном числе: wir können.'
      uk: 'Без -t в однині: ich kann, er kann. Голосна змінюється лише в однині — у множині wir können.'
  - de: müssen
    ipa: "ˈmʏsn̩"
    pos: verb
    praesens_3sg: muss
    partizip2: gemusst
    aux: haben
    en: must, to have to
    ru: быть должным, быть вынужденным
    uk: мусити, бути змушеним
    example_de: Ich muss heute lange arbeiten.
    example_en: I have to work late today.
    example_ru: Сегодня мне придётся долго работать.
    example_uk: Сьогодні мені доведеться довго працювати.
    note:
      en: 'muss nicht means "don''t have to", NOT "must not" — prohibition is darf nicht.'
      ru: 'muss nicht значит «не обязан», а не «нельзя» — запрет выражается через darf nicht.'
      uk: "muss nicht означає «не зобов'язаний», а не «не можна» — заборона виражається через darf nicht."
  - de: dürfen
    ipa: "ˈdʏʁfn̩"
    pos: verb
    praesens_3sg: darf
    partizip2: gedurft
    aux: haben
    en: may, to be allowed to
    ru: иметь разрешение, мочь (с позволения)
    uk: мати дозвіл, могти (з дозволу)
    example_de: Hier darf man nicht parken.
    example_en: Parking is not allowed here.
    example_ru: Здесь нельзя парковаться.
    example_uk: Тут не можна паркуватися.
    note:
      en: 'darf nicht = prohibition ("must not"). Polite questions too: Darf ich fragen?'
      ru: 'darf nicht — это русское «нельзя». Также в вежливых вопросах: Darf ich fragen?'
      uk: 'darf nicht — це українське «не можна». Також у ввічливих запитаннях: Darf ich fragen?'
  - de: wollen
    ipa: "ˈvɔlən"
    pos: verb
    praesens_3sg: will
    partizip2: gewollt
    aux: haben
    en: to want to
    ru: хотеть
    uk: хотіти
    example_de: Die Kinder wollen ein Eis.
    example_en: The children want an ice cream.
    example_ru: Дети хотят мороженое.
    example_uk: Діти хочуть морозиво.
    note:
      en: 'False friend: er will = "he wants to", never future "he will". Blunt — möchte is the polite choice.'
      ru: 'Форма will — это «хочет», а не будущее время, как в английском. Звучит прямо — вежливее möchte.'
      uk: 'Форма will — це «хоче», а не майбутній час, як в англійській. Звучить прямолінійно — ввічливіше möchte.'
  - de: sollen
    ipa: "ˈzɔlən"
    pos: verb
    praesens_3sg: soll
    partizip2: gesollt
    aux: haben
    en: should, to be supposed to
    ru: быть должным (по чьему-то указанию)
    uk: бути повинним (за чиєюсь вказівкою)
    example_de: Der Arzt sagt, ich soll mehr schlafen.
    example_en: The doctor says I should sleep more.
    example_ru: Врач говорит, что мне нужно больше спать.
    example_uk: Лікар каже, що мені треба більше спати.
    note:
      en: 'sollen reports someone else''s expectation or advice — the pressure comes from outside.'
      ru: 'sollen передаёт чужое требование или совет — «мне велено», давление приходит извне.'
      uk: 'sollen передає чужу вимогу або пораду — «мені велено», тиск приходить іззовні.'
  - de: mögen
    ipa: "ˈmøːgn̩"
    pos: verb
    praesens_3sg: mag
    partizip2: gemocht
    aux: haben
    en: to like
    ru: любить (что-либо, кого-либо)
    uk: любити (щось, когось)
    example_de: Ich mag keinen Fisch.
    example_en: I don't like fish.
    example_ru: Я не люблю рыбу.
    example_uk: Я не люблю риби.
    note:
      en: 'General liking (food, people, things) with a direct object: Ich mag Tee. For wishes use möchte.'
      ru: 'Общая симпатия (еда, люди, вещи) с прямым дополнением: Ich mag Tee. Для желаний — möchte.'
      uk: 'Загальна симпатія (їжа, люди, речі) з прямим додатком: Ich mag Tee. Для бажань — möchte.'
  - de: möchten
    ipa: "ˈmœçtn̩"
    pos: verb
    praesens_3sg: möchte
    partizip2: "—"
    aux: haben
    en: would like (to)
    ru: хотел бы
    uk: хотів би
    example_de: Ich möchte einen Kaffee, bitte.
    example_en: I would like a coffee, please.
    example_ru: Я хотел бы кофе, пожалуйста.
    example_uk: Я хотів би кави, будь ласка.
    note:
      en: 'The polite form of wollen; no Partizip II exists — for the past, use wollen: ich wollte.'
      ru: 'Вежливая форма wollen; причастия II нет — в прошедшем времени используйте wollte.'
      uk: 'Ввічлива форма wollen; дієприкметника II немає — у минулому часі використовуйте wollte.'
