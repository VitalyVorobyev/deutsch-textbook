# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the culture and
# entertainment words of the freizeit-sport-kultur-medien section.
id: kultur-unterhaltung-a2
title_de: "Kultur & Unterhaltung"
title_en: "Culture & entertainment"
title_ru: "Культура и развлечения"
level: A2
entries:
  - de: Artikel
    ipa: "aʁˈtiːkl̩"
    pos: noun
    gender: m
    plural: die Artikel
    en: article (in a newspaper); article (der/die/das)
    ru: статья (в газете); артикль (der/die/das)
    example_de: In der Zeitung steht heute ein langer Artikel über die Schule.
    example_en: There is a long article about the school in the newspaper today.
    example_ru: Сегодня в газете большая статья о школе.
    note:
      en: 'One word, two everyday meanings: a piece of writing in a newspaper, and the grammatical article — der bestimmte Artikel der/die/das. The plural never changes: der Artikel, die Artikel.'
      ru: 'Одно слово, два обиходных значения: статья в газете и грамматический артикль — der bestimmte Artikel der/die/das. Множественное число не меняется: der Artikel, die Artikel.'
  - de: Eintritt
    ipa: "ˈaɪ̯nˌtʁɪt"
    pos: noun
    gender: m
    plural: die Eintritte
    en: admission, entry fee
    ru: вход; плата за вход
    example_de: Der Eintritt kostet acht Euro, für Kinder ist er frei.
    example_en: Admission costs eight euros; it is free for children.
    example_ru: Вход стоит восемь евро, для детей он бесплатный.
    note:
      en: 'Usually about the price of getting in: Der Eintritt kostet 8 Euro. Eintritt frei on a poster means entry is free. The related verb is eintreten.'
      ru: 'Обычно речь о цене входа: Der Eintritt kostet 8 Euro. Надпись Eintritt frei значит «вход свободный». Родственный глагол — eintreten.'
  - de: Ausstellung
    ipa: "ˈaʊ̯sˌʃtɛlʊŋ"
    pos: noun
    gender: f
    plural: die Ausstellungen
    en: exhibition
    ru: выставка
    example_de: Im Museum gibt es eine neue Ausstellung über die Stadt.
    example_en: There is a new exhibition about the city at the museum.
    example_ru: В музее новая выставка о городе.
    note:
      en: 'Every -ung noun is feminine: die Ausstellung. You go to one with in + Akk: Wir gehen in die Ausstellung.'
      ru: 'Все существительные на -ung — женского рода: die Ausstellung. Идти на выставку — in + Akk: Wir gehen in die Ausstellung.'
  - de: Band
    ipa: "ˈbɛnt"
    pos: noun
    gender: f
    plural: die Bands
    en: band (music group)
    ru: группа (музыкальная)
    example_de: Meine Band spielt am Freitag im Club.
    example_en: My band is playing at the club on Friday.
    example_ru: Моя группа играет в пятницу в клубе.
    note:
      en: 'German has three different Bands. This one — the music group — is feminine and spoken the English way: die Band, ˈbɛnt. The other two are das Band (a ribbon, a tape) and der Band (a volume of a book), both spoken with a German a. Only the music group is on this card.'
      ru: 'В немецком три разных слова Band. Это — музыкальная группа: женского рода и с английским произношением: die Band, ˈbɛnt. Два других — das Band (лента, плёнка) и der Band (том книги), оба с немецким a. На карточке только музыкальная группа.'
  - de: Comic
    ipa: "ˈkɔmɪk"
    pos: noun
    gender: m
    plural: die Comics
    en: comic, comic book
    ru: комикс
    example_de: Mein Sohn liest am liebsten Comics.
    example_en: My son likes reading comics best of all.
    example_ru: Мой сын больше всего любит читать комиксы.
    note:
      en: 'An English loan, masculine: der Comic, die Comics. Careful — the German adjective komisch means funny or odd, and is a different word.'
      ru: 'Заимствование из английского, мужского рода: der Comic, die Comics. Осторожно: немецкое прилагательное komisch — «смешной, странный», это другое слово.'
  - de: Disco
    ipa: "ˈdɪsko"
    pos: noun
    gender: f
    plural: die Discos
    en: disco, club (for dancing)
    ru: дискотека
    example_de: Am Samstag gehen wir in die Disco. Die Disko macht erst um zehn auf.
    example_en: On Saturday we are going to the disco. The disco only opens at ten.
    example_ru: В субботу мы идём на дискотеку. Дискотека открывается только в десять.
    note:
      en: 'Two spellings, both correct and both common: die Disco and die Disko. Learn the word once and recognize either; you only ever have to write one of them. Feminine, and you go there with in + Akk: in die Disco gehen.'
      ru: 'Два написания, оба правильные и одинаково употребительные: die Disco и die Disko. Слово одно — узнавайте оба варианта, писать достаточно любой. Женского рода, идти туда — in + Akk: in die Disco gehen.'
  - de: Club
    ipa: "ˈklʊp"
    pos: noun
    gender: m
    plural: die Clubs
    en: club (for going out); club (association)
    ru: клуб
    example_de: Der Klub in der Altstadt ist neu. Wir treffen uns um elf vor dem Club.
    example_en: The club in the old town is new. We are meeting in front of the club at eleven.
    example_ru: Клуб в старом городе новый. Мы встречаемся в одиннадцать перед клубом.
    note:
      en: 'Two spellings, both correct: der Club and der Klub. The final -b is spoken as p. For a sports or hobby association Germans more often say der Verein.'
      ru: 'Два написания, оба правильные: der Club и der Klub. Конечное -b произносится как p. Для спортивного или любительского общества немцы чаще говорят der Verein.'
  - de: Fan
    ipa: "ˈfɛn"
    pos: noun
    gender: m
    plural: die Fans
    en: fan (supporter)
    ru: фанат, болельщик, поклонник
    example_de: Mein Vater ist ein großer Fan von dieser Mannschaft.
    example_en: My father is a big fan of this team.
    example_ru: Мой отец большой болельщик этой команды.
    note:
      en: 'Spoken the English way — ˈfɛn — and always masculine, also about a woman: Sie ist ein Fan. What you are a fan of comes with von + Dat.'
      ru: 'Произносится по-английски — ˈfɛn — и всегда мужского рода, даже о женщине: Sie ist ein Fan. Объект восхищения вводится через von + Dat.'
  - de: Festival
    ipa: "ˈfɛstival"
    pos: noun
    gender: n
    plural: die Festivals
    en: festival
    ru: фестиваль
    example_de: Im Sommer fahren wir jedes Jahr zu einem Festival.
    example_en: Every summer we travel to a festival.
    example_ru: Каждое лето мы ездим на фестиваль.
    note:
      en: 'The modern loan for a music or film festival: das Festival, die Festivals. The older German word das Fest is a party or a celebration, and is not the same thing.'
      ru: 'Современное заимствование для музыкального или кинофестиваля: das Festival, die Festivals. Немецкое das Fest — праздник, торжество, это не одно и то же.'
  - de: Feier
    ipa: "ˈfaɪ̯ɐ"
    pos: noun
    gender: f
    plural: die Feiern
    en: celebration, party
    ru: праздник, торжество (частное)
    example_de: Nach der Prüfung machen wir eine kleine Feier bei mir zu Hause.
    example_en: After the exam we are having a small celebration at my place.
    example_ru: После экзамена мы устроим небольшой праздник у меня дома.
    note:
      en: 'A private celebration — a birthday, a wedding, passing an exam. Compare die Veranstaltung, which is a public, organized event. The verb is feiern.'
      ru: 'Частное торжество — день рождения, свадьба, сдача экзамена. Ср. die Veranstaltung — публичное, организованное мероприятие. Глагол — feiern.'
  - de: Instrument
    ipa: "ɪnstʁuˈmɛnt"
    pos: noun
    gender: n
    plural: die Instrumente
    en: instrument (musical)
    ru: инструмент (музыкальный)
    example_de: Spielst du ein Instrument?
    example_en: Do you play an instrument?
    example_ru: Ты играешь на каком-нибудь инструменте?
    note:
      en: 'Neuter, with the stress at the end: ɪnstʁuˈmɛnt. With ein Instrument the article stays, but with the name of the instrument it drops: Ich spiele Klavier.'
      ru: 'Среднего рода, ударение на последний слог: ɪnstʁuˈmɛnt. С ein Instrument артикль сохраняется, а с названием инструмента исчезает: Ich spiele Klavier.'
  - de: Interview
    ipa: "ˈɪntɐvjuː"
    pos: noun
    gender: n
    plural: die Interviews
    en: interview
    ru: интервью
    example_de: Die Sängerin gibt morgen ein Interview im Radio.
    example_en: The singer is giving an interview on the radio tomorrow.
    example_ru: Завтра певица даёт интервью на радио.
    note:
      en: 'Neuter: das Interview. The set phrase is ein Interview geben (to give one) or ein Interview machen (to conduct one).'
      ru: 'Среднего рода: das Interview. Устойчивые обороты: ein Interview geben — давать интервью, ein Interview machen — брать интервью.'
  - de: Klavier
    ipa: "klaˈviːɐ̯"
    pos: noun
    gender: n
    plural: die Klaviere
    en: piano
    ru: пианино, фортепиано
    example_de: Meine Schwester spielt seit zehn Jahren Klavier.
    example_en: My sister has been playing the piano for ten years.
    example_ru: Моя сестра играет на пианино уже десять лет.
    note:
      en: 'After spielen the instrument takes no article at all: Ich spiele Klavier — never "ich spiele das Klavier". English says "play the piano"; German drops the the.'
      ru: 'После spielen название инструмента идёт без артикля: Ich spiele Klavier. По-русски «играть на пианино» — с предлогом, по-немецки предлога и артикля нет.'
  - de: Krimi
    ipa: "ˈkʁiːmi"
    pos: noun
    gender: m
    plural: die Krimis
    en: crime story, thriller
    ru: детектив (книга или фильм)
    example_de: Am Sonntagabend sehen wir immer einen Krimi im Fernsehen.
    example_en: On Sunday evenings we always watch a thriller on television.
    example_ru: В воскресенье вечером мы всегда смотрим детектив по телевизору.
    note:
      en: 'Short for der Kriminalroman or der Kriminalfilm — it covers both the book and the film. Masculine: der Krimi, die Krimis.'
      ru: 'Сокращение от der Kriminalroman или der Kriminalfilm — годится и для книги, и для фильма. Мужского рода: der Krimi, die Krimis.'
  - de: Kultur
    ipa: "kʊlˈtuːɐ̯"
    pos: noun
    gender: f
    plural: die Kulturen
    en: culture
    ru: культура
    example_de: "In dieser Stadt gibt es viel Kultur: Theater, Museen und Konzerte."
    example_en: There is a lot of culture in this city — theatre, museums and concerts.
    example_ru: "В этом городе много культуры: театры, музеи и концерты."
    note:
      en: 'Feminine, with the stress on the last syllable: kʊlˈtuːɐ̯. In the singular it means culture in general; the plural die Kulturen means different cultures.'
      ru: 'Женского рода, ударение на последний слог: kʊlˈtuːɐ̯. В единственном числе — культура вообще; множественное die Kulturen — разные культуры.'
  - de: Lied
    ipa: "ˈliːt"
    pos: noun
    gender: n
    plural: die Lieder
    en: song
    ru: песня
    example_de: Die Kinder singen im Unterricht ein deutsches Lied.
    example_en: The children are singing a German song in class.
    example_ru: На уроке дети поют немецкую песню.
    note:
      en: 'Neuter, with an irregular plural: das Lied, die Lieder. The final -d is spoken as t. For pop music people also say der Song.'
      ru: 'Среднего рода, неправильное множественное: das Lied, die Lieder. Конечное -d произносится как t. О поп-музыке говорят также der Song.'
  - de: Mode
    ipa: "ˈmoːdə"
    pos: noun
    gender: f
    plural: die Moden
    en: fashion
    ru: мода
    example_de: Meine Tochter interessiert sich sehr für Mode.
    example_en: My daughter is very interested in fashion.
    example_ru: Моя дочь очень интересуется модой.
    note:
      en: 'Usually singular: die Mode. Something fashionable is in Mode, and the phrase for being interested is sich für etwas interessieren — für + Akk.'
      ru: 'Обычно в единственном числе: die Mode. Модное — in Mode; «интересоваться» — sich für etwas interessieren, für + Akk.'
  - de: Plakat
    ipa: "plaˈkaːt"
    pos: noun
    gender: n
    plural: die Plakate
    en: poster (on a wall, advertising something)
    ru: плакат, афиша
    example_de: An der Wand hängt ein Plakat für das Konzert.
    example_en: There is a poster for the concert hanging on the wall.
    example_ru: На стене висит афиша концерта.
    note:
      en: 'A Plakat advertises or announces something in public — a concert, a film, an event. A Poster is the decorative kind you hang in your own room.'
      ru: 'Plakat — публичная афиша или объявление: концерт, фильм, мероприятие. Poster — декоративный постер, который вешают у себя в комнате.'
  - de: Poster
    ipa: "ˈpoːstɐ"
    pos: noun
    gender: n
    plural: die Poster
    en: poster (decorative)
    ru: постер, плакат (на стене в комнате)
    example_de: Über dem Bett hängt ein Poster von seiner Lieblingsband.
    example_en: There is a poster of his favourite band above the bed.
    example_ru: Над кроватью висит постер его любимой группы.
    note:
      en: 'Neuter, and the plural does not change: das Poster, die Poster. Decoration for your own wall — compare das Plakat, which advertises something publicly.'
      ru: 'Среднего рода, множественное не меняется: das Poster, die Poster. Украшение для своей стены — ср. das Plakat, публичная афиша.'
  - de: Programm
    ipa: "pʁoˈgʁam"
    pos: noun
    gender: n
    plural: die Programme
    en: programme, schedule; TV channel
    ru: программа; телеканал
    example_de: Was steht heute Abend im Programm?
    example_en: What is on the programme this evening?
    example_ru: Что сегодня вечером в программе?
    note:
      en: 'The printed or planned schedule — what is on, and when. A single broadcast is die Sendung. Programm can also mean a TV channel: im zweiten Programm.'
      ru: 'Расписание, план — что и когда идёт. Отдельная передача — die Sendung. Programm может значить и телеканал: im zweiten Programm.'
  - de: Quiz
    ipa: "ˈkvɪs"
    pos: noun
    gender: n
    plural: die Quiz
    en: quiz
    ru: викторина
    example_de: Im Fernsehen läuft gerade ein Quiz.
    example_en: There is a quiz on television right now.
    example_ru: Сейчас по телевизору идёт викторина.
    note:
      en: 'Written with qu but spoken kv — ˈkvɪs, like Quittung. Neuter, and the plural stays the same: das Quiz, die Quiz.'
      ru: 'Пишется qu, но произносится kv — ˈkvɪs, как в Quittung. Среднего рода, множественное не меняется: das Quiz, die Quiz.'
  - de: Rätsel
    ipa: "ˈʁɛːtsl̩"
    pos: noun
    gender: n
    plural: die Rätsel
    en: puzzle, riddle
    ru: загадка, головоломка
    example_de: Meine Oma löst jeden Morgen ein Kreuzworträtsel.
    example_en: My grandma does a crossword puzzle every morning.
    example_ru: Моя бабушка каждое утро разгадывает кроссворд.
    note:
      en: 'Neuter, plural unchanged: das Rätsel, die Rätsel. You solve one with lösen. The everyday compound is das Kreuzworträtsel, the crossword.'
      ru: 'Среднего рода, множественное не меняется: das Rätsel, die Rätsel. Разгадывать — lösen. Обиходное сложное слово — das Kreuzworträtsel, кроссворд.'
  - de: Sendung
    ipa: "ˈzɛndʊŋ"
    pos: noun
    gender: f
    plural: die Sendungen
    en: programme, show (a single broadcast)
    ru: передача (теле- или радио-)
    example_de: Diese Sendung über Tiere gefällt mir sehr gut.
    example_en: I really like this programme about animals.
    example_ru: Эта передача о животных мне очень нравится.
    note:
      en: 'One broadcast on TV or radio — an episode, a show. Do not confuse it with das Programm, which is the schedule of what is on. -ung, so feminine.'
      ru: 'Одна передача на телевидении или радио — выпуск, шоу. Не путать с das Programm — расписанием передач. Суффикс -ung, значит женский род.'
  - de: Spaß
    ipa: "ˈʃpaːs"
    pos: noun
    gender: m
    plural: die Späße
    en: fun; a joke
    ru: удовольствие, веселье; шутка
    example_de: Der Kurs macht mir viel Spaß.
    example_en: I really enjoy the course.
    example_ru: Курс доставляет мне большое удовольствие.
    note:
      en: 'The construction is the point: German says the thing makes fun — Das macht Spaß, Der Kurs macht mir Spaß (the person is dative). The other fixed phrase is Spaß haben: Wir haben viel Spaß gehabt. Say Viel Spaß! to wish someone a good time.'
      ru: 'Главное — конструкция: по-немецки «дело делает удовольствие» — Das macht Spaß, Der Kurs macht mir Spaß (человек в Dativ). Второй устойчивый оборот — Spaß haben: Wir haben viel Spaß gehabt. Пожелание — Viel Spaß!'
  - de: Star
    ipa: "ˈʃtaːɐ̯"
    pos: noun
    gender: m
    plural: die Stars
    en: star (famous person)
    ru: звезда (знаменитость)
    example_de: Auf dem Festival treten viele bekannte Stars auf.
    example_en: Many famous stars are performing at the festival.
    example_ru: На фестивале выступает много известных звёзд.
    note:
      en: 'A famous person only — a star in the sky is der Stern. Masculine, also about a woman: Sie ist ein Star. Spoken with the German initial sht-: ˈʃtaːɐ̯.'
      ru: 'Только о знаменитости — звезда на небе это der Stern. Мужского рода, даже о женщине: Sie ist ein Star. Произносится с немецким «шт-»: ˈʃtaːɐ̯.'
  - de: Titel
    ipa: "ˈtiːtl̩"
    pos: noun
    gender: m
    plural: die Titel
    en: title
    ru: название, заголовок
    example_de: Ich habe den Titel von dem Film vergessen.
    example_en: I have forgotten the title of the film.
    example_ru: Я забыл название фильма.
    note:
      en: 'The name of a book, a film or a song. Masculine, plural unchanged: der Titel, die Titel. At A2, say the title of something with von + Dat: der Titel von dem Buch.'
      ru: 'Название книги, фильма или песни. Мужского рода, множественное не меняется: der Titel, die Titel. На уровне A2 «название чего-то» — через von + Dat: der Titel von dem Buch.'
  - de: Veranstaltung
    ipa: "fɛɐ̯ˈʔanʃtaltʊŋ"
    pos: noun
    gender: f
    plural: die Veranstaltungen
    en: event (public, organized)
    ru: мероприятие
    example_de: Die Veranstaltung beginnt um neunzehn Uhr im Rathaus.
    example_en: The event starts at seven p.m. at the town hall.
    example_ru: Мероприятие начинается в девятнадцать часов в ратуше.
    note:
      en: 'A public, organized event — a concert, a reading, a conference. A private party is eine Feier. -ung, so feminine.'
      ru: 'Публичное, организованное мероприятие — концерт, чтения, конференция. Частный праздник — eine Feier. Суффикс -ung, значит женский род.'
  - de: Witz
    ipa: "ˈvɪts"
    pos: noun
    gender: m
    plural: die Witze
    en: joke
    ru: анекдот, шутка
    example_de: Mein Kollege erzählt gern Witze in der Pause.
    example_en: My colleague likes telling jokes during the break.
    example_ru: Мой коллега любит рассказывать анекдоты в перерыв.
    note:
      en: 'You tell a joke with erzählen, not with sagen: einen Witz erzählen. The adjective witzig means funny.'
      ru: 'Анекдот «рассказывают» через erzählen, а не sagen: einen Witz erzählen. Прилагательное witzig — «смешной, остроумный».'
  - de: Zeitschrift
    ipa: "ˈtsaɪ̯tˌʃʁɪft"
    pos: noun
    gender: f
    plural: die Zeitschriften
    en: magazine
    ru: журнал
    example_de: Beim Arzt lese ich meistens eine Zeitschrift.
    example_en: At the doctor's I usually read a magazine.
    example_ru: У врача я обычно читаю журнал.
    note:
      en: 'A magazine, which comes out weekly or monthly — die Zeitung is the daily newspaper. Compound of Zeit + Schrift, so it is feminine like die Schrift.'
      ru: 'Журнал, выходит раз в неделю или в месяц — die Zeitung это ежедневная газета. Сложное слово Zeit + Schrift, род от die Schrift.'
  - de: Zirkus
    ipa: "ˈtsɪʁkʊs"
    pos: noun
    gender: m
    plural: die Zirkusse
    en: circus
    ru: цирк
    example_de: Am Wochenende gehen wir mit den Kindern in den Zirkus.
    example_en: At the weekend we are taking the children to the circus.
    example_ru: На выходных мы идём с детьми в цирк.
    note:
      en: 'The z is spoken ts — ˈtsɪʁkʊs. Masculine, and the plural doubles the s: die Zirkusse. You go there with in + Akk: in den Zirkus gehen.'
      ru: 'Буква z читается как ts — ˈtsɪʁkʊs. Мужского рода, во множественном s удваивается: die Zirkusse. Идти туда — in + Akk: in den Zirkus gehen.'
