# The chunks that carry the function, as CLAUDE.md prescribes for an A2 unit: the lexemes
# themselves (denken, warten, sprechen, träumen, arbeiten …) are already owned by other decks
# and keep their conjugation there. What no deck teaches — and what this topic is about — is the
# verb welded to its preposition and contracted into a da-word. Kept to the size of the other
# A2 *grammar* decks (dativ-verben 8, modalverben 7, kasus-verbmuster 6), not the vocab-field ones.
#
# The glosses say plainly what the chunk means. An earlier draft padded them out
# ("to wait for the promised answer / for it") so the EN→DE production card would be guessable —
# which is the tell of a badly-keyed card, not a fix for one.
id: verben-mit-praepositionen
title_de: "Verben mit Präpositionen"
title_en: "Verbs with prepositions"
title_ru: "Глаголы с предлогами"
level: A2
entries:
  - de: "daran denken"
    ipa: "daˈʁan ˈdɛŋkn̩"
    pos: phrase
    en: "to think about it"
    ru: "думать об этом"
    example_de: "Denkst du an die Tickets? — Ja, ich denke daran."
    example_en: "Are you thinking about the tickets? — Yes, I am thinking about them."
    example_ru: "Ты думаешь о билетах? — Да, я думаю о них."
    valence: "an + Akk"
  - de: "darauf warten"
    ipa: "daˈʁaʊ̯f ˈvaʁtn̩"
    pos: phrase
    en: "to wait for it"
    ru: "ждать этого"
    example_de: "Wir warten auf Leas Antwort. Wir warten schon lange darauf."
    example_en: "We are waiting for Lea's answer. We have been waiting for it for a long time."
    example_ru: "Мы ждём ответа Леа. Мы ждём его уже давно."
    valence: "auf + Akk"
  - de: "darüber sprechen"
    ipa: "daˈʁyːbɐ ˈʃpʁɛçn̩"
    pos: phrase
    en: "to talk about it"
    ru: "говорить об этом"
    example_de: "Wir sprechen über den Ausflug. Wir sprechen morgen darüber."
    example_en: "We are talking about the outing. We will talk about it tomorrow."
    example_ru: "Мы говорим о поездке. Завтра мы поговорим об этом."
    valence: "über + Akk"
  - de: "davon träumen"
    ipa: "daˈfɔn ˈtʁɔʏ̯mən"
    pos: phrase
    en: "to dream of it"
    ru: "мечтать об этом"
    example_de: "Mia träumt von einer Reise. Sie träumt jeden Tag davon."
    example_en: "Mia dreams of a journey. She dreams of it every day."
    example_ru: "Миа мечтает о путешествии. Она мечтает об этом каждый день."
    valence: "von + Dat"
  - de: "sich dafür interessieren"
    ipa: "zɪç daˈfyːɐ̯ ɪntəʁɛˈsiːʁən"
    pos: phrase
    en: "to be interested in it"
    ru: "интересоваться этим"
    example_de: "Ich interessiere mich für den Fotokurs. Interessierst du dich auch dafür?"
    example_en: "I am interested in the photography course. Are you interested in it too?"
    example_ru: "Я интересуюсь фотокурсом. Ты тоже им интересуешься?"
    valence: "für + Akk"
  - de: "damit arbeiten"
    ipa: "daˈmɪt ˈaʁbaɪ̯tn̩"
    pos: phrase
    en: "to work with it"
    ru: "работать с этим"
    example_de: "Die App ist praktisch. Wir arbeiten gern damit."
    example_en: "The app is practical. We like working with it."
    example_ru: "Приложение удобное. Мы охотно с ним работаем."
    valence: "mit + Dat"
  - de: "sich daran erinnern"
    ipa: "zɪç daˈʁan ɛɐ̯ˈʔɪnɐn"
    pos: phrase
    en: "to remember it"
    ru: "помнить об этом"
    example_de: "Erinnerst du dich an unser Treffen? — Ja, ich erinnere mich daran."
    example_en: "Do you remember our meeting? — Yes, I remember it."
    example_ru: "Ты помнишь о нашей встрече? — Да, я о ней помню."
    valence: "an + Akk"
  - de: "sich darauf freuen"
    ipa: "zɪç daˈʁaʊ̯f ˈfʁɔʏ̯ən"
    pos: phrase
    en: "to look forward to it"
    ru: "ждать этого с радостью"
    example_de: "Wir freuen uns auf den Ausflug. Wir freuen uns sehr darauf."
    example_en: "We are looking forward to the outing. We are really looking forward to it."
    example_ru: "Мы с радостью ждём поездку. Мы очень её ждём."
    valence: "auf + Akk"
