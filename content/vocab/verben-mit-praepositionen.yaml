id: verben-mit-praepositionen
title_de: "Verben mit Präpositionen"
title_en: "Verbs with prepositions"
title_ru: "Глаголы с предлогами"
level: A2
entries:
  - de: "daran denken"
    ipa: "daˈʁan ˈdɛŋkn̩"
    pos: phrase
    en: "to think about the plan / remember to do it"
    ru: "думать о плане / не забыть сделать это"
    example_de: "Denkst du an die Tickets? — Ja, ich denke daran."
    example_en: "Are you thinking about the tickets? — Yes, I am thinking about them."
    example_ru: "Ты помнишь о билетах? — Да, я об этом думаю."
    valence: "an + Akk"
  - de: "darauf warten"
    ipa: "daˈʁaʊ̯f ˈvaʁtn̩"
    pos: phrase
    en: "to wait for the promised answer / for it"
    ru: "ждать обещанного ответа / ждать этого"
    example_de: "Wir warten auf Leas Antwort. Wir warten darauf."
    example_en: "We are waiting for Lea's answer. We are waiting for it."
    example_ru: "Мы ждём ответ Леа. Мы ждём этого."
    valence: "auf + Akk"
  - de: "darüber sprechen"
    ipa: "daˈʁyːbɐ ˈʃpʁɛçn̩"
    pos: phrase
    en: "to talk about the proposed outing / about it"
    ru: "говорить о предложенной поездке / об этом"
    example_de: "Wir sprechen über den Ausflug. Wir sprechen darüber."
    example_en: "We are talking about the outing. We are talking about it."
    example_ru: "Мы говорим о поездке. Мы говорим об этом."
    valence: "über + Akk"
  - de: "davon träumen"
    ipa: "daˈfɔn ˈtʁɔʏ̯mən"
    pos: phrase
    en: "to dream of the long journey / of it"
    ru: "мечтать о долгом путешествии / об этом"
    example_de: "Mia träumt von einer Reise. Sie träumt davon."
    example_en: "Mia dreams of a journey. She dreams of it."
    example_ru: "Миа мечтает о путешествии. Она мечтает об этом."
    valence: "von + Dat"
  - de: "sich dafür interessieren"
    ipa: "zɪç daˈfyːɐ̯ ɪntəʁɛˈsiːʁən"
    pos: phrase
    en: "to be interested in the photography course / in it"
    ru: "интересоваться фотокурсом / этим"
    example_de: "Ich interessiere mich für den Fotokurs. Interessierst du dich auch dafür?"
    example_en: "I am interested in the photography course. Are you interested in it too?"
    example_ru: "Я интересуюсь фотокурсом. Ты тоже им интересуешься?"
    valence: "für + Akk"
  - de: "damit arbeiten"
    ipa: "daˈmɪt ˈaʁbaɪ̯tn̩"
    pos: phrase
    en: "to work with the planning app / with it"
    ru: "работать с приложением для планирования / с ним"
    example_de: "Die App ist praktisch. Wir arbeiten damit."
    example_en: "The app is practical. We work with it."
    example_ru: "Приложение удобное. Мы работаем с ним."
    valence: "mit + Dat"
  - de: "sich daran erinnern"
    ipa: "zɪç daˈʁan ɛɐ̯ˈʔɪnɐn"
    pos: phrase
    en: "to remember the agreed meeting / remember it"
    ru: "помнить о договорённой встрече / помнить это"
    example_de: "Erinnerst du dich an unser Treffen? — Ja, ich erinnere mich daran."
    example_en: "Do you remember our meeting? — Yes, I remember it."
    example_ru: "Ты помнишь о нашей встрече? — Да, я об этом помню."
    valence: "an + Akk"
  - de: "sich darauf freuen"
    ipa: "zɪç daˈʁaʊ̯f ˈfʁɔʏ̯ən"
    pos: phrase
    en: "to look forward to the group outing / to it"
    ru: "радоваться предстоящей поездке группы / ждать её с радостью"
    example_de: "Wir freuen uns auf den Ausflug. Wir freuen uns darauf."
    example_en: "We are looking forward to the outing. We are looking forward to it."
    example_ru: "Мы с радостью ждём поездку. Мы её очень ждём."
    valence: "auf + Akk"
