# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the Feiertage section
# plus the remaining zeit-termine words.
id: zeit-termine-a2
title_de: "Zeit, Feste & Termine"
title_en: "Time, holidays & appointments"
title_ru: "Время, праздники и сроки"
title_uk: "Час, свята та терміни"
level: A2
entries:
  - de: Karneval
    ipa: "ˈkaʁnevaːl"
    pos: noun
    gender: m
    plural: "die Karnevale"
    en: carnival (the season before Lent)
    ru: карнавал (гулянья перед постом)
    uk: карнавал (гуляння перед постом)
    example_de: In Köln feiert man Karneval besonders laut.
    example_en: In Cologne they celebrate carnival especially loudly.
    example_ru: В Кёльне карнавал празднуют особенно шумно.
    example_uk: У Кельні карнавал святкують особливо гучно.
    note:
      en: 'Like the other festival names, Karneval is normally used without an article: Karneval feiern, an Karneval, zu Karneval. The gender is listed for completeness — you will hardly ever need it. In Bavaria and Austria the same season is called Fasching.'
      ru: 'Как и другие названия праздников, Karneval обычно стоит без артикля: Karneval feiern, an Karneval, zu Karneval. Род указан для полноты — на практике он почти не нужен. В Баварии и Австрии тот же сезон называют Fasching.'
      uk: 'Як і інші назви свят, Karneval зазвичай стоїть без артикля: Karneval feiern, an Karneval, zu Karneval. Рід указано для повноти — на практиці він майже не потрібен. У Баварії та Австрії той самий сезон називають Fasching.'
  - de: Ostern
    ipa: "ˈoːstɐn"
    pos: noun
    gender: n
    plural: "—"
    en: Easter
    ru: Пасха
    uk: Великдень
    example_de: An Ostern ist alles geschlossen.
    example_en: At Easter everything is closed.
    example_ru: На Пасху всё закрыто.
    example_uk: На Великдень усе зачинено.
    note:
      en: 'No article in everyday use: an Ostern, zu Ostern, Frohe Ostern! The word looks like a plural but behaves as a singular: Ostern ist dieses Jahr sehr früh.'
      ru: 'В обиходе без артикля: an Ostern («на Пасху»), zu Ostern, Frohe Ostern! По форме слово похоже на множественное число, но согласуется как единственное: Ostern ist dieses Jahr sehr früh.'
      uk: 'У побуті без артикля: an Ostern («на Великдень»), zu Ostern, Frohe Ostern! За формою слово схоже на множину, але узгоджується як однина: Ostern ist dieses Jahr sehr früh.'
  - de: Weihnachten
    ipa: "ˈvaɪ̯naxtn̩"
    pos: noun
    gender: n
    plural: "—"
    en: Christmas
    ru: Рождество
    uk: Різдво
    example_de: Zu Weihnachten fahren wir zu meinen Eltern.
    example_en: At Christmas we go to stay with my parents.
    example_ru: На Рождество мы едем к моим родителям.
    example_uk: На Різдво ми їдемо до моїх батьків.
    note:
      en: 'Again no article: zu Weihnachten, an Weihnachten, Frohe Weihnachten! The big evening in Germany is 24 December — der Heiligabend — not the morning of the 25th.'
      ru: 'Снова без артикля: zu Weihnachten, an Weihnachten, Frohe Weihnachten! Главный вечер в Германии — 24 декабря, der Heiligabend, а не утро 25-го.'
      uk: 'Знову без артикля: zu Weihnachten, an Weihnachten, Frohe Weihnachten! Головний вечір у Німеччині — 24 грудня, der Heiligabend, а не ранок 25-го.'
  - de: Neujahr
    ipa: "ˈnɔʏ̯ˌjaːɐ̯"
    pos: noun
    gender: n
    plural: "—"
    en: New Year (1 January)
    ru: Новый год (1 января, сам день)
    uk: Новий рік (1 січня, сам день)
    example_de: An Neujahr schlafen viele Leute sehr lange.
    example_en: On New Year's Day a lot of people sleep in.
    example_ru: Первого января многие спят очень долго.
    example_uk: Першого січня багато хто спить дуже довго.
    note:
      en: 'Neujahr is the day itself, 1 January; the party the night before is Silvester. No article: an Neujahr, zu Neujahr. Before midnight you wish someone Guten Rutsch!, afterwards Frohes neues Jahr!'
      ru: 'Neujahr — это сам день, 1 января; вечеринка накануне — Silvester. Без артикля: an Neujahr, zu Neujahr. До полуночи желают Guten Rutsch!, после — Frohes neues Jahr!'
      uk: 'Neujahr — це сам день, 1 січня; вечірка напередодні — Silvester. Без артикля: an Neujahr, zu Neujahr. До півночі бажають Guten Rutsch!, після — Frohes neues Jahr!'
  - de: Silvester
    ipa: "zɪlˈvɛstɐ"
    pos: noun
    gender: n
    plural: "—"
    en: New Year's Eve (31 December)
    ru: канун Нового года (31 декабря)
    uk: переддень Нового року (31 грудня)
    example_de: An Silvester feiern wir bei Freunden.
    example_en: On New Year's Eve we are celebrating at a friend's place.
    example_ru: В новогоднюю ночь мы празднуем у друзей.
    example_uk: У новорічну ніч ми святкуємо в друзів.
    note:
      en: 'German splits the holiday in two: Silvester is the evening of 31 December, Neujahr the day after. Both stand without an article: an Silvester, zu Silvester.'
      ru: 'Немецкий делит праздник надвое: Silvester — вечер 31 декабря, Neujahr — следующий день. Оба слова без артикля: an Silvester, zu Silvester.'
      uk: 'Німецька ділить свято надвоє: Silvester — вечір 31 грудня, Neujahr — наступний день. Обидва слова без артикля: an Silvester, zu Silvester.'
  - de: Frühjahr
    ipa: "ˈfʁyːˌjaːɐ̯"
    pos: noun
    gender: n
    plural: "—"
    en: spring (the more official word)
    ru: весна (более официальное слово)
    uk: весна (більш офіційне слово)
    example_de: Im Frühjahr suchen wir eine neue Wohnung.
    example_en: In spring we are going to look for a new flat.
    example_ru: Весной мы будем искать новую квартиру.
    example_uk: Навесні ми шукатимемо нову квартиру.
    note:
      en: 'Frühjahr and Frühling both mean spring and both are correct. Frühjahr is neuter and sounds slightly more official (im Frühjahr, die Frühjahrsmesse); Frühling is masculine and more everyday.'
      ru: 'Frühjahr и Frühling — оба «весна», оба правильны. Frühjahr среднего рода и звучит немного официальнее (im Frühjahr), Frühling мужского рода и более обиходно.'
      uk: 'Frühjahr і Frühling — обидва «весна», обидва правильні. Frühjahr середнього роду й звучить трохи офіційніше (im Frühjahr), Frühling чоловічого роду й більш побутове.'
  - de: Mitternacht
    ipa: "ˈmɪtɐˌnaxt"
    pos: noun
    gender: f
    plural: "—"
    en: midnight
    ru: полночь
    uk: північ
    example_de: Der letzte Zug fährt kurz nach Mitternacht.
    example_en: The last train leaves shortly after midnight.
    example_ru: Последний поезд отправляется вскоре после полуночи.
    example_uk: Останній потяг відправляється невдовзі після півночі.
    note:
      en: 'Time phrases with Mitternacht take no article: um Mitternacht, nach Mitternacht, gegen Mitternacht. Its opposite is der Mittag (midday).'
      ru: 'Обстоятельства времени с Mitternacht идут без артикля: um Mitternacht, nach Mitternacht, gegen Mitternacht. Противоположность — der Mittag («полдень»).'
      uk: 'Обставини часу з Mitternacht ідуть без артикля: um Mitternacht, nach Mitternacht, gegen Mitternacht. Протилежність — der Mittag («полудень»).'
  - de: Arbeitstag
    ipa: "ˈaʁbaɪ̯tsˌtaːk"
    pos: noun
    gender: m
    plural: "die Arbeitstage"
    en: working day (one's own)
    ru: рабочий день (свой собственный)
    uk: робочий день (свій власний)
    example_de: Mein Arbeitstag beginnt um halb acht und endet um fünf.
    example_en: My working day starts at half past seven and ends at five.
    example_ru: Мой рабочий день начинается в полвосьмого и заканчивается в пять.
    example_uk: Мій робочий день починається о пів на восьму й закінчується о п’ятій.
    note:
      en: 'Der Arbeitstag is your personal working day — when you start, how long you work. A day on which shops and offices are open in general is der Werktag; a day off for everybody is der Feiertag.'
      ru: 'Der Arbeitstag — ваш личный рабочий день: когда начинаете, сколько работаете. Будний день вообще (когда открыты магазины и учреждения) — der Werktag; общий нерабочий праздник — der Feiertag.'
      uk: 'Der Arbeitstag — ваш особистий робочий день: коли починаєте, скільки працюєте. Будній день узагалі (коли відчинені магазини та установи) — der Werktag; загальне неробоче свято — der Feiertag.'
  - de: Werktag
    ipa: "ˈvɛʁkˌtaːk"
    pos: noun
    gender: m
    plural: "die Werktage"
    en: weekday, working day (Mon–Sat)
    ru: будний день (по календарю, пн–сб)
    uk: будній день (за календарем, пн–сб)
    example_de: An Werktagen fährt der Bus alle zehn Minuten.
    example_en: On weekdays the bus runs every ten minutes.
    example_ru: В будние дни автобус ходит каждые десять минут.
    example_uk: У будні дні автобус ходить кожні десять хвилин.
    note:
      en: 'Der Werktag is a day on which work happens by default — traditionally Monday to Saturday, as opposed to Sonn- und Feiertage. On shop doors you will read the adverb: werktags 8–18 Uhr.'
      ru: 'Der Werktag — день, когда по умолчанию работают: традиционно с понедельника по субботу, в отличие от Sonn- und Feiertage. На дверях магазинов пишут наречие: werktags 8–18 Uhr.'
      uk: 'Der Werktag — день, коли за замовчуванням працюють: традиційно з понеділка по суботу, на відміну від Sonn- und Feiertage. На дверях магазинів пишуть прислівник: werktags 8–18 Uhr.'
  - de: Feiertag
    ipa: "ˈfaɪ̯ɐˌtaːk"
    pos: noun
    gender: m
    plural: "die Feiertage"
    en: public holiday
    ru: праздничный (нерабочий) день
    uk: святковий (неробочий) день
    example_de: Der dritte Oktober ist in Deutschland ein Feiertag.
    example_en: The third of October is a public holiday in Germany.
    example_ru: Третье октября в Германии — государственный праздник.
    example_uk: Третє жовтня в Німеччині — державне свято.
    note:
      en: 'Der Feiertag is a day off for everybody, fixed by law: the shops stay closed. It is neither der Urlaub (your own holiday from work) nor die Ferien (school holidays).'
      ru: 'Der Feiertag — выходной для всех, установленный законом: магазины закрыты. Это не der Urlaub (ваш отпуск) и не die Ferien (школьные каникулы).'
      uk: 'Der Feiertag — вихідний для всіх, установлений законом: магазини зачинені. Це не der Urlaub (ваша відпустка) і не die Ferien (шкільні канікули).'
  - de: Sekunde
    ipa: "zeˈkʊndə"
    pos: noun
    gender: f
    plural: "die Sekunden"
    en: second
    ru: секунда
    uk: секунда
    example_de: Warte bitte eine Sekunde, ich komme sofort.
    example_en: Hold on a second, please, I am coming right away.
    example_ru: Подожди, пожалуйста, секунду, я сейчас приду.
    example_uk: Зачекай, будь ласка, секунду, я зараз прийду.
    note:
      en: 'Sixty of them make eine Minute. Like the English word, it is also used loosely for a very short moment: Eine Sekunde, bitte!'
      ru: 'Шестьдесят секунд — eine Minute. Как и по-русски, слово употребляется и в переносном смысле — «минутку»: Eine Sekunde, bitte!'
      uk: 'Шістдесят секунд — eine Minute. Як і в українській, слово вживається й у переносному значенні — «хвилинку»: Eine Sekunde, bitte!'
  - de: Alter
    ipa: "ˈaltɐ"
    pos: noun
    gender: n
    plural: "—"
    en: age
    ru: возраст
    uk: вік
    example_de: In welchem Alter kommen die Kinder in die Schule?
    example_en: At what age do children start school?
    example_ru: В каком возрасте дети идут в школу?
    example_uk: У якому віці діти йдуть до школи?
    note:
      en: 'Das Alter is the age of a person — the number on a form (Alter: 34) and the word in im Alter von 34 Jahren. Do not mix it up with der Alte, a different word meaning "the old man", or with the adjective alt (Ich bin 34 Jahre alt).'
      ru: 'Das Alter — возраст человека: число в анкете (Alter: 34) и слово в обороте im Alter von 34 Jahren. Не путайте с der Alte («старик») — это другое слово — и с прилагательным alt (Ich bin 34 Jahre alt).'
      uk: 'Das Alter — вік людини: число в анкеті (Alter: 34) і слово у звороті im Alter von 34 Jahren. Не плутайте з der Alte («старий») — це інше слово — і з прикметником alt (Ich bin 34 Jahre alt).'
  - de: Ende
    ipa: "ˈɛndə"
    pos: noun
    gender: n
    plural: "die Enden"
    en: end
    ru: конец
    uk: кінець
    example_de: Ende Mai fahren wir ans Meer.
    example_en: At the end of May we are going to the seaside.
    example_ru: В конце мая мы поедем к морю.
    example_uk: У кінці травня ми поїдемо до моря.
    note:
      en: 'The highest-value pattern in this deck: in dates, Anfang, Mitte and Ende stand bare — no article, no preposition. Anfang Mai, Mitte Juni, Ende Juli, and the fixed phrase Ende des Monats. Learn the three as one set. Elsewhere Ende keeps its article: am Ende (in the end), das Ende des Films.'
      ru: 'Самое ценное в этой колоде: в датах Anfang, Mitte и Ende стоят голыми — без артикля и без предлога. Anfang Mai, Mitte Juni, Ende Juli, а также устойчивое Ende des Monats («в конце месяца»). Учите тройку вместе. В остальных случаях Ende сохраняет артикль: am Ende («в конце концов»).'
      uk: 'Найцінніше в цій колоді: у датах Anfang, Mitte і Ende стоять голими — без артикля і без прийменника. Anfang Mai, Mitte Juni, Ende Juli, а також стале Ende des Monats («наприкінці місяця»). Вчіть трійку разом. В інших випадках Ende зберігає артикль: am Ende («врешті-решт»).'
  - de: Geburtsjahr
    ipa: "gəˈbuːɐ̯tsˌjaːɐ̯"
    pos: noun
    gender: n
    plural: "die Geburtsjahre"
    en: year of birth
    ru: год рождения
    uk: рік народження
    example_de: Bitte schreiben Sie hier Ihr Geburtsjahr.
    example_en: Please write your year of birth here.
    example_ru: Пожалуйста, напишите здесь год рождения.
    example_uk: Будь ласка, напишіть тут рік народження.
    note:
      en: 'A form word, next to Geburtsdatum (the full date) and Geburtsort (the place). Years are said as one number: neunzehnhundertneunzig for 1990.'
      ru: 'Слово из анкет, рядом с Geburtsdatum (полная дата) и Geburtsort (место). Годы называют одним числом: neunzehnhundertneunzig — 1990.'
      uk: 'Слово з анкет, поряд із Geburtsdatum (повна дата) і Geburtsort (місце). Роки називають одним числом: neunzehnhundertneunzig — 1990.'
  - de: Geburtsort
    ipa: "gəˈbuːɐ̯tsˌʔɔʁt"
    pos: noun
    gender: m
    plural: "die Geburtsorte"
    en: place of birth
    ru: место рождения
    uk: місце народження
    example_de: Mein Geburtsort ist Moskau, aber ich lebe seit zehn Jahren in Berlin.
    example_en: I was born in Moscow, but I have been living in Berlin for ten years.
    example_ru: Я родился в Москве, но уже десять лет живу в Берлине.
    example_uk: Я народився в Москві, але вже десять років живу в Берліні.
    note:
      en: 'On a form, Geburtsort asks only for the town. In a sentence Germans normally use the verb instead: Ich bin in Moskau geboren.'
      ru: 'В анкете в графе Geburtsort пишут только город. В речи обычно говорят глаголом: Ich bin in Moskau geboren.'
      uk: 'В анкеті у графі Geburtsort пишуть тільки місто. У мовленні зазвичай кажуть дієсловом: Ich bin in Moskau geboren.'
  - de: Mitte
    ipa: "ˈmɪtə"
    pos: noun
    gender: f
    plural: "—"
    en: middle, centre
    ru: середина, центр
    uk: середина, центр
    example_de: Mitte Juni beginnen die Ferien.
    example_en: The holidays start in the middle of June.
    example_ru: В середине июня начинаются каникулы.
    example_uk: У середині червня починаються канікули.
    note:
      en: 'Two lives. In time expressions it is bare, like Anfang and Ende: Mitte Juni, Mitte der Woche, Mitte vierzig (in his mid-forties). In space it keeps its article: in der Mitte, Berlin-Mitte.'
      ru: 'Две жизни. В обозначениях времени — без артикля, как Anfang и Ende: Mitte Juni, Mitte der Woche, Mitte vierzig («лет сорок пять»). В пространственном значении — с артиклем: in der Mitte, Berlin-Mitte.'
      uk: 'Два життя. У позначеннях часу — без артикля, як Anfang і Ende: Mitte Juni, Mitte der Woche, Mitte vierzig («років сорок п’ять»). У просторовому значенні — з артиклем: in der Mitte, Berlin-Mitte.'
  - de: Anfang
    ipa: "ˈanˌfaŋ"
    pos: noun
    gender: m
    plural: "die Anfänge"
    en: beginning, start
    ru: начало
    uk: початок
    example_de: Anfang Mai fängt der Deutschkurs an.
    example_en: The German course starts at the beginning of May.
    example_ru: В начале мая начинается курс немецкого.
    example_uk: На початку травня починається курс німецької.
    note:
      en: 'Bare in time expressions: Anfang Mai, Anfang nächster Woche, Anfang dreißig (in her early thirties). With an article everywhere else: am Anfang (at the start), von Anfang an (from the very beginning). The plural takes an umlaut: die Anfänge. The matching verb is anfangen.'
      ru: 'В обозначениях времени без артикля: Anfang Mai, Anfang nächster Woche, Anfang dreißig («чуть за тридцать»). В остальном с артиклем: am Anfang («в начале»), von Anfang an («с самого начала»). Множественное число с умлаутом: die Anfänge. Родственный глагол — anfangen.'
      uk: 'У позначеннях часу без артикля: Anfang Mai, Anfang nächster Woche, Anfang dreißig («трохи за тридцять»). В іншому з артиклем: am Anfang («на початку»), von Anfang an («із самого початку»). Множина з умлаутом: die Anfänge. Споріднене дієслово — anfangen.'
  - de: Schluss
    ipa: "ˈʃlʊs"
    pos: noun
    gender: m
    plural: "die Schlüsse"
    en: end, close
    ru: конец, окончание
    uk: кінець, завершення
    example_de: Schluss für heute, wir machen morgen weiter.
    example_en: That is it for today, we will carry on tomorrow.
    example_ru: На сегодня всё, продолжим завтра.
    example_uk: На сьогодні все, продовжимо завтра.
    note:
      en: 'The everyday twin of Ende: am Schluss means the same as am Ende, and zum Schluss means "finally, to finish". On its own, Schluss! means "Stop it!". Note the plural umlaut: die Schlüsse.'
      ru: 'Обиходный близнец слова Ende: am Schluss = am Ende, а zum Schluss — «напоследок, в завершение». Отдельным словом Schluss! значит «Хватит!». Во множественном числе умлаут: die Schlüsse.'
      uk: 'Побутовий близнюк слова Ende: am Schluss = am Ende, а zum Schluss — «наостанок, на завершення». Окремим словом Schluss! значить «Годі!». У множині умлаут: die Schlüsse.'
  - de: Reihe
    ipa: "ˈʁaɪ̯ə"
    pos: noun
    gender: f
    plural: "die Reihen"
    en: row; series
    ru: ряд; серия
    uk: ряд; низка
    example_de: Unsere Plätze sind in der dritten Reihe.
    example_en: Our seats are in the third row.
    example_ru: Наши места в третьем ряду.
    example_uk: Наші місця в третьому ряду.
    note:
      en: 'A row of seats or houses — and also your turn in a queue: Ich bin an der Reihe means "It is my turn". Eine Reihe von Fragen is "a number of questions".'
      ru: 'Ряд кресел или домов — а также очередь: Ich bin an der Reihe значит «Моя очередь». Eine Reihe von Fragen — «ряд вопросов».'
      uk: 'Ряд крісел або будинків — а також черга: Ich bin an der Reihe значить «Моя черга». Eine Reihe von Fragen — «низка запитань».'
  - de: beenden
    ipa: "bəˈʔɛndn̩"
    pos: verb
    praesens_3sg: beendet
    partizip2: beendet
    aux: haben
    valence: "+ Akk"
    en: to finish, to end (something)
    ru: заканчивать, завершать (что-либо)
    uk: закінчувати, завершувати (щось)
    example_de: Wir haben das Projekt letzte Woche beendet.
    example_en: We finished the project last week.
    example_ru: Мы завершили проект на прошлой неделе.
    example_uk: Ми завершили проєкт минулого тижня.
    note:
      en: 'Inseparable be- prefix, so the Partizip II has no ge-: hat beendet. Somebody always ends something — beenden needs an accusative object. When a thing ends by itself, use enden or aufhören: Der Film endet um zehn.'
      ru: 'Неотделяемая приставка be-, поэтому Partizip II без ge-: hat beendet. Кто-то заканчивает что-то — beenden требует Akkusativ. Если событие кончается само, нужен глагол enden или aufhören: Der Film endet um zehn.'
      uk: 'Невідокремлюваний префікс be-, тому Partizip II без ge-: hat beendet. Хтось завершує щось — beenden потребує Akkusativ. Якщо подія закінчується сама, потрібне дієслово enden або aufhören: Der Film endet um zehn.'
  - de: stattfinden
    ipa: "ˈʃtatˌfɪndn̩"
    pos: verb
    praesens_3sg: findet statt
    partizip2: stattgefunden
    aux: haben
    en: to take place, to be held
    ru: состояться, проходить (о мероприятии)
    uk: відбуватися, проходити (про захід)
    example_de: Das Konzert findet am Samstag im Park statt.
    example_en: The concert takes place in the park on Saturday.
    example_ru: Концерт состоится в субботу в парке.
    example_uk: Концерт відбудеться в суботу в парку.
    note:
      en: 'Separable: the prefix goes to the end of the clause (Der Kurs findet montags statt), and the Partizip II takes -ge- inside it: hat stattgefunden. The subject is always an event — a concert, a course, a meeting — and the verb takes no object at all. English has no single word for it.'
      ru: 'Отделяемый глагол: приставка уходит в конец (Der Kurs findet montags statt), а в Partizip II -ge- встаёт внутрь: hat stattgefunden. Подлежащее — всегда мероприятие (концерт, курс, встреча), дополнения у глагола нет вовсе.'
      uk: 'Відокремлюване дієслово: префікс іде в кінець (Der Kurs findet montags statt), а в Partizip II -ge- стає всередину: hat stattgefunden. Підмет — завжди захід (концерт, курс, зустріч), додатка в дієслова немає зовсім.'
