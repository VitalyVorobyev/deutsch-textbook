  - de: Person
    ipa: "pɛʁˈzoːn"
    pos: noun
    gender: f
    plural: "die Personen"
    en: person
    ru: человек, лицо
    uk: людина, особа
    example_de: Wir sind vier Personen und brauchen einen großen Tisch.
    example_en: There are four of us and we need a big table.
    example_ru: Нас четверо, нам нужен большой стол.
    example_uk: Нас четверо, нам потрібен великий стіл.
    note:
      en: 'Person is always feminine, whoever it refers to: die Person, and eine Person even for a man. It is the counting word — in restaurants, on tickets and on forms you count Personen, not Menschen: ein Tisch für zwei Personen.'
      ru: 'Person всегда женского рода, о ком бы ни шла речь: die Person, и eine Person даже о мужчине. Это «счётное» слово: в ресторане, на билетах и в анкетах считают Personen, а не Menschen: ein Tisch für zwei Personen.'
      uk: 'Person завжди жіночого роду, про кого б не йшлося: die Person, і eine Person навіть про чоловіка. Це «лічильне» слово: у ресторані, на квитках і в анкетах рахують Personen, а не Menschen: ein Tisch für zwei Personen.'
  - de: verabredet sein
    ipa: "fɛɐ̯ˈʔapʁeːdət zaɪ̯n"
    pos: phrase
    en: to have arranged to meet, to have a date
    ru: договориться о встрече, быть назначенной встрече
    uk: домовитися про зустріч, мати домовлену зустріч
    example_de: Ich bin um acht mit Anna verabredet.
    example_en: I am meeting Anna at eight — we have already arranged it.
    example_ru: Я договорился встретиться с Анной в восемь.
    example_uk: Я домовився зустрітися з Анною о восьмій.
    note:
      en: 'The chunk to learn is mit jemandem verabredet sein: the meeting has already been agreed. The person comes with mit + Dativ, the time with um: Sind Sie schon mit dem Arzt verabredet? To make the arrangement in the first place, use sich verabreden: Wir verabreden uns für Samstag.'
      ru: 'Готовая конструкция — mit jemandem verabredet sein: встреча уже условлена. Человек добавляется через mit + Dativ, время — через um: Sind Sie schon mit dem Arzt verabredet? А сам процесс договорённости — sich verabreden: Wir verabreden uns für Samstag.'
      uk: 'Готова конструкція — mit jemandem verabredet sein: зустріч уже умовлено. Людина додається через mit + Dativ, час — через um: Sind Sie schon mit dem Arzt verabredet? А сам процес домовляння — sich verabreden: Wir verabreden uns für Samstag.'
  - de: Gespräch
    ipa: "gəˈʃpʁɛːç"
    pos: noun
    gender: n
    plural: "die Gespräche"
    en: conversation, talk
    ru: разговор, беседа
    uk: розмова, бесіда
    example_de: Wir hatten gestern ein langes Gespräch über die Arbeit.
    example_en: We had a long talk about work yesterday.
    example_ru: Вчера у нас был долгий разговор о работе.
    example_uk: Учора в нас була довга розмова про роботу.
    note:
      en: 'The topic of a Gespräch is added with über + Akkusativ: ein Gespräch über die Familie. The usual verbs are ein Gespräch führen (rather formal) and, in everyday speech, simply mit jemandem sprechen.'
      ru: 'Тема разговора добавляется через über + Akkusativ: ein Gespräch über die Familie. Обычные глаголы — ein Gespräch führen (довольно официально) и в обиходе просто mit jemandem sprechen.'
      uk: 'Тема розмови додається через über + Akkusativ: ein Gespräch über die Familie. Звичні дієслова — ein Gespräch führen (доволі офіційно) і в побуті просто mit jemandem sprechen.'
  - de: Gruppe
    ipa: "ˈgʁʊpə"
    pos: noun
    gender: f
    plural: "die Gruppen"
    en: group
    ru: группа
    uk: група
    example_de: In unserer Gruppe lernen zehn Leute Deutsch.
    example_en: Ten people are learning German in our group.
    example_ru: В нашей группе десять человек учат немецкий.
    example_uk: У нашій групі десять осіб вчать німецьку.
    note:
      en: 'Membership is expressed with in + Dativ: Ich bin in der Gruppe A. The verb after a group word stays singular: Die Gruppe kommt um neun.'
      ru: 'Принадлежность к группе выражается через in + Dativ: Ich bin in der Gruppe A. Глагол при слове-«группе» остаётся в единственном числе: Die Gruppe kommt um neun.'
      uk: 'Належність до групи виражається через in + Dativ: Ich bin in der Gruppe A. Дієслово при слові-«групі» залишається в однині: Die Gruppe kommt um neun.'
