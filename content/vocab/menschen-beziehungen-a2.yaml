# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the family/relationship
# words of the Familienmitglieder, Familienstand and personen-familie-gefuehle sections.
id: menschen-beziehungen-a2
title_de: "Menschen & Beziehungen"
title_en: "People & relationships"
title_ru: "Люди и отношения"
title_uk: "Люди та стосунки"
level: A2
entries:
  - de: Cousin
    ipa: "kuˈzɛ̃ː"
    pos: noun
    gender: m
    plural: "die Cousins"
    en: cousin (male)
    ru: двоюродный брат
    uk: двоюрідний брат
    example_de: Mein Cousin wohnt seit zwei Jahren in Hamburg.
    example_en: My cousin has been living in Hamburg for two years.
    example_ru: Мой двоюродный брат уже два года живёт в Гамбурге.
    example_uk: Мій двоюрідний брат уже два роки живе в Гамбурзі.
    note:
      en: 'A French loanword, and it is still pronounced like one: ku-ZÄNG, with a nasal vowel at the end and no audible n. The plural is the French one too — die Cousins, not "die Cousine".'
      ru: 'Французское заимствование, и произносится оно по-французски: ku-ZÄNG, с носовым гласным на конце и без слышного n. Множественное число тоже французское — die Cousins.'
      uk: 'Французьке запозичення, і вимовляється воно по-французьки: ku-ZÄNG, з носовим голосним на кінці й без чутного n. Множина теж французька — die Cousins.'
  - de: Cousine
    ipa: "kuˈziːnə"
    pos: noun
    gender: f
    plural: "die Cousinen"
    en: cousin (female)
    ru: двоюродная сестра
    uk: двоюрідна сестра
    example_de: Meine Cousine hat mich zum Geburtstag eingeladen.
    example_en: My cousin invited me to her birthday party.
    example_ru: Моя двоюродная сестра пригласила меня на день рождения.
    example_uk: Моя двоюрідна сестра запросила мене на день народження.
    note:
      en: 'The feminine form has lost the nasal: it is simply ku-ZII-ne, with a clear i and a clear n. The spelling Kusine also exists and is pronounced the same.'
      ru: 'В женской форме носового звука уже нет: просто ku-SII-ne, с чистым i и чистым n. Написание Kusine тоже допустимо и звучит так же.'
      uk: 'У жіночій формі носового звука вже немає: просто ku-SII-ne, з чистим i й чистим n. Написання Kusine теж припустиме й звучить так само.'
  - de: Enkel
    ipa: "ˈɛŋkl̩"
    pos: noun
    gender: m
    plural: "die Enkel"
    en: grandson, grandchild
    ru: внук
    uk: онук
    example_de: Ihr Enkel geht schon in die Schule.
    example_en: Her grandson already goes to school.
    example_ru: Её внук уже ходит в школу.
    example_uk: Її онук уже ходить до школи.
    note:
      en: 'Singular and plural look identical: der Enkel, die Enkel. Only the article tells you which one you are hearing.'
      ru: 'Единственное и множественное число выглядят одинаково: der Enkel, die Enkel. Различить их помогает только артикль.'
      uk: 'Однина й множина виглядають однаково: der Enkel, die Enkel. Розрізнити їх допомагає лише артикль.'
  - de: Enkelin
    ipa: "ˈɛŋkəlɪn"
    pos: noun
    gender: f
    plural: "die Enkelinnen"
    en: granddaughter
    ru: внучка
    uk: онука
    example_de: Meine Enkelin spielt sehr gut Klavier.
    example_en: My granddaughter plays the piano very well.
    example_ru: Моя внучка очень хорошо играет на пианино.
    example_uk: Моя онука дуже добре грає на піаніно.
  - de: Onkel
    ipa: "ˈɔŋkl̩"
    pos: noun
    gender: m
    plural: "die Onkel"
    en: uncle
    ru: дядя
    uk: дядько
    example_de: Mein Onkel arbeitet bei der Post.
    example_en: My uncle works at the post office.
    example_ru: Мой дядя работает на почте.
    example_uk: Мій дядько працює на пошті.
  - de: Tante
    ipa: "ˈtantə"
    pos: noun
    gender: f
    plural: "die Tanten"
    en: aunt
    ru: тётя
    uk: тітка
    example_de: Am Sonntag besuchen wir meine Tante.
    example_en: On Sunday we are visiting my aunt.
    example_ru: В воскресенье мы навестим мою тётю.
    example_uk: У неділю ми відвідаємо мою тітку.
  - de: Verwandte
    ipa: "fɛɐ̯ˈvantə"
    pos: noun
    gender: f
    plural: "die Verwandten"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Verwandte", "ein Verwandter", "eine Verwandte", "Verwandte"]
    en: relative
    ru: родственник, родственница
    uk: родич, родичка
    example_de: Wir haben viele Verwandte in Österreich.
    example_en: We have a lot of relatives in Austria.
    example_ru: У нас много родственников в Австрии.
    example_uk: У нас багато родичів в Австрії.
    note:
      en: 'This is an adjectival noun: it still behaves like the adjective verwandt (related) and its ending changes with the article. der Verwandte, but ein Verwandter (a male relative); die Verwandte and eine Verwandte (a female one); in the plural die Verwandten, and without an article Verwandte. So there is no fixed form to memorize — you build it the way you build an adjective ending.'
      ru: 'Это субстантивированное прилагательное: оно ведёт себя как прилагательное verwandt («родственный»), и окончание меняется вместе с артиклем. der Verwandte, но ein Verwandter (родственник); die Verwandte и eine Verwandte (родственница); во множественном числе die Verwandten, а без артикля — Verwandte. Единой «словарной» формы тут нет: окончание строится так же, как у прилагательного.'
      uk: 'Це субстантивований прикметник: він поводиться як прикметник verwandt («споріднений»), і закінчення змінюється разом з артиклем. der Verwandte, але ein Verwandter (родич); die Verwandte і eine Verwandte (родичка); у множині die Verwandten, а без артикля — Verwandte. Єдиної «словникової» форми тут немає: закінчення будується так само, як у прикметника.'
  - de: getrennt
    ipa: "gəˈtʁɛnt"
    pos: adj
    en: separated (living apart)
    ru: живущий раздельно, разъехавшийся
    uk: той, що живе окремо; що роз’їхався
    example_de: Meine Eltern sind seit einem Jahr getrennt.
    example_en: My parents have been separated for a year.
    example_ru: Мои родители уже год живут раздельно.
    example_uk: Мої батьки вже рік живуть окремо.
    note:
      en: 'getrennt is the step before a divorce: the couple lives apart but is still married (Wir leben getrennt). Once the marriage is legally over, the word is geschieden.'
      ru: 'getrennt — ступень до развода: супруги живут раздельно, но брак ещё не расторгнут (Wir leben getrennt). Когда брак расторгнут официально, говорят geschieden.'
      uk: 'getrennt — щабель до розлучення: подружжя живе окремо, але шлюб ще не розірвано (Wir leben getrennt). Коли шлюб розірвано офіційно, кажуть geschieden.'
  - de: geschieden
    ipa: "gəˈʃiːdn̩"
    pos: adj
    en: divorced
    ru: разведён, разведена
    uk: розлучений, розлучена
    example_de: Sie ist geschieden und hat zwei Kinder.
    example_en: She is divorced and has two children.
    example_ru: Она разведена, у неё двое детей.
    example_uk: Вона розлучена, у неї двоє дітей.
    note:
      en: 'Marital status is stated with sein: Ich bin geschieden — like verheiratet and ledig. Do not build a Perfekt here; geschieden simply describes the state.'
      ru: 'Семейное положение называется через sein: Ich bin geschieden — как verheiratet и ledig. Это не Perfekt, а просто описание состояния.'
      uk: 'Сімейний стан називають через sein: Ich bin geschieden — як verheiratet і ledig. Це не Perfekt, а просто опис стану.'
  - de: Kontakt
    ipa: "kɔnˈtakt"
    pos: noun
    gender: m
    plural: "die Kontakte"
    en: contact
    ru: контакт, общение
    uk: контакт, спілкування
    example_de: Wir haben leider keinen Kontakt mehr.
    example_en: Unfortunately we are not in touch any more.
    example_ru: К сожалению, мы больше не общаемся.
    example_uk: На жаль, ми більше не спілкуємося.
    note:
      en: 'The everyday chunks: Kontakt haben (to be in touch), Kontakt aufnehmen (to get in touch) and in Kontakt bleiben (to stay in touch). The person is added with zu + Dativ: Ich habe noch Kontakt zu meiner alten Schule.'
      ru: 'Готовые обороты: Kontakt haben («поддерживать связь»), Kontakt aufnehmen («связаться») и in Kontakt bleiben («оставаться на связи»). Человек добавляется через zu + Dativ: Ich habe noch Kontakt zu meiner alten Schule.'
      uk: 'Готові звороти: Kontakt haben («підтримувати зв’язок»), Kontakt aufnehmen («зв’язатися») і in Kontakt bleiben («залишатися на зв’язку»). Людина додається через zu + Dativ: Ich habe noch Kontakt zu meiner alten Schule.'
  - de: vorstellen
    ipa: "ˈfoːɐ̯ˌʃtɛlən"
    pos: verb
    praesens_3sg: stellt vor
    partizip2: vorgestellt
    aux: haben
    valence: "+ Dat + Akk"
    en: to introduce (somebody to somebody)
    ru: представлять (кого-л. кому-л.)
    uk: представляти (когось комусь)
    example_de: Darf ich Ihnen meinen Mann vorstellen?
    example_en: May I introduce my husband to you?
    example_ru: Разрешите представить вам моего мужа.
    example_uk: Дозвольте представити вам мого чоловіка.
    note:
      en: 'A separable verb: the prefix leaves the verb and goes to the end — Ich stelle dir meine Kollegin vor. The person who meets somebody new stands in the Dativ, the person being introduced in the Akkusativ. The same verb has a second, very common sense with a reflexive Dativ pronoun: sich (Dat) etwas vorstellen = to imagine — Stell dir vor, wir haben eine Wohnung gefunden! Note the pronoun: dir/mir, not dich/mich.'
      ru: 'Отделяемый глагол: приставка уходит в конец — Ich stelle dir meine Kollegin vor. Тот, кому представляют, стоит в Dativ, а тот, кого представляют, — в Akkusativ. У этого же глагола есть второе, очень частое значение с возвратным местоимением в Dativ: sich (Dat) etwas vorstellen — «представлять себе, воображать»: Stell dir vor, wir haben eine Wohnung gefunden! Обратите внимание на местоимение: dir/mir, а не dich/mich.'
      uk: 'Відокремлюване дієслово: префікс іде в кінець — Ich stelle dir meine Kollegin vor. Той, кому представляють, стоїть у Dativ, а той, кого представляють, — в Akkusativ. У цього ж дієслова є друге, дуже часте значення зі зворотним займенником у Dativ: sich (Dat) etwas vorstellen — «уявляти собі»: Stell dir vor, wir haben eine Wohnung gefunden! Зверніть увагу на займенник: dir/mir, а не dich/mich.'
  - de: Baby
    ipa: "ˈbeːbi"
    pos: noun
    gender: n
    plural: "die Babys"
    en: baby
    ru: младенец, малыш
    uk: немовля, малюк
    example_de: Das Baby schläft schon.
    example_en: The baby is already asleep.
    example_ru: Малыш уже спит.
    example_uk: Малюк уже спить.
    note:
      en: 'An English loanword, but the first vowel is a long German e: BEH-bi. The plural is written the German way — die Babys, never "Babies".'
      ru: 'Английское заимствование, но первый гласный — долгое немецкое e: BEH-bi. Множественное число пишется по-немецки: die Babys, а не «Babies».'
      uk: 'Англійське запозичення, але перший голосний — довге німецьке e: BEH-bi. Множина пишеться по-німецьки: die Babys, а не «Babies».'
  - de: Bekannte
    ipa: "bəˈkantə"
    pos: noun
    gender: f
    plural: "die Bekannten"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Bekannte", "ein Bekannter", "eine Bekannte", "Bekannte"]
    en: acquaintance
    ru: знакомый, знакомая
    uk: знайомий, знайома
    example_de: Eine Bekannte von mir sucht gerade eine Wohnung.
    example_en: An acquaintance of mine is looking for a flat at the moment.
    example_ru: Одна моя знакомая сейчас ищет квартиру.
    example_uk: Одна моя знайома зараз шукає квартиру.
    note:
      en: 'Germans draw a hard line here that English blurs. A Bekannter is somebody you know — a colleague, a neighbour, the person from your course — and calling that person mein Freund would say something quite different: with a possessive, mein Freund / meine Freundin normally means a romantic partner. So for people you merely know, say ein Bekannter / eine Bekannte, or ein Freund von mir if you really do mean a friend. Like Verwandte, it is an adjectival noun: der Bekannte, ein Bekannter, eine Bekannte, die Bekannten.'
      ru: 'Немецкий проводит здесь границу гораздо жёстче русского. Bekannter — это просто знакомый: коллега, сосед, человек с курсов, — и назвать его mein Freund значит сказать совсем другое: с притяжательным местоимением mein Freund / meine Freundin обычно означает «мой парень» / «моя девушка». Поэтому о знакомых говорят ein Bekannter / eine Bekannte, а если человек и правда друг — ein Freund von mir. Как и Verwandte, это субстантивированное прилагательное: der Bekannte, ein Bekannter, eine Bekannte, die Bekannten.'
      uk: 'Німецька проводить тут межу набагато чіткіше за українську. Bekannter — це просто знайомий: колега, сусід, людина з курсів, — і назвати його mein Freund означає сказати зовсім інше: із присвійним займенником mein Freund / meine Freundin зазвичай означає «мій хлопець» / «моя дівчина». Тому про знайомих кажуть ein Bekannter / eine Bekannte, а якщо людина й справді друг — ein Freund von mir. Як і Verwandte, це субстантивований прикметник: der Bekannte, ein Bekannter, eine Bekannte, die Bekannten.'
  - de: Dame
    ipa: "ˈdaːmə"
    pos: noun
    gender: f
    plural: "die Damen"
    en: lady
    ru: дама
    uk: пані, дама
    example_de: Meine Damen und Herren, herzlich willkommen!
    example_en: Ladies and gentlemen, a very warm welcome!
    example_ru: Дамы и господа, добро пожаловать!
    example_uk: Пані та панове, ласкаво просимо!
    note:
      en: 'Dame is the polite word, the counterpart of Herr. You meet it in announcements (Meine Damen und Herren …), on doors (Damen / Herren) and in shops. In ordinary talk about people you still say Frau: Eine Frau hat gefragt.'
      ru: 'Dame — вежливое слово, пара к Herr. Встречается в объявлениях (Meine Damen und Herren …), на дверях (Damen / Herren) и в магазинах. В обычном разговоре о людях по-прежнему говорят Frau: Eine Frau hat gefragt.'
      uk: 'Dame — ввічливе слово, пара до Herr. Трапляється в оголошеннях (Meine Damen und Herren …), на дверях (Damen / Herren) і в магазинах. У звичайній розмові про людей, як і раніше, кажуть Frau: Eine Frau hat gefragt.'
  - de: Ehefrau
    ipa: "ˈeːəˌfʁaʊ̯"
    pos: noun
    gender: f
    plural: "die Ehefrauen"
    en: wife
    ru: жена, супруга
    uk: дружина
    example_de: Seine Ehefrau kommt aus der Schweiz.
    example_en: His wife is from Switzerland.
    example_ru: Его жена из Швейцарии.
    example_uk: Його дружина зі Швейцарії.
    note:
      en: 'Ehefrau is the explicit word for a wife (die Ehe = the marriage). In everyday speech people simply say meine Frau — Ehefrau shows up mainly on forms and where the relationship must be unambiguous.'
      ru: 'Ehefrau — «жена» в точном смысле (die Ehe — «брак»). В обиходной речи говорят просто meine Frau, а Ehefrau встречается в основном в анкетах и там, где надо избежать двусмысленности.'
      uk: 'Ehefrau — «дружина» в точному значенні (die Ehe — «шлюб»). У побутовому мовленні кажуть просто meine Frau, а Ehefrau трапляється переважно в анкетах і там, де треба уникнути двозначності.'
  - de: Ehemann
    ipa: "ˈeːəˌman"
    pos: noun
    gender: m
    plural: "die Ehemänner"
    en: husband
    ru: муж, супруг
    uk: чоловік (у шлюбі)
    example_de: Ihr Ehemann arbeitet als Koch.
    example_en: Her husband works as a chef.
    example_ru: Её муж работает поваром.
    example_uk: Її чоловік працює кухарем.
    note:
      en: 'Like Ehefrau: the explicit term. Day to day you say mein Mann — but Mann on its own also means "man", so Ehemann removes the doubt.'
      ru: 'Как и Ehefrau, это точный термин. В быту говорят mein Mann, но Mann само по себе значит и «мужчина», поэтому Ehemann снимает двусмысленность.'
      uk: 'Як і Ehefrau, це точний термін. У побуті кажуть mein Mann, але Mann саме по собі означає й «чоловік» (мужчина), тому Ehemann знімає двозначність.'
  - de: Ehepartner
    ipa: "ˈeːəˌpaʁtnɐ"
    pos: noun
    gender: m
    plural: "die Ehepartner"
    en: spouse
    ru: супруг (в браке)
    uk: один із подружжя (у шлюбі)
    example_de: Bitte schreiben Sie hier den Namen von Ihrem Ehepartner.
    example_en: Please write your spouse's name here.
    example_ru: Пожалуйста, впишите здесь имя вашего супруга.
    example_uk: Будь ласка, впишіть тут ім’я вашого чоловіка чи дружини.
    note:
      en: 'The neutral, official word for "spouse", used on forms and in offices where the sex of the person does not matter. The female counterpart is die Ehepartnerin.'
      ru: 'Нейтральное официальное слово «супруг», встречается в анкетах и учреждениях, где пол человека не важен. Женская пара — die Ehepartnerin.'
      uk: 'Нейтральне офіційне слово «той із подружжя», трапляється в анкетах і установах, де стать людини не важлива. Жіноча пара — die Ehepartnerin.'
  - de: Erwachsene
    ipa: "ɛɐ̯ˈvaksənə"
    pos: noun
    gender: f
    plural: "die Erwachsenen"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Erwachsene", "ein Erwachsener", "eine Erwachsene", "Erwachsene"]
    en: adult
    ru: взрослый, взрослая
    uk: дорослий, доросла
    example_de: Für Erwachsene kostet die Karte zwölf Euro.
    example_en: For adults the ticket costs twelve euros.
    example_ru: Для взрослых билет стоит двенадцать евро.
    example_uk: Для дорослих квиток коштує дванадцять євро.
    note:
      en: 'Another adjectival noun, from the adjective erwachsen (grown-up): der Erwachsene, ein Erwachsener, eine Erwachsene, die Erwachsenen, and after a preposition with no article simply Erwachsene (für Erwachsene). The ending follows the article, exactly as an adjective ending does.'
      ru: 'Ещё одно субстантивированное прилагательное, от erwachsen («взрослый»): der Erwachsene, ein Erwachsener, eine Erwachsene, die Erwachsenen, а без артикля после предлога — просто Erwachsene (für Erwachsene). Окончание следует за артиклем ровно так же, как окончание прилагательного.'
      uk: 'Ще один субстантивований прикметник, від erwachsen («дорослий»): der Erwachsene, ein Erwachsener, eine Erwachsene, die Erwachsenen, а без артикля після прийменника — просто Erwachsene (für Erwachsene). Закінчення йде за артиклем так само, як закінчення прикметника.'
  - de: Jugendliche
    ipa: "ˈjuːgn̩tlɪçə"
    pos: noun
    gender: f
    plural: "die Jugendlichen"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Jugendliche", "ein Jugendlicher", "eine Jugendliche", "Jugendliche"]
    en: teenager, young person
    ru: подросток, молодой человек
    uk: підліток, молода людина
    example_de: Viele Jugendliche treffen sich am Wochenende im Park.
    example_en: A lot of teenagers meet up in the park at the weekend.
    example_ru: Многие подростки встречаются по выходным в парке.
    example_uk: Багато підлітків зустрічаються на вихідних у парку.
    note:
      en: 'An adjectival noun again: der Jugendliche, ein Jugendlicher, eine Jugendliche, die Jugendlichen, and Jugendliche with no article (Jugendliche zahlen weniger). It covers roughly ages 14 to 18 — younger than an Erwachsener, older than a Kind.'
      ru: 'Снова субстантивированное прилагательное: der Jugendliche, ein Jugendlicher, eine Jugendliche, die Jugendlichen, а без артикля — Jugendliche (Jugendliche zahlen weniger). Речь примерно о возрасте 14–18 лет: уже не Kind, но ещё не Erwachsener.'
      uk: 'Знову субстантивований прикметник: der Jugendliche, ein Jugendlicher, eine Jugendliche, die Jugendlichen, а без артикля — Jugendliche (Jugendliche zahlen weniger). Ідеться приблизно про вік 14–18 років: уже не Kind, але ще не Erwachsener.'
  - de: Partner
