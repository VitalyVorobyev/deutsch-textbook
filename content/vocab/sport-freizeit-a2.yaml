# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the sport and hobby
# words of the freizeit-sport-kultur-medien section.
id: sport-freizeit-a2
title_de: "Sport & Freizeit"
title_en: "Sport & free time"
title_ru: "Спорт и свободное время"
title_uk: "Спорт і вільний час"
level: A2
entries:
  - de: Ski
    ipa: "ˈʃiː"
    pos: noun
    gender: m
    plural: die Skier
    en: ski
    ru: лыжа
    uk: лижа
    example_de: Im Winter fahren wir jedes Jahr in den Bergen Ski.
    example_en: Every year in winter we go skiing in the mountains.
    example_ru: Зимой мы каждый год катаемся на лыжах в горах.
    example_uk: Узимку ми щороку катаємося на лижах у горах.
    note:
      en: 'Spelt with Sk-, but spoken "schi" — ˈʃiː. The sport is Ski fahren or Ski laufen, with no article: Ich fahre Ski. The plural die Skier means the physical skis.'
      ru: 'Пишется Sk-, но читается «ши» — ˈʃiː. Кататься на лыжах — Ski fahren или Ski laufen, без артикля: Ich fahre Ski. Множественное число die Skier — сами лыжи как предметы.'
      uk: 'Пишеться Sk-, але читається «ши» — ˈʃiː. Кататися на лижах — Ski fahren або Ski laufen, без артикля: Ich fahre Ski. Множина die Skier — самі лижі як предмети.'
  - de: spazieren gehen
    ipa: "ʃpaˈtsiːʁən ˈgeːən"
    pos: verb
    praesens_3sg: geht spazieren
    partizip2: spazieren gegangen
    aux: sein
    en: to go for a walk
    ru: идти гулять, прогуливаться
    uk: іти гуляти, прогулюватися
    example_de: Nach dem Essen gehen wir eine Stunde spazieren.
    example_en: After the meal we go for a walk for an hour.
    example_ru: После еды мы час гуляем.
    example_uk: Після їжі ми годину гуляємо.
    note:
      en: 'Two words, always — spazieren gehen, never "spazierengehen". The Perfekt takes sein, because the verb doing the work is gehen: Ich bin spazieren gegangen. In a main clause the two parts split like a separable verb: Ich gehe jeden Abend spazieren.'
      ru: 'Пишется в два слова: spazieren gehen. Перфект со вспомогательным sein, потому что второй глагол — gehen: Ich bin spazieren gegangen. В предложении части расходятся, как у отделяемых глаголов: Ich gehe jeden Abend spazieren.'
      uk: 'Пишеться у два слова: spazieren gehen. Перфект із допоміжним sein, бо друге дієслово — gehen: Ich bin spazieren gegangen. У реченні частини розходяться, як у відокремлюваних дієслів: Ich gehe jeden Abend spazieren.'
  - de: Spaziergang
    ipa: "ʃpaˈtsiːɐ̯ˌgaŋ"
    pos: noun
    gender: m
    plural: die Spaziergänge
    en: walk, stroll
    ru: прогулка
    uk: прогулянка
    example_de: Am Sonntag machen wir einen langen Spaziergang am Fluss.
    example_en: On Sunday we take a long walk along the river.
    example_ru: В воскресенье мы совершаем долгую прогулку вдоль реки.
    example_uk: У неділю ми робимо довгу прогулянку вздовж річки.
    note:
      en: 'The noun to spazieren gehen. You do not "do" it with tun — the verb is machen: einen Spaziergang machen. Plural with umlaut: die Spaziergänge.'
      ru: 'Существительное от spazieren gehen. Устойчивое сочетание — einen Spaziergang machen. Множественное число с умлаутом: die Spaziergänge.'
      uk: 'Іменник від spazieren gehen. Стале сполучення — einen Spaziergang machen. Множина з умлаутом: die Spaziergänge.'
  - de: Tennis
    ipa: "ˈtɛnɪs"
    pos: noun
    gender: n
    plural: "—"
    en: tennis
    ru: теннис
    uk: теніс
    example_de: Meine Schwester spielt zweimal in der Woche Tennis.
    example_en: My sister plays tennis twice a week.
    example_ru: Моя сестра играет в теннис два раза в неделю.
    example_uk: Моя сестра грає в теніс двічі на тиждень.
    note:
      en: 'Like every ball game: no article after spielen — Ich spiele Tennis. The name of the sport has no plural.'
      ru: 'Как и другие игры с мячом: после spielen без артикля — Ich spiele Tennis. У названия вида спорта нет множественного числа.'
      uk: 'Як і інші ігри з м’ячем: після spielen без артикля — Ich spiele Tennis. Назва виду спорту не має множини.'
  - de: Basketball
    ipa: "ˈbaːskətˌbal"
    pos: noun
    gender: m
    plural: "—"
    en: basketball
    ru: баскетбол
    uk: баскетбол
    example_de: Am Mittwoch spielen die Kinder in der Schule Basketball.
    example_en: On Wednesday the children play basketball at school.
    example_ru: По средам дети играют в школе в баскетбол.
    example_uk: По середах діти грають у школі в баскетбол.
    note:
      en: 'The sport is masculine and has no plural: Basketball spielen, without an article. (The ball itself would be der Ball.)'
      ru: 'Название спорта — мужского рода и без множественного числа: Basketball spielen, без артикля. (Сам мяч — der Ball.)'
      uk: 'Назва спорту — чоловічого роду й без множини: Basketball spielen, без артикля. (Сам м’яч — der Ball.)'
  - de: Halle
    ipa: "ˈhalə"
    pos: noun
    gender: f
    plural: die Hallen
    en: hall, indoor arena
    ru: зал, крытая площадка
    uk: зала, критий майданчик
    example_de: Wenn es regnet, trainieren wir in der Halle.
    example_en: When it rains we train indoors in the hall.
    example_ru: Когда идёт дождь, мы тренируемся в зале.
    example_uk: Коли йде дощ, ми тренуємося в залі.
    note:
      en: 'A big covered space for sport or events. The contrast that matters is in der Halle (indoors) versus draußen or im Freien (outdoors).'
      ru: 'Большое крытое помещение для спорта или мероприятий. Важно противопоставление: in der Halle — в помещении, draußen — на улице.'
      uk: 'Велике крите приміщення для спорту чи заходів. Важливе протиставлення: in der Halle — у приміщенні, draußen — надворі.'
  - de: Mannschaft
    ipa: "ˈmanˌʃaft"
    pos: noun
    gender: f
    plural: die Mannschaften
    en: team
    ru: команда
    uk: команда
    example_de: Unsere Mannschaft hat das Spiel am Samstag gewonnen.
    example_en: Our team won the match on Saturday.
    example_ru: Наша команда выиграла матч в субботу.
    example_uk: Наша команда виграла матч у суботу.
    note:
      en: 'The word for a sports team, and it is feminine — the -schaft ending always is: die Mannschaft, die Freundschaft. The English word Team also exists in German (das Team).'
      ru: 'Слово для спортивной команды; женского рода, потому что суффикс -schaft всегда даёт die: die Mannschaft, die Freundschaft. Есть и заимствование das Team.'
      uk: 'Слово для спортивної команди; жіночого роду, бо суфікс -schaft завжди дає die: die Mannschaft, die Freundschaft. Є й запозичення das Team.'
  - de: Sportplatz
    ipa: "ˈʃpɔʁtˌplats"
    pos: noun
    gender: m
    plural: die Sportplätze
    en: sports ground, playing field
    ru: спортивная площадка, стадион
    uk: спортивний майданчик, стадіон
    example_de: Der Sportplatz liegt direkt hinter der Schule.
    example_en: The sports ground is right behind the school.
    example_ru: Спортивная площадка находится прямо за школой.
    example_uk: Спортивний майданчик розташований прямо за школою.
    note:
      en: 'An outdoor pitch — the counterpart to die Halle. Compound of Sport + Platz, so it takes the gender of Platz: der Sportplatz. Plural with umlaut: die Sportplätze.'
      ru: 'Площадка под открытым небом — противоположность die Halle. Сложное слово Sport + Platz, поэтому род берётся от Platz: der Sportplatz. Множественное с умлаутом: die Sportplätze.'
      uk: 'Майданчик просто неба — протилежність die Halle. Складне слово Sport + Platz, тому рід береться від Platz: der Sportplatz. Множина з умлаутом: die Sportplätze.'
  - de: Tipp
    ipa: "ˈtɪp"
    pos: noun
    gender: m
    plural: die Tipps
    en: tip, hint
    ru: совет, подсказка
    uk: порада, підказка
    example_de: Der Trainer gibt uns vor dem Spiel noch ein paar Tipps.
    example_en: The coach gives us a few tips before the match.
    example_ru: Перед матчем тренер даёт нам ещё несколько советов.
    example_uk: Перед матчем тренер дає нам ще кілька порад.
    note:
      en: 'Two p, always: der Tipp, die Tipps. Do not mix it up with der Typ, which is a type or, colloquially, a guy — different word, different vowel.'
      ru: 'Всегда с двумя p: der Tipp, die Tipps. Не путать с der Typ — «тип» или, разговорно, «парень»: другое слово и другой гласный.'
      uk: 'Завжди з двома p: der Tipp, die Tipps. Не плутати з der Typ — «тип» або, розмовно, «хлопець»: інше слово й інший голосний.'
  - de: Training
    ipa: "ˈtʁɛːnɪŋ"
    pos: noun
    gender: n
    plural: die Trainings
    en: training, practice session
    ru: тренировка
    uk: тренування
    example_de: Das Training beginnt jeden Dienstag um sechs Uhr.
    example_en: Training starts every Tuesday at six o'clock.
    example_ru: Тренировка начинается каждый вторник в шесть часов.
    example_uk: Тренування починається щовівторка о шостій годині.
    note:
      en: 'The noun beside the verb trainieren: zum Training gehen. It is neuter — das Training — and the plural follows the English loan pattern: die Trainings.'
      ru: 'Существительное к глаголу trainieren: zum Training gehen. Среднего рода — das Training, множественное число как у заимствований: die Trainings.'
      uk: 'Іменник до дієслова trainieren: zum Training gehen. Середнього роду — das Training, множина як у запозичень: die Trainings.'
  - de: Verein
    ipa: "fɛɐ̯ˈʔaɪ̯n"
    pos: noun
    gender: m
    plural: die Vereine
    en: club, association
    ru: клуб, общество, секция
    uk: клуб, товариство, секція
    example_de: Mein Sohn ist seit zwei Jahren in einem Sportverein.
    example_en: My son has been a member of a sports club for two years.
    example_ru: Мой сын уже два года занимается в спортивной секции.
    example_uk: Мій син уже два роки займається у спортивній секції.
    note:
      en: 'A very German institution: a registered club you join — für Sport, Musik, Schach. The set phrases are in einem Verein sein and in einen Verein eintreten. Note the stress falls on -ein: fɛɐ̯ˈʔaɪ̯n.'
      ru: 'Очень немецкое учреждение: зарегистрированное общество, куда вступают — спортивное, музыкальное, шахматное. Устойчивые обороты: in einem Verein sein, in einen Verein eintreten. Ударение на -ein: fɛɐ̯ˈʔaɪ̯n.'
      uk: 'Дуже німецька інституція: зареєстроване товариство, до якого вступають, — спортивне, музичне, шахове. Сталі звороти: in einem Verein sein, in einen Verein eintreten. Наголос на -ein: fɛɐ̯ˈʔaɪ̯n.'
  - de: Volleyball
    ipa: "ˈvɔliˌbal"
    pos: noun
    gender: m
    plural: "—"
    en: volleyball
    ru: волейбол
    uk: волейбол
    example_de: Im Sommer spielen wir am Strand oft Volleyball.
    example_en: In summer we often play volleyball on the beach.
    example_ru: Летом мы часто играем в волейбол на пляже.
    example_uk: Улітку ми часто граємо у волейбол на пляжі.
    note:
      en: 'The spelling is English, but the v here is voiced — ˈvɔliˌbal, not the usual German f-sound of Vater. No article after spielen, and the sport has no plural.'
      ru: 'Написание английское, но v здесь звонкое — ˈvɔliˌbal, а не глухое f, как в Vater. После spielen артикля нет, и у названия спорта нет множественного числа.'
      uk: 'Написання англійське, але v тут дзвінке — ˈvɔliˌbal, а не глухе f, як у Vater. Після spielen артикля немає, і назва спорту не має множини.'
  - de: Wettbewerb
    ipa: "ˈvɛtbəˌvɛʁp"
    pos: noun
    gender: m
    plural: die Wettbewerbe
    en: competition, contest
    ru: соревнование, конкурс
    uk: змагання, конкурс
    example_de: Nächste Woche gibt es in der Schule einen Wettbewerb.
    example_en: There is a competition at school next week.
    example_ru: На следующей неделе в школе будет конкурс.
    example_uk: Наступного тижня у школі буде конкурс.
    note:
      en: 'The organized contest — sport, music or work. The fixed phrase for taking part is an einem Wettbewerb teilnehmen. The final -b is spoken as p.'
      ru: 'Организованное состязание — спортивное, музыкальное или профессиональное. Участвовать — an einem Wettbewerb teilnehmen. Конечное -b произносится как p.'
      uk: 'Організоване змагання — спортивне, музичне або професійне. Брати участь — an einem Wettbewerb teilnehmen. Кінцеве -b вимовляється як p.'
  - de: Zelt
    ipa: "ˈtsɛlt"
    pos: noun
    gender: n
    plural: die Zelte
    en: tent
    ru: палатка
    uk: намет
    example_de: Wir schlafen im Sommer gern im Zelt.
    example_en: In summer we like sleeping in a tent.
    example_ru: Летом мы любим спать в палатке.
    example_uk: Улітку ми любимо спати в наметі.
    note:
      en: 'Camping vocabulary: ein Zelt aufbauen (to put a tent up), im Zelt schlafen, zelten (to camp).'
      ru: 'Лексика похода: ein Zelt aufbauen — ставить палатку, im Zelt schlafen — спать в палатке, zelten — жить в палатке.'
      uk: 'Лексика походу: ein Zelt aufbauen — ставити намет, im Zelt schlafen — спати в наметі, zelten — жити в наметі.'
  - de: basteln
    ipa: "ˈbastl̩n"
    pos: verb
    praesens_3sg: bastelt
    partizip2: gebastelt
    aux: haben
    valence: "+ Akk"
    en: to do handicrafts, to make things by hand
    ru: мастерить, делать своими руками
    uk: майструвати, робити власноруч
    example_de: Die Kinder basteln am Nachmittag eine Karte für die Oma.
    example_en: In the afternoon the children are making a card for their grandma.
    example_ru: Днём дети мастерят открытку для бабушки.
    example_uk: Удень діти майструють листівку для бабусі.
    note:
      en: 'The everyday word for making small things by hand — cards, paper models, decorations. Regular: bastelt, hat gebastelt. In the ich-form the e drops out: ich bastle.'
      ru: 'Обиходное слово для ручных поделок — открытки, модели, украшения. Правильный глагол: bastelt, hat gebastelt. В форме ich выпадает e: ich bastle.'
      uk: 'Побутове слово для ручних виробів — листівки, моделі, прикраси. Правильне дієслово: bastelt, hat gebastelt. У формі ich випадає e: ich bastle.'
  - de: gewinnen
    ipa: "gəˈvɪnən"
    pos: verb
    praesens_3sg: gewinnt
    partizip2: gewonnen
    aux: haben
    valence: "+ Akk"
    en: to win
    ru: выигрывать, побеждать
    uk: вигравати, перемагати
    example_de: Wer gewinnt heute Abend das Spiel?
    example_en: Who is going to win the match tonight?
    example_ru: Кто сегодня вечером выиграет матч?
    example_uk: Хто сьогодні ввечері виграє матч?
    note:
      en: 'Strong verb with a vowel change in the Partizip II: gewinnen — hat gewonnen, never "gewinnt" as a participle. Its ge- belongs to the stem, so no second ge- is added. The opposite is verlieren — hat verloren.'
      ru: 'Сильный глагол с чередованием в Partizip II: gewinnen — hat gewonnen (не «gewinnt»). Приставка ge- здесь часть корня, второе ge- не добавляется. Противоположность — verlieren — hat verloren.'
      uk: 'Сильне дієслово з чергуванням у Partizip II: gewinnen — hat gewonnen (не «gewinnt»). Префікс ge- тут частина кореня, друге ge- не додається. Протилежність — verlieren — hat verloren.'
  - de: joggen
    ipa: "ˈdʒɔgn̩"
    pos: verb
    praesens_3sg: joggt
    partizip2: gejoggt
    aux: sein
    en: to jog, to go running
    ru: бегать трусцой
    uk: бігати підтюпцем
    example_de: Jeden Morgen jogge ich eine halbe Stunde im Park.
    example_en: Every morning I jog for half an hour in the park.
    example_ru: Каждое утро я полчаса бегаю в парке.
    example_uk: Щоранку я півгодини бігаю в парку.
    note:
      en: 'An English loan, spoken with the English j: ˈdʒɔgn̩. Perfekt with sein, like every verb of moving from A to B: Ich bin gestern gejoggt.'
      ru: 'Заимствование из английского, произносится с английским j: ˈdʒɔgn̩. Перфект с sein, как у всех глаголов движения: Ich bin gestern gejoggt.'
      uk: 'Запозичення з англійської, вимовляється з англійським j: ˈdʒɔgn̩. Перфект із sein, як у всіх дієслів руху: Ich bin gestern gejoggt.'
  - de: reiten
    ipa: "ˈʁaɪ̯tn̩"
    pos: verb
    praesens_3sg: reitet
    partizip2: geritten
    aux: sein
    en: to ride (a horse)
    ru: ездить верхом, кататься на лошади
    uk: їздити верхи, кататися на коні
    example_de: Meine Tochter reitet seit einem Jahr.
    example_en: My daughter has been riding for a year.
    example_ru: Моя дочь занимается верховой ездой уже год.
    example_uk: Моя донька займається верховою їздою вже рік.
    note:
      en: 'Only about horses — a bike is fahren, not reiten. Strong verb: reitet, ist geritten, with sein because it is movement.'
      ru: 'Только о лошадях — на велосипеде ездят fahren, а не reiten. Сильный глагол: reitet, ist geritten, со вспомогательным sein, потому что это движение.'
      uk: 'Тільки про коней — велосипедом їздять fahren, а не reiten. Сильне дієслово: reitet, ist geritten, з допоміжним sein, бо це рух.'
  - de: sammeln
    ipa: "ˈzaml̩n"
    pos: verb
    praesens_3sg: sammelt
    partizip2: gesammelt
    aux: haben
    valence: "+ Akk"
    en: to collect
    ru: собирать, коллекционировать
    uk: збирати, колекціонувати
    example_de: Mein Bruder sammelt seit seiner Kindheit Briefmarken.
    example_en: My brother has collected stamps since he was a child.
    example_ru: Мой брат с детства собирает марки.
    example_uk: Мій брат із дитинства збирає марки.
    note:
      en: 'Regular, with the object in the accusative: Ich sammle Fotos. Like basteln, it drops the e in the ich-form: ich sammle.'
      ru: 'Правильный глагол, дополнение в Akkusativ: Ich sammle Fotos. Как и basteln, теряет e в форме ich: ich sammle.'
      uk: 'Правильне дієслово, додаток у Akkusativ: Ich sammle Fotos. Як і basteln, втрачає e у формі ich: ich sammle.'
  - de: trainieren
    ipa: "tʁɛˈniːʁən"
    pos: verb
    praesens_3sg: trainiert
    partizip2: trainiert
    aux: haben
    en: to train, to work out
    ru: тренироваться, тренировать
    uk: тренуватися, тренувати
    example_de: Vor dem Wettbewerb trainieren wir dreimal in der Woche.
    example_en: Before the competition we train three times a week.
    example_ru: Перед соревнованием мы тренируемся три раза в неделю.
    example_uk: Перед змаганням ми тренуємося тричі на тиждень.
    note:
      en: '-ieren verb, so the Partizip II has no ge-: hat trainiert. It works with or without an object — für den Marathon trainieren, or eine Mannschaft trainieren.'
      ru: 'Глагол на -ieren, поэтому Partizip II без ge-: hat trainiert. Может быть без дополнения (für den Marathon trainieren) и с ним (eine Mannschaft trainieren).'
