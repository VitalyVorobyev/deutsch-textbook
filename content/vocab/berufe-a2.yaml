# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the Berufe section.
id: berufe-a2
title_de: "Berufe"
title_en: "Professions"
title_ru: "Профессии"
level: A2
entries:
  - de: Angestellte
    ipa: "ˈangəʃtɛltə"
    pos: noun
    gender: f
    plural: "die Angestellten"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Angestellte", "ein Angestellter", "eine Angestellte", "Angestellte"]
    en: employee (of a company or an office)
    ru: служащая, наёмная работница
    example_de: Meine Schwester ist Angestellte bei der Post.
    example_en: My sister is an employee at the post office.
    example_ru: Моя сестра — служащая на почте.
    note:
      en: "An adjectival noun: it declines like an adjective, so the ending moves with the article — der Angestellte (a man), ein Angestellter, die Angestellte (a woman), eine Angestellte, and in the plural die Angestellten. The word comes from anstellen (to employ)."
      ru: "Субстантивированное прилагательное: склоняется как прилагательное, поэтому окончание меняется вместе с артиклем — der Angestellte (мужчина), ein Angestellter, die Angestellte (женщина), eine Angestellte, во множественном числе die Angestellten. Слово образовано от глагола anstellen («нанимать на работу»)."
  - de: Auszubildende
    ipa: "ˈaʊ̯stsubɪldn̩də"
    pos: noun
    gender: f
    plural: "die Auszubildenden"
    # Adjectival noun: der/ein …-er and die/eine …-e are all correct. The card shows
    # one form; it must not mark the others wrong.
    accept: ["der Auszubildende", "ein Auszubildender", "eine Auszubildende", "Auszubildende"]
    en: trainee, apprentice (in company training)
    ru: ученица на производстве, стажёрка
    example_de: Unsere Firma hat dieses Jahr drei Auszubildende.
    example_en: Our company has three trainees this year.
    example_ru: В этом году в нашей фирме три ученика на производстве.
    note:
      en: "Another adjectival noun, exactly like Angestellte: der Auszubildende, ein Auszubildender, die Auszubildende, eine Auszubildende, plural die Auszubildenden. The long official word is almost never spoken — everybody says der Azubi / die Azubi (plural die Azubis)."
      ru: "Ещё одно субстантивированное прилагательное, ровно как Angestellte: der Auszubildende, ein Auszubildender, die Auszubildende, eine Auszubildende, множественное число die Auszubildenden. Длинное официальное слово в речи почти не встречается — все говорят der Azubi / die Azubi (множественное die Azubis)."
  - de: Autor
    ipa: "ˈaʊ̯toːɐ̯"
    pos: noun
    gender: m
    plural: "die Autoren"
    en: author, writer (male)
    ru: автор, писатель (мужчина)
    example_de: Mein Onkel ist Autor. Er schreibt Bücher für Kinder.
    example_en: My uncle is an author. He writes books for children.
    example_ru: Мой дядя — писатель. Он пишет книги для детей.
    note:
      en: "The stress moves when the word grows: AU-tor, but Au-TO-ren in the plural and Au-TO-rin in the feminine. Say the plural with the accent on the second syllable and you will sound right."
      ru: "Ударение сдвигается, когда слово удлиняется: AU-tor, но Au-TO-ren во множественном числе и Au-TO-rin в женской форме. Произносите множественное число с ударением на втором слоге."
  - de: Autorin
    ipa: "aʊ̯ˈtoːʁɪn"
    pos: noun
    gender: f
    plural: "die Autorinnen"
    en: author, writer (female)
    ru: автор, писательница (женщина)
    example_de: Die Autorin hat schon zehn Bücher geschrieben.
    example_en: The author has already written ten books.
    example_ru: Писательница написала уже десять книг.
  - de: Babysitter
    ipa: "ˈbeːbiˌzɪtɐ"
    pos: noun
    gender: m
    plural: "die Babysitter"
    en: babysitter
    ru: бэбиситтер, приходящая няня
    example_de: Am Samstag kommt der Babysitter, dann gehen wir ins Kino.
    example_en: The babysitter is coming on Saturday, so we can go to the cinema.
    example_ru: В субботу придёт бэбиситтер, и мы пойдём в кино.
    note:
      en: "An English loanword that keeps its meaning but takes German stress: BA-by-sit-ter, with the main accent on the first part. The feminine die Babysitterin exists, but for the job in general people say der Babysitter."
      ru: "Заимствование из английского: значение то же, а ударение немецкое — BA-by-sit-ter, главный акцент на первой части. Женская форма die Babysitterin существует, но о занятии вообще говорят der Babysitter."
  - de: Bäcker
    ipa: "ˈbɛkɐ"
    pos: noun
    gender: m
    plural: "die Bäcker"
    en: baker (male)
    ru: пекарь (мужчина)
    example_de: Herr Weber ist Bäcker und steht jeden Tag um vier Uhr auf.
    example_en: Mr Weber is a baker and gets up at four o'clock every day.
    example_ru: Господин Вебер — пекарь, он каждый день встаёт в четыре утра.
    note:
      en: "Naming a job takes no article in German: Ich bin Bäcker, Sie ist Ärztin, Er wird Koch — never Ich bin ein Bäcker. The article comes back only when an adjective joins in: Er ist ein guter Bäcker. And do not confuse the man with his shop: die Bäckerei is the bakery."
      ru: "Профессию по-немецки называют без артикля: Ich bin Bäcker, Sie ist Ärztin, Er wird Koch — сказать Ich bin ein Bäcker нельзя. Артикль возвращается только вместе с прилагательным: Er ist ein guter Bäcker. И не путайте человека с заведением: die Bäckerei — это пекарня."
  - de: Bäckerin
    ipa: "ˈbɛkəʁɪn"
    pos: noun
    gender: f
    plural: "die Bäckerinnen"
    en: baker (female)
    ru: пекарь (женщина)
    example_de: Die Bäckerin backt jeden Morgen frisches Brot.
    example_en: The baker bakes fresh bread every morning.
    example_ru: Пекарь каждое утро печёт свежий хлеб.
    note:
      en: "A second way to name your job is als + the bare noun, again with no article: Ich arbeite als Bäckerin. The pattern works for every profession — Ich arbeite als Kellner, als Technikerin."
      ru: "Второй способ назвать профессию — als + существительное без артикля: Ich arbeite als Bäckerin. Схема работает с любой профессией: Ich arbeite als Kellner, als Technikerin."
  - de: Doktorin
    ipa: "dɔkˈtoːʁɪn"
    pos: noun
    gender: f
    plural: "die Doktorinnen"
    en: doctor (female)
    ru: доктор (женщина)
    example_de: Meine Nachbarin ist Doktorin und arbeitet im Krankenhaus.
    example_en: My neighbour is a doctor and works at the hospital.
    example_ru: Моя соседка — доктор, она работает в больнице.
    note:
      en: "The masculine der Doktor is taught in the health deck; the stress moves in the feminine, DOK-tor but Dok-TO-rin. In everyday German the person you visit when you are ill is die Ärztin or der Arzt — Doktor is really the academic title, and it is also how patients politely address a doctor: Guten Tag, Frau Doktor."
      ru: "Мужская форма der Doktor даётся в разделе о здоровье; в женской форме ударение сдвигается: DOK-tor, но Dok-TO-rin. В обиходе к тому, к кому идут с болезнью, обращаются словом die Ärztin или der Arzt — Doktor же скорее учёное звание, а ещё вежливое обращение к врачу: Guten Tag, Frau Doktor."
  - de: Fahrer
    ipa: "ˈfaːʁɐ"
    pos: noun
    gender: m
    plural: "die Fahrer"
    en: driver (male)
    ru: водитель (мужчина)
    example_de: Der Fahrer wartet schon vor dem Haus.
    example_en: The driver is already waiting outside the house.
    example_ru: Водитель уже ждёт перед домом.
    note:
      en: "Rarely on its own — most of the time the vehicle is glued to the front: der Busfahrer, der Taxifahrer, der Lkw-Fahrer. It comes from fahren (to drive, to go)."
      ru: "Само по себе встречается редко — обычно спереди приклеен транспорт: der Busfahrer, der Taxifahrer, der Lkw-Fahrer. Слово образовано от глагола fahren («ехать, водить»)."
  - de: Fahrerin
    ipa: "ˈfaːʁəʁɪn"
    pos: noun
    gender: f
    plural: "die Fahrerinnen"
    en: driver (female)
    ru: водитель (женщина)
    example_de: Die Fahrerin macht um zwölf Uhr eine Pause.
    example_en: The driver takes a break at twelve o'clock.
    example_ru: В двенадцать часов водитель делает перерыв.
  - de: Friseur
    ipa: "fʁiˈzøːɐ̯"
    pos: noun
    gender: m
    plural: "die Friseure"
    en: hairdresser (male)
    ru: парикмахер (мужчина)
    example_de: Ich gehe morgen zum Friseur.
    example_en: I am going to the hairdresser tomorrow.
    example_ru: Завтра я иду в парикмахерскую.
    note:
      en: "A French loanword, so the stress sits on the last syllable: Fri-SEUR. Note that zum Friseur gehen means going to the salon, not to a particular man — the shop is named after the person. The spelling Frisör is also correct."
      ru: "Заимствование из французского, поэтому ударение падает на последний слог: Fri-SEUR. Обратите внимание: zum Friseur gehen значит «пойти в парикмахерскую», а не к конкретному мужчине — заведение называют по человеку. Написание Frisör тоже допустимо."
  - de: Friseurin
    ipa: "fʁiˈzøːʁɪn"
    pos: noun
    gender: f
    plural: "die Friseurinnen"
    en: hairdresser (female)
    ru: парикмахер (женщина)
    example_de: Meine Friseurin arbeitet auch am Samstag.
    example_en: My hairdresser works on Saturdays too.
    example_ru: Моя парикмахерша работает и по субботам.
  - de: Handwerker
    ipa: "ˈhantˌvɛʁkɐ"
    pos: noun
    gender: m
    plural: "die Handwerker"
    en: tradesman, skilled manual worker (male)
    ru: мастер, рабочий-ремесленник (мужчина)
    example_de: Der Handwerker repariert am Montag die Heizung.
    example_en: The tradesman is repairing the heating on Monday.
    example_ru: В понедельник мастер починит отопление.
    note:
      en: "A Handwerker works with his hands and his tools: an electrician, a plumber, a carpenter. It is the word you use when you do not know or do not need the exact trade — Wir brauchen einen Handwerker. The trade itself is das Handwerk."
      ru: "Handwerker работает руками и инструментом: электрик, сантехник, столяр. Это слово годится, когда точная специальность неизвестна или неважна: Wir brauchen einen Handwerker. Само ремесло — das Handwerk."
  - de: Handwerkerin
    ipa: "ˈhantˌvɛʁkəʁɪn"
    pos: noun
    gender: f
    plural: "die Handwerkerinnen"
    en: tradeswoman, skilled manual worker (female)
    ru: мастер, рабочая-ремесленница (женщина)
    example_de: Die Handwerkerin kommt um acht und repariert das Fenster.
    example_en: The tradeswoman is coming at eight and will repair the window.
    example_ru: Мастер придёт в восемь и починит окно.
  - de: Hausmann
    ipa: "ˈhaʊ̯sˌman"
    pos: noun
    gender: m
    plural: "die Hausmänner"
    en: stay-at-home husband, house-husband
    ru: домохозяин (мужчина, ведущий хозяйство)
    example_de: Mein Mann ist Hausmann und kocht jeden Tag für die Kinder.
    example_en: My husband is a house-husband and cooks for the children every day.
    example_ru: Мой муж — домохозяин, он каждый день готовит детям.
    note:
      en: "Built with -mann / -frau, not with -er / -in: der Hausmann, die Hausfrau. A Hausmann stays at home, runs the household and looks after the children — a stay-at-home father. Plural: die Hausmänner."
      ru: "Пара образована словами -mann / -frau, а не суффиксами -er / -in: der Hausmann, die Hausfrau. Hausmann сидит дома, ведёт хозяйство и занимается детьми. Множественное число: die Hausmänner."
  - de: Hausfrau
    ipa: "ˈhaʊ̯sˌfʁaʊ̯"
    pos: noun
    gender: f
    plural: "die Hausfrauen"
    en: homemaker, housewife
    ru: домохозяйка
    example_de: Meine Mutter war lange Hausfrau, jetzt arbeitet sie wieder.
    example_en: My mother was a homemaker for a long time; now she is working again.
    example_ru: Моя мама долго была домохозяйкой, а теперь снова работает.
  - de: Journalist
    ipa: "ʒʊʁnaˈlɪst"
    pos: noun
    gender: m
    plural: "die Journalisten"
    en: journalist (male)
    ru: журналист (мужчина)
    example_de: Mein Nachbar ist Journalist und schreibt für eine Zeitung.
    example_en: My neighbour is a journalist and writes for a newspaper.
    example_ru: Мой сосед — журналист, он пишет для газеты.
    note:
      en: "An n-noun (die N-Deklination): outside the nominative singular it always ends in -en — Ich kenne den Journalisten, Ich spreche mit dem Journalisten, and the plural is die Journalisten. Polizist works exactly the same way. The J is spoken like the s in the English word measure."
      ru: "Существительное слабого склонения (die N-Deklination): во всех падежах, кроме именительного единственного, оканчивается на -en — Ich kenne den Journalisten, Ich spreche mit dem Journalisten, множественное число die Journalisten. Так же ведёт себя Polizist. Буква J читается как «ж»."
  - de: Journalistin
    ipa: "ʒʊʁnaˈlɪstɪn"
    pos: noun
    gender: f
    plural: "die Journalistinnen"
    en: journalist (female)
    ru: журналистка (женщина)
    example_de: Die Journalistin arbeitet seit zwei Jahren beim Radio.
    example_en: The journalist has been working in radio for two years.
    example_ru: Журналистка уже два года работает на радио.
  - de: Kaufmann
    ipa: "ˈkaʊ̯fˌman"
    pos: noun
    gender: m
    plural: "die Kaufleute"
    en: businessman, commercial clerk (male)
    ru: коммерсант, специалист по торговле (мужчина)
    example_de: Er macht eine Ausbildung als Kaufmann.
    example_en: He is training to become a commercial clerk.
    example_ru: Он проходит обучение на коммерсанта.
    note:
      en: "Like Hausmann / Hausfrau, this pair is built with -mann / -frau: der Kaufmann, die Kauffrau. The plural is irregular and covers both sexes at once — die Kaufleute. Kaufmänner does not exist."
      ru: "Как и Hausmann / Hausfrau, пара построена на -mann / -frau: der Kaufmann, die Kauffrau. Множественное число нерегулярное и общее для обоих полов — die Kaufleute. Формы Kaufmänner не существует."
  - de: Kauffrau
    ipa: "ˈkaʊ̯fˌfʁaʊ̯"
    pos: noun
    gender: f
    plural: "die Kauffrauen"
    en: businesswoman, commercial clerk (female)
    ru: коммерсант, специалист по торговле (женщина)
    example_de: Frau Sommer arbeitet als Kauffrau in einer Firma.
    example_en: Ms Sommer works as a commercial clerk at a company.
    example_ru: Госпожа Зоммер работает коммерсантом в фирме.
  - de: Kellner
    ipa: "ˈkɛlnɐ"
    pos: noun
    gender: m
    plural: "die Kellner"
    en: waiter (male)
    ru: официант (мужчина)
    example_de: Ich arbeite als Kellner in einem Café.
    example_en: I work as a waiter in a café.
    example_ru: Я работаю официантом в кафе.
    note:
      en: "In a restaurant you never call a waiter by his job title. The old Herr Ober! sounds badly dated — a simple Entschuldigung! is how you get his attention today."
      ru: "В ресторане официанта не подзывают названием профессии. Старое Herr Ober! звучит безнадёжно устаревше — сегодня достаточно сказать Entschuldigung!"
  - de: Kellnerin
    ipa: "ˈkɛlnəʁɪn"
    pos: noun
    gender: f
    plural: "die Kellnerinnen"
    en: waitress (female)
    ru: официантка (женщина)
    example_de: Die Kellnerin bringt uns gleich die Karte.
    example_en: The waitress will bring us the menu in a moment.
    example_ru: Официантка сейчас принесёт нам меню.
  - de: Koch
    ipa: "ˈkɔx"
    pos: noun
    gender: m
    plural: "die Köche"
    en: cook, chef (male)
    ru: повар (мужчина)
    example_de: Mein Bruder ist Koch in einem italienischen Restaurant.
    example_en: My brother is a chef at an Italian restaurant.
    example_ru: Мой брат — повар в итальянском ресторане.
    note:
      en: "Watch the vowel. The plural takes an umlaut — die Köche — and so does the feminine, die Köchin. The verb kochen (to cook) keeps the plain o throughout: ich koche, er kocht."
      ru: "Следите за гласной. Во множественном числе появляется умлаут — die Köche, и в женской форме тоже: die Köchin. А у глагола kochen («готовить») o остаётся без умлаута: ich koche, er kocht."
  - de: Köchin
    ipa: "ˈkœçɪn"
    pos: noun
    gender: f
    plural: "die Köchinnen"
    en: cook, chef (female)
    ru: повар (женщина)
    example_de: Die Köchin steht schon um sechs Uhr in der Küche.
    example_en: The cook is in the kitchen as early as six o'clock.
    example_ru: Повариха уже в шесть часов утра стоит на кухне.
  - de: Krankenpfleger
    ipa: "ˈkʁaŋkn̩ˌpfleːgɐ"
    pos: noun
    gender: m
    plural: "die Krankenpfleger"
    en: nurse (male)
    ru: медбрат (мужчина)
    example_de: Der Krankenpfleger bringt dem Patienten die Tabletten.
    example_en: The nurse brings the patient his tablets.
    example_ru: Медбрат приносит пациенту таблетки.
    note:
      en: "The strangest pair in this deck: it is not built with -in at all. A female nurse is historically die Krankenschwester (a sick-people's sister), a male one der Krankenpfleger (a sick-people's carer) — two words that do not look related. The modern, neutral job title for both is die Pflegefachkraft."
      ru: "Самая необычная пара в этой колоде: она вообще не образована суффиксом -in. Медсестру исторически называют die Krankenschwester («сестра больных»), а медбрата — der Krankenpfleger («тот, кто ухаживает за больными»); слова выглядят никак не связанными. Современное нейтральное название профессии для обоих — die Pflegefachkraft."
  - de: Krankenschwester
    ipa: "ˈkʁaŋkn̩ˌʃvɛstɐ"
    pos: noun
    gender: f
    plural: "die Krankenschwestern"
    en: nurse (female)
    ru: медсестра (женщина)
    example_de: Meine Tante ist Krankenschwester und arbeitet nachts im Krankenhaus.
    example_en: My aunt is a nurse and works nights at the hospital.
    example_ru: Моя тётя — медсестра, она работает в больнице по ночам.
    note:
      en: "The Schwester in this word has nothing to do with a real sibling — on its own die Schwester is a sister, but a Krankenschwester is simply a nurse. Her male colleague is der Krankenpfleger: there is no such word as Krankenschwesterin."
      ru: "Schwester в этом слове не имеет отношения к настоящей сестре: само по себе die Schwester — «сестра», а Krankenschwester — просто медсестра. Коллега-мужчина называется der Krankenpfleger; слова Krankenschwesterin не существует."
  - de: Künstler
    ipa: "ˈkʏnstlɐ"
    pos: noun
    gender: m
    plural: "die Künstler"
    en: artist (male)
    ru: художник, деятель искусства (мужчина)
    example_de: Der Künstler zeigt seine Bilder in einem Café.
    example_en: The artist is showing his pictures in a café.
    example_ru: Художник показывает свои картины в кафе.
    note:
      en: "Künstler is wider than a painter: musicians, actors and singers are Künstler too. Art itself is die Kunst."
      ru: "Künstler — шире, чем «художник»: музыканты, актёры и певцы тоже Künstler. Само искусство — die Kunst."
  - de: Künstlerin
    ipa: "ˈkʏnstləʁɪn"
    pos: noun
    gender: f
    plural: "die Künstlerinnen"
    en: artist (female)
    ru: художница, деятельница искусства (женщина)
    example_de: Die Künstlerin malt am liebsten Tiere.
    example_en: The artist likes painting animals best.
    example_ru: Больше всего художница любит рисовать животных.
  - de: Mechaniker
    ipa: "meˈçaːnikɐ"
    pos: noun
    gender: m
    plural: "die Mechaniker"
    en: mechanic (male)
    ru: механик (мужчина)
    example_de: Was machen Sie beruflich? Ich bin Mechaniker.
    example_en: What do you do for a living? I am a mechanic.
    example_ru: Кем вы работаете? Я механик.
    note:
      en: "The stress is on the second syllable: Me-CHA-ni-ker. The ch is the soft sound of ich, not the hard one of Buch."
      ru: "Ударение падает на второй слог: Me-CHA-ni-ker. Сочетание ch звучит мягко, как в ich, а не твёрдо, как в Buch."
  - de: Mechanikerin
    ipa: "meˈçaːnikəʁɪn"
    pos: noun
    gender: f
    plural: "die Mechanikerinnen"
    en: mechanic (female)
    ru: механик (женщина)
    example_de: Die Mechanikerin arbeitet in einer Werkstatt.
    example_en: The mechanic works in a garage.
    example_ru: Механик работает в автомастерской.
  - de: Model
    ipa: "ˈmɔdl̩"
    pos: noun
    gender: n
    plural: "die Models"
    en: model (in fashion)
    ru: модель (в моде), манекенщица
    example_de: Sie ist Model und arbeitet oft in Paris.
    example_en: She is a model and often works in Paris.
    example_ru: Она модель и часто работает в Париже.
    note:
      en: "Two traps in one short word. It is neuter — das Model — whatever the sex of the person: Sie ist Model, but das Model auf dem Foto. And it is not das Modell: that is a model in the other sense, a prototype or a miniature (das neue Modell von VW, ein Modell aus Holz)."
      ru: "Две ловушки в одном коротком слове. Оно среднего рода — das Model — независимо от пола человека: Sie ist Model, но das Model auf dem Foto. И это не das Modell: так называют модель в другом смысле — образец, макет, модификацию (das neue Modell von VW, ein Modell aus Holz)."
  - de: Musiker
    ipa: "ˈmuːzikɐ"
    pos: noun
    gender: m
    plural: "die Musiker"
    en: musician (male)
    ru: музыкант (мужчина)
    example_de: Mein Freund ist Musiker und spielt Gitarre.
    example_en: My friend is a musician and plays the guitar.
    example_ru: Мой друг — музыкант, он играет на гитаре.
  - de: Musikerin
    ipa: "ˈmuːzikəʁɪn"
    pos: noun
    gender: f
    plural: "die Musikerinnen"
    en: musician (female)
    ru: музыкант (женщина)
