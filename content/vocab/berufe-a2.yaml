  - de: Polizist
    ipa: "poliˈtsɪst"
    pos: noun
    gender: m
    plural: "die Polizisten"
    en: police officer (male)
    ru: полицейский (мужчина)
    example_de: Der Polizist zeigt uns den Weg zum Bahnhof.
    example_en: The police officer shows us the way to the station.
    example_ru: Полицейский показывает нам дорогу к вокзалу.
    note:
      en: "Another n-noun, like Journalist: everywhere except the nominative singular it ends in -en — Ich frage den Polizisten, Ich spreche mit dem Polizisten, plural die Polizisten. The police force itself is die Polizei."
      ru: "Ещё одно существительное слабого склонения, как Journalist: везде, кроме именительного единственного, окончание -en — Ich frage den Polizisten, Ich spreche mit dem Polizisten, множественное die Polizisten. Сама полиция — die Polizei."
  - de: Polizistin
    ipa: "poliˈtsɪstɪn"
    pos: noun
    gender: f
    plural: "die Polizistinnen"
    en: police officer (female)
    ru: полицейский (женщина)
    example_de: Die Polizistin hilft der alten Frau über die Straße.
    example_en: The police officer helps the old lady across the street.
    example_ru: Сотрудница полиции помогает пожилой женщине перейти улицу.
  - de: Rentner
    ipa: "ˈʁɛntnɐ"
    pos: noun
    gender: m
    plural: "die Rentner"
    en: pensioner, retired man
    ru: пенсионер (мужчина)
    example_de: Mein Opa ist Rentner und geht jeden Tag spazieren.
    example_en: My grandpa is a pensioner and goes for a walk every day.
    example_ru: Мой дедушка — пенсионер, он каждый день ходит гулять.
    note:
      en: "Not a job but a stage of life: a Rentner has stopped working and lives on die Rente (the pension). To retire is in Rente gehen — Mit 65 geht er in Rente."
      ru: "Не профессия, а этап жизни: Rentner уже не работает и живёт на die Rente (пенсию). «Выйти на пенсию» — in Rente gehen: Mit 65 geht er in Rente."
  - de: Rentnerin
    ipa: "ˈʁɛntnəʁɪn"
    pos: noun
    gender: f
    plural: "die Rentnerinnen"
    en: pensioner, retired woman
    ru: пенсионерка (женщина)
    example_de: Meine Nachbarin ist Rentnerin und passt oft auf meine Kinder auf.
    example_en: My neighbour is retired and often looks after my children.
    example_ru: Моя соседка — пенсионерка, она часто присматривает за моими детьми.
  - de: Sänger
    ipa: "ˈzɛŋɐ"
    pos: noun
    gender: m
    plural: "die Sänger"
    en: singer (male)
    ru: певец (мужчина)
    example_de: Der Sänger singt heute Abend auf dem Fest.
    example_en: The singer is performing at the party tonight.
    example_ru: Сегодня вечером певец поёт на празднике.
  - de: Sängerin
    ipa: "ˈzɛŋəʁɪn"
    pos: noun
    gender: f
    plural: "die Sängerinnen"
    en: singer (female)
    ru: певица (женщина)
    example_de: Meine Schwester möchte Sängerin werden.
    example_en: My sister wants to become a singer.
    example_ru: Моя сестра хочет стать певицей.
    note:
      en: "After werden the profession also stands bare, with no article: Sie möchte Sängerin werden, Er will Koch werden. An article appears only if an adjective does: Sie möchte eine bekannte Sängerin werden."
      ru: "После werden профессия тоже стоит без артикля: Sie möchte Sängerin werden, Er will Koch werden. Артикль появляется, только если появляется прилагательное: Sie möchte eine bekannte Sängerin werden."
  - de: Schauspieler
    ipa: "ˈʃaʊ̯ˌʃpiːlɐ"
    pos: noun
    gender: m
    plural: "die Schauspieler"
    en: actor (male)
    ru: актёр (мужчина)
    example_de: Der Schauspieler spielt in einem neuen Film mit.
    example_en: The actor is appearing in a new film.
    example_ru: Актёр играет в новом фильме.
    note:
      en: "A compound of schauen (to look) and spielen (to play), with the main stress on Schau-. In the example the verb is mitspielen — a separable verb, so the prefix mit goes to the very end of the clause."
      ru: "Сложное слово из schauen («смотреть») и spielen («играть»), главное ударение — на Schau-. В примере глагол mitspielen — отделяемый, поэтому приставка mit уходит в самый конец предложения."
  - de: Schauspielerin
