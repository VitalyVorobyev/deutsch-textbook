  - { de: "mit dem Bus", ipa: "mɪt deːm ˈbʊs", pos: phrase, en: "by bus", ru: "на автобусе", uk: "автобусом; на автобусі", example_de: "Ich fahre mit dem Bus zur Arbeit.", example_en: "I go to work by bus.", example_ru: "Я езжу на работу на автобусе.", example_uk: "Я їжджу на роботу автобусом.", note: { en: "mit dem for der- and das-words (mit dem Auto, mit dem Taxi), mit der for die-words: mit der U-Bahn.", ru: "mit dem — для слов с der и das (mit dem Auto, mit dem Taxi), mit der — для слов с die: mit der U-Bahn.", uk: "mit dem — для слів із der і das (mit dem Auto, mit dem Taxi), mit der — для слів із die: mit der U-Bahn." } }
