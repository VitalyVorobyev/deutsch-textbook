id: stadt-wege
title_de: "Stadt & Wege"
title_en: "City & directions"
title_ru: "Город и дороги"
level: A1
entries:
  - { de: "Stadt", ipa: "ˈʃtat", pos: noun, gender: f, plural: "die Städte", en: "city; town", ru: "город", example_de: "Die Stadt ist groß.", example_en: "The city is big.", example_ru: "Город большой." }
  - { de: "Straße", ipa: "ˈʃtʁaːsə", pos: noun, gender: f, plural: "die Straßen", en: "street", ru: "улица", example_de: "Entschuldigung, wo ist die Goethestraße?", example_en: "Excuse me, where is Goethestraße?", example_ru: "Извините, где Гёте-штрассе?" }
  - { de: "Platz", ipa: "ˈplats", pos: noun, gender: m, plural: "die Plätze", en: "square", ru: "площадь", example_de: "Der Platz ist im Zentrum.", example_en: "The square is in the centre.", example_ru: "Площадь находится в центре." }
  - { de: "Bahnhof", ipa: "ˈbaːnˌhoːf", pos: noun, gender: m, plural: "die Bahnhöfe", en: "railway station", ru: "вокзал", example_de: "Wie komme ich zum Bahnhof?", example_en: "How do I get to the station?", example_ru: "Как мне пройти к вокзалу?" }
  - { de: "Haltestelle", ipa: "ˈhaltəˌʃtɛlə", pos: noun, gender: f, plural: "die Haltestellen", en: "stop (bus, tram)", ru: "остановка", example_de: "Die Haltestelle ist da links.", example_en: "The stop is over there on the left.", example_ru: "Остановка вон там слева." }
  - { de: "Bus", ipa: "ˈbʊs", pos: noun, gender: m, plural: "die Busse", en: "bus", ru: "автобус", example_de: "Ich nehme den Bus.", example_en: "I take the bus.", example_ru: "Я поеду на автобусе." }
  - { de: "U-Bahn", ipa: "ˈuːˌbaːn", pos: noun, gender: f, plural: "die U-Bahnen", en: "underground; metro", ru: "метро", example_de: "Ich fahre mit der U-Bahn.", example_en: "I go by underground.", example_ru: "Я еду на метро." }
  - { de: "Taxi", ipa: "ˈtaksi", pos: noun, gender: n, plural: "die Taxis", en: "taxi", ru: "такси", example_de: "Wir nehmen ein Taxi.", example_en: "We are taking a taxi.", example_ru: "Мы возьмём такси." }
  - { de: "Auto", ipa: "ˈaʊ̯to", pos: noun, gender: n, plural: "die Autos", en: "car", ru: "машина; автомобиль", example_de: "Ich fahre mit dem Auto.", example_en: "I go by car.", example_ru: "Я еду на машине." }
  - { de: "Fahrrad", ipa: "ˈfaːɐ̯ˌʁaːt", pos: noun, gender: n, plural: "die Fahrräder", en: "bicycle", ru: "велосипед", example_de: "Das Fahrrad ist neu.", example_en: "The bicycle is new.", example_ru: "Велосипед новый." }
  - { de: "Apotheke", ipa: "apoˈteːkə", pos: noun, gender: f, plural: "die Apotheken", en: "pharmacy", ru: "аптека", example_de: "Die Apotheke ist heute geöffnet.", example_en: "The pharmacy is open today.", example_ru: "Аптека сегодня открыта." }
  - { de: "Supermarkt", ipa: "ˈzuːpɐˌmaʁkt", pos: noun, gender: m, plural: "die Supermärkte", en: "supermarket", ru: "супермаркет", example_de: "Der Supermarkt ist nicht weit.", example_en: "The supermarket is not far.", example_ru: "Супермаркет недалеко." }
  - { de: "Post", ipa: "ˈpɔst", pos: noun, gender: f, plural: "—", en: "post office", ru: "почта", example_de: "Wie komme ich zur Post?", example_en: "How do I get to the post office?", example_ru: "Как мне пройти к почте?", note: { en: "As the post office, die Post has no plural.", ru: "В значении «почта» (учреждение) слово Post не имеет множественного числа." } }
  - { de: "Bank", ipa: "ˈbaŋk", pos: noun, gender: f, plural: "die Banken", en: "bank", ru: "банк", example_de: "Die Bank ist am Platz.", example_en: "The bank is on the square.", example_ru: "Банк находится на площади.", note: { en: "The money bank: die Banken. The park bench is also die Bank, but its plural is die Bänke.", ru: "Банк: die Banken. Скамейка — тоже die Bank, но её множественное число — die Bänke." } }
  - { de: "Hotel", ipa: "hoˈtɛl", pos: noun, gender: n, plural: "die Hotels", en: "hotel", ru: "гостиница; отель", example_de: "Das Hotel ist im Zentrum.", example_en: "The hotel is in the centre.", example_ru: "Отель находится в центре." }
  - { de: "Zentrum", ipa: "ˈtsɛntʁʊm", pos: noun, gender: n, plural: "die Zentren", en: "centre; city centre", ru: "центр", example_de: "Das Zentrum ist nah.", example_en: "The centre is close by.", example_ru: "Центр близко." }
  - { de: "Weg", ipa: "ˈveːk", pos: noun, gender: m, plural: "die Wege", en: "way; path", ru: "путь; дорога", example_de: "Der Weg zum Bahnhof ist nicht weit.", example_en: "The way to the station is not far.", example_ru: "Дорога до вокзала недалёкая." }
  - { de: "Eingang", ipa: "ˈaɪ̯nˌgaŋ", pos: noun, gender: m, plural: "die Eingänge", en: "entrance", ru: "вход", example_de: "Der Eingang ist rechts.", example_en: "The entrance is on the right.", example_ru: "Вход справа." }
  - { de: "Ausgang", ipa: "ˈaʊ̯sˌgaŋ", pos: noun, gender: m, plural: "die Ausgänge", en: "exit", ru: "выход", example_de: "Wo ist der Ausgang?", example_en: "Where is the exit?", example_ru: "Где выход?" }
  - { de: "links", ipa: "ˈlɪŋks", pos: adv, en: "on the left; (to the) left", ru: "слева; налево", example_de: "Die Post ist links.", example_en: "The post office is on the left.", example_ru: "Почта слева." }
  - { de: "rechts", ipa: "ˈʁɛçts", pos: adv, en: "on the right; (to the) right", ru: "справа; направо", example_de: "Die Apotheke ist rechts.", example_en: "The pharmacy is on the right.", example_ru: "Аптека справа." }
  - { de: "geradeaus", ipa: "gəʁaːdəˈʔaʊ̯s", pos: adv, en: "straight ahead", ru: "прямо", example_de: "Gehen Sie geradeaus.", example_en: "Go straight ahead.", example_ru: "Идите прямо." }
  - { de: "weit", ipa: "ˈvaɪ̯t", pos: adj, en: "far (away)", ru: "далеко; далёкий", example_de: "Der Bahnhof ist weit.", example_en: "The station is far away.", example_ru: "Вокзал далеко." }
  - { de: "nah", ipa: "ˈnaː", pos: adj, en: "near; close by", ru: "близко; близкий", example_de: "Die Haltestelle ist nah.", example_en: "The stop is close by.", example_ru: "Остановка близко." }
  - { de: "geöffnet", ipa: "gəˈʔœfnət", pos: adj, en: "open (sign)", ru: "открыто", example_de: "Die Post ist heute geöffnet.", example_en: "The post office is open today.", example_ru: "Почта сегодня открыта.", note: { en: "Sign language: shop doors say geöffnet; in speech people also say offen.", ru: "Язык вывесок: на дверях пишут geöffnet; в разговоре чаще говорят offen." } }
  - { de: "geschlossen", ipa: "gəˈʃlɔsn̩", pos: adj, en: "closed (sign)", ru: "закрыто", example_de: "Am Sonntag ist der Supermarkt geschlossen.", example_en: "On Sunday the supermarket is closed.", example_ru: "В воскресенье супермаркет закрыт." }
  - { de: "Wie komme ich zum Bahnhof?", pos: phrase, en: "How do I get to the station?", ru: "Как мне пройти к вокзалу?", example_de: "Entschuldigung, wie komme ich zum Bahnhof?", example_en: "Excuse me, how do I get to the station?", example_ru: "Извините, как мне пройти к вокзалу?", note: { en: "zum for der- and das-words (zum Hotel), zur for die-words: Wie komme ich zur Post?", ru: "zum — для слов с der и das (zum Hotel), zur — для слов с die: Wie komme ich zur Post?" } }
  - { de: "zu Fuß", ipa: "tsu ˈfuːs", pos: phrase, en: "on foot", ru: "пешком", example_de: "Ich gehe zu Fuß.", example_en: "I go on foot.", example_ru: "Я иду пешком." }
  - { de: "mit dem Bus", ipa: "mɪt deːm ˈbʊs", pos: phrase, en: "by bus", ru: "на автобусе", example_de: "Ich fahre mit dem Bus zur Arbeit.", example_en: "I go to work by bus.", example_ru: "Я езжу на работу на автобусе.", note: { en: "mit dem for der- and das-words (mit dem Auto, mit dem Taxi), mit der for die-words: mit der U-Bahn.", ru: "mit dem — для слов с der и das (mit dem Auto, mit dem Taxi), mit der — для слов с die: mit der U-Bahn." } }
  - { de: "Entschuldigung!", ipa: "ɛntˈʃʊldɪgʊŋ", pos: phrase, en: "Excuse me!; Sorry!", ru: "Извините!; Простите!", example_de: "Entschuldigung, wo ist die Post?", example_en: "Excuse me, where is the post office?", example_ru: "Извините, где почта?" }
