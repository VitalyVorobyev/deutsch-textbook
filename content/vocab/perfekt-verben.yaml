id: perfekt-verben
title_de: "Wichtige Verben im Perfekt"
title_en: "Key verbs in the Perfekt"
title_ru: "Важные глаголы в перфекте"
title_uk: "Важливі дієслова в перфекті"
level: A2
entries:
  - de: gehen
    ipa: "ˈgeːən"
    pos: verb
    praesens_3sg: geht
    partizip2: gegangen
    aux: sein
    en: to go, to walk
    ru: идти, ходить
    uk: іти, ходити
    example_de: Ich bin gestern früh nach Hause gegangen.
    example_en: I went home early yesterday.
    example_ru: Вчера я рано ушёл домой.
    example_uk: Вчора я рано пішов додому.
  - de: kommen
    ipa: "ˈkɔmən"
    pos: verb
    praesens_3sg: kommt
    partizip2: gekommen
    aux: sein
    en: to come
    ru: приходить
    uk: приходити
    example_de: Wann bist du gestern nach Hause gekommen?
    example_en: When did you get home yesterday?
    example_ru: Когда ты вчера пришёл домой?
    example_uk: Коли ти вчора прийшов додому?
  - de: fahren
    ipa: "ˈfaːʁən"
    pos: verb
    praesens_3sg: fährt
    partizip2: gefahren
    aux: sein
    en: to go (by vehicle), to drive
    ru: ехать
    uk: їхати
    example_de: Wir sind am Wochenende nach München gefahren.
    example_en: We went to Munich at the weekend.
    example_ru: В выходные мы ездили в Мюнхен.
    example_uk: На вихідних ми їздили до Мюнхена.
    note:
      en: 'Movement from A to B → Perfekt with sein: ich bin gefahren.'
      ru: 'Движение из точки А в точку Б → перфект с sein: ich bin gefahren.'
      uk: 'Рух із точки А в точку Б → перфект із sein: ich bin gefahren.'
  - de: fliegen
    ipa: "ˈfliːgn̩"
    pos: verb
    praesens_3sg: fliegt
    partizip2: geflogen
    aux: sein
    en: to fly
    ru: лететь
    uk: летіти
    example_de: Sie ist nach Spanien geflogen.
    example_en: She flew to Spain.
    example_ru: Она улетела в Испанию.
    example_uk: Вона полетіла до Іспанії.
  - de: laufen
    ipa: "ˈlaʊ̯fn̩"
    pos: verb
    praesens_3sg: läuft
    partizip2: gelaufen
    aux: sein
    en: to run; to walk
    ru: бежать; идти пешком
    uk: бігти; іти пішки
    example_de: Wir sind durch den Park gelaufen.
    example_en: We walked through the park.
    example_ru: Мы прошлись по парку.
    example_uk: Ми пройшлися парком.
  - de: bleiben
    ipa: "ˈblaɪ̯bn̩"
    pos: verb
    praesens_3sg: bleibt
    partizip2: geblieben
    aux: sein
    en: to stay
    ru: оставаться
    uk: залишатися
    example_de: Am Sonntag bin ich zu Hause geblieben.
    example_en: On Sunday I stayed at home.
    example_ru: В воскресенье я остался дома.
    example_uk: У неділю я залишився вдома.
    note:
      en: 'No movement, but still sein: ich bin geblieben — one of the fixed sein-verbs (bleiben, sein, passieren).'
      ru: 'Движения нет, но всё равно sein: ich bin geblieben — из «особого списка» (bleiben, sein, passieren).'
      uk: 'Руху немає, але однаково sein: ich bin geblieben — з «особливого списку» (bleiben, sein, passieren).'
  - de: passieren
    ipa: "paˈsiːʁən"
    pos: verb
    praesens_3sg: passiert
    partizip2: passiert
    aux: sein
    en: to happen
    ru: случаться, происходить
    uk: ставатися, траплятися
    example_de: Was ist hier passiert?
    example_en: What happened here?
    example_ru: Что здесь случилось?
    example_uk: Що тут сталося?
    note:
      en: 'Two traps at once: -ieren → no ge- (passiert), and the auxiliary is sein: Es ist passiert.'
      ru: 'Сразу две ловушки: -ieren → без ge- (passiert), и вспомогательный глагол sein: Es ist passiert.'
      uk: 'Одразу дві пастки: -ieren → без ge- (passiert), і допоміжне дієслово sein: Es ist passiert.'
  - de: machen
    ipa: "ˈmaxn̩"
    pos: verb
    praesens_3sg: macht
    partizip2: gemacht
    aux: haben
    en: to do, to make
    ru: делать
    uk: робити
    example_de: Was hast du am Wochenende gemacht?
    example_en: What did you do at the weekend?
    example_ru: Что ты делал в выходные?
    example_uk: Що ти робив у вихідні?
  - de: sehen
    ipa: "ˈzeːən"
    pos: verb
    praesens_3sg: sieht
    partizip2: gesehen
    aux: haben
    en: to see
    ru: видеть
    uk: бачити
    example_de: Ich habe den Film schon gesehen.
    example_en: I have already seen the film.
    example_ru: Я уже видел этот фильм.
    example_uk: Я вже бачив цей фільм.
  - de: lesen
    ipa: "ˈleːzn̩"
    pos: verb
    praesens_3sg: liest
    partizip2: gelesen
    aux: haben
    en: to read
    ru: читать
    uk: читати
    example_de: Hast du das Buch gelesen?
    example_en: Have you read the book?
    example_ru: Ты читал эту книгу?
    example_uk: Ти читав цю книжку?
  - de: schreiben
    ipa: "ˈʃʁaɪ̯bn̩"
    pos: verb
    praesens_3sg: schreibt
    partizip2: geschrieben
    aux: haben
    en: to write
    ru: писать
    uk: писати
    example_de: Ich habe ihr eine E-Mail geschrieben.
    example_en: I wrote her an email.
    example_ru: Я написал ей письмо по электронной почте.
    example_uk: Я написав їй електронного листа.
  - de: treffen
    ipa: "ˈtʁɛfn̩"
    pos: verb
    praesens_3sg: trifft
    partizip2: getroffen
    aux: haben
    valence: "+ Akk"
    en: to meet
    ru: встречать
    uk: зустрічати
    example_de: Ich habe gestern einen alten Freund getroffen.
    example_en: I met an old friend yesterday.
    example_ru: Вчера я встретил старого друга.
    example_uk: Вчора я зустрів старого друга.
  - de: finden
    ipa: "ˈfɪndn̩"
    pos: verb
    praesens_3sg: findet
    partizip2: gefunden
    aux: haben
    valence: "+ Akk"
    en: to find
    ru: находить
    uk: знаходити
    example_de: Ich habe meinen Schlüssel gefunden.
    example_en: I found my key.
    example_ru: Я нашёл свой ключ.
    example_uk: Я знайшов свій ключ.
  - de: nehmen
    ipa: "ˈneːmən"
    pos: verb
    praesens_3sg: nimmt
    partizip2: genommen
    aux: haben
    valence: "+ Akk"
    en: to take
    ru: брать
    uk: брати
    example_de: Ich habe den Bus genommen.
    example_en: I took the bus.
    example_ru: Я поехал на автобусе.
    example_uk: Я поїхав автобусом.
    note:
      en: 'Strong stem changes: du nimmst, er nimmt; Partizip II genommen.'
      ru: 'Сильные чередования: du nimmst, er nimmt; Partizip II — genommen.'
      uk: 'Сильні чергування: du nimmst, er nimmt; Partizip II — genommen.'
  - de: geben
    ipa: "ˈgeːbn̩"
    pos: verb
    praesens_3sg: gibt
    partizip2: gegeben
    aux: haben
    valence: "+ Dat + Akk"
    en: to give
    ru: давать
    uk: давати
    example_de: Er hat mir das Buch gegeben.
    example_en: He gave me the book.
    example_ru: Он дал мне книгу.
    example_uk: Він дав мені книжку.
    note:
      en: 'Two objects: the person is dative, the thing accusative — Er gibt dem Kind einen Apfel.'
      ru: 'Два дополнения: человек — Dativ, предмет — Akkusativ: Er gibt dem Kind einen Apfel.'
      uk: 'Два додатки: людина — Dativ, предмет — Akkusativ: Er gibt dem Kind einen Apfel.'
  - de: sprechen
    ipa: "ˈʃpʁɛçn̩"
    pos: verb
    praesens_3sg: spricht
    partizip2: gesprochen
    aux: haben
    en: to speak
    ru: говорить, разговаривать
    uk: говорити, розмовляти
    example_de: Wir haben lange über die Arbeit gesprochen.
    example_en: We talked about work for a long time.
    example_ru: Мы долго разговаривали о работе.
    example_uk: Ми довго розмовляли про роботу.
  - de: telefonieren
    ipa: "telefoˈniːʁən"
    pos: verb
    praesens_3sg: telefoniert
    partizip2: telefoniert
    aux: haben
    en: to talk on the phone
    ru: разговаривать по телефону
    uk: розмовляти по телефону
    example_de: Ich habe eine Stunde mit meiner Mutter telefoniert.
    example_en: I was on the phone with my mother for an hour.
    example_ru: Я час разговаривал по телефону с мамой.
    example_uk: Я годину розмовляв по телефону з мамою.
    note:
      en: '-ieren verb — Partizip II without ge-: hat telefoniert. mit + Dat names the partner.'
      ru: 'Глагол на -ieren — Partizip II без ge-: hat telefoniert. Собеседник вводится через mit + Dat.'
      uk: 'Дієслово на -ieren — Partizip II без ge-: hat telefoniert. Співрозмовник вводиться через mit + Dat.'
  - de: besuchen
    ipa: "bəˈzuːxn̩"
    pos: verb
    praesens_3sg: besucht
    partizip2: besucht
    aux: haben
    valence: "+ Akk"
    en: to visit
    ru: навещать, посещать
    uk: відвідувати, навідувати
    example_de: Wir haben am Sonntag unsere Oma besucht.
    example_en: We visited our grandma on Sunday.
    example_ru: В воскресенье мы навестили бабушку.
    example_uk: У неділю ми відвідали бабусю.
    note:
      en: 'Inseparable be- prefix — Partizip II without ge-: hat besucht.'
      ru: 'Неотделяемая приставка be- — Partizip II без ge-: hat besucht.'
      uk: 'Невідокремлюваний префікс be- — Partizip II без ge-: hat besucht.'
  - de: verstehen
    ipa: "fɛɐ̯ˈʃteːən"
    pos: verb
    praesens_3sg: versteht
    partizip2: verstanden
    aux: haben
    valence: "+ Akk"
    en: to understand
    ru: понимать
    uk: розуміти
    example_de: Ich habe die Frage nicht verstanden.
    example_en: I didn't understand the question.
    example_ru: Я не понял вопрос.
    example_uk: Я не зрозумів запитання.
    note:
      en: 'Inseparable ver- prefix — Partizip II without ge-: hat verstanden.'
      ru: 'Неотделяемая приставка ver- — Partizip II без ge-: hat verstanden.'
      uk: 'Невідокремлюваний префікс ver- — Partizip II без ge-: hat verstanden.'
  - de: bekommen
    ipa: "bəˈkɔmən"
    pos: verb
    praesens_3sg: bekommt
    partizip2: bekommen
    aux: haben
    valence: "+ Akk"
    en: to receive, to get
    ru: получать
    uk: отримувати
    example_de: Ich habe heute ein Paket bekommen.
    example_en: I received a parcel today.
    example_ru: Сегодня я получил посылку.
    example_uk: Сьогодні я отримав посилку.
    note:
      en: 'Double trap: it looks like kommen but takes haben, and it means "to receive" — NOT "to become" (that is werden).'
      ru: 'Двойная ловушка: похоже на kommen, но перфект с haben; значит «получать», а не «становиться» (это werden).'
      uk: 'Подвійна пастка: схоже на kommen, але перфект із haben; означає «отримувати», а не «ставати» (це werden).'
  - de: verlieren
    ipa: "fɛɐ̯ˈliːʁən"
    pos: verb
    praesens_3sg: verliert
    partizip2: verloren
    aux: haben
    valence: "+ Akk"
    en: to lose
    ru: терять
    uk: губити, втрачати
    example_de: Ich habe meine Brille verloren.
    example_en: I have lost my glasses.
    example_ru: Я потерял очки.
    example_uk: Я загубив окуляри.
    note:
      en: 'Inseparable ver- prefix — Partizip II without ge-: hat verloren.'
      ru: 'Неотделяемая приставка ver- — Partizip II без ge-: hat verloren.'
      uk: 'Невідокремлюваний префікс ver- — Partizip II без ge-: hat verloren.'
