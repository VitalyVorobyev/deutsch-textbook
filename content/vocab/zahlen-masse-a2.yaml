# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the Zahlen,
# Währungen und Maße and Uhrzeit sections.
id: zahlen-masse-a2
title_de: "Zahlen & Maße"
title_en: "Numbers & measures"
title_ru: "Числа и меры"
level: A2
entries:
  - de: Rappen
    ipa: "ˈʁapn̩"
    pos: noun
    gender: m
    plural: "die Rappen"
    en: rappen (Swiss centime, one hundredth of a franc)
    ru: раппен (сантим швейцарского франка)
    example_de: Das Brötchen kostet achtzig Rappen.
    example_en: The bread roll costs eighty centimes.
    example_ru: Булочка стоит восемьдесят раппенов.
    note:
      en: 'Switzerland only: hundert Rappen make einen Franken, the way hundert Cent make einen Euro in Germany and Austria. After a number the word stays unchanged — achtzig Rappen, never "Rappens".'
      ru: 'Только в Швейцарии: hundert Rappen составляют einen Franken, как hundert Cent — einen Euro в Германии и Австрии. После числительного слово не меняется: achtzig Rappen, а не «Rappens».'
  - de: Meter
    ipa: "ˈmeːtɐ"
    pos: noun
    gender: m
    plural: "die Meter"
    en: metre
    ru: метр
    example_de: Das Zimmer ist vier Meter lang und drei Meter breit.
    example_en: The room is four metres long and three metres wide.
    example_ru: Комната четыре метра в длину и три в ширину.
    note:
      en: 'After a number, units of measurement stay in the singular: zwei Meter, hundert Meter — the plural ending only appears when you talk about the units themselves. The same goes for Kilogramm, Euro and Cent.'
      ru: 'После числительного единицы измерения остаются в единственном числе: zwei Meter, hundert Meter — окончание множественного числа появляется, только когда речь о самих единицах. То же самое с Kilogramm, Euro и Cent.'
  - de: Kilogramm
    ipa: "ˈkiːloˌgʁam"
    pos: noun
    gender: n
    plural: "die Kilogramm"
    en: kilogram
    ru: килограмм
    example_de: Das Paket wiegt fünf Kilogramm.
    example_en: The parcel weighs five kilograms.
    example_ru: Посылка весит пять килограммов.
    note:
      en: 'In writing and on labels it is Kilogramm (or kg); at the market everybody says the short form Kilo: zwei Kilo Äpfel, bitte. Unchanged after a number, like Meter and Euro: fünf Kilogramm.'
      ru: 'На письме и на этикетках — Kilogramm (или kg); на рынке все говорят коротко Kilo: zwei Kilo Äpfel, bitte. После числительного не изменяется, как Meter и Euro: fünf Kilogramm.'
  - de: viertel
    ipa: "ˈfɪʁtl̩"
    pos: num
    en: quarter (in clock times)
    ru: четверть (при указании времени)
    example_de: Wir treffen uns viertel vor acht am Bahnhof.
    example_en: We are meeting at a quarter to eight at the station.
    example_ru: Мы встречаемся без четверти восемь на вокзале.
    note:
      en: 'The clock chunks are viertel vor and viertel nach: viertel vor acht is 7:45, viertel nach acht is 8:15. You will also see them written with a capital V (Viertel vor acht), because das Viertel is a noun as well — a quarter of something, and also a city district (das Studentenviertel). Both spellings are current in the clock phrase; the meaning is the same.'
      ru: 'Устойчивые обороты — viertel vor и viertel nach: viertel vor acht это 7:45, viertel nach acht — 8:15. Встречается и написание с большой буквы (Viertel vor acht), потому что das Viertel — ещё и существительное: четверть чего-либо, а также городской квартал (das Studentenviertel). В обозначении времени допустимы оба написания, смысл один.'
  - de: einundzwanzig
    ipa: "ˈaɪ̯nʊntˌtsvantsɪç"
    pos: num
    en: twenty-one
    ru: двадцать один
    example_de: Meine Schwester ist einundzwanzig Jahre alt.
    example_en: My sister is twenty-one years old.
    example_ru: Моей сестре двадцать один год.
    note:
      en: 'The single most persistent number error, so give it a moment. German says the unit BEFORE the ten and glues the whole thing into one word: ein-und-zwanzig, literally "one-and-twenty". It holds all the way up — vierundsechzig (64), siebenundachtzig (87), neunundneunzig (99) — so a spoken 64 arrives in your ear as "four-and-sixty" and you have to hold the four until the sixty lands. Two more details: the ein has no -s (einundzwanzig, not "einsundzwanzig"), and the number is written as one word, however long it gets.'
      ru: 'Самая живучая ошибка в числах — задержитесь на ней. Немецкий называет единицы ПЕРЕД десятками и склеивает всё в одно слово: ein-und-zwanzig, буквально «один-и-двадцать». Так до самого конца: vierundsechzig (64), siebenundachtzig (87), neunundneunzig (99) — на слух 64 приходит как «четыре-и-шестьдесят», и четвёрку приходится удерживать в памяти, пока не прозвучит шестьдесят. Ещё две мелочи: у ein нет -s (einundzwanzig, а не «einsundzwanzig»), и число пишется одним словом, каким бы длинным оно ни было.'
  - de: Million
    ipa: "mɪˈli̯oːn"
    pos: noun
    gender: f
    plural: "die Millionen"
    en: million
    ru: миллион
    example_de: In Berlin leben fast vier Millionen Menschen.
    example_en: Almost four million people live in Berlin.
    example_ru: В Берлине живёт почти четыре миллиона человек.
    note:
      en: 'Unlike hundert and tausend, which are plain little numbers, Million is a real noun: capital M, feminine, and a plural in -en. So it is zwei Millionen Euro but zweitausend Euro.'
      ru: 'В отличие от hundert и tausend, которые остаются обычными числительными, Million — настоящее существительное: с большой буквы, женского рода, множественное число на -en. Поэтому zwei Millionen Euro, но zweitausend Euro.'
  - de: vierte
    ipa: "ˈfɪʁtə"
    pos: num
    en: fourth
    ru: четвёртый
    example_de: Mein Geburtstag ist am vierten Mai.
    example_en: My birthday is on the fourth of May.
    example_ru: Мой день рождения — четвёртого мая.
    note:
      en: 'Ordinal numbers behave like adjectives and take endings: der vierte Mai, but am vierten Mai. Up to 19 they are built with -te (der fünfte, der zehnte), from 20 with -ste (der zwanzigste). In writing a full stop replaces the ending: am 4. Mai.'
      ru: 'Порядковые числительные ведут себя как прилагательные и получают окончания: der vierte Mai, но am vierten Mai. До 19 они образуются на -te (der fünfte, der zehnte), с 20 — на -ste (der zwanzigste). На письме окончание заменяется точкой: am 4. Mai.'
  - de: erstens
    ipa: "ˈeːɐ̯stn̩s"
    pos: adv
    en: firstly, first of all
    ru: во-первых
    example_de: Erstens habe ich keine Zeit, und zweitens ist es zu teuer.
    example_en: Firstly I have no time, and secondly it is too expensive.
    example_ru: Во-первых, у меня нет времени, а во-вторых, это слишком дорого.
    note:
      en: 'erstens, zweitens, drittens, viertens number the points of an argument, not events in time (that would be zuerst, dann, danach). They fill position 1 in the sentence, so the verb comes straight after: Erstens habe ich keine Zeit — never "Erstens ich habe …".'
      ru: 'erstens, zweitens, drittens, viertens нумеруют пункты аргументации, а не события во времени (для событий — zuerst, dann, danach). Они занимают первое место в предложении, поэтому глагол идёт сразу за ними: Erstens habe ich keine Zeit — но не «Erstens ich habe …».'
  - de: zweitens
    ipa: "ˈtsvaɪ̯tn̩s"
    pos: adv
    en: secondly
    ru: во-вторых
    example_de: Zweitens ist der Termin viel zu früh am Morgen.
    example_en: Secondly, the appointment is far too early in the morning.
    example_ru: Во-вторых, встреча назначена слишком рано утром.
    note:
      en: 'The second item on your list of reasons. Like erstens it fills position 1 and pushes the verb straight after it: Zweitens ist es zu teuer.'
      ru: 'Второй пункт в перечне доводов. Как и erstens, занимает первое место и ставит глагол сразу за собой: Zweitens ist es zu teuer.'
  - de: drittens
    ipa: "ˈdʁɪtn̩s"
    pos: adv
    en: thirdly
    ru: в-третьих
    example_de: Drittens kenne ich dort niemanden.
    example_en: Thirdly, I do not know anyone there.
    example_ru: В-третьих, я там никого не знаю.
    note:
      en: 'Third in a list of arguments. Note the double t and the short i — it is built on dritte, not on drei.'
      ru: 'Третий пункт в перечне доводов. Обратите внимание на двойное t и краткое i: слово образовано от dritte, а не от drei.'
  - de: viertens
    ipa: "ˈfɪʁtn̩s"
    pos: adv
    en: fourthly
    ru: в-четвёртых
    example_de: Viertens brauche ich das Auto am Wochenende.
    example_en: Fourthly, I need the car at the weekend.
    example_ru: В-четвёртых, машина нужна мне на выходных.
    note:
      en: 'The pattern is simply the ordinal plus -ns: erstens, zweitens, drittens, viertens, fünftens … Four reasons is usually where a spoken argument stops.'
      ru: 'Схема простая: порядковое числительное плюс -ns: erstens, zweitens, drittens, viertens, fünftens … В устной речи на четырёх доводах обычно и останавливаются.'
  - de: einmal
    ipa: "ˈaɪ̯nmaːl"
    pos: adv
    en: once, one time
    ru: один раз, однажды
    example_de: Ich gehe einmal pro Woche schwimmen.
    example_en: I go swimming once a week.
    example_ru: Я хожу в бассейн раз в неделю.
    note:
      en: 'The -mal words count how often: einmal, zweimal, dreimal … einmal also means "once upon a time" (Es war einmal ein König) and, unstressed, it is the mal of Sag mal, the softening particle. At a counter it orders portions: Einmal Kaffee, bitte!'
      ru: 'Слова на -mal считают, сколько раз: einmal, zweimal, dreimal … einmal значит ещё «однажды» (Es war einmal ein König), а без ударения это та самая частица mal из Sag mal. У стойки им заказывают порции: Einmal Kaffee, bitte!'
  - de: zweimal
    ipa: "ˈtsvaɪ̯maːl"
    pos: adv
    en: twice, two times
    ru: два раза, дважды
    example_de: Ich war schon zweimal in Wien.
    example_en: I have been to Vienna twice.
    example_ru: Я был в Вене уже два раза.
    note:
      en: 'German simply glues the number to -mal, so it needs no separate word for "twice": zweimal, dreimal, viermal, zehnmal. Ordering for two: Zweimal Kaffee, bitte!'
      ru: 'Немецкий просто приклеивает числительное к -mal, и отдельное слово вроде «дважды» ему не нужно: zweimal, dreimal, viermal, zehnmal. Заказ на двоих: Zweimal Kaffee, bitte!'
  - de: dreimal
    ipa: "ˈdʁaɪ̯maːl"
    pos: adv
    en: three times
    ru: три раза, трижды
    example_de: Sie ruft dreimal am Tag an.
    example_en: She calls three times a day.
    example_ru: Она звонит три раза в день.
    note:
      en: 'Frequency is stated with -mal plus a period: dreimal am Tag, dreimal in der Woche, dreimal pro Monat.'
      ru: 'Частоту называют так: -mal плюс период времени — dreimal am Tag, dreimal in der Woche, dreimal pro Monat.'
  - de: viermal
    ipa: "ˈfiːɐ̯maːl"
    pos: adv
    en: four times
    ru: четыре раза
    example_de: Der Bus fährt nur viermal am Tag.
    example_en: The bus only runs four times a day.
    example_ru: Автобус ходит всего четыре раза в день.
    note:
      en: 'Written as one word, like all the others: viermal, fünfmal, hundertmal. Do not confuse viermal (four times) with vierte (fourth) — one counts repetitions, the other places something in an order.'
      ru: 'Пишется одним словом, как и все остальные: viermal, fünfmal, hundertmal. Не путайте viermal («четыре раза») и vierte («четвёртый»): первое считает повторы, второе указывает место в ряду.'
  - de: Menge
    ipa: "ˈmɛŋə"
    pos: noun
    gender: f
    plural: "die Mengen"
    en: quantity, amount; a lot
    ru: количество; множество
    example_de: Wir haben eine Menge Fotos gemacht.
    example_en: We took loads of photos.
    example_ru: Мы сделали кучу фотографий.
    note:
      en: 'Die Menge is a quantity or an amount (die Menge Zucker im Rezept). In everyday speech eine Menge + noun simply means "a lot of": eine Menge Arbeit, eine Menge Leute. It can also be a crowd: Die Menge wartet vor dem Stadion.'
      ru: 'Die Menge — количество (die Menge Zucker im Rezept). В разговорной речи eine Menge + существительное значит просто «много»: eine Menge Arbeit, eine Menge Leute. Может означать и толпу: Die Menge wartet vor dem Stadion.'
  - de: Paar
    ipa: "ˈpaːɐ̯"
    pos: noun
    gender: n
    plural: "die Paare"
    en: pair; couple
    ru: пара (двое, комплект)
    example_de: Ich brauche ein neues Paar Schuhe.
    example_en: I need a new pair of shoes.
    example_ru: Мне нужна новая пара обуви.
    note:
      en: 'A real trap, and only the capital letter tells the two apart. With a capital P, ein Paar is two things that belong together: ein Paar Schuhe (a matching pair), ein Paar Socken — and also two people, ein junges Paar. With a small p, ein paar is a completely different word meaning "a few": ein paar Schuhe is several unrelated shoes, ein paar Tage is a few days. So ein Paar Schuhe = exactly two that match, ein paar Schuhe = some shoes. The lowercase ein paar is taught in the "Kleine Wörter" deck; keep them side by side.'
      ru: 'Настоящая ловушка, и различает их только заглавная буква. С большой P слово ein Paar — две вещи, составляющие комплект: ein Paar Schuhe («пара обуви»), ein Paar Socken, а также двое людей: ein junges Paar. Со строчной p слово ein paar — совсем другое, оно значит «несколько»: ein paar Schuhe — просто несколько разных ботинок, ein paar Tage — несколько дней. Итак: ein Paar Schuhe — ровно два ботинка в комплект, ein paar Schuhe — сколько-то ботинок. Строчное ein paar разбирается в колоде «Kleine Wörter» — держите их рядом.'
