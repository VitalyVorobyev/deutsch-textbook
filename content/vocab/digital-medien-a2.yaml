# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the digital/media words
# of the freizeit-sport-kultur-medien section, plus the two spoken abbreviations
# (PC, SMS) from the Abkürzungen section.
id: digital-medien-a2
title_de: "Digital & Medien"
title_en: "Digital life & media"
title_ru: "Цифровая жизнь и медиа"
level: A2
entries:
  - de: PC
    ipa: "peːˈtseː"
    pos: noun
    gender: m
    plural: die PCs
    en: PC; desktop computer
    ru: компьютер, ПК
    example_de: Mein PC ist schon acht Jahre alt.
    example_en: My PC is already eight years old.
    example_ru: Моему компьютеру уже восемь лет.
    note:
      en: 'Spoken as two letter names, not as a word: pe-tse. It is short for Personal Computer and normally means the machine on the desk (der Laptop is the portable one). Der PC, die PCs.'
      ru: 'Произносится по буквам, а не как слово: «пэ-цэ». Сокращение от Personal Computer; обычно это настольный компьютер (переносной — der Laptop). Der PC, die PCs.'
  - de: SMS
    ipa: "ɛsʔɛmˈʔɛs"
    pos: noun
    gender: f
    plural: die SMS
    en: text message; SMS
    ru: СМС, текстовое сообщение
    example_de: Schreib mir bitte eine SMS, wenn du ankommst.
    example_en: Please send me a text when you get here.
    example_ru: Напиши мне, пожалуйста, СМС, когда приедешь.
    note:
      en: 'Spoken as three letter names, not as a word: es-em-es. Short for Short Message Service. It is feminine and the plural is identical: eine SMS, zwei SMS. German writes or sends one — eine SMS schreiben, eine SMS schicken.'
      ru: 'Произносится по буквам, а не как слово: «эс-эм-эс». Сокращение от Short Message Service. Женский род, множественное число не меняется: eine SMS, zwei SMS. По-немецки СМС «пишут» или «отправляют»: eine SMS schreiben, eine SMS schicken.'
  - de: online
    ipa: "ˈɔnlaɪ̯n"
    pos: adv
    en: online
    ru: онлайн, в сети
    example_de: Abends bin ich selten online.
    example_en: In the evening I am rarely online.
    example_ru: По вечерам я редко бываю в сети.
    note:
      en: 'Two everyday uses: with sein (Ich bin online) and with a verb (online einkaufen, online buchen). Written as one word and always lower case — it is not a noun.'
      ru: 'Два обиходных употребления: с sein (Ich bin online) и с глаголом (online einkaufen, online buchen). Пишется в одно слово и всегда со строчной буквы — это не существительное.'
  - de: Blog
    ipa: "ˈblɔk"
    pos: noun
    gender: m
    plural: die Blogs
    en: blog
    ru: блог
    example_de: Sie schreibt einen Blog über das Leben in Berlin.
    example_en: She writes a blog about life in Berlin.
    example_ru: Она ведёт блог о жизни в Берлине.
    note:
      en: 'Der Blog is the usual gender (das Blog also occurs). The topic comes with über + Akkusativ: ein Blog über Musik. Final -g sounds like k.'
      ru: 'Обычно мужской род — der Blog (встречается и das Blog). Тема вводится через über + Akkusativ: ein Blog über Musik. Конечное -g звучит как «к».'
  - de: E-Book
    ipa: "ˈiːbʊk"
    pos: noun
    gender: n
    plural: die E-Books
    en: e-book
    ru: электронная книга
    example_de: Auf Reisen lese ich lieber ein E-Book.
    example_en: When I travel I prefer to read an e-book.
    example_ru: В поездках я предпочитаю читать электронную книгу.
    note:
      en: 'Pronounced the English way: ee-book. Note the hyphen and the two capitals — German writes E-Mail and E-Bike exactly the same way.'
      ru: 'Произносится по-английски: «и-бук». Обратите внимание на дефис и две заглавные буквы — так же пишутся E-Mail и E-Bike.'
  - de: Fotoapparat
    ipa: "ˈfoːtoʔapaˌʁaːt"
    pos: noun
    gender: m
    plural: die Fotoapparate
    en: camera (for photos)
    ru: фотоаппарат
    example_de: Mein alter Fotoapparat macht immer noch gute Bilder.
    example_en: My old camera still takes good pictures.
    example_ru: Мой старый фотоаппарат до сих пор хорошо снимает.
    note:
      en: 'Fotoapparat and Kamera name the same object. Kamera is the everyday word; Fotoapparat sounds a little older and more formal, and it is only ever for photos.'
      ru: 'Fotoapparat и Kamera — одно и то же. Kamera — обиходное слово; Fotoapparat звучит чуть старомоднее и официальнее и относится только к фотосъёмке.'
  - de: Kamera
    ipa: "ˈkaməʁa"
    pos: noun
    gender: f
    plural: die Kameras
    en: camera
    ru: камера, фотоаппарат
    example_de: Nimm die Kamera mit, das Wetter ist schön.
    example_en: Take the camera with you, the weather is nice.
    example_ru: Возьми камеру с собой, погода отличная.
    note:
      en: 'The everyday word, for photos and for video alike. Fotoapparat is its slightly more formal synonym; the one in a phone is die Handykamera.'
      ru: 'Обиходное слово — и для фото, и для видео. Fotoapparat — чуть более официальный синоним; камера в телефоне — die Handykamera.'
  - de: Laptop
    ipa: "ˈlɛptɔp"
    pos: noun
    gender: m
    plural: die Laptops
    en: laptop
    ru: ноутбук
    example_de: Ich habe meinen Laptop im Büro vergessen.
    example_en: I left my laptop at the office.
    example_ru: Я забыл ноутбук в офисе.
    note:
      en: 'Pronounced the English way. Der Laptop travels with you, der PC stays on the desk. Das Notebook is a common synonym — and note the gender changes with the word.'
      ru: 'Произносится по-английски. Der Laptop носят с собой, der PC стоит на столе. Частый синоним — das Notebook (обратите внимание: другой род).'
  - de: Link
    ipa: "ˈlɪŋk"
    pos: noun
    gender: m
    plural: die Links
    en: link
    ru: ссылка
    example_de: Klick auf den Link, dann siehst du das Foto.
    example_en: Click on the link and you will see the photo.
    example_ru: Нажми на ссылку — и ты увидишь фото.
    note:
      en: 'You click auf + Akkusativ: auf den Link klicken. Sending one: Ich schicke dir den Link. Careful — the adjective link means left, and has nothing to do with this noun.'
      ru: 'Кликают auf + Akkusativ: auf den Link klicken. «Скинуть ссылку» — Ich schicke dir den Link. Осторожно: прилагательное link(s) значит «левый» и к этому существительному отношения не имеет.'
  - de: surfen
    ipa: "ˈzœʁfn̩"
    pos: verb
    praesens_3sg: surft
    partizip2: gesurft
    aux: haben
    en: to surf (the internet)
    ru: сидеть в интернете, сёрфить
    example_de: Am Wochenende surfe ich stundenlang im Internet.
    example_en: At the weekend I surf the internet for hours.
    example_ru: По выходным я часами сижу в интернете.
    note:
      en: 'An English loan that took German endings and behaves like any regular weak verb — er surft, hat gesurft, with the ge- in its normal place. It almost always comes with im Internet.'
      ru: 'Английское заимствование с немецкими окончаниями; спрягается как обычный слабый глагол — er surft, hat gesurft, приставка ge- на своём месте. Почти всегда употребляется с im Internet.'
  - de: Homepage
    ipa: "ˈhoːmpeːtʃ"
    pos: noun
    gender: f
    plural: die Homepages
    en: homepage; website
    ru: главная страница сайта, сайт
    example_de: Die Öffnungszeiten stehen auf der Homepage.
    example_en: The opening hours are on the homepage.
    example_ru: Часы работы указаны на главной странице сайта.
    note:
      en: 'Strictly the front page of a site, but everyday German uses it for the whole site just as freely as it uses Webseite — so treat the two as near-synonyms rather than as a sharp pair. Both are feminine.'
      ru: 'Строго говоря — главная страница сайта, но в обиходной речи так называют и весь сайт, как и Webseite. Поэтому это скорее синонимы, чем чёткая пара. Оба слова женского рода.'
  - de: Mailbox
    ipa: "ˈmeːlbɔks"
    pos: noun
    gender: f
    plural: die Mailboxen
    en: voicemail
    ru: голосовая почта, автоответчик мобильного
    example_de: Mein Handy ist aus, aber du kannst auf die Mailbox sprechen.
    example_en: My phone is off, but you can leave a message on my voicemail.
    example_ru: У меня выключен телефон, но ты можешь оставить сообщение на голосовой почте.
    note:
      en: 'The voicemail of a mobile phone. The fixed phrase is auf die Mailbox sprechen — you speak onto it. Plural die Mailboxen, with -en.'
      ru: 'Голосовая почта мобильного телефона. Устойчивое выражение — auf die Mailbox sprechen, то есть «наговорить сообщение». Множественное число: die Mailboxen, с -en.'
  - de: Passwort
    ipa: "ˈpasˌvɔʁt"
    pos: noun
    gender: n
    plural: die Passwörter
    en: password
    ru: пароль
    example_de: Ich habe mein Passwort schon wieder vergessen.
    example_en: I have forgotten my password yet again.
    example_ru: Я опять забыл свой пароль.
    note:
      en: 'The plural takes an umlaut: die Passwörter — the -wort ending behaves like das Wort → die Wörter. A password is eingeben (entered) and ändern (changed).'
      ru: 'Множественное число с умлаутом: die Passwörter — вторая часть ведёт себя как das Wort → die Wörter. Пароль вводят (eingeben) и меняют (ändern).'
  - de: Webseite
    ipa: "ˈvɛpˌzaɪ̯tə"
    pos: noun
    gender: f
    plural: die Webseiten
    en: web page; website
    ru: страница сайта, сайт
    example_de: Auf dieser Webseite finde ich alle Preise.
    example_en: I can find all the prices on this web page.
    example_ru: На этой странице сайта я нахожу все цены.
    note:
      en: 'Strictly one single page of a site, while die Homepage is its front page. In everyday German both words are used loosely for the whole site, so they are near-synonyms — do not hunt for a sharp difference.'
      ru: 'Строго говоря — одна отдельная страница сайта, а die Homepage — его главная страница. В обиходной речи оба слова означают просто «сайт», так что это почти синонимы — не ищите чёткой границы.'
  - de: Datei
    ipa: "daˈtaɪ̯"
    pos: noun
    gender: f
    plural: die Dateien
    en: file (on a computer)
    ru: файл
    example_de: Ich schicke dir die Datei per E-Mail.
    example_en: I will send you the file by email.
    example_ru: Я отправлю тебе файл по электронной почте.
    note:
      en: 'die Datei is a file on a computer — never a calendar date. Three look-alikes sit close together and mean quite different things: die Datei (a file), das Datum (a date), die Daten (the data). Files are what you öffnen, speichern and löschen.'
      ru: 'die Datei — файл на компьютере, а не дата. Три похожих слова легко смешать, а значат они совсем разное: die Datei (файл), das Datum (дата), die Daten (данные). Файлы открывают (öffnen), сохраняют (speichern) и удаляют (löschen).'
  - de: Drucker
    ipa: "ˈdʁʊkɐ"
    pos: noun
    gender: m
    plural: die Drucker
    en: printer
    ru: принтер
    example_de: Der Drucker im Büro funktioniert wieder nicht.
    example_en: The printer in the office is not working again.
    example_ru: Принтер в офисе снова не работает.
    note:
      en: 'Built from drucken + -er, the way Fernseher comes from fernsehen: the -er noun is the machine that does it. Like every -er noun, the plural stays the same — ein Drucker, zwei Drucker.'
      ru: 'Образовано от drucken + -er, как Fernseher от fernsehen: суффикс -er даёт «прибор, который это делает». Как у всех слов на -er, множественное число не меняется — ein Drucker, zwei Drucker.'
  - de: Mobiltelefon
    ipa: "moˈbiːlteleˌfoːn"
    pos: noun
    gender: n
    plural: die Mobiltelefone
    en: mobile phone
    ru: мобильный телефон
    example_de: Bitte schalten Sie Ihr Mobiltelefon aus.
    example_en: Please switch off your mobile phone.
    example_ru: Пожалуйста, выключите свой мобильный телефон.
    note:
      en: 'The formal word — you meet it on signs and in announcements. Everyday German says das Handy, which looks English but is not: in English handy is an adjective, and nobody calls a phone one.'
      ru: 'Официальное слово — встречается на табличках и в объявлениях. В обиходной речи говорят das Handy: слово выглядит английским, но в английском handy — прилагательное («удобный»), и телефон так не называют.'
  - de: Tablet
    ipa: "ˈtɛblət"
    pos: noun
    gender: n
    plural: die Tablets
    en: tablet (computer)
    ru: планшет
    example_de: Meine Tochter sieht Filme auf dem Tablet.
    example_en: My daughter watches films on the tablet.
    example_ru: Моя дочь смотрит фильмы на планшете.
    note:
      en: 'Neuter: das Tablet, plural die Tablets, pronounced the English way. Keep it apart from die Tablette — that is a pill.'
      ru: 'Средний род: das Tablet, множественное — die Tablets; произносится по-английски. Не путайте с die Tablette — это таблетка.'
  - de: Anrufbeantworter
    ipa: "ˈanʁuːfbəˌʔantvɔʁtɐ"
    pos: noun
    gender: m
    plural: die Anrufbeantworter
    en: answering machine
    ru: автоответчик
    example_de: Auf dem Anrufbeantworter sind drei neue Nachrichten.
    example_en: There are three new messages on the answering machine.
    example_ru: На автоответчике три новых сообщения.
    note:
      en: 'A whole sentence packed into one noun: anrufen (to call) + beantworten (to answer) + -er (the thing that does it) = the machine that answers calls. German builds nouns like this all the time — read them from the back. Plural unchanged: die Anrufbeantworter.'
      ru: 'Целое предложение, упакованное в существительное: anrufen (звонить) + beantworten (отвечать) + -er (тот, кто это делает) = «то, что отвечает на звонки». Немецкий постоянно строит такие слова — читайте их с конца. Множественное число не меняется: die Anrufbeantworter.'
  - de: chatten
    ipa: "ˈtʃɛtn̩"
    pos: verb
    praesens_3sg: chattet
    partizip2: gechattet
    aux: haben
    valence: "mit + Dat"
    en: to chat (online)
    ru: переписываться, общаться в чате
    example_de: Abends chatte ich oft mit meinen Freunden.
    example_en: In the evening I often chat with my friends.
    example_ru: По вечерам я часто переписываюсь с друзьями.
    note:
      en: 'An English loan with German endings, and it declines like any regular weak verb: er chattet (extra -e- after the -t- stem), hat gechattet — the ge- is there as usual. The person you chat with comes with mit + Dativ.'
      ru: 'Английское заимствование с немецкими окончаниями; спрягается как обычный слабый глагол: er chattet (после основы на -t добавляется -e-), hat gechattet — приставка ge- на месте. Собеседник вводится через mit + Dativ.'
  - de: drucken
    ipa: "ˈdʁʊkn̩"
    pos: verb
    praesens_3sg: druckt
    partizip2: gedruckt
    aux: haben
    valence: "+ Akk"
    en: to print
    ru: печатать, распечатывать
    example_de: Können Sie das Formular bitte zweimal drucken?
    example_en: Could you print the form twice, please?
    example_ru: Вы можете распечатать формуляр два раза?
    note:
      en: 'drucken (to print) and drücken (to press) are one umlaut apart and mean different things: einen Text drucken, but auf den Knopf drücken. Regular weak verb — er druckt, hat gedruckt.'
      ru: 'drucken («печатать») и drücken («нажимать») отличаются одним умлаутом, а значат разное: einen Text drucken, но auf den Knopf drücken. Обычный слабый глагол: er druckt, hat gedruckt.'
  - de: herunterladen
    ipa: "hɛˈʁʊntɐˌlaːdn̩"
    pos: verb
    praesens_3sg: lädt herunter
    partizip2: heruntergeladen
    aux: haben
    valence: "+ Akk"
    en: to download
    ru: скачивать, загружать
    example_de: Ich lade das Formular von der Webseite herunter.
    example_en: I am downloading the form from the website.
    example_ru: Я скачиваю формуляр с сайта.
    note:
      en: 'Separable herunter- goes to the end of the clause, and the stem of laden changes: er lädt herunter. In the Perfekt the ge- sits inside the word, after the prefix: hat heruntergeladen. The short form downloaden is heard everywhere, but herunterladen is the proper German word.'
      ru: 'Отделяемая приставка herunter- уходит в конец предложения, а основа laden меняет гласную: er lädt herunter. В перфекте ge- встаёт внутрь слова, после приставки: hat heruntergeladen. Короткое downloaden слышно повсюду, но правильное немецкое слово — herunterladen.'
  - de: speichern
    ipa: "ˈʃpaɪ̯çɐn"
    pos: verb
    praesens_3sg: speichert
    partizip2: gespeichert
    aux: haben
    valence: "+ Akk"
    en: to save (a file); to store
    ru: сохранять (файл)
    example_de: Ich speichere die Fotos auf dem Laptop.
    example_en: I save the photos on the laptop.
    example_ru: Я сохраняю фотографии на ноутбуке.
    note:
      en: 'The computer word for saving: eine Datei speichern, ein Foto speichern. Regular weak verb — er speichert, hat gespeichert. Do not reach for sparen here: sparen is putting money aside.'
      ru: 'Компьютерное «сохранять»: eine Datei speichern, ein Foto speichern. Обычный слабый глагол: er speichert, hat gespeichert. Не путайте со sparen — это «копить, экономить деньги».'
