id: alltag-zeit
title_de: "Alltag und Zeit"
title_en: "Everyday life and time"
title_ru: "Будни и время"
level: A1
entries:
  - { de: "Montag", ipa: "ˈmoːnˌtaːk", pos: noun, gender: m, plural: "die Montage", en: "Monday", ru: "понедельник", example_de: "Am Montag beginnt der Deutschkurs.", example_en: "On Monday the German course begins.", example_ru: "В понедельник начинается курс немецкого." }
  - { de: "Dienstag", ipa: "ˈdiːnsˌtaːk", pos: noun, gender: m, plural: "die Dienstage", en: "Tuesday", ru: "вторник", example_de: "Am Dienstag arbeite ich viel.", example_en: "On Tuesday I work a lot.", example_ru: "Во вторник я много работаю." }
  - { de: "Mittwoch", ipa: "ˈmɪtvɔx", pos: noun, gender: m, plural: "die Mittwoche", en: "Wednesday", ru: "среда", example_de: "Der Kurs ist am Mittwoch.", example_en: "The course is on Wednesday.", example_ru: "Курс — в среду." }
  - { de: "Donnerstag", ipa: "ˈdɔnɐsˌtaːk", pos: noun, gender: m, plural: "die Donnerstage", en: "Thursday", ru: "четверг", example_de: "Am Donnerstag koche ich für Freunde.", example_en: "On Thursday I cook for friends.", example_ru: "В четверг я готовлю для друзей." }
  - { de: "Freitag", ipa: "ˈfʁaɪ̯ˌtaːk", pos: noun, gender: m, plural: "die Freitage", en: "Friday", ru: "пятница", example_de: "Am Freitag bin ich müde.", example_en: "On Friday I am tired.", example_ru: "В пятницу я уставший." }
  - { de: "Samstag", ipa: "ˈzamsˌtaːk", pos: noun, gender: m, plural: "die Samstage", en: "Saturday", ru: "суббота", example_de: "Am Samstag schlafe ich lange.", example_en: "On Saturday I sleep in.", example_ru: "В субботу я долго сплю." }
  - { de: "Sonntag", ipa: "ˈzɔnˌtaːk", pos: noun, gender: m, plural: "die Sonntage", en: "Sunday", ru: "воскресенье", example_de: "Am Sonntag arbeite ich nicht.", example_en: "On Sunday I don't work.", example_ru: "В воскресенье я не работаю." }
  - { de: "Tag", ipa: "ˈtaːk", pos: noun, gender: m, plural: "die Tage", en: "day", ru: "день", example_de: "Der Tag hat vierundzwanzig Stunden.", example_en: "The day has twenty-four hours.", example_ru: "В сутках двадцать четыре часа." }
  - { de: "Morgen", ipa: "ˈmɔʁgn̩", pos: noun, gender: m, plural: "die Morgen", en: "morning", ru: "утро", example_de: "Am Morgen trinke ich Kaffee.", example_en: "In the morning I drink coffee.", example_ru: "Утром я пью кофе.", note: { en: "Not to be confused with the adverb morgen (tomorrow), written lowercase.", ru: "Не путайте с наречием morgen («завтра»), которое пишется со строчной буквы." } }
  - { de: "Vormittag", ipa: "ˈfoːɐ̯ˌmɪtaːk", pos: noun, gender: m, plural: "die Vormittage", en: "morning (before noon)", ru: "первая половина дня", example_de: "Am Vormittag arbeite ich.", example_en: "Before noon I work.", example_ru: "В первой половине дня я работаю." }
  - { de: "Mittag", ipa: "ˈmɪtaːk", pos: noun, gender: m, plural: "die Mittage", en: "noon; midday", ru: "полдень", example_de: "Am Mittag esse ich zu Hause.", example_en: "At noon I eat at home.", example_ru: "В полдень я ем дома." }
  - { de: "Nachmittag", ipa: "ˈnaːxˌmɪtaːk", pos: noun, gender: m, plural: "die Nachmittage", en: "afternoon", ru: "вторая половина дня", example_de: "Am Nachmittag lerne ich Deutsch.", example_en: "In the afternoon I study German.", example_ru: "Во второй половине дня я учу немецкий." }
  - { de: "Abend", ipa: "ˈaːbn̩t", pos: noun, gender: m, plural: "die Abende", en: "evening", ru: "вечер", example_de: "Am Abend koche ich.", example_en: "In the evening I cook.", example_ru: "Вечером я готовлю." }
  - { de: "Nacht", ipa: "ˈnaxt", pos: noun, gender: f, plural: "die Nächte", en: "night", ru: "ночь", example_de: "In der Nacht schlafe ich.", example_en: "At night I sleep.", example_ru: "Ночью я сплю.", note: { en: "The one exception among the time phrases: in der Nacht, not am.", ru: "Единственное исключение среди выражений времени: in der Nacht, а не am." } }
  - { de: "Uhr", ipa: "ˈuːɐ̯", pos: noun, gender: f, plural: "die Uhren", en: "clock; o'clock", ru: "часы; час (при указании времени)", example_de: "Es ist acht Uhr.", example_en: "It is eight o'clock.", example_ru: "Сейчас восемь часов." }
  - { de: "Stunde", ipa: "ˈʃtʊndə", pos: noun, gender: f, plural: "die Stunden", en: "hour", ru: "час (60 минут)", example_de: "Ich lerne jeden Tag eine Stunde.", example_en: "I study for an hour every day.", example_ru: "Я занимаюсь каждый день по часу.", note: { en: "Uhr names the point on the clock, Stunde the duration: um acht Uhr, but eine Stunde.", ru: "Uhr — момент на часах, Stunde — длительность: um acht Uhr, но eine Stunde. По-русски и то и другое — «час»." } }
  - { de: "Minute", ipa: "miˈnuːtə", pos: noun, gender: f, plural: "die Minuten", en: "minute", ru: "минута", example_de: "Eine Stunde hat sechzig Minuten.", example_en: "An hour has sixty minutes.", example_ru: "В часе шестьдесят минут." }
  - { de: "Monat", ipa: "ˈmoːnat", pos: noun, gender: m, plural: "die Monate", en: "month", ru: "месяц", example_de: "Das Jahr hat zwölf Monate.", example_en: "The year has twelve months.", example_ru: "В году двенадцать месяцев." }
  - { de: "Jahr", ipa: "ˈjaːɐ̯", pos: noun, gender: n, plural: "die Jahre", en: "year", ru: "год", example_de: "Das Jahr beginnt im Januar.", example_en: "The year begins in January.", example_ru: "Год начинается в январе." }
  - { de: "Jahreszeit", ipa: "ˈjaːʁəsˌtsaɪ̯t", pos: noun, gender: f, plural: "die Jahreszeiten", en: "season", ru: "время года", example_de: "Der Sommer ist eine Jahreszeit.", example_en: "Summer is a season.", example_ru: "Лето — время года." }
  - { de: "Januar", ipa: "ˈjanuaːɐ̯", pos: noun, gender: m, plural: "—", en: "January", ru: "январь", example_de: "Im Januar ist es kalt.", example_en: "In January it is cold.", example_ru: "В январе холодно." }
  - { de: "Juli", ipa: "ˈjuːli", pos: noun, gender: m, plural: "—", en: "July", ru: "июль", example_de: "Im Juli arbeite ich nicht viel.", example_en: "In July I don't work much.", example_ru: "В июле я работаю немного." }
  - { de: "Sommer", ipa: "ˈzɔmɐ", pos: noun, gender: m, plural: "die Sommer", en: "summer", ru: "лето", example_de: "Im Sommer trinke ich viel Wasser.", example_en: "In summer I drink a lot of water.", example_ru: "Летом я пью много воды." }
  - { de: "Winter", ipa: "ˈvɪntɐ", pos: noun, gender: m, plural: "die Winter", en: "winter", ru: "зима", example_de: "Im Winter trinke ich viel Tee.", example_en: "In winter I drink a lot of tea.", example_ru: "Зимой я пью много чая." }
  - { de: "beginnen", ipa: "bəˈgɪnən", pos: verb, en: "to begin", ru: "начинаться; начинать", example_de: "Der Kurs beginnt um neun Uhr.", example_en: "The course begins at nine o'clock.", example_ru: "Курс начинается в девять часов.", partizip2: "begonnen", aux: "haben", praesens_3sg: "beginnt" }
  - { de: "enden", ipa: "ˈɛndn̩", pos: verb, en: "to end", ru: "заканчиваться", example_de: "Der Film endet um elf Uhr.", example_en: "The film ends at eleven o'clock.", example_ru: "Фильм заканчивается в одиннадцать часов.", partizip2: "geendet", aux: "haben", praesens_3sg: "endet" }
  - { de: "halb", ipa: "ˈhalp", pos: adj, en: "half", ru: "половина; пол-", example_de: "Es ist halb neun.", example_en: "It is half past eight (8:30).", example_ru: "Сейчас половина девятого (8:30).", note: { en: "halb looks forward to the coming hour: halb neun = 8:30 — one hour earlier than British 'half nine'.", ru: "halb смотрит вперёд, на следующий час: halb neun = «половина девятого» = 8:30 — русская логика совпадает." } }
  - { de: "Zeit", ipa: "ˈtsaɪ̯t", pos: noun, gender: f, plural: "die Zeiten", en: "time", ru: "время", example_de: "Ich habe heute Zeit.", example_en: "I have time today.", example_ru: "У меня сегодня есть время." }
  - { de: "Wie spät ist es?", pos: phrase, en: "What time is it?", ru: "Который час?", example_de: "Wie spät ist es? — Es ist halb zehn.", example_en: "What time is it? — It is half past nine (9:30).", example_ru: "Который час? — Половина десятого (9:30)." }
  - { de: "jeden Tag", ipa: "ˌjeːdn̩ ˈtaːk", pos: phrase, en: "every day", ru: "каждый день", example_de: "Ich lerne jeden Tag Deutsch.", example_en: "I study German every day.", example_ru: "Я учу немецкий каждый день." }
  - { de: "in der Nacht", ipa: "ɪn dɐ ˈnaxt", pos: phrase, en: "at night", ru: "ночью", example_de: "In der Nacht ist es ruhig.", example_en: "At night it is quiet.", example_ru: "Ночью тихо." }
