id: freunde-feste
title_de: "Freunde, Einladungen & Feste"
title_en: "Friends, invitations & celebrations"
title_ru: "Друзья, приглашения и праздники"
level: A2
# Deliberately thin. The party word field is already taught: Party, Einladung, Fest, feiern,
# Musik and tanzen live in the A1 deck `freizeit-koennen`; einladen and mitbringen live in
# `trennbare-verben`; absagen, verschieben and leider live in `termine-zeit`; Geburtstag,
# Freund and Freundin live in `menschen-familie`; schenken in `kernwortschatz-a2` and
# gratulieren in `dativ-verben`. This unit recycles every one of them in its article,
# reading and exercises, and owns only the language no deck teaches yet.
#
# Receptive-only party language (Gruppenchat, Gastgeberin, organisieren) stays glossed in
# the reading: a vocab entry becomes two flashcards, one of which asks the learner to
# produce the word, and none of those needs producing at A2.
entries:
  # --- Die Leute und die Sachen ---
  - de: Gastgeber
    ipa: "ˈgastˌgeːbɐ"
    pos: noun
    gender: m
    plural: "die Gastgeber"
    en: host (the person giving the party)
    ru: хозяин праздника, принимающая сторона
    example_de: Wir bringen dem Gastgeber eine Torte mit.
    example_en: We are bringing the host a cake.
    example_ru: Мы принесём хозяину праздника торт.
    note:
      en: "The woman giving the party is die Gastgeberin. The plural of the masculine form does not change: der Gastgeber, die Gastgeber."
      ru: "Хозяйка праздника — die Gastgeberin. Форма мужского рода во множественном числе не меняется: der Gastgeber, die Gastgeber."
  - de: Geschenk
    ipa: "gəˈʃɛŋk"
    pos: noun
    gender: n
    plural: "die Geschenke"
    en: present, gift
    ru: подарок
    example_de: Ich kaufe ihr ein Geschenk zum Geburtstag.
    example_en: I am buying her a present for her birthday.
    example_ru: Я куплю ей подарок на день рождения.
    note:
      en: "The verb that goes with it is schenken, and the sentence then has two objects: the person in the Dativ, the present in the Akkusativ — Ich schenke dir ein Buch."
      ru: "Соответствующий глагол — schenken, и предложение при нём получает два дополнения: человек в Dativ, подарок в Akkusativ — Ich schenke dir ein Buch."
  - de: Überraschung
    ipa: "yːbɐˈʁaʃʊŋ"
    pos: noun
    gender: f
    plural: "die Überraschungen"
    en: surprise
    ru: сюрприз, неожиданность
    example_de: Das Geschenk von Tom ist eine Überraschung.
    example_en: Tom's present is a surprise.
    example_ru: Подарок от Тома — это сюрприз.
    note:
      en: "Every noun ending in -ung is feminine, without a single exception: die Überraschung, die Einladung, die Wohnung."
      ru: "Все существительные на -ung — женского рода, без единого исключения: die Überraschung, die Einladung, die Wohnung."
  - de: Glückwunsch
    ipa: "ˈglʏkˌvʊnʃ"
    pos: noun
    gender: m
    plural: "die Glückwünsche"
    en: congratulation, good wish
    ru: поздравление
    example_de: Herzlichen Glückwunsch zum Geburtstag!
    example_en: Happy birthday!
    example_ru: С днём рождения!
    note:
      en: "Almost always in the fixed phrase Herzlichen Glückwunsch zum … — and the preposition is zu + Dativ, never für: zum Geburtstag, zur Hochzeit."
      ru: "Почти всегда — в устойчивом выражении Herzlichen Glückwunsch zum …, причём предлог здесь zu + Dativ, а не für: zum Geburtstag, zur Hochzeit."
  - de: Torte
    ipa: "ˈtɔʁtə"
    pos: noun
    gender: f
    plural: "die Torten"
    en: cake (a layered, decorated one)
    ru: торт
    example_de: Yusuf bringt Anna eine Torte mit.
    example_en: Yusuf is bringing Anna a cake.
    example_ru: Юсуф приносит Анне торт.
    note:
      en: "A Torte is the tall, layered, cream-filled thing you carry to a birthday; a Kuchen is the flat, plain kind you have with afternoon coffee."
      ru: "Torte — высокий слоёный торт с кремом, который несут на день рождения; Kuchen — простой плоский пирог к послеобеденному кофе."
  - de: Getränk
    ipa: "gəˈtʁɛŋk"
    pos: noun
    gender: n
    plural: "die Getränke"
    en: drink, beverage
    ru: напиток
    example_de: Nina bringt uns die Getränke mit.
    example_en: Nina is bringing us the drinks.
    example_ru: Напитки нам принесёт Нина.
    note:
      en: "Usually plural when you are dividing up a party: Wer bringt die Getränke mit?"
      ru: "Когда речь о том, кто что приносит на праздник, слово почти всегда во множественном числе: Wer bringt die Getränke mit?"
  - de: Lust
    ipa: "ˈlʊst"
    pos: noun
    gender: f
    plural: "—"
    en: desire, inclination (to do something)
    ru: желание, охота (что-то сделать)
    example_de: Hast du Lust auf eine Party?
    example_en: Do you fancy a party?
    example_ru: Хочешь на вечеринку?
    note:
      en: "Lust auf + Akkusativ — the standard way to invite a friend to something. The answer is Ja, gern! or Nein, ich habe keine Lust — which is blunt, so add a reason."
      ru: "Lust auf + Akkusativ — обычный способ позвать друга куда-нибудь. Ответ: Ja, gern! или Nein, ich habe keine Lust — второе звучит резко, поэтому лучше назвать причину."
  - de: Hochzeit
    ipa: "ˈhɔxtsaɪ̯t"
    pos: noun
    gender: f
    plural: "die Hochzeiten"
    en: wedding
    ru: свадьба
    example_de: Mein Bruder feiert im Juni Hochzeit.
    example_en: My brother is having his wedding in June.
    example_ru: В июне у брата свадьба.
    note:
      en: "The formula for the day is Alles Gute zur Hochzeit! — die Hochzeit is feminine, so zu der contracts to zur."
      ru: "Формула для этого дня — Alles Gute zur Hochzeit! Слово die Hochzeit женского рода, поэтому zu der сливается в zur."

  # --- Was man auf einem Fest tut ---
  - de: sich freuen
    ipa: "zɪç ˈfʁɔʏ̯ən"
    pos: verb
    praesens_3sg: freut sich
    partizip2: gefreut
    aux: haben
    valence: "sich + Akk; auf / über + Akk"
    en: to be glad; to look forward to
    ru: радоваться; предвкушать
    example_de: Ich freue mich auf die Party.
    example_en: I'm looking forward to the party.
    example_ru: Жду вечеринку с нетерпением.
    note:
      en: "The pronoun is not optional and it changes with the person: ich freue mich, du freust dich, er freut sich, wir freuen uns. sich freuen auf points forward at something still ahead; sich freuen über points back at something that has happened."
      ru: "Местоимение обязательно и меняется по лицам: ich freue mich, du freust dich, er freut sich, wir freuen uns. sich freuen auf смотрит вперёд, на то, что ещё предстоит; sich freuen über — назад, на то, что уже случилось."
  - de: sich treffen
    ipa: "zɪç ˈtʁɛfn̩"
    pos: verb
    praesens_3sg: trifft sich
    partizip2: getroffen
    aux: haben
    valence: "sich + Akk; mit + Dat"
    en: to meet up (with somebody)
    ru: встречаться (с кем-либо)
    example_de: Wir treffen uns um acht bei Anna.
    example_en: We're meeting at eight at Anna's.
    example_ru: Встречаемся в восемь у Анны.
    note:
      en: "With wir the pronoun is uns and the meaning is reciprocal — we meet each other. To name the other person, use mit + Dativ: Ich treffe mich mit Nina."
      ru: "При wir местоимение — uns, и значение взаимное: мы встречаемся друг с другом. Чтобы назвать второго участника, ставят mit + Dativ: Ich treffe mich mit Nina."
  - de: mitfeiern
    ipa: "ˈmɪtˌfaɪ̯ɐn"
    pos: verb
    praesens_3sg: feiert mit
    partizip2: mitgefeiert
    aux: haben
    en: to join in the celebration, to celebrate along
    ru: праздновать вместе со всеми, присоединиться к празднику
    example_de: Komm doch am Samstag und feier mit!
    example_en: Do come on Saturday and celebrate with us!
    example_ru: Приходи в субботу и празднуй с нами!
    note:
      en: "Separable: the prefix splits off and goes to the end — Yusuf feiert am Samstag mit. After a modal it stays whole: Kannst du am Samstag mitfeiern?"
      ru: "Глагол с отделяемой приставкой: она отрывается и уходит в конец — Yusuf feiert am Samstag mit. После модального глагола он остаётся целым: Kannst du am Samstag mitfeiern?"
  - de: vorbeikommen
    ipa: "foːɐ̯ˈbaɪ̯ˌkɔmən"
    pos: verb
    praesens_3sg: kommt vorbei
    partizip2: vorbeigekommen
    aux: sein
    en: to drop by, to come round
    ru: зайти, заглянуть (в гости)
    example_de: Komm doch heute Abend vorbei!
    example_en: Do drop by this evening!
    example_ru: Заходи сегодня вечером!
    note:
      en: "The friendliest way there is to invite somebody: it promises a short, informal visit and asks for no commitment. Verb of movement, so the Perfekt takes sein: Nina ist gestern vorbeigekommen."
      ru: "Самый дружелюбный способ позвать в гости: он обещает короткий, неофициальный визит и ни к чему не обязывает. Глагол движения, поэтому в Perfekt берёт sein: Nina ist gestern vorbeigekommen."
  - de: zusagen
    ipa: "ˈtsuːˌzaːgn̩"
    pos: verb
    praesens_3sg: sagt zu
    partizip2: zugesagt
    aux: haben
    en: to accept (an invitation), to say yes
    ru: согласиться, ответить согласием (на приглашение)
    example_de: Yusuf und Nina haben schon zugesagt.
    example_en: Yusuf and Nina have already said yes.
    example_ru: Юсуф и Нина уже согласились.
    note:
      en: "The exact opposite of absagen, and built the same way: separable, and the prefix goes to the end — Ich sage gern zu."
      ru: "Полная противоположность absagen и устроено так же: приставка отделяемая и уходит в конец — Ich sage gern zu."
  - de: anstoßen
    ipa: "ˈanˌʃtoːsn̩"
    pos: verb
    praesens_3sg: stößt an
    partizip2: angestoßen
    aux: haben
    valence: "auf + Akk"
    en: to clink glasses, to drink a toast
    ru: чокаться, поднять бокал (за кого-л.)
    example_de: Wir stoßen auf Anna an!
    example_en: Let's drink to Anna!
    example_ru: Выпьем за Анну!
    note:
      en: "What everybody says at that moment is Prost! To name the person you are toasting, use auf + Akkusativ: Auf Anna!"
      ru: "В этот момент все говорят Prost! А чтобы назвать того, за кого пьют, ставят auf + Akkusativ: Auf Anna!"

  # --- Bausteine (chunks: one function each, learned whole) ---
  - de: "Hast du Lust auf eine Party?"
    pos: phrase
    en: Do you fancy a party?
    ru: Хочешь на вечеринку?
    example_de: Anna hat am Samstag Geburtstag. Hast du Lust auf eine Party?
    example_en: It's Anna's birthday on Saturday. Do you fancy a party?
    example_ru: В субботу у Анны день рождения. Хочешь на вечеринку?
    note:
      en: "The everyday invitation among friends. Swap in anything you like after auf, and keep the Akkusativ: Lust auf einen Kaffee? Lust auf ein Konzert?"
      ru: "Повседневное приглашение среди друзей. После auf можно подставить что угодно — главное, сохранить Akkusativ: Lust auf einen Kaffee? Lust auf ein Konzert?"
  - de: "Ich bringe dir einen Kuchen mit."
    pos: phrase
    en: I'll bring you a cake.
    ru: Я принесу тебе торт.
    example_de: Du feierst am Samstag? Ich bringe dir einen Kuchen mit.
    example_en: You're celebrating on Saturday? I'll bring you a cake.
    example_ru: В субботу празднуешь? Я принесу тебе торт.
    note:
      en: "The pattern of the whole lesson in one line: the person first and in the Dativ (dir), the thing second and in the Akkusativ (einen Kuchen), the separable prefix mit at the very end. Change the words, keep the frame."
      ru: "Схема всего урока в одной строке: сначала человек, в Dativ (dir), затем предмет, в Akkusativ (einen Kuchen), а отделяемая приставка mit — в самом конце. Слова меняйте, каркас оставляйте."
  - de: "Leider kann ich nicht, weil ich arbeiten muss."
    pos: phrase
    en: Unfortunately I can't, because I have to work.
    ru: К сожалению, я не смогу — мне нужно работать.
    example_de: Vielen Dank für die Einladung! Leider kann ich nicht, weil ich arbeiten muss.
    example_en: Thank you very much for the invitation! Unfortunately I can't, because I have to work.
    example_ru: Большое спасибо за приглашение! К сожалению, я не смогу — мне нужно работать.
    note:
      en: "A refusal without a reason is not an answer in German. Note the last word: weil sends the conjugated verb to the end, and with a modal that verb is the modal — arbeiten muss, not muss arbeiten."
      ru: "Отказ без причины по-немецки ответом не считается. Обратите внимание на последнее слово: weil отправляет спрягаемый глагол в конец, а при модальном глаголе спрягаемым является именно он — arbeiten muss, а не muss arbeiten."
  - de: "Alles Gute zum Geburtstag!"
    pos: phrase
    en: All the best for your birthday!
    ru: Всего наилучшего в день рождения!
    example_de: Alles Gute zum Geburtstag, Anna! Wir stoßen auf dich an.
    example_en: Happy birthday, Anna! Here's to you.
    example_ru: С днём рождения, Анна! Пьём за тебя.
    note:
      en: "Interchangeable with Herzlichen Glückwunsch zum Geburtstag. Alles Gute on its own works for any occasion at all, so it is the one to keep if you only keep one."
      ru: "Взаимозаменяемо с Herzlichen Glückwunsch zum Geburtstag. Само по себе Alles Gute годится для любого повода — если запоминать одну формулу, то эту."
