# Goethe-A2 Wortliste completion deck: the adverbs and particles that hold A2
# sentences together. Like the other completion decks it is deliberately *unowned*
# — no topic lists it in `vocab:`, so its fresh cards are gated on the learner's
# level, not on a topic having been opened. It drains the `funktionswoerter-chunks`
# section of data/goethe-a2-wortliste.txt.
id: kleine-woerter-a2
title_de: "Kleine Wörter"
title_en: "Small words (adverbs & particles)"
title_ru: "Маленькие слова (наречия и частицы)"
title_uk: "Маленькі слова (прислівники та частки)"
level: A2
entries:
  - de: besonders
    ipa: "bəˈzɔndɐs"
    pos: adv
    en: especially, particularly
    ru: особенно
    uk: особливо
    example_de: Im Winter ist es hier besonders kalt.
    example_en: In winter it is particularly cold here.
    example_ru: Зимой здесь особенно холодно.
    example_uk: Узимку тут особливо холодно.
  - de: eigentlich
    ipa: "ˈaɪ̯gn̩tlɪç"
    pos: adv
    en: actually, in fact
    ru: вообще-то, собственно говоря
    uk: власне, узагалі-то
    example_de: Eigentlich heiße ich Katharina, aber alle sagen Kathi.
    example_en: My name is actually Katharina, but everybody calls me Kathi.
    example_ru: Вообще-то меня зовут Катарина, но все зовут меня Кати.
    example_uk: Узагалі-то мене звати Катаріна, але всі кличуть мене Каті.
    note:
      en: 'eigentlich corrects an assumption — what is really the case, as opposed to what it looks like. It is not the intensifier "really": that is wirklich (Das war wirklich gut).'
      ru: 'eigentlich поправляет ожидание: как обстоит дело на самом деле, вопреки видимости. Это не усилитель «действительно» — для этого есть wirklich (Das war wirklich gut).'
      uk: 'eigentlich виправляє очікування: як справи насправді, усупереч видимості. Це не підсилювач «справді» — для цього є wirklich (Das war wirklich gut).'
  - de: außerhalb
    ipa: "ˈaʊ̯sɐˌhalp"
    pos: prep
    en: outside (of)
    ru: за пределами, вне
    uk: за межами, поза
    example_de: Wir wohnen außerhalb von München.
    example_en: We live outside Munich.
    example_ru: Мы живём за пределами Мюнхена.
    example_uk: Ми живемо за межами Мюнхена.
    note:
      en: 'With a bare name or without an article, use außerhalb von + Dativ (außerhalb von Berlin, außerhalb von der Stadt). Its opposite is innerhalb (within).'
      ru: 'С именем собственным или без артикля используйте außerhalb von + Dativ (außerhalb von Berlin). Противоположность — innerhalb («внутри, в пределах»).'
      uk: 'З власною назвою або без артикля вживайте außerhalb von + Dativ (außerhalb von Berlin). Протилежність — innerhalb («усередині, в межах»).'
  - de: wegen
    ipa: "ˈveːgn̩"
    pos: prep
    en: because of, due to
    ru: из-за, по причине
    uk: через, з причини
    example_de: Wegen des Wetters bleiben wir zu Hause.
    example_en: Because of the weather we are staying at home.
    example_ru: Из-за погоды мы остаёмся дома.
    example_uk: Через погоду ми залишаємося вдома.
    note:
      en: 'wegen introduces a reason as a noun phrase (Wegen des Wetters …); weil introduces the same reason as a clause with the verb at the end (Weil das Wetter schlecht ist, …). The written standard after wegen is the Genitiv.'
      ru: 'wegen называет причину существительным (Wegen des Wetters …), weil — целым придаточным с глаголом в конце (Weil das Wetter schlecht ist, …). В письменной норме после wegen идёт Genitiv.'
      uk: 'wegen називає причину іменником (Wegen des Wetters …), weil — цілим підрядним із дієсловом у кінці (Weil das Wetter schlecht ist, …). У писемній нормі після wegen іде Genitiv.'
  - de: also
    ipa: "ˈalzoː"
    pos: adv
    en: so, therefore
    ru: итак, значит, поэтому
    uk: отже, тож, тому
    example_de: Es regnet, also nehmen wir den Bus.
    example_en: It is raining, so we are taking the bus.
    example_ru: Идёт дождь, значит, поедем на автобусе.
    example_uk: Іде дощ, тож поїдемо автобусом.
    note:
      en: 'A false friend: German also means "so, therefore" and draws a conclusion. The English "also" is auch (Ich komme auch mit). Fronted also still leaves the verb in second position: Also nehmen wir den Bus.'
      ru: 'Ложный друг: немецкое also значит «итак, значит» и вводит вывод, а не «также» — «также» будет auch (Ich komme auch mit). В начале предложения also не сдвигает глагол с второго места: Also nehmen wir den Bus.'
      uk: 'Оманливе слово: німецьке also означає «отже, тож» і вводить висновок, а не «також» — «також» буде auch (Ich komme auch mit). На початку речення also не зсуває дієслово з другого місця: Also nehmen wir den Bus.'
  - de: außerdem
    ipa: "ˈaʊ̯sɐdeːm"
    pos: adv
    en: besides, in addition
    ru: кроме того, к тому же
    uk: крім того, до того ж
    example_de: Die Wohnung ist groß. Außerdem ist sie sehr hell.
    example_en: The flat is big. On top of that, it is very bright.
    example_ru: Квартира большая. К тому же она очень светлая.
    example_uk: Квартира велика. До того ж вона дуже світла.
    note:
      en: 'außerdem adds a second argument to the first one. It fills position 1, so the verb follows immediately: Außerdem ist sie hell — never "Außerdem sie ist …".'
      ru: 'außerdem добавляет второй аргумент к первому. Оно занимает первое место, поэтому глагол идёт сразу за ним: Außerdem ist sie hell — но не «Außerdem sie ist …».'
      uk: 'außerdem додає другий аргумент до першого. Воно займає перше місце, тому дієслово йде одразу за ним: Außerdem ist sie hell — але не «Außerdem sie ist …».'
  - de: beide
    ipa: "ˈbaɪ̯də"
    pos: pron
    en: both
    ru: оба, обе
    uk: обидва, обидві
    example_de: Beide Wohnungen sind leider zu teuer.
    example_en: Both flats are unfortunately too expensive.
    example_ru: Обе квартиры, к сожалению, слишком дорогие.
    example_uk: Обидві квартири, на жаль, занадто дорогі.
    note:
      en: 'beide means both of exactly two; alle means all of any larger number. It can also stand alone next to the subject: Wir haben beide keine Zeit.'
      ru: 'beide — «оба» (ровно двое), alle — «все» (сколько угодно). Может стоять и рядом с подлежащим: Wir haben beide keine Zeit («у нас обоих нет времени»).'
      uk: 'beide — «обидва» (рівно двоє), alle — «усі» (скільки завгодно). Може стояти й поряд із підметом: Wir haben beide keine Zeit («у нас обох немає часу»).'
  - de: bisschen
    ipa: "ˈbɪsçən"
    pos: pron
    en: a little, a bit
    ru: немного, чуть-чуть
    uk: трохи, трішки
    example_de: Kannst du bitte ein bisschen warten?
    example_en: Could you wait a little, please?
    example_ru: Можешь немного подождать?
    example_uk: Можеш трохи зачекати?
    note:
      en: 'Always with ein, and always for something uncountable: ein bisschen Zeit, ein bisschen Geld, ein bisschen müde. For countable things use ein paar: ein paar Tage.'
      ru: 'Всегда с ein и всегда о неисчисляемом: ein bisschen Zeit, ein bisschen Geld, ein bisschen müde. Для исчисляемого — ein paar: ein paar Tage.'
      uk: 'Завжди з ein і завжди про незлічуване: ein bisschen Zeit, ein bisschen Geld, ein bisschen müde. Для злічуваного — ein paar: ein paar Tage.'
  - de: fast
    ipa: "ˈfast"
    pos: adv
    en: almost, nearly
    ru: почти
    uk: майже
    example_de: Wir sind fast fertig, nur noch zehn Minuten.
    example_en: We are almost finished, just ten more minutes.
    example_ru: Мы почти закончили, осталось всего десять минут.
    example_uk: Ми майже закінчили, лишилося всього десять хвилин.
    note:
      en: 'A false friend: German fast means "almost", not "quick". Quick is schnell (Der Zug ist schnell).'
      ru: 'Ложный друг для тех, кто знает английский: немецкое fast значит «почти», а не «быстрый». «Быстрый» — schnell (Der Zug ist schnell).'
      uk: 'Оманливе слово для тих, хто знає англійську: німецьке fast означає «майже», а не «швидкий». «Швидкий» — schnell (Der Zug ist schnell).'
  - de: ganz
    ipa: "ˈgants"
    pos: adv
    en: completely, quite
    ru: совсем, вполне
    uk: цілком, зовсім
    example_de: Keine Sorge, das ist ganz normal.
    example_en: Do not worry, that is completely normal.
    example_ru: Не волнуйся, это совершенно нормально.
    example_uk: Не хвилюйся, це цілком нормально.
    note:
      en: 'Two strengths: before adjectives like normal, sicher or falsch it means "completely", but with an evaluating adjective it often softens to "quite" — ganz gut is "pretty good", not "very good". As an adjective it means "whole" and takes endings: den ganzen Tag.'
      ru: 'Две силы: перед прилагательными вроде normal, sicher, falsch значит «совершенно», но с оценочным прилагательным скорее смягчает — ganz gut это «неплохо», а не «очень хорошо». Как прилагательное значит «целый» и получает окончания: den ganzen Tag.'
      uk: 'Дві сили: перед прикметниками на зразок normal, sicher, falsch означає «цілком», але з оцінним прикметником радше пом’якшує — ganz gut це «непогано», а не «дуже добре». Як прикметник означає «цілий» і отримує закінчення: den ganzen Tag.'
  - de: genau
    ipa: "gəˈnaʊ̯"
    pos: adv
    en: exactly, precisely
    ru: точно, ровно
    uk: точно, рівно
    example_de: Der Bus kommt genau um acht Uhr.
    example_en: The bus arrives at eight o'clock sharp.
    example_ru: Автобус приходит ровно в восемь часов.
    example_uk: Автобус приходить рівно о восьмій годині.
    note:
      en: 'On its own, Genau! is an everyday way of agreeing: "Exactly!" / "That is right."'
      ru: 'Отдельным словом Genau! — обычный способ согласиться: «Именно!», «Точно!».'
      uk: 'Окремим словом Genau! — звичайний спосіб погодитися: «Саме так!», «Точно!».'
  - de: genug
    ipa: "gəˈnuːk"
    pos: adv
    en: enough
    ru: достаточно, хватит
    uk: достатньо, досить
    example_de: Ich habe nicht genug Geld für ein neues Handy.
    example_en: I do not have enough money for a new phone.
    example_ru: У меня не хватает денег на новый телефон.
    example_uk: Мені не вистачає грошей на новий телефон.
    note:
      en: 'Before a noun genug comes first (genug Geld, genug Zeit), but after an adjective it comes second: alt genug, gut genug — never "genug alt".'
      ru: 'Перед существительным genug стоит впереди (genug Geld, genug Zeit), а после прилагательного — позади: alt genug, gut genug, но не «genug alt».'
      uk: 'Перед іменником genug стоїть попереду (genug Geld, genug Zeit), а після прикметника — позаду: alt genug, gut genug, але не «genug alt».'
  - de: gleich
    ipa: "ˈglaɪ̯ç"
    pos: adv
    en: in a moment, right away
    ru: сейчас, сию минуту
    uk: зараз, цієї миті
    example_de: Warte kurz, ich komme gleich.
    example_en: Hold on, I will be right there.
    example_ru: Подожди немного, я сейчас приду.
    example_uk: Зачекай трохи, я зараз прийду.
    note:
      en: 'As an adverb of time gleich means "in a moment" (Ich komme gleich), and it can also mean "immediately after" (gleich nach dem Essen). The adjective der gleiche / die gleiche means "the same" — a different word in use: Wir nehmen den gleichen Bus.'
      ru: 'Как наречие времени gleich значит «сейчас, через минуту» (Ich komme gleich), а также «сразу после» (gleich nach dem Essen). Прилагательное der gleiche / die gleiche значит «тот же самый» — совсем другое употребление: Wir nehmen den gleichen Bus.'
      uk: 'Як прислівник часу gleich означає «зараз, за хвилину» (Ich komme gleich), а також «одразу після» (gleich nach dem Essen). Прикметник der gleiche / die gleiche означає «той самий» — зовсім інше вживання: Wir nehmen den gleichen Bus.'
  - de: jemand
    ipa: "ˈjeːmant"
    pos: pron
    en: somebody, anybody
    ru: кто-то, кто-нибудь
    uk: хтось, хто-небудь
    example_de: Hat jemand meinen Schlüssel gesehen?
    example_en: Has anybody seen my key?
    example_ru: Кто-нибудь видел мой ключ?
    example_uk: Хтось бачив мій ключ?
    note:
      en: 'jemand is always singular and takes a singular verb: Jemand wartet draußen. Its negative counterpart is niemand.'
      ru: 'jemand всегда в единственном числе и требует глагола в единственном числе: Jemand wartet draußen. Отрицательная пара — niemand.'
      uk: 'jemand завжди в однині й вимагає дієслова в однині: Jemand wartet draußen. Заперечна пара — niemand.'
  - de: mal
    ipa: "ˈmaːl"
    pos: particle
    en: (softening particle) just, then
    ru: -ка (смягчающая частица)
    uk: -но, -бо (пом’якшувальна частка)
    example_de: Sag mal, wie spät ist es?
    example_en: Tell me, what time is it?
    example_ru: Слушай, а сколько сейчас времени?
    example_uk: Слухай, а котра зараз година?
    note:
      en: 'Lowercase and unstressed, mal makes a request or a question sound casual instead of demanding: Sag mal …, Komm mal her, Moment mal! It carries no meaning of its own — leave it out and the sentence gets blunter. The capitalized noun das Mal is a different word (an occasion): zum ersten Mal.'
      ru: 'Строчная безударная частица mal делает просьбу или вопрос непринуждённым, а не требовательным: Sag mal …, Komm mal her, Moment mal! Собственного значения у неё нет — без неё фраза звучит резче. Существительное das Mal (с большой буквы) — другое слово, «раз»: zum ersten Mal.'
      uk: 'Мала ненаголошена частка mal робить прохання чи запитання невимушеним, а не вимогливим: Sag mal …, Komm mal her, Moment mal! Власного значення в неї немає — без неї фраза звучить різкіше. Іменник das Mal (з великої літери) — інше слово, «раз»: zum ersten Mal.'
  - de: Mal
    ipa: "ˈmaːl"
    pos: noun
    gender: n
    plural: "die Male"
    en: time, occasion
    ru: раз
    uk: раз
    example_de: Ich fahre zum ersten Mal nach Berlin.
    example_en: I am travelling to Berlin for the first time.
    example_ru: Я еду в Берлин в первый раз.
    example_uk: Я їду до Берліна вперше.
    note:
      en: 'The capitalized noun das Mal counts occasions: zum ersten Mal, das nächste Mal, jedes Mal. The lowercase particle mal is a different word and only softens a request (Sag mal …).'
      ru: 'Существительное das Mal (с большой буквы) считает разы: zum ersten Mal, das nächste Mal, jedes Mal. Строчная частица mal — другое слово, она лишь смягчает просьбу (Sag mal …).'
      uk: 'Іменник das Mal (з великої літери) рахує рази: zum ersten Mal, das nächste Mal, jedes Mal. Мала частка mal — інше слово, вона лише пом’якшує прохання (Sag mal …).'
  - de: mindestens
    ipa: "ˈmɪndəstn̩s"
    pos: adv
    en: at least (with a number or amount)
    ru: как минимум, не менее
    uk: щонайменше, не менше
    example_de: Der Weg zum Bahnhof dauert mindestens eine halbe Stunde.
    example_en: The way to the station takes at least half an hour.
    example_ru: Дорога до вокзала занимает как минимум полчаса.
    example_uk: Дорога до вокзалу займає щонайменше півгодини.
    note:
      en: 'mindestens states a minimum quantity — a number, a price, an amount of time. For "at least" in the sense of a consolation, use wenigstens.'
      ru: 'mindestens называет минимальное количество — число, цену, время. «Хотя бы» как утешение — это wenigstens.'
      uk: 'mindestens називає мінімальну кількість — число, ціну, час. «Хоча б» як утіха — це wenigstens.'
  - de: niemand
    ipa: "ˈniːmant"
    pos: pron
    en: nobody, no one
    ru: никто
    uk: ніхто
    example_de: Ich habe geklingelt, aber niemand war zu Hause.
    example_en: I rang the bell, but nobody was at home.
    example_ru: Я позвонил в дверь, но дома никого не было.
    example_uk: Я подзвонив у двері, але вдома нікого не було.
    note:
      en: 'One negative word is enough for the whole sentence: Niemand hat etwas gesagt — never a second nicht or kein alongside it.'
      ru: 'Одного отрицания на предложение достаточно: Niemand hat etwas gesagt — по-немецки нельзя «никто ничего не сказал» с двумя отрицаниями.'
      uk: 'Одного заперечення на речення досить: Niemand hat etwas gesagt — німецькою не можна «ніхто нічого не сказав» із двома запереченнями, як в українській.'
  - de: pro
    ipa: "ˈpʁoː"
    pos: prep
    en: per, a
    ru: в, за (на единицу)
    uk: на, за (на одиницю)
    example_de: Ich gehe zweimal pro Woche zum Sport.
    example_en: I go to the gym twice a week.
    example_ru: Я хожу на спорт два раза в неделю.
    example_uk: Я ходжу на спорт два рази на тиждень.
    note:
      en: 'pro takes a bare noun with no article at all: pro Woche, pro Tag, pro Person, pro Stück.'
      ru: 'После pro существительное стоит вообще без артикля: pro Woche, pro Tag, pro Person, pro Stück.'
      uk: 'Після pro іменник стоїть узагалі без артикля: pro Woche, pro Tag, pro Person, pro Stück.'
  - de: selbst
    ipa: "ˈzɛlpst"
    pos: adv
    en: myself/yourself/…; even
    ru: сам; даже
    uk: сам; навіть
    example_de: Das Brot backe ich selbst.
    example_en: I bake the bread myself.
    example_ru: Хлеб я пеку сам.
    example_uk: Хліб я печу сам.
    note:
      en: 'Position decides the meaning. After the subject or the verb it means "-self": Ich mache das selbst. Before a phrase it means "even": Selbst am Sonntag arbeitet er. In the "-self" meaning, spoken German often prefers selber.'
      ru: 'Значение решает позиция. После подлежащего или глагола — «сам»: Ich mache das selbst. Перед членом предложения — «даже»: Selbst am Sonntag arbeitet er. В значении «сам» в разговорной речи чаще говорят selber.'
      uk: 'Значення визначає позиція. Після підмета чи дієслова — «сам»: Ich mache das selbst. Перед членом речення — «навіть»: Selbst am Sonntag arbeitet er. У значенні «сам» у розмовному мовленні частіше кажуть selber.'
  - de: so
    ipa: "ˈzoː"
    pos: adv
    en: so, such; like this
    ru: так, такой
    uk: так, такий
    example_de: Warum bist du heute so müde?
    example_en: Why are you so tired today?
    example_ru: Почему ты сегодня такой усталый?
    example_uk: Чому ти сьогодні такий втомлений?
    note:
      en: 'so intensifies (so kalt, so müde) or points to a manner (Mach es so!). It never draws a conclusion — that is also (Es regnet, also bleiben wir hier). And do not let the English "also" pull you the other way: that one is auch.'
      ru: 'so усиливает (so kalt, so müde) или указывает на способ (Mach es so! — «Делай так!»). Вывод оно не вводит — для этого есть also (Es regnet, also bleiben wir hier).'
      uk: 'so підсилює (so kalt, so müde) або вказує на спосіб (Mach es so! — «Роби так!»). Висновку воно не вводить — для цього є also (Es regnet, also bleiben wir hier).'
  - de: sogar
    ipa: "zoˈgaːɐ̯"
    pos: adv
    en: even
    ru: даже
    uk: навіть
    example_de: Er arbeitet sogar am Wochenende.
    example_en: He even works at weekends.
    example_ru: Он работает даже по выходным.
    example_uk: Він працює навіть на вихідних.
    note:
      en: 'sogar marks something as more than expected. It is the everyday word for "even"; selbst does the same job but sounds more formal and only stands in front of the phrase it stresses.'
      ru: 'sogar показывает, что нечто превосходит ожидание. Это обычное слово для «даже»; selbst значит то же, но звучит более книжно и ставится только перед выделяемым членом.'
      uk: 'sogar показує, що щось перевершує очікування. Це звичайне слово для «навіть»; selbst означає те саме, але звучить книжніше й ставиться лише перед виділюваним членом.'
  - de: sonst
    ipa: "ˈzɔnst"
    pos: adv
    en: otherwise, or else; else
    ru: иначе, а то; ещё
    uk: інакше, а то; ще
    example_de: Beeil dich, sonst kommen wir zu spät.
    example_en: Hurry up, or else we will be late.
    example_ru: Поторопись, иначе мы опоздаем.
    example_uk: Поквапся, інакше ми запізнимося.
    note:
      en: 'Two jobs: "or else", naming what happens if the first part fails (Beeil dich, sonst …), and "else" in shop and office questions (Sonst noch etwas? — Anything else?).'
      ru: 'Две работы: «иначе, а то» — что случится, если первое не выполнить (Beeil dich, sonst …), и «ещё» в вопросах в магазине или в офисе (Sonst noch etwas? — «Ещё что-нибудь?»).'
      uk: 'Дві роботи: «інакше, а то» — що станеться, якщо перше не виконати (Beeil dich, sonst …), і «ще» в запитаннях у магазині чи в офісі (Sonst noch etwas? — «Ще щось?»).'
  - de: unbedingt
    ipa: "ˈʊnbədɪŋt"
    pos: adv
    en: absolutely, definitely
    ru: обязательно, непременно
    uk: обов’язково, неодмінно
    example_de: Du musst dir diesen Film unbedingt ansehen.
    example_en: You absolutely have to see this film.
    example_ru: Тебе обязательно нужно посмотреть этот фильм.
    example_uk: Тобі обов’язково треба подивитися цей фільм.
    note:
      en: 'unbedingt turns a recommendation into an urgent one. It usually stands next to the verb bracket, not at the front of the sentence.'
      ru: 'unbedingt превращает совет в настойчивый. Обычно стоит внутри предложения рядом с глагольной рамкой, а не в самом начале.'
      uk: 'unbedingt перетворює пораду на наполегливу. Зазвичай стоїть усередині речення поряд із дієслівною рамкою, а не на самому початку.'
  - de: viel
    ipa: "ˈfiːl"
    pos: adv
    en: much, a lot
    ru: много
    uk: багато
    example_de: Er redet viel und arbeitet wenig.
    example_en: He talks a lot and works little.
    example_ru: Он много говорит и мало работает.
    example_uk: Він багато говорить і мало працює.
    note:
      en: 'Uninflected in exactly two places: next to a verb (er arbeitet viel) and before an uncountable noun (viel Zeit, viel Geld). Countable things in the plural take the ending: viele Leute, viele Fragen.'
      ru: 'Без окончания ровно в двух случаях: при глаголе (er arbeitet viel) и перед неисчисляемым существительным (viel Zeit, viel Geld). Исчисляемое во множественном числе требует окончания: viele Leute, viele Fragen.'
      uk: 'Без закінчення рівно у двох випадках: при дієслові (er arbeitet viel) і перед незлічуваним іменником (viel Zeit, viel Geld). Злічуване в множині вимагає закінчення: viele Leute, viele Fragen.'
  - de: wenig
    ipa: "ˈveːnɪç"
    pos: adv
    en: little, not much
    ru: мало
    uk: мало
    example_de: Sie hat leider wenig Zeit für Sport.
    example_en: Unfortunately she has little time for sport.
    example_ru: К сожалению, у неё мало времени на спорт.
    example_uk: На жаль, у неї мало часу на спорт.
    note:
      en: 'The mirror image of viel: uninflected next to a verb (ich schlafe wenig) and before an uncountable noun (wenig Zeit, wenig Geld). Plural countables take the ending: wenige Leute. And ein wenig is a synonym of ein bisschen.'
      ru: 'Зеркало viel: без окончания при глаголе (ich schlafe wenig) и перед неисчисляемым существительным (wenig Zeit, wenig Geld). Исчисляемое во множественном числе требует окончания: wenige Leute. А ein wenig — синоним ein bisschen.'
      uk: 'Дзеркало viel: без закінчення при дієслові (ich schlafe wenig) і перед незлічуваним іменником (wenig Zeit, wenig Geld). Злічуване в множині вимагає закінчення: wenige Leute. А ein wenig — синонім ein bisschen.'
  - de: wenigstens
    ipa: "ˈveːnɪçstn̩s"
    pos: adv
    en: at least (as a consolation)
    ru: хотя бы, по крайней мере
    uk: принаймні, хоча б
    example_de: Das Essen war teuer, aber wenigstens hat es gut geschmeckt.
    example_en: The meal was expensive, but at least it tasted good.
    example_ru: Ужин был дорогой, но по крайней мере вкусный.
    example_uk: Вечеря була дорога, але принаймні смачна.
    note:
      en: 'wenigstens names the good side of a bad situation. When "at least" introduces a minimum number or amount instead, the word is mindestens (mindestens zehn Euro).'
      ru: 'wenigstens называет хорошую сторону в плохой ситуации. Если же «по крайней мере» вводит минимальное число или количество, нужно mindestens (mindestens zehn Euro).'
      uk: 'wenigstens називає добрий бік у поганій ситуації. Якщо ж «принаймні» вводить мінімальне число чи кількість, потрібно mindestens (mindestens zehn Euro).'
  - de: wirklich
    ipa: "ˈvɪʁklɪç"
    pos: adv
    en: really, truly
    ru: действительно, по-настоящему
    uk: справді, по-справжньому
    example_de: Das Konzert gestern war wirklich toll.
    example_en: Yesterday's concert was really great.
    example_ru: Вчерашний концерт был действительно классный.
    example_uk: Учорашній концерт був справді чудовий.
    note:
      en: 'wirklich confirms and intensifies: it says that something is genuinely the case. eigentlich does the opposite — it corrects the picture (Eigentlich wohne ich in Bonn).'
      ru: 'wirklich подтверждает и усиливает: нечто и правда так. eigentlich делает обратное — поправляет картину (Eigentlich wohne ich in Bonn).'
      uk: 'wirklich підтверджує й підсилює: щось і справді так. eigentlich робить навпаки — виправляє картину (Eigentlich wohne ich in Bonn).'
  - de: ein paar
    ipa: "aɪ̯n ˈpaːɐ̯"
    pos: phrase
    en: a few, a couple of
    ru: несколько, пара
    uk: кілька, пара
    example_de: Ich bleibe noch ein paar Tage in Hamburg.
    example_en: I am staying in Hamburg for a few more days.
    example_ru: Я останусь в Гамбурге ещё на несколько дней.
    example_uk: Я залишуся в Гамбурзі ще на кілька днів.
    note:
      en: 'Lowercase ein paar means "a few" of countable things and never changes its form: ein paar Tage, mit ein paar Freunden. The capitalized noun das Paar is a pair or a couple (ein Paar Schuhe). For uncountable things use ein bisschen.'
      ru: 'Строчное ein paar значит «несколько» об исчисляемом и никогда не меняет форму: ein paar Tage, mit ein paar Freunden. Существительное das Paar (с большой буквы) — «пара» (ein Paar Schuhe). Для неисчисляемого нужно ein bisschen.'
      uk: 'Мале ein paar означає «кілька» про злічуване й ніколи не змінює форму: ein paar Tage, mit ein paar Freunden. Іменник das Paar (з великої літери) — «пара» (ein Paar Schuhe). Для незлічуваного потрібно ein bisschen.'
  - de: nächste
    ipa: "ˈnɛːçstə"
    pos: adj
    en: next
    ru: следующий
    uk: наступний
    example_de: Nächste Woche fahre ich zu meiner Schwester nach Wien.
    example_en: Next week I am going to see my sister in Vienna.
    example_ru: На следующей неделе я поеду к сестре в Вену.
    example_uk: Наступного тижня я поїду до сестри у Відень.
    note:
      en: 'nächste is an adjective and takes endings: der nächste Bus, an der nächsten Haltestelle. Time expressions built with it need no preposition at all: nächste Woche, nächstes Jahr, nächsten Montag.'
      ru: 'nächste — прилагательное и получает окончания: der nächste Bus, an der nächsten Haltestelle. Обозначения времени с ним обходятся вообще без предлога: nächste Woche, nächstes Jahr, nächsten Montag.'
      uk: 'nächste — прикметник і отримує закінчення: der nächste Bus, an der nächsten Haltestelle. Позначення часу з ним обходяться взагалі без прийменника: nächste Woche, nächstes Jahr, nächsten Montag.'
