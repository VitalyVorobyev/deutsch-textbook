id: kasus-verbmuster
title_de: "Verb + Person: Dativ oder Akkusativ?"
title_en: "Verb patterns: dative or accusative person?"
title_ru: "Модели глаголов: лицо в Dativ или Akkusativ?"
level: A2

# A deliberately small rich-card pilot. The existing verb headwords and their SRS identities
# remain untouched; these six productive chunks make the governed case itself retrievable.
entries:
  - de: "jemandem helfen"
    ipa: "ˈjeːmandəm ˈhɛlfn̩"
    pos: phrase
    valence: "+ Dat"
    en: "to help someone"
    ru: "помогать кому-либо"
    example_de: "Kannst du meiner Nachbarin helfen?"
    example_en: "Can you help my neighbour?"
    example_ru: "Ты можешь помочь моей соседке?"
    note:
      en: "The person is the wem?-answer, so helfen takes the dative: jemandem helfen, mir helfen, dem Mann helfen. Contrast: jemanden anrufen."
      ru: "Падеж совпадает с русским вопросом «помогать кому?»: jemandem helfen, mir helfen, dem Mann helfen. Для контраста: jemanden anrufen."

  - de: "jemandem danken"
    ipa: "ˈjeːmandəm ˈdaŋkn̩"
    pos: phrase
    valence: "+ Dat"
    en: "to thank someone"
    ru: "благодарить кого-либо"
    example_de: "Ich danke meinem Kollegen für die Hilfe."
    example_en: "I thank my colleague for the help."
    example_ru: "Я благодарю своего коллегу за помощь."
    note:
      en: "English gives no case clue, but German uses the dative: jemandem danken, dir danken, der Kollegin danken."
      ru: "Русский требует «благодарить кого?», но немецкий — Dativ: jemandem danken, dir danken, der Kollegin danken."

  - de: "jemandem antworten"
    ipa: "ˈjeːmandəm ˈantvɔʁtn̩"
    pos: phrase
    valence: "+ Dat"
    en: "to answer someone"
    ru: "отвечать кому-либо"
    example_de: "Bitte antworte der Lehrerin heute."
    example_en: "Please answer the teacher today."
    example_ru: "Пожалуйста, ответь учительнице сегодня."
    note:
      en: "The person who receives the answer is dative: jemandem antworten, ihm antworten. A thing can follow with auf + Akk: auf eine Frage antworten."
      ru: "Тот, кому отвечают, стоит в Dativ: jemandem antworten, ihm antworten. На вопрос отвечают через auf + Akk: auf eine Frage antworten."

  - de: "jemanden anrufen"
    ipa: "ˈjeːmandn̩ ˈanˌʁuːfn̩"
    pos: phrase
    valence: "+ Akk"
    en: "to call someone"
    ru: "звонить кому-либо"
    example_de: "Ich rufe meinen Bruder am Abend an."
    example_en: "I call my brother in the evening."
    example_ru: "Я звоню брату вечером."
    note:
      en: "German calls the person directly, with no preposition and in the accusative: jemanden anrufen, ihn anrufen. Contrast: jemandem helfen."
      ru: "По-русски звонят кому?, но в немецком лицо стоит в Akkusativ без предлога: jemanden anrufen, ihn anrufen. Для контраста: jemandem helfen."

  - de: "jemanden sehen"
    ipa: "ˈjeːmandn̩ ˈzeːən"
    pos: phrase
    valence: "+ Akk"
    en: "to see someone"
    ru: "видеть кого-либо"
    example_de: "Wir sehen unsere Freunde am Samstag."
    example_en: "We see our friends on Saturday."
    example_ru: "Мы видим наших друзей в субботу."
    note:
      en: "The person seen is the direct object: jemanden sehen, ihn sehen, unsere Freunde sehen — always accusative."
      ru: "Тот, кого видят, — прямое дополнение: jemanden sehen, ihn sehen, unsere Freunde sehen; всегда Akkusativ."

  - de: "jemanden fragen"
    ipa: "ˈjeːmandn̩ ˈfʁaːgn̩"
    pos: phrase
    valence: "+ Akk"
    en: "to ask someone"
    ru: "спрашивать кого-либо"
    example_de: "Frag bitte den Mitarbeiter am Schalter."
    example_en: "Please ask the employee at the counter."
    example_ru: "Спроси, пожалуйста, сотрудника у окошка."
    note:
      en: "The person is accusative and takes no preposition: jemanden fragen, mich fragen, den Mitarbeiter fragen. A question itself can also be accusative: eine Frage fragen is possible, but eine Frage stellen is more usual."
      ru: "Лицо стоит в Akkusativ без предлога: jemanden fragen, mich fragen, den Mitarbeiter fragen. Для самого вопроса обычно говорят eine Frage stellen."
