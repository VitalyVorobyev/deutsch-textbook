# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the remaining
# wohnen-haushalt words plus the WC abbreviation.
id: haushalt-geschirr-a2
title_de: "Haushalt & Geschirr"
title_en: "Household & tableware"
title_ru: "Дом и посуда"
title_uk: "Дім та посуд"
level: A2
entries:
  - de: WC
    ipa: "veːˈtseː"
    pos: noun
    gender: n
    plural: die WCs
    en: toilet, WC (in a public building)
    ru: туалет, WC (в общественном месте)
    uk: туалет, WC (у громадському місці)
    example_de: Entschuldigung, wo ist hier das WC?
    example_en: Excuse me, where is the toilet?
    example_ru: Извините, где здесь туалет?
    example_uk: Перепрошую, де тут туалет?
    note:
      en: 'Spelled as two letters and spoken as two letters — veː-tseː, not as a word. It stands for the English water closet, and it is what you read on the door in a restaurant, a station or a museum. In ordinary speech the word is die Toilette; das WC belongs to signs and forms.'
      ru: 'Пишется двумя буквами и читается по буквам — veː-tseː, а не как слово. Это сокращение от английского water closet, и именно его пишут на двери в ресторане, на вокзале или в музее. В обычной речи говорят die Toilette; das WC — язык табличек и объявлений.'
      uk: 'Пишеться двома літерами й читається по літерах — veː-tseː, а не як слово. Це скорочення від англійського water closet, і саме його пишуть на дверях у ресторані, на вокзалі чи в музеї. У звичайному мовленні кажуть die Toilette; das WC — мова табличок і оголошень.'
  - de: bauen
    ipa: "ˈbaʊ̯ən"
    pos: verb
    praesens_3sg: baut
    partizip2: gebaut
    aux: haben
    valence: "+ Akk"
    en: to build
    ru: строить
    uk: будувати
    example_de: Meine Eltern bauen ein Haus auf dem Land.
    example_en: My parents are building a house in the countryside.
    example_ru: Мои родители строят дом за городом.
    example_uk: Мої батьки будують дім за містом.
    note:
      en: 'A regular weak verb: er baut, hat gebaut. What is built is a plain accusative object — ein Haus bauen, eine Garage bauen. The finished thing is das Gebäude.'
      ru: 'Правильный слабый глагол: er baut, hat gebaut. То, что строят, — прямое дополнение в Akkusativ: ein Haus bauen, eine Garage bauen. Готовая постройка — das Gebäude.'
      uk: 'Правильне слабке дієслово: er baut, hat gebaut. Те, що будують, — прямий додаток в Akkusativ: ein Haus bauen, eine Garage bauen. Готова споруда — das Gebäude.'
  - de: Garage
    ipa: "gaˈʁaːʒə"
    pos: noun
    gender: f
    plural: die Garagen
    en: garage (for parking a car)
    ru: гараж
    uk: гараж
    example_de: Das Auto steht in der Garage.
    example_en: The car is in the garage.
    example_ru: Машина стоит в гараже.
    example_uk: Машина стоїть у гаражі.
    note:
      en: 'A French loan, so the g in the middle is soft — gaˈʁaːʒə, with the stress on the second syllable and the same sound as in Journalist. Feminine: die Garage. A repair shop is die Werkstatt, not a Garage.'
      ru: 'Заимствование из французского, поэтому g в середине читается мягко — gaˈʁaːʒə, с ударением на втором слоге, как «ж» в слове «журналист». Женского рода: die Garage. Автомастерская — это die Werkstatt, а не Garage.'
      uk: 'Запозичення з французької, тому g усередині читається м’яко — gaˈʁaːʒə, з наголосом на другому складі, як «ж» у слові «журналіст». Жіночого роду: die Garage. Автомайстерня — це die Werkstatt, а не Garage.'
  - de: Ordnung
    ipa: "ˈɔʁdnʊŋ"
    pos: noun
    gender: f
    plural: "—"
    en: order, tidiness
    ru: порядок
    uk: порядок
    example_de: Alles in Ordnung?
    example_en: Is everything OK?
    example_ru: Всё в порядке?
    example_uk: Усе в порядку?
    note:
      en: 'Learn it through the everyday phrase: Alles in Ordnung? means Is everything OK?, and the answer is Alles in Ordnung. Ordnung machen is to tidy up. Every -ung noun is feminine, and this one has no plural.'
      ru: 'Запоминается через обиходную фразу: Alles in Ordnung? — «Всё в порядке?», ответ — Alles in Ordnung. Ordnung machen — «наводить порядок». Все существительные на -ung женского рода, и множественного числа у этого нет.'
      uk: 'Запам’ятовується через звичну фразу: Alles in Ordnung? — «Усе в порядку?», відповідь — Alles in Ordnung. Ordnung machen — «наводити порядок». Усі іменники на -ung жіночого роду, і множини в цього немає.'
  - de: Stock
    ipa: "ˈʃtɔk"
    pos: noun
    gender: m
    plural: die Stockwerke
    en: floor, storey (of a building)
    ru: этаж
    uk: поверх
    example_de: Ich wohne im dritten Stock.
    example_en: I live on the third floor.
    example_ru: Я живу на третьем этаже.
    example_uk: Я живу на третьому поверсі.
    note:
      en: 'Stock and Stockwerk mean exactly the same thing, but Stock is the one people actually say: Ich wohne im dritten Stock. Its plural is irregular — it borrows Stockwerke from the other word. Counting starts above the ground floor: das Erdgeschoss is at street level, and der erste Stock is the floor above it.'
      ru: 'Stock и Stockwerk — одно и то же, но в живой речи говорят Stock: Ich wohne im dritten Stock. Множественное число нерегулярное — оно заимствовано у второго слова: die Stockwerke. Счёт начинается выше уровня улицы: das Erdgeschoss — первый этаж по-русски, а der erste Stock — уже второй.'
      uk: 'Stock і Stockwerk — те саме, але в живому мовленні кажуть Stock: Ich wohne im dritten Stock. Множина нерегулярна — вона запозичена в другого слова: die Stockwerke. Відлік починається вище рівня вулиці: das Erdgeschoss — «перший поверх» українською, а der erste Stock — уже другий.'
  - de: Stockwerk
    ipa: "ˈʃtɔkˌvɛʁk"
    pos: noun
    gender: n
    plural: die Stockwerke
    en: floor, storey (of a building)
    ru: этаж (здания)
    uk: поверх (будівлі)
    example_de: Das Haus hat fünf Stockwerke.
    example_en: The house has five floors.
    example_ru: В доме пять этажей.
    example_uk: У домі п’ять поверхів.
    note:
      en: 'The neutral, slightly more formal word for a floor of a building — used above all when you count them: Das Haus hat fünf Stockwerke. To say which floor you are on, use der Stock: im dritten Stock. Compound of Stock + Werk, so it takes the gender of das Werk.'
      ru: 'Нейтральное, чуть более официальное слово для этажа — прежде всего когда этажи считают: Das Haus hat fünf Stockwerke. Чтобы сказать, на каком этаже вы живёте, используют der Stock: im dritten Stock. Сложное слово Stock + Werk, род от das Werk.'
      uk: 'Нейтральне, трохи офіційніше слово для поверху — насамперед коли поверхи рахують: Das Haus hat fünf Stockwerke. Щоб сказати, на якому поверсі ви живете, вживають der Stock: im dritten Stock. Складне слово Stock + Werk, рід від das Werk.'
  - de: Vermieterin
    ipa: "fɛɐ̯ˈmiːtəʁɪn"
    pos: noun
    gender: f
    plural: die Vermieterinnen
    en: landlady
    ru: хозяйка квартиры, арендодательница
    uk: господиня квартири, орендодавиця
    example_de: Unsere Vermieterin hat die Heizung schnell repariert.
    example_en: Our landlady repaired the heating quickly.
    example_ru: Наша хозяйка быстро починила отопление.
    example_uk: Наша господиня швидко полагодила опалення.
    note:
      en: 'The woman who owns the flat and rents it out (vermieten). The man is der Vermieter. The other party is the tenant — der Mieter, die Mieterin — who rents the flat (mieten). Two verbs, two people, one letter apart.'
      ru: 'Женщина, которой принадлежит квартира и которая её сдаёт (vermieten). Мужчина — der Vermieter. Противоположная сторона — жилец: der Mieter, die Mieterin, который квартиру снимает (mieten). Два глагола, два человека — и всего одна приставка разницы.'
      uk: 'Жінка, якій належить квартира і яка її здає (vermieten). Чоловік — der Vermieter. Протилежна сторона — мешканець: der Mieter, die Mieterin, який квартиру винаймає (mieten). Два дієслова, двоє людей — і лише один префікс різниці.'
  - de: Wäsche
    ipa: "ˈvɛʃə"
    pos: noun
    gender: f
    plural: "—"
    en: laundry, washing
    ru: бельё, стирка
    uk: білизна, прання
    example_de: Am Samstag wasche ich die Wäsche.
    example_en: On Saturday I do the laundry.
    example_ru: В субботу я стираю бельё.
    example_uk: У суботу я перу білизну.
    note:
      en: 'A mass noun with no plural — die Wäsche is all of it together, like the English laundry. The set phrase is Wäsche waschen; the machine is die Waschmaschine. Careful with the vowel: Wäsche has ä, waschen has a.'
      ru: 'Собирательное существительное без множественного числа — die Wäsche это бельё целиком, как русское «бельё». Устойчивое сочетание — Wäsche waschen; машина — die Waschmaschine. Следите за гласной: в Wäsche стоит ä, в waschen — a.'
      uk: 'Збірний іменник без множини — die Wäsche це білизна цілком, як українське «білизна». Стале сполучення — Wäsche waschen; машина — die Waschmaschine. Стежте за голосною: у Wäsche стоїть ä, у waschen — a.'
  - de: leer
    ipa: "ˈleːɐ̯"
    pos: adj
    en: empty
    ru: пустой
    uk: порожній
    example_de: Der Kühlschrank ist leer, wir müssen einkaufen.
    example_en: The fridge is empty; we need to go shopping.
    example_ru: Холодильник пустой, нужно сходить за покупками.
    example_uk: Холодильник порожній, треба сходити по покупки.
    note:
      en: 'The opposite of voll. The final -r is not a consonant here — it is a vowel-like ɐ̯, so leer sounds like leː-ɐ̯, one syllable. Do not confuse it with lernen or with the verb leeren (to empty something).'
      ru: 'Противоположность voll. Конечное -r здесь не согласный, а гласноподобный ɐ̯: leː-ɐ̯, один слог. Не путать с lernen и с глаголом leeren («опорожнять»).'
      uk: 'Протилежність voll. Кінцеве -r тут не приголосний, а голосоподібне ɐ̯: leː-ɐ̯, один склад. Не плутати з lernen і з дієсловом leeren («спорожняти»).'
  - de: voll
    ipa: "ˈfɔl"
    pos: adj
    en: full; crowded
    ru: полный; переполненный
    uk: повний; переповнений
    example_de: Der Bus ist am Morgen immer sehr voll.
    example_en: The bus is always very crowded in the morning.
    example_ru: Утром автобус всегда очень переполнен.
    example_uk: Уранці автобус завжди дуже переповнений.
    note:
      en: 'The opposite of leer. About a bus, a train or a room it means crowded rather than merely full. The v is spoken f — ˈfɔl, like in Vater.'
      ru: 'Противоположность leer. Об автобусе, поезде или зале означает «набитый, переполненный», а не просто «полный». Буква v читается как f — ˈfɔl, как в Vater.'
      uk: 'Протилежність leer. Про автобус, потяг чи зал означає «набитий, переповнений», а не просто «повний». Літера v читається як f — ˈfɔl, як у Vater.'
  - de: Glas
    ipa: "ˈglaːs"
    pos: noun
    gender: n
    plural: die Gläser
    en: glass (the material); a glass (to drink from)
    ru: стекло; стакан, бокал
    uk: скло; склянка, келих
    example_de: Ich trinke jeden Morgen ein Glas Wasser.
    example_en: I drink a glass of water every morning.
    example_ru: Каждое утро я выпиваю стакан воды.
    example_uk: Щоранку я випиваю склянку води.
    note:
      en: 'One word, two meanings: the material (die Flasche ist aus Glas) and the thing you drink from (ein Glas Wein). After a measure word German adds nothing — ein Glas Wasser, not a glass of water. The plural takes an umlaut: die Gläser.'
      ru: 'Одно слово, два значения: материал (die Flasche ist aus Glas) и посуда для питья (ein Glas Wein). После меры немецкий ничего не добавляет — ein Glas Wasser, без предлога и без родительного падежа. Во множественном числе появляется умлаут: die Gläser.'
      uk: 'Одне слово, два значення: матеріал (die Flasche ist aus Glas) і посуд для пиття (ein Glas Wein). Після міри німецька нічого не додає — ein Glas Wasser, без прийменника й без родового відмінка. У множині з’являється умлаут: die Gläser.'
  - de: Löffel
    ipa: "ˈlœfl̩"
    pos: noun
    gender: m
    plural: die Löffel
    en: spoon
    ru: ложка
    uk: ложка
    example_de: Für die Suppe brauche ich noch einen Löffel.
    example_en: I still need a spoon for the soup.
    example_ru: Для супа мне нужна ещё ложка.
    example_uk: Для супу мені потрібна ще ложка.
    note:
      en: 'Masculine, and the plural does not change: der Löffel, die Löffel. You eat with mit + Dat: Ich esse die Suppe mit dem Löffel.'
      ru: 'Мужского рода, множественное число не меняется: der Löffel, die Löffel. Едят «чем?» — через mit + Dat: Ich esse die Suppe mit dem Löffel.'
      uk: 'Чоловічого роду, множина не змінюється: der Löffel, die Löffel. Їдять «чим?» — через mit + Dat: Ich esse die Suppe mit dem Löffel.'
  - de: Messer
    ipa: "ˈmɛsɐ"
    pos: noun
    gender: n
    plural: die Messer
    en: knife
    ru: нож
    uk: ніж
    example_de: Vorsicht, das Messer ist sehr scharf!
    example_en: Careful, the knife is very sharp!
    example_ru: Осторожно, нож очень острый!
    example_uk: Обережно, ніж дуже гострий!
    note:
      en: 'Neuter — das Messer, although most -er nouns are masculine. The plural is unchanged: die Messer. At the table the knife lies to the right of the plate, the fork to the left.'
      ru: 'Среднего рода — das Messer, хотя большинство существительных на -er мужского рода. Множественное число не меняется: die Messer. На столе нож кладут справа от тарелки, вилку — слева.'
      uk: 'Середнього роду — das Messer, хоча більшість іменників на -er чоловічого роду. Множина не змінюється: die Messer. На столі ніж кладуть праворуч від тарілки, виделку — ліворуч.'
  - de: Gabel
    ipa: "ˈgaːbl̩"
    pos: noun
    gender: f
    plural: die Gabeln
    en: fork
    ru: вилка
    uk: виделка
    example_de: Die Gabel liegt links neben dem Teller.
    example_en: The fork is lying to the left of the plate.
    example_ru: Вилка лежит слева от тарелки.
    example_uk: Виделка лежить ліворуч від тарілки.
    note:
      en: 'Feminine: die Gabel, die Gabeln. The fixed pair for eating is Messer und Gabel, in that order. The -el is spoken as a syllabic l — ˈgaːbl̩, with no vowel of its own.'
      ru: 'Женского рода: die Gabel, die Gabeln. Устойчивая пара — Messer und Gabel, именно в таком порядке. Окончание -el звучит как слоговое l — ˈgaːbl̩, без отдельного гласного.'
      uk: 'Жіночого роду: die Gabel, die Gabeln. Стала пара — Messer und Gabel, саме в такому порядку. Закінчення -el звучить як складове l — ˈgaːbl̩, без окремого голосного.'
  - de: Teller
    ipa: "ˈtɛlɐ"
    pos: noun
    gender: m
    plural: die Teller
    en: plate
    ru: тарелка
    uk: тарілка
    example_de: Auf dem Teller liegt noch ein Stück Kuchen.
    example_en: There is still a piece of cake on the plate.
    example_ru: На тарелке лежит ещё кусок пирога.
    example_uk: На тарілці лежить ще шматок пирога.
    note:
      en: 'Masculine, plural unchanged: der Teller, die Teller. Three genders in one place setting — der Teller, die Tasse, das Glas — so learn each with its article.'
      ru: 'Мужского рода, множественное число не меняется: der Teller, die Teller. В одном наборе посуды три разных рода — der Teller, die Tasse, das Glas, поэтому учите каждое слово с артиклем.'
      uk: 'Чоловічого роду, множина не змінюється: der Teller, die Teller. В одному наборі посуду три різні роди — der Teller, die Tasse, das Glas, тому вчіть кожне слово з артиклем.'
  - de: Tasse
    ipa: "ˈtasə"
    pos: noun
    gender: f
    plural: die Tassen
    en: cup
    ru: чашка
    uk: чашка
    example_de: Möchtest du eine Tasse Kaffee?
    example_en: Would you like a cup of coffee?
    example_ru: Хочешь чашку кофе?
    example_uk: Хочеш чашку кави?
    note:
      en: 'For hot drinks — eine Tasse Kaffee, eine Tasse Tee. Cold drinks come in ein Glas. As with every measure word, nothing stands between it and the drink: eine Tasse Kaffee.'
      ru: 'Для горячих напитков — eine Tasse Kaffee, eine Tasse Tee. Холодные подают в ein Glas. Как и с любой мерой, между словами ничего не ставится: eine Tasse Kaffee.'
      uk: 'Для гарячих напоїв — eine Tasse Kaffee, eine Tasse Tee. Холодні подають у ein Glas. Як і з будь-якою мірою, між словами нічого не ставиться: eine Tasse Kaffee.'
  - de: Raum
    ipa: "ˈʁaʊ̯m"
    pos: noun
    gender: m
    plural: die Räume
    en: room (in a public building); space
    ru: помещение, аудитория; пространство
    uk: приміщення, аудиторія; простір
    example_de: Der Deutschkurs findet heute in Raum zwei statt.
    example_en: Today the German course is taking place in room two.
    example_ru: Сегодня курс немецкого проходит в аудитории номер два.
    example_uk: Сьогодні курс німецької проходить в аудиторії номер два.
    note:
      en: 'Raum is the room of a public building — a classroom, an office, a meeting room, usually with a number: in Raum 12. The room of a flat or a house is das Zimmer. Raum also means space in the abstract sense: Wir haben genug Raum. Plural with umlaut: die Räume.'
      ru: 'Raum — помещение в общественном здании: аудитория, кабинет, зал, обычно с номером: in Raum 12. Комната в квартире или доме — das Zimmer. Raum значит также «пространство» вообще: Wir haben genug Raum. Множественное с умлаутом: die Räume.'
      uk: 'Raum — приміщення в громадській будівлі: аудиторія, кабінет, зала, зазвичай із номером: in Raum 12. Кімната у квартирі чи домі — das Zimmer. Raum означає також «простір» узагалі: Wir haben genug Raum. Множина з умлаутом: die Räume.'
