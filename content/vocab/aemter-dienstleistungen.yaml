id: aemter-dienstleistungen
title_de: "Ämter & Dienstleistungen"
title_en: "Public offices & services"
title_ru: "Учреждения и услуги"
title_uk: "Установи та послуги"
level: A2
entries:
  # Deliberately thin (A2 recycles, it does not adopt): the words of the errand itself, plus the
  # five polite chunks the unit is about. The language of the *form* — Familienname, Geburtsort,
  # Staatsangehörigkeit — is receptive only and stays in the article table and the Lesetext: every
  # entry here becomes two cards, and nobody ever needs to *produce* a form heading from memory.
  # Formular and Ausweis are already cards in schule-arbeit, Post and Bank in stadt-wege, Rathaus in
  # reisen-urlaub, Termin in termine-zeit — they are used freely here but owned there.
  - de: "Amt"
    ipa: "ˈamt"
    pos: noun
    gender: n
    plural: "die Ämter"
    en: "public office; authority"
    ru: "государственное учреждение; ведомство"
    uk: "державна установа; відомство"
    example_de: "Am Montag gehe ich zum Amt."
    example_en: "On Monday I am going to the public office."
    example_ru: "В понедельник я иду в учреждение."
    example_uk: "У понеділок я йду до установи."
    note:
      en: "The everyday word for any public office. It shows up inside longer names as -amt: das Bürgeramt, das Finanzamt, das Jugendamt."
      ru: "Обиходное слово для любого государственного учреждения. Оно встречается и внутри длинных названий как -amt: das Bürgeramt, das Finanzamt, das Jugendamt."
      uk: "Побутове слово для будь-якої державної установи. Воно трапляється і всередині довгих назв як -amt: das Bürgeramt, das Finanzamt, das Jugendamt."

  - de: "Bürgeramt"
    ipa: "ˈbʏʁgɐˌʔamt"
    pos: noun
    gender: n
    plural: "die Bürgerämter"
    en: "citizens' office (local registration office)"
    ru: "бюргерамт (районное бюро регистрации жителей)"
    uk: "бюргерамт (районне бюро реєстрації мешканців)"
    example_de: "Das Bürgeramt hat am Donnerstag bis achtzehn Uhr geöffnet."
    example_en: "The citizens' office is open until six on Thursday."
    example_ru: "В четверг бюргерамт работает до восемнадцати часов."
    example_uk: "У четвер бюргерамт працює до вісімнадцятої години."
    note:
      en: "The office you go to for your address registration, your ID card and most certificates. In some cities it is called das Bürgerbüro or das Einwohnermeldeamt — the errand is the same."
      ru: "Именно сюда идут регистрировать адрес, получать удостоверение личности и большинство справок. В разных городах оно называется das Bürgerbüro или das Einwohnermeldeamt — дело от этого не меняется."
      uk: "Саме сюди йдуть реєструвати адресу, отримувати посвідчення особи і більшість довідок. У різних містах воно називається das Bürgerbüro або das Einwohnermeldeamt — справа від цього не змінюється."

  - de: "Anmeldung"
    ipa: "ˈanˌmɛldʊŋ"
    pos: noun
    gender: f
    plural: "die Anmeldungen"
    en: "registration (of your address); signing up"
    ru: "регистрация (по месту жительства); запись"
    uk: "реєстрація (за місцем проживання); запис"
    example_de: "Die Anmeldung dauert nur zehn Minuten."
    example_en: "The registration only takes ten minutes."
    example_ru: "Регистрация занимает всего десять минут."
    example_uk: "Реєстрація триває лише десять хвилин."
    note:
      en: "After a move you have two weeks for the Anmeldung of your new address. The same word also means the reception desk of a practice or a school."
      ru: "После переезда на Anmeldung нового адреса есть две недели. Этим же словом называют стойку регистратуры в поликлинике или секретариат в школе."
      uk: "Після переїзду на Anmeldung нової адреси є два тижні. Цим самим словом називають стійку реєстратури в поліклініці чи секретаріат у школі."

  - de: "anmelden"
    ipa: "ˈanˌmɛldn̩"
    pos: verb
    partizip2: "sich angemeldet"
    aux: haben
    praesens_3sg: "meldet sich an"
    valence: "sich + Akk"
    en: "to register (sich anmelden — to register oneself)"
    ru: "регистрировать (sich anmelden — регистрироваться)"
    uk: "реєструвати (sich anmelden — реєструватися)"
    example_de: "Ich möchte mich anmelden."
    example_en: "I would like to register."
    example_ru: "Я хочу зарегистрироваться."
    example_uk: "Я хочу зареєструватися."
    note:
      en: "Separable, so the prefix goes to the end: Ich melde mich am Montag an. After a modal it stays whole: Ich muss mich anmelden."
      ru: "Глагол отделяемый, поэтому приставка уходит в конец: Ich melde mich am Montag an. После модального глагола он остаётся целым: Ich muss mich anmelden."
      uk: "Дієслово відокремлюване, тому префікс іде в кінець: Ich melde mich am Montag an. Після модального дієслова воно залишається цілим: Ich muss mich anmelden."

  - de: "Antrag"
    ipa: "ˈantʁaːk"
    pos: noun
    gender: m
    plural: "die Anträge"
    en: "application (the document)"
    ru: "заявление, заявка (документ)"
    uk: "заява, заявка (документ)"
    example_de: "Der Antrag liegt am Schalter."
    example_en: "The application form is at the counter."
    example_ru: "Заявление лежит у окошка."
    example_uk: "Заява лежить біля віконця."
    note:
      en: "The paper you hand in. The verb that goes with it is stellen: einen Antrag stellen — to file an application."
      ru: "Это бумага, которую подают. Глагол при нём — stellen: einen Antrag stellen, «подать заявление»."
      uk: "Це папір, який подають. Дієслово при ньому — stellen: einen Antrag stellen, «подати заяву»."

  - de: "beantragen"
    ipa: "bəˈʔantʁaːgn̩"
    pos: verb
    partizip2: "beantragt"
    aux: haben
    praesens_3sg: "beantragt"
    valence: "+ Akk"
    en: "to apply for (something)"
    ru: "подавать заявление на (что-либо); ходатайствовать"
    uk: "подавати заяву на (щось); клопотати"
    example_de: "Ich möchte einen neuen Ausweis beantragen."
    example_en: "I would like to apply for a new ID card."
    example_ru: "Я хочу подать заявление на новое удостоверение."
    example_uk: "Я хочу подати заяву на нове посвідчення."
    note:
      en: "The prefix be- is inseparable: nothing splits off, and the Partizip II has no ge- — Ich habe den Ausweis beantragt."
      ru: "Приставка be- неотделяемая: ничего не отрывается, и Partizip II образуется без ge- — Ich habe den Ausweis beantragt."
      uk: "Префікс be- невідокремлюваний: нічого не відривається, і Partizip II утворюється без ge- — Ich habe den Ausweis beantragt."

  - de: "Unterlagen"
    ipa: "ˈʊntɐˌlaːgn̩"
    pos: phrase
    en: "documents; paperwork"
    ru: "документы; бумаги"
    uk: "документи; папери"
    example_de: "Welche Unterlagen brauche ich?"
    example_en: "Which documents do I need?"
    example_ru: "Какие документы мне нужны?"
    example_uk: "Які документи мені потрібні?"
    note:
      en: "Plural only — there is no singular in this meaning. The article is die, as it is for every plural: die Unterlagen, diese Unterlagen — and in the dative plural, mit den Unterlagen. It is the word an office uses for everything you have to bring."
      ru: "Слово только во множественном числе: единственного в этом значении нет. Артикль — die, как у любого множественного числа: die Unterlagen, diese Unterlagen, а в Dativ Plural — mit den Unterlagen. Так в учреждении называют всё, что нужно принести."
      uk: "Слово лише в множині: однини в цьому значенні немає. Артикль — die, як у будь-якої множини: die Unterlagen, diese Unterlagen, а в Dativ Plural — mit den Unterlagen. Так в установі називають усе, що потрібно принести."

  - de: "Bescheinigung"
    ipa: "bəˈʃaɪ̯nɪgʊŋ"
    pos: noun
    gender: f
    plural: "die Bescheinigungen"
    en: "certificate; official confirmation"
    ru: "справка; официальное подтверждение"
    uk: "довідка; офіційне підтвердження"
    example_de: "Ich hätte gern eine Bescheinigung für meinen Chef."
    example_en: "I would like a certificate for my employer."
    example_ru: "Мне нужна справка для начальника."
    example_uk: "Мені потрібна довідка для начальника."
    note:
      en: "A short piece of paper from an office confirming a fact. The one you get after registering your address is die Meldebescheinigung."
      ru: "Короткая бумага из учреждения, подтверждающая факт. Ту, что выдают после регистрации адреса, называют die Meldebescheinigung."
      uk: "Короткий папір з установи, що підтверджує факт. Той, який видають після реєстрації адреси, називають die Meldebescheinigung."

  - de: "Gebühr"
    ipa: "gəˈbyːɐ̯"
    pos: noun
    gender: f
    plural: "die Gebühren"
    en: "fee; charge"
    ru: "пошлина; сбор"
    uk: "мито; збір"
    example_de: "Die Gebühr bezahlen Sie am Schalter."
    example_en: "You pay the fee at the counter."
    example_ru: "Сбор вы оплачиваете у окошка."
    example_uk: "Збір ви сплачуєте біля віконця."
    note:
      en: "Money an office charges for a service, not a price in a shop. The verb that goes with it is bezahlen — and what a service costs is said with kosten: Die Bescheinigung kostet fünf Euro."
      ru: "Деньги, которые берёт учреждение за услугу, — не цена в магазине. Глагол при нём — bezahlen, а о стоимости услуги говорят через kosten: Die Bescheinigung kostet fünf Euro."
      uk: "Гроші, які бере установа за послугу, — не ціна в магазині. Дієслово при ньому — bezahlen, а про вартість послуги кажуть через kosten: Die Bescheinigung kostet fünf Euro."

  - de: "Kopie"
    ipa: "koˈpiː"
    pos: noun
    gender: f
    plural: "die Kopien"
    en: "copy; photocopy"
    ru: "копия"
    uk: "копія"
    example_de: "Bringen Sie bitte eine Kopie vom Ausweis mit."
    example_en: "Please bring a copy of your ID card."
    example_ru: "Пожалуйста, принесите копию удостоверения."
    example_uk: "Будь ласка, принесіть копію посвідчення."
    note:
      en: "A copy *of* something is eine Kopie von + Dativ: eine Kopie vom Vertrag, eine Kopie von der Rechnung."
      ru: "Копия чего-либо — eine Kopie von + Dativ: eine Kopie vom Vertrag, eine Kopie von der Rechnung."
      uk: "Копія чогось — eine Kopie von + Dativ: eine Kopie vom Vertrag, eine Kopie von der Rechnung."

  - de: "Unterschrift"
    ipa: "ˈʊntɐˌʃʁɪft"
    pos: noun
    gender: f
    plural: "die Unterschriften"
    en: "signature"
    ru: "подпись"
    uk: "підпис"
    example_de: "Unten auf dem Formular fehlt noch Ihre Unterschrift."
    example_en: "Your signature is still missing at the bottom of the form."
    example_ru: "Внизу на бланке не хватает вашей подписи."
    example_uk: "Унизу на бланку ще бракує вашого підпису."
    note:
      en: "The word is on every form, right next to Datum. What you do is unterschreiben."
      ru: "Это слово стоит на любом бланке рядом с Datum. Действие называется unterschreiben."
      uk: "Це слово стоїть на будь-якому бланку поряд із Datum. Дія називається unterschreiben."

  - de: "unterschreiben"
    ipa: "ʊntɐˈʃʁaɪ̯bn̩"
    pos: verb
    partizip2: "unterschrieben"
    aux: haben
    praesens_3sg: "unterschreibt"
    valence: "+ Akk"
    en: "to sign"
    ru: "подписывать"
    uk: "підписувати"
    example_de: "Bitte unterschreiben Sie hier."
    example_en: "Please sign here."
    example_ru: "Пожалуйста, подпишите здесь."
    example_uk: "Будь ласка, підпишіть тут."
    note:
      en: "Here unter- is inseparable — nothing splits off and there is no ge- in the Partizip II: Ich habe das Formular unterschrieben."
      ru: "Здесь приставка unter- неотделяемая: ничего не отрывается, а в Partizip II нет ge- — Ich habe das Formular unterschrieben."
      uk: "Тут префікс unter- невідокремлюваний: нічого не відривається, а в Partizip II немає ge- — Ich habe das Formular unterschrieben."

  - de: "ausfüllen"
    ipa: "ˈaʊ̯sˌfʏlən"
    pos: verb
    partizip2: "ausgefüllt"
    aux: haben
    praesens_3sg: "füllt aus"
    valence: "+ Akk"
    en: "to fill in (a form)"
    ru: "заполнять (бланк)"
    uk: "заповнювати (бланк)"
    example_de: "Ich fülle das Formular zu Hause aus."
    example_en: "I fill in the form at home."
    example_ru: "Бланк я заполняю дома."
    example_uk: "Бланк я заповнюю вдома."
    note:
      en: "Separable: the prefix aus- goes to the very end — Füllen Sie bitte das Formular aus! After a modal the verb stays whole: Sie müssen das Formular ausfüllen."
      ru: "Отделяемый: приставка aus- уходит в самый конец — Füllen Sie bitte das Formular aus! После модального глагола глагол остаётся целым: Sie müssen das Formular ausfüllen."
      uk: "Відокремлюваний: префікс aus- іде в самий кінець — Füllen Sie bitte das Formular aus! Після модального дієслова дієслово залишається цілим: Sie müssen das Formular ausfüllen."

  - de: "Könnten Sie mir bitte helfen?"
    pos: phrase
    en: "Could you help me, please?"
    ru: "Не могли бы вы мне помочь?"
    uk: "Чи не могли б ви мені допомогти?"
    example_de: "Guten Tag! Könnten Sie mir bitte helfen?"
    example_en: "Good afternoon! Could you help me, please?"
    example_ru: "Здравствуйте! Не могли бы вы мне помочь?"
    example_uk: "Доброго дня! Чи не могли б ви мені допомогти?"
    note:
      en: "The first sentence of any counter conversation. Learn it whole and swap only the last word: Könnten Sie mir bitte das Formular geben? — Könnten Sie mir bitte die Öffnungszeiten sagen?"
      ru: "Первая фраза любого разговора у окошка. Заучите её целиком и меняйте только конец: Könnten Sie mir bitte das Formular geben? — Könnten Sie mir bitte die Öffnungszeiten sagen?"
      uk: "Перша фраза будь-якої розмови біля віконця. Заучіть її цілком і міняйте лише кінець: Könnten Sie mir bitte das Formular geben? — Könnten Sie mir bitte die Öffnungszeiten sagen?"

  - de: "Ich hätte gern eine Bescheinigung."
    pos: phrase
    en: "I would like a certificate."
    ru: "Мне нужна справка. (вежливо: «я бы хотел(а) справку»)"
    uk: "Мені потрібна довідка. (ввічливо: «я хотів(ла) би довідку»)"
    example_de: "Guten Tag! Ich hätte gern eine Bescheinigung."
    example_en: "Good afternoon! I would like a certificate."
    example_ru: "Здравствуйте! Я бы хотел(а) получить справку."
    example_uk: "Доброго дня! Я хотів(ла) би отримати довідку."
    note:
      en: "Ich hätte gern … is followed by a noun in the accusative — never by a verb. It is the polite counterpart of Ich will …, and it works at every counter, from the office to the bakery."
      ru: "После Ich hätte gern … идёт существительное в Akkusativ — глагола там не бывает. Это вежливая замена Ich will …, и она работает у любого окошка — от учреждения до булочной."
      uk: "Після Ich hätte gern … іде іменник в Akkusativ — дієслова там не буває. Це ввічлива заміна Ich will …, і вона працює біля будь-якого віконця — від установи до пекарні."

  - de: "Ich würde gern einen Termin vereinbaren."
    pos: phrase
    en: "I would like to make an appointment."
    ru: "Я бы хотел(а) записаться на приём."
    uk: "Я хотів(ла) би записатися на прийом."
    example_de: "Guten Tag! Ich würde gern einen Termin vereinbaren."
    example_en: "Good afternoon! I would like to make an appointment."
    example_ru: "Здравствуйте! Я бы хотел(а) записаться на приём."
    example_uk: "Доброго дня! Я хотів(ла) би записатися на прийом."
    note:
      en: "Ich würde gern … is followed by an action, and the infinitive waits at the very end — exactly like a modal verb: Ich würde gern das Formular ausfüllen."
      ru: "После Ich würde gern … идёт действие, а инфинитив ждёт в самом конце — точно как при модальном глаголе: Ich würde gern das Formular ausfüllen."
      uk: "Після Ich würde gern … іде дія, а інфінітив чекає в самому кінці — точно як при модальному дієслові: Ich würde gern das Formular ausfüllen."

  - de: "Welche Unterlagen brauche ich?"
    pos: phrase
    en: "Which documents do I need?"
    ru: "Какие документы мне нужны?"
    uk: "Які документи мені потрібні?"
    example_de: "Ich möchte mich anmelden. Welche Unterlagen brauche ich?"
    example_en: "I would like to register. Which documents do I need?"
    example_ru: "Я хочу зарегистрироваться. Какие документы мне нужны?"
    example_uk: "Я хочу зареєструватися. Які документи мені потрібні?"
    note:
      en: "The question that saves you a second trip. Politer still as an indirect question: Können Sie mir sagen, welche Unterlagen ich brauche? — and then the verb goes to the end."
      ru: "Вопрос, который избавляет от второго похода. Ещё вежливее — косвенным вопросом: Können Sie mir sagen, welche Unterlagen ich brauche? — и тогда глагол уходит в конец."
      uk: "Питання, яке позбавляє від другого походу. Ще ввічливіше — непрямим питанням: Können Sie mir sagen, welche Unterlagen ich brauche? — і тоді дієслово йде в кінець."

  - de: "Im Anhang finden Sie das Formular."
    pos: phrase
    en: "You will find the form attached."
    ru: "Во вложении вы найдёте бланк."
    uk: "У долученні ви знайдете бланк."
    example_de: "Im Anhang finden Sie das Formular und eine Kopie vom Ausweis."
    example_en: "Attached you will find the form and a copy of my ID card."
    example_ru: "Во вложении вы найдёте бланк и копию удостоверения."
    example_uk: "У долученні ви знайдете бланк і копію посвідчення."
    note:
      en: "The standard line for an attachment in a formal e-mail. Im Anhang opens the sentence, so the verb finden stays in position 2 and Sie follows it."
      ru: "Стандартная фраза о вложении в официальном письме. Im Anhang стоит на первом месте, поэтому глагол finden остаётся на втором, а Sie идёт за ним."
      uk: "Стандартна фраза про долучення в офіційному листі. Im Anhang стоїть на першому місці, тому дієслово finden залишається на другому, а Sie іде за ним."
