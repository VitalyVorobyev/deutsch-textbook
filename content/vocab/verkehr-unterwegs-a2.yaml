# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the traffic/road
# words of reisen-verkehr-orte plus the two spoken abbreviations ICE and Lkw.
id: verkehr-unterwegs-a2
title_de: "Verkehr & unterwegs"
title_en: "Traffic & getting around"
title_ru: "Транспорт и в пути"
level: A2
entries:
  - de: ICE
    ipa: "iːtseːˈʔeː"
    pos: noun
    gender: m
    plural: die ICEs
    en: high-speed train (German intercity express)
    ru: скоростной поезд (немецкий экспресс)
    example_de: Ich fahre mit dem ICE nach Berlin.
    example_en: I am taking the high-speed train to Berlin.
    example_ru: Я еду в Берлин на скоростном поезде.
    note:
      en: 'Short for Intercity-Express, the fastest train in Germany. It is spoken letter by letter — I-C-E, iːtseːˈʔeː — never as a word. Masculine because der Zug is: Der ICE fährt um acht. You travel on it with mit + Dat: mit dem ICE.'
      ru: 'Сокращение от Intercity-Express — самый быстрый поезд в Германии. Читается по буквам: I-C-E, iːtseːˈʔeː, а не как слово. Мужского рода, потому что der Zug: Der ICE fährt um acht. Ехать на нём — mit + Dat: mit dem ICE.'
  - de: Lkw
    ipa: "ɛlkaːˈveː"
    pos: noun
    gender: m
    plural: die Lkws
    en: lorry, truck
    ru: грузовик
    example_de: Auf der Autobahn stehen viele Lkws im Stau.
    example_en: There are a lot of lorries stuck in the traffic jam on the motorway.
    example_ru: На автобане много грузовиков стоит в пробке.
    note:
      en: 'Short for Lastkraftwagen, and spoken letter by letter — L-K-W, ɛlkaːˈveː. Nobody says the long form out loud; the abbreviation is the everyday word. Masculine, from der Wagen: der Lkw. A car is a Pkw (Personenkraftwagen), by the same logic.'
      ru: 'Сокращение от Lastkraftwagen, читается по буквам: L-K-W, ɛlkaːˈveː. Полную форму вслух никто не произносит — обиходное слово именно сокращение. Мужского рода, от der Wagen: der Lkw. Легковая машина по той же логике — Pkw (Personenkraftwagen).'
  - de: Werkstatt
    ipa: "ˈvɛʁkˌʃtat"
    pos: noun
    gender: f
    plural: die Werkstätten
    en: garage, repair shop
    ru: автомастерская, мастерская
    example_de: Mein Auto ist seit Montag in der Werkstatt.
    example_en: My car has been at the garage since Monday.
    example_ru: Моя машина с понедельника в мастерской.
    note:
      en: 'The place where a car is repaired — not the place where it is parked (die Garage) and not the petrol station (die Tankstelle). Compound with die Statt, so feminine, and the plural takes an umlaut: die Werkstätten.'
      ru: 'Место, где чинят машину, — не гараж (die Garage) и не заправка (die Tankstelle). Сложное слово с die Statt, поэтому женского рода, во множественном умлаут: die Werkstätten.'
  - de: Schild
    ipa: "ˈʃɪlt"
    pos: noun
    gender: n
    plural: die Schilder
    en: sign (road sign, notice)
    ru: знак, табличка, указатель
    example_de: Das Schild an der Kreuzung zeigt nach links.
    example_en: The sign at the crossroads points to the left.
    example_ru: Знак на перекрёстке указывает налево.
    note:
      en: 'Careful with the gender: das Schild is the sign on the road or the door, and its plural is die Schilder. There is also a der Schild, but that is a shield — a different word entirely, and not the one you need in traffic.'
      ru: 'Осторожно с родом: das Schild — дорожный знак или табличка, множественное die Schilder. Есть и der Schild, но это «щит» — совсем другое слово, к дорожному движению отношения не имеет.'
  - de: Autobahn
    ipa: "ˈaʊ̯toˌbaːn"
    pos: noun
    gender: f
    plural: die Autobahnen
    en: motorway, highway
    ru: автомагистраль, автобан
    example_de: Auf der Autobahn darf man oft sehr schnell fahren.
    example_en: On the motorway you are often allowed to drive very fast.
    example_ru: На автомагистрали часто можно ехать очень быстро.
    note:
      en: 'Compound of Auto + die Bahn, so feminine. The preposition is auf: auf der Autobahn fahren (Wo?) and auf die Autobahn fahren (Wohin?).'
      ru: 'Сложное слово Auto + die Bahn, поэтому женского рода. Предлог — auf: auf der Autobahn fahren (Wo?) и auf die Autobahn fahren (Wohin?).'
  - de: Baustelle
    ipa: "ˈbaʊ̯ˌʃtɛlə"
    pos: noun
    gender: f
    plural: die Baustellen
    en: building site, roadworks
    ru: стройка; дорожные работы
    example_de: Wegen der Baustelle fahren die Autos hier sehr langsam.
    example_en: Because of the roadworks the cars are driving very slowly here.
    example_ru: Из-за дорожных работ машины едут здесь очень медленно.
    note:
      en: 'Compound of bauen + die Stelle, so feminine. In traffic reports it means roadworks; on a street it means a building site. Both are die Baustelle.'
      ru: 'Сложное слово bauen + die Stelle, поэтому женского рода. В сводках о движении — «дорожные работы», на улице — «стройка». И то и другое — die Baustelle.'
  - de: Brücke
    ipa: "ˈbʁʏkə"
    pos: noun
    gender: f
    plural: die Brücken
    en: bridge
    ru: мост
    example_de: Über die Brücke kommt man in fünf Minuten zum Bahnhof.
    example_en: The bridge gets you to the station in five minutes.
    example_ru: Через мост до вокзала пять минут.
    note:
      en: 'Feminine: die Brücke, die Brücken. Crossing one takes über + Akk (Wohin? — über die Brücke gehen); standing on one takes auf + Dat (Wo? — auf der Brücke stehen).'
      ru: 'Женского рода: die Brücke, die Brücken. «Через мост» — über + Akk (Wohin? — über die Brücke gehen); «на мосту» — auf + Dat (Wo? — auf der Brücke stehen).'
  - de: Rad
    ipa: "ˈʁaːt"
    pos: noun
    gender: n
    plural: die Räder
    en: wheel; bike (short for Fahrrad)
    ru: колесо; велосипед (разг.)
    example_de: Ich fahre jeden Tag mit dem Rad zur Arbeit.
    example_en: I cycle to work every day.
    example_ru: Я каждый день езжу на работу на велосипеде.
    note:
      en: 'One word, two meanings, both everyday: the wheel of a car (das Auto hat vier Räder) and the short form of das Fahrrad. Rad fahren (to cycle) is written as two words and takes no article: Ich fahre Rad. Neuter, umlaut plural: die Räder.'
      ru: 'Одно слово, два обиходных значения: колесо (das Auto hat vier Räder) и краткая форма от das Fahrrad. Rad fahren («ездить на велосипеде») пишется в два слова и без артикля: Ich fahre Rad. Среднего рода, во множественном умлаут: die Räder.'
  - de: Kreuzung
    ipa: "ˈkʁɔʏ̯tsʊŋ"
    pos: noun
    gender: f
    plural: die Kreuzungen
    en: crossroads, junction
    ru: перекрёсток
    example_de: An der nächsten Kreuzung müssen Sie rechts abbiegen.
    example_en: You have to turn right at the next junction.
    example_ru: На следующем перекрёстке вам нужно повернуть направо.
    note:
      en: 'From kreuzen (to cross) plus -ung, so feminine like every -ung noun. Directions use an + Dat: an der Kreuzung.'
      ru: 'От kreuzen («пересекать») + -ung, поэтому женского рода, как все слова на -ung. В указаниях дороги — an + Dat: an der Kreuzung.'
  - de: Motor
    ipa: "ˈmoːtoːɐ̯"
    pos: noun
    gender: m
    plural: die Motoren
    en: engine, motor
    ru: двигатель, мотор
    example_de: Der Motor macht ein komisches Geräusch.
    example_en: The engine is making a strange noise.
    example_ru: Двигатель издаёт странный звук.
    note:
      en: 'The stress moves in the plural: singular ˈmoːtoːɐ̯ (on the first syllable), plural moˈtoːʁən (on the second). Masculine: der Motor, die Motoren.'
      ru: 'В множественном числе ударение смещается: единственное ˈmoːtoːɐ̯ (на первый слог), множественное moˈtoːʁən (на второй). Мужского рода: der Motor, die Motoren.'
  - de: Motorroller
    ipa: "ˈmoːtoːɐ̯ˌʁɔlɐ"
    pos: noun
    gender: m
    plural: die Motorroller
    en: scooter (motor scooter)
    ru: мотороллер, скутер
    example_de: Mit dem Motorroller bin ich in der Stadt schneller als mit dem Auto.
    example_en: On a scooter I am faster in town than in a car.
    example_ru: На скутере по городу я быстрее, чем на машине.
    note:
      en: 'Compound of Motor + der Roller, so masculine, and the plural does not change: der Motorroller, die Motorroller. A der Roller on its own is the kick scooter children push along.'
      ru: 'Сложное слово Motor + der Roller, отсюда мужской род, множественное не меняется: der Motorroller, die Motorroller. Просто der Roller — детский самокат.'
  - de: Unfall
    ipa: "ˈʊnˌfal"
    pos: noun
    gender: m
    plural: die Unfälle
    en: accident, crash
    ru: авария, несчастный случай
    example_de: Auf der Autobahn hat es heute Morgen einen Unfall gegeben.
    example_en: There was an accident on the motorway this morning.
    example_ru: Сегодня утром на автомагистрали произошла авария.
    note:
      en: 'Masculine, umlaut plural: der Unfall, die Unfälle. The usual verbs are einen Unfall haben and es gibt einen Unfall. To have an accident is not passieren — passieren is what the accident itself does: Der Unfall ist gestern passiert.'
      ru: 'Мужского рода, во множественном умлаут: der Unfall, die Unfälle. Обычные обороты — einen Unfall haben и es gibt einen Unfall. Глагол passieren относится к самой аварии, а не к человеку: Der Unfall ist gestern passiert.'
  - de: Verkehr
    ipa: "fɛɐ̯ˈkeːɐ̯"
    pos: noun
    gender: m
    plural: "—"
    en: traffic
    ru: движение (транспортное), трафик
    example_de: Am Morgen ist der Verkehr in der Stadt sehr stark.
    example_en: The traffic in town is very heavy in the morning.
    example_ru: Утром движение в городе очень плотное.
    note:
      en: 'Masculine and singular only — there is no plural, exactly as in English. German says the traffic is strong, not heavy: Der Verkehr ist stark. The prefix ver- is unstressed: fɛɐ̯ˈkeːɐ̯.'
      ru: 'Мужского рода и только в единственном числе — множественного нет. По-немецки движение «сильное», а не «плотное»: Der Verkehr ist stark. Приставка ver- безударная: fɛɐ̯ˈkeːɐ̯.'
  - de: Nähe
    ipa: "ˈnɛːə"
    pos: noun
    gender: f
    plural: "—"
    en: nearness, vicinity
    ru: близость, окрестность
    example_de: Gibt es hier in der Nähe eine Apotheke?
    example_en: Is there a chemist's nearby?
    example_ru: Здесь поблизости есть аптека?
    note:
      en: 'You will almost only meet it inside the fixed phrase in der Nähe — nearby, close by. To name what it is close to, add von + Dat: in der Nähe von der Schule. It has no plural.'
      ru: 'Практически всегда встречается в устойчивом обороте in der Nähe — «поблизости, рядом». Чтобы сказать, рядом с чем, добавьте von + Dat: in der Nähe von der Schule. Множественного числа нет.'
  - de: Reifen
    ipa: "ˈʁaɪ̯fn̩"
    pos: noun
    gender: m
    plural: die Reifen
    en: tyre
    ru: шина, покрышка
    example_de: Der linke Reifen ist kaputt, ich muss in die Werkstatt.
    example_en: The left tyre is flat; I have to go to the garage.
    example_ru: Левая шина спущена, мне нужно в мастерскую.
    note:
      en: 'The rubber tyre, as opposed to das Rad, the whole wheel. Masculine, and the plural does not change: der Reifen, die Reifen.'
      ru: 'Резиновая шина — в отличие от das Rad, колеса целиком. Мужского рода, множественное не меняется: der Reifen, die Reifen.'
  - de: abfliegen
    ipa: "ˈapˌfliːgn̩"
    pos: verb
    praesens_3sg: fliegt ab
    partizip2: abgeflogen
    aux: sein
    en: to take off, to depart (by plane)
    ru: вылетать, отправляться (о самолёте)
    example_de: Unser Flugzeug fliegt um sieben Uhr ab.
    example_en: Our plane takes off at seven o'clock.
    example_ru: Наш самолёт вылетает в семь часов.
    note:
      en: 'Separable ab-: the prefix goes to the end (Das Flugzeug fliegt ab) and -ge- lands inside the participle. The Perfekt takes sein, because taking off is movement from A to B: Wir sind um sieben abgeflogen. The opposite is ankommen or landen.'
      ru: 'Отделяемая приставка ab-: она уходит в конец (Das Flugzeug fliegt ab), а -ge- встаёт внутрь причастия. Перфект с sein, потому что вылет — движение из точки А в точку Б: Wir sind um sieben abgeflogen. Противоположность — ankommen или landen.'
  - de: parken
    ipa: "ˈpaʁkn̩"
    pos: verb
    praesens_3sg: parkt
    partizip2: geparkt
    aux: haben
    en: to park
    ru: парковаться, ставить машину
    example_de: Vor dem Haus kann man leider nicht parken.
    example_en: Unfortunately you cannot park in front of the house.
    example_ru: Перед домом, к сожалению, парковаться нельзя.
    note:
      en: 'A regular verb with haben, even though a car moves: Ich habe dort geparkt. It usually stands without an object — Hier darf man nicht parken. The place to do it is der Parkplatz.'
      ru: 'Правильный глагол с haben, хотя машина и движется: Ich habe dort geparkt. Обычно без дополнения — Hier darf man nicht parken. Место для этого — der Parkplatz.'
