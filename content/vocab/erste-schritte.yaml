id: erste-schritte
title_de: "Erste Schritte"
title_en: "First steps"
title_ru: "Первые шаги"
level: A1
entries:
  - { de: "Name", ipa: "ˈnaːmə", pos: noun, gender: m, plural: "die Namen", en: "name", ru: "имя", example_de: "Mein Name ist Karim.", example_en: "My name is Karim.", example_ru: "Меня зовут Карим." }
  - { de: "Vorname", ipa: "ˈfoːɐ̯ˌnaːmə", pos: noun, gender: m, plural: "die Vornamen", en: "first name", ru: "имя", example_de: "Mein Vorname ist Olga.", example_en: "My first name is Olga.", example_ru: "Меня зовут Ольга." }
  - { de: "Nachname", ipa: "ˈnaːxˌnaːmə", pos: noun, gender: m, plural: "die Nachnamen", en: "surname", ru: "фамилия", example_de: "Mein Nachname ist Nowak.", example_en: "My surname is Nowak.", example_ru: "Моя фамилия Новак." }
  - { de: "Adresse", ipa: "aˈdʁɛsə", pos: noun, gender: f, plural: "die Adressen", en: "address", ru: "адрес", example_de: "Wie ist Ihre Adresse?", example_en: "What is your address?", example_ru: "Какой у вас адрес?" }
  - { de: "Telefonnummer", ipa: "teleˈfoːnˌnʊmɐ", pos: noun, gender: f, plural: "die Telefonnummern", en: "telephone number", ru: "номер телефона", example_de: "Meine Telefonnummer ist null eins sieben sechs.", example_en: "My telephone number is zero one seven six.", example_ru: "Мой номер телефона: ноль один семь шесть." }
  - { de: "Land", ipa: "ˈlant", pos: noun, gender: n, plural: "die Länder", en: "country", ru: "страна", example_de: "Deutschland ist ein Land.", example_en: "Germany is a country.", example_ru: "Германия — страна." }
  - { de: "Sprache", ipa: "ˈʃpʁaːxə", pos: noun, gender: f, plural: "die Sprachen", en: "language", ru: "язык", example_de: "Deutsch ist eine Sprache.", example_en: "German is a language.", example_ru: "Немецкий — это язык." }
  - { de: "Zahl", ipa: "ˈtsaːl", pos: noun, gender: f, plural: "die Zahlen", en: "number", ru: "число", example_de: "Sieben ist eine Zahl.", example_en: "Seven is a number.", example_ru: "Семь — это число." }
  - { de: "Buchstabe", ipa: "ˈbuːxˌʃtaːbə", pos: noun, gender: m, plural: "die Buchstaben", en: "letter", ru: "буква", example_de: "A ist ein Buchstabe.", example_en: "A is a letter.", example_ru: "A — это буква." }
  - { de: "heißen", ipa: "ˈhaɪ̯sn̩", pos: verb, en: "to be called", ru: "называться", example_de: "Ich heiße Lena.", example_en: "My name is Lena.", example_ru: "Меня зовут Лена.", partizip2: "geheißen", aux: haben, praesens_3sg: "heißt" }
  - { de: "kommen", ipa: "ˈkɔmən", pos: verb, en: "to come", ru: "приходить; быть родом", example_de: "Ich komme aus Polen.", example_en: "I come from Poland.", example_ru: "Я из Польши.", partizip2: "gekommen", aux: sein, praesens_3sg: "kommt", valence: "aus + Dat" }
  - { de: "wohnen", ipa: "ˈvoːnən", pos: verb, en: "to live", ru: "жить", example_de: "Wir wohnen in Köln.", example_en: "We live in Cologne.", example_ru: "Мы живём в Кёльне.", partizip2: "gewohnt", aux: haben, praesens_3sg: "wohnt" }
  - { de: "sprechen", ipa: "ˈʃpʁɛçn̩", pos: verb, en: "to speak", ru: "говорить", example_de: "Sie spricht Deutsch.", example_en: "She speaks German.", example_ru: "Она говорит по-немецки.", partizip2: "gesprochen", aux: haben, praesens_3sg: "spricht" }
  - { de: "buchstabieren", ipa: "buːxʃtaˈbiːʁən", pos: verb, en: "to spell", ru: "произносить по буквам", example_de: "Bitte buchstabieren Sie den Namen.", example_en: "Please spell the name.", example_ru: "Продиктуйте имя по буквам.", partizip2: "buchstabiert", aux: haben, praesens_3sg: "buchstabiert" }
  - { de: "null", ipa: "ˈnʊl", pos: num, en: "zero", ru: "ноль", example_de: "Die erste Zahl ist null.", example_en: "The first number is zero.", example_ru: "Первая цифра — ноль." }
  - { de: "eins", ipa: "ˈaɪ̯ns", pos: num, en: "one", ru: "один", example_de: "Eins plus eins ist zwei.", example_en: "One plus one is two.", example_ru: "Один плюс один — два." }
  - { de: "zwei", ipa: "ˈtsvaɪ̯", pos: num, en: "two", ru: "два", example_de: "Ich habe zwei Fragen.", example_en: "I have two questions.", example_ru: "У меня два вопроса." }
  - { de: "fünf", ipa: "ˈfʏnf", pos: num, en: "five", ru: "пять", example_de: "Der Kurs beginnt um fünf.", example_en: "The course begins at five.", example_ru: "Курс начинается в пять." }
  - { de: "zehn", ipa: "ˈtseːn", pos: num, en: "ten", ru: "десять", example_de: "Wir lernen zehn Wörter.", example_en: "We are learning ten words.", example_ru: "Мы учим десять слов." }
  - { de: "Guten Tag!", pos: phrase, en: "Hello!", ru: "Добрый день!", ipa: "ˈguːtn̩ ˈtaːk", example_de: "Guten Tag, Frau Klein!", example_en: "Hello, Ms Klein!", example_ru: "Добрый день, госпожа Кляйн!" }
  - { de: "Familienname", ipa: "faˈmiːliənˌnaːmə", pos: noun, gender: m, plural: "die Familiennamen", en: "family name, surname", ru: "фамилия", example_de: "Ihr Familienname steht im Pass.", example_en: "Her surname is in the passport.", example_ru: "Её фамилия указана в паспорте." }
  - { de: "leben", ipa: "ˈleːbn̩", pos: verb, en: "to live (be alive; reside)", ru: "жить (быть живым; проживать)", example_de: "Meine Großmutter lebt noch.", example_en: "My grandmother is still alive.", example_ru: "Моя бабушка ещё жива.", partizip2: "gelebt", aux: haben, praesens_3sg: "lebt" }
  - { de: "Deutsch", ipa: "ˈdɔʏ̯tʃ", pos: noun, gender: n, plural: "—", en: "German (the language)", ru: "немецкий язык", example_de: "Ich lerne Deutsch.", example_en: "I am learning German.", example_ru: "Я учу немецкий язык." }
  - { de: "Englisch", ipa: "ˈɛŋlɪʃ", pos: noun, gender: n, plural: "—", en: "English (the language)", ru: "английский язык", example_de: "Er lernt auch Englisch.", example_en: "He is also learning English.", example_ru: "Он тоже учит английский язык." }
