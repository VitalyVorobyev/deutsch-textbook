id: erste-schritte
title_de: "Erste Schritte"
title_en: "First steps"
title_ru: "Первые шаги"
title_uk: "Перші кроки"
level: A1
entries:
  - { de: "Name", ipa: "ˈnaːmə", pos: noun, gender: m, plural: "die Namen", en: "name", ru: "имя", uk: "ім'я", example_de: "Mein Name ist Karim.", example_en: "My name is Karim.", example_ru: "Меня зовут Карим.", example_uk: "Мене звати Карім." }
  - { de: "Vorname", ipa: "ˈfoːɐ̯ˌnaːmə", pos: noun, gender: m, plural: "die Vornamen", en: "first name", ru: "имя", uk: "ім'я", example_de: "Mein Vorname ist Olga.", example_en: "My first name is Olga.", example_ru: "Моё имя — Ольга.", example_uk: "Моє ім'я — Ольга." }
  - { de: "Nachname", ipa: "ˈnaːxˌnaːmə", pos: noun, gender: m, plural: "die Nachnamen", en: "surname", ru: "фамилия", uk: "прізвище", example_de: "Mein Nachname ist Nowak.", example_en: "My surname is Nowak.", example_ru: "Моя фамилия Новак.", example_uk: "Моє прізвище — Новак." }
  - { de: "Adresse", ipa: "aˈdʁɛsə", pos: noun, gender: f, plural: "die Adressen", en: "address", ru: "адрес", uk: "адреса", example_de: "Wie ist Ihre Adresse?", example_en: "What is your address?", example_ru: "Какой у вас адрес?", example_uk: "Яка у вас адреса?" }
  - { de: "Telefonnummer", ipa: "teleˈfoːnˌnʊmɐ", pos: noun, gender: f, plural: "die Telefonnummern", en: "telephone number", ru: "номер телефона", uk: "номер телефону", example_de: "Meine Telefonnummer ist null eins sieben sechs.", example_en: "My telephone number is zero one seven six.", example_ru: "Мой номер телефона: ноль один семь шесть.", example_uk: "Мій номер телефону: нуль один сім шість." }
  - { de: "Land", ipa: "ˈlant", pos: noun, gender: n, plural: "die Länder", en: "country", ru: "страна", uk: "країна", example_de: "Deutschland ist ein Land.", example_en: "Germany is a country.", example_ru: "Германия — страна.", example_uk: "Німеччина — країна." }
  - { de: "Sprache", ipa: "ˈʃpʁaːxə", pos: noun, gender: f, plural: "die Sprachen", en: "language", ru: "язык", uk: "мова", example_de: "Deutsch ist eine Sprache.", example_en: "German is a language.", example_ru: "Немецкий — это язык.", example_uk: "Німецька — це мова." }
  - { de: "Zahl", ipa: "ˈtsaːl", pos: noun, gender: f, plural: "die Zahlen", en: "number", ru: "число", uk: "число", example_de: "Sieben ist eine Zahl.", example_en: "Seven is a number.", example_ru: "Семь — это число.", example_uk: "Сім — це число." }
  - { de: "Buchstabe", ipa: "ˈbuːxˌʃtaːbə", pos: noun, gender: m, plural: "die Buchstaben", en: "letter", ru: "буква", uk: "літера", example_de: "A ist ein Buchstabe.", example_en: "A is a letter.", example_ru: "A — это буква.", example_uk: "A — це літера." }
  - { de: "heißen", ipa: "ˈhaɪ̯sn̩", pos: verb, en: "to be called", ru: "называться", uk: "зватися, називатися", example_de: "Ich heiße Lena.", example_en: "My name is Lena.", example_ru: "Меня зовут Лена.", example_uk: "Мене звати Лена.", partizip2: "geheißen", aux: haben, praesens_3sg: "heißt" }
  - { de: "kommen", ipa: "ˈkɔmən", pos: verb, en: "to come", ru: "приходить; быть родом", uk: "приходити; бути родом", example_de: "Ich komme aus Polen.", example_en: "I come from Poland.", example_ru: "Я из Польши.", example_uk: "Я з Польщі.", partizip2: "gekommen", aux: sein, praesens_3sg: "kommt", valence: "aus + Dat" }
  - { de: "wohnen", ipa: "ˈvoːnən", pos: verb, en: "to live, to reside (in a home or place)", ru: "жить, проживать (где-либо)", uk: "жити, мешкати (десь)", example_de: "Wir wohnen in Köln.", example_en: "We live in Cologne.", example_ru: "Мы живём в Кёльне.", example_uk: "Ми живемо в Кельні.", partizip2: "gewohnt", aux: haben, praesens_3sg: "wohnt", note: { en: "Use wohnen for residence, housing, and address: Wo wohnst du? Leben is broader: to be alive or to live one's life.", ru: "Wohnen означает проживать где-либо и употребляется при вопросах о жилье и адресе: Wo wohnst du? Leben шире: быть живым или жить своей жизнью.", uk: "Wohnen означає мешкати десь і вживається, коли йдеться про житло чи адресу: Wo wohnst du? Leben ширше: бути живим або жити своїм життям." } }
  - { de: "sprechen", ipa: "ˈʃpʁɛçn̩", pos: verb, en: "to speak", ru: "говорить", uk: "говорити, розмовляти", example_de: "Sie spricht Deutsch.", example_en: "She speaks German.", example_ru: "Она говорит по-немецки.", example_uk: "Вона розмовляє німецькою.", partizip2: "gesprochen", aux: haben, praesens_3sg: "spricht" }
  - { de: "buchstabieren", ipa: "buːxʃtaˈbiːʁən", pos: verb, en: "to spell", ru: "произносить по буквам", uk: "диктувати по літерах", example_de: "Bitte buchstabieren Sie den Namen.", example_en: "Please spell the name.", example_ru: "Продиктуйте имя по буквам.", example_uk: "Продиктуйте ім'я по літерах.", partizip2: "buchstabiert", aux: haben, praesens_3sg: "buchstabiert" }
  - { de: "null", ipa: "ˈnʊl", pos: num, en: "zero", ru: "ноль", uk: "нуль", example_de: "Die erste Zahl ist null.", example_en: "The first number is zero.", example_ru: "Первая цифра — ноль.", example_uk: "Перша цифра — нуль." }
  - { de: "eins", ipa: "ˈaɪ̯ns", pos: num, en: "one", ru: "один", uk: "один", example_de: "Eins plus eins ist zwei.", example_en: "One plus one is two.", example_ru: "Один плюс один — два.", example_uk: "Один плюс один — два." }
  - { de: "zwei", ipa: "ˈtsvaɪ̯", pos: num, en: "two", ru: "два", uk: "два", example_de: "Ich habe zwei Fragen.", example_en: "I have two questions.", example_ru: "У меня два вопроса.", example_uk: "У мене два запитання." }
  - { de: "fünf", ipa: "ˈfʏnf", pos: num, en: "five", ru: "пять", uk: "п'ять", example_de: "Der Kurs beginnt um fünf.", example_en: "The course begins at five.", example_ru: "Курс начинается в пять.", example_uk: "Курс починається о п'ятій." }
  - { de: "zehn", ipa: "ˈtseːn", pos: num, en: "ten", ru: "десять", uk: "десять", example_de: "Wir lernen zehn Wörter.", example_en: "We are learning ten words.", example_ru: "Мы учим десять слов.", example_uk: "Ми вчимо десять слів." }
  - { de: "Guten Tag!", pos: phrase, en: "Hello!", ru: "Добрый день!", uk: "Добрий день!", ipa: "ˈguːtn̩ ˈtaːk", example_de: "Guten Tag, Frau Klein!", example_en: "Hello, Ms Klein!", example_ru: "Добрый день, госпожа Кляйн!", example_uk: "Добрий день, пані Кляйн!" }
  - { de: "Familienname", ipa: "faˈmiːliənˌnaːmə", pos: noun, gender: m, plural: "die Familiennamen", en: "family name, surname", ru: "фамилия", uk: "прізвище", example_de: "Ihr Familienname steht im Pass.", example_en: "Her surname is in the passport.", example_ru: "Её фамилия указана в паспорте.", example_uk: "Її прізвище зазначено в паспорті." }
  - { de: "leben", ipa: "ˈleːbn̩", pos: verb, en: "to be alive; to live one's life", ru: "быть живым; жить своей жизнью", uk: "бути живим; жити своїм життям", example_de: "Meine Großmutter lebt noch.", example_en: "My grandmother is still alive.", example_ru: "Моя бабушка ещё жива.", example_uk: "Моя бабуся ще жива.", partizip2: "gelebt", aux: haben, praesens_3sg: "lebt", note: { en: "Ich lebe in Berlin is possible, but broader than residence alone. For one's home or address, German normally asks Wo wohnst du?", ru: "Ich lebe in Berlin возможно, но значение шире, чем место проживания. О жилье или адресе обычно спрашивают Wo wohnst du?", uk: "Ich lebe in Berlin можливе, але значення ширше, ніж просто місце проживання. Про житло чи адресу зазвичай питають Wo wohnst du?" } }
  - { de: "Deutsch", ipa: "ˈdɔʏ̯tʃ", pos: noun, gender: n, plural: "—", en: "German (the language)", ru: "немецкий язык", uk: "німецька мова", example_de: "Ich lerne Deutsch.", example_en: "I am learning German.", example_ru: "Я учу немецкий язык.", example_uk: "Я вчу німецьку мову." }
  - { de: "Englisch", ipa: "ˈɛŋlɪʃ", pos: noun, gender: n, plural: "—", en: "English (the language)", ru: "английский язык", uk: "англійська мова", example_de: "Er lernt auch Englisch.", example_en: "He is also learning English.", example_ru: "Он тоже учит английский язык.", example_uk: "Він теж вчить англійську мову." }
