# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the first half of the
# alltag-handlungen manifest section (verbs A–H).
id: verben-handlungen-a2-1
title_de: "Handlungen & Verben (1)"
title_en: "Actions & verbs (1)"
title_ru: "Действия и глаголы (1)"
level: A2
entries:
  - de: benutzen
    ipa: "bəˈnʊtsn̩"
    pos: verb
    praesens_3sg: benutzt
    partizip2: benutzt
    aux: haben
    valence: "+ Akk"
    en: to use
    ru: пользоваться, использовать
    example_de: In der Stadt benutze ich fast immer das Fahrrad.
    example_en: In town I almost always use my bike.
    example_ru: В городе я почти всегда пользуюсь велосипедом.
    note:
      en: 'Inseparable be- prefix — Partizip II without ge-: hat benutzt. The thing used is a plain accusative object: Ich benutze den Computer.'
      ru: 'Неотделяемая приставка be- — Partizip II без ge-: hat benutzt. Ловушка: по-русски «пользоваться чем?» (творительный), а по-немецки — Akkusativ: Ich benutze den Computer.'
  - de: berichten
    ipa: "bəˈʁɪçtn̩"
    pos: verb
    praesens_3sg: berichtet
    partizip2: berichtet
    aux: haben
    valence: "über + Akk"
    en: to report
    ru: сообщать, рассказывать (о событиях)
    example_de: Die Zeitung berichtet über den Unfall.
    example_en: The newspaper is reporting on the accident.
    example_ru: Газета сообщает об аварии.
    note:
      en: 'berichten über + Akk is the neutral, factual "report" (news, work, an event). erzählen is the warmer "tell a story".'
      ru: 'berichten über + Akk — нейтральное «сообщать, докладывать» (новости, работа, событие). erzählen — «рассказывать» историю.'
  - de: diskutieren
    ipa: "dɪskuˈtiːʁən"
    pos: verb
    praesens_3sg: diskutiert
    partizip2: diskutiert
    aux: haben
    valence: "über + Akk"
    en: to discuss, to debate
    ru: обсуждать, спорить
    example_de: Wir haben lange über die neuen Regeln diskutiert.
    example_en: We discussed the new rules for a long time.
    example_ru: Мы долго обсуждали новые правила.
    note:
      en: '-ieren verb — Partizip II without ge-: hat diskutiert. The topic comes with über + Akk: über den Preis diskutieren.'
      ru: 'Глагол на -ieren — Partizip II без ge-: hat diskutiert. Тема разговора вводится через über + Akk: über den Preis diskutieren.'
  - de: erzählen
    ipa: "ɛɐ̯ˈtsɛːlən"
    pos: verb
    praesens_3sg: erzählt
    partizip2: erzählt
    aux: haben
    valence: "+ Dat"
    en: to tell (a story)
    ru: рассказывать
    example_de: Meine Oma hat mir gestern eine lustige Geschichte erzählt.
    example_en: My grandma told me a funny story yesterday.
    example_ru: Вчера бабушка рассказала мне смешную историю.
    note:
      en: 'Two objects: the listener is dative, the story accusative — Ich erzähle dir einen Witz. Inseparable er- → hat erzählt, no ge-.'
      ru: 'Два дополнения: слушатель — Dativ, история — Akkusativ: Ich erzähle dir einen Witz. Неотделяемая приставка er- → hat erzählt, без ge-.'
  - de: abgeben
    ipa: "ˈapˌgeːbn̩"
    pos: verb
    praesens_3sg: gibt ab
    partizip2: abgegeben
    aux: haben
    valence: "+ Akk"
    en: to hand in, to drop off
    ru: сдавать, отдавать
    example_de: Du musst das Formular bis Freitag im Büro abgeben.
    example_en: You have to hand the form in at the office by Friday.
    example_ru: Ты должен сдать формуляр в офис до пятницы.
    note:
      en: 'Separable ab- + stem change: er gibt ab. The ab- adds "away from you" — you give the thing and it is gone: den Schlüssel abgeben.'
      ru: 'Отделяемая приставка ab- + чередование гласной: er gibt ab. Приставка добавляет «от себя»: den Schlüssel abgeben — сдать ключ.'
  - de: abschließen
    ipa: "ˈapˌʃliːsn̩"
    pos: verb
    praesens_3sg: schließt ab
    partizip2: abgeschlossen
    aux: haben
    valence: "+ Akk"
    en: to lock; to finish, to complete
    ru: запирать (на ключ); завершать
    example_de: Bitte schließen Sie die Tür ab, wenn Sie gehen.
    example_en: Please lock the door when you leave.
    example_ru: Пожалуйста, заприте дверь на ключ, когда будете уходить.
    note:
      en: 'abschließen = to lock with a key; zumachen only means to close. Second sense: to complete something — Sie hat ihr Studium abgeschlossen.'
      ru: 'abschließen — запереть на ключ; zumachen — просто закрыть. Второе значение — «завершить»: Sie hat ihr Studium abgeschlossen.'
  - de: anbieten
    ipa: "ˈanˌbiːtn̩"
    pos: verb
    praesens_3sg: bietet an
    partizip2: angeboten
    aux: haben
    valence: "+ Dat"
    en: to offer
    ru: предлагать
    example_de: Darf ich Ihnen einen Kaffee anbieten?
    example_en: May I offer you a coffee?
    example_ru: Могу я предложить вам кофе?
    note:
      en: 'Two objects: the person is dative, the thing accusative — jemandem etwas anbieten. So Ihnen, never Sie: Darf ich Ihnen helfen? follows the same pattern.'
      ru: 'Два дополнения: человек — Dativ, предмет — Akkusativ: jemandem etwas anbieten. Поэтому Ihnen, а не Sie.'
  - de: ändern
    ipa: "ˈɛndɐn"
    pos: verb
    praesens_3sg: ändert
    partizip2: geändert
    aux: haben
    valence: "+ Akk"
    en: to change, to alter
    ru: менять, изменять
    example_de: Wir müssen unsere Pläne ändern.
    example_en: We have to change our plans.
    example_ru: Нам придётся изменить наши планы.
    note:
      en: 'ändern needs an object — you change something. Without one it goes reflexive: Das Wetter ändert sich.'
      ru: 'ändern требует дополнения — «менять что-то». Без дополнения глагол становится возвратным: Das Wetter ändert sich — погода меняется.'
  - de: anmachen
    ipa: "ˈanˌmaxn̩"
    pos: verb
    praesens_3sg: macht an
    partizip2: angemacht
    aux: haben
    valence: "+ Akk"
    en: to turn on, to switch on
    ru: включать
    example_de: Mach bitte das Licht an, es ist dunkel.
    example_en: Please turn the light on, it is dark.
    example_ru: Включи, пожалуйста, свет, здесь темно.
    note:
      en: 'The everyday pair for lights and devices: anmachen on, ausmachen off — das Radio anmachen / ausmachen.'
      ru: 'Обиходная пара для света и техники: anmachen — включить, ausmachen — выключить: das Radio anmachen / ausmachen.'
  - de: ansehen
    ipa: "ˈanˌzeːən"
    pos: verb
    praesens_3sg: sieht an
    partizip2: angesehen
    aux: haben
    valence: "+ Akk"
    en: to look at, to watch
    ru: смотреть (на что-то), просматривать
    example_de: Wir haben gestern Abend zusammen einen Film angesehen.
    example_en: We watched a film together yesterday evening.
    example_ru: Вчера вечером мы вместе посмотрели фильм.
    note:
      en: 'One letter from aussehen, and a different verb: ansehen = to look AT something (Sieh das Bild an!), aussehen = to look LIKE, to appear (Du siehst müde aus).'
      ru: 'Отличается от aussehen одной буквой, но значение другое: ansehen — «смотреть на что-то» (Sieh das Bild an!), aussehen — «выглядеть» (Du siehst müde aus).'
  - de: ausmachen
    ipa: "ˈaʊ̯sˌmaxn̩"
    pos: verb
    praesens_3sg: macht aus
    partizip2: ausgemacht
    aux: haben
    valence: "+ Akk"
    en: to turn off, to switch off
    ru: выключать
    example_de: Bitte mach den Fernseher aus, ich möchte schlafen.
    example_en: Please turn the TV off, I want to sleep.
    example_ru: Выключи, пожалуйста, телевизор, я хочу спать.
    note:
      en: 'The opposite of anmachen. A second, fixed use means "to matter": Das macht nichts aus. Macht es Ihnen etwas aus, wenn ich das Fenster aufmache?'
      ru: 'Противоположность anmachen. Второе, устойчивое значение — «иметь значение, быть помехой»: Das macht nichts aus. Macht es Ihnen etwas aus, wenn ich das Fenster aufmache?'
  - de: aussehen
    ipa: "ˈaʊ̯sˌzeːən"
    pos: verb
    praesens_3sg: sieht aus
    partizip2: ausgesehen
    aux: haben
    en: to look, to appear
    ru: выглядеть
    example_de: Du siehst heute müde aus.
    example_en: You look tired today.
    example_ru: Ты сегодня выглядишь усталым.
    note:
      en: 'aussehen takes an adjective (gut, müde, krank) or wie + a noun: Er sieht wie sein Vater aus. Do not confuse it with ansehen = to look AT something.'
      ru: 'aussehen сочетается с прилагательным (gut, müde, krank) или с wie + существительное: Er sieht wie sein Vater aus. Не путать с ansehen — «смотреть на что-то».'
  - de: aussprechen
    ipa: "ˈaʊ̯sˌʃpʁɛçn̩"
    pos: verb
    praesens_3sg: spricht aus
    partizip2: ausgesprochen
    aux: haben
    valence: "+ Akk"
    en: to pronounce
    ru: произносить
    example_de: Wie spricht man dieses Wort aus?
    example_en: How do you pronounce this word?
    example_ru: Как произносится это слово?
    note:
      en: 'Separable aus- + the stem change of sprechen: er spricht aus, Perfekt hat ausgesprochen.'
      ru: 'Отделяемая приставка aus- + чередование гласной, как у sprechen: er spricht aus, перфект — hat ausgesprochen.'
  - de: austragen
    ipa: "ˈaʊ̯sˌtʁaːgn̩"
    pos: verb
    praesens_3sg: trägt aus
    partizip2: ausgetragen
    aux: haben
    valence: "+ Akk"
    en: to deliver (mail, newspapers)
    ru: разносить (почту, газеты)
    example_de: Mein Sohn trägt jeden Morgen Zeitungen aus.
    example_en: My son delivers newspapers every morning.
    example_ru: Мой сын каждое утро разносит газеты.
    note:
      en: 'Separable aus- + stem change: er trägt aus. It is delivery on foot, door to door — Post und Zeitungen austragen.'
      ru: 'Отделяемая приставка aus- + чередование гласной: er trägt aus. Речь именно о разносе по адресам: Post und Zeitungen austragen.'
  - de: beantworten
    ipa: "bəˈʔantvɔʁtn̩"
    pos: verb
    praesens_3sg: beantwortet
    partizip2: beantwortet
    aux: haben
    valence: "+ Akk"
    en: to answer (a question, a letter)
    ru: отвечать на (вопрос, письмо)
    example_de: Können Sie bitte meine Frage beantworten?
    example_en: Could you answer my question, please?
    example_ru: Не могли бы вы ответить на мой вопрос?
    note:
      en: 'Watch the objects: beantworten takes the question in the accusative (eine Frage beantworten), while antworten takes the person in the dative (Ich antworte dir).'
      ru: 'Следите за дополнением: beantworten — вопрос в Akkusativ (eine Frage beantworten), а antworten — человек в Dativ (Ich antworte dir).'
  - de: beraten
    ipa: "bəˈʁaːtn̩"
    pos: verb
    praesens_3sg: berät
    partizip2: beraten
    aux: haben
    valence: "+ Akk"
    en: to advise, to give advice to
    ru: консультировать, давать совет
    example_de: Die Verkäuferin hat mich sehr gut beraten.
    example_en: The shop assistant advised me really well.
    example_ru: Продавщица очень хорошо меня проконсультировала.
    note:
      en: 'The person advised is accusative — jemanden beraten (unlike helfen, which takes the dative). Inseparable be- + stem change: er berät; Partizip II beraten, with no ge- and no change from the infinitive.'
      ru: 'Тот, кого консультируют, стоит в Akkusativ — jemanden beraten (в отличие от helfen с Dativ). Неотделяемая приставка be- + чередование: er berät; Partizip II — beraten, без ge- и совпадает с инфинитивом.'
  - de: beschreiben
    ipa: "bəˈʃʁaɪ̯bn̩"
    pos: verb
    praesens_3sg: beschreibt
    partizip2: beschrieben
    aux: haben
    valence: "+ Akk"
    en: to describe
    ru: описывать
    example_de: Können Sie mir den Weg zum Bahnhof beschreiben?
    example_en: Can you describe the way to the station for me?
    example_ru: Вы можете описать мне дорогу до вокзала?
    note:
      en: 'Inseparable be- → no ge-, but the strong stem of schreiben stays: hat beschrieben (compare hat geschrieben).'
      ru: 'Неотделяемая приставка be- → без ge-, но сильное чередование, как у schreiben, сохраняется: hat beschrieben (ср. hat geschrieben).'
  - de: besichtigen
    ipa: "bəˈzɪçtɪgn̩"
    pos: verb
    praesens_3sg: besichtigt
    partizip2: besichtigt
    aux: haben
    valence: "+ Akk"
    en: to view, to visit (a sight, a flat)
    ru: осматривать (достопримечательность, квартиру)
    example_de: Am Samstag besichtigen wir eine Wohnung.
    example_en: On Saturday we are viewing a flat.
    example_ru: В субботу мы идём смотреть квартиру.
    note:
      en: 'You besichtigen a thing you inspect (a museum, a castle, a flat) but besuchen a person you go and see.'
      ru: 'besichtigen — осматривать объект (музей, замок, квартиру), а besuchen — навещать человека.'
  - de: bestätigen
    ipa: "bəˈʃtɛːtɪgn̩"
    pos: verb
    praesens_3sg: bestätigt
    partizip2: bestätigt
    aux: haben
    valence: "+ Akk"
    en: to confirm
    ru: подтверждать
    example_de: Bitte bestätigen Sie den Termin per E-Mail.
    example_en: Please confirm the appointment by email.
    example_ru: Пожалуйста, подтвердите время приёма по электронной почте.
    note:
      en: 'The word of forms and bookings: einen Termin, eine Anmeldung, eine Buchung bestätigen. Inseparable be- → hat bestätigt, no ge-.'
      ru: 'Слово из мира записей и бронирований: einen Termin, eine Anmeldung, eine Buchung bestätigen. Неотделяемая приставка be- → hat bestätigt, без ge-.'
  - de: bitten
    ipa: "ˈbɪtn̩"
    pos: verb
    praesens_3sg: bittet
    partizip2: gebeten
    aux: haben
    valence: "um + Akk"
    en: to ask for, to request
    ru: просить (о чём-то)
    example_de: Ich möchte Sie um Hilfe bitten.
    example_en: I would like to ask you for help.
    example_ru: Я хотел бы попросить вас о помощи.
    note:
      en: 'bitten um + Akk asks FOR something (jemanden um etwas bitten); fragen asks a question. And the Partizip II is irregular: hat gebeten, never "gebittet".'
      ru: 'bitten um + Akk — «просить о чём-то» (jemanden um etwas bitten); fragen — «спрашивать». Partizip II неправильный: hat gebeten, а не «gebittet».'
  - de: drücken
    ipa: "ˈdʁʏkn̩"
    pos: verb
    praesens_3sg: drückt
    partizip2: gedrückt
    aux: haben
    valence: "+ Akk"
    en: to press, to push
    ru: нажимать, давить
    example_de: Bitte drücken Sie den grünen Knopf.
    example_en: Please press the green button.
    example_ru: Пожалуйста, нажмите на зелёную кнопку.
    note:
      en: 'Both den Knopf drücken and auf den Knopf drücken are correct. On German doors, Drücken means push and Ziehen means pull.'
      ru: 'Верны оба варианта: den Knopf drücken и auf den Knopf drücken. На дверях Drücken значит «от себя», а Ziehen — «на себя».'
  - de: empfehlen
    ipa: "ɛmˈpfeːlən"
    pos: verb
    praesens_3sg: empfiehlt
    partizip2: empfohlen
    aux: haben
    valence: "+ Dat"
    en: to recommend
    ru: рекомендовать, советовать
    example_de: Der Kellner hat uns den Fisch empfohlen.
    example_en: The waiter recommended the fish to us.
    example_ru: Официант посоветовал нам рыбу.
    note:
      en: 'Two objects: the person is dative, the thing accusative — jemandem etwas empfehlen. Three different vowels to remember: empfehlen, er empfiehlt, hat empfohlen.'
      ru: 'Два дополнения: человек — Dativ, предмет — Akkusativ: jemandem etwas empfehlen. Три разных гласных: empfehlen, er empfiehlt, hat empfohlen.'
  - de: erlauben
    ipa: "ɛɐ̯ˈlaʊ̯bn̩"
    pos: verb
    praesens_3sg: erlaubt
    partizip2: erlaubt
    aux: haben
    valence: "+ Dat"
    en: to allow, to permit
    ru: разрешать, позволять
    example_de: Der Chef erlaubt mir heute eine Pause.
    example_en: The boss is allowing me a break today.
    example_ru: Начальник разрешает мне сегодня сделать перерыв.
    note:
      en: 'The person who gets the permission is dative: Der Chef erlaubt mir eine Pause — mir, not mich. Inseparable er- → hat erlaubt, no ge-.'
      ru: 'Тот, кому разрешают, стоит в Dativ: Der Chef erlaubt mir eine Pause — mir, а не mich. Неотделяемая приставка er- → hat erlaubt, без ge-.'
  - de: Erlaubnis
    ipa: "ɛɐ̯ˈlaʊ̯pnɪs"
    pos: noun
    gender: f
    plural: die Erlaubnisse
    en: permission
    ru: разрешение
    example_de: Ohne Erlaubnis darf man hier nicht parken.
    example_en: You are not allowed to park here without permission.
    example_ru: Без разрешения здесь парковаться нельзя.
    note:
      en: 'die Erlaubnis — the noun behind erlauben. It travels in fixed phrases: um Erlaubnis bitten, eine Erlaubnis bekommen, ohne Erlaubnis (ohne + Akk).'
      ru: 'die Erlaubnis — существительное от erlauben. Живёт в устойчивых сочетаниях: um Erlaubnis bitten, eine Erlaubnis bekommen, ohne Erlaubnis (ohne + Akk).'
  - de: erlaubt sein
    ipa: "ɛɐ̯ˈlaʊ̯pt zaɪ̯n"
    pos: phrase
    en: to be allowed, to be permitted
    ru: быть разрешённым, разрешаться
    example_de: Rauchen ist hier nicht erlaubt.
    example_en: Smoking is not allowed here.
    example_ru: Курить здесь не разрешается.
    note:
      en: 'The sign-and-notice phrase: the activity is the subject — Das ist nicht erlaubt. Its opposite is verboten sein. To say it about a person, use dürfen: Hier darf man nicht rauchen.'
      ru: 'Формулировка объявлений: подлежащее — само действие: Das ist nicht erlaubt. Противоположность — verboten sein. О человеке говорят через dürfen: Hier darf man nicht rauchen.'
  - de: fallen
    ipa: "ˈfalən"
    pos: verb
    praesens_3sg: fällt
    partizip2: gefallen
    aux: sein
    en: to fall
    ru: падать
    example_de: Das Glas ist vom Tisch gefallen.
    example_en: The glass fell off the table.
    example_ru: Стакан упал со стола.
    note:
      en: 'Falling is movement from A to B, so the Perfekt takes sein: Es ist gefallen. Careful with the look-alike: gefallen (to please, + Dat) takes haben — Das Buch hat mir gefallen.'
      ru: 'Падение — движение из точки А в точку Б, поэтому перфект с sein: Es ist gefallen. Осторожно с омонимом: gefallen «нравиться» (+ Dat) идёт с haben — Das Buch hat mir gefallen.'
  - de: halten
    ipa: "ˈhaltn̩"
    pos: verb
    praesens_3sg: hält
    partizip2: gehalten
    aux: haben
    valence: "+ Akk"
    en: to hold; to stop (of a vehicle)
    ru: держать; останавливаться (о транспорте)
    example_de: Kannst du bitte kurz meine Tasche halten?
    example_en: Could you hold my bag for a moment?
    example_ru: Ты можешь минутку подержать мою сумку?
    note:
      en: 'Two everyday senses: hold something (+ Akk), and — of a bus or train — stop: Der Bus hält hier nicht. A third, fixed one is halten von + Dat = to think of: Was hältst du von dem Plan?'
      ru: 'Два обиходных значения: «держать» (+ Akk) и «останавливаться» (о транспорте): Der Bus hält hier nicht. Третье, устойчивое: halten von + Dat — «как ты относишься к…»: Was hältst du von dem Plan?'
  - de: aufpassen
    ipa: "ˈaʊ̯fˌpasn̩"
    pos: verb
    praesens_3sg: passt auf
    partizip2: aufgepasst
    aux: haben
    valence: "auf + Akk"
    en: to look after; to pay attention
    ru: присматривать (за кем-то); быть внимательным
    example_de: Kannst du am Samstag auf die Kinder aufpassen?
    example_en: Could you look after the children on Saturday?
    example_ru: Ты можешь в субботу присмотреть за детьми?
    note:
      en: 'aufpassen auf + Akk = keep an eye on someone or something. On its own it means pay attention: Pass auf! Im Unterricht müssen wir gut aufpassen.'
      ru: 'aufpassen auf + Akk — «присматривать за кем-то/чем-то». Без дополнения — «быть внимательным»: Pass auf! Im Unterricht müssen wir gut aufpassen.'
