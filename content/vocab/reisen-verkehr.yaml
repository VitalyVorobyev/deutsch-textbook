id: reisen-verkehr
title_de: "Reisen & Verkehr — unterwegs und bei Problemen"
title_en: "Travel & transport — on the way and when things go wrong"
title_ru: "Путешествия и транспорт — в пути и при сбоях"
title_uk: "Подорожі та транспорт — у дорозі та в разі збоїв"
level: A2
entries:
  - de: "Verspätung"
    ipa: "fɛɐ̯ˈʃpɛːtʊŋ"
    pos: noun
    gender: f
    plural: "die Verspätungen"
    en: "delay"
    ru: "опоздание; задержка (транспорта)"
    uk: "запізнення; затримка (транспорту)"
    example_de: "Der Zug nach Hamburg hat zwanzig Minuten Verspätung."
    example_en: "The train to Hamburg is twenty minutes late."
    example_ru: "Поезд на Гамбург опаздывает на двадцать минут."
    example_uk: "Потяг на Гамбург запізнюється на двадцять хвилин."
    note:
      en: "The fixed phrase is Verspätung haben: Der Zug hat Verspätung — literally 'the train has delay'."
      ru: "Устойчивое выражение — Verspätung haben: Der Zug hat Verspätung, дословно «поезд имеет опоздание»."
      uk: "Стале сполучення — Verspätung haben: Der Zug hat Verspätung, дослівно «потяг має запізнення»."
  - de: "Anschluss"
    ipa: "ˈanʃlʊs"
    pos: noun
    gender: m
    plural: "die Anschlüsse"
    en: "connection (the next train you change to)"
    ru: "пересадка; стыковочный поезд"
    uk: "пересадка; стикувальний потяг"
    example_de: "In Hannover habe ich den Anschluss verpasst."
    example_en: "In Hanover I missed my connection."
    example_ru: "В Ганновере я не успел на пересадку."
    example_uk: "У Ганновері я не встиг на пересадку."
  - de: "Durchsage"
    ipa: "ˈdʊʁçˌzaːgə"
    pos: noun
    gender: f
    plural: "die Durchsagen"
    en: "announcement (over a loudspeaker)"
    ru: "объявление (по громкой связи)"
    uk: "оголошення (по гучномовцю)"
    example_de: "Timo versteht die Durchsage nicht."
    example_en: "Timo doesn't understand the announcement."
    example_ru: "Тимо не понимает объявление."
    example_uk: "Тімо не розуміє оголошення."
  - de: "Schaffner"
    ipa: "ˈʃafnɐ"
    pos: noun
    gender: m
    plural: "die Schaffner"
    en: "ticket inspector; conductor"
    ru: "проводник; контролёр"
    uk: "провідник; контролер"
    example_de: "Ich frage den Schaffner nach dem Gleis."
    example_en: "I ask the conductor about the platform."
    example_ru: "Я спрашиваю проводника про путь."
    example_uk: "Я запитую провідника про колію."
    note:
      en: "The woman doing the job is die Schaffnerin."
      ru: "Женщина на этой должности — die Schaffnerin."
      uk: "Жінка на цій посаді — die Schaffnerin."
  - de: "Schalter"
    ipa: "ˈʃaltɐ"
    pos: noun
    gender: m
    plural: "die Schalter"
    en: "counter; ticket window"
    ru: "касса; окошко (в вокзале, банке)"
    uk: "каса; віконце (на вокзалі, в банку)"
    example_de: "Am Schalter im Bahnhof bekomme ich Hilfe."
    example_en: "I get help at the counter in the station."
    example_ru: "В кассе на вокзале мне помогают."
    example_uk: "У касі на вокзалі мені допомагають."
  - de: "Sitzplatz"
    ipa: "ˈzɪtsˌplats"
    pos: noun
    gender: m
    plural: "die Sitzplätze"
    en: "seat (a reserved place to sit)"
    ru: "сидячее место"
    uk: "сидяче місце"
    example_de: "Mein Sitzplatz ist in Wagen sieben."
    example_en: "My seat is in carriage seven."
    example_ru: "Моё место в седьмом вагоне."
    example_uk: "Моє місце в сьомому вагоні."
  - de: "Wagen"
    ipa: "ˈvaːgn̩"
    pos: noun
    gender: m
    plural: "die Wagen"
    en: "carriage (of a train); car"
    ru: "вагон; автомобиль"
    uk: "вагон; автомобіль"
    example_de: "Der Zug hat zehn Wagen."
    example_en: "The train has ten carriages."
    example_ru: "В поезде десять вагонов."
    example_uk: "У потязі десять вагонів."
    note:
      en: "Same word for a train carriage and for a car (das Auto is the everyday word for the latter)."
      ru: "Одно слово и для вагона, и для машины (в разговорной речи для машины чаще das Auto)."
      uk: "Одне слово і для вагона, і для машини (у розмовній мові для машини частіше das Auto)."
  - de: "Verkehrsmittel"
    ipa: "fɛɐ̯ˈkeːɐ̯sˌmɪtl̩"
    pos: noun
    gender: n
    plural: "die Verkehrsmittel"
    en: "means of transport"
    ru: "вид транспорта; транспортное средство"
    uk: "вид транспорту; транспортний засіб"
    example_de: "Welches Verkehrsmittel nimmst du: Bus oder Bahn?"
    example_en: "Which means of transport are you taking: bus or train?"
    example_ru: "Каким транспортом ты поедешь: автобусом или поездом?"
    example_uk: "Яким транспортом ти поїдеш: автобусом чи потягом?"
  - de: "Ziel"
    ipa: "ˈtsiːl"
    pos: noun
    gender: n
    plural: "die Ziele"
    en: "destination; goal"
    ru: "цель; пункт назначения"
    uk: "мета; пункт призначення"
    example_de: "Mein Ziel ist Hamburg."
    example_en: "My destination is Hamburg."
    example_ru: "Мой пункт назначения — Гамбург."
    example_uk: "Мій пункт призначення — Гамбург."
  - de: "Hauptbahnhof"
    ipa: "ˈhaʊ̯ptˌbaːnhoːf"
    pos: noun
    gender: m
    plural: "die Hauptbahnhöfe"
    en: "main station; central station"
    ru: "главный (центральный) вокзал"
    uk: "головний (центральний) вокзал"
    example_de: "Der Zug hält am Hauptbahnhof."
    example_en: "The train stops at the main station."
    example_ru: "Поезд останавливается на главном вокзале."
    example_uk: "Потяг зупиняється на головному вокзалі."
    note:
      en: "On timetables and signs it is shortened to Hbf: Hamburg Hbf."
      ru: "В расписаниях и на табличках сокращается до Hbf: Hamburg Hbf."
      uk: "У розкладах і на табличках скорочується до Hbf: Hamburg Hbf."
  - de: "Richtung"
    ipa: "ˈʁɪçtʊŋ"
    pos: noun
    gender: f
    plural: "die Richtungen"
    en: "direction"
    ru: "направление"
    uk: "напрямок"
    example_de: "Der Zug fährt in Richtung Bremen."
    example_en: "The train is going in the direction of Bremen."
    example_ru: "Поезд идёт в направлении Бремена."
    example_uk: "Потяг іде в напрямку Бремена."
    note:
      en: "In Richtung + a place name takes no article: in Richtung Bremen."
      ru: "После in Richtung название города идёт без артикля: in Richtung Bremen."
      uk: "Після in Richtung назва міста йде без артикля: in Richtung Bremen."
  - de: "ausfallen"
    ipa: "ˈaʊ̯sˌfalən"
    pos: verb
    en: "to be cancelled (train, bus, class)"
    ru: "отменяться; не состояться"
    uk: "скасовуватися; не відбутися"
    example_de: "Der Zug nach Hamburg fällt heute aus."
    example_en: "The train to Hamburg is cancelled today."
    example_ru: "Поезд на Гамбург сегодня отменён."
    example_uk: "Потяг на Гамбург сьогодні скасовано."
    partizip2: "ausgefallen"
    aux: "sein"
    praesens_3sg: "fällt aus"
    note:
      en: "Separable (fällt … aus) and a sein-verb, like passieren and bleiben: Der Zug ist ausgefallen."
      ru: "Отделяемый глагол (fällt … aus) и глагол с sein, как passieren и bleiben: Der Zug ist ausgefallen."
      uk: "Відокремлюване дієслово (fällt … aus) і дієслово з sein, як passieren і bleiben: Der Zug ist ausgefallen."
  - de: "entwerten"
    ipa: "ɛntˈveːɐ̯tn̩"
    pos: verb
    en: "to validate (a ticket in the machine)"
    ru: "компостировать; пробивать (билет)"
    uk: "компостувати; пробивати (квиток)"
    example_de: "Im Bus muss man die Fahrkarte entwerten."
    example_en: "On the bus you have to validate your ticket."
    example_ru: "В автобусе билет нужно прокомпостировать."
    example_uk: "В автобусі квиток треба прокомпостувати."
    partizip2: "entwertet"
    aux: "haben"
    praesens_3sg: "entwertet"
    valence: "+ Akk"
    note:
      en: "Inseparable prefix ent-, so the Partizip II has no ge-: hat entwertet."
      ru: "Приставка ent- неотделяемая, поэтому Partizip II — без ge-: hat entwertet."
      uk: "Префікс ent- невідокремлюваний, тому Partizip II — без ge-: hat entwertet."
  - de: "verpassen"
    ipa: "fɛɐ̯ˈpasn̩"
    pos: verb
    en: "to miss (a train, a connection)"
    ru: "пропустить; опоздать на (поезд)"
    uk: "пропустити; запізнитися на (потяг)"
    example_de: "Ich habe den Bus verpasst."
    example_en: "I missed the bus."
    example_ru: "Я опоздал на автобус."
    example_uk: "Я запізнився на автобус."
    partizip2: "verpasst"
    aux: "haben"
    praesens_3sg: "verpasst"
    valence: "+ Akk"
    note:
      en: "Perfekt with haben, even though the sentence is about travel: nobody moves from A to B here."
      ru: "Перфект с haben, хотя речь о поездке: движения из точки А в точку Б здесь нет."
      uk: "Перфект із haben, хоча йдеться про поїздку: руху з точки А в точку Б тут немає."
  - de: "erreichen"
    ipa: "ɛɐ̯ˈʁaɪ̯çn̩"
    pos: verb
    en: "to reach; to catch (a train in time)"
    ru: "успеть на; достичь"
    uk: "встигнути на; досягти"
    example_de: "Wir erreichen den Anschluss in Bremen."
    example_en: "We will catch the connection in Bremen."
    example_ru: "Мы успеем на пересадку в Бремене."
    example_uk: "Ми встигнемо на пересадку в Бремені."
    partizip2: "erreicht"
    aux: "haben"
    praesens_3sg: "erreicht"
    valence: "+ Akk"
  - de: "dauern"
    ipa: "ˈdaʊ̯ɐn"
    pos: verb
    en: "to take (time); to last"
    ru: "длиться; занимать (о времени)"
    uk: "тривати; займати (про час)"
    example_de: "Die Fahrt nach Hamburg dauert vier Stunden."
    example_en: "The journey to Hamburg takes four hours."
    example_ru: "Дорога до Гамбурга занимает четыре часа."
    example_uk: "Дорога до Гамбурга займає чотири години."
    partizip2: "gedauert"
    aux: "haben"
    praesens_3sg: "dauert"
  - de: "verreisen"
    ipa: "fɛɐ̯ˈʁaɪ̯zn̩"
    pos: verb
    en: "to go away (on a trip)"
    ru: "уезжать (в поездку)"
    uk: "від'їжджати (у подорож)"
    example_de: "Im August verreisen wir nach Italien."
    example_en: "In August we are going away to Italy."
    example_ru: "В августе мы уезжаем в Италию."
    example_uk: "У серпні ми їдемо до Італії."
    partizip2: "verreist"
    aux: "sein"
    praesens_3sg: "verreist"
    note:
      en: "A sein-verb: Sie ist für zwei Wochen verreist. The inseparable ver- means no ge- in the participle."
      ru: "Глагол с sein: Sie ist für zwei Wochen verreist. Неотделяемая приставка ver- — значит, в причастии нет ge-."
      uk: "Дієслово з sein: Sie ist für zwei Wochen verreist. Невідокремлюваний префікс ver- — отже, у дієприкметнику немає ge-."
  - de: "besetzt"
    ipa: "bəˈzɛtst"
    pos: adj
    en: "occupied; taken (seat); busy (line)"
    ru: "занято (место, линия)"
    uk: "зайнято (місце, лінія)"
    example_de: "Der Sitzplatz am Fenster ist besetzt."
    example_en: "The seat by the window is taken."
    example_ru: "Место у окна занято."
    example_uk: "Місце біля вікна зайняте."
  - de: "unterwegs sein"
    ipa: "ʊntɐˈveːks zaɪ̯n"
    pos: phrase
    en: "to be on the way; to be travelling"
    ru: "быть в пути; находиться в дороге"
    uk: "бути в дорозі; перебувати в путі"
    example_de: "Wir sind seit acht Uhr unterwegs."
    example_en: "We have been on the road since eight o'clock."
    example_ru: "Мы в пути с восьми часов."
    example_uk: "Ми в дорозі з восьмої години."
    note:
      en: "unterwegs sein = to be on the way; Ich bin noch unterwegs is the standard answer to 'Where are you?'."
      ru: "unterwegs sein — «быть в пути»; Ich bin noch unterwegs — стандартный ответ на вопрос «Ты где?»."
      uk: "unterwegs sein — «бути в дорозі»; Ich bin noch unterwegs — стандартна відповідь на питання «Ти де?»."
  - de: "Wo muss ich umsteigen?"
    pos: phrase
    en: "Where do I have to change (trains)?"
    ru: "Где мне нужно делать пересадку?"
    uk: "Де мені потрібно робити пересадку?"
    example_de: "Entschuldigung, ich fahre nach Hamburg. Wo muss ich umsteigen?"
    example_en: "Excuse me, I'm going to Hamburg. Where do I have to change?"
    example_ru: "Извините, я еду в Гамбург. Где мне нужно делать пересадку?"
    example_uk: "Вибачте, я їду до Гамбурга. Де мені потрібно робити пересадку?"
  - de: "Der Zug fällt aus."
    pos: phrase
    en: "The train is cancelled."
    ru: "Поезд отменён."
    uk: "Потяг скасовано."
    example_de: "Achtung: Der Zug fällt aus. Bitte fahren Sie über Bremen."
    example_en: "Attention: the train is cancelled. Please travel via Bremen."
    example_ru: "Внимание: поезд отменён. Пожалуйста, поезжайте через Бремен."
    example_uk: "Увага: потяг скасовано. Будь ласка, їдьте через Бремен."
    note:
      en: "The sentence you will hear in a station announcement — the prefix aus goes to the end."
      ru: "Именно эту фразу вы услышите в объявлении на вокзале — приставка aus уходит в конец."
      uk: "Саме цю фразу ви почуєте в оголошенні на вокзалі — префікс aus іде в кінець."
  - de: "Ich habe meinen Koffer verloren."
    pos: phrase
    en: "I have lost my suitcase."
    ru: "Я потерял свой чемодан."
    uk: "Я загубив свою валізу."
    example_de: "Entschuldigung, ich brauche Hilfe: Ich habe meinen Koffer verloren."
    example_en: "Excuse me, I need help: I have lost my suitcase."
    example_ru: "Извините, мне нужна помощь: я потерял чемодан."
    example_uk: "Вибачте, мені потрібна допомога: я загубив валізу."
    note:
      en: "verlieren takes haben, and the Partizip II verloren closes the sentence."
      ru: "verlieren требует haben, а Partizip II verloren замыкает предложение."
      uk: "verlieren вимагає haben, а Partizip II verloren замикає речення."
  - de: "Ist hier noch frei?"
    pos: phrase
    en: "Is this seat still free?"
    ru: "Здесь свободно?"
    uk: "Тут вільно?"
    example_de: "Ist hier noch frei? — Ja, bitte, setzen Sie sich."
    example_en: "Is this seat still free? — Yes, please, have a seat."
    example_ru: "Здесь свободно? — Да, пожалуйста, садитесь."
    example_uk: "Тут вільно? — Так, будь ласка, сідайте."
