id: kommunikation-medien
title_de: "Kommunikation & Medien"
title_en: "Communication & media"
title_ru: "Общение и медиа"
level: A1
entries:
  - { de: "Telefon", ipa: "teleˈfoːn", pos: noun, gender: n, plural: "die Telefone", en: "telephone; phone", ru: "телефон", example_de: "Das Telefon klingelt.", example_en: "The phone is ringing.", example_ru: "Телефон звонит." }
  - { de: "Handy", ipa: "ˈhɛndi", pos: noun, gender: n, plural: "die Handys", en: "mobile phone; cell phone", ru: "мобильный телефон", example_de: "Mein Handy ist neu.", example_en: "My phone is new.", example_ru: "Мой телефон новый.", note: { en: "Handy is a German pseudo-anglicism: it looks English but English speakers don't call a phone a \"handy\".", ru: "Handy — псевдоанглицизм: слово выглядит по-английски, но в английском языке телефон так не называют." } }
  - { de: "Anruf", ipa: "ˈanˌʁuːf", pos: noun, gender: m, plural: "die Anrufe", en: "phone call", ru: "звонок", example_de: "Der Anruf kommt von meiner Schwester.", example_en: "The call is from my sister.", example_ru: "Звонок от моей сестры.", note: { en: "The related verb is anrufen (separable, + accusative): Ich rufe dich an.", ru: "Родственный глагол — anrufen (отделяемый, + Akkusativ): Ich rufe dich an." } }
  - { de: "E-Mail", ipa: "ˈiːˌmɛɪ̯l", pos: noun, gender: f, plural: "die E-Mails", en: "email", ru: "имейл; электронное письмо", example_de: "Ich schreibe eine E-Mail.", example_en: "I'm writing an email.", example_ru: "Я пишу имейл." }
  - { de: "Internet", ipa: "ˈɪntɐˌnɛt", pos: noun, gender: n, plural: "—", en: "internet", ru: "интернет", example_de: "Wir haben kein Internet.", example_en: "We have no internet.", example_ru: "У нас нет интернета." }
  - { de: "Brief", ipa: "ˈbʁiːf", pos: noun, gender: m, plural: "die Briefe", en: "letter", ru: "письмо", example_de: "Ich schreibe einen Brief an meine Oma.", example_en: "I'm writing a letter to my grandma.", example_ru: "Я пишу письмо бабушке." }
  - { de: "Postkarte", ipa: "ˈpɔstˌkaʁtə", pos: noun, gender: f, plural: "die Postkarten", en: "postcard", ru: "почтовая открытка", example_de: "Ich schicke eine Postkarte aus Berlin.", example_en: "I'm sending a postcard from Berlin.", example_ru: "Я отправляю открытку из Берлина." }
  - { de: "Karte", ipa: "ˈkaʁtə", pos: noun, gender: f, plural: "die Karten", en: "card (e.g. greeting card)", ru: "открытка; карточка", example_de: "Ich schreibe eine Karte zum Geburtstag.", example_en: "I'm writing a card for the birthday.", example_ru: "Я пишу открытку на день рождения.", note: { en: "Broader than Postkarte: any card (birthday, greeting) — not only a stamped mailing card.", ru: "Karte шире, чем Postkarte: любая открытка/карточка, не обязательно почтовая." } }
  - { de: "Briefmarke", ipa: "ˈbʁiːfˌmaʁkə", pos: noun, gender: f, plural: "die Briefmarken", en: "postage stamp", ru: "почтовая марка", example_de: "Der Brief braucht eine Briefmarke.", example_en: "The letter needs a stamp.", example_ru: "Письму нужна марка." }
  - { de: "schicken", ipa: "ˈʃɪkn̩", pos: verb, en: "to send", ru: "посылать, отправлять", example_de: "Ich schicke ein Foto an meine Oma.", example_en: "I am sending a photo to my grandma.", example_ru: "Я отправляю фото бабушке.", partizip2: "geschickt", aux: haben, praesens_3sg: "schickt", valence: "+ Akk" }
  - { de: "senden", ipa: "ˈzɛndn̩", pos: verb, en: "to send; to broadcast", ru: "отправлять, посылать", example_de: "Ich sende eine Nachricht an Paul.", example_en: "I am sending a message to Paul.", example_ru: "Я отправляю сообщение Паулю.", partizip2: "gesendet", aux: haben, praesens_3sg: "sendet", valence: "+ Akk", note: { en: "Near-synonym of schicken; senden also means \"to broadcast\": Das Radio sendet Musik.", ru: "Почти синоним schicken; senden значит ещё «транслировать»: Das Radio sendet Musik." } }
  - { de: "Zeitung", ipa: "ˈtsaɪ̯tʊŋ", pos: noun, gender: f, plural: "die Zeitungen", en: "newspaper", ru: "газета", example_de: "Mein Vater liest jeden Morgen die Zeitung.", example_en: "My father reads the newspaper every morning.", example_ru: "Мой отец читает газету каждое утро." }
  - { de: "Buch", ipa: "ˈbuːx", pos: noun, gender: n, plural: "die Bücher", en: "book", ru: "книга", example_de: "Ich lese ein Buch über Deutschland.", example_en: "I'm reading a book about Germany.", example_ru: "Я читаю книгу о Германии." }
  - { de: "Radio", ipa: "ˈʁaːdio", pos: noun, gender: n, plural: "die Radios", en: "radio", ru: "радио", example_de: "Wir hören Radio in der Küche.", example_en: "We listen to the radio in the kitchen.", example_ru: "Мы слушаем радио на кухне." }
  - { de: "Fernsehen", ipa: "ˈfɛʁnˌzeːən", pos: noun, gender: n, plural: "—", en: "television (the medium)", ru: "телевидение", example_de: "Ich sehe einen Film im Fernsehen.", example_en: "I'm watching a movie on TV.", example_ru: "Я смотрю фильм по телевизору.", note: { en: "The related verb is fernsehen (separable): er sieht fern (present), ferngesehen (Partizip II) — don't confuse it with this noun.", ru: "Родственный глагол — fernsehen (отделяемый): er sieht fern (наст. время), ferngesehen (Partizip II) — не путать с этим существительным." } }
  - { de: "Fernseher", ipa: "ˈfɛʁnˌzeːɐ", pos: noun, gender: m, plural: "die Fernseher", en: "television set; TV", ru: "телевизор", example_de: "Der Fernseher steht im Wohnzimmer.", example_en: "The TV stands in the living room.", example_ru: "Телевизор стоит в гостиной." }
  - { de: "Foto", ipa: "ˈfoːto", pos: noun, gender: n, plural: "die Fotos", en: "photo", ru: "фото; фотография", example_de: "Ich mache ein Foto von meiner Familie.", example_en: "I'm taking a photo of my family.", example_ru: "Я делаю фото своей семьи." }
  - { de: "Information", ipa: "ɪnfɔʁmaˈtsjoːn", pos: noun, gender: f, plural: "die Informationen", en: "(piece of) information", ru: "информация", example_de: "Ich brauche Informationen über den Kurs.", example_en: "I need information about the course.", example_ru: "Мне нужна информация о курсе." }
  - { de: "informieren", ipa: "ɪnfɔʁˈmiːʁən", pos: verb, en: "to inform", ru: "информировать, сообщать", example_de: "Die Lehrerin informiert die Schüler über den Termin.", example_en: "The teacher informs the students about the appointment.", example_ru: "Учительница информирует учеников о встрече.", partizip2: "informiert", aux: haben, praesens_3sg: "informiert", valence: "+ Akk", note: { en: "Often used with über + Akkusativ for the topic: informieren über etwas.", ru: "Часто используется с über + Akkusativ для темы: informieren über etwas." } }
  - { de: "Nachricht", ipa: "ˈnaːxʁɪçt", pos: noun, gender: f, plural: "die Nachrichten", en: "message; (pl.) the news", ru: "сообщение; (мн.ч.) новости", example_de: "Ich lese deine Nachricht.", example_en: "I'm reading your message.", example_ru: "Я читаю твоё сообщение.", note: { en: "Plural die Nachrichten also means \"the news\" (a TV/radio broadcast): Wir sehen die Nachrichten.", ru: "Множественное число die Nachrichten значит ещё «новости» (теле/радиопередача): Wir sehen die Nachrichten." } }
  - { de: "Antwort", ipa: "ˈantvɔʁt", pos: noun, gender: f, plural: "die Antworten", en: "answer; reply", ru: "ответ", example_de: "Deine Antwort ist richtig.", example_en: "Your answer is correct.", example_ru: "Твой ответ правильный." }
  - { de: "Frage", ipa: "ˈfʁaːgə", pos: noun, gender: f, plural: "die Fragen", en: "question", ru: "вопрос", example_de: "Ich habe eine Frage.", example_en: "I have a question.", example_ru: "У меня есть вопрос." }
  - { de: "wiederholen", ipa: "viːdɐˈhoːlən", pos: verb, en: "to repeat", ru: "повторять", example_de: "Ich wiederhole die Wörter jeden Tag.", example_en: "I repeat the words every day.", example_ru: "Я повторяю слова каждый день.", partizip2: "wiederholt", aux: haben, praesens_3sg: "wiederholt", valence: "+ Akk", note: { en: "Looks separable (wieder- as in wiederkommen) but wiederholen is inseparable: er wiederholt, Partizip II wiederholt (no ge-).", ru: "Выглядит отделяемым (wieder- как в wiederkommen), но wiederholen — неотделяемый: er wiederholt, Partizip II — wiederholt (без ge-)." } }
  - { de: "bedeuten", ipa: "bəˈdɔʏ̯tn̩", pos: verb, en: "to mean; to signify", ru: "означать", example_de: "Was bedeutet dieses Wort?", example_en: "What does this word mean?", example_ru: "Что значит это слово?", partizip2: "bedeutet", aux: haben, praesens_3sg: "bedeutet" }
