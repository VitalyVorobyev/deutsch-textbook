id: kommunikation-medien
title_de: "Kommunikation & Medien"
title_en: "Communication & media"
title_ru: "Общение и медиа"
title_uk: "Спілкування та медіа"
level: A1
entries:
  - { de: "Telefon", ipa: "teleˈfoːn", pos: noun, gender: n, plural: "die Telefone", en: "telephone; phone", ru: "телефон", uk: "телефон", example_de: "Das Telefon klingelt.", example_en: "The phone is ringing.", example_ru: "Телефон звонит.", example_uk: "Телефон дзвонить." }
  - { de: "Handy", ipa: "ˈhɛndi", pos: noun, gender: n, plural: "die Handys", en: "mobile phone; cell phone", ru: "мобильный телефон", uk: "мобільний телефон", example_de: "Mein Handy ist neu.", example_en: "My phone is new.", example_ru: "Мой телефон новый.", example_uk: "Мій телефон новий.", note: { en: "Handy is a German pseudo-anglicism: it looks English but English speakers don't call a phone a \"handy\".", ru: "Handy — псевдоанглицизм: слово выглядит по-английски, но в английском языке телефон так не называют.", uk: "Handy — псевдоангліцизм: слово виглядає англійським, але в англійській мові телефон так не називають." } }
  - { de: "Anruf", ipa: "ˈanˌʁuːf", pos: noun, gender: m, plural: "die Anrufe", en: "phone call", ru: "звонок", uk: "дзвінок", example_de: "Der Anruf kommt von meiner Schwester.", example_en: "The call is from my sister.", example_ru: "Звонок от моей сестры.", example_uk: "Дзвінок від моєї сестри.", note: { en: "The related verb is anrufen (separable, + accusative): Ich rufe dich an.", ru: "Родственный глагол — anrufen (отделяемый, + Akkusativ): Ich rufe dich an.", uk: "Споріднене дієслово — anrufen (відокремлюване, + Akkusativ): Ich rufe dich an." } }
  - { de: "E-Mail", ipa: "ˈiːˌmɛɪ̯l", pos: noun, gender: f, plural: "die E-Mails", en: "email", ru: "имейл; электронное письмо", uk: "імейл; електронний лист", example_de: "Ich schreibe eine E-Mail.", example_en: "I'm writing an email.", example_ru: "Я пишу имейл.", example_uk: "Я пишу імейл." }
  - { de: "Internet", ipa: "ˈɪntɐˌnɛt", pos: noun, gender: n, plural: "—", en: "internet", ru: "интернет", uk: "інтернет", example_de: "Wir haben kein Internet.", example_en: "We have no internet.", example_ru: "У нас нет интернета.", example_uk: "У нас немає інтернету." }
  - { de: "Brief", ipa: "ˈbʁiːf", pos: noun, gender: m, plural: "die Briefe", en: "letter", ru: "письмо", uk: "лист", example_de: "Ich schreibe einen Brief an meine Oma.", example_en: "I'm writing a letter to my grandma.", example_ru: "Я пишу письмо бабушке.", example_uk: "Я пишу листа бабусі." }
  - { de: "Postkarte", ipa: "ˈpɔstˌkaʁtə", pos: noun, gender: f, plural: "die Postkarten", en: "postcard", ru: "почтовая открытка", uk: "поштова листівка", example_de: "Ich schicke eine Postkarte aus Berlin.", example_en: "I'm sending a postcard from Berlin.", example_ru: "Я отправляю открытку из Берлина.", example_uk: "Я надсилаю листівку з Берліна." }
  - { de: "Karte", ipa: "ˈkaʁtə", pos: noun, gender: f, plural: "die Karten", en: "card (e.g. greeting card)", ru: "открытка; карточка", uk: "листівка; картка", example_de: "Ich schreibe eine Karte zum Geburtstag.", example_en: "I'm writing a card for the birthday.", example_ru: "Я пишу открытку на день рождения.", example_uk: "Я пишу листівку до дня народження.", note: { en: "Broader than Postkarte: any card (birthday, greeting) — not only a stamped mailing card.", ru: "Karte шире, чем Postkarte: любая открытка/карточка, не обязательно почтовая.", uk: "Karte ширше, ніж Postkarte: будь-яка листівка чи картка, не обов'язково поштова." } }
  - { de: "Briefmarke", ipa: "ˈbʁiːfˌmaʁkə", pos: noun, gender: f, plural: "die Briefmarken", en: "postage stamp", ru: "почтовая марка", uk: "поштова марка", example_de: "Der Brief braucht eine Briefmarke.", example_en: "The letter needs a stamp.", example_ru: "Письму нужна марка.", example_uk: "Листу потрібна марка." }
  - { de: "schicken", ipa: "ˈʃɪkn̩", pos: verb, en: "to send", ru: "посылать, отправлять", uk: "надсилати, відправляти", example_de: "Ich schicke ein Foto an meine Oma.", example_en: "I am sending a photo to my grandma.", example_ru: "Я отправляю фото бабушке.", example_uk: "Я надсилаю фото бабусі.", partizip2: "geschickt", aux: haben, praesens_3sg: "schickt", valence: "+ Akk" }
  - { de: "senden", ipa: "ˈzɛndn̩", pos: verb, en: "to send; to broadcast", ru: "отправлять, посылать", uk: "надсилати; транслювати", example_de: "Ich sende eine Nachricht an Paul.", example_en: "I am sending a message to Paul.", example_ru: "Я отправляю сообщение Паулю.", example_uk: "Я надсилаю повідомлення Паулю.", partizip2: "gesendet", aux: haben, praesens_3sg: "sendet", valence: "+ Akk", note: { en: "Near-synonym of schicken; senden also means \"to broadcast\": Das Radio sendet Musik.", ru: "Почти синоним schicken; senden значит ещё «транслировать»: Das Radio sendet Musik.", uk: "Майже синонім schicken; senden означає ще «транслювати»: Das Radio sendet Musik." } }
  - { de: "Zeitung", ipa: "ˈtsaɪ̯tʊŋ", pos: noun, gender: f, plural: "die Zeitungen", en: "newspaper", ru: "газета", uk: "газета", example_de: "Mein Vater liest jeden Morgen die Zeitung.", example_en: "My father reads the newspaper every morning.", example_ru: "Мой отец читает газету каждое утро.", example_uk: "Мій батько читає газету щоранку." }
  - { de: "Buch", ipa: "ˈbuːx", pos: noun, gender: n, plural: "die Bücher", en: "book", ru: "книга", uk: "книжка", example_de: "Ich lese ein Buch über Deutschland.", example_en: "I'm reading a book about Germany.", example_ru: "Я читаю книгу о Германии.", example_uk: "Я читаю книжку про Німеччину." }
  - { de: "Radio", ipa: "ˈʁaːdio", pos: noun, gender: n, plural: "die Radios", en: "radio", ru: "радио", uk: "радіо", example_de: "Wir hören Radio in der Küche.", example_en: "We listen to the radio in the kitchen.", example_ru: "Мы слушаем радио на кухне.", example_uk: "Ми слухаємо радіо на кухні." }
  - { de: "Fernsehen", ipa: "ˈfɛʁnˌzeːən", pos: noun, gender: n, plural: "—", en: "television (the medium)", ru: "телевидение", uk: "телебачення", example_de: "Ich sehe einen Film im Fernsehen.", example_en: "I'm watching a movie on TV.", example_ru: "Я смотрю фильм по телевизору.", example_uk: "Я дивлюся фільм по телевізору.", note: { en: "The related verb is fernsehen (separable): er sieht fern (present), ferngesehen (Partizip II) — don't confuse it with this noun.", ru: "Родственный глагол — fernsehen (отделяемый): er sieht fern (наст. время), ferngesehen (Partizip II) — не путать с этим существительным.", uk: "Споріднене дієслово — fernsehen (відокремлюване): er sieht fern (теперішній час), ferngesehen (Partizip II) — не плутайте з цим іменником." } }
  - { de: "Fernseher", ipa: "ˈfɛʁnˌzeːɐ", pos: noun, gender: m, plural: "die Fernseher", en: "television set; TV", ru: "телевизор", uk: "телевізор", example_de: "Der Fernseher steht im Wohnzimmer.", example_en: "The TV stands in the living room.", example_ru: "Телевизор стоит в гостиной.", example_uk: "Телевізор стоїть у вітальні." }
  - { de: "Foto", ipa: "ˈfoːto", pos: noun, gender: n, plural: "die Fotos", en: "photo", ru: "фото; фотография", uk: "фото; фотографія", example_de: "Ich mache ein Foto von meiner Familie.", example_en: "I'm taking a photo of my family.", example_ru: "Я делаю фото своей семьи.", example_uk: "Я роблю фото своєї сім'ї." }
  - { de: "Information", ipa: "ɪnfɔʁmaˈtsjoːn", pos: noun, gender: f, plural: "die Informationen", en: "(piece of) information", ru: "информация", uk: "інформація", example_de: "Ich brauche Informationen über den Kurs.", example_en: "I need information about the course.", example_ru: "Мне нужна информация о курсе.", example_uk: "Мені потрібна інформація про курс." }
  - { de: "informieren", ipa: "ɪnfɔʁˈmiːʁən", pos: verb, en: "to inform", ru: "информировать, сообщать", uk: "інформувати, повідомляти", example_de: "Die Lehrerin informiert die Schüler über den Termin.", example_en: "The teacher informs the students about the appointment.", example_ru: "Учительница информирует учеников о встрече.", example_uk: "Учителька інформує учнів про зустріч.", partizip2: "informiert", aux: haben, praesens_3sg: "informiert", valence: "+ Akk", note: { en: "Often used with über + Akkusativ for the topic: informieren über etwas.", ru: "Часто используется с über + Akkusativ для темы: informieren über etwas.", uk: "Часто вживається з über + Akkusativ для теми: informieren über etwas." } }
  - { de: "Nachricht", ipa: "ˈnaːxʁɪçt", pos: noun, gender: f, plural: "die Nachrichten", en: "message; (pl.) the news", ru: "сообщение; (мн.ч.) новости", uk: "повідомлення; (мн.) новини", example_de: "Ich lese deine Nachricht.", example_en: "I'm reading your message.", example_ru: "Я читаю твоё сообщение.", example_uk: "Я читаю твоє повідомлення.", note: { en: "Plural die Nachrichten also means \"the news\" (a TV/radio broadcast): Wir sehen die Nachrichten.", ru: "Множественное число die Nachrichten значит ещё «новости» (теле/радиопередача): Wir sehen die Nachrichten.", uk: "Множина die Nachrichten означає ще «новини» (теле- чи радіопередачу): Wir sehen die Nachrichten." } }
  - { de: "Antwort", ipa: "ˈantvɔʁt", pos: noun, gender: f, plural: "die Antworten", en: "answer; reply", ru: "ответ", uk: "відповідь", example_de: "Deine Antwort ist richtig.", example_en: "Your answer is correct.", example_ru: "Твой ответ правильный.", example_uk: "Твоя відповідь правильна." }
  - { de: "Frage", ipa: "ˈfʁaːgə", pos: noun, gender: f, plural: "die Fragen", en: "question", ru: "вопрос", uk: "питання; запитання", example_de: "Ich habe eine Frage.", example_en: "I have a question.", example_ru: "У меня есть вопрос.", example_uk: "У мене є питання." }
  - { de: "wiederholen", ipa: "viːdɐˈhoːlən", pos: verb, en: "to repeat", ru: "повторять", uk: "повторювати", example_de: "Ich wiederhole die Wörter jeden Tag.", example_en: "I repeat the words every day.", example_ru: "Я повторяю слова каждый день.", example_uk: "Я повторюю слова щодня.", partizip2: "wiederholt", aux: haben, praesens_3sg: "wiederholt", valence: "+ Akk", note: { en: "Looks separable (wieder- as in wiederkommen) but wiederholen is inseparable: er wiederholt, Partizip II wiederholt (no ge-).", ru: "Выглядит отделяемым (wieder- как в wiederkommen), но wiederholen — неотделяемый: er wiederholt, Partizip II — wiederholt (без ge-).", uk: "Виглядає відокремлюваним (wieder- як у wiederkommen), але wiederholen — невідокремлюване: er wiederholt, Partizip II — wiederholt (без ge-)." } }
  - { de: "bedeuten", ipa: "bəˈdɔʏ̯tn̩", pos: verb, en: "to mean; to signify", ru: "означать", uk: "означати", example_de: "Was bedeutet dieses Wort?", example_en: "What does this word mean?", example_ru: "Что значит это слово?", example_uk: "Що означає це слово?", partizip2: "bedeutet", aux: haben, praesens_3sg: "bedeutet" }
