id: nebensaetze-plaene
title_de: "Gründe, Meinungen & Pläne"
title_en: "Reasons, opinions & plans"
title_ru: "Причины, мнения и планы"
title_uk: "Причини, думки та плани"
level: A2
entries:
  # The connectors themselves (weil, dass, wenn, denn) are already cards in
  # kernwortschatz-a2 — this topic teaches their SYNTAX, not the words. The deck is
  # therefore deliberately thin: the words you need in order to have a reason, an
  # opinion or a plan worth putting into a Nebensatz, plus three chunks that carry
  # the three patterns whole.

  # --- Gründe & Probleme ---
  - de: Grund
    ipa: "ˈgʁʊnt"
    pos: noun
    gender: m
    plural: "die Gründe"
    en: reason
    ru: причина, основание
    uk: причина, підстава
    example_de: "Yusuf hat einen Grund: Er muss am Sonntag arbeiten."
    example_en: "Yusuf has a reason: he has to work on Sunday."
    example_ru: "У Юсуфа есть причина: в воскресенье он должен работать."
    example_uk: "У Юсуфа є причина: у неділю він мусить працювати."
    note:
      en: "einen Grund haben / nennen — to have / to give a reason. The reason itself usually follows in a weil-clause, with the conjugated verb at the very end: Ich komme nicht, weil ich arbeiten muss."
      ru: "einen Grund haben / nennen — иметь / назвать причину. Саму причину обычно вводит придаточное с weil: Ich nenne dir den Grund: Ich muss arbeiten."
      uk: "einen Grund haben / nennen — мати / назвати причину. Саму причину зазвичай вводить підрядне з weil: Ich nenne dir den Grund: Ich muss arbeiten."
  - de: Problem
    ipa: "pʁoˈbleːm"
    pos: noun
    gender: n
    plural: "die Probleme"
    en: problem
    ru: проблема
    uk: проблема
    example_de: Wenn es regnet, haben wir ein Problem.
    example_en: If it rains, we have a problem.
    example_ru: Если пойдёт дождь, у нас будет проблема.
    example_uk: Якщо піде дощ, у нас буде проблема.
    note:
      en: "The everyday reply Kein Problem! means 'no problem, that's fine' — the noun stays without an article there."
      ru: "Разговорный ответ Kein Problem! означает «никаких проблем, всё в порядке» — артикль в этой формуле не ставится."
      uk: "Розмовна відповідь Kein Problem! означає «жодних проблем, усе гаразд» — артикль у цій формулі не ставиться."
  - de: Lösung
    ipa: "ˈløːzʊŋ"
    pos: noun
    gender: f
    plural: "die Lösungen"
    en: solution
    ru: решение (проблемы)
    uk: рішення (проблеми)
    example_de: Das Museum ist die Lösung, wenn das Wetter schlecht ist.
    example_en: The museum is the solution if the weather is bad.
    example_ru: Музей — вот решение, если погода будет плохой.
    example_uk: Музей — ось рішення, якщо погода буде погана.
  - de: deshalb
    ipa: "dɛsˈhalp"
    pos: adv
    en: therefore, that is why
    ru: поэтому
    uk: тому, тож
    example_de: Yusuf muss arbeiten. Deshalb kommt er nicht mit.
    example_en: Yusuf has to work. That is why he is not coming along.
    example_ru: Юсуф должен работать. Поэтому он не поедет с нами.
    example_uk: Юсуф мусить працювати. Тому він не поїде з нами.
    note:
      en: "deshalb names the consequence, not the reason: weil answers 'why?', deshalb answers 'so what follows?'. It stands in position 1 of a main clause, so the verb comes straight after it: Deshalb kommt er nicht — never Deshalb er kommt nicht."
      ru: "deshalb вводит следствие, а не причину: weil отвечает на вопрос «почему?», а deshalb — «и что из этого?». Слово занимает первое место в главном предложении, поэтому глагол идёт сразу за ним: Deshalb kommt er nicht — но не Deshalb er kommt nicht."
      uk: "deshalb вводить наслідок, а не причину: weil відповідає на питання «чому?», а deshalb — «і що з цього?». Слово займає перше місце в головному реченні, тому дієслово йде одразу за ним: Deshalb kommt er nicht — але не Deshalb er kommt nicht."

  # --- Meinungen ---
  - de: Meinung
    ipa: "ˈmaɪ̯nʊŋ"
    pos: noun
    gender: f
    plural: "die Meinungen"
    en: opinion
    ru: мнение
    uk: думка
    example_de: Was ist deine Meinung? Fahren wir am Samstag oder am Sonntag?
    example_en: What is your opinion? Shall we go on Saturday or on Sunday?
    example_ru: Какое твоё мнение? Поедем в субботу или в воскресенье?
    example_uk: Яка твоя думка? Поїдемо в суботу чи в неділю?
    note:
      en: "meiner Meinung nach = 'in my opinion' — a fixed phrase, and the noun goes in front of nach here."
      ru: "meiner Meinung nach — «по-моему», устойчивое выражение; предлог nach стоит после существительного."
      uk: "meiner Meinung nach — «на мою думку», стійкий вислів; прийменник nach стоїть після іменника."
  - de: meinen
    ipa: "ˈmaɪ̯nən"
    pos: verb
    en: to think, to be of the opinion
    ru: считать, полагать
    uk: вважати, гадати
    example_de: Ich meine, dass der Sonntag besser ist.
    example_en: I think Sunday is better.
    example_ru: Я считаю, что воскресенье лучше.
    example_uk: Я вважаю, що неділя краща.
    partizip2: gemeint
    aux: haben
    praesens_3sg: meint
    note:
      en: "meinen states an opinion; glauben states a belief. Both open a dass-clause with the verb at the end: Ich meine, dass es klappt."
      ru: "meinen выражает мнение, glauben — уверенность. Оба вводят придаточное с dass, где глагол стоит в конце: Ich meine, dass es klappt."
      uk: "meinen виражає думку, glauben — упевненість. Обидва вводять підрядне з dass, де дієслово стоїть у кінці: Ich meine, dass es klappt."
  - de: hoffen
    ipa: "ˈhɔfn̩"
    pos: verb
    en: to hope
    ru: надеяться
    uk: сподіватися
    example_de: Ich hoffe, dass die Sonne scheint.
    example_en: I hope the sun shines.
    example_ru: Надеюсь, что будет солнце.
    example_uk: Сподіваюся, що буде сонце.
    partizip2: gehofft
    aux: haben
    praesens_3sg: hofft
    note:
      en: "English can leave 'that' out — 'I hope the sun shines'. German cannot leave out dass once you start the clause with it, and it cannot leave out the comma either."
      ru: "После hoffen придаточное вводит dass, и запятая перед ним обязательна — как и в русском перед «что»."
      uk: "Після hoffen підрядне вводить dass, і кома перед ним обов'язкова — як і в українській перед «що»."
  - de: wahrscheinlich
    ipa: "vaːɐ̯ˈʃaɪ̯nlɪç"
    pos: adv
    en: probably
    ru: вероятно, скорее всего
    uk: імовірно, найпевніше
    example_de: Am Sonntag regnet es wahrscheinlich nicht.
    example_en: It probably won't rain on Sunday.
    example_ru: В воскресенье, скорее всего, дождя не будет.
    example_uk: У неділю, найпевніше, дощу не буде.

  # --- Pläne ---
  - de: Plan
    ipa: "ˈplaːn"
    pos: noun
    gender: m
    plural: "die Pläne"
    en: plan
    ru: план
    uk: план
    example_de: "Mein Plan für Sonntag ist einfach: Wir fahren zum See."
    example_en: "My plan for Sunday is simple: we drive to the lake."
    example_ru: "Мой план на воскресенье прост: мы едем на озеро."
    example_uk: "Мій план на неділю простий: ми їдемо на озеро."
  - de: planen
    ipa: "ˈplaːnən"
    pos: verb
    en: to plan
    ru: планировать
    uk: планувати
    example_de: Nina plant einen Ausflug zum See.
    example_en: Nina is planning a day trip to the lake.
    example_ru: Нина планирует поездку на озеро.
    example_uk: Ніна планує поїздку на озеро.
    partizip2: geplant
    aux: haben
    praesens_3sg: plant
    valence: "+ Akk"
  - de: Vorschlag
    ipa: "ˈfoːɐ̯ˌʃlaːk"
    pos: noun
    gender: m
    plural: "die Vorschläge"
    en: suggestion, proposal
    ru: предложение (идея)
    uk: пропозиція (ідея)
    example_de: "Ich mache einen Vorschlag: Wir treffen uns um neun am Bahnhof."
    example_en: "I have a suggestion: let's meet at nine at the station."
    example_ru: "У меня предложение: встретимся в девять на вокзале."
    example_uk: "У мене пропозиція: зустрінемося о дев'ятій на вокзалі."
    note:
      en: "The verb that goes with it is machen: einen Vorschlag machen. Careful with the plural — Vorschläge takes an Umlaut."
      ru: "Употребляется с глаголом machen: einen Vorschlag machen. Во множественном числе появляется умлаут: Vorschläge."
      uk: "Уживається з дієсловом machen: einen Vorschlag machen. У множині з'являється умлаут: Vorschläge."
  - de: Idee
    ipa: "iˈdeː"
    pos: noun
    gender: f
    plural: "die Ideen"
    en: idea
    ru: идея
    uk: ідея
    example_de: "Ich habe eine Idee: Wenn es regnet, gehen wir ins Museum."
    example_en: "I have an idea: if it rains, we'll go to the museum."
    example_ru: "У меня идея: если пойдёт дождь, мы пойдём в музей."
    example_uk: "У мене ідея: якщо піде дощ, ми підемо в музей."
    note:
      en: "Stress falls on the second syllable: I-DEE. The plural Ideen is two syllables at the end — I-de-en."
      ru: "Ударение падает на второй слог: I-DEE. Во множественном числе Ideen читается в три слога: I-de-en."
      uk: "Наголос падає на другий склад: I-DEE. У множині Ideen читається у три склади: I-de-en."

  # --- Bausteine (chunks: one pattern each, learned whole) ---
  - de: "Ich glaube, dass es klappt."
    pos: phrase
    en: I think it will work out.
    ru: Думаю, что всё получится.
    uk: Думаю, що все вийде.
    example_de: Das Wetter? Ich glaube, dass es klappt.
    example_en: The weather? I think it will work out.
    example_ru: Погода? Думаю, что всё получится.
    example_uk: Погода? Думаю, що все вийде.
    note:
      en: "The chunk carries the dass-pattern whole: comma, dass, and the conjugated verb (klappt) at the very end. Swap in any content you like — Ich glaube, dass Yusuf kommt."
      ru: "Готовый образец конструкции с dass: запятая, dass — и спрягаемый глагол (klappt) в самом конце. Содержание можно менять: Ich glaube, dass Yusuf kommt."
      uk: "Готовий зразок конструкції з dass: кома, dass — і відмінюване дієслово (klappt) у самому кінці. Зміст можна міняти: Ich glaube, dass Yusuf kommt."
  - de: "Wenn es regnet, bleiben wir zu Hause."
    pos: phrase
    en: If it rains, we'll stay at home.
    ru: Если пойдёт дождь, мы останемся дома.
    uk: Якщо піде дощ, ми залишимося вдома.
    example_de: Wenn es regnet, bleiben wir zu Hause. Aber ich hoffe, dass die Sonne scheint.
    example_en: If it rains, we'll stay at home. But I hope the sun shines.
    example_ru: Если пойдёт дождь, мы останемся дома. Но я надеюсь, что будет солнце.
    example_uk: Якщо піде дощ, ми залишимося вдома. Але я сподіваюся, що буде сонце.
    note:
      en: "Both rules in one sentence: regnet closes the wenn-clause, and because that clause fills position 1, the main verb bleiben follows immediately after the comma — bleiben wir, not wir bleiben."
      ru: "Оба правила в одном предложении: regnet замыкает придаточное с wenn, а поскольку это придаточное занимает первое место, глагол главного предложения bleiben стоит сразу после запятой — bleiben wir, а не wir bleiben."
      uk: "Обидва правила в одному реченні: regnet замикає підрядне з wenn, а оскільки це підрядне займає перше місце, дієслово головного речення bleiben стоїть одразу після коми — bleiben wir, а не wir bleiben."
  - de: "Ich würde gern mitkommen."
    pos: phrase
    en: I would love to come along.
    ru: Я бы с удовольствием поехал(а) с вами.
    uk: Я б із задоволенням поїхав(-ла) з вами.
    example_de: Ich würde gern mitkommen, aber ich muss am Sonntag arbeiten.
    example_en: I would love to come along, but I have to work on Sunday.
    example_ru: Я бы с удовольствием поехал с вами, но в воскресенье мне нужно работать.
    example_uk: Я б із задоволенням поїхав з вами, але в неділю мені треба працювати.
    note:
      en: "Learn würde gern as a fixed building block for a wish you cannot act on — the full verb form behind it comes much later. It behaves like a modal: the infinitive (mitkommen) closes the sentence."
      ru: "würde gern запоминается как готовый блок для желания, которое пока не осуществимо; сама форма würde разбирается гораздо позже. Ведёт себя как модальный глагол: инфинитив (mitkommen) уходит в конец предложения."
      uk: "würde gern запам'ятовується як готовий блок для бажання, яке поки що не здійсненне; сама форма würde розбирається значно пізніше. Поводиться як модальне дієслово: інфінітив (mitkommen) іде в кінець речення."
