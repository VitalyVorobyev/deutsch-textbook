# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the second half of the
# alltag-handlungen manifest section (verbs K–Z).
id: verben-handlungen-a2-2
title_de: "Handlungen & Verben (2)"
title_en: "Actions & verbs (2)"
title_ru: "Действия и глаголы (2)"
level: A2
entries:
  - de: sich umziehen
    ipa: "zɪç ˈʊmˌtsiːən"
    pos: verb
    praesens_3sg: zieht sich um
    partizip2: sich umgezogen
    aux: haben
    en: to change clothes, to get changed
    ru: переодеваться
    example_de: Nach der Arbeit ziehe ich mich schnell um.
    example_en: After work I quickly get changed.
    example_ru: После работы я быстро переодеваюсь.
    note:
      en: 'Separable and reflexive at the same time: ich ziehe mich um, ich habe mich umgezogen. With sich it means "get changed" and takes haben; without sich, umziehen means "to move house" and takes sein (wir sind umgezogen).'
      ru: 'Одновременно отделяемая приставка и sich: ich ziehe mich um, ich habe mich umgezogen. С sich — «переодеваться», перфект с haben; без sich umziehen значит «переезжать», и перфект с sein (wir sind umgezogen).'
  - de: verbieten
    ipa: "fɛɐ̯ˈbiːtn̩"
    pos: verb
    praesens_3sg: verbietet
    partizip2: verboten
    aux: haben
    valence: "+ Dat + Akk"
    en: to forbid, to ban
    ru: запрещать
    example_de: Der Arzt hat meinem Vater das Rauchen verboten.
    example_en: The doctor has forbidden my father to smoke.
    example_ru: Врач запретил моему отцу курить.
    note:
      en: 'Inseparable ver- prefix — Partizip II without ge-: hat verboten. The person is dative, the thing accusative: Sie verbietet dem Kind das Handy. The opposite verb is erlauben.'
      ru: 'Неотделяемая приставка ver- — Partizip II без ge-: hat verboten. Человек в Dativ, предмет в Akkusativ: Sie verbietet dem Kind das Handy. Антоним — erlauben.'
  - de: verboten sein
    ipa: "fɛɐ̯ˈboːtn̩ zaɪ̯n"
    pos: phrase
    en: to be forbidden, to be not allowed
    ru: быть запрещённым, нельзя
    example_de: Rauchen ist hier verboten.
    example_en: Smoking is not allowed here.
    example_ru: Здесь курить запрещено.
    note:
      en: 'The everyday sign-and-rule phrase, built on verbieten: Das Parken ist verboten. Its opposite is erlaubt sein. With a person, use the modal: Du darfst hier nicht rauchen.'
      ru: 'Повседневная формула запретов, от глагола verbieten: Das Parken ist verboten. Антоним — erlaubt sein. Если речь о человеке, берут модальный глагол: Du darfst hier nicht rauchen.'
  - de: kontrollieren
    ipa: "kɔntʁɔˈliːʁən"
    pos: verb
    praesens_3sg: kontrolliert
    partizip2: kontrolliert
    aux: haben
    valence: "+ Akk"
    en: to check, to inspect
    ru: проверять
    example_de: Im Zug hat ein Mann unsere Fahrkarten kontrolliert.
    example_en: A man checked our tickets on the train.
    example_ru: В поезде мужчина проверил наши билеты.
    note:
      en: '-ieren verb — Partizip II without ge-: hat kontrolliert. It means "to check, to inspect". For "to control" in the sense of steering something, German uses steuern.'
      ru: 'Глагол на -ieren — Partizip II без ge-: hat kontrolliert. Значит «проверять, досматривать», а не «управлять» (это steuern).'
  - de: kriegen
    ipa: "ˈkʁiːgn̩"
    pos: verb
    praesens_3sg: kriegt
    partizip2: gekriegt
    aux: haben
    valence: "+ Akk"
    en: to get, to receive (colloquial)
    ru: получать (разговорное)
    example_de: Zum Geburtstag habe ich ein neues Fahrrad gekriegt.
    example_en: I got a new bike for my birthday.
    example_ru: На день рождения я получил новый велосипед.
    note:
      en: 'The everyday spoken synonym of bekommen. Perfectly normal in conversation, but in a letter or an exam write bekommen: Ich habe ein Paket bekommen.'
      ru: 'Разговорный синоним bekommen. В устной речи звучит совершенно естественно, но в письме и на экзамене лучше bekommen: Ich habe ein Paket bekommen.'
  - de: lassen
    ipa: "ˈlasn̩"
    pos: verb
    praesens_3sg: lässt
    partizip2: gelassen
    aux: haben
    valence: "+ Akk"
    en: to leave (something somewhere); to let, to have something done
    ru: оставлять; давать/поручать сделать
    example_de: Ich habe meinen Schlüssel zu Hause gelassen.
    example_en: I left my key at home.
    example_ru: Я оставил ключ дома.
    note:
      en: 'Stem change: du lässt, er lässt. Two everyday uses. (1) Leave something somewhere: Ich lasse die Tasche im Büro. (2) Have something done by somebody else, with a bare infinitive and no zu: Ich lasse mein Auto reparieren.'
      ru: 'Смена гласной: du lässt, er lässt. Два повседневных значения. (1) «Оставить где-то»: Ich lasse die Tasche im Büro. (2) «Поручить, отдать сделать» — с инфинитивом без zu: Ich lasse mein Auto reparieren («отдаю машину в ремонт»).'
  - de: leihen
    ipa: "ˈlaɪ̯ən"
    pos: verb
    praesens_3sg: leiht
    partizip2: geliehen
    aux: haben
    valence: "+ Dat + Akk"
    en: to lend
    ru: одалживать, давать взаймы
    example_de: Kannst du mir bitte zehn Euro leihen?
    example_en: Could you lend me ten euros, please?
    example_ru: Ты можешь одолжить мне десять евро?
    note:
      en: 'jemandem etwas leihen — the person is dative, the thing accusative: Ich leihe meinem Bruder das Fahrrad. For the other direction, "to borrow", German says sich etwas leihen: Ich leihe mir ein Buch.'
      ru: 'jemandem etwas leihen — человек в Dativ, вещь в Akkusativ: Ich leihe meinem Bruder das Fahrrad. Обратное направление, «взять взаймы», — sich etwas leihen: Ich leihe mir ein Buch.'
  - de: leidtun
    ipa: "ˈlaɪ̯tˌtuːn"
    pos: verb
    praesens_3sg: tut leid
    partizip2: leidgetan
    aux: haben
    valence: "+ Dat"
    en: to be sorry, to feel sorry for
    ru: быть жаль, сожалеть
    example_de: Es tut mir leid, ich habe heute keine Zeit.
    example_en: I am sorry, I have no time today.
    example_ru: Мне жаль, у меня сегодня нет времени.
    note:
      en: 'German builds this impersonally: Es tut mir leid — literally "it does me sorrow". Never "Ich bin leid". The person stands in the dative: Es tut ihm leid. And Der Hund tut mir leid = I feel sorry for the dog.'
      ru: 'Немецкий строит безличную фразу: Es tut mir leid (буквально «это причиняет мне печаль»). Сказать «Ich bin leid» нельзя — это калька с «мне жаль». Человек — в Dativ: Es tut ihm leid. Der Hund tut mir leid — «мне жаль собаку».'
  - de: merken
    ipa: "ˈmɛʁkn̩"
    pos: verb
    praesens_3sg: merkt sich
    partizip2: sich gemerkt
    aux: haben
    valence: "sich (Dat) + Akk"
    en: to memorize, to keep in mind
    ru: запоминать
    example_de: Ich kann mir seinen Namen einfach nicht merken.
    example_en: I simply cannot remember his name.
    example_ru: Я никак не могу запомнить его имя.
    note:
      en: 'Learn it as sich etwas merken = to fix something in your memory: Merk dir die Nummer! It does NOT mean "to notice" — that is bemerken: Ich habe den Fehler sofort bemerkt.'
      ru: 'Запоминайте как sich etwas merken — «запомнить»: Merk dir die Nummer! Это НЕ «заметить»: «заметить» — bemerken (Ich habe den Fehler sofort bemerkt).'
  - de: nennen
    ipa: "ˈnɛnən"
    pos: verb
    praesens_3sg: nennt
    partizip2: genannt
    aux: haben
    valence: "+ Akk"
    en: to call, to name
    ru: называть
    example_de: Alle nennen ihn nur Max.
    example_en: Everybody just calls him Max.
    example_ru: Все зовут его просто Максом.
    note:
      en: 'A mixed verb — vowel change plus the weak -t ending: nennen – nannte – hat genannt, like kennen and denken. It takes two accusatives: Sie nennen das Kind Anna.'
      ru: 'Смешанный глагол: чередование гласной плюс слабое окончание -t — nennen – nannte – hat genannt (как kennen, denken). Управляет двумя Akkusativ: Sie nennen das Kind Anna.'
  - de: rufen
    ipa: "ˈʁuːfn̩"
    pos: verb
    praesens_3sg: ruft
    partizip2: gerufen
    aux: haben
    valence: "+ Akk"
    en: to call, to shout for
    ru: звать, вызывать
    example_de: Bitte rufen Sie einen Arzt!
    example_en: Please call a doctor!
    example_ru: Пожалуйста, вызовите врача!
    note:
      en: 'rufen is calling out or sending for somebody: Ich rufe ein Taxi. Calling on the phone is the separable anrufen: Ich rufe dich heute Abend an.'
      ru: 'rufen — «звать, вызывать»: Ich rufe ein Taxi. Звонить по телефону — отделяемый anrufen: Ich rufe dich heute Abend an.'
  - de: raten
    ipa: "ˈʁaːtn̩"
    pos: verb
    praesens_3sg: rät
    partizip2: geraten
    aux: haben
    valence: "+ Dat"
    en: to advise; to guess
    ru: советовать; угадывать
    example_de: "Ich rate dir: Nimm den Zug, das ist billiger."
    example_en: "Here is my advice: take the train, it is cheaper."
    example_ru: "Советую тебе: поезжай на поезде, так дешевле."
    note:
      en: 'Two A2 senses. (1) To advise — the person is dative: Ich rate dir, der Arzt rät ihm. (2) To guess: Rate mal, wer heute angerufen hat! Stem change: du rätst, er rät.'
      ru: 'Два значения на уровне A2. (1) «Советовать» — человек в Dativ: Ich rate dir, der Arzt rät ihm. (2) «Угадывать»: Rate mal, wer heute angerufen hat! Смена гласной: du rätst, er rät.'
  - de: rechnen
    ipa: "ˈʁɛçnən"
    pos: verb
    praesens_3sg: rechnet
    partizip2: gerechnet
    aux: haben
    en: to calculate, to do sums
    ru: считать, вычислять
    example_de: Meine Tochter kann schon gut im Kopf rechnen.
    example_en: My daughter is already good at doing sums in her head.
    example_ru: Моя дочь уже хорошо считает в уме.
    note:
      en: 'rechnen is doing sums — plus, minus, in your head or on paper. Counting aloud (eins, zwei, drei) is zählen. With mit + Dativ it means "to expect": Wir rechnen mit Regen.'
      ru: 'rechnen — «вычислять»: плюс, минус, в уме или на бумаге. Считать вслух (раз, два, три) — zählen. С mit + Dativ значит «рассчитывать на, ожидать»: Wir rechnen mit Regen.'
  - de: reden
    ipa: "ˈʁeːdn̩"
    pos: verb
    praesens_3sg: redet
    partizip2: geredet
    aux: haben
    valence: "mit + Dat, über + Akk"
    en: to talk
    ru: разговаривать, болтать
    example_de: Wir müssen mal in Ruhe über das Problem reden.
    example_en: We really need to talk about the problem calmly.
    example_ru: Нам нужно спокойно поговорить об этой проблеме.
    note:
      en: 'Very close to sprechen, but a shade more colloquial. The partner takes mit + Dativ, the topic über + Akkusativ: Ich rede mit ihm über die Arbeit.'
      ru: 'Очень близко к sprechen, но чуть разговорнее. Собеседник — mit + Dativ, тема — über + Akkusativ: Ich rede mit ihm über die Arbeit.'
  - de: riechen
    ipa: "ˈʁiːçn̩"
    pos: verb
    praesens_3sg: riecht
    partizip2: gerochen
    aux: haben
    valence: "nach + Dat"
    en: to smell
    ru: пахнуть; нюхать
    example_de: In der Küche riecht es nach Kaffee.
    example_en: The kitchen smells of coffee.
    example_ru: На кухне пахнет кофе.
    note:
      en: 'Usually impersonal: Es riecht nach Fisch — it smells OF fish, with nach + Dativ. Also gut or schlecht riechen: Die Blumen riechen gut. Strong verb: hat gerochen.'
      ru: 'Обычно безлично: Es riecht nach Fisch — «пахнет рыбой», nach + Dativ. Также gut/schlecht riechen: Die Blumen riechen gut. Сильный глагол: hat gerochen.'
  - de: schaffen
    ipa: "ˈʃafn̩"
    pos: verb
    praesens_3sg: schafft
    partizip2: geschafft
    aux: haben
    valence: "+ Akk"
    en: to manage, to pull off, to get done
    ru: справляться, успевать, осиливать
    example_de: Ich habe die Prüfung geschafft!
    example_en: I passed the exam!
    example_ru: Я сдал экзамен!
    note:
      en: 'The everyday sense is "to manage": Wir schaffen das. Ich habe es geschafft! = I made it! Ich schaffe den Bus nicht mehr = I will not catch the bus. (The rare sense "to create" is a different, strong verb: schuf, geschaffen.)'
      ru: 'Повседневное значение — «справиться, успеть»: Wir schaffen das. Ich habe es geschafft! — «У меня получилось!» Ich schaffe den Bus nicht mehr — «я уже не успею на автобус». (Редкое значение «создавать» — это другой, сильный глагол: schuf, geschaffen.)'
  - de: schneiden
    ipa: "ˈʃnaɪ̯dn̩"
    pos: verb
    praesens_3sg: schneidet
    partizip2: geschnitten
    aux: haben
    valence: "+ Akk"
    en: to cut
    ru: резать, нарезать
    example_de: Kannst du bitte das Brot schneiden?
    example_en: Could you cut the bread, please?
    example_ru: Ты можешь нарезать хлеб?
    note:
      en: 'Strong verb: schneiden – hat geschnitten. For an accident it goes reflexive: Ich habe mich in den Finger geschnitten.'
      ru: 'Сильный глагол: schneiden – hat geschnitten. О порезе говорят с sich: Ich habe mich in den Finger geschnitten.'
  - de: setzen
    ipa: "ˈzɛtsn̩"
    pos: verb
    praesens_3sg: setzt
    partizip2: gesetzt
    aux: haben
    valence: "+ Akk"
    en: to put, to seat (someone somewhere)
    ru: сажать, усаживать
    example_de: Die Mutter setzt das Kind auf den Stuhl.
    example_en: The mother sits the child on the chair.
    example_ru: Мама сажает ребёнка на стул.
    note:
      en: 'The fourth placement verb, next to stellen, legen and hängen: setzen is transitive and answers Wohin? — auf den Stuhl (Akkusativ). Its position partner is sitzen, which answers Wo? — auf dem Stuhl (Dativ): Ich setze mich auf den Stuhl, dann sitze ich auf dem Stuhl.'
      ru: 'Четвёртый «глагол размещения» рядом со stellen, legen и hängen: setzen переходный и отвечает на Wohin? — auf den Stuhl (Akkusativ). Его пара по положению — sitzen, отвечающий на Wo? — auf dem Stuhl (Dativ): Ich setze mich auf den Stuhl, dann sitze ich auf dem Stuhl.'
  - de: sterben
    ipa: "ˈʃtɛʁbn̩"
    pos: verb
    praesens_3sg: stirbt
    partizip2: gestorben
    aux: sein
    en: to die
    ru: умирать
    example_de: Sein Großvater ist letztes Jahr gestorben.
    example_en: His grandfather died last year.
    example_ru: Его дедушка умер в прошлом году.
    note:
      en: 'Perfekt with sein — a change of state, like bleiben and the movement verbs: Er ist gestorben. Stem change in the singular: du stirbst, er stirbt.'
      ru: 'Перфект с sein — это смена состояния, как у bleiben и глаголов движения: Er ist gestorben. Чередование в единственном числе: du stirbst, er stirbt.'
  - de: stören
    ipa: "ˈʃtøːʁən"
    pos: verb
    praesens_3sg: stört
    partizip2: gestört
    aux: haben
    valence: "+ Akk"
    en: to disturb, to interrupt, to bother
    ru: мешать, беспокоить
    example_de: Störe ich? — Nein, gar nicht, komm herein!
    example_en: Am I interrupting? — No, not at all, come in!
    example_ru: Я не помешаю? — Нет, совсем нет, заходи!
    note:
      en: 'The person you disturb stands in the accusative: Das stört mich nicht. Störe ich? in a doorway is the standard polite question — the German for "am I interrupting?"'
      ru: 'Тот, кому мешают, стоит в Akkusativ: Das stört mich nicht. Störe ich? в дверях — стандартная вежливая фраза «Я не помешаю?». Обратите внимание: по-русски «мешать кому?» (дательный), а по-немецки — Akkusativ.'
  - de: teilen
    ipa: "ˈtaɪ̯lən"
    pos: verb
    praesens_3sg: teilt
    partizip2: geteilt
    aux: haben
    valence: "+ Akk"
    en: to share; to divide
    ru: делить, делиться
    example_de: Meine Schwester und ich teilen ein Zimmer.
    example_en: My sister and I share a room.
    example_ru: Мы с сестрой делим одну комнату.
    note:
      en: 'Sharing with somebody takes mit + Dativ: Ich teile das Zimmer mit meiner Schwester. Dividing something into parts takes in + Akkusativ: Teile den Kuchen in acht Stücke.'
      ru: 'Делиться с кем-то — mit + Dativ: Ich teile das Zimmer mit meiner Schwester. Разделить на части — in + Akkusativ: Teile den Kuchen in acht Stücke.'
  - de: tun
    ipa: "ˈtuːn"
    pos: verb
    praesens_3sg: tut
    partizip2: getan
    aux: haben
    valence: "+ Akk"
    en: to do
    ru: делать
    example_de: Was kann ich für dich tun?
    example_en: What can I do for you?
    example_ru: Что я могу для тебя сделать?
    note:
      en: 'For concrete activities German prefers machen (Hausaufgaben machen). tun lives mostly in fixed expressions: Es tut mir leid, Das tut weh, Was kann ich für Sie tun? Irregular forms: er tut, hat getan.'
      ru: 'Для конкретных занятий немецкий предпочитает machen (Hausaufgaben machen). tun живёт в основном в устойчивых оборотах: Es tut mir leid, Das tut weh, Was kann ich für Sie tun? Формы нестандартные: er tut, hat getan.'
  # The forms carry `sich`, because without it this is a different verb: bare
  # `unterhalten` means to entertain or to support someone. The flashcard's detail
  # line shows exactly these two fields, so dropping the pronoun there would teach
  # the wrong pattern under the right gloss.
  - de: unterhalten
    ipa: "ʊntɐˈhaltn̩"
    pos: verb
    praesens_3sg: unterhält sich
    partizip2: sich unterhalten
    aux: haben
    valence: "sich … mit + Dat"
    en: to have a conversation, to chat (sich unterhalten)
    ru: беседовать, разговаривать (sich unterhalten)
    example_de: Ich habe mich lange mit meiner Nachbarin unterhalten.
    example_en: I had a long conversation with my neighbour.
    example_ru: Я долго беседовал с соседкой.
    note:
      en: 'At A2 you meet it as a reflexive verb: sich mit jemandem unterhalten = to have a conversation. The prefix is inseparable, so the Partizip II has no ge- and the prefix never moves: hat sich unterhalten. The topic takes über + Akkusativ. Stem change: er unterhält sich.'
      ru: 'На A2 это возвратный глагол: sich mit jemandem unterhalten — «беседовать с кем-то». Приставка неотделяемая: Partizip II без ge-, и приставка никуда не уходит — hat sich unterhalten. Тема разговора — über + Akkusativ. Чередование: er unterhält sich.'
  - de: unternehmen
    ipa: "ʊntɐˈneːmən"
    pos: verb
    praesens_3sg: unternimmt
    partizip2: unternommen
    aux: haben
    valence: "+ Akk"
    en: to do (something), to undertake
    ru: предпринимать, заниматься чем-то
    example_de: Was unternehmt ihr am Wochenende?
    example_en: What are you up to at the weekend?
    example_ru: Чем вы займётесь в выходные?
    note:
      en: 'Inseparable prefix — Partizip II without ge-: hat unternommen. Stem change like nehmen: du unternimmst, er unternimmt. Wir haben viel unternommen means "we did a lot" — trips, outings, plans.'
      ru: 'Неотделяемая приставка — Partizip II без ge-: hat unternommen. Чередование как у nehmen: du unternimmst, er unternimmt. Wir haben viel unternommen — «мы много чем занимались»: поездки, прогулки, планы.'
  - de: wählen
    ipa: "ˈvɛːlən"
    pos: verb
    praesens_3sg: wählt
    partizip2: gewählt
    aux: haben
    valence: "+ Akk"
    en: to choose; to dial; to vote
    ru: выбирать; набирать номер; голосовать
    example_de: Im Restaurant wähle ich fast immer den Fisch.
    example_en: At a restaurant I almost always choose the fish.
    example_ru: В ресторане я почти всегда выбираю рыбу.
    note:
      en: 'One verb, three everyday jobs: choosing (Ich wähle das Menü), dialling a phone number (Wählen Sie zuerst die Null) and voting (Am Sonntag wählen wir).'
      ru: 'Один глагол — три повседневных значения: «выбирать» (Ich wähle das Menü), «набирать номер» (Wählen Sie zuerst die Null) и «голосовать» (Am Sonntag wählen wir).'
  - de: wecken
    ipa: "ˈvɛkn̩"
    pos: verb
    praesens_3sg: weckt
    partizip2: geweckt
    aux: haben
    valence: "+ Akk"
    en: to wake somebody up
    ru: будить
    example_de: Weck mich bitte morgen um sieben Uhr!
    example_en: Please wake me at seven tomorrow!
    example_ru: Разбуди меня завтра в семь!
    note:
      en: 'wecken is transitive — you wake somebody else, and that person is accusative: Ich wecke dich. Waking up by yourself is aufwachen, with sein: Ich bin um sechs aufgewacht. The alarm clock is der Wecker.'
      ru: 'wecken переходный: будят кого-то, и этот кто-то стоит в Akkusativ — Ich wecke dich. «Просыпаться» самому — aufwachen, перфект с sein: Ich bin um sechs aufgewacht. Будильник — der Wecker.'
  - de: Lüge
    ipa: "ˈlyːgə"
    pos: noun
    gender: f
    plural: die Lügen
    en: lie, untruth
    ru: ложь, враньё
    example_de: Das ist eine Lüge, ich war gestern gar nicht dort!
    example_en: That is a lie, I was not there at all yesterday!
    example_ru: Это ложь, вчера меня там вообще не было!
    note:
      en: 'The noun that belongs to the verb lügen: eine Lüge erzählen = to tell a lie. Its opposite is die Wahrheit (the truth) — Er sagt die Wahrheit.'
      ru: 'Существительное к глаголу lügen: eine Lüge erzählen — «сказать неправду». Антоним — die Wahrheit («правда»): Er sagt die Wahrheit.'
  - de: lügen
    ipa: "ˈlyːgn̩"
    pos: verb
    praesens_3sg: lügt
    partizip2: gelogen
    aux: haben
    en: to lie, to tell lies
    ru: врать, лгать
    example_de: Er lügt oft, aber diesmal sagt er die Wahrheit.
    example_en: He often lies, but this time he is telling the truth.
    example_ru: Он часто врёт, но на этот раз говорит правду.
    note:
      en: 'Intransitive — you cannot "lie something" in German. What you say is die Wahrheit or eine Lüge: Er sagt die Wahrheit, er erzählt eine Lüge. The noun to this verb is die Lüge. Strong verb: lügen – hat gelogen.'
      ru: 'Непереходный глагол: по-немецки нельзя «солгать что-то». Сказанное выражают через die Wahrheit или eine Lüge: Er sagt die Wahrheit, er erzählt eine Lüge. Существительное к этому глаголу — die Lüge. Сильный глагол: lügen – hat gelogen.'
