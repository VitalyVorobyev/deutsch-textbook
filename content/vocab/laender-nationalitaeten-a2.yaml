# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the Länder und
# Nationalitäten section.
id: laender-nationalitaeten-a2
title_de: "Länder & Nationalitäten"
title_en: "Countries & nationalities"
title_ru: "Страны и национальности"
level: A2
entries:
  - de: Deutschland
    ipa: "ˈdɔʏ̯tʃˌlant"
    # Article-free proper noun. Modelled as a phrase, not a noun, because the noun
    # path prepends the article to the production card's answer — it would demand
    # "das Deutschland", which is not German. `die Schweiz` below stays a noun: it
    # really does take the article, and that card IS the lesson.
    pos: phrase
    en: Germany
    ru: Германия
    example_de: Im Sommer fahre ich nach Deutschland.
    example_en: In the summer I am travelling to Germany.
    example_ru: Летом я поеду в Германию.
    note:
      en: 'Almost every country name in German is neuter and takes no article at all: Deutschland ist schön, ich wohne in Deutschland, ich fahre nach Deutschland. Direction is nach, position is in — and neither one gets an article. The handful of countries that do take an article (die Schweiz, die Türkei, die USA) work differently: there you say in die Schweiz for the direction. Learn the article-free pattern as the default and the article countries as the exception.'
      ru: 'Почти все названия стран в немецком — среднего рода и вообще без артикля: Deutschland ist schön, ich wohne in Deutschland, ich fahre nach Deutschland. Направление — nach, местонахождение — in, и артикль не нужен ни там, ни там. Немногие страны, которые артикль всё-таки требуют (die Schweiz, die Türkei, die USA), устроены иначе: для направления там нужно in die Schweiz. Запоминайте безартиклевую модель как правило, а страны с артиклем — как исключение.'
  - de: Deutsche
    ipa: "ˈdɔʏ̯tʃə"
    pos: noun
    gender: f
    plural: "die Deutschen"
    # An adjectival noun has no single citation form: der Deutsche, ein Deutscher and
    # eine Deutsche are all correct, and the bare plural too. The card shows one of
    # them; it must not mark the others wrong.
    accept: ["der Deutsche", "ein Deutscher", "eine Deutsche", "Deutsche"]
    en: German (person)
    ru: немец, немка
    example_de: Viele Deutsche machen im Sommer Urlaub am Meer.
    example_en: Many Germans go on holiday by the sea in the summer.
    example_ru: Многие немцы летом отдыхают на море.
    note:
      en: 'This is the famous trap of the deck. Every other nationality here is a plain noun with a fixed shape — Österreicher/Österreicherin, Schweizer/Schweizerin, Luxemburger/Luxemburgerin — and you can simply memorize the form. German is the exception: Deutsche is an adjectival noun, built from the adjective deutsch, so its ending changes with the article, exactly like an adjective ending. der Deutsche, but ein Deutscher (a German man); die Deutsche and eine Deutsche (a German woman); in the plural die Deutschen, and with no article Deutsche (Viele Deutsche …). The one form that does not exist is "der Deutscher" — after the definite article the ending is -e, never -er.'
      ru: 'Это главная ловушка колоды. Все остальные национальности здесь — обычные существительные с фиксированной формой: Österreicher/Österreicherin, Schweizer/Schweizerin, Luxemburger/Luxemburgerin, — их достаточно запомнить. «Немец» — исключение: Deutsche это субстантивированное прилагательное от deutsch, и окончание меняется вместе с артиклем, как у прилагательного. der Deutsche, но ein Deutscher (немец); die Deutsche и eine Deutsche (немка); во множественном числе die Deutschen, а без артикля — Deutsche (Viele Deutsche …). Формы «der Deutscher» не существует: после определённого артикля окончание -e, а не -er.'
  - de: deutsch
    ipa: "ˈdɔʏ̯tʃ"
    pos: adj
    en: German
    ru: немецкий
    example_de: Mein Nachbar liest jeden Morgen eine deutsche Zeitung.
    example_en: My neighbour reads a German newspaper every morning.
    example_ru: Мой сосед каждое утро читает немецкую газету.
    note:
      en: 'Nationality adjectives are written in lowercase in German — deutsch, italienisch, spanisch — even though English capitalizes "German". Writing "eine Deutsche Zeitung" is a real spelling mistake. Only the language as a noun is capitalized: Ich lerne Deutsch, ein Text auf Deutsch.'
      ru: 'Прилагательные национальности в немецком пишутся со строчной буквы — deutsch, italienisch, spanisch. Написание «eine Deutsche Zeitung» — настоящая орфографическая ошибка. С большой буквы пишется только название языка как существительное: Ich lerne Deutsch, ein Text auf Deutsch.'
  - de: auf Deutsch
    ipa: "aʊ̯f ˈdɔʏ̯tʃ"
    pos: phrase
    en: in German
    ru: по-немецки, на немецком
    example_de: Wie sagt man das auf Deutsch?
    example_en: How do you say that in German?
    example_ru: Как это сказать по-немецки?
    note:
      en: 'The language is a noun here, so it keeps its capital D even though the adjective deutsch is lowercase: auf Deutsch, auf Englisch, auf Russisch. Note the preposition too — it is auf, not "in": Der Kurs ist auf Deutsch. Schreiben Sie das bitte auf Deutsch.'
      ru: 'Здесь язык — существительное, поэтому пишется с большой буквы, хотя прилагательное deutsch строчное: auf Deutsch, auf Englisch, auf Russisch. Обратите внимание и на предлог: именно auf, а не «in»: Der Kurs ist auf Deutsch. Schreiben Sie das bitte auf Deutsch.'
  - de: Österreich
    ipa: "ˈøːstɐˌʁaɪ̯ç"
    # Article-free proper noun. Modelled as a phrase, not a noun, because the noun
    # path prepends the article to the production card's answer — it would demand
    # "das Deutschland", which is not German. `die Schweiz` below stays a noun: it
    # really does take the article, and that card IS the lesson.
    pos: phrase
    en: Austria
    ru: Австрия
    example_de: Meine Tante wohnt seit zehn Jahren in Österreich.
    example_en: My aunt has been living in Austria for ten years.
    example_ru: Моя тётя уже десять лет живёт в Австрии.
    note:
      en: 'Like Deutschland: no article. Ich fahre nach Österreich, ich wohne in Österreich. The capital is Wien, and Austrians speak German too — with a noticeably different accent and some words of their own.'
      ru: 'Как и Deutschland — без артикля. Ich fahre nach Österreich, ich wohne in Österreich. Столица — Вена (Wien); в Австрии тоже говорят по-немецки, но с заметно другим произношением и своими словечками.'
  - de: Österreicher
    ipa: "ˈøːstɐˌʁaɪ̯çɐ"
    pos: noun
    gender: m
    plural: "die Österreicher"
    en: Austrian (male)
    ru: австриец
    example_de: Mein Chef ist Österreicher und kommt aus Salzburg.
    example_en: My boss is Austrian and comes from Salzburg.
    example_ru: Мой начальник — австриец, он из Зальцбурга.
    note:
      en: 'After sein, a nationality takes no article — exactly like a profession: Er ist Österreicher (compare Er ist Arzt), never "Er ist ein Österreicher" in ordinary talk. Singular and plural are identical: der Österreicher, die Österreicher.'
      ru: 'После sein национальность стоит без артикля — точно как профессия: Er ist Österreicher (ср. Er ist Arzt), а не «Er ist ein Österreicher». Единственное и множественное число совпадают: der Österreicher, die Österreicher.'
  - de: Österreicherin
    ipa: "ˈøːstɐˌʁaɪ̯çəʁɪn"
    pos: noun
    gender: f
    plural: "die Österreicherinnen"
    en: Austrian (female)
    ru: австрийка
    example_de: Anna ist Österreicherin und arbeitet in Graz.
    example_en: Anna is Austrian and works in Graz.
    example_ru: Анна — австрийка, она работает в Граце.
    note:
      en: 'The pattern is regular and worth learning as a formula: country → man (-er) → woman (-erin) → adjective (-isch). Österreich → Österreicher → Österreicherin → österreichisch.'
      ru: 'Модель регулярна, и её стоит запомнить как формулу: страна → мужчина (-er) → женщина (-erin) → прилагательное (-isch). Österreich → Österreicher → Österreicherin → österreichisch.'
  - de: österreichisch
    ipa: "ˈøːstɐˌʁaɪ̯çɪʃ"
    pos: adj
    en: Austrian
    ru: австрийский
    example_de: Gestern haben wir einen österreichischen Film gesehen.
    example_en: Yesterday we watched an Austrian film.
    example_ru: Вчера мы посмотрели австрийский фильм.
    note:
      en: 'Lowercase, like every nationality adjective. Do not confuse it with the person: Er ist Österreicher (a noun, no article) but Das ist ein österreichischer Wein (an adjective, with an ending).'
      ru: 'Со строчной буквы, как и все прилагательные национальности. Не путайте с обозначением человека: Er ist Österreicher (существительное, без артикля), но Das ist ein österreichischer Wein (прилагательное с окончанием).'
  - de: Schweiz
    ipa: "ˈʃvaɪ̯ts"
    pos: noun
    gender: f
    plural: "—"
    en: Switzerland
    ru: Швейцария
    example_de: Nächstes Jahr fahren wir in die Schweiz.
    example_en: Next year we are going to Switzerland.
    example_ru: В следующем году мы поедем в Швейцарию.
    note:
      en: 'The odd one out, and the single most important entry in this deck: die Schweiz is the only country here that takes an article — and it is feminine. That changes the prepositions. For every other country you say nach with no article (Ich fahre nach Deutschland, nach Österreich, nach Luxemburg), but for Switzerland you say in die Schweiz for the direction (Akkusativ) and in der Schweiz for the position (Dativ): Ich fahre in die Schweiz. Ich wohne in der Schweiz. "Ich fahre nach Schweiz" is simply wrong. The same handful of article countries behave this way: in die Türkei, in die USA.'
      ru: 'Исключение и самая важная запись во всей колоде: die Schweiz — единственная страна здесь, которая требует артикля, причём женского рода. Из-за этого меняются и предлоги. Ко всем остальным странам едут через nach без артикля (Ich fahre nach Deutschland, nach Österreich, nach Luxemburg), а в Швейцарию — in die Schweiz (направление, Akkusativ), и находятся там in der Schweiz (место, Dativ): Ich fahre in die Schweiz. Ich wohne in der Schweiz. Сказать «Ich fahre nach Schweiz» нельзя. Так же ведут себя и другие страны с артиклем: in die Türkei, in die USA.'
  - de: Schweizer
    ipa: "ˈʃvaɪ̯tsɐ"
    pos: noun
    gender: m
    plural: "die Schweizer"
    en: Swiss (male)
    ru: швейцарец
    example_de: Unser Nachbar ist Schweizer.
    example_en: Our neighbour is Swiss.
    example_ru: Наш сосед — швейцарец.
    note:
      en: 'The person is der Schweizer (die Schweizer in the plural, unchanged). Capitalized Schweizer also works as an invariable adjective in front of a noun and never takes an ending: Schweizer Käse, Schweizer Schokolade, Schweizer Franken.'
      ru: 'Человек — der Schweizer (во множественном числе die Schweizer, без изменений). Schweizer с большой буквы работает ещё и как неизменяемое определение перед существительным и никогда не получает окончания: Schweizer Käse, Schweizer Schokolade, Schweizer Franken.'
  - de: Schweizerin
    ipa: "ˈʃvaɪ̯tsəʁɪn"
    pos: noun
    gender: f
    plural: "die Schweizerinnen"
    en: Swiss (female)
    ru: швейцарка
    example_de: Meine Lehrerin ist Schweizerin und kommt aus Bern.
    example_en: My teacher is Swiss and comes from Bern.
    example_ru: Моя учительница — швейцарка, она из Берна.
  - de: schweizerisch
    ipa: "ˈʃvaɪ̯tsəʁɪʃ"
    pos: adj
    en: Swiss
    ru: швейцарский
    example_de: Das ist eine schweizerische Firma.
    example_en: That is a Swiss company.
    example_ru: Это швейцарская фирма.
    note:
      en: 'schweizerisch is the regular -isch adjective, but in everyday German it is rarer than you would expect: for products and everyday things people prefer the invariable Schweizer (Schweizer Käse, Schweizer Uhren). Keep schweizerisch for official and formal contexts — die schweizerische Regierung.'
      ru: 'schweizerisch — регулярное прилагательное на -isch, но в живой речи оно встречается реже, чем можно подумать: о продуктах и повседневных вещах говорят через неизменяемое Schweizer (Schweizer Käse, Schweizer Uhren). schweizerisch остаётся для официальных контекстов — die schweizerische Regierung.'
  - de: Luxemburg
    ipa: "ˈlʊksəmˌbʊʁk"
    # Article-free proper noun. Modelled as a phrase, not a noun, because the noun
    # path prepends the article to the production card's answer — it would demand
    # "das Deutschland", which is not German. `die Schweiz` below stays a noun: it
    # really does take the article, and that card IS the lesson.
    pos: phrase
    en: Luxembourg
    ru: Люксембург
    example_de: Luxemburg ist klein, aber sehr reich.
    example_en: Luxembourg is small but very wealthy.
    example_ru: Люксембург маленький, но очень богатый.
    note:
      en: 'No article, like Deutschland and Österreich: nach Luxemburg, in Luxemburg. The name does double duty — it is both the country and its capital city.'
      ru: 'Без артикля, как Deutschland и Österreich: nach Luxemburg, in Luxemburg. Название работает на два фронта: так зовут и страну, и её столицу.'
  - de: Luxemburger
    ipa: "ˈlʊksəmˌbʊʁgɐ"
    pos: noun
    gender: m
    plural: "die Luxemburger"
    en: Luxembourger (male)
    ru: люксембуржец
    example_de: Ein Kollege von mir ist Luxemburger und spricht drei Sprachen.
    example_en: A colleague of mine is from Luxembourg and speaks three languages.
    example_ru: Один мой коллега — люксембуржец, он говорит на трёх языках.
    note:
      en: 'Same four-part pattern once more: Luxemburg → Luxemburger → Luxemburgerin → luxemburgisch. And as with Österreicher and Schweizer, singular and plural are identical.'
      ru: 'Та же четырёхчастная модель: Luxemburg → Luxemburger → Luxemburgerin → luxemburgisch. И, как у Österreicher и Schweizer, единственное и множественное число совпадают.'
  - de: Luxemburgerin
    ipa: "ˈlʊksəmˌbʊʁgəʁɪn"
    pos: noun
    gender: f
    plural: "die Luxemburgerinnen"
    en: Luxembourger (female)
    ru: люксембурженка
    example_de: Sie ist Luxemburgerin, aber sie arbeitet in Brüssel.
    example_en: She is from Luxembourg, but she works in Brussels.
    example_ru: Она люксембурженка, но работает в Брюсселе.
  - de: luxemburgisch
    ipa: "ˈlʊksəmˌbʊʁgɪʃ"
    pos: adj
    en: Luxembourgish
    ru: люксембургский
    example_de: Meine Kollegin hat einen luxemburgischen Pass.
    example_en: My colleague has a Luxembourgish passport.
    example_ru: У моей коллеги люксембургский паспорт.
    note:
      en: 'Lowercase as an adjective, but capitalized as the name of the language: Sie spricht Luxemburgisch. That is the same split as deutsch and Deutsch.'
      ru: 'Как прилагательное — со строчной буквы, как название языка — с большой: Sie spricht Luxemburgisch. Это то же самое различие, что deutsch и Deutsch.'
  - de: Europa
    ipa: "ɔʏ̯ˈʁoːpa"
    # Article-free proper noun. Modelled as a phrase, not a noun, because the noun
    # path prepends the article to the production card's answer — it would demand
    # "das Deutschland", which is not German. `die Schweiz` below stays a noun: it
    # really does take the article, and that card IS the lesson.
    pos: phrase
    en: Europe
    ru: Европа
    example_de: In Europa gibt es sehr viele Sprachen.
    example_en: There are a great many languages in Europe.
    example_ru: В Европе очень много языков.
    note:
      en: 'Continents work like the article-free countries: in Europa, nach Europa, aus Europa. The stress falls on the second syllable — eu-ROH-pa.'
      ru: 'Континенты ведут себя как страны без артикля: in Europa, nach Europa, aus Europa. Ударение падает на второй слог — eu-RO-pa.'
  - de: Europäer
    ipa: "ɔʏ̯ʁoˈpɛːɐ"
    pos: noun
    gender: m
    plural: "die Europäer"
    en: European (male)
    ru: европеец
    example_de: Viele Europäer fahren im Sommer ans Meer.
    example_en: Many Europeans go to the seaside in the summer.
    example_ru: Многие европейцы летом ездят на море.
    note:
      en: 'Watch the vowel: the noun has an umlaut and a long ä — Europa, but Europäer. The stress moves too, onto that ä.'
      ru: 'Следите за гласным: у существительного появляется умлаут и долгое ä — Europa, но Europäer. Ударение тоже перемещается на этот ä.'
  - de: Europäerin
    ipa: "ɔʏ̯ʁoˈpɛːəʁɪn"
    pos: noun
    gender: f
    plural: "die Europäerinnen"
    en: European (female)
    ru: европейка
    example_de: Sie ist Europäerin und lebt seit zehn Jahren in Asien.
    example_en: She is European and has been living in Asia for ten years.
    example_ru: Она европейка и уже десять лет живёт в Азии.
  - de: europäisch
    ipa: "ɔʏ̯ʁoˈpɛːɪʃ"
    pos: adj
    en: European
    ru: европейский
    example_de: Deutschland ist ein europäisches Land.
    example_en: Germany is a European country.
    example_ru: Германия — европейская страна.
    note:
      en: 'Lowercase like the other nationality adjectives — but inside a proper name it is capitalized, because the whole name is one: die Europäische Union.'
      ru: 'Со строчной буквы, как и другие прилагательные национальности, — но внутри имени собственного пишется с большой, потому что имя это одно целое: die Europäische Union.'
