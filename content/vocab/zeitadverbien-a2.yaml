# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the -s adverbs
# of the Tageszeiten and Wochentage sections, plus the remaining time adverbs.
id: zeitadverbien-a2
title_de: "Zeitadverbien"
title_en: "Time adverbs"
title_ru: "Наречия времени"
level: A2
entries:
  - de: tagsüber
    ipa: "ˈtaːksˌʔyːbɐ"
    pos: adv
    en: during the day, in the daytime
    ru: днём, в дневное время
    example_de: Tagsüber ist es hier ganz ruhig.
    example_en: During the day it is completely quiet here.
    example_ru: Днём здесь совсем тихо.
    note:
      en: 'tagsüber describes the daytime hours in general, as a habit — the opposite of nachts: Tagsüber arbeite ich, nachts schlafe ich. One particular day is an dem Tag or an diesem Tag. Like all the -s adverbs of time it is written small, although der Tag is capitalized.'
      ru: 'tagsüber описывает светлое время суток вообще, как привычное положение дел, — противоположность nachts: Tagsüber arbeite ich, nachts schlafe ich. Один конкретный день — an dem Tag, an diesem Tag. Как и все наречия времени на -s, пишется со строчной буквы, хотя der Tag — с заглавной.'
  - de: morgens
    ipa: "ˈmɔʁgn̩s"
    pos: adv
    en: in the mornings, every morning
    ru: по утрам, каждое утро
    example_de: Morgens trinke ich immer zwei Tassen Kaffee.
    example_en: In the mornings I always drink two cups of coffee.
    example_ru: По утрам я всегда выпиваю две чашки кофе.
    note:
      en: 'morgens is the habitual form: every morning, as a rule. One particular morning is am Morgen (the um/am pattern you already know): Ich stehe morgens um sechs auf, aber am Morgen nach der Party habe ich lange geschlafen. Careful — morgen without the -s means "tomorrow".'
      ru: 'morgens — форма для привычки: каждое утро, как правило. Одно конкретное утро — am Morgen (уже знакомая схема um/am): Ich stehe morgens um sechs auf, aber am Morgen nach der Party habe ich lange geschlafen. Осторожно: morgen без -s значит «завтра».'
  - de: vormittags
    ipa: "ˈfoːɐ̯mɪˌtaːks"
    pos: adv
    en: in the mornings (before noon)
    ru: до обеда, в первой половине дня (обычно)
    example_de: Der Deutschkurs ist vormittags, von neun bis zwölf.
    example_en: The German course runs in the mornings, from nine to twelve.
    example_ru: Курс немецкого идёт в первой половине дня, с девяти до двенадцати.
    note:
      en: 'Habitual: vormittags means every morning before noon — a timetable, an opening time. A single morning is am Vormittag: Vormittags habe ich Zeit, aber am Vormittag vor der Prüfung nicht.'
      ru: 'Привычное действие: vormittags — каждый день до обеда (расписание, часы работы). Одно конкретное утро — am Vormittag: Vormittags habe ich Zeit, aber am Vormittag vor der Prüfung nicht.'
  - de: mittags
    ipa: "ˈmɪtaːks"
    pos: adv
    en: at midday, at lunchtime (every day)
    ru: в обед, в полдень (обычно)
    example_de: Mittags esse ich meistens in der Kantine.
    example_en: At lunchtime I usually eat in the canteen.
    example_ru: В обед я обычно ем в столовой.
    note:
      en: 'Habitual again: mittags is what happens at lunchtime as a rule. A specific midday is am Mittag: Mittags mache ich eine Pause, aber am Mittag vor der Prüfung habe ich nichts gegessen.'
      ru: 'Снова привычка: mittags — то, что происходит в обеденное время как правило. Один конкретный полдень — am Mittag: Mittags mache ich eine Pause, aber am Mittag vor der Prüfung habe ich nichts gegessen.'
  - de: nachmittags
    ipa: "ˈnaːxmɪˌtaːks"
    pos: adv
    en: in the afternoons, every afternoon
    ru: во второй половине дня, после обеда (обычно)
    example_de: Nachmittags gehe ich oft mit dem Hund spazieren.
    example_en: In the afternoons I often take the dog for a walk.
    example_ru: Во второй половине дня я часто гуляю с собакой.
    note:
      en: 'nachmittags = every afternoon, as a habit; am Nachmittag = on one particular afternoon. Compare: Der Laden hat nachmittags geöffnet (always) and Am Nachmittag war der Laden zu (that one day).'
      ru: 'nachmittags — каждый день после обеда, привычно; am Nachmittag — в один конкретный день. Сравните: Der Laden hat nachmittags geöffnet (всегда) и Am Nachmittag war der Laden zu (в тот день).'
  - de: abends
    ipa: "ˈaːbn̩ts"
    pos: adv
    en: in the evenings, every evening
    ru: по вечерам, каждый вечер
    example_de: Abends bin ich meistens zu müde zum Lernen.
    example_en: In the evenings I am usually too tired to study.
    example_ru: По вечерам я обычно слишком устаю, чтобы заниматься.
    note:
      en: 'abends is the habit — every evening. Am Abend is one evening: Abends koche ich selten, aber am Abend vor meinem Geburtstag koche ich für alle.'
      ru: 'abends — привычка, каждый вечер. Am Abend — один конкретный вечер: Abends koche ich selten, aber am Abend vor meinem Geburtstag koche ich für alle.'
  - de: nachts
    ipa: "ˈnaxts"
    pos: adv
    en: at night, at nights
    ru: по ночам, ночью (обычно)
    example_de: Nachts fahren die Busse nur einmal pro Stunde.
    example_en: At night the buses only run once an hour.
    example_ru: По ночам автобусы ходят только раз в час.
    note:
      en: 'nachts is what happens at night as a rule. One particular night is in der Nacht — the odd one out in the um/am family, and worth remembering as such: Nachts ist es ruhig, aber in der Nacht zum Sonntag war ein Fest im Hof.'
      ru: 'nachts — то, что бывает ночью как правило. Одна конкретная ночь — in der Nacht (исключение в схеме um/am, его стоит запомнить именно так): Nachts ist es ruhig, aber in der Nacht zum Sonntag war ein Fest im Hof.'
  - de: montags
    ipa: "ˈmoːntaːks"
    pos: adv
    en: on Mondays, every Monday
    ru: по понедельникам
    example_de: Montags habe ich immer Sport.
    example_en: On Mondays I always have my sports class.
    example_ru: По понедельникам у меня всегда спорт.
    note:
      en: 'The whole point of these seven words: montags means every Monday (= jeden Montag), am Montag means this one coming Monday. Ich arbeite montags im Büro (as a rule) — Ich arbeite am Montag im Büro (this week). And note the small letter: der Montag is capitalized, the adverb montags is not.'
      ru: 'Смысл всей семёрки: montags — каждый понедельник (= jeden Montag), am Montag — в этот ближайший понедельник. Ich arbeite montags im Büro (как правило) — Ich arbeite am Montag im Büro (на этой неделе). И обратите внимание на строчную букву: der Montag с заглавной, наречие montags — со строчной.'
  - de: dienstags
    ipa: "ˈdiːnstaːks"
    pos: adv
    en: on Tuesdays, every Tuesday
    ru: по вторникам
    example_de: Dienstags ist das Museum geschlossen.
    example_en: The museum is closed on Tuesdays.
    example_ru: По вторникам музей закрыт.
    note:
      en: 'Habitual: dienstags = every Tuesday, the way opening hours are stated. One particular Tuesday is am Dienstag: Dienstags ist zu, aber am Dienstag nach Ostern hat das Museum offen.'
      ru: 'Привычное: dienstags — каждый вторник, так пишут часы работы. Один конкретный вторник — am Dienstag: Dienstags ist zu, aber am Dienstag nach Ostern hat das Museum offen.'
  - de: mittwochs
    ipa: "ˈmɪtvɔxs"
    pos: adv
    en: on Wednesdays, every Wednesday
    ru: по средам
    example_de: Mittwochs kommt meine Schwester zum Essen.
    example_en: My sister comes over for dinner on Wednesdays.
    example_ru: По средам ко мне на ужин приходит сестра.
    note:
      en: 'mittwochs is the standing arrangement — every Wednesday. Am Mittwoch is the next one: Mittwochs koche ich, aber am Mittwoch gehen wir essen.'
      ru: 'mittwochs — постоянная договорённость, каждую среду. Am Mittwoch — ближайшая: Mittwochs koche ich, aber am Mittwoch gehen wir essen.'
  - de: donnerstags
    ipa: "ˈdɔnɐstaːks"
    pos: adv
    en: on Thursdays, every Thursday
    ru: по четвергам
    example_de: Donnerstags haben die Geschäfte länger offen.
    example_en: On Thursdays the shops stay open later.
    example_ru: По четвергам магазины работают дольше.
    note:
      en: 'donnerstags describes the rule, am Donnerstag a single day: Donnerstags ist der Markt auf dem Platz — Am Donnerstag hole ich dich ab.'
      ru: 'donnerstags описывает правило, am Donnerstag — один день: Donnerstags ist der Markt auf dem Platz — Am Donnerstag hole ich dich ab.'
  - de: freitags
    ipa: "ˈfʁaɪ̯taːks"
    pos: adv
    en: on Fridays, every Friday
    ru: по пятницам
    example_de: Freitags arbeite ich nur bis zwei.
    example_en: On Fridays I only work until two.
    example_ru: По пятницам я работаю только до двух.
    note:
      en: 'Habitual: freitags = every Friday. This coming Friday is am Freitag: Freitags mache ich früh Feierabend, aber am Freitag habe ich einen Termin.'
      ru: 'Привычное: freitags — каждую пятницу. Ближайшая пятница — am Freitag: Freitags mache ich früh Feierabend, aber am Freitag habe ich einen Termin.'
  - de: samstags
    ipa: "ˈzamstaːks"
    pos: adv
    en: on Saturdays, every Saturday
    ru: по субботам
    example_de: Samstags gehen wir immer auf den Markt.
    example_en: On Saturdays we always go to the market.
    example_ru: По субботам мы всегда ходим на рынок.
    note:
      en: 'samstags is the routine, am Samstag the single date: Samstags kaufen wir ein, aber am Samstag feiern wir Geburtstag. In the north you will also hear sonnabends for the same day.'
      ru: 'samstags — заведённый порядок, am Samstag — конкретная дата: Samstags kaufen wir ein, aber am Samstag feiern wir Geburtstag. На севере Германии тот же день называют sonnabends.'
  - de: sonntags
    ipa: "ˈzɔntaːks"
    pos: adv
    en: on Sundays, every Sunday
    ru: по воскресеньям
    example_de: Sonntags sind in Deutschland alle Geschäfte zu.
    example_en: On Sundays all the shops in Germany are closed.
    example_ru: По воскресеньям все магазины в Германии закрыты.
    note:
      en: 'sonntags states the German rule — every Sunday, without exception. Am Sonntag names one day: Sonntags ist alles zu, aber am Sonntag fahren wir trotzdem in die Stadt.'
      ru: 'sonntags формулирует немецкое правило: каждое воскресенье, без исключений. Am Sonntag называет один день: Sonntags ist alles zu, aber am Sonntag fahren wir trotzdem in die Stadt.'
  - de: endlich
    ipa: "ˈɛntlɪç"
    pos: adv
    en: finally, at last
    ru: наконец-то
    example_de: Endlich ist der Winter vorbei!
    example_en: Winter is finally over!
    example_ru: Наконец-то зима закончилась!
    note:
      en: 'endlich carries relief after a long wait — "at last!". It is not schließlich, which reports the last step of a sequence without any emotion (Schließlich sind wir doch noch angekommen). If you can add an exclamation mark, endlich is the word.'
      ru: 'endlich несёт облегчение после долгого ожидания — «наконец-то!». Это не schließlich, которое просто сообщает о последнем шаге, без эмоции (Schließlich sind wir doch noch angekommen). Если просится восклицательный знак — нужно endlich.'
  - de: erst
    ipa: "ˈeːɐ̯st"
    pos: adv
    en: only, not until (later than expected)
    ru: только, не раньше чем (позже ожидаемого)
    example_de: Der Film beginnt erst um neun.
    example_en: The film does not start until nine.
    example_ru: Фильм начнётся только в девять.
    note:
      en: 'A hard little word. erst pushes a point in time later than you expected: Ich komme erst um acht = I will not be there before eight. It also downplays a short elapsed time: Ich lerne erst seit einem Monat Deutsch. It is not zuerst ("first of all") and not nur, which limits an amount (Es kostet nur drei Euro).'
      ru: 'Трудное словечко. erst отодвигает момент времени позже ожидаемого: Ich komme erst um acht — «раньше восьми меня не будет». Оно же преуменьшает истекшее время: Ich lerne erst seit einem Monat Deutsch («всего месяц»). Это не zuerst («сначала») и не nur, которое ограничивает количество (Es kostet nur drei Euro).'
  - de: gerade
    ipa: "gəˈʁaːdə"
    pos: adv
    en: just now, right now
    ru: как раз, только что, прямо сейчас
    example_de: Ich habe gerade gegessen, ich habe keinen Hunger.
    example_en: I have just eaten, I am not hungry.
    example_ru: Я только что поел, я не голоден.
    note:
      en: 'Two readings, both about the present moment. With the Perfekt it means "just now, a moment ago": Ich habe gerade gegessen. With the present tense it means "right now, at this very moment": Ich lese gerade — German has no continuous form, so gerade does that work. As an adjective it also means "straight" (eine gerade Linie).'
      ru: 'Два прочтения, оба о текущем моменте. С Perfekt — «только что»: Ich habe gerade gegessen. С настоящим временем — «прямо сейчас, в этот момент»: Ich lese gerade. Продолженного времени в немецком нет, эту работу и делает gerade. Как прилагательное значит ещё «прямой» (eine gerade Linie).'
  - de: plötzlich
    ipa: "ˈplœtslɪç"
    pos: adv
    en: suddenly, all of a sudden
    ru: вдруг, внезапно
    example_de: Plötzlich hat mein Handy geklingelt.
    example_en: All of a sudden my phone rang.
    example_ru: Вдруг зазвонил мой телефон.
    note:
      en: 'plötzlich marks an event nobody saw coming. Do not confuse it with sofort: sofort is how fast you react, plötzlich is how unexpected the event was. It also works as an adjective: ein plötzlicher Regen.'
      ru: 'plötzlich отмечает событие, которого никто не ждал. Не путайте с sofort: sofort — про скорость реакции, plötzlich — про неожиданность события. Работает и как прилагательное: ein plötzlicher Regen.'
  - de: sofort
    ipa: "zoˈfɔʁt"
    pos: adv
    en: immediately, right away
    ru: немедленно, сразу же
    example_de: Ich rufe dich sofort zurück.
    example_en: I will call you back right away.
    example_ru: Я сразу же тебе перезвоню.
    note:
      en: 'sofort means with no delay at all. gleich is a shade softer — "in a moment, shortly" (Ich komme gleich). On its own, Sofort! is what a waiter says when you order.'
      ru: 'sofort — без всякой задержки. gleich чуть мягче: «сейчас, через минуту» (Ich komme gleich). Отдельным словом Sofort! отвечает, например, официант, приняв заказ.'
  - de: übermorgen
    ipa: "ˈyːbɐˌmɔʁgn̩"
    pos: adv
    en: the day after tomorrow
    ru: послезавтра
    example_de: Übermorgen habe ich einen Termin beim Zahnarzt.
    example_en: The day after tomorrow I have a dentist appointment.
    example_ru: Послезавтра у меня приём у зубного врача.
    note:
      en: 'German has one word where English needs four. The full ladder: gestern – heute – morgen – übermorgen, and backwards vorgestern. No preposition is needed, and the verb still comes second: Übermorgen fahre ich nach Hamburg.'
      ru: 'Немецкий обходится одним словом. Полная лесенка: gestern – heute – morgen – übermorgen, а назад — vorgestern. Предлог не нужен, глагол по-прежнему на втором месте: Übermorgen fahre ich nach Hamburg.'
  - de: vorgestern
    ipa: "ˈfoːɐ̯ˌgɛstɐn"
    pos: adv
    en: the day before yesterday
    ru: позавчера
    example_de: Vorgestern habe ich meinen Pass verloren.
    example_en: I lost my passport the day before yesterday.
    example_ru: Позавчера я потерял паспорт.
    note:
      en: 'The mirror image of übermorgen: vor- points back, über- points forward. Both are single words that need no preposition: Vorgestern war ich krank.'
      ru: 'Зеркало übermorgen: vor- смотрит назад, über- — вперёд. Оба слова цельные и не требуют предлога: Vorgestern war ich krank.'
  - de: vorher
    ipa: "ˈfoːɐ̯ˌheːɐ̯"
    pos: adv
    en: beforehand, before that
    ru: заранее, до этого
    example_de: Wir gehen ins Kino. Vorher essen wir eine Kleinigkeit.
    example_en: We are going to the cinema. Before that we will grab a bite to eat.
    example_ru: Мы идём в кино. А до этого немного перекусим.
    note:
      en: 'vorher points back to something already mentioned — "before that". Its partners are nachher and danach ("afterwards"). It is an adverb, not a preposition: "before the film" is vor dem Film, never "vorher dem Film".'
      ru: 'vorher отсылает к уже названному — «до этого». Его пары — nachher и danach («потом»). Это наречие, а не предлог: «перед фильмом» — vor dem Film, но не «vorher dem Film».'
  - de: zuletzt
    ipa: "tsuˈlɛtst"
    pos: adv
    en: last, at the end; most recently
    ru: в последний раз; напоследок
    example_de: Wann warst du zuletzt beim Arzt?
    example_en: When did you last see a doctor?
    example_ru: Когда ты в последний раз был у врача?
    note:
      en: 'Two jobs. In a sequence it means "last of all": Zuletzt haben wir noch einen Kaffee getrunken. With a past tense it means "for the last time, most recently": Wann hast du ihn zuletzt gesehen? Its opposite is zuerst.'
      ru: 'Две работы. В перечислении — «напоследок, в конце»: Zuletzt haben wir noch einen Kaffee getrunken. С прошедшим временем — «в последний раз»: Wann hast du ihn zuletzt gesehen? Противоположность — zuerst.'
  - de: lange
    ipa: "ˈlaŋə"
    pos: adv
    en: for a long time
    ru: долго
    example_de: Ich habe lange auf den Bus gewartet.
    example_en: I waited for the bus for a long time.
    example_ru: Я долго ждал автобус.
    note:
      en: 'lange answers the question Wie lange? and names a duration. The short form lang means exactly the same in this adverbial use and can be swapped in freely (Ich habe lang gewartet) — lange is simply the more common of the two. Schon lange means "for a long time now": Ich wohne schon lange hier.'
      ru: 'lange отвечает на вопрос Wie lange? и называет длительность. Короткая форма lang в этом наречном употреблении значит ровно то же самое и свободно заменяет её (Ich habe lang gewartet) — просто lange встречается чаще. Schon lange — «уже давно»: Ich wohne schon lange hier.'
  - de: lang
    ipa: "ˈlaŋ"
    pos: adv
    en: for a long time (variant of lange)
    ru: долго (вариант lange)
    example_de: Wie lang bleibst du in Wien?
    example_en: How long are you staying in Vienna?
    example_ru: Сколько времени ты пробудешь в Вене?
    note:
      en: 'As a time adverb lang and lange are interchangeable — there is no difference in meaning to learn, and lange is heard a little more often. lang is also the adjective "long" (ein langer Tag), and it follows a stated duration like a postposition: zwei Wochen lang, den ganzen Tag lang.'
      ru: 'Как наречие времени lang и lange взаимозаменяемы — разницы в значении нет, просто lange звучит чуть чаще. Кроме того, lang — прилагательное «длинный» (ein langer Tag), и оно ставится после названного отрезка времени, как послелог: zwei Wochen lang, den ganzen Tag lang.'
