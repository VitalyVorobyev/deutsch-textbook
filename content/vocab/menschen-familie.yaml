id: menschen-familie
title_de: "Menschen und Familie"
title_en: "People and family"
title_ru: "Люди и семья"
level: A1
entries:
  - { de: "Familie", ipa: "faˈmiːli̯ə", pos: noun, gender: f, plural: "die Familien", en: "family", ru: "семья", example_de: "Das ist meine Familie.", example_en: "This is my family.", example_ru: "Это моя семья." }
  - { de: "Mutter", ipa: "ˈmʊtɐ", pos: noun, gender: f, plural: "die Mütter", en: "mother", ru: "мать; мама", example_de: "Meine Mutter heißt Elena.", example_en: "My mother's name is Elena.", example_ru: "Мою маму зовут Елена." }
  - { de: "Vater", ipa: "ˈfaːtɐ", pos: noun, gender: m, plural: "die Väter", en: "father", ru: "отец; папа", example_de: "Mein Vater ist Ingenieur.", example_en: "My father is an engineer.", example_ru: "Мой отец — инженер." }
  - { de: "Eltern", ipa: "ˈɛltɐn", pos: phrase, en: "parents", ru: "родители", example_de: "Meine Eltern wohnen in Bonn.", example_en: "My parents live in Bonn.", example_ru: "Мои родители живут в Бонне." }
  - { de: "Bruder", ipa: "ˈbʁuːdɐ", pos: noun, gender: m, plural: "die Brüder", en: "brother", ru: "брат", example_de: "Das ist mein Bruder.", example_en: "This is my brother.", example_ru: "Это мой брат." }
  - { de: "Schwester", ipa: "ˈʃvɛstɐ", pos: noun, gender: f, plural: "die Schwestern", en: "sister", ru: "сестра", example_de: "Meine Schwester studiert.", example_en: "My sister studies.", example_ru: "Моя сестра учится." }
  - { de: "Sohn", ipa: "ˈzoːn", pos: noun, gender: m, plural: "die Söhne", en: "son", ru: "сын", example_de: "Ihr Sohn heißt Max.", example_en: "Her son's name is Max.", example_ru: "Её сына зовут Макс." }
  - { de: "Tochter", ipa: "ˈtɔxtɐ", pos: noun, gender: f, plural: "die Töchter", en: "daughter", ru: "дочь", example_de: "Seine Tochter ist zehn.", example_en: "His daughter is ten.", example_ru: "Его дочери десять лет." }
  - { de: "Großeltern", ipa: "ˈgʁoːsˌʔɛltɐn", pos: phrase, en: "grandparents", ru: "бабушка и дедушка", example_de: "Meine Großeltern leben in Dresden.", example_en: "My grandparents live in Dresden.", example_ru: "Мои бабушка и дедушка живут в Дрездене." }
  - { de: "Geschwister", ipa: "gəˈʃvɪstɐ", pos: phrase, en: "siblings", ru: "братья и сёстры", example_de: "Hast du Geschwister?", example_en: "Do you have siblings?", example_ru: "У тебя есть братья или сёстры?" }
  - { de: "Freund", ipa: "ˈfʁɔʏ̯nt", pos: noun, gender: m, plural: "die Freunde", en: "friend; boyfriend", ru: "друг; молодой человек", example_de: "Das ist mein Freund David.", example_en: "This is my friend David.", example_ru: "Это мой друг Давид." }
  - { de: "Freundin", ipa: "ˈfʁɔʏ̯ndɪn", pos: noun, gender: f, plural: "die Freundinnen", en: "friend; girlfriend", ru: "подруга; девушка", example_de: "Lea ist seine Freundin.", example_en: "Lea is his girlfriend.", example_ru: "Леа — его девушка." }
  - { de: "Lehrer", ipa: "ˈleːʁɐ", pos: noun, gender: m, plural: "die Lehrer", en: "male teacher", ru: "учитель", example_de: "Herr Lang ist Lehrer.", example_en: "Mr Lang is a teacher.", example_ru: "Господин Ланг — учитель." }
  - { de: "Lehrerin", ipa: "ˈleːʁəʁɪn", pos: noun, gender: f, plural: "die Lehrerinnen", en: "female teacher", ru: "учительница", example_de: "Frau Lang ist Lehrerin.", example_en: "Ms Lang is a teacher.", example_ru: "Госпожа Ланг — учительница." }
  - { de: "Arzt", ipa: "ˈaːɐ̯tst", pos: noun, gender: m, plural: "die Ärzte", en: "male doctor", ru: "врач", example_de: "Mein Bruder ist Arzt.", example_en: "My brother is a doctor.", example_ru: "Мой брат — врач." }
  - { de: "Ärztin", ipa: "ˈɛːɐ̯tstɪn", pos: noun, gender: f, plural: "die Ärztinnen", en: "female doctor", ru: "врач", example_de: "Mila ist Ärztin.", example_en: "Mila is a doctor.", example_ru: "Мила — врач." }
  - { de: "Ingenieur", ipa: "ɪnʒeˈni̯øːɐ̯", pos: noun, gender: m, plural: "die Ingenieure", en: "male engineer", ru: "инженер", example_de: "Oleg ist Ingenieur.", example_en: "Oleg is an engineer.", example_ru: "Олег — инженер." }
  - { de: "Ingenieurin", ipa: "ɪnʒeˈni̯øːʁɪn", pos: noun, gender: f, plural: "die Ingenieurinnen", en: "female engineer", ru: "инженер", example_de: "Katja ist Ingenieurin.", example_en: "Katja is an engineer.", example_ru: "Катя — инженер." }
  - { de: "freundlich", ipa: "ˈfʁɔʏ̯ntlɪç", pos: adj, en: "friendly", ru: "дружелюбный", example_de: "Nina ist freundlich.", example_en: "Nina is friendly.", example_ru: "Нина дружелюбная." }
  - { de: "ruhig", ipa: "ˈʁuːɪç", pos: adj, en: "calm; quiet", ru: "спокойный; тихий", example_de: "Mein Großvater ist ruhig.", example_en: "My grandfather is calm.", example_ru: "Мой дедушка спокойный." }
  - { de: "groß", ipa: "ˈgʁoːs", pos: adj, en: "tall; big", ru: "высокий; большой", example_de: "Tim ist groß.", example_en: "Tim is tall.", example_ru: "Тим высокий." }
  - { de: "klein", ipa: "ˈklaɪ̯n", pos: adj, en: "short; small", ru: "невысокий; маленький", example_de: "Lea ist klein.", example_en: "Lea is short.", example_ru: "Леа невысокая." }
  - { de: "blond", ipa: "ˈblɔnt", pos: adj, en: "blond", ru: "светловолосый", example_de: "Eva ist blond.", example_en: "Eva is blond.", example_ru: "Ева — блондинка." }
  - { de: "Haare", ipa: "ˈhaːʁə", pos: phrase, en: "hair", ru: "волосы", example_de: "Sie hat lange braune Haare.", example_en: "She has long brown hair.", example_ru: "У неё длинные каштановые волосы." }
