id: menschen-familie
title_de: "Menschen und Familie"
title_en: "People and family"
title_ru: "Люди и семья"
title_uk: "Люди та сім'я"
level: A1
entries:
  - { de: "Familie", ipa: "faˈmiːli̯ə", pos: noun, gender: f, plural: "die Familien", en: "family", ru: "семья", uk: "сім'я", example_de: "Das ist meine Familie.", example_en: "This is my family.", example_ru: "Это моя семья.", example_uk: "Це моя сім'я." }
  - { de: "Mutter", ipa: "ˈmʊtɐ", pos: noun, gender: f, plural: "die Mütter", en: "mother", ru: "мать; мама", uk: "мати; мама", example_de: "Meine Mutter heißt Elena.", example_en: "My mother's name is Elena.", example_ru: "Мою маму зовут Елена.", example_uk: "Мою маму звати Олена." }
  - { de: "Vater", ipa: "ˈfaːtɐ", pos: noun, gender: m, plural: "die Väter", en: "father", ru: "отец; папа", uk: "батько; тато", example_de: "Mein Vater ist Ingenieur.", example_en: "My father is an engineer.", example_ru: "Мой отец — инженер.", example_uk: "Мій батько — інженер." }
  - { de: "Eltern", ipa: "ˈɛltɐn", pos: phrase, en: "parents", ru: "родители", uk: "батьки", example_de: "Meine Eltern wohnen in Bonn.", example_en: "My parents live in Bonn.", example_ru: "Мои родители живут в Бонне.", example_uk: "Мої батьки живуть у Бонні." }
  - { de: "Bruder", ipa: "ˈbʁuːdɐ", pos: noun, gender: m, plural: "die Brüder", en: "brother", ru: "брат", uk: "брат", example_de: "Das ist mein Bruder.", example_en: "This is my brother.", example_ru: "Это мой брат.", example_uk: "Це мій брат." }
  - { de: "Schwester", ipa: "ˈʃvɛstɐ", pos: noun, gender: f, plural: "die Schwestern", en: "sister", ru: "сестра", uk: "сестра", example_de: "Meine Schwester studiert.", example_en: "My sister studies.", example_ru: "Моя сестра учится.", example_uk: "Моя сестра навчається." }
  - { de: "Sohn", ipa: "ˈzoːn", pos: noun, gender: m, plural: "die Söhne", en: "son", ru: "сын", uk: "син", example_de: "Ihr Sohn heißt Max.", example_en: "Her son's name is Max.", example_ru: "Её сына зовут Макс.", example_uk: "Її сина звати Макс." }
  - { de: "Tochter", ipa: "ˈtɔxtɐ", pos: noun, gender: f, plural: "die Töchter", en: "daughter", ru: "дочь", uk: "донька", example_de: "Seine Tochter ist zehn.", example_en: "His daughter is ten.", example_ru: "Его дочери десять лет.", example_uk: "Його доньці десять років." }
  - { de: "Großeltern", ipa: "ˈgʁoːsˌʔɛltɐn", pos: phrase, en: "grandparents", ru: "бабушка и дедушка", uk: "дідусь і бабуся", example_de: "Meine Großeltern leben in Dresden.", example_en: "My grandparents live in Dresden.", example_ru: "Мои бабушка и дедушка живут в Дрездене.", example_uk: "Мої дідусь і бабуся живуть у Дрездені." }
  - { de: "Geschwister", ipa: "gəˈʃvɪstɐ", pos: phrase, en: "siblings", ru: "братья и сёстры", uk: "брати й сестри", example_de: "Hast du Geschwister?", example_en: "Do you have siblings?", example_ru: "У тебя есть братья или сёстры?", example_uk: "У тебе є брати чи сестри?" }
  - { de: "Freund", ipa: "ˈfʁɔʏ̯nt", pos: noun, gender: m, plural: "die Freunde", en: "friend; boyfriend", ru: "друг; молодой человек", uk: "друг; хлопець (коханий)", example_de: "Das ist mein Freund David.", example_en: "This is my friend David.", example_ru: "Это мой друг Давид.", example_uk: "Це мій друг Давид." }
  - { de: "Freundin", ipa: "ˈfʁɔʏ̯ndɪn", pos: noun, gender: f, plural: "die Freundinnen", en: "friend; girlfriend", ru: "подруга; девушка", uk: "подруга; дівчина (кохана)", example_de: "Lea ist seine Freundin.", example_en: "Lea is his girlfriend.", example_ru: "Леа — его девушка.", example_uk: "Леа — його дівчина." }
  - { de: "Lehrer", ipa: "ˈleːʁɐ", pos: noun, gender: m, plural: "die Lehrer", en: "male teacher", ru: "учитель", uk: "учитель", example_de: "Herr Lang ist Lehrer.", example_en: "Mr Lang is a teacher.", example_ru: "Господин Ланг — учитель.", example_uk: "Пан Ланг — учитель." }
  - { de: "Lehrerin", ipa: "ˈleːʁəʁɪn", pos: noun, gender: f, plural: "die Lehrerinnen", en: "female teacher", ru: "учительница", uk: "вчителька", example_de: "Frau Lang ist Lehrerin.", example_en: "Ms Lang is a teacher.", example_ru: "Госпожа Ланг — учительница.", example_uk: "Пані Ланг — вчителька." }
  - { de: "Arzt", ipa: "ˈaːɐ̯tst", pos: noun, gender: m, plural: "die Ärzte", en: "male doctor", ru: "врач", uk: "лікар", example_de: "Mein Bruder ist Arzt.", example_en: "My brother is a doctor.", example_ru: "Мой брат — врач.", example_uk: "Мій брат — лікар." }
  - { de: "Ärztin", ipa: "ˈɛːɐ̯tstɪn", pos: noun, gender: f, plural: "die Ärztinnen", en: "female doctor", ru: "врач", uk: "лікарка", example_de: "Mila ist Ärztin.", example_en: "Mila is a doctor.", example_ru: "Мила — врач.", example_uk: "Міла — лікарка." }
  - { de: "Ingenieur", ipa: "ɪnʒeˈni̯øːɐ̯", pos: noun, gender: m, plural: "die Ingenieure", en: "male engineer", ru: "инженер", uk: "інженер", example_de: "Oleg ist Ingenieur.", example_en: "Oleg is an engineer.", example_ru: "Олег — инженер.", example_uk: "Олег — інженер." }
  - { de: "Ingenieurin", ipa: "ɪnʒeˈni̯øːʁɪn", pos: noun, gender: f, plural: "die Ingenieurinnen", en: "female engineer", ru: "инженер", uk: "інженерка", example_de: "Katja ist Ingenieurin.", example_en: "Katja is an engineer.", example_ru: "Катя — инженер.", example_uk: "Катя — інженерка." }
  - { de: "freundlich", ipa: "ˈfʁɔʏ̯ntlɪç", pos: adj, en: "friendly", ru: "дружелюбный", uk: "привітний", example_de: "Nina ist freundlich.", example_en: "Nina is friendly.", example_ru: "Нина дружелюбная.", example_uk: "Ніна привітна." }
  - { de: "ruhig", ipa: "ˈʁuːɪç", pos: adj, en: "calm; quiet", ru: "спокойный; тихий", uk: "спокійний; тихий", example_de: "Mein Großvater ist ruhig.", example_en: "My grandfather is calm.", example_ru: "Мой дедушка спокойный.", example_uk: "Мій дідусь спокійний." }
  - { de: "groß", ipa: "ˈgʁoːs", pos: adj, en: "tall; big", ru: "высокий; большой", uk: "високий; великий", example_de: "Tim ist groß.", example_en: "Tim is tall.", example_ru: "Тим высокий.", example_uk: "Тім високий." }
  - { de: "klein", ipa: "ˈklaɪ̯n", pos: adj, en: "short; small", ru: "невысокий; маленький", uk: "невисокий; маленький", example_de: "Lea ist klein.", example_en: "Lea is short.", example_ru: "Леа невысокая.", example_uk: "Леа невисока." }
  - { de: "blond", ipa: "ˈblɔnt", pos: adj, en: "blond", ru: "светловолосый", uk: "білявий", example_de: "Eva ist blond.", example_en: "Eva is blond.", example_ru: "Ева — блондинка.", example_uk: "Ева білява." }
  - { de: "Haare", ipa: "ˈhaːʁə", pos: phrase, en: "hair", ru: "волосы", uk: "волосся", example_de: "Sie hat lange braune Haare.", example_en: "She has long brown hair.", example_ru: "У неё длинные каштановые волосы.", example_uk: "У неї довге каштанове волосся." }
  - { de: "Geburtstag", ipa: "gəˈbuːɐ̯tsˌtaːk", pos: noun, gender: m, plural: "die Geburtstage", en: "birthday", ru: "день рождения", uk: "день народження", example_de: "Wann ist dein Geburtstag?", example_en: "When is your birthday?", example_ru: "Когда у тебя день рождения?", example_uk: "Коли в тебе день народження?" }
  - { de: "geboren", ipa: "gəˈboːʁən", pos: adj, en: "born", ru: "рождённый", uk: "народжений", example_de: "Ich bin in Minsk geboren.", example_en: "I was born in Minsk.", example_ru: "Я родился в Минске.", example_uk: "Я народився в Мінську.", note: { en: "Always used with sein: ich bin geboren, not haben.", ru: "Всегда с sein: ich bin geboren, а не haben.", uk: "Завжди з sein: ich bin geboren, а не haben." } }
  - { de: "Kind", ipa: "ˈkɪnt", pos: noun, gender: n, plural: "die Kinder", en: "child", ru: "ребёнок", uk: "дитина", example_de: "Das Kind spielt im Garten.", example_en: "The child is playing in the garden.", example_ru: "Ребёнок играет в саду.", example_uk: "Дитина грається в саду." }
  - { de: "Großvater", ipa: "ˈgʁoːsˌfaːtɐ", pos: noun, gender: m, plural: "die Großväter", en: "grandfather", ru: "дедушка", uk: "дідусь", example_de: "Mein Großvater wohnt in Hamburg.", example_en: "My grandfather lives in Hamburg.", example_ru: "Мой дедушка живёт в Гамбурге.", example_uk: "Мій дідусь живе в Гамбурзі." }
  - { de: "Großmutter", ipa: "ˈgʁoːsˌmʊtɐ", pos: noun, gender: f, plural: "die Großmütter", en: "grandmother", ru: "бабушка", uk: "бабуся", example_de: "Meine Großmutter kocht sehr gut.", example_en: "My grandmother cooks very well.", example_ru: "Моя бабушка очень хорошо готовит.", example_uk: "Моя бабуся дуже добре готує." }
  - { de: "Mann", ipa: "ˈman", pos: noun, gender: m, plural: "die Männer", en: "man; husband", ru: "мужчина; муж", uk: "чоловік (людина); чоловік (у шлюбі)", example_de: "Ihr Mann arbeitet in Berlin.", example_en: "Her husband works in Berlin.", example_ru: "Её муж работает в Берлине.", example_uk: "Її чоловік працює в Берліні." }
  - { de: "Junge", ipa: "ˈjʊŋə", pos: noun, gender: m, plural: "die Jungen", en: "boy", ru: "мальчик", uk: "хлопчик", example_de: "Der Junge heißt Paul.", example_en: "The boy's name is Paul.", example_ru: "Мальчика зовут Пауль.", example_uk: "Хлопчика звати Пауль." }
  - { de: "Mädchen", ipa: "ˈmɛːtçn̩", pos: noun, gender: n, plural: "die Mädchen", en: "girl", ru: "девочка", uk: "дівчинка", example_de: "Das Mädchen heißt Lina.", example_en: "The girl's name is Lina.", example_ru: "Девочку зовут Лина.", example_uk: "Дівчинку звати Ліна.", note: { en: "All -chen nouns are neuter, regardless of natural gender: das Mädchen.", ru: "Все существительные на -chen — среднего рода, независимо от реального пола: das Mädchen.", uk: "Усі іменники на -chen — середнього роду, незалежно від реальної статі: das Mädchen." } }
  - { de: "Leute", ipa: "ˈlɔʏ̯tə", pos: phrase, en: "people", ru: "люди", uk: "люди", example_de: "Viele Leute wohnen in Berlin.", example_en: "Many people live in Berlin.", example_ru: "Много людей живёт в Берлине.", example_uk: "Багато людей живе в Берліні." }
  - { de: "Mensch", ipa: "ˈmɛnʃ", pos: noun, gender: m, plural: "die Menschen", en: "human being, person", ru: "человек", uk: "людина", example_de: "Er ist ein netter Mensch.", example_en: "He is a nice person.", example_ru: "Он хороший человек.", example_uk: "Він хороша людина." }
  - { de: "verheiratet", ipa: "fɛɐ̯ˈhaɪ̯ʁaːtət", pos: adj, en: "married", ru: "женат; замужем", uk: "одружений; заміжня", example_de: "Ihre Eltern sind verheiratet.", example_en: "Her parents are married.", example_ru: "Её родители женаты.", example_uk: "Її батьки одружені." }
  - { de: "ledig", ipa: "ˈleːdɪç", pos: adj, en: "single, unmarried", ru: "холост; не замужем", uk: "неодружений; незаміжня", example_de: "Ihr Bruder ist ledig.", example_en: "Her brother is single.", example_ru: "Её брат холост.", example_uk: "Її брат неодружений." }
