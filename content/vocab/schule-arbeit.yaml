  - { de: "Arbeitgeber", ipa: "ˈaʁbaɪ̯tˌgeːbɐ", pos: noun, gender: m, plural: "die Arbeitgeber", en: "employer", ru: "работодатель", uk: "роботодавець", example_de: "Der Arbeitgeber zahlt gut.", example_en: "The employer pays well.", example_ru: "Работодатель хорошо платит.", example_uk: "Роботодавець добре платить." }
  - { de: "Firma", ipa: "ˈfɪʁma", pos: noun, gender: f, plural: "die Firmen", en: "company; firm", ru: "фирма; компания", uk: "фірма; компанія", example_de: "Die Firma ist international.", example_en: "The company is international.", example_ru: "Фирма международная.", example_uk: "Фірма міжнародна." }
  - { de: "Chef", ipa: "ˈʃɛf", pos: noun, gender: m, plural: "die Chefs", en: "boss (male)", ru: "начальник; шеф", uk: "начальник; шеф", example_de: "Mein Chef ist sehr nett.", example_en: "My boss is very nice.", example_ru: "Мой начальник очень добрый.", example_uk: "Мій начальник дуже приязний.", note: { en: "False friend: der Chef means \"boss\", not a cook — that is der Koch.", ru: "Der Chef — «начальник», а не повар (это der Koch).", uk: "Der Chef — «начальник», а не кухар (це der Koch)." } }
  - { de: "Chefin", ipa: "ˈʃɛfɪn", pos: noun, gender: f, plural: "die Chefinnen", en: "boss (female)", ru: "начальница", uk: "начальниця", example_de: "Die Chefin arbeitet viel.", example_en: "The boss works a lot.", example_ru: "Начальница много работает.", example_uk: "Начальниця багато працює." }
  - { de: "Kollegin", ipa: "kɔˈleːgɪn", pos: noun, gender: f, plural: "die Kolleginnen", en: "colleague (female)", ru: "коллега", uk: "колега (жінка)", example_de: "Meine Kollegin heißt Julia.", example_en: "My colleague is called Julia.", example_ru: "Мою коллегу зовут Юлия.", example_uk: "Мою колегу звати Юлія." }
  - { de: "Computer", ipa: "kɔmˈpjuːtɐ", pos: noun, gender: m, plural: "die Computer", en: "computer", ru: "компьютер", uk: "комп'ютер", example_de: "Der Computer ist neu.", example_en: "The computer is new.", example_ru: "Компьютер новый.", example_uk: "Комп'ютер новий." }
  - { de: "Praktikum", ipa: "ˈpʁaktikʊm", pos: noun, gender: n, plural: "die Praktika", en: "internship; work placement", ru: "стажировка; практика", uk: "стажування; практика", example_de: "Das Praktikum dauert drei Monate.", example_en: "The internship lasts three months.", example_ru: "Стажировка длится три месяца.", example_uk: "Стажування триває три місяці." }
  - { de: "verdienen", ipa: "fɛɐ̯ˈdiːnən", pos: verb, en: "to earn", ru: "зарабатывать", uk: "заробляти", example_de: "Sie verdient gut.", example_en: "She earns well.", example_ru: "Она хорошо зарабатывает.", example_uk: "Вона добре заробляє.", partizip2: "verdient", aux: haben, praesens_3sg: "verdient" }
  - { de: "arbeitslos", ipa: "ˈaʁbaɪ̯tsloːs", pos: adj, en: "unemployed", ru: "безработный", uk: "безробітний", example_de: "Er ist arbeitslos.", example_en: "He is unemployed.", example_ru: "Он безработный.", example_uk: "Він безробітний." }
  - { de: "Stelle", ipa: "ˈʃtɛlə", pos: noun, gender: f, plural: "die Stellen", en: "position; job vacancy", ru: "должность; вакансия", uk: "посада; вакансія", example_de: "Die Stelle ist frei.", example_en: "The position is vacant.", example_ru: "Вакансия свободна.", example_uk: "Вакансія вільна." }
  - { de: "Job", ipa: "ˈdʒɔp", pos: noun, gender: m, plural: "die Jobs", en: "job", ru: "работа (разг.)", uk: "робота (розм.)", example_de: "Der Job ist nicht leicht.", example_en: "The job is not easy.", example_ru: "Эта работа нелёгкая.", example_uk: "Ця робота нелегка.", note: { en: "Job is informal and casual; Beruf and Stelle sound more official.", ru: "Job — разговорное слово; Beruf и Stelle звучат более официально.", uk: "Job — розмовне слово; Beruf і Stelle звучать офіційніше." } }
  - { de: "Ausweis", ipa: "ˈaʊ̯sˌvaɪ̯s", pos: noun, gender: m, plural: "die Ausweise", en: "ID card; identity card", ru: "удостоверение личности", uk: "посвідчення особи", example_de: "Ich brauche meinen Ausweis.", example_en: "I need my ID card.", example_ru: "Мне нужно моё удостоверение личности.", example_uk: "Мені потрібне моє посвідчення особи." }
  - { de: "Formular", ipa: "fɔʁmuˈlaːɐ̯", pos: noun, gender: n, plural: "die Formulare", en: "form (document)", ru: "бланк; форма (документ)", uk: "бланк; формуляр (документ)", example_de: "Das Formular ist lang.", example_en: "The form is long.", example_ru: "Бланк длинный.", example_uk: "Бланк довгий." }
  - { de: "Führerschein", ipa: "ˈfyːʁɐˌʃaɪ̯n", pos: noun, gender: m, plural: "die Führerscheine", en: "driver's license", ru: "водительские права", uk: "водійські права", example_de: "Er hat keinen Führerschein.", example_en: "He doesn't have a driver's license.", example_ru: "У него нет водительских прав.", example_uk: "У нього немає водійських прав.", note: { en: "\"To get a driver's license\" is den Führerschein machen, not \"bekommen\".", ru: "«Получить права» по-немецки — den Führerschein machen, а не bekommen.", uk: "«Отримати права» німецькою — den Führerschein machen, а не bekommen." } }
