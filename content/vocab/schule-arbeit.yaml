id: schule-arbeit
title_de: "Schule & Arbeit"
title_en: "School & work"
title_ru: "Учёба и работа"
level: A1
entries:
  - { de: "Schule", ipa: "ˈʃuːlə", pos: noun, gender: f, plural: "die Schulen", en: "school", ru: "школа", example_de: "Die Schule beginnt um acht Uhr.", example_en: "School starts at eight o'clock.", example_ru: "Школа начинается в восемь часов." }
  - { de: "Schüler", ipa: "ˈʃyːlɐ", pos: noun, gender: m, plural: "die Schüler", en: "pupil; schoolboy", ru: "ученик; школьник", example_de: "Der Schüler lernt Deutsch.", example_en: "The pupil is learning German.", example_ru: "Ученик учит немецкий язык." }
  - { de: "Schülerin", ipa: "ˈʃyːləʁɪn", pos: noun, gender: f, plural: "die Schülerinnen", en: "pupil; schoolgirl", ru: "ученица; школьница", example_de: "Die Schülerin macht die Hausaufgabe.", example_en: "The pupil is doing the homework.", example_ru: "Ученица делает домашнее задание." }
  - { de: "Klasse", ipa: "ˈklasə", pos: noun, gender: f, plural: "die Klassen", en: "class; classroom", ru: "класс", example_de: "Die Klasse hat zwanzig Schüler.", example_en: "The class has twenty pupils.", example_ru: "В классе двадцать учеников." }
  - { de: "Kurs", ipa: "ˈkʊʁs", pos: noun, gender: m, plural: "die Kurse", en: "course", ru: "курс", example_de: "Der Kurs ist am Mittwoch.", example_en: "The course is on Wednesday.", example_ru: "Курс проходит в среду." }
  - { de: "Unterricht", ipa: "ˈʊntɐʁɪçt", pos: noun, gender: m, plural: "—", en: "lessons; class instruction", ru: "занятия; урок(и)", example_de: "Der Unterricht beginnt um neun Uhr.", example_en: "Class starts at nine o'clock.", example_ru: "Занятия начинаются в девять часов." }
  - { de: "Prüfung", ipa: "ˈpʁyːfʊŋ", pos: noun, gender: f, plural: "die Prüfungen", en: "exam; test", ru: "экзамен", example_de: "Die Prüfung ist am Freitag.", example_en: "The exam is on Friday.", example_ru: "Экзамен в пятницу." }
  - { de: "Test", ipa: "ˈtɛst", pos: noun, gender: m, plural: "die Tests", en: "test; quiz", ru: "тест; проверочная работа", example_de: "Wir schreiben heute einen Test.", example_en: "We are writing a test today.", example_ru: "Сегодня мы пишем тест.", note: { en: "Test is shorter and less formal than Prüfung, a big official exam.", ru: "Test — короткая, менее формальная проверка, в отличие от Prüfung (официальный экзамен)." } }
  - { de: "Aufgabe", ipa: "ˈaʊ̯fˌgaːbə", pos: noun, gender: f, plural: "die Aufgaben", en: "task; exercise", ru: "задание; задача", example_de: "Die Aufgabe ist nicht schwer.", example_en: "The task is not difficult.", example_ru: "Задание несложное." }
  - { de: "Hausaufgabe", ipa: "ˈhaʊ̯sˌʔaʊ̯fgaːbə", pos: noun, gender: f, plural: "die Hausaufgaben", en: "homework", ru: "домашнее задание", example_de: "Ich mache meine Hausaufgabe am Abend.", example_en: "I do my homework in the evening.", example_ru: "Я делаю домашнее задание вечером." }
  - { de: "Übung", ipa: "ˈyːbʊŋ", pos: noun, gender: f, plural: "die Übungen", en: "exercise; practice", ru: "упражнение", example_de: "Die Übung ist im Buch.", example_en: "The exercise is in the book.", example_ru: "Упражнение есть в книге." }
  - { de: "studieren", ipa: "ʃtuˈdiːʁən", pos: verb, en: "to study (at university)", ru: "учиться (в вузе)", example_de: "Anna studiert Medizin.", example_en: "Anna is studying medicine.", example_ru: "Анна изучает медицину.", partizip2: "studiert", aux: haben, praesens_3sg: "studiert", note: { en: "studieren means to study for a university degree; lernen is general studying, e.g. for a test.", ru: "studieren — учиться в вузе (получать образование); lernen — учить, готовиться, например, к экзамену." } }
  - { de: "Student", ipa: "ʃtuˈdɛnt", pos: noun, gender: m, plural: "die Studenten", en: "student (male, university)", ru: "студент", example_de: "Der Student kommt aus Spanien.", example_en: "The student comes from Spain.", example_ru: "Студент из Испании.", note: { en: "Weak noun (n-Deklination): every case except nominative singular adds -en — den/dem/des Studenten.", ru: "Слабое склонение (n-Deklination): во всех падежах, кроме именительного, добавляется -en — den/dem/des Studenten." } }
  - { de: "Studentin", ipa: "ʃtuˈdɛntɪn", pos: noun, gender: f, plural: "die Studentinnen", en: "student (female, university)", ru: "студентка", example_de: "Die Studentin studiert Physik.", example_en: "The student is studying physics.", example_ru: "Студентка изучает физику." }
  - { de: "Universität", ipa: "univɛʁziˈtɛːt", pos: noun, gender: f, plural: "die Universitäten", en: "university", ru: "университет", example_de: "Die Universität ist groß.", example_en: "The university is big.", example_ru: "Университет большой." }
  - { de: "Studium", ipa: "ˈʃtuːdiʊm", pos: noun, gender: n, plural: "die Studien", en: "university studies; degree course", ru: "учёба (в вузе); обучение", example_de: "Das Studium dauert vier Jahre.", example_en: "The degree course lasts four years.", example_ru: "Учёба длится четыре года." }
  - { de: "Beruf", ipa: "bəˈʁuːf", pos: noun, gender: m, plural: "die Berufe", en: "profession; occupation", ru: "профессия", example_de: "Was ist dein Beruf?", example_en: "What is your profession?", example_ru: "Какая у тебя профессия?" }
  - { de: "Arbeitsplatz", ipa: "ˈaʁbaɪ̯tsˌplats", pos: noun, gender: m, plural: "die Arbeitsplätze", en: "workplace; job", ru: "рабочее место", example_de: "Der Arbeitsplatz ist modern.", example_en: "The workplace is modern.", example_ru: "Рабочее место современное." }
  - { de: "Arbeitgeber", ipa: "ˈaʁbaɪ̯tˌgeːbɐ", pos: noun, gender: m, plural: "die Arbeitgeber", en: "employer", ru: "работодатель", example_de: "Der Arbeitgeber zahlt gut.", example_en: "The employer pays well.", example_ru: "Работодатель хорошо платит." }
  - { de: "Firma", ipa: "ˈfɪʁma", pos: noun, gender: f, plural: "die Firmen", en: "company; firm", ru: "фирма; компания", example_de: "Die Firma ist international.", example_en: "The company is international.", example_ru: "Фирма международная." }
  - { de: "Chef", ipa: "ˈʃɛf", pos: noun, gender: m, plural: "die Chefs", en: "boss (male)", ru: "начальник; шеф", example_de: "Mein Chef ist sehr nett.", example_en: "My boss is very nice.", example_ru: "Мой начальник очень добрый.", note: { en: "False friend: der Chef means \"boss\", not a cook — that is der Koch.", ru: "Der Chef — «начальник», а не повар (это der Koch)." } }
  - { de: "Chefin", ipa: "ˈʃɛfɪn", pos: noun, gender: f, plural: "die Chefinnen", en: "boss (female)", ru: "начальница", example_de: "Die Chefin arbeitet viel.", example_en: "The boss works a lot.", example_ru: "Начальница много работает." }
  - { de: "Kollegin", ipa: "kɔˈleːgɪn", pos: noun, gender: f, plural: "die Kolleginnen", en: "colleague (female)", ru: "коллега", example_de: "Meine Kollegin heißt Julia.", example_en: "My colleague is called Julia.", example_ru: "Мою коллегу зовут Юлия." }
  - { de: "Computer", ipa: "kɔmˈpjuːtɐ", pos: noun, gender: m, plural: "die Computer", en: "computer", ru: "компьютер", example_de: "Der Computer ist neu.", example_en: "The computer is new.", example_ru: "Компьютер новый." }
  - { de: "Praktikum", ipa: "ˈpʁaktikʊm", pos: noun, gender: n, plural: "die Praktika", en: "internship; work placement", ru: "стажировка; практика", example_de: "Das Praktikum dauert drei Monate.", example_en: "The internship lasts three months.", example_ru: "Стажировка длится три месяца." }
  - { de: "verdienen", ipa: "fɛɐ̯ˈdiːnən", pos: verb, en: "to earn", ru: "зарабатывать", example_de: "Sie verdient gut.", example_en: "She earns well.", example_ru: "Она хорошо зарабатывает.", partizip2: "verdient", aux: haben, praesens_3sg: "verdient" }
  - { de: "arbeitslos", ipa: "ˈaʁbaɪ̯tsloːs", pos: adj, en: "unemployed", ru: "безработный", example_de: "Er ist arbeitslos.", example_en: "He is unemployed.", example_ru: "Он безработный." }
  - { de: "Stelle", ipa: "ˈʃtɛlə", pos: noun, gender: f, plural: "die Stellen", en: "position; job vacancy", ru: "должность; вакансия", example_de: "Die Stelle ist frei.", example_en: "The position is vacant.", example_ru: "Вакансия свободна." }
  - { de: "Job", ipa: "ˈdʒɔp", pos: noun, gender: m, plural: "die Jobs", en: "job", ru: "работа (разг.)", example_de: "Der Job ist nicht leicht.", example_en: "The job is not easy.", example_ru: "Эта работа нелёгкая.", note: { en: "Job is informal and casual; Beruf and Stelle sound more official.", ru: "Job — разговорное слово; Beruf и Stelle звучат более официально." } }
  - { de: "Ausweis", ipa: "ˈaʊ̯sˌvaɪ̯s", pos: noun, gender: m, plural: "die Ausweise", en: "ID card; identity card", ru: "удостоверение личности", example_de: "Ich brauche meinen Ausweis.", example_en: "I need my ID card.", example_ru: "Мне нужно моё удостоверение личности." }
  - { de: "Formular", ipa: "fɔʁmuˈlaːɐ̯", pos: noun, gender: n, plural: "die Formulare", en: "form (document)", ru: "бланк; форма (документ)", example_de: "Das Formular ist lang.", example_en: "The form is long.", example_ru: "Бланк длинный." }
  - { de: "Führerschein", ipa: "ˈfyːʁɐˌʃaɪ̯n", pos: noun, gender: m, plural: "die Führerscheine", en: "driver's license", ru: "водительские права", example_de: "Er hat keinen Führerschein.", example_en: "He doesn't have a driver's license.", example_ru: "У него нет водительских прав.", note: { en: "\"To get a driver's license\" is den Führerschein machen, not \"bekommen\".", ru: "«Получить права» по-немецки — den Führerschein machen, а не bekommen." } }
