id: schule-arbeit
title_de: "Schule & Arbeit"
title_en: "School & work"
title_ru: "Учёба и работа"
title_uk: "Навчання та робота"
level: A1
entries:
  - { de: "Schule", ipa: "ˈʃuːlə", pos: noun, gender: f, plural: "die Schulen", en: "school", ru: "школа", uk: "школа", example_de: "Die Schule beginnt um acht Uhr.", example_en: "School starts at eight o'clock.", example_ru: "Школа начинается в восемь часов.", example_uk: "Школа починається о восьмій годині." }
  - { de: "Schüler", ipa: "ˈʃyːlɐ", pos: noun, gender: m, plural: "die Schüler", en: "pupil; schoolboy", ru: "ученик; школьник", uk: "учень; школяр", example_de: "Der Schüler lernt Deutsch.", example_en: "The pupil is learning German.", example_ru: "Ученик учит немецкий язык.", example_uk: "Учень вчить німецьку мову." }
  - { de: "Schülerin", ipa: "ˈʃyːləʁɪn", pos: noun, gender: f, plural: "die Schülerinnen", en: "pupil; schoolgirl", ru: "ученица; школьница", uk: "учениця; школярка", example_de: "Die Schülerin macht die Hausaufgabe.", example_en: "The pupil is doing the homework.", example_ru: "Ученица делает домашнее задание.", example_uk: "Учениця робить домашнє завдання." }
  - { de: "Klasse", ipa: "ˈklasə", pos: noun, gender: f, plural: "die Klassen", en: "class; classroom", ru: "класс", uk: "клас", example_de: "Die Klasse hat zwanzig Schüler.", example_en: "The class has twenty pupils.", example_ru: "В классе двадцать учеников.", example_uk: "У класі двадцять учнів." }
  - { de: "Kurs", ipa: "ˈkʊʁs", pos: noun, gender: m, plural: "die Kurse", en: "course", ru: "курс", uk: "курс", example_de: "Der Kurs ist am Mittwoch.", example_en: "The course is on Wednesday.", example_ru: "Курс проходит в среду.", example_uk: "Курс відбувається в середу." }
  - { de: "Unterricht", ipa: "ˈʊntɐʁɪçt", pos: noun, gender: m, plural: "—", en: "lessons; class instruction", ru: "занятия; урок(и)", uk: "заняття; урок(и)", example_de: "Der Unterricht beginnt um neun Uhr.", example_en: "Class starts at nine o'clock.", example_ru: "Занятия начинаются в девять часов.", example_uk: "Заняття починаються о дев'ятій годині." }
  - { de: "Prüfung", ipa: "ˈpʁyːfʊŋ", pos: noun, gender: f, plural: "die Prüfungen", en: "exam; test", ru: "экзамен", uk: "іспит; екзамен", example_de: "Die Prüfung ist am Freitag.", example_en: "The exam is on Friday.", example_ru: "Экзамен в пятницу.", example_uk: "Іспит у п'ятницю." }
  - { de: "Test", ipa: "ˈtɛst", pos: noun, gender: m, plural: "die Tests", en: "test; quiz", ru: "тест; проверочная работа", uk: "тест; контрольна робота", example_de: "Wir schreiben heute einen Test.", example_en: "We are writing a test today.", example_ru: "Сегодня мы пишем тест.", example_uk: "Сьогодні ми пишемо тест.", note: { en: "Test is shorter and less formal than Prüfung, a big official exam.", ru: "Test — короткая, менее формальная проверка, в отличие от Prüfung (официальный экзамен).", uk: "Test — коротка, менш формальна перевірка, на відміну від Prüfung (офіційний іспит)." } }
  - { de: "Aufgabe", ipa: "ˈaʊ̯fˌgaːbə", pos: noun, gender: f, plural: "die Aufgaben", en: "task; exercise", ru: "задание; задача", uk: "завдання; задача", example_de: "Die Aufgabe ist nicht schwer.", example_en: "The task is not difficult.", example_ru: "Задание несложное.", example_uk: "Завдання нескладне." }
  - { de: "Hausaufgabe", ipa: "ˈhaʊ̯sˌʔaʊ̯fgaːbə", pos: noun, gender: f, plural: "die Hausaufgaben", en: "homework", ru: "домашнее задание", uk: "домашнє завдання", example_de: "Ich mache meine Hausaufgabe am Abend.", example_en: "I do my homework in the evening.", example_ru: "Я делаю домашнее задание вечером.", example_uk: "Я роблю домашнє завдання ввечері." }
  - { de: "Übung", ipa: "ˈyːbʊŋ", pos: noun, gender: f, plural: "die Übungen", en: "exercise; practice", ru: "упражнение", uk: "вправа", example_de: "Die Übung ist im Buch.", example_en: "The exercise is in the book.", example_ru: "Упражнение есть в книге.", example_uk: "Вправа є в книжці." }
  - { de: "studieren", ipa: "ʃtuˈdiːʁən", pos: verb, en: "to study (at university)", ru: "учиться (в вузе)", uk: "навчатися (у виші)", example_de: "Anna studiert Medizin.", example_en: "Anna is studying medicine.", example_ru: "Анна изучает медицину.", example_uk: "Анна вивчає медицину.", partizip2: "studiert", aux: haben, praesens_3sg: "studiert", note: { en: "studieren means to study for a university degree; lernen is general studying, e.g. for a test.", ru: "studieren — учиться в вузе (получать образование); lernen — учить, готовиться, например, к экзамену.", uk: "studieren — навчатися у виші (здобувати освіту); lernen — вчити, готуватися, наприклад, до іспиту." } }
  - { de: "Student", ipa: "ʃtuˈdɛnt", pos: noun, gender: m, plural: "die Studenten", en: "student (male, university)", ru: "студент", uk: "студент", example_de: "Der Student kommt aus Spanien.", example_en: "The student comes from Spain.", example_ru: "Студент из Испании.", example_uk: "Студент з Іспанії.", note: { en: "Weak noun (n-Deklination): every case except nominative singular adds -en — den/dem/des Studenten.", ru: "Слабое склонение (n-Deklination): во всех падежах, кроме именительного, добавляется -en — den/dem/des Studenten.", uk: "Слабка відміна (n-Deklination): у всіх відмінках, крім називного, додається -en — den/dem/des Studenten." } }
  - { de: "Studentin", ipa: "ʃtuˈdɛntɪn", pos: noun, gender: f, plural: "die Studentinnen", en: "student (female, university)", ru: "студентка", uk: "студентка", example_de: "Die Studentin studiert Physik.", example_en: "The student is studying physics.", example_ru: "Студентка изучает физику.", example_uk: "Студентка вивчає фізику." }
  - { de: "Universität", ipa: "univɛʁziˈtɛːt", pos: noun, gender: f, plural: "die Universitäten", en: "university", ru: "университет", uk: "університет", example_de: "Die Universität ist groß.", example_en: "The university is big.", example_ru: "Университет большой.", example_uk: "Університет великий." }
  - { de: "Studium", ipa: "ˈʃtuːdiʊm", pos: noun, gender: n, plural: "die Studien", en: "university studies; degree course", ru: "учёба (в вузе); обучение", uk: "навчання (у виші)", example_de: "Das Studium dauert vier Jahre.", example_en: "The degree course lasts four years.", example_ru: "Учёба длится четыре года.", example_uk: "Навчання триває чотири роки." }
  - { de: "Beruf", ipa: "bəˈʁuːf", pos: noun, gender: m, plural: "die Berufe", en: "profession; occupation", ru: "профессия", uk: "професія; фах", example_de: "Was ist dein Beruf?", example_en: "What is your profession?", example_ru: "Какая у тебя профессия?", example_uk: "Яка в тебе професія?" }
