  - { de: "Garten", ipa: "ˈgaʁtn̩", pos: noun, gender: m, plural: "die Gärten", en: "garden", ru: "сад", example_de: "Es gibt einen Garten.", example_en: "There is a garden.", example_ru: "Есть сад." }
  - { de: "Anzeige", ipa: "ˈanˌtsaɪ̯gə", pos: noun, gender: f, plural: "die Anzeigen", en: "ad; advertisement", ru: "объявление", example_de: "Lena liest eine Anzeige.", example_en: "Lena is reading an ad.", example_ru: "Лена читает объявление." }
  - { de: "hell", ipa: "ˈhɛl", pos: adj, en: "bright; light", ru: "светлый", example_de: "Das Wohnzimmer ist hell.", example_en: "The living room is bright.", example_ru: "Гостиная светлая." }
  - { de: "dunkel", ipa: "ˈdʊŋkl̩", pos: adj, en: "dark", ru: "тёмный", example_de: "Der Flur ist dunkel.", example_en: "The hallway is dark.", example_ru: "Коридор тёмный." }
