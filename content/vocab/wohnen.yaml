  - { de: "billig", ipa: "ˈbɪlɪç", pos: adj, en: "cheap", ru: "дешёвый", example_de: "Das Sofa ist billig.", example_en: "The sofa is cheap.", example_ru: "Диван дешёвый." }
  - { de: "neu", ipa: "ˈnɔʏ̯", pos: adj, en: "new", ru: "новый", example_de: "Die Küche ist neu.", example_en: "The kitchen is new.", example_ru: "Кухня новая." }
  - { de: "alt", ipa: "ˈalt", pos: adj, en: "old", ru: "старый", example_de: "Das Haus ist alt.", example_en: "The house is old.", example_ru: "Дом старый." }
  - { de: "schön", ipa: "ˈʃøːn", pos: adj, en: "beautiful; nice", ru: "красивый", example_de: "Die Wohnung ist schön.", example_en: "The apartment is beautiful.", example_ru: "Квартира красивая." }
  - { de: "stehen", ipa: "ˈʃteːən", pos: verb, en: "to stand", ru: "стоять", example_de: "Im Flur steht ein Schrank.", example_en: "A wardrobe stands in the hallway.", example_ru: "В прихожей стоит шкаф.", partizip2: "gestanden", aux: "haben", praesens_3sg: "steht" }
  - { de: "es gibt", ipa: "ɛs ˈgiːpt", pos: phrase, en: "there is; there are", ru: "есть, имеется", example_de: "In der Wohnung gibt es einen Balkon.", example_en: "There is a balcony in the apartment.", example_ru: "В квартире есть балкон.", note: { en: "Always singular and always + Akkusativ: es gibt einen Balkon, es gibt drei Zimmer.", ru: "Всегда в единственном числе и всегда + Akkusativ: es gibt einen Balkon, es gibt drei Zimmer." } }
