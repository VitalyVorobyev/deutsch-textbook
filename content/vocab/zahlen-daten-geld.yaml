  - { de: "hundert", ipa: "ˈhʊndɐt", pos: num, en: "hundred", ru: "сто", uk: "сто", example_de: "Das Sofa kostet hundert Euro.", example_en: "The sofa costs a hundred euros.", example_ru: "Диван стоит сто евро.", example_uk: "Диван коштує сто євро." }
