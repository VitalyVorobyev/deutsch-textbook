  - { de: "erste", ipa: "ˈeːɐ̯stə", pos: adj, en: "first", ru: "первый", uk: "перший", example_de: "Heute ist der erste Mai.", example_en: "Today is the first of May.", example_ru: "Сегодня первое мая.", example_uk: "Сьогодні перше травня." }
  - { de: "zweite", ipa: "ˈtsvaɪ̯tə", pos: adj, en: "second", ru: "второй", uk: "другий", example_de: "Der Kurs beginnt am zweiten September.", example_en: "The course begins on the second of September.", example_ru: "Курс начинается второго сентября.", example_uk: "Курс починається другого вересня." }
  - { de: "dritte", ipa: "ˈdʁɪtə", pos: adj, en: "third", ru: "третий", uk: "третій", example_de: "Ihr Geburtstag ist am dritten Oktober.", example_en: "Her birthday is on the third of October.", example_ru: "Её день рождения — третьего октября.", example_uk: "Її день народження — третього жовтня." }
  - { de: "Datum", ipa: "ˈdaːtʊm", pos: noun, gender: n, plural: "die Daten", en: "date (calendar)", ru: "дата, число", uk: "дата, число", example_de: "Welches Datum haben wir heute?", example_en: "What is today's date?", example_ru: "Какое сегодня число?", example_uk: "Яке сьогодні число?", note: { en: "The plural 'die Daten' looks like the English word 'data' — here it just means several calendar dates. To ask today's date, say 'Welches Datum haben wir heute?' or 'Der Wievielte ist heute?', not 'Was ist das Datum?'.", ru: "Множественное число 'die Daten' по форме совпадает со словом «данные» (data), но здесь оно означает просто несколько дат. Чтобы спросить сегодняшнее число, говорят 'Welches Datum haben wir heute?' или 'Der Wievielte ist heute?', а не 'Was ist das Datum?'.", uk: "Множина 'die Daten' за формою збігається зі словом «дані» (data), але тут вона означає просто кілька дат. Щоб запитати сьогоднішнє число, кажуть 'Welches Datum haben wir heute?' або 'Der Wievielte ist heute?', а не 'Was ist das Datum?'." } }
  - { de: "Geld", ipa: "ˈgɛlt", pos: noun, gender: n, plural: "—", en: "money", ru: "деньги", uk: "гроші", example_de: "Ich habe nicht viel Geld.", example_en: "I don't have much money.", example_ru: "У меня немного денег.", example_uk: "У мене небагато грошей." }
  - { de: "Euro", ipa: "ˈɔʏ̯ʁo", pos: noun, gender: m, plural: "die Euro", en: "euro", ru: "евро", uk: "євро", example_de: "Der Kaffee kostet zwei Euro.", example_en: "The coffee costs two euros.", example_ru: "Кофе стоит два евро.", example_uk: "Кава коштує два євро.", note: { en: "After a number, 'Euro' stays unchanged: zwei Euro, zehn Euro — never 'Euros'.", ru: "После числительного 'Euro' не изменяется: zwei Euro, zehn Euro — никогда не 'Euros'.", uk: "Після числівника 'Euro' не змінюється: zwei Euro, zehn Euro — ніколи не 'Euros'." } }
  - { de: "Cent", ipa: "ˈsɛnt", pos: noun, gender: m, plural: "die Cent", en: "cent", ru: "цент", uk: "цент", example_de: "Das Brötchen kostet fünfzig Cent.", example_en: "The bread roll costs fifty cents.", example_ru: "Булочка стоит пятьдесят центов.", example_uk: "Булочка коштує п'ятдесят центів." }
  - { de: "umsonst", ipa: "ʊmˈzɔnst", pos: adv, en: "for free; in vain", ru: "бесплатно; напрасно, зря", uk: "безплатно; марно, даремно", example_de: "Der Eintritt ist heute umsonst.", example_en: "Admission is free today.", example_ru: "Сегодня вход бесплатный.", example_uk: "Сьогодні вхід безплатний.", note: { en: "'umsonst' has two meanings: 'for free' (kostenlos) and 'in vain, for nothing' (vergeblich) — context tells you which.", ru: "У 'umsonst' два значения: «бесплатно» (kostenlos) и «напрасно, зря» (vergeblich) — какое из них имеется в виду, понятно из контекста.", uk: "В 'umsonst' два значення: «безплатно» (kostenlos) і «марно, даремно» (vergeblich) — яке з них мається на увазі, зрозуміло з контексту." } }
  - { de: "Prozent", ipa: "pʁoˈtsɛnt", pos: noun, gender: n, plural: "die Prozent", en: "percent", ru: "процент", uk: "відсоток; процент", example_de: "Der Rabatt ist zehn Prozent.", example_en: "The discount is ten percent.", example_ru: "Скидка — десять процентов.", example_uk: "Знижка — десять відсотків." }
  - { de: "Nummer", ipa: "ˈnʊmɐ", pos: noun, gender: f, plural: "die Nummern", en: "number (identifying)", ru: "номер", uk: "номер", example_de: "Ich brauche deine Nummer.", example_en: "I need your number.", example_ru: "Мне нужен твой номер.", example_uk: "Мені потрібен твій номер.", note: { en: "'Nummer' names an identifying number (Telefonnummer, Hausnummer); a counted quantity is 'Zahl' (zwei Kinder — zwei is a Zahl, not a Nummer).", ru: "«Nummer» — это номер-идентификатор (Telefonnummer, Hausnummer); количество называется «Zahl» (zwei Kinder — zwei здесь Zahl, а не Nummer).", uk: "«Nummer» — це номер-ідентифікатор (Telefonnummer, Hausnummer); кількість називається «Zahl» (zwei Kinder — zwei тут Zahl, а не Nummer)." } }
  - { de: "zählen", ipa: "ˈtsɛːlən", pos: verb, en: "to count", ru: "считать", uk: "лічити, рахувати", example_de: "Das Kind zählt bis zwanzig.", example_en: "The child counts to twenty.", example_ru: "Ребёнок считает до двадцати.", example_uk: "Дитина лічить до двадцяти.", partizip2: "gezählt", aux: "haben", praesens_3sg: "zählt", note: { en: "Don't confuse with 'zahlen' (to pay) — 'zählen' has an umlaut and means 'to count'.", ru: "Не путайте с 'zahlen' (платить) — в 'zählen' есть умлаут, и это слово значит «считать».", uk: "Не плутайте із 'zahlen' (платити) — у 'zählen' є умлаут, і це слово означає «лічити»." } }
  - { de: "Februar", ipa: "ˈfeːbʁuaːɐ̯", pos: noun, gender: m, plural: "—", en: "February", ru: "февраль", uk: "лютий", example_de: "Im Februar ist es noch kalt.", example_en: "In February it is still cold.", example_ru: "В феврале ещё холодно.", example_uk: "У лютому ще холодно." }
