  - { de: "sechzig", ipa: "ˈzɛçtsɪç", pos: num, en: "sixty", ru: "шестьдесят", uk: "шістдесят", example_de: "Mein Großvater ist sechzig Jahre alt.", example_en: "My grandfather is sixty years old.", example_ru: "Моему дедушке шестьдесят лет.", example_uk: "Моєму дідусеві шістдесят років." }
  - { de: "siebzig", ipa: "ˈziːptsɪç", pos: num, en: "seventy", ru: "семьдесят", uk: "сімдесят", example_de: "Die Hose kostet siebzig Euro.", example_en: "The trousers cost seventy euros.", example_ru: "Брюки стоят семьдесят евро.", example_uk: "Штани коштують сімдесят євро." }
  - { de: "achtzig", ipa: "ˈaxtsɪç", pos: num, en: "eighty", ru: "восемьдесят", uk: "вісімдесят", example_de: "Meine Oma ist achtzig Jahre alt.", example_en: "My grandma is eighty years old.", example_ru: "Моей бабушке восемьдесят лет.", example_uk: "Моїй бабусі вісімдесят років." }
