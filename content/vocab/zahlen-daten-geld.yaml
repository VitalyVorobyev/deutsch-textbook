  - { de: "August", ipa: "aʊ̯ˈgʊst", pos: noun, gender: m, plural: "—", en: "August", ru: "август", uk: "серпень", example_de: "Im August machen wir Urlaub.", example_en: "In August we go on vacation.", example_ru: "В августе у нас отпуск.", example_uk: "У серпні в нас відпустка." }
  - { de: "September", ipa: "zɛpˈtɛmbɐ", pos: noun, gender: m, plural: "—", en: "September", ru: "сентябрь", uk: "вересень", example_de: "Im September beginnt die Schule wieder.", example_en: "In September school starts again.", example_ru: "В сентябре снова начинается учёба.", example_uk: "У вересні знову починається навчання." }
  - { de: "Oktober", ipa: "ɔkˈtoːbɐ", pos: noun, gender: m, plural: "—", en: "October", ru: "октябрь", uk: "жовтень", example_de: "Im Oktober werden die Tage kürzer.", example_en: "In October the days get shorter.", example_ru: "В октябре дни становятся короче.", example_uk: "У жовтні дні стають коротшими." }
  - { de: "November", ipa: "noˈvɛmbɐ", pos: noun, gender: m, plural: "—", en: "November", ru: "ноябрь", uk: "листопад", example_de: "Im November ist das Wetter grau.", example_en: "In November the weather is grey.", example_ru: "В ноябре погода серая.", example_uk: "У листопаді погода сіра." }
  - { de: "Dezember", ipa: "deˈtsɛmbɐ", pos: noun, gender: m, plural: "—", en: "December", ru: "декабрь", uk: "грудень", example_de: "Im Dezember feiern wir Weihnachten.", example_en: "In December we celebrate Christmas.", example_ru: "В декабре мы празднуем Рождество.", example_uk: "У грудні ми святкуємо Різдво." }
