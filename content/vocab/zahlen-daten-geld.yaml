  - { de: "vierzig", ipa: "ˈfiːɐ̯tsɪç", pos: num, en: "forty", ru: "сорок", uk: "сорок", example_de: "Meine Mutter ist vierzig Jahre alt.", example_en: "My mother is forty years old.", example_ru: "Моей маме сорок лет.", example_uk: "Моїй мамі сорок років." }
