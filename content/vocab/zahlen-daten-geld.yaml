id: zahlen-daten-geld
title_de: "Zahlen, Datum & Geld"
title_en: "Numbers, dates & money"
title_ru: "Числа, даты и деньги"
level: A1
entries:
  - { de: "drei", ipa: "ˈdʁaɪ̯", pos: num, en: "three", ru: "три", example_de: "Ich habe drei Kinder.", example_en: "I have three children.", example_ru: "У меня трое детей." }
  - { de: "vier", ipa: "ˈfiːɐ̯", pos: num, en: "four", ru: "четыре", example_de: "Die Wohnung hat vier Zimmer.", example_en: "The apartment has four rooms.", example_ru: "В квартире четыре комнаты." }
  - { de: "sechs", ipa: "ˈzɛks", pos: num, en: "six", ru: "шесть", example_de: "Der Kurs dauert sechs Wochen.", example_en: "The course lasts six weeks.", example_ru: "Курс длится шесть недель." }
  - { de: "sieben", ipa: "ˈziːbn̩", pos: num, en: "seven", ru: "семь", example_de: "Ich arbeite sieben Stunden am Tag.", example_en: "I work seven hours a day.", example_ru: "Я работаю семь часов в день." }
  - { de: "acht", ipa: "ˈaxt", pos: num, en: "eight", ru: "восемь", example_de: "Der Kuchen kostet acht Euro.", example_en: "The cake costs eight euros.", example_ru: "Торт стоит восемь евро." }
  - { de: "neun", ipa: "ˈnɔʏ̯n", pos: num, en: "nine", ru: "девять", example_de: "Der Zug fährt um neun Uhr.", example_en: "The train leaves at nine o'clock.", example_ru: "Поезд отправляется в девять часов." }
  - { de: "elf", ipa: "ˈɛlf", pos: num, en: "eleven", ru: "одиннадцать", example_de: "Die Party beginnt um elf Uhr.", example_en: "The party begins at eleven o'clock.", example_ru: "Вечеринка начинается в одиннадцать часов." }
  - { de: "zwölf", ipa: "ˈtsvœlf", pos: num, en: "twelve", ru: "двенадцать", example_de: "Ein Jahr hat zwölf Monate.", example_en: "A year has twelve months.", example_ru: "В году двенадцать месяцев." }
  - { de: "dreizehn", ipa: "ˈdʁaɪ̯ˌtseːn", pos: num, en: "thirteen", ru: "тринадцать", example_de: "Meine Schwester ist dreizehn Jahre alt.", example_en: "My sister is thirteen years old.", example_ru: "Моей сестре тринадцать лет." }
  - { de: "vierzehn", ipa: "ˈfiːɐ̯ˌtseːn", pos: num, en: "fourteen", ru: "четырнадцать", example_de: "Der Urlaub dauert vierzehn Tage.", example_en: "The vacation lasts fourteen days.", example_ru: "Отпуск длится четырнадцать дней." }
  - { de: "fünfzehn", ipa: "ˈfʏnfˌtseːn", pos: num, en: "fifteen", ru: "пятнадцать", example_de: "Ich warte schon fünfzehn Minuten.", example_en: "I have already been waiting fifteen minutes.", example_ru: "Я уже жду пятнадцать минут." }
  - { de: "sechzehn", ipa: "ˈzɛçˌtseːn", pos: num, en: "sixteen", ru: "шестнадцать", example_de: "Mein Bruder ist sechzehn Jahre alt.", example_en: "My brother is sixteen years old.", example_ru: "Моему брату шестнадцать лет." }
  - { de: "siebzehn", ipa: "ˈziːpˌtseːn", pos: num, en: "seventeen", ru: "семнадцать", example_de: "In der Klasse sind siebzehn Schüler.", example_en: "There are seventeen students in the class.", example_ru: "В классе семнадцать учеников." }
  - { de: "achtzehn", ipa: "ˈaxtˌtseːn", pos: num, en: "eighteen", ru: "восемнадцать", example_de: "Meine Tochter ist achtzehn Jahre alt.", example_en: "My daughter is eighteen years old.", example_ru: "Моей дочери восемнадцать лет." }
  - { de: "neunzehn", ipa: "ˈnɔʏ̯nˌtseːn", pos: num, en: "nineteen", ru: "девятнадцать", example_de: "Das Zimmer kostet neunzehn Euro pro Nacht.", example_en: "The room costs nineteen euros per night.", example_ru: "Номер стоит девятнадцать евро за ночь." }
  - { de: "zwanzig", ipa: "ˈtsvantsɪç", pos: num, en: "twenty", ru: "двадцать", example_de: "Das kostet zwanzig Euro.", example_en: "That costs twenty euros.", example_ru: "Это стоит двадцать евро." }
  - { de: "dreißig", ipa: "ˈdʁaɪ̯sɪç", pos: num, en: "thirty", ru: "тридцать", example_de: "Der Rock kostet dreißig Euro.", example_en: "The skirt costs thirty euros.", example_ru: "Юбка стоит тридцать евро." }
  - { de: "vierzig", ipa: "ˈfiːɐ̯tsɪç", pos: num, en: "forty", ru: "сорок", example_de: "Meine Mutter ist vierzig Jahre alt.", example_en: "My mother is forty years old.", example_ru: "Моей маме сорок лет." }
  - { de: "fünfzig", ipa: "ˈfʏnftsɪç", pos: num, en: "fifty", ru: "пятьдесят", example_de: "Die Wohnung hat fünfzig Quadratmeter.", example_en: "The apartment has fifty square metres.", example_ru: "Площадь квартиры — пятьдесят квадратных метров." }
  - { de: "sechzig", ipa: "ˈzɛçtsɪç", pos: num, en: "sixty", ru: "шестьдесят", example_de: "Mein Großvater ist sechzig Jahre alt.", example_en: "My grandfather is sixty years old.", example_ru: "Моему дедушке шестьдесят лет." }
  - { de: "siebzig", ipa: "ˈziːptsɪç", pos: num, en: "seventy", ru: "семьдесят", example_de: "Die Hose kostet siebzig Euro.", example_en: "The trousers cost seventy euros.", example_ru: "Брюки стоят семьдесят евро." }
  - { de: "achtzig", ipa: "ˈaxtsɪç", pos: num, en: "eighty", ru: "восемьдесят", example_de: "Meine Oma ist achtzig Jahre alt.", example_en: "My grandma is eighty years old.", example_ru: "Моей бабушке восемьдесят лет." }
  - { de: "neunzig", ipa: "ˈnɔʏ̯ntsɪç", pos: num, en: "ninety", ru: "девяносто", example_de: "Der Stuhl kostet neunzig Euro.", example_en: "The chair costs ninety euros.", example_ru: "Стул стоит девяносто евро." }
  - { de: "hundert", ipa: "ˈhʊndɐt", pos: num, en: "hundred", ru: "сто", example_de: "Das Sofa kostet hundert Euro.", example_en: "The sofa costs a hundred euros.", example_ru: "Диван стоит сто евро." }
  - { de: "tausend", ipa: "ˈtaʊ̯zn̩t", pos: num, en: "thousand", ru: "тысяча", example_de: "Die Miete kostet tausend Euro.", example_en: "The rent costs a thousand euros.", example_ru: "Аренда стоит тысячу евро." }
  - { de: "erste", ipa: "ˈeːɐ̯stə", pos: adj, en: "first", ru: "первый", example_de: "Heute ist der erste Mai.", example_en: "Today is the first of May.", example_ru: "Сегодня первое мая." }
  - { de: "zweite", ipa: "ˈtsvaɪ̯tə", pos: adj, en: "second", ru: "второй", example_de: "Der Kurs beginnt am zweiten September.", example_en: "The course begins on the second of September.", example_ru: "Курс начинается второго сентября." }
  - { de: "dritte", ipa: "ˈdʁɪtə", pos: adj, en: "third", ru: "третий", example_de: "Ihr Geburtstag ist am dritten Oktober.", example_en: "Her birthday is on the third of October.", example_ru: "Её день рождения — третьего октября." }
  - { de: "Datum", ipa: "ˈdaːtʊm", pos: noun, gender: n, plural: "die Daten", en: "date (calendar)", ru: "дата, число", example_de: "Welches Datum haben wir heute?", example_en: "What is today's date?", example_ru: "Какое сегодня число?", note: { en: "The plural 'die Daten' looks like the English word 'data' — here it just means several calendar dates. To ask today's date, say 'Welches Datum haben wir heute?' or 'Der Wievielte ist heute?', not 'Was ist das Datum?'.", ru: "Множественное число 'die Daten' по форме совпадает со словом «данные» (data), но здесь оно означает просто несколько дат. Чтобы спросить сегодняшнее число, говорят 'Welches Datum haben wir heute?' или 'Der Wievielte ist heute?', а не 'Was ist das Datum?'." } }
  - { de: "Geld", ipa: "ˈgɛlt", pos: noun, gender: n, plural: "—", en: "money", ru: "деньги", example_de: "Ich habe nicht viel Geld.", example_en: "I don't have much money.", example_ru: "У меня немного денег." }
  - { de: "Euro", ipa: "ˈɔʏ̯ʁo", pos: noun, gender: m, plural: "die Euro", en: "euro", ru: "евро", example_de: "Der Kaffee kostet zwei Euro.", example_en: "The coffee costs two euros.", example_ru: "Кофе стоит два евро.", note: { en: "After a number, 'Euro' stays unchanged: zwei Euro, zehn Euro — never 'Euros'.", ru: "После числительного 'Euro' не изменяется: zwei Euro, zehn Euro — никогда не 'Euros'." } }
  - { de: "Cent", ipa: "ˈsɛnt", pos: noun, gender: m, plural: "die Cent", en: "cent", ru: "цент", example_de: "Das Brötchen kostet fünfzig Cent.", example_en: "The bread roll costs fifty cents.", example_ru: "Булочка стоит пятьдесят центов." }
  - { de: "umsonst", ipa: "ʊmˈzɔnst", pos: adv, en: "for free; in vain", ru: "бесплатно; напрасно, зря", example_de: "Der Eintritt ist heute umsonst.", example_en: "Admission is free today.", example_ru: "Сегодня вход бесплатный.", note: { en: "'umsonst' has two meanings: 'for free' (kostenlos) and 'in vain, for nothing' (vergeblich) — context tells you which.", ru: "У 'umsonst' два значения: «бесплатно» (kostenlos) и «напрасно, зря» (vergeblich) — какое из них имеется в виду, понятно из контекста." } }
  - { de: "Prozent", ipa: "pʁoˈtsɛnt", pos: noun, gender: n, plural: "die Prozent", en: "percent", ru: "процент", example_de: "Der Rabatt ist zehn Prozent.", example_en: "The discount is ten percent.", example_ru: "Скидка — десять процентов." }
  - { de: "Nummer", ipa: "ˈnʊmɐ", pos: noun, gender: f, plural: "die Nummern", en: "number (identifying)", ru: "номер", example_de: "Ich brauche deine Nummer.", example_en: "I need your number.", example_ru: "Мне нужен твой номер.", note: { en: "'Nummer' names an identifying number (Telefonnummer, Hausnummer); a counted quantity is 'Zahl' (zwei Kinder — zwei is a Zahl, not a Nummer).", ru: "«Nummer» — это номер-идентификатор (Telefonnummer, Hausnummer); количество называется «Zahl» (zwei Kinder — zwei здесь Zahl, а не Nummer)." } }
  - { de: "zählen", ipa: "ˈtsɛːlən", pos: verb, en: "to count", ru: "считать", example_de: "Das Kind zählt bis zwanzig.", example_en: "The child counts to twenty.", example_ru: "Ребёнок считает до двадцати.", partizip2: "gezählt", aux: "haben", praesens_3sg: "zählt", note: { en: "Don't confuse with 'zahlen' (to pay) — 'zählen' has an umlaut and means 'to count'.", ru: "Не путайте с 'zahlen' (платить) — в 'zählen' есть умлаут, и это слово значит «считать»." } }
  - { de: "Februar", ipa: "ˈfeːbʁuaːɐ̯", pos: noun, gender: m, plural: "—", en: "February", ru: "февраль", example_de: "Im Februar ist es noch kalt.", example_en: "In February it is still cold.", example_ru: "В феврале ещё холодно." }
  - { de: "März", ipa: "ˈmɛʁts", pos: noun, gender: m, plural: "—", en: "March", ru: "март", example_de: "Der Frühling beginnt im März.", example_en: "Spring begins in March.", example_ru: "Весна начинается в марте." }
  - { de: "April", ipa: "aˈpʁɪl", pos: noun, gender: m, plural: "—", en: "April", ru: "апрель", example_de: "Im April regnet es oft.", example_en: "It often rains in April.", example_ru: "В апреле часто идёт дождь." }
  - { de: "Mai", ipa: "ˈmaɪ̯", pos: noun, gender: m, plural: "—", en: "May", ru: "май", example_de: "Im Mai sind die Bäume grün.", example_en: "In May the trees are green.", example_ru: "В мае деревья зелёные." }
  - { de: "Juni", ipa: "ˈjuːni", pos: noun, gender: m, plural: "—", en: "June", ru: "июнь", example_de: "Im Juni ist die Schule fast zu Ende.", example_en: "In June school is almost over.", example_ru: "В июне учёба почти заканчивается." }
  - { de: "August", ipa: "aʊ̯ˈgʊst", pos: noun, gender: m, plural: "—", en: "August", ru: "август", example_de: "Im August machen wir Urlaub.", example_en: "In August we go on vacation.", example_ru: "В августе у нас отпуск." }
  - { de: "September", ipa: "zɛpˈtɛmbɐ", pos: noun, gender: m, plural: "—", en: "September", ru: "сентябрь", example_de: "Im September beginnt die Schule wieder.", example_en: "In September school starts again.", example_ru: "В сентябре снова начинается учёба." }
  - { de: "Oktober", ipa: "ɔkˈtoːbɐ", pos: noun, gender: m, plural: "—", en: "October", ru: "октябрь", example_de: "Im Oktober werden die Tage kürzer.", example_en: "In October the days get shorter.", example_ru: "В октябре дни становятся короче." }
  - { de: "November", ipa: "noˈvɛmbɐ", pos: noun, gender: m, plural: "—", en: "November", ru: "ноябрь", example_de: "Im November ist das Wetter grau.", example_en: "In November the weather is grey.", example_ru: "В ноябре погода серая." }
  - { de: "Dezember", ipa: "deˈtsɛmbɐ", pos: noun, gender: m, plural: "—", en: "December", ru: "декабрь", example_de: "Im Dezember feiern wir Weihnachten.", example_en: "In December we celebrate Christmas.", example_ru: "В декабре мы празднуем Рождество." }
  - { de: "Frühling", ipa: "ˈfʁyːlɪŋ", pos: noun, gender: m, plural: "—", en: "spring", ru: "весна", example_de: "Im Frühling blühen die Blumen.", example_en: "In spring the flowers bloom.", example_ru: "Весной цветут цветы." }
  - { de: "Herbst", ipa: "ˈhɛʁpst", pos: noun, gender: m, plural: "—", en: "autumn; fall", ru: "осень", example_de: "Im Herbst werden die Blätter bunt.", example_en: "In autumn the leaves turn colourful.", example_ru: "Осенью листья становятся разноцветными." }
