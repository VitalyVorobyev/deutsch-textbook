# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the
# natur-wetter-tiere manifest section.
id: natur-tiere-a2
title_de: "Natur, Tiere & Wetter"
title_en: "Nature, animals & weather"
title_ru: "Природа, животные и погода"
level: A2
entries:
  - de: Zoo
    ipa: "ˈtsoː"
    pos: noun
    gender: m
    plural: die Zoos
    en: zoo
    ru: зоопарк
    example_de: Am Sonntag gehen wir mit den Kindern in den Zoo.
    example_en: On Sunday we are taking the children to the zoo.
    example_ru: В воскресенье мы идём с детьми в зоопарк.
    note:
      en: 'The z is spoken ts, so it is ˈtsoː, not the English "zoo". Masculine, with an -s plural: der Zoo, die Zoos. You go there with in + Akk: in den Zoo gehen.'
      ru: 'Буква z читается как ts: ˈtsoː, а не по-английски. Мужского рода, множественное на -s: der Zoo, die Zoos. Идти туда — in + Akk: in den Zoo gehen.'
  - de: Rose
    ipa: "ˈʁoːzə"
    pos: noun
    gender: f
    plural: die Rosen
    en: rose
    ru: роза
    example_de: Zum Geburtstag hat er mir rote Rosen geschenkt.
    example_en: He gave me red roses for my birthday.
    example_ru: На день рождения он подарил мне красные розы.
    note:
      en: 'Feminine — die Rose, die Rosen. The s between two vowels is voiced: ˈʁoːzə, a z-sound, not the s of Bus.'
      ru: 'Женского рода — die Rose, die Rosen. Буква s между гласными звонкая: ˈʁoːzə — как русское «з», а не «с».'
  - de: Welt
    ipa: "ˈvɛlt"
    pos: noun
    gender: f
    plural: die Welten
    en: world
    ru: мир, свет
    example_de: Diese Musik kennen die Menschen auf der ganzen Welt.
    example_en: People all over the world know this music.
    example_ru: Эту музыку знают во всём мире.
    note:
      en: 'Feminine: die Welt. It lives in fixed phrases — auf der Welt (in the world), auf der ganzen Welt (all over the world). The plural die Welten is rare in everyday speech.'
      ru: 'Женского рода: die Welt. Живёт в устойчивых оборотах: auf der Welt («в мире»), auf der ganzen Welt («во всём мире»). Множественное die Welten в обиходной речи встречается редко.'
  - de: Gewitter
    ipa: "gəˈvɪtɐ"
    pos: noun
    gender: n
    plural: die Gewitter
    en: thunderstorm
    ru: гроза
    example_de: Am Abend gab es ein starkes Gewitter.
    example_en: There was a heavy thunderstorm in the evening.
    example_ru: Вечером была сильная гроза.
    note:
      en: 'A thunderstorm, with thunder and lightning — not just heavy rain, which is der Regen. Neuter, and the plural does not change: das Gewitter, die Gewitter.'
      ru: 'Именно гроза — с громом и молнией, а не просто сильный дождь (der Regen). Среднего рода, множественное не меняется: das Gewitter, die Gewitter.'
  - de: Hund
    ipa: "ˈhʊnt"
    pos: noun
    gender: m
    plural: die Hunde
    en: dog
    ru: собака
    example_de: Unser Hund schläft am liebsten unter dem Tisch.
    example_en: Our dog likes sleeping under the table best.
    example_ru: Наша собака больше всего любит спать под столом.
    note:
      en: 'Masculine — der Hund, even about a female dog in everyday speech. The final -d is spoken as t: ˈhʊnt.'
      ru: 'Мужского рода — der Hund, в обиходной речи и о самке тоже. Конечное -d произносится как t: ˈhʊnt.'
  - de: Katze
    ipa: "ˈkatsə"
    pos: noun
    gender: f
    plural: die Katzen
    en: cat
    ru: кошка
    example_de: Die Katze sitzt am Fenster und schaut nach draußen.
    example_en: The cat is sitting at the window looking out.
    example_ru: Кошка сидит у окна и смотрит на улицу.
    note:
      en: 'Feminine — die Katze, and it is the normal word for any cat, male or female. The tz is spoken ts: ˈkatsə.'
      ru: 'Женского рода — die Katze, и это обычное слово для любой кошки, кота в том числе. Сочетание tz читается как ts: ˈkatsə.'
  - de: Pferd
    ipa: "ˈpfeːɐ̯t"
    pos: noun
    gender: n
    plural: die Pferde
    en: horse
    ru: лошадь, конь
    example_de: Meine Tochter möchte gern auf einem Pferd reiten.
    example_en: My daughter would love to ride a horse.
    example_ru: Моя дочь очень хочет покататься на лошади.
    note:
      en: 'Neuter: das Pferd, die Pferde. Both sounds at the start are pronounced — pf, lips together first, then f. The final -d is spoken as t.'
      ru: 'Среднего рода: das Pferd, die Pferde. В начале произносятся оба звука: pf — сначала смыкание губ, потом f. Конечное -d звучит как t.'
  - de: Pflanze
    ipa: "ˈpflantsə"
    pos: noun
    gender: f
    plural: die Pflanzen
    en: plant
    ru: растение
    example_de: Im Wohnzimmer stehen viele grüne Pflanzen.
    example_en: There are a lot of green plants in the living room.
    example_ru: В гостиной стоит много зелёных растений.
    note:
      en: 'Feminine — die Pflanze, die Pflanzen. The verb from it is gießen: Ich gieße die Pflanzen. Note the pf at the start, as in Pferd.'
      ru: 'Женского рода — die Pflanze, die Pflanzen. Родственный глагол — gießen «поливать»: Ich gieße die Pflanzen. В начале pf, как в Pferd.'
  - de: Tier
    ipa: "ˈtiːɐ̯"
    pos: noun
    gender: n
    plural: die Tiere
    en: animal
    ru: животное
    example_de: Im Zoo haben wir viele Tiere aus Afrika gesehen.
    example_en: At the zoo we saw a lot of animals from Africa.
    example_ru: В зоопарке мы видели много животных из Африки.
    note:
      en: 'Neuter: das Tier, die Tiere. A pet is das Haustier. The final -r is not rolled — it turns into a short ɐ̯: ˈtiːɐ̯.'
      ru: 'Среднего рода: das Tier, die Tiere. Домашнее животное — das Haustier. Конечное -r не произносится как согласный, оно превращается в краткое ɐ̯: ˈtiːɐ̯.'
  - de: Vogel
    ipa: "ˈfoːgl̩"
    pos: noun
    gender: m
    plural: die Vögel
    en: bird
    ru: птица
    example_de: Ein Vogel sitzt auf dem Baum vor dem Fenster.
    example_en: A bird is sitting in the tree in front of the window.
    example_ru: На дереве перед окном сидит птица.
    note:
      en: 'Two traps in one short word. The V is spoken f — ˈfoːgl̩, like in Vater. And the plural takes an umlaut: der Vogel, die Vögel.'
      ru: 'Две ловушки в одном коротком слове. Буква V читается как f — ˈfoːgl̩, как в Vater. А во множественном появляется умлаут: der Vogel, die Vögel.'
  - de: sonnig
    ipa: "ˈzɔnɪç"
    pos: adj
    en: sunny
    ru: солнечный
    example_de: Heute ist es sonnig und warm.
    example_en: It is sunny and warm today.
    example_ru: Сегодня солнечно и тепло.
    note:
      en: 'Weather adjectives need a subject, and German supplies the empty es: Es ist sonnig — exactly the same es as in Es regnet. You can never leave it out. The -ig ending is spoken ɪç, not ɪk.'
      ru: 'Погодным прилагательным нужно подлежащее, и немецкий подставляет пустое es: Es ist sonnig — то же самое es, что и в Es regnet. Опустить его нельзя, в отличие от русского «солнечно». Окончание -ig звучит как ɪç, а не ɪk.'
  - de: windig
    ipa: "ˈvɪndɪç"
    pos: adj
    en: windy
    ru: ветреный
    example_de: Am Meer ist es oft sehr windig.
    example_en: It is often very windy by the sea.
    example_ru: На море часто очень ветрено.
    note:
      en: 'From der Wind + -ig. Same impersonal pattern as the other weather words: Es ist windig — never without the es. Final -ig is ɪç.'
      ru: 'От der Wind + -ig. Та же безличная схема, что и у других слов о погоде: Es ist windig — никогда без es. Конечное -ig — ɪç.'
  - de: neblig
    ipa: "ˈneːblɪç"
    pos: adj
    en: foggy, misty
    ru: туманный
    example_de: Am Morgen war es neblig, aber jetzt scheint die Sonne.
    example_en: It was foggy in the morning, but now the sun is shining.
    example_ru: Утром был туман, а сейчас светит солнце.
    note:
      en: 'From der Nebel + -ig, with the e of the stem dropping out: Nebel becomes neblig. The past tense of the weather is the Präteritum war: Es war neblig.'
      ru: 'От der Nebel + -ig, причём гласный корня выпадает: Nebel → neblig. О погоде в прошлом говорят через Präteritum war: Es war neblig.'
  - de: bewölkt
    ipa: "bəˈvœlkt"
    pos: adj
    en: cloudy, overcast
    ru: облачный, пасмурный
    example_de: Morgen ist es bewölkt, aber es regnet nicht.
    example_en: Tomorrow will be cloudy, but it is not going to rain.
    example_ru: Завтра будет облачно, но дождя не будет.
    note:
      en: 'From die Wolke (cloud), and it is really a participle — so it has no -ig ending, unlike sonnig, windig and neblig. The prefix be- is unstressed: bəˈvœlkt. Same impersonal es: Es ist bewölkt.'
      ru: 'От die Wolke («облако»), и по форме это причастие — поэтому у него нет суффикса -ig, в отличие от sonnig, windig и neblig. Приставка be- безударная: bəˈvœlkt. То же безличное es: Es ist bewölkt.'
  - de: nass
    ipa: "ˈnas"
    pos: adj
    en: wet
    ru: мокрый, сырой
    example_de: Nach dem Regen sind die Straßen noch nass.
    example_en: The streets are still wet after the rain.
    example_ru: После дождя улицы ещё мокрые.
    note:
      en: 'Short a, so the s is doubled: nass. The opposite is trocken. Careful with the comparative — it usually takes the umlaut: nässer.'
      ru: 'Гласный краткий, поэтому s удваивается: nass. Противоположность — trocken. Осторожно со сравнительной степенью: обычно с умлаутом — nässer.'
  - de: trocken
    ipa: "ˈtʁɔkn̩"
    pos: adj
    en: dry
    ru: сухой
    example_de: Zum Glück bleibt das Wetter am Wochenende trocken.
    example_en: Luckily the weather will stay dry at the weekend.
    example_ru: К счастью, на выходных погода останется сухой.
    note:
      en: 'The opposite of nass. In a weather report trocken means it is not raining: Es bleibt trocken. The -en is a syllabic n after the k: ˈtʁɔkn̩.'
      ru: 'Противоположность nass. В прогнозе погоды trocken значит «без дождя»: Es bleibt trocken. Окончание -en — слоговой n после k: ˈtʁɔkn̩.'
