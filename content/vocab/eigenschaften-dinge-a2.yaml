# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the physical/dimension
# adjectives of the eigenschaften-bewertung manifest section.
id: eigenschaften-dinge-a2
title_de: "Eigenschaften von Dingen"
title_en: "Properties of things"
title_ru: "Свойства предметов"
level: A2
entries:
  - de: schnell
    ipa: "ˈʃnɛl"
    pos: adj
    en: fast, quick
    ru: быстрый
    example_de: Das Internet in der Wohnung ist sehr schnell.
    example_en: The internet in the flat is very fast.
    example_ru: Интернет в квартире очень быстрый.
    note:
      en: 'One form for both jobs: as an adjective (Der Zug ist schnell) and as an adverb (Er fährt schnell) — German adds no ending to make the adverb. The opposite is langsam.'
      ru: 'Одна форма на две работы: прилагательное (Der Zug ist schnell) и наречие (Er fährt schnell) — никакого окончания для наречия немецкий не добавляет. Противоположность — langsam.'
  - de: aktuell
    ipa: "aktuˈɛl"
    pos: adj
    en: current, up-to-date
    ru: нынешний, свежий, действующий
    example_de: Ist dieser Fahrplan noch aktuell?
    example_en: Is this timetable still up to date?
    example_ru: Это расписание ещё действует?
    note:
      en: 'aktuell means "current, latest" — the newest state of something. It is not the English "actual": for that German uses tatsächlich or eigentlich.'
      ru: 'aktuell значит «нынешний, самый свежий» — последнее состояние дел. Русское «актуальный» в смысле «важный, злободневный» — это скорее wichtig; ложным другом здесь становится и английское actual, которому соответствует tatsächlich.'
  - de: anders
    ipa: "ˈandɐs"
    pos: adv
    en: differently, in a different way
    ru: иначе, по-другому
    example_de: In München macht man das anders.
    example_en: In Munich people do it differently.
    example_ru: В Мюнхене это делают по-другому.
    note:
      en: 'anders is an adverb: it says *how* something is done and never takes an ending (Er macht es anders). The adjective meaning "different, unlike" is verschieden and does take endings: Die zwei Wohnungen sind verschieden.'
      ru: 'anders — наречие: оно говорит, *как* что-то делается, и никогда не получает окончания (Er macht es anders). Прилагательное «разный, непохожий» — verschieden, и оно окончания получает: Die zwei Wohnungen sind verschieden.'
  - de: automatisch
    ipa: "aʊ̯toˈmaːtɪʃ"
    pos: adj
    en: automatic, automatically
    ru: автоматический, автоматически
    example_de: Das Licht im Flur geht automatisch an.
    example_en: The light in the hallway comes on automatically.
    example_ru: Свет в коридоре включается автоматически.
  - de: bunt
    ipa: "ˈbʊnt"
    pos: adj
    en: colourful, multicoloured
    ru: разноцветный, пёстрый
    example_de: Meine neue Wohnung hat bunte Wände.
    example_en: My new flat has colourful walls.
    example_ru: В моей новой квартире разноцветные стены.
    note:
      en: 'bunt means several colours at once. A single colour, however bright, is not bunt — say farbig, or simply name the colour: eine rote Tür.'
      ru: 'bunt — несколько цветов сразу. Один цвет, пусть и яркий, — это не bunt: тогда farbig или просто название цвета: eine rote Tür.'
  - de: direkt
    ipa: "diˈʁɛkt"
    pos: adj
    en: direct
    ru: прямой, непосредственный
    example_de: Es gibt keinen direkten Zug nach Salzburg.
    example_en: There is no direct train to Salzburg.
    example_ru: Прямого поезда до Зальцбурга нет.
    note:
      en: 'As an adverb direkt also means "right, straight": Das Hotel liegt direkt neben dem Bahnhof.'
      ru: 'Как наречие direkt значит ещё «прямо, вплотную»: Das Hotel liegt direkt neben dem Bahnhof («прямо рядом с вокзалом»).'
  - de: eilig
    ipa: "ˈaɪ̯lɪç"
    pos: adj
    en: urgent; (in es eilig haben) in a hurry
    ru: срочный; (в обороте es eilig haben) торопиться
    example_de: Ich habe es eilig, der Bus fährt gleich.
    example_en: I am in a hurry, the bus is leaving any moment.
    example_ru: Я тороплюсь, автобус вот-вот отойдёт.
    note:
      en: 'The everyday use is the chunk es eilig haben — German *has* the hurry where English *is* in one: Ich habe es eilig. "Ich bin eilig" is not German. On its own the adjective means "urgent": ein eiliger Brief.'
      ru: 'Обычное употребление — оборот es eilig haben: по-немецки спешку «имеют», а не «спешат»: Ich habe es eilig. Сказать «Ich bin eilig» нельзя. Само прилагательное значит «срочный»: ein eiliger Brief.'
  - de: fertig sein
    ipa: "ˈfɛʁtɪç zaɪ̯n"
    pos: phrase
    en: to be ready, to be finished
    ru: быть готовым, закончить
    example_de: Ich bin gleich fertig, dann können wir gehen.
    example_en: I will be finished in a moment, then we can go.
    example_ru: Я сейчас закончу, потом можем идти.
    note:
      en: 'Two everyday senses: finished with a task (Ich bin mit der Arbeit fertig) and ready to go (Bist du fertig? Der Zug fährt). What you are finished with takes mit + Dativ.'
      ru: 'Два обиходных значения: «закончить дело» (Ich bin mit der Arbeit fertig) и «быть готовым» (Bist du fertig? Der Zug fährt). То, с чем закончили, идёт с mit + Dativ.'
  - de: fremd
    ipa: "ˈfʁɛmt"
    pos: adj
    en: foreign; unfamiliar; someone else's
    ru: иностранный; незнакомый; чужой
    example_de: In einer fremden Stadt finde ich den Weg nur mit dem Handy.
    example_en: In an unfamiliar city I only find my way with my phone.
    example_ru: В незнакомом городе я нахожу дорогу только с телефоном.
    note:
      en: 'Three senses in one word: "foreign" (eine fremde Sprache), "unfamiliar" (Die Stadt ist mir fremd) and "belonging to somebody else" (fremdes Eigentum — hands off). Context decides which one is meant.'
      ru: 'Три значения в одном слове: «иностранный» (eine fremde Sprache), «незнакомый» (Die Stadt ist mir fremd) и «чужой, принадлежащий другому» (fremdes Eigentum). Какое из них — решает контекст.'
  - de: gefährlich
    ipa: "gəˈfɛːɐ̯lɪç"
    pos: adj
    en: dangerous
    ru: опасный
    example_de: Diese Straße ist für Kinder zu gefährlich.
    example_en: This road is too dangerous for children.
    example_ru: Эта улица слишком опасна для детей.
  - de: gültig sein
    ipa: "ˈgʏltɪç zaɪ̯n"
    pos: phrase
    en: to be valid
    ru: быть действительным
    example_de: Die Fahrkarte ist zwei Stunden gültig.
    example_en: The ticket is valid for two hours.
    example_ru: Билет действителен два часа.
    note:
      en: 'The period of validity is a bare accusative, with no preposition at all: Der Ausweis ist zehn Jahre gültig. The opposite is ungültig; the word on the ticket machine is die Gültigkeit.'
      ru: 'Срок действия ставится в Akkusativ и вообще без предлога: Der Ausweis ist zehn Jahre gültig. Противоположность — ungültig; на билетном автомате пишут die Gültigkeit.'
  - de: hart
    ipa: "ˈhaʁt"
    pos: adj
    en: hard (to the touch), firm
    ru: твёрдый, жёсткий
    example_de: Das Bett im Hotel war sehr hart.
    example_en: The bed at the hotel was very hard.
    example_ru: Кровать в отеле была очень жёсткая.
    note:
      en: 'hart is physical firmness — a hard bed, hard bread. It does not mean "difficult": a difficult exam is eine schwere Prüfung, never "eine harte Prüfung". The opposite of hart is weich.'
      ru: 'hart — о физической твёрдости: жёсткая кровать, чёрствый хлеб. Значения «трудный» у него нет: трудный экзамен — eine schwere Prüfung, но не «eine harte Prüfung». Противоположность hart — weich.'
  - de: hoch
    ipa: "ˈhoːx"
    pos: adj
    en: high, tall
    ru: высокий
    example_de: Der Schrank ist zwei Meter hoch.
    example_en: The cupboard is two metres tall.
    example_ru: Шкаф высотой два метра.
    note:
      en: 'The c drops out the moment hoch takes an ending: Das Haus ist hoch, but ein hohes Haus, der hohe Preis, die hohen Kosten. Predicative hoch keeps the c; the attributive form is always hoh-.'
      ru: 'Как только hoch получает окончание, c выпадает: Das Haus ist hoch, но ein hohes Haus, der hohe Preis, die hohen Kosten. В предикативной позиции c остаётся, перед существительным — всегда hoh-.'
  - de: international
    ipa: "ɪntɐnatsi̯oˈnaːl"
    pos: adj
    en: international
    ru: международный
    example_de: Der Flughafen hat viele internationale Verbindungen.
    example_en: The airport has many international connections.
    example_ru: У аэропорта много международных рейсов.
  - de: kurz
    ipa: "ˈkʊʁts"
    pos: adj
    en: short
    ru: короткий
    example_de: Der Weg vom Bahnhof zur Wohnung ist kurz.
    example_en: The way from the station to the flat is short.
    example_ru: Дорога от вокзала до квартиры короткая.
    note:
      en: 'Comparison is irregular and takes an umlaut: kurz – kürzer – am kürzesten (Der neue Weg ist kürzer als der alte). It works for time as well as distance: eine kurze Pause.'
      ru: 'Степени сравнения нерегулярны, с умлаутом: kurz – kürzer – am kürzesten (Der neue Weg ist kürzer als der alte). Годится и о времени, и о расстоянии: eine kurze Pause.'
  - de: laut
    ipa: "ˈlaʊ̯t"
    pos: adj
    en: loud, noisy
    ru: громкий, шумный
    example_de: Die Straße vor dem Haus ist am Abend sehr laut.
    example_en: The street in front of the house is very noisy in the evening.
    example_ru: Улица перед домом вечером очень шумная.
    note:
      en: 'The pair is laut – leise (loud – quiet). The same word also exists as a preposition meaning "according to" (laut Fahrplan kommt der Zug um acht), but this card is about the adjective.'
      ru: 'Пара — laut – leise («громкий — тихий»). То же слово бывает и предлогом «согласно, по» (laut Fahrplan kommt der Zug um acht), но эта карточка — о прилагательном.'
  - de: leise
    ipa: "ˈlaɪ̯zə"
    pos: adj
    en: quiet, soft (in sound)
    ru: тихий, негромкий
    example_de: Bitte sprich leise, das Kind schläft schon.
    example_en: Please speak quietly, the child is already asleep.
    example_ru: Пожалуйста, говори тихо, ребёнок уже спит.
    note:
      en: 'leise is the counterpart of laut: a low volume (eine leise Stimme), and as an adverb "quietly" (Er redet leise). A calm, peaceful place is not leise but ruhig: eine ruhige Wohnung.'
      ru: 'leise — пара к laut: небольшая громкость (eine leise Stimme) и наречие «тихо» (Er redet leise). Спокойное, мирное место — не leise, а ruhig: eine ruhige Wohnung.'
  - de: möglich
    ipa: "ˈmøːklɪç"
    pos: adj
    en: possible
    ru: возможный
    example_de: Eine Reparatur ist heute leider nicht möglich.
    example_en: Unfortunately a repair is not possible today.
    example_ru: К сожалению, ремонт сегодня невозможен.
    note:
      en: 'The negative is either nicht möglich or the single word unmöglich. Learn so schnell wie möglich ("as fast as possible") whole — it is a fixed chunk you will need constantly.'
      ru: 'Отрицание — либо nicht möglich, либо одно слово unmöglich. Оборот so schnell wie möglich («как можно быстрее») учите целиком — он понадобится постоянно.'
  - de: normal
    ipa: "nɔʁˈmaːl"
    pos: adj
    en: normal, ordinary
    ru: обычный, нормальный
    example_de: Ein bisschen Lärm im Haus ist ganz normal.
    example_en: A bit of noise in the building is completely normal.
    example_ru: Немного шума в доме — это совершенно нормально.
  - de: notwendig
    ipa: "ˈnoːtvɛndɪç"
    pos: adj
    en: necessary
    ru: необходимый
    example_de: Für die Anmeldung ist ein Pass notwendig.
    example_en: A passport is necessary for the registration.
    example_ru: Для регистрации необходим паспорт.
    note:
      en: 'notwendig is the formal word — you meet it on forms and official notices. In speech people say nötig (Das ist nicht nötig) or simply use brauchen: Ich brauche einen Pass.'
      ru: 'notwendig — слово официальное, из бланков и объявлений. В речи говорят nötig (Das ist nicht nötig) или просто берут глагол brauchen: Ich brauche einen Pass.'
  - de: privat
    ipa: "pʁiˈvaːt"
    pos: adj
    en: private, personal
    ru: частный, личный
    example_de: Der Parkplatz ist privat, hier darf man nicht parken.
    example_en: The car park is private, you are not allowed to park here.
    example_ru: Парковка частная, здесь парковаться нельзя.
  - de: rund
    ipa: "ˈʁʊnt"
    pos: adj
    en: round
    ru: круглый
    example_de: Wir suchen einen runden Tisch für die Küche.
    example_en: We are looking for a round table for the kitchen.
    example_ru: Мы ищем круглый стол на кухню.
    note:
      en: 'In front of a number rund does a second job: "about, roughly". Die Wohnung kostet rund tausend Euro.'
      ru: 'Перед числом у rund вторая работа: «примерно, около». Die Wohnung kostet rund tausend Euro.'
  - de: schädlich
    ipa: "ˈʃɛːtlɪç"
    pos: adj
    en: harmful, damaging
    ru: вредный
    example_de: Der Lärm von der Straße ist schädlich für die Gesundheit.
    example_en: The noise from the street is harmful to your health.
    example_ru: Шум с улицы вреден для здоровья.
    note:
      en: 'What is being harmed comes with für + Akkusativ: schädlich für die Umwelt, schädlich für die Zähne. Its opposite is nützlich (useful).'
      ru: 'То, чему вредят, идёт с für + Akkusativ: schädlich für die Umwelt, schädlich für die Zähne. Противоположность — nützlich («полезный»).'
  - de: schriftlich
    ipa: "ˈʃʁɪftlɪç"
    pos: adj
    en: written, in writing
    ru: письменный, в письменном виде
    example_de: Bitte geben Sie uns eine schriftliche Antwort.
    example_en: Please give us an answer in writing.
    example_ru: Пожалуйста, дайте нам письменный ответ.
    note:
      en: 'The pair is schriftlich – mündlich (written – oral). As an adverb it takes no ending and means "in writing": Kündigen Sie bitte schriftlich.'
      ru: 'Пара — schriftlich – mündlich («письменно — устно»). Как наречие оно без окончания и значит «в письменном виде»: Kündigen Sie bitte schriftlich.'
  - de: schwer
    ipa: "ˈʃveːɐ̯"
    pos: adj
    en: heavy; difficult
    ru: тяжёлый; трудный
    example_de: Der Koffer ist zu schwer für mich.
    example_en: The suitcase is too heavy for me.
    example_ru: Чемодан слишком тяжёлый для меня.
    note:
      en: 'One word, two everyday senses, and both are needed at A2: weight (ein schwerer Koffer) and difficulty (eine schwere Prüfung, Deutsch ist nicht schwer). Context decides. Do not reach for hart to say "difficult" — hart is physical hardness (ein hartes Bett).'
      ru: 'Одно слово, два обиходных значения, и оба нужны уже на A2: вес (ein schwerer Koffer) и трудность (eine schwere Prüfung, Deutsch ist nicht schwer). Выбирает контекст. Для «трудный» не берите hart — это физическая твёрдость (ein hartes Bett).'
  - de: tief
    ipa: "ˈtiːf"
    pos: adj
    en: deep; low (in pitch)
    ru: глубокий; низкий (о звуке)
    example_de: Der See hinter dem Haus ist sehr tief.
    example_en: The lake behind the house is very deep.
    example_ru: Озеро за домом очень глубокое.
    note:
      en: 'tief is the counterpart of hoch: hoch measures upwards, tief downwards (ein tiefes Loch). It also describes a low voice: eine tiefe Stimme. Unlike hoch, the stem never changes when an ending is added — ein tiefer See, and nothing drops out.'
      ru: 'tief — пара к hoch: hoch меряет вверх, tief — вниз (ein tiefes Loch). Годится и о голосе: eine tiefe Stimme — «низкий голос». В отличие от hoch основа не меняется: ein tiefer See, ничего не выпадает.'
  - de: tot
    ipa: "ˈtoːt"
    pos: adj
    en: dead
    ru: мёртвый
    example_de: Die Pflanze auf dem Balkon ist leider tot.
    example_en: The plant on the balcony is dead, unfortunately.
    example_ru: Растение на балконе, к сожалению, погибло.
    note:
      en: 'Mind the spelling: the adjective tot ("dead") and the noun der Tod ("death") sound identical but are two different words. Der Vogel ist tot — but Er spricht nicht gern über den Tod. The verb is sterben (to die).'
      ru: 'Осторожно с написанием: прилагательное tot («мёртвый») и существительное der Tod («смерть») звучат одинаково, но это разные слова. Der Vogel ist tot — но Er spricht nicht gern über den Tod. Глагол — sterben («умирать»).'
  - de: typisch
    ipa: "ˈtyːpɪʃ"
    pos: adj
    en: typical
    ru: типичный
    example_de: Ein Frühstück mit Brötchen und Käse ist typisch für Deutschland.
    example_en: A breakfast with rolls and cheese is typical of Germany.
    example_ru: Завтрак с булочками и сыром типичен для Германии.
    note:
      en: 'What something is typical of comes with für + Akkusativ: typisch für Deutschland, typisch für ihn. On its own, Typisch! is an everyday sigh — "Just like him, as always."'
      ru: 'То, для чего нечто типично, идёт с für + Akkusativ: typisch für Deutschland, typisch für ihn. Отдельным словом Typisch! — обиходный вздох: «Ну конечно, как всегда».'
  - de: verschieden
    ipa: "fɛɐ̯ˈʃiːdn̩"
    pos: adj
    en: different, various
    ru: разный, различный
    example_de: Die zwei Wohnungen sind ganz verschieden.
    example_en: The two flats are completely different.
    example_ru: Эти две квартиры совершенно разные.
    note:
      en: 'verschieden is an adjective and takes endings: verschiedene Preise, in verschiedenen Zimmern. It says that things are unlike each other, or that there are several kinds of something. The adverb anders says how an action is done: Er macht es anders.'
      ru: 'verschieden — прилагательное и получает окончания: verschiedene Preise, in verschiedenen Zimmern. Оно говорит, что вещи не похожи друг на друга или что их несколько разных видов. Наречие anders говорит, как совершается действие: Er macht es anders.'
  - de: weich
    ipa: "ˈvaɪ̯ç"
    pos: adj
    en: soft
    ru: мягкий
    example_de: Das Sofa im Wohnzimmer ist schön weich.
    example_en: The sofa in the living room is nice and soft.
    example_ru: Диван в гостиной приятно мягкий.
    note:
      en: 'weich is the opposite of hart: ein weiches Bett, ein weiches Ei. It is not the opposite of schwer — a suitcase that is not heavy is leicht, never weich.'
      ru: 'weich — противоположность hart: ein weiches Bett, ein weiches Ei. Но не противоположность schwer: нетяжёлый чемодан — leicht, а не weich.'
