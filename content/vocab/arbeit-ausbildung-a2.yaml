# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the remaining verbs
# and nouns of the arbeit-schule-ausbildung section.
id: arbeit-ausbildung-a2
title_de: "Arbeit & Ausbildung"
title_en: "Work & training"
title_ru: "Работа и обучение"
level: A2
entries:
  - de: prüfen
    ipa: "ˈpʁyːfn̩"
    pos: verb
    praesens_3sg: prüft
    partizip2: geprüft
    aux: haben
    valence: "+ Akk"
    en: to check, to examine, to test
    ru: проверять
    example_de: Bitte prüfen Sie noch einmal Ihre Antworten.
    example_en: Please check your answers once more.
    example_ru: Пожалуйста, проверьте свои ответы ещё раз.
    note:
      en: "prüfen is what you do to a thing to find out whether it is right or whether it works: die Rechnung prüfen, die Bremsen prüfen. The noun beside it is die Prüfung — but a Prüfung is the exam itself, and sitting one is eine Prüfung machen."
      ru: "prüfen — проверять что-то на правильность или на исправность: die Rechnung prüfen, die Bremsen prüfen. Рядом стоит существительное die Prüfung, но Prüfung — это сам экзамен, а «сдавать экзамен» — eine Prüfung machen."
  - de: Bewerbung
    ipa: "bəˈvɛʁbʊŋ"
    pos: noun
    gender: f
    plural: "die Bewerbungen"
    en: (job) application
    ru: заявление о приёме на работу; пакет документов на вакансию
    example_de: Ich schreibe gerade eine Bewerbung für eine neue Stelle.
    example_en: I am writing an application for a new job right now.
    example_ru: Сейчас я пишу заявление на новую должность.
    note:
      en: "eine Bewerbung schreiben and sich um eine Stelle bewerben belong together. A German Bewerbung is not one letter but a whole folder: the letter, der Lebenslauf (the CV) and the Zeugnisse."
      ru: "eine Bewerbung schreiben и sich um eine Stelle bewerben — слова одной пары. Немецкая Bewerbung — это не одно письмо, а целая папка: письмо, der Lebenslauf (резюме) и Zeugnisse."
  - de: Mitarbeiter
    ipa: "ˈmɪtˌʔaʁbaɪ̯tɐ"
    pos: noun
    gender: m
    plural: "die Mitarbeiter"
    en: employee, member of staff, co-worker (male)
    ru: сотрудник (мужчина)
    example_de: Unsere Firma sucht neue Mitarbeiter.
    example_en: Our company is looking for new staff.
    example_ru: Наша фирма ищет новых сотрудников.
    note:
      en: "Literally the person who works with (mit) you: seen from the boss it is a member of staff, seen from your desk it is a colleague. der Kollege is the warm, personal word; der Mitarbeiter is the word of job ads and company emails. A woman is die Mitarbeiterin; the plural does not change: die Mitarbeiter."
      ru: "Буквально тот, кто работает вместе (mit) с вами: с точки зрения начальника — сотрудник, с вашего рабочего места — коллега. der Kollege звучит теплее и личнее, а der Mitarbeiter — слово объявлений о работе и деловой переписки. Женщина — die Mitarbeiterin; множественное число не меняется: die Mitarbeiter."
  - de: Stipendium
    ipa: "ʃtiˈpɛndi̯ʊm"
    pos: noun
    gender: n
    plural: "die Stipendien"
    en: scholarship, grant
    ru: стипендия (именная, за успехи или по нужде)
    example_de: Sie bekommt ein Stipendium und muss nicht arbeiten.
    example_en: She has a scholarship, so she does not have to work.
    example_ru: Она получает стипендию, и ей не нужно работать.
    note:
      en: "Irregular plural: das Stipendium, die Stipendien — the same pattern as das Studium, die Studien. A Stipendium is awarded to a particular student for good work or for need."
      ru: "Нерегулярное множественное число: das Stipendium, die Stipendien — та же модель, что у das Studium, die Studien. Важное отличие от привычной стипендии: Stipendium дают конкретному студенту за успехи или по нужде, а не всем подряд."
  # Kenntnisse is plural-only in this sense ("skills, knowledge in a field"), so it is a
  # phrase, with no gender and no plural. As a noun it would declare a plural that repeats
  # itself, and the EN/RU→DE card — which requires the article for a noun — would demand
  # one for a word that has no singular to take it.
  - de: Kenntnisse
    ipa: "ˈkɛntnɪsə"
    pos: phrase
    en: knowledge, skills (in a subject or a language)
    ru: знания, навыки (в какой-то области, в языке)
    example_de: Für diese Stelle braucht man gute Deutschkenntnisse.
    example_en: For this job you need a good knowledge of German.
    example_ru: Для этой должности нужны хорошие знания немецкого языка.
    note:
      en: "Plural only in this meaning: there is no singular here that could take an article. It is the word of job ads — gute Englischkenntnisse, Kenntnisse in Word und Excel — and it is usually glued to the subject: Deutschkenntnisse, Computerkenntnisse."
      ru: "В этом значении слово живёт только во множественном числе: единственного, к которому можно поставить артикль, здесь нет. Это слово объявлений о работе — gute Englischkenntnisse, Kenntnisse in Word und Excel — и обычно оно склеено с областью: Deutschkenntnisse, Computerkenntnisse."
  - de: Workshop
    ipa: "ˈvøːɐ̯kʃɔp"
    pos: noun
    gender: m
    plural: "die Workshops"
    en: workshop (a short hands-on course)
    ru: воркшоп, практический семинар
    example_de: Am Samstag besuche ich einen Workshop über Fotografie.
    example_en: On Saturday I am going to a workshop on photography.
    example_ru: В субботу я иду на воркшоп по фотографии.
    note:
      en: "An English loanword that takes German stress on the first part: WORK-shop. It is a short course where people work on something themselves — an einem Workshop teilnehmen. Do not mix it up with die Werkstatt, the workshop where cars and machines are repaired."
      ru: "Заимствование из английского с немецким ударением на первой части: WORK-shop. Это короткий курс, где участники сами что-то делают: an einem Workshop teilnehmen. Не путайте с die Werkstatt — мастерской, где чинят машины и технику."
  - de: Projekt
    ipa: "pʁoˈjɛkt"
    pos: noun
    gender: n
    plural: "die Projekte"
    en: project
    ru: проект
    example_de: Wir arbeiten gerade an einem großen Projekt.
    example_en: We are working on a big project at the moment.
    example_ru: Сейчас мы работаем над большим проектом.
    note:
      en: "The phrase is an einem Projekt arbeiten — an + Dativ, because the work happens inside the project and moves nowhere. At school a Projekt is also a piece of work a group prepares together."
      ru: "Устойчивое сочетание — an einem Projekt arbeiten: an + Dativ, потому что работа идёт внутри проекта и никуда не движется. В школе Projekt — это ещё и работа, которую группа готовит вместе."
  - de: begründen
    ipa: "bəˈgʁʏndn̩"
    pos: verb
    praesens_3sg: begründet
    partizip2: begründet
    aux: haben
    valence: "+ Akk"
    en: to give reasons for, to justify
    ru: обосновывать, объяснять причину
    example_de: Begründen Sie bitte Ihre Antwort.
    example_en: Please give reasons for your answer.
    example_ru: Обоснуйте, пожалуйста, свой ответ.
    note:
      en: "From der Grund (the reason): to begründen something is to say why. Inseparable be-, so the Partizip II has no ge-: hat begründet. In an exam task the word means do not just answer — say why."
      ru: "От der Grund («причина»): begründen — сказать почему. Приставка be- неотделяемая, поэтому Partizip II без ge-: hat begründet. В экзаменационном задании это значит: не просто ответить, а объяснить причину."
  - de: bestehen
    ipa: "bəˈʃteːən"
    pos: verb
    praesens_3sg: besteht
    partizip2: bestanden
    aux: haben
    valence: "+ Akk"
    en: to pass (an exam); to consist (of)
    ru: сдать (экзамен); состоять (из)
    example_de: Ich habe die Prüfung bestanden!
    example_en: I passed the exam!
    example_ru: Я сдал экзамен!
    note:
      en: "A strong verb with an inseparable prefix: no ge-, but the vowel changes — hat bestanden. Keep the two senses apart: eine Prüfung bestehen is to pass it, while bestehen aus + Dativ is to consist of — Das Team besteht aus fünf Personen. The opposite of passing is durchfallen."
      ru: "Сильный глагол с неотделяемой приставкой: ge- нет, но гласная меняется — hat bestanden. Различайте два значения: eine Prüfung bestehen — «сдать экзамен», а bestehen aus + Dativ — «состоять из»: Das Team besteht aus fünf Personen. Противоположность — durchfallen («провалить экзамен»)."
  - de: bewerben
    ipa: "bəˈvɛʁbn̩"
    pos: verb
    praesens_3sg: bewirbt sich
    partizip2: sich beworben
    aux: haben
    valence: "sich bewerben um + Akk (bei + Dat)"
    en: to apply (for a job)
    ru: подавать заявление, претендовать (на должность)
    example_de: Er bewirbt sich um eine Stelle bei einer großen Firma.
    example_en: He is applying for a job at a big company.
    example_ru: Он подаёт заявление на должность в большой фирме.
    note:
      en: "Always reflexive: sich bewerben. The sich is not decoration — it belongs to every form (er bewirbt sich, er hat sich beworben). Two prepositions do the work: um + Akkusativ for the job, bei + Dativ for the employer — Ich bewerbe mich um eine Stelle bei Siemens. Watch the vowel: the e becomes an i in the singular (du bewirbst dich, er bewirbt sich), and the inseparable be- means there is no ge- in the Partizip II."
      ru: "Глагол всегда возвратный: sich bewerben. Частица sich — не украшение, она входит в каждую форму (er bewirbt sich, er hat sich beworben). Работают два предлога: um + Akkusativ — на что претендуют, bei + Dativ — куда: Ich bewerbe mich um eine Stelle bei Siemens. Следите за гласной: в единственном числе e переходит в i (du bewirbst dich, er bewirbt sich), а из-за неотделяемой приставки be- в Partizip II нет ge-."
  - de: eintragen
    ipa: "ˈaɪ̯nˌtʁaːgn̩"
    pos: verb
    praesens_3sg: trägt ein
    partizip2: eingetragen
    aux: haben
    valence: "+ Akk"
    en: to enter, to write in (on a list, in a form)
    ru: вносить, вписывать (в список, в бланк)
    example_de: Bitte tragen Sie Ihren Namen in die Liste ein.
    example_en: Please write your name on the list.
    example_ru: Впишите, пожалуйста, своё имя в список.
    note:
      en: "Separable ein- plus the stem change of tragen: er trägt ein. The Perfekt puts -ge- inside the word — hat eingetragen — because the stem tragen carries no prefix of its own. You write something in eine Liste, in ein Formular, in einen Kalender: in + Akkusativ, because the entry moves into the field."
      ru: "Отделяемая приставка ein- плюс чередование, как у tragen: er trägt ein. В перфекте -ge- встаёт внутрь слова — hat eingetragen, — потому что у корня tragen своей приставки нет. Вписывают in eine Liste, in ein Formular, in einen Kalender: in + Akkusativ, ведь запись «попадает» в поле."
  - de: kündigen
    ipa: "ˈkʏndɪgn̩"
    pos: verb
    praesens_3sg: kündigt
    partizip2: gekündigt
    aux: haben
    valence: "+ Dat"
    en: to give notice; to fire someone; (without an object) to quit
    ru: увольнять (кого-то); увольняться
    example_de: Mein Chef hat mir gekündigt.
    example_en: My boss gave me notice.
    example_ru: Начальник меня уволил.
    note:
      en: "One verb, two directions, and the case decides. jemandem kündigen (Dativ) is to fire that person: Die Firma hat ihm gekündigt — ihm, never ihn. With no object at all it is you who leaves: Ich habe gekündigt = I quit. A contract takes the accusative: einen Vertrag kündigen. The noun is die Kündigung."
      ru: "Один глагол, два направления, и решает падеж. jemandem kündigen (Dativ) — уволить этого человека: Die Firma hat ihm gekündigt — ihm, а не ihn. Без дополнения уходите вы сами: Ich habe gekündigt — «я уволился». Договор стоит в Akkusativ: einen Vertrag kündigen. Существительное — die Kündigung."
  - de: teilnehmen
    ipa: "ˈtaɪ̯lˌneːmən"
    pos: verb
    praesens_3sg: nimmt teil
    partizip2: teilgenommen
    aux: haben
    valence: "an + Dat"
    en: to take part, to participate
    ru: участвовать, принимать участие
    example_de: Viele Kollegen nehmen an dem Workshop teil.
    example_en: A lot of colleagues are taking part in the workshop.
    example_ru: Многие коллеги участвуют в воркшопе.
    note:
      en: "The case is where the mistakes happen: teilnehmen an + Dativ — an einem Kurs, an einer Prüfung, an dem Workshop. Separable teil- with the stem change of nehmen: er nimmt teil, hat teilgenommen, and in a main clause the teil goes to the very end."
      ru: "Ошибки случаются именно в падеже: teilnehmen an + Dativ — an einem Kurs, an einer Prüfung, an dem Workshop. Приставка teil- отделяемая, чередование как у nehmen: er nimmt teil, hat teilgenommen, а в главном предложении teil уходит в самый конец."
  - de: herstellen
    ipa: "ˈheːɐ̯ˌʃtɛlən"
    pos: verb
    praesens_3sg: stellt her
    partizip2: hergestellt
    aux: haben
    valence: "+ Akk"
    en: to produce, to manufacture
    ru: производить, изготавливать
    example_de: Die Firma stellt Möbel aus Holz her.
    example_en: The company produces furniture made of wood.
    example_ru: Фирма производит мебель из дерева.
    note:
      en: "The factory verb: eine Firma stellt Autos, Möbel oder Medikamente her. Separable her-, so the prefix lands at the end of the clause and the Perfekt is hat hergestellt. On a product you will read Hergestellt in Deutschland."
      ru: "Заводской глагол: eine Firma stellt Autos, Möbel oder Medikamente her. Приставка her- отделяемая, поэтому она уходит в конец предложения, а перфект — hat hergestellt. На товаре можно прочитать: Hergestellt in Deutschland."
  - de: organisieren
    ipa: "ɔʁganiˈziːʁən"
    pos: verb
    praesens_3sg: organisiert
    partizip2: organisiert
    aux: haben
    valence: "+ Akk"
    en: to organize, to arrange
    ru: организовывать, устраивать
    example_de: Wer organisiert die Feier im Büro?
    example_en: Who is organizing the office party?
    example_ru: Кто организует праздник в офисе?
    note:
      en: "An -ieren verb: the stress sits on -ier- and the Partizip II takes no ge- — hat organisiert. It covers both arranging an event and getting hold of something: Ich organisiere uns zwei Karten."
      ru: "Глагол на -ieren: ударение на -ier-, Partizip II без ge- — hat organisiert. Значит и «устроить мероприятие», и «раздобыть»: Ich organisiere uns zwei Karten."
  - de: vorbereiten
    ipa: "ˈfoːɐ̯bəˌʁaɪ̯tn̩"
    pos: verb
    praesens_3sg: bereitet vor
    partizip2: vorbereitet
    aux: haben
    valence: "+ Akk (sich vorbereiten auf + Akk)"
    en: to prepare (something); to prepare (oneself) for
    ru: готовить (что-то); готовиться (к чему-то)
    example_de: Ich bereite mich auf die Prüfung vor.
    example_en: I am preparing for the exam.
    example_ru: Я готовлюсь к экзамену.
    note:
      en: "The participle is the trap: hat vorbereitet, with no -ge- inside. vor- is separable (er bereitet vor), but the stem bereiten already carries the inseparable prefix be-, and an inseparable prefix blocks the ge- — so nothing can slip in. Compare hat eingetragen, where the stem tragen is bare. Two uses: etwas vorbereiten (das Essen, die Feier) and sich vorbereiten auf + Akkusativ (auf die Prüfung, auf das Gespräch)."
      ru: "Ловушка — причастие: hat vorbereitet, без -ge- внутри. Приставка vor- отделяемая (er bereitet vor), но у корня bereiten уже есть неотделяемая приставка be-, а она запрещает ge- — вставить его просто некуда. Сравните hat eingetragen, где корень tragen «голый». Два употребления: etwas vorbereiten (das Essen, die Feier) и sich vorbereiten auf + Akkusativ (auf die Prüfung, auf das Gespräch)."
