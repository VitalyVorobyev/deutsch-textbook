id: infinitiv-mit-zu
title_de: "Pläne, Absichten & Entscheidungen"
title_en: "Plans, intentions & decisions"
title_ru: "Планы, намерения и решения"
title_uk: "Плани, наміри та рішення"
level: A2
entries:
  # Deliberately thin, and for the reason the A2 rule gives: this topic teaches a
  # SYNTAX, and almost every verb that governs it is already taught elsewhere —
  # versuchen (kernwortschatz-a2), hoffen and planen (nebensaetze-plaene),
  # anfangen and aufhören (trennbare-verben), vergessen (verben-grundwortschatz),
  # Lust (freunde-feste), Zeit (alltag-zeit), wichtig (kernwortschatz-a2). The
  # article, reading and exercises recycle all of those. What is left, and what
  # this deck owns, is the language of intending and deciding that no deck
  # teaches — headed by vorhaben, which is the flagship verb of the whole
  # structure and appeared nowhere in the course.
  #
  # Grund, Vorschlag, Plan, Wunsch and beeilen are NOT here on purpose: they are
  # already taught, some of them under a headword without an article, so the
  # cross-file duplicate check would not have caught the overlap.

  # --- vorhaben, planen, entscheiden ---
  - de: vorhaben
    ipa: "ˈfoːɐ̯ˌhaːbn̩"
    pos: verb
    aux: haben
    praesens_3sg: hat vor
    partizip2: vorgehabt
    valence: "+ Akk"
    en: to plan, to intend
    ru: намереваться, планировать
    uk: мати намір, планувати
    example_de: "Was hast du am Wochenende vor?"
    example_en: "What are you planning this weekend?"
    example_ru: "Что ты планируешь на выходные?"
    example_uk: "Що ти плануєш на вихідні?"
    note:
      en: "The everyday way to ask and state plans — far more common in speech than planen. It is separable (hat … vor) and it is the flagship verb of the zu-infinitive: Ich habe vor, im Sommer nach Wien zu fahren. Note the two shapes: with a noun it takes a direct object (Ich habe nichts vor), with a verb it takes a comma and a zu-infinitive."
      ru: "Обычный способ спросить и рассказать о планах — в речи он куда употребительнее, чем planen. Глагол отделяемый (hat … vor) и служит визитной карточкой инфинитива с zu: Ich habe vor, im Sommer nach Wien zu fahren. Две конструкции: с существительным — прямое дополнение (Ich habe nichts vor), с глаголом — запятая и инфинитив с zu."
      uk: "Звичайний спосіб запитати й розповісти про плани — у мовленні він набагато вживаніший, ніж planen. Дієслово відокремлюване (hat … vor) і є візитівкою інфінітива з zu: Ich habe vor, im Sommer nach Wien zu fahren. Дві конструкції: з іменником — прямий додаток (Ich habe nichts vor), з дієсловом — кома та інфінітив із zu."

  - de: vorschlagen
    ipa: "ˈfoːɐ̯ˌʃlaːgn̩"
    pos: verb
    aux: haben
    praesens_3sg: schlägt vor
    partizip2: vorgeschlagen
    valence: "+ Akk"
    en: to suggest, to propose
    ru: предлагать
    uk: пропонувати
    example_de: "Ich schlage vor, uns um sieben zu treffen."
    example_en: "I suggest we meet at seven."
    example_ru: "Я предлагаю встретиться в семь."
    example_uk: "Я пропоную зустрітися о сьомій."
    note:
      en: "Separable, with the same a → ä change as schlagen: du schlägst vor, er schlägt vor. Careful with English: German vorschlagen suggests a course of action, it does not offer a thing — for that use anbieten."
      ru: "Отделяемый, с тем же чередованием a → ä, что и у schlagen: du schlägst vor, er schlägt vor. Не путайте с «предлагать» в смысле «угощать, давать»: это anbieten. Vorschlagen — предложить сделать что-то."
      uk: "Відокремлюваний, із тим самим чергуванням a → ä, що й у schlagen: du schlägst vor, er schlägt vor. Не плутайте з «пропонувати» у значенні «частувати, давати»: це anbieten. Vorschlagen — запропонувати щось зробити."

  - de: beschließen
    ipa: "bəˈʃliːsn̩"
    pos: verb
    aux: haben
    praesens_3sg: beschließt
    partizip2: beschlossen
    valence: "+ Akk"
    en: to decide, to resolve
    ru: решить, принять решение
    uk: вирішити, ухвалити рішення
    example_de: "Wir haben beschlossen, ein Jahr in Berlin zu bleiben."
    example_en: "We have decided to stay in Berlin for a year."
    example_ru: "Мы решили остаться в Берлине на год."
    example_uk: "Ми вирішили залишитися в Берліні на рік."
    note:
      en: "A firm decision, usually after thinking it over. The prefix be- is inseparable, so the Partizip II has no ge-: hat beschlossen. It very often opens a zu-infinitive, as in the example."
      ru: "Твёрдое решение, обычно после обдумывания. Приставка be- неотделяемая, поэтому в Partizip II нет ge-: hat beschlossen. Очень часто вводит инфинитив с zu, как в примере."
      uk: "Тверде рішення, зазвичай після обмірковування. Префікс be- невідокремлюваний, тому в Partizip II немає ge-: hat beschlossen. Дуже часто вводить інфінітив із zu, як у прикладі."

  - de: sich entscheiden
    ipa: "zɪç ʔɛntˈʃaɪ̯dn̩"
    pos: verb
    aux: haben
    praesens_3sg: entscheidet sich
    partizip2: sich entschieden
    valence: "sich entscheiden für + Akk"
    accept: ["entscheiden"]
    en: to decide, to make up one's mind
    ru: решаться, делать выбор
    uk: вирішувати, робити вибір
    example_de: "Ich habe mich für den Deutschkurs am Abend entschieden."
    example_en: "I decided on the evening German course."
    example_ru: "Я выбрал вечерний курс немецкого."
    example_uk: "Я обрав вечірній курс німецької."
    note:
      en: "Reflexive, and it picks between options: sich entscheiden für + Akkusativ. Compare beschließen, which resolves to do something rather than choosing between alternatives. The pronoun changes with the person: ich entscheide mich, du entscheidest dich."
      ru: "Возвратный, и означает выбор между вариантами: sich entscheiden für + Akkusativ. Ср. beschließen — «принять решение сделать», а не «выбрать из нескольких». Местоимение меняется по лицам: ich entscheide mich, du entscheidest dich."
      uk: "Зворотний, і означає вибір між варіантами: sich entscheiden für + Akkusativ. Пор. beschließen — «ухвалити рішення зробити», а не «обрати з кількох». Займенник змінюється за особами: ich entscheide mich, du entscheidest dich."

  - de: Entscheidung
    ipa: "ʔɛntˈʃaɪ̯dʊŋ"
    pos: noun
    gender: f
    plural: "die Entscheidungen"
    en: decision
    ru: решение
    uk: рішення
    example_de: "Das war keine leichte Entscheidung."
    example_en: "That was not an easy decision."
    example_ru: "Это было нелёгкое решение."
    example_uk: "Це було нелегке рішення."
    note:
      en: "eine Entscheidung treffen — to make a decision (treffen, not machen). The -ung ending makes it feminine, like every -ung noun."
      ru: "eine Entscheidung treffen — принять решение (именно treffen, не machen). Суффикс -ung делает слово женского рода, как и у всех существительных на -ung."
      uk: "eine Entscheidung treffen — ухвалити рішення (саме treffen, не machen). Суфікс -ung робить слово жіночого роду, як і в усіх іменників на -ung."

  # --- versprechen, sich lohnen, weitermachen ---
  - de: versprechen
    ipa: "fɛɐ̯ˈʃpʁɛçn̩"
    pos: verb
    aux: haben
    praesens_3sg: verspricht
    partizip2: versprochen
    valence: "+ Dat + Akk"
    en: to promise
    ru: обещать
    uk: обіцяти
    example_de: "Ich verspreche dir, morgen pünktlich zu sein."
    example_en: "I promise you I will be on time tomorrow."
    example_ru: "Обещаю тебе завтра быть вовремя."
    example_uk: "Обіцяю тобі завтра бути вчасно."
    note:
      en: "The person promised goes in the Dativ, what is promised in the Akkusativ — or, as here, in a zu-infinitive. Inseparable ver-, with the e → i change in the singular: du versprichst, er verspricht."
      ru: "Тот, кому обещают, стоит в Dativ, а обещанное — в Akkusativ или, как здесь, в инфинитиве с zu. Приставка ver- неотделяемая, в единственном числе чередование e → i: du versprichst, er verspricht."
      uk: "Той, кому обіцяють, стоїть у Dativ, а обіцяне — в Akkusativ або, як тут, в інфінітиві з zu. Префікс ver- невідокремлюваний, в однині чергування e → i: du versprichst, er verspricht."

  - de: sich lohnen
    ipa: "zɪç ˈloːnən"
    pos: verb
    aux: haben
    praesens_3sg: lohnt sich
    partizip2: sich gelohnt
    valence: "sich lohnen (meist unpersönlich: es lohnt sich)"
    accept: ["lohnen"]
    en: to be worth it, to pay off
    ru: стоить того, окупаться
    uk: бути вартим того, окупатися
    example_de: "Es lohnt sich, früh am Markt zu sein."
    example_en: "It is worth being at the market early."
    example_ru: "Стоит прийти на рынок пораньше."
    example_uk: "Варто прийти на ринок раніше."
    note:
      en: "Nearly always impersonal: es lohnt sich, followed by a comma and a zu-infinitive. A compact way to recommend something without telling anyone what to do."
      ru: "Почти всегда безлично: es lohnt sich, дальше запятая и инфинитив с zu. Компактный способ что-то посоветовать, не отдавая приказа."
      uk: "Майже завжди безособово: es lohnt sich, далі кома й інфінітив із zu. Компактний спосіб щось порадити, не наказуючи."

  - de: weitermachen
    ipa: "ˈvaɪ̯tɐˌmaxn̩"
    pos: verb
    aux: haben
    praesens_3sg: macht weiter
    partizip2: weitergemacht
    en: to carry on, to keep going
    ru: продолжать
    uk: продовжувати
    example_de: "Nach der Pause machen wir weiter."
    example_en: "We will carry on after the break."
    example_ru: "После перерыва мы продолжим."
    example_uk: "Після перерви ми продовжимо."
    note:
      en: "Separable: macht … weiter. The pair to aufhören (to stop). Unlike English carry on doing, German weitermachen takes no verb after it — say weitermachen on its own, or use the noun: Ich mache mit der Arbeit weiter."
      ru: "Отделяемый: macht … weiter. Пара к aufhören (прекращать). В отличие от русского «продолжать делать», немецкий weitermachen не берёт после себя глагол — либо просто weitermachen, либо с существительным: Ich mache mit der Arbeit weiter."
      uk: "Відокремлюваний: macht … weiter. Пара до aufhören (припиняти). На відміну від українського «продовжувати робити», німецький weitermachen не бере після себе дієслова — або просто weitermachen, або з іменником: Ich mache mit der Arbeit weiter."

  # --- Gesundheit: ab- und zunehmen ---
  - de: abnehmen
    ipa: "ˈapˌneːmən"
    pos: verb
    aux: haben
    praesens_3sg: nimmt ab
    partizip2: abgenommen
    en: to lose weight; to decrease
    ru: худеть; убавляться
    uk: худнути; зменшуватися
    example_de: "Ich versuche, ein paar Kilo abzunehmen."
    example_en: "I am trying to lose a few kilos."
    example_ru: "Я стараюсь сбросить пару килограммов."
    example_uk: "Я намагаюся скинути пару кілограмів."
    note:
      en: "Separable, with the e → i change: du nimmst ab, er nimmt ab. It is also the clearest example of where zu goes in a separable verb — inside, between prefix and stem: abzunehmen."
      ru: "Отделяемый, с чередованием e → i: du nimmst ab, er nimmt ab. И это самый наглядный пример того, куда встаёт zu у отделяемого глагола — внутрь, между приставкой и основой: abzunehmen."
      uk: "Відокремлюваний, із чергуванням e → i: du nimmst ab, er nimmt ab. І це найнаочніший приклад того, куди стає zu у відокремлюваного дієслова — усередину, між префіксом і основою: abzunehmen."

  - de: zunehmen
    ipa: "ˈtsuːˌneːmən"
    pos: verb
    aux: haben
    praesens_3sg: nimmt zu
    partizip2: zugenommen
    en: to put on weight; to increase
    ru: полнеть; возрастать
    uk: гладшати; зростати
    example_de: "Im Winter nehme ich immer ein bisschen zu."
    example_en: "I always put on a bit of weight in winter."
    example_ru: "Зимой я всегда немного набираю вес."
    example_uk: "Узимку я завжди трохи набираю вагу."
    note:
      en: "The opposite of abnehmen, built the same way. Do not let the prefix zu be confused with the zu of the zu-infinitive: here it is part of the verb, and the infinitive with zu is zuzunehmen."
      ru: "Противоположность abnehmen, устроен так же. Не путайте приставку zu с частицей zu при инфинитиве: здесь zu — часть глагола, а инфинитив с частицей выглядит как zuzunehmen."
      uk: "Протилежність abnehmen, побудований так само. Не плутайте префікс zu з часткою zu при інфінітиві: тут zu — частина дієслова, а інфінітив із часткою має вигляд zuzunehmen."

  # --- Umstände & Bewertung ---
  - de: Möglichkeit
    ipa: "ˈmøːklɪçkaɪ̯t"
    pos: noun
    gender: f
    plural: "die Möglichkeiten"
    en: possibility, opportunity
    ru: возможность
    uk: можливість
    example_de: "Hast du die Möglichkeit, früher zu kommen?"
    example_en: "Do you have the opportunity to come earlier?"
    example_ru: "У тебя есть возможность прийти пораньше?"
    example_uk: "У тебе є можливість прийти раніше?"
    note:
      en: "From möglich (possible), and like every -keit noun it is feminine. die Möglichkeit haben, etwas zu tun — to have the chance to do something."
      ru: "От möglich (возможный); как и все существительные на -keit, женского рода. die Möglichkeit haben, etwas zu tun — иметь возможность что-то сделать."
      uk: "Від möglich (можливий); як і всі іменники на -keit, жіночого роду. die Möglichkeit haben, etwas zu tun — мати можливість щось зробити."

  - de: nötig
    ipa: "ˈnøːtɪç"
    pos: adj
    en: necessary
    ru: нужный, необходимый
    uk: потрібний, необхідний
    example_de: "Es ist nicht nötig, einen Termin zu machen."
    example_en: "It is not necessary to make an appointment."
    example_ru: "Записываться на приём не обязательно."
    example_uk: "Записуватися на прийом не обов'язково."
    note:
      en: "Es ist nötig, … zu … is one of the impersonal frames that open a zu-infinitive, alongside es ist wichtig and es ist möglich. The negative is the useful one in daily life: Das ist nicht nötig — no need, don't bother."
      ru: "Es ist nötig, … zu … — одна из безличных конструкций, вводящих инфинитив с zu, наряду с es ist wichtig и es ist möglich. В быту чаще нужна отрицательная: Das ist nicht nötig — «не нужно, не стоит»."
      uk: "Es ist nötig, … zu … — одна з безособових конструкцій, що вводять інфінітив із zu, поряд з es ist wichtig та es ist möglich. У побуті частіше потрібна заперечна: Das ist nicht nötig — «не потрібно, не варто»."

  - de: rechtzeitig
    ipa: "ˈʁɛçtˌtsaɪ̯tɪç"
    pos: adj
    en: in good time, on time
    ru: своевременно, заранее
    uk: вчасно, завчасно
    example_de: "Bitte sagen Sie rechtzeitig Bescheid, wenn Sie nicht kommen können."
    example_en: "Please let us know in good time if you cannot come."
    example_ru: "Пожалуйста, сообщите заранее, если не сможете прийти."
    example_uk: "Будь ласка, повідомте завчасно, якщо не зможете прийти."
    note:
      en: "Not quite pünktlich: pünktlich means at the agreed minute, rechtzeitig means early enough for it still to work. A doctor's office, a landlord and an employer all ask for rechtzeitig."
      ru: "Не то же самое, что pünktlich: pünktlich — «минута в минуту», rechtzeitig — «достаточно заранее, чтобы всё успелось». Врач, арендодатель и работодатель просят именно rechtzeitig."
      uk: "Не те саме, що pünktlich: pünktlich — «хвилина у хвилину», rechtzeitig — «достатньо завчасно, щоб усе встиглося». Лікар, орендодавець і роботодавець просять саме rechtzeitig."
