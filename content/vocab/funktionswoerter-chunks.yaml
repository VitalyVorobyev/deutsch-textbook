id: funktionswoerter-chunks
title_de: "Kleine Wörter & Floskeln"
title_en: "Small words & set phrases"
title_ru: "Служебные слова и фразы"
level: A1
entries:
  - { de: "alle", ipa: "ˈalə", pos: pron, en: "all; everyone", ru: "все", example_de: "Alle Studenten lernen Deutsch.", example_en: "All the students are learning German.", example_ru: "Все студенты учат немецкий." }
  - { de: "alles", ipa: "ˈaləs", pos: pron, en: "everything", ru: "всё", example_de: "Alles ist klar.", example_en: "Everything is clear.", example_ru: "Всё понятно." }
  - { de: "etwas", ipa: "ˈɛtvas", pos: pron, en: "something; a bit", ru: "что-то; немного", example_de: "Ich habe etwas Zeit.", example_en: "I have a bit of time.", example_ru: "У меня есть немного времени." }
  - { de: "nichts", ipa: "ˈnɪçts", pos: pron, en: "nothing", ru: "ничего", example_de: "Er sagt nichts.", example_en: "He says nothing.", example_ru: "Он ничего не говорит." }
  - { de: "auch", ipa: "ˈaʊ̯x", pos: adv, en: "also; too", ru: "тоже", example_de: "Ich lerne auch Deutsch.", example_en: "I am also learning German.", example_ru: "Я тоже учу немецкий." }
  - { de: "nur", ipa: "ˈnuːɐ̯", pos: adv, en: "only; just", ru: "только", example_de: "Ich habe nur einen Euro.", example_en: "I only have one euro.", example_ru: "У меня только одно евро." }
  - { de: "noch", ipa: "ˈnɔx", pos: adv, en: "still; yet", ru: "ещё", example_de: "Er ist noch hier.", example_en: "He is still here.", example_ru: "Он ещё здесь." }
  - { de: "schon", ipa: "ˈʃoːn", pos: adv, en: "already", ru: "уже", example_de: "Die Kinder sind schon da.", example_en: "The children are already there.", example_ru: "Дети уже там." }
  - { de: "sehr", ipa: "ˈzeːɐ̯", pos: adv, en: "very", ru: "очень", example_de: "Das Zimmer ist sehr hell.", example_en: "The room is very bright.", example_ru: "Комната очень светлая." }
  - { de: "bitte", ipa: "ˈbɪtə", pos: particle, en: "please", ru: "пожалуйста", example_de: "Ein Wasser, bitte.", example_en: "A water, please.", example_ru: "Воды, пожалуйста." }
  - { de: "danke", ipa: "ˈdaŋkə", pos: particle, en: "thanks; thank you", ru: "спасибо", example_de: "Danke, das ist nett.", example_en: "Thanks, that is kind.", example_ru: "Спасибо, это мило." }
  - { de: "ja", ipa: "ˈjaː", pos: particle, en: "yes", ru: "да", example_de: "Ja, das stimmt.", example_en: "Yes, that is right.", example_ru: "Да, это верно." }
  - { de: "nein", ipa: "ˈnaɪ̯n", pos: particle, en: "no", ru: "нет", example_de: "Nein, ich bin nicht müde.", example_en: "No, I am not tired.", example_ru: "Нет, я не устал." }
  - { de: "doch", ipa: "ˈdɔx", pos: particle, en: "yes (contradicting a negative statement or question)", ru: "нет, напротив (в ответ на отрицательный вопрос или утверждение)", example_de: "— Kommst du nicht mit? — Doch!", example_en: "— Aren't you coming along? — Yes, I am!", example_ru: "— Ты не идёшь с нами? — Да нет, иду!", note: { en: "Doch contradicts a negative question or statement: Bist du nicht müde? — Doch! (Yes, I am.)", ru: "Doch опровергает отрицательный вопрос или утверждение: Bist du nicht müde? — Doch! (Нет, устал.)" } }
  - { de: "hier", ipa: "ˈhiːɐ̯", pos: adv, en: "here", ru: "здесь; тут", example_de: "Ich wohne hier.", example_en: "I live here.", example_ru: "Я живу здесь." }
  - { de: "da", ipa: "ˈdaː", pos: adv, en: "there; (to be) in, present", ru: "там; на месте (здесь)", example_de: "Ist Frau Klein da?", example_en: "Is Ms Klein in?", example_ru: "Фрау Кляйн на месте?", note: { en: "Da often marks presence, not just location: Ist Herr Bauer da? = Is Mr Bauer in? Dort points to a place farther away.", ru: "Da часто указывает на присутствие, а не только на место: Ist Herr Bauer da? = Господин Бауэр на месте? Dort указывает на более удалённое место." } }
  - { de: "dort", ipa: "ˈdɔʁt", pos: adv, en: "there (farther away)", ru: "там (вдали)", example_de: "Dort steht ein Haus.", example_en: "There stands a house.", example_ru: "Там стоит дом." }
  - { de: "oben", ipa: "ˈoːbn̩", pos: adv, en: "up; upstairs; at the top", ru: "наверху", example_de: "Das Schlafzimmer ist oben.", example_en: "The bedroom is upstairs.", example_ru: "Спальня наверху." }
  - { de: "unten", ipa: "ˈʊntn̩", pos: adv, en: "down; downstairs; at the bottom", ru: "внизу", example_de: "Die Küche ist unten.", example_en: "The kitchen is downstairs.", example_ru: "Кухня внизу." }
  - { de: "heute", ipa: "ˈhɔʏ̯tə", pos: adv, en: "today", ru: "сегодня", example_de: "Heute ist Montag.", example_en: "Today is Monday.", example_ru: "Сегодня понедельник." }
  - { de: "morgen", ipa: "ˈmɔʁgn̩", pos: adv, en: "tomorrow", ru: "завтра", example_de: "Morgen kommt Anna.", example_en: "Anna is coming tomorrow.", example_ru: "Завтра придёт Анна.", note: { en: "Lowercase adverb 'tomorrow' — distinct from the capitalized noun der Morgen (the morning).", ru: "Строчная буква — наречие «завтра»; не путайте с существительным der Morgen (утро), которое пишется с большой буквы." } }
  - { de: "gestern", ipa: "ˈgɛstɐn", pos: adv, en: "yesterday", ru: "вчера", example_de: "Gestern ist schon vorbei.", example_en: "Yesterday is already over.", example_ru: "Вчера уже прошло." }
  - { de: "jetzt", ipa: "ˈjɛtst", pos: adv, en: "now", ru: "сейчас", example_de: "Ich bin jetzt zu Hause.", example_en: "I am at home now.", example_ru: "Я сейчас дома." }
  - { de: "Guten Morgen", ipa: "ˈguːtn̩ ˈmɔʁgn̩", pos: phrase, en: "Good morning", ru: "Доброе утро", example_de: "Guten Morgen, Frau Bauer!", example_en: "Good morning, Ms Bauer!", example_ru: "Доброе утро, фрау Бауэр!" }
  - { de: "Guten Tag", ipa: "ˈguːtn̩ ˈtaːk", pos: phrase, en: "Good afternoon; hello (formal)", ru: "Добрый день", example_de: "Guten Tag, Herr Schmidt!", example_en: "Good afternoon, Mr Schmidt!", example_ru: "Добрый день, герр Шмидт!" }
  - { de: "Guten Abend", ipa: "ˈguːtn̩ ˈaːbn̩t", pos: phrase, en: "Good evening", ru: "Добрый вечер", example_de: "Guten Abend, Frau Roth!", example_en: "Good evening, Ms Roth!", example_ru: "Добрый вечер, фрау Рот!" }
  - { de: "Gute Nacht", ipa: "ˈguːtə ˈnaxt", pos: phrase, en: "Good night", ru: "Спокойной ночи", example_de: "Gute Nacht, Kinder!", example_en: "Good night, children!", example_ru: "Спокойной ночи, дети!" }
  # Interjections are lowercase as headwords (Duden lemma, and the form the Goethe
  # PDF prints) — they only take a capital when they open a sentence, as in the
  # examples below. They were capitalized here, which read as a coverage gap on the
  # A2 manifest while the A1 manifest had been normalized to the deck's spelling.
  - { de: "hallo", ipa: "haˈloː", pos: interj, en: "Hi; hello", ru: "Привет", example_de: "Hallo, ich heiße Lena.", example_en: "Hi, my name is Lena.", example_ru: "Привет, меня зовут Лена." }
  - { de: "Auf Wiedersehen", ipa: "aʊ̯f ˈviːdɐˌzeːən", pos: phrase, en: "Goodbye (formal)", ru: "До свидания", example_de: "Auf Wiedersehen, Herr Bauer!", example_en: "Goodbye, Mr Bauer!", example_ru: "До свидания, герр Бауэр!" }
  - { de: "tschüs", ipa: "ˈtʃyːs", pos: interj, en: "Bye", ru: "Пока", example_de: "Tschüs, bis morgen!", example_en: "Bye, see you tomorrow!", example_ru: "Пока, до завтра!" }
  - { de: "Entschuldigung", ipa: "ɛntˈʃʊldɪgʊŋ", pos: noun, gender: f, plural: "die Entschuldigungen", en: "excuse me; sorry", ru: "извините; простите", example_de: "Entschuldigung, wo ist die Toilette?", example_en: "Excuse me, where is the toilet?", example_ru: "Извините, где туалет?", note: { en: "As an exclamation it means 'excuse me/sorry'; as a full noun (die Entschuldigung) it means an apology or a school excuse note.", ru: "Как восклицание значит «извините/простите»; как существительное (die Entschuldigung) — «извинение» или «записка об отсутствии в школе»." } }
  - { de: "Wie geht es Ihnen", pos: phrase, en: "How are you (formal)", ru: "Как у вас дела (вежливая форма)", example_de: "Guten Tag! Wie geht es Ihnen?", example_en: "Good afternoon! How are you?", example_ru: "Добрый день! Как у вас дела?", note: { en: "Ihnen (capitalized) is the dative of formal Sie. The informal version is Wie geht es dir?", ru: "Ihnen (с большой буквы) — дательный падеж от вежливого Sie. Неформальный вариант — Wie geht es dir?" } }
  - { de: "Herzlichen Glückwunsch", ipa: "ˈhɛʁtslɪçn̩ ˈglʏkvʊnʃ", pos: phrase, en: "Congratulations", ru: "Поздравляю", example_de: "Herzlichen Glückwunsch zum Geburtstag!", example_en: "Happy birthday!", example_ru: "Поздравляю с днём рождения!" }
  - { de: "Viel Spaß", ipa: "ˈfiːl ˈʃpaːs", pos: phrase, en: "Have fun", ru: "Приятно провести время", example_de: "Viel Spaß im Kino!", example_en: "Have fun at the cinema!", example_ru: "Приятно провести время в кино!" }
  - { de: "Gute Besserung", ipa: "ˈguːtə ˈbɛsəʁʊŋ", pos: phrase, en: "Get well soon", ru: "Выздоравливайте", example_de: "Gute Besserung, Frau Klein!", example_en: "Get well soon, Ms Klein!", example_ru: "Выздоравливайте, фрау Кляйн!" }
  - { de: "Achtung", ipa: "ˈaxtʊŋ", pos: noun, gender: f, plural: "—", en: "attention; caution; watch out", ru: "внимание; осторожно", example_de: "Achtung, die Tür ist offen!", example_en: "Attention, the door is open!", example_ru: "Внимание, дверь открыта!", note: { en: "Used bare as a warning shout (Achtung!), unlike most nouns which need an article.", ru: "Используется без артикля как предупреждающий возглас (Achtung!), в отличие от большинства существительных, которым артикль обязателен." } }
  - { de: "Hilfe", ipa: "ˈhɪlfə", pos: noun, gender: f, plural: "—", en: "help", ru: "помощь", example_de: "Ich brauche Hilfe.", example_en: "I need help.", example_ru: "Мне нужна помощь.", note: { en: "As a cry for help it is used bare (Hilfe!); with an article it means help/assistance in general (die Hilfe).", ru: "Как крик о помощи используется без артикля (Hilfe!); с артиклем означает «помощь» в общем смысле (die Hilfe)." } }
  - { de: "Herr", ipa: "ˈhɛʁ", pos: noun, gender: m, plural: "die Herren", en: "Mr; gentleman", ru: "господин; мужчина", example_de: "Herr Bauer wohnt hier.", example_en: "Mr Bauer lives here.", example_ru: "Господин Бауэр живёт здесь.", note: { en: "Herr is a weak noun: it takes -n in every case except the nominative singular (Ich sehe Herrn Bauer).", ru: "Herr — слабое существительное: во всех падежах, кроме именительного, добавляется -n (Ich sehe Herrn Bauer)." } }
  - { de: "Frau", ipa: "ˈfʁaʊ̯", pos: noun, gender: f, plural: "die Frauen", en: "Mrs/Ms; woman", ru: "госпожа; женщина", example_de: "Frau Klein arbeitet hier.", example_en: "Ms Klein works here.", example_ru: "Госпожа Кляйн работает здесь." }
  - { de: "bitte schön", ipa: "ˈbɪtə ˈʃøːn", pos: phrase, en: "you're welcome; here you are", ru: "пожалуйста (в ответ на «спасибо»)", example_de: "— Danke schön! — Bitte schön!", example_en: "— Thank you very much! — You're welcome!", example_ru: "— Большое спасибо! — Пожалуйста!", note: { en: "Bitte schön can mean 'you're welcome' (reply to Danke) or 'here you are' (handing something over) — richer than plain bitte.", ru: "Bitte schön означает «пожалуйста» (в ответ на «спасибо») или «прошу» (когда что-то подаёте) — более развёрнуто, чем просто bitte." } }
  - { de: "Moment", ipa: "moˈmɛnt", pos: noun, gender: m, plural: "die Momente", en: "moment", ru: "момент; минутку", example_de: "Einen Moment, bitte.", example_en: "One moment, please.", example_ru: "Минутку, пожалуйста.", note: { en: "Einen Moment uses the accusative without a preposition, as durations often do (eine Minute warten).", ru: "Einen Moment — винительный падеж без предлога; так часто оформляется длительность (eine Minute warten)." } }
