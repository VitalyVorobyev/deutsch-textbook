id: funktionswoerter-chunks
title_de: "Kleine Wörter & Floskeln"
title_en: "Small words & set phrases"
title_ru: "Служебные слова и фразы"
title_uk: "Службові слова та фрази"
level: A1
entries:
  - { de: "alle", ipa: "ˈalə", pos: pron, en: "all; everyone", ru: "все", uk: "усі", example_de: "Alle Studenten lernen Deutsch.", example_en: "All the students are learning German.", example_ru: "Все студенты учат немецкий.", example_uk: "Усі студенти вчать німецьку." }
  - { de: "alles", ipa: "ˈaləs", pos: pron, en: "everything", ru: "всё", uk: "усе", example_de: "Alles ist klar.", example_en: "Everything is clear.", example_ru: "Всё понятно.", example_uk: "Усе зрозуміло." }
  - { de: "etwas", ipa: "ˈɛtvas", pos: pron, en: "something; a bit", ru: "что-то; немного", uk: "щось; трохи", example_de: "Ich habe etwas Zeit.", example_en: "I have a bit of time.", example_ru: "У меня есть немного времени.", example_uk: "У мене є трохи часу." }
  - { de: "nichts", ipa: "ˈnɪçts", pos: pron, en: "nothing", ru: "ничего", uk: "нічого", example_de: "Er sagt nichts.", example_en: "He says nothing.", example_ru: "Он ничего не говорит.", example_uk: "Він нічого не каже." }
  - { de: "auch", ipa: "ˈaʊ̯x", pos: adv, en: "also; too", ru: "тоже", uk: "теж; також", example_de: "Ich lerne auch Deutsch.", example_en: "I am also learning German.", example_ru: "Я тоже учу немецкий.", example_uk: "Я теж вчу німецьку." }
  - { de: "nur", ipa: "ˈnuːɐ̯", pos: adv, en: "only; just", ru: "только", uk: "тільки; лише", example_de: "Ich habe nur einen Euro.", example_en: "I only have one euro.", example_ru: "У меня только один евро.", example_uk: "У мене лише один євро." }
  - { de: "noch", ipa: "ˈnɔx", pos: adv, en: "still; yet", ru: "ещё", uk: "ще", example_de: "Er ist noch hier.", example_en: "He is still here.", example_ru: "Он ещё здесь.", example_uk: "Він ще тут." }
  - { de: "schon", ipa: "ˈʃoːn", pos: adv, en: "already", ru: "уже", uk: "уже", example_de: "Die Kinder sind schon da.", example_en: "The children are already there.", example_ru: "Дети уже там.", example_uk: "Діти вже там." }
  - { de: "sehr", ipa: "ˈzeːɐ̯", pos: adv, en: "very", ru: "очень", uk: "дуже", example_de: "Das Zimmer ist sehr hell.", example_en: "The room is very bright.", example_ru: "Комната очень светлая.", example_uk: "Кімната дуже світла." }
  - { de: "bitte", ipa: "ˈbɪtə", pos: particle, en: "please", ru: "пожалуйста", uk: "будь ласка", example_de: "Ein Wasser, bitte.", example_en: "A water, please.", example_ru: "Воды, пожалуйста.", example_uk: "Води, будь ласка." }
  - { de: "danke", ipa: "ˈdaŋkə", pos: particle, en: "thanks; thank you", ru: "спасибо", uk: "дякую", example_de: "Danke, das ist nett.", example_en: "Thanks, that is kind.", example_ru: "Спасибо, это мило.", example_uk: "Дякую, це мило." }
  - { de: "ja", ipa: "ˈjaː", pos: particle, en: "yes", ru: "да", uk: "так", example_de: "Ja, das stimmt.", example_en: "Yes, that is right.", example_ru: "Да, это верно.", example_uk: "Так, це правда." }
  - { de: "nein", ipa: "ˈnaɪ̯n", pos: particle, en: "no", ru: "нет", uk: "ні", example_de: "Nein, ich bin nicht müde.", example_en: "No, I am not tired.", example_ru: "Нет, я не устал.", example_uk: "Ні, я не втомився." }
  - { de: "doch", ipa: "ˈdɔx", pos: particle, en: "yes (contradicting a negative statement or question)", ru: "нет, напротив (в ответ на отрицательный вопрос или утверждение)", uk: "та ні, навпаки (у відповідь на заперечне питання чи твердження)", example_de: "— Kommst du nicht mit? — Doch!", example_en: "— Aren't you coming along? — Yes, I am!", example_ru: "— Ты не идёшь с нами? — Да нет, иду!", example_uk: "— Ти не йдеш із нами? — Та ні, йду!", note: { en: "Doch contradicts a negative question or statement: Bist du nicht müde? — Doch! (Yes, I am.)", ru: "Doch опровергает отрицательный вопрос или утверждение: Bist du nicht müde? — Doch! (Нет, устал.)", uk: "Doch спростовує заперечне питання чи твердження: Bist du nicht müde? — Doch! (Та ні, втомився.)" } }
  - { de: "hier", ipa: "ˈhiːɐ̯", pos: adv, en: "here", ru: "здесь; тут", uk: "тут", example_de: "Ich wohne hier.", example_en: "I live here.", example_ru: "Я живу здесь.", example_uk: "Я живу тут." }
  - { de: "da", ipa: "ˈdaː", pos: adv, en: "there; (to be) in, present", ru: "там; на месте (здесь)", uk: "там; на місці (тут)", example_de: "Ist Frau Klein da?", example_en: "Is Ms Klein in?", example_ru: "Фрау Кляйн на месте?", example_uk: "Пані Кляйн на місці?", note: { en: "Da often marks presence, not just location: Ist Herr Bauer da? = Is Mr Bauer in? Dort points to a place farther away.", ru: "Da часто указывает на присутствие, а не только на место: Ist Herr Bauer da? = Господин Бауэр на месте? Dort указывает на более удалённое место.", uk: "Da часто вказує на присутність, а не лише на місце: Ist Herr Bauer da? = Пан Бауер на місці? Dort вказує на віддаленіше місце." } }
  - { de: "dort", ipa: "ˈdɔʁt", pos: adv, en: "there (farther away)", ru: "там (вдали)", uk: "там (віддалік)", example_de: "Dort steht ein Haus.", example_en: "There stands a house.", example_ru: "Там стоит дом.", example_uk: "Там стоїть будинок." }
  - { de: "oben", ipa: "ˈoːbn̩", pos: adv, en: "up; upstairs; at the top", ru: "наверху", uk: "нагорі; вгорі", example_de: "Das Schlafzimmer ist oben.", example_en: "The bedroom is upstairs.", example_ru: "Спальня наверху.", example_uk: "Спальня нагорі." }
  - { de: "unten", ipa: "ˈʊntn̩", pos: adv, en: "down; downstairs; at the bottom", ru: "внизу", uk: "унизу", example_de: "Die Küche ist unten.", example_en: "The kitchen is downstairs.", example_ru: "Кухня внизу.", example_uk: "Кухня внизу." }
  - { de: "heute", ipa: "ˈhɔʏ̯tə", pos: adv, en: "today", ru: "сегодня", uk: "сьогодні", example_de: "Heute ist Montag.", example_en: "Today is Monday.", example_ru: "Сегодня понедельник.", example_uk: "Сьогодні понеділок." }
  - { de: "morgen", ipa: "ˈmɔʁgn̩", pos: adv, en: "tomorrow", ru: "завтра", uk: "завтра", example_de: "Morgen kommt Anna.", example_en: "Anna is coming tomorrow.", example_ru: "Завтра придёт Анна.", example_uk: "Завтра прийде Анна.", note: { en: "Lowercase adverb 'tomorrow' — distinct from the capitalized noun der Morgen (the morning).", ru: "Строчная буква — наречие «завтра»; не путайте с существительным der Morgen (утро), которое пишется с большой буквы.", uk: "Мала літера — це прислівник «завтра»; не плутайте з іменником der Morgen (ранок), який пишеться з великої." } }
  - { de: "gestern", ipa: "ˈgɛstɐn", pos: adv, en: "yesterday", ru: "вчера", uk: "вчора", example_de: "Gestern ist schon vorbei.", example_en: "Yesterday is already over.", example_ru: "Вчера уже прошло.", example_uk: "Вчора вже минуло." }
  - { de: "jetzt", ipa: "ˈjɛtst", pos: adv, en: "now", ru: "сейчас", uk: "зараз; тепер", example_de: "Ich bin jetzt zu Hause.", example_en: "I am at home now.", example_ru: "Я сейчас дома.", example_uk: "Я зараз удома." }
  - { de: "Guten Morgen", ipa: "ˈguːtn̩ ˈmɔʁgn̩", pos: phrase, en: "Good morning", ru: "Доброе утро", uk: "Доброго ранку", example_de: "Guten Morgen, Frau Bauer!", example_en: "Good morning, Ms Bauer!", example_ru: "Доброе утро, фрау Бауэр!", example_uk: "Доброго ранку, пані Бауер!" }
  - { de: "Guten Tag", ipa: "ˈguːtn̩ ˈtaːk", pos: phrase, en: "Good afternoon; hello (formal)", ru: "Добрый день", uk: "Добрий день", example_de: "Guten Tag, Herr Schmidt!", example_en: "Good afternoon, Mr Schmidt!", example_ru: "Добрый день, герр Шмидт!", example_uk: "Добрий день, пане Шмідт!" }
  - { de: "Guten Abend", ipa: "ˈguːtn̩ ˈaːbn̩t", pos: phrase, en: "Good evening", ru: "Добрый вечер", uk: "Добрий вечір", example_de: "Guten Abend, Frau Roth!", example_en: "Good evening, Ms Roth!", example_ru: "Добрый вечер, фрау Рот!", example_uk: "Добрий вечір, пані Рот!" }
  - { de: "Gute Nacht", ipa: "ˈguːtə ˈnaxt", pos: phrase, en: "Good night", ru: "Спокойной ночи", uk: "На добраніч", example_de: "Gute Nacht, Kinder!", example_en: "Good night, children!", example_ru: "Спокойной ночи, дети!", example_uk: "На добраніч, діти!" }
  # Interjections are lowercase as headwords (Duden lemma, and the form the Goethe
  # PDF prints) — they only take a capital when they open a sentence, as in the
  # examples below. They were capitalized here, which read as a coverage gap on the
  # A2 manifest while the A1 manifest had been normalized to the deck's spelling.
  - { de: "hallo", ipa: "haˈloː", pos: interj, en: "Hi; hello", ru: "Привет", uk: "Привіт", example_de: "Hallo, ich heiße Lena.", example_en: "Hi, my name is Lena.", example_ru: "Привет, меня зовут Лена.", example_uk: "Привіт, мене звати Лена." }
  - { de: "Auf Wiedersehen", ipa: "aʊ̯f ˈviːdɐˌzeːən", pos: phrase, en: "Goodbye (formal)", ru: "До свидания", uk: "До побачення", example_de: "Auf Wiedersehen, Herr Bauer!", example_en: "Goodbye, Mr Bauer!", example_ru: "До свидания, герр Бауэр!", example_uk: "До побачення, пане Бауер!" }
  - { de: "tschüs", ipa: "ˈtʃyːs", pos: interj, en: "Bye", ru: "Пока", uk: "Бувай", example_de: "Tschüs, bis morgen!", example_en: "Bye, see you tomorrow!", example_ru: "Пока, до завтра!", example_uk: "Бувай, до завтра!" }
  - { de: "Entschuldigung", ipa: "ɛntˈʃʊldɪgʊŋ", pos: noun, gender: f, plural: "die Entschuldigungen", en: "excuse me; sorry", ru: "извините; простите", uk: "вибачте; перепрошую", example_de: "Entschuldigung, wo ist die Toilette?", example_en: "Excuse me, where is the toilet?", example_ru: "Извините, где туалет?", example_uk: "Вибачте, де туалет?", note: { en: "As an exclamation it means 'excuse me/sorry'; as a full noun (die Entschuldigung) it means an apology or a school excuse note.", ru: "Как восклицание значит «извините/простите»; как существительное (die Entschuldigung) — «извинение» или «записка об отсутствии в школе».", uk: "Як вигук означає «вибачте/перепрошую»; як іменник (die Entschuldigung) — «вибачення» або «записка про відсутність у школі»." } }
  - { de: "Wie geht es Ihnen", pos: phrase, en: "How are you (formal)", ru: "Как у вас дела (вежливая форма)", uk: "Як у вас справи (ввічлива форма)", example_de: "Guten Tag! Wie geht es Ihnen?", example_en: "Good afternoon! How are you?", example_ru: "Добрый день! Как у вас дела?", example_uk: "Добрий день! Як у вас справи?", note: { en: "Ihnen (capitalized) is the dative of formal Sie. The informal version is Wie geht es dir?", ru: "Ihnen (с большой буквы) — дательный падеж от вежливого Sie. Неформальный вариант — Wie geht es dir?", uk: "Ihnen (з великої літери) — давальний відмінок від ввічливого Sie. Неформальний варіант — Wie geht es dir?" } }
  - { de: "Herzlichen Glückwunsch", ipa: "ˈhɛʁtslɪçn̩ ˈglʏkvʊnʃ", pos: phrase, en: "Congratulations", ru: "Поздравляю", uk: "Вітаю; щирі вітання", example_de: "Herzlichen Glückwunsch zum Geburtstag!", example_en: "Happy birthday!", example_ru: "Поздравляю с днём рождения!", example_uk: "Вітаю з днем народження!" }
  - { de: "Viel Spaß", ipa: "ˈfiːl ˈʃpaːs", pos: phrase, en: "Have fun", ru: "Приятно провести время", uk: "Гарно провести час", example_de: "Viel Spaß im Kino!", example_en: "Have fun at the cinema!", example_ru: "Приятно провести время в кино!", example_uk: "Гарно провести час у кіно!" }
  - { de: "Gute Besserung", ipa: "ˈguːtə ˈbɛsəʁʊŋ", pos: phrase, en: "Get well soon", ru: "Выздоравливайте", uk: "Одужуйте", example_de: "Gute Besserung, Frau Klein!", example_en: "Get well soon, Ms Klein!", example_ru: "Выздоравливайте, фрау Кляйн!", example_uk: "Одужуйте, пані Кляйн!" }
  - { de: "Achtung", ipa: "ˈaxtʊŋ", pos: noun, gender: f, plural: "—", en: "attention; caution; watch out", ru: "внимание; осторожно", uk: "увага; обережно", example_de: "Achtung, die Tür ist offen!", example_en: "Attention, the door is open!", example_ru: "Внимание, дверь открыта!", example_uk: "Увага, двері відчинені!", note: { en: "Used bare as a warning shout (Achtung!), unlike most nouns which need an article.", ru: "Используется без артикля как предупреждающий возглас (Achtung!), в отличие от большинства существительных, которым артикль обязателен.", uk: "Вживається без артикля як застережний вигук (Achtung!), на відміну від більшості іменників, яким артикль обов'язковий." } }
  - { de: "Hilfe", ipa: "ˈhɪlfə", pos: noun, gender: f, plural: "—", en: "help", ru: "помощь", uk: "допомога", example_de: "Ich brauche Hilfe.", example_en: "I need help.", example_ru: "Мне нужна помощь.", example_uk: "Мені потрібна допомога.", note: { en: "As a cry for help it is used bare (Hilfe!); with an article it means help/assistance in general (die Hilfe).", ru: "Как крик о помощи используется без артикля (Hilfe!); с артиклем означает «помощь» в общем смысле (die Hilfe).", uk: "Як крик про допомогу вживається без артикля (Hilfe!); з артиклем означає «допомогу» загалом (die Hilfe)." } }
  - { de: "Herr", ipa: "ˈhɛʁ", pos: noun, gender: m, plural: "die Herren", en: "Mr; gentleman", ru: "господин; мужчина", uk: "пан; чоловік", example_de: "Herr Bauer wohnt hier.", example_en: "Mr Bauer lives here.", example_ru: "Господин Бауэр живёт здесь.", example_uk: "Пан Бауер живе тут.", note: { en: "Herr is a weak noun: it takes -n in every case except the nominative singular (Ich sehe Herrn Bauer).", ru: "Herr — слабое существительное: во всех падежах, кроме именительного, добавляется -n (Ich sehe Herrn Bauer).", uk: "Herr — слабкий іменник: у всіх відмінках, крім називного, додається -n (Ich sehe Herrn Bauer)." } }
  - { de: "Frau", ipa: "ˈfʁaʊ̯", pos: noun, gender: f, plural: "die Frauen", en: "Mrs/Ms; woman", ru: "госпожа; женщина", uk: "пані; жінка", example_de: "Frau Klein arbeitet hier.", example_en: "Ms Klein works here.", example_ru: "Госпожа Кляйн работает здесь.", example_uk: "Пані Кляйн працює тут." }
  - { de: "bitte schön", ipa: "ˈbɪtə ˈʃøːn", pos: phrase, en: "you're welcome; here you are", ru: "пожалуйста (в ответ на «спасибо»)", uk: "прошу (у відповідь на «дякую»)", example_de: "— Danke schön! — Bitte schön!", example_en: "— Thank you very much! — You're welcome!", example_ru: "— Большое спасибо! — Пожалуйста!", example_uk: "— Щиро дякую! — Прошу!", note: { en: "Bitte schön can mean 'you're welcome' (reply to Danke) or 'here you are' (handing something over) — richer than plain bitte.", ru: "Bitte schön означает «пожалуйста» (в ответ на «спасибо») или «прошу» (когда что-то подаёте) — более развёрнуто, чем просто bitte.", uk: "Bitte schön означає «прошу» (у відповідь на подяку) або «будь ласка, ось» (коли щось подаєте) — розгорнутіше, ніж просто bitte." } }
  - { de: "Moment", ipa: "moˈmɛnt", pos: noun, gender: m, plural: "die Momente", en: "moment", ru: "момент; минутку", uk: "момент; хвилинку", example_de: "Einen Moment, bitte.", example_en: "One moment, please.", example_ru: "Минутку, пожалуйста.", example_uk: "Хвилинку, будь ласка.", note: { en: "Einen Moment uses the accusative without a preposition, as durations often do (eine Minute warten).", ru: "Einen Moment — винительный падеж без предлога; так часто оформляется длительность (eine Minute warten).", uk: "Einen Moment — знахідний відмінок без прийменника; так часто позначається тривалість (eine Minute warten)." } }
