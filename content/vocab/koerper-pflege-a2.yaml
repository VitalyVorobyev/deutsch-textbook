# Goethe-A2 Wortliste completion deck — unowned by any topic. Drains the remaining
# koerper-gesundheit words of the manifest.
id: koerper-pflege-a2
title_de: "Körper & Körperpflege"
title_en: "Body & personal care"
title_ru: "Тело и уход за собой"
title_uk: "Тіло та догляд за собою"
level: A2
entries:
  - de: baden
    ipa: "ˈbaːdn̩"
    pos: verb
    praesens_3sg: badet
    partizip2: gebadet
    aux: haben
    en: to have a bath; to bathe, to swim (outdoors)
    ru: принимать ванну; купаться
    uk: приймати ванну; купатися
    example_de: Im Sommer baden wir oft im See.
    example_en: In summer we often swim in the lake.
    example_ru: Летом мы часто купаемся в озере.
    example_uk: Улітку ми часто купаємося в озері.
    note:
      en: 'Two everyday senses: lying in the bath at home (Ich bade gern abends) and swimming outdoors in a lake or the sea. Taking a shower is duschen — a different verb and a different room fixture. The room itself is das Badezimmer.'
      ru: 'Два обиходных значения: лежать в ванне дома (Ich bade gern abends) и купаться в озере или море. Принимать душ — другой глагол, duschen. Сама комната — das Badezimmer.'
      uk: 'Два звичні значення: лежати у ванні вдома (Ich bade gern abends) і купатися в озері чи морі. Приймати душ — інше дієслово, duschen. Сама кімната — das Badezimmer.'
  - de: rauchen
    ipa: "ˈʁaʊ̯xn̩"
    pos: verb
    praesens_3sg: raucht
    partizip2: geraucht
    aux: haben
    en: to smoke
    ru: курить
    uk: курити
    example_de: Hier darf man nicht rauchen.
    example_en: Smoking is not allowed here.
    example_ru: Здесь нельзя курить.
    example_uk: Тут не можна курити.
    note:
      en: 'A regular weak verb: er raucht, hat geraucht. The person is der Raucher or die Raucherin; the sign on the wall reads Rauchen verboten. The smoke itself is der Rauch.'
      ru: 'Правильный слабый глагол: er raucht, hat geraucht. Человек — der Raucher или die Raucherin; на табличке пишут Rauchen verboten. Сам дым — der Rauch.'
      uk: 'Правильне слабке дієслово: er raucht, hat geraucht. Людина — der Raucher або die Raucherin; на табличці пишуть Rauchen verboten. Сам дим — der Rauch.'
  - de: Gesicht
    ipa: "gəˈzɪçt"
    pos: noun
    gender: n
    plural: die Gesichter
    en: face
    ru: лицо
    uk: обличчя
    example_de: Meine Kollegin hat ein sehr freundliches Gesicht.
    example_en: My colleague has a very friendly face.
    example_ru: У моей коллеги очень приветливое лицо.
    example_uk: У моєї колеги дуже привітне обличчя.
    note:
      en: 'Neuter: das Gesicht, die Gesichter. With your own body German prefers the definite article plus a dative pronoun over a possessive: Ich wasche mir das Gesicht, rather than ich wasche mein Gesicht.'
      ru: 'Среднего рода: das Gesicht, die Gesichter. Со своими частями тела немецкий предпочитает определённый артикль и местоимение в Dativ, а не притяжательное: Ich wasche mir das Gesicht, а не ich wasche mein Gesicht.'
      uk: 'Середнього роду: das Gesicht, die Gesichter. Зі своїми частинами тіла німецька віддає перевагу означеному артиклю й займеннику в Dativ, а не присвійному: Ich wasche mir das Gesicht, а не ich wasche mein Gesicht.'
  - de: Magen
    ipa: "ˈmaːgn̩"
    pos: noun
    gender: m
    plural: die Mägen
    en: stomach (the organ)
    ru: желудок
    uk: шлунок
    example_de: Mir ist schlecht, mein Magen tut weh.
    example_en: I feel sick; my stomach hurts.
    example_ru: Меня тошнит, у меня болит желудок.
    example_uk: Мене нудить, у мене болить шлунок.
    note:
      en: 'The organ inside you, the one that digests food. Der Bauch is the belly you see from outside — if you point at it, it is the Bauch. Stomach ache is Magenschmerzen (or Bauchschmerzen). Plural with umlaut: die Mägen.'
      ru: 'Внутренний орган, который переваривает пищу. Der Bauch — это живот снаружи: то, на что можно показать пальцем. Боль в желудке — Magenschmerzen (или Bauchschmerzen). Множественное с умлаутом: die Mägen.'
      uk: 'Внутрішній орган, який перетравлює їжу. Der Bauch — це живіт ззовні: те, на що можна показати пальцем. Біль у шлунку — Magenschmerzen (або Bauchschmerzen). Множина з умлаутом: die Mägen.'
  - de: Schmerz
    ipa: "ˈʃmɛʁts"
    pos: noun
    gender: m
    plural: die Schmerzen
    en: pain
    ru: боль
    uk: біль
    example_de: Nach dem Sport hatte ich starke Schmerzen im Bein.
    example_en: After exercising I had a lot of pain in my leg.
    example_ru: После спорта у меня сильно болела нога.
    example_uk: Після спорту в мене сильно боліла нога.
    note:
      en: 'The singular der Schmerz is rare and rather literary. In practice you always use the plural: Ich habe Schmerzen, Schmerzen im Rücken. It is also the second half of the compounds Kopfschmerzen, Bauchschmerzen and Zahnschmerzen.'
      ru: 'Единственное число der Schmerz редкое и книжное. На практике всегда используют множественное: Ich habe Schmerzen, Schmerzen im Rücken. Это же слово — вторая часть сложных Kopfschmerzen, Bauchschmerzen, Zahnschmerzen.'
      uk: 'Однина der Schmerz рідкісна й книжна. На практиці завжди вживають множину: Ich habe Schmerzen, Schmerzen im Rücken. Це саме слово — друга частина складних Kopfschmerzen, Bauchschmerzen, Zahnschmerzen.'
  - de: husten
    ipa: "ˈhuːstn̩"
    pos: verb
    praesens_3sg: hustet
    partizip2: gehustet
    aux: haben
    en: to cough
    ru: кашлять
    uk: кашляти
    example_de: Das Kind hustet schon seit drei Tagen.
    example_en: The child has been coughing for three days.
    example_ru: Ребёнок кашляет уже три дня.
    example_uk: Дитина кашляє вже три дні.
    note:
      en: 'This card is the verb, written with a small letter: husten, er hustet, hat gehustet. The noun der Husten — a cough, the thing you have — is spelled exactly the same but with a capital H, and it is a separate word taught with the doctor vocabulary. Only the capital letter tells them apart: Ich huste. / Ich habe Husten.'
      ru: 'На этой карточке — глагол, со строчной буквы: husten, er hustet, hat gehustet. Существительное der Husten («кашель») пишется точно так же, но с заглавной H, и это отдельное слово из темы «у врача». Различает их только заглавная буква: Ich huste. / Ich habe Husten.'
      uk: 'На цій картці — дієслово, з малої літери: husten, er hustet, hat gehustet. Іменник der Husten («кашель») пишеться точно так само, але з великої H, і це окреме слово з теми «у лікаря». Розрізняє їх лише велика літера: Ich huste. / Ich habe Husten.'
  - de: verletzen
    ipa: "fɛɐ̯ˈlɛtsn̩"
    pos: verb
    praesens_3sg: verletzt
    partizip2: verletzt
    aux: haben
    valence: "+ Akk"
    en: to injure, to hurt (someone)
    ru: ранить, травмировать
    uk: ранити, травмувати
    example_de: Der Unfall hat zwei Menschen verletzt.
    example_en: The accident injured two people.
    example_ru: В аварии пострадали два человека.
    example_uk: В аварії постраждали двоє людей.
    note:
      en: 'Inseparable ver-, so the Partizip II takes no ge-: hat verletzt. In everyday speech the verb is usually reflexive — sich verletzen, with an accusative pronoun: Ich habe mich beim Sport verletzt. The adjective verletzt means injured: Er ist schwer verletzt.'
      ru: 'Неотделяемая приставка ver-, поэтому Partizip II без ge-: hat verletzt. В живой речи глагол чаще возвратный — sich verletzen, с местоимением в Akkusativ: Ich habe mich beim Sport verletzt. Прилагательное verletzt — «раненый»: Er ist schwer verletzt.'
      uk: 'Невідокремлюваний ver-, тому Partizip II без ge-: hat verletzt. У живому мовленні дієслово частіше зворотне — sich verletzen, із займенником в Akkusativ: Ich habe mich beim Sport verletzt. Прикметник verletzt — «поранений»: Er ist schwer verletzt.'
  - de: erkältet sein
    ipa: "ɛɐ̯ˈkɛltət zaɪ̯n"
    pos: phrase
    en: to have a cold
    ru: быть простуженным
    uk: бути застудженим
    example_de: Ich bin erkältet und bleibe heute zu Hause.
    example_en: I have a cold, so I am staying at home today.
    example_ru: Я простужен и сегодня останусь дома.
    example_uk: Я застуджений і сьогодні залишуся вдома.
    note:
      en: 'German describes a cold as a state you are in, not a thing you have: Ich bin erkältet — erkältet is an adjective, and the verb is sein. The alternative uses the noun: Ich habe eine Erkältung. Both are common; what does not exist is a mixture of the two.'
      ru: 'Немецкий описывает простуду как состояние, а не как то, что у тебя есть: Ich bin erkältet — erkältet это прилагательное, а глагол — sein, ровно как в русском «я простужен». Второй вариант — через существительное: Ich habe eine Erkältung. Оба употребительны; смешивать их нельзя.'
      uk: 'Німецька описує застуду як стан, а не як те, що ти маєш: Ich bin erkältet — erkältet це прикметник, а дієслово — sein, так само як в українському «я застуджений». Другий варіант — через іменник: Ich habe eine Erkältung. Обидва вживані; змішувати їх не можна.'
  - de: fit sein
    ipa: "ˈfɪt zaɪ̯n"
    pos: phrase
    en: to be fit, to be in good shape
    ru: быть в хорошей форме
    uk: бути в добрій формі
    example_de: Mein Opa ist mit achtzig noch sehr fit.
    example_en: My grandpa is still very fit at eighty.
    example_ru: Моему дедушке восемьдесят, и он всё ещё в отличной форме.
    example_uk: Моєму дідусеві вісімдесят, а він усе ще у чудовій формі.
    note:
      en: 'An English loan used as a plain German adjective with sein: Ich bin fit. It covers being healthy, rested and up to the task, not only sporty. To keep in shape is sich fit halten, and Sport macht fit.'
      ru: 'Английское заимствование, которое работает как обычное немецкое прилагательное с sein: Ich bin fit. Значит не только «спортивный», но и «здоровый, бодрый, в состоянии справиться». Поддерживать форму — sich fit halten; Sport macht fit.'
      uk: 'Англійське запозичення, що працює як звичайний німецький прикметник із sein: Ich bin fit. Означає не лише «спортивний», а й «здоровий, бадьорий, у стані впоратися». Підтримувати форму — sich fit halten; Sport macht fit.'
  - de: Dusche
    ipa: "ˈduːʃə"
    pos: noun
    gender: f
    plural: die Duschen
    en: shower
    ru: душ
    uk: душ
    example_de: Nach dem Sport gehe ich sofort unter die Dusche.
    example_en: After exercising I get straight into the shower.
    example_ru: После спорта я сразу иду в душ.
    example_uk: Після спорту я одразу йду в душ.
    note:
      en: 'Feminine: die Dusche. You go unter die Dusche (Wohin? — Akkusativ) and you stand unter der Dusche (Wo? — Dativ). The verb is duschen: Ich dusche jeden Morgen.'
      ru: 'Женского рода: die Dusche. Идут unter die Dusche (Wohin? — Akkusativ), а стоят unter der Dusche (Wo? — Dativ). Глагол — duschen: Ich dusche jeden Morgen.'
      uk: 'Жіночого роду: die Dusche. Ідуть unter die Dusche (Wohin? — Akkusativ), а стоять unter der Dusche (Wo? — Dativ). Дієслово — duschen: Ich dusche jeden Morgen.'
  - de: Seife
    ipa: "ˈzaɪ̯fə"
    pos: noun
    gender: f
    plural: die Seifen
    en: soap
    ru: мыло
    uk: мило
    example_de: Wasch dir die Hände mit Seife!
    example_en: Wash your hands with soap!
    example_ru: Помой руки с мылом!
    example_uk: Помий руки з милом!
    note:
      en: 'Feminine, and normally used without an article as a mass noun: Hände mit Seife waschen. The initial s before a vowel is voiced — ˈzaɪ̯fə, like the s in Sonne.'
      ru: 'Женского рода, обычно употребляется без артикля как вещественное существительное: Hände mit Seife waschen. Начальная s перед гласной звонкая — ˈzaɪ̯fə, как в Sonne.'
      uk: 'Жіночого роду, зазвичай уживається без артикля як речовинний іменник: Hände mit Seife waschen. Початкова s перед голосною дзвінка — ˈzaɪ̯fə, як у Sonne.'
  - de: Kosmetik
    ipa: "kɔsˈmeːtɪk"
    pos: noun
    gender: f
    plural: "—"
    en: cosmetics, beauty products
    ru: косметика
    uk: косметика
    example_de: Sie kauft ihre Kosmetik immer in der Drogerie.
    example_en: She always buys her cosmetics at the drugstore.
    example_ru: Косметику она всегда покупает в дрогерии.
    example_uk: Косметику вона завжди купує в дрогерії.
    note:
      en: 'A mass noun with no plural — die Kosmetik covers the whole category, so German says Kosmetik kaufen where English says to buy cosmetics. The shop for it is die Drogerie. The stress is on the middle syllable: kɔsˈmeːtɪk.'
      ru: 'Вещественное существительное без множественного числа — die Kosmetik обозначает всю категорию сразу: Kosmetik kaufen. Магазин для неё — die Drogerie. Ударение на среднем слоге: kɔsˈmeːtɪk.'
      uk: 'Речовинний іменник без множини — die Kosmetik позначає всю категорію одразу: Kosmetik kaufen. Магазин для неї — die Drogerie. Наголос на середньому складі: kɔsˈmeːtɪk.'
  - de: Creme
    ipa: "ˈkʁeːm"
    pos: noun
    gender: f
    plural: die Cremes
    en: cream (for the skin)
    ru: крем
    uk: крем
    example_de: Im Winter brauche ich eine gute Creme für die Hände.
    example_en: In winter I need a good cream for my hands.
    example_ru: Зимой мне нужен хороший крем для рук.
    example_uk: Узимку мені потрібен добрий крем для рук.
    note:
      en: 'A French loan, and it is spoken the French way: ˈkʁeːm, a single syllable — the final -e is silent, so it does not sound like Creme-e. Feminine: die Creme, die Cremes. The verb is eincremen: Ich creme mir die Hände ein.'
      ru: 'Французское заимствование и произносится по-французски: ˈkʁeːm, один слог — конечное -e не читается. Женского рода: die Creme, die Cremes. Глагол — eincremen: Ich creme mir die Hände ein.'
      uk: 'Французьке запозичення й вимовляється по-французьки: ˈkʁeːm, один склад — кінцеве -e не читається. Жіночого роду: die Creme, die Cremes. Дієслово — eincremen: Ich creme mir die Hände ein.'
  - de: Handtuch
    ipa: "ˈhantˌtuːx"
    pos: noun
    gender: n
    plural: die Handtücher
    en: towel
    ru: полотенце
    uk: рушник
    example_de: Nimm bitte ein sauberes Handtuch aus dem Schrank.
    example_en: Please take a clean towel out of the cupboard.
    example_ru: Возьми, пожалуйста, чистое полотенце из шкафа.
    example_uk: Візьми, будь ласка, чистий рушник із шафи.
    note:
      en: 'A compound of die Hand + das Tuch, and a compound always takes the gender of its last part — hence das Handtuch. The stress sits on the first stem: ˈhantˌtuːx. The plural adds an umlaut: die Handtücher.'
      ru: 'Сложное слово из die Hand + das Tuch, а род сложного слова всегда даёт последняя часть — отсюда das Handtuch. Ударение на первой основе: ˈhantˌtuːx. Во множественном числе появляется умлаут: die Handtücher.'
      uk: 'Складне слово з die Hand + das Tuch, а рід складного слова завжди дає остання частина — звідси das Handtuch. Наголос на першій основі: ˈhantˌtuːx. У множині з’являється умлаут: die Handtücher.'
  - de: wach
    ipa: "ˈvax"
    pos: adj
    en: awake
    ru: бодрствующий, не спящий
    uk: той, що не спить
    example_de: Ich bin schon seit sechs Uhr wach.
    example_en: I have been awake since six o'clock.
    example_ru: Я не сплю уже с шести утра.
    example_uk: Я не сплю вже з шостої ранку.
    note:
      en: 'wach is the state of being awake and goes with sein: Ich bin wach. Three related words, three different jobs: aufwachen is to wake up by yourself, wecken is to wake somebody else, and der Wecker is the alarm clock that does it for you.'
      ru: 'wach — состояние, поэтому идёт с sein: Ich bin wach. Три родственных слова с разными ролями: aufwachen — «просыпаться» самому, wecken — «будить» кого-то, der Wecker — будильник, который делает это за вас.'
      uk: 'wach — стан, тому йде із sein: Ich bin wach. Три споріднені слова з різними ролями: aufwachen — «прокидатися» самому, wecken — «будити» когось, der Wecker — будильник, який робить це за вас.'
  - de: Parfüm
    ipa: "paʁˈfyːm"
    pos: noun
    gender: n
    plural: die Parfüms
    en: perfume
    ru: духи
    uk: парфуми
    example_de: Zum Geburtstag schenke ich meiner Mutter ein Parfüm.
    example_en: I am giving my mother a perfume for her birthday.
    example_ru: На день рождения я подарю маме духи.
    example_uk: На день народження я подарую мамі парфуми.
    note:
      en: 'A French loan with the stress at the end: paʁˈfyːm. Neuter — das Parfüm, die Parfüms. Unlike in many languages, the German word is singular: ein Parfüm, dieses Parfüm.'
      ru: 'Французское заимствование с ударением на последнем слоге: paʁˈfyːm. Среднего рода — das Parfüm, die Parfüms. В отличие от русского «духи», немецкое слово в единственном числе: ein Parfüm, dieses Parfüm.'
      uk: 'Французьке запозичення з наголосом на останньому складі: paʁˈfyːm. Середнього роду — das Parfüm, die Parfüms. На відміну від українського «парфуми», німецьке слово в однині: ein Parfüm, dieses Parfüm.'
