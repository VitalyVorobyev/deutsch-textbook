  - { de: "sauber", ipa: "ˈzaʊ̯bɐ", pos: adj, en: "clean", ru: "чистый", uk: "чистий", example_de: "Die Küche ist sauber.", example_en: "The kitchen is clean.", example_ru: "Кухня чистая.", example_uk: "Кухня чиста." }
