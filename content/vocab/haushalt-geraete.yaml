  - { de: "spülen", ipa: "ˈʃpyːlən", pos: verb, en: "to wash (dishes); to rinse", ru: "мыть (посуду)", uk: "мити (посуд)", example_de: "Ich spüle das Geschirr.", example_en: "I wash the dishes.", example_ru: "Я мою посуду.", example_uk: "Я мию посуд.", partizip2: "gespült", aux: haben, praesens_3sg: "spült", valence: "+ Akk" }
  - { de: "Topf", ipa: "ˈtɔpf", pos: noun, gender: m, plural: "die Töpfe", en: "pot; saucepan", ru: "кастрюля", uk: "каструля", example_de: "Der Topf steht auf dem Herd.", example_en: "The pot is on the stove.", example_ru: "Кастрюля стоит на плите.", example_uk: "Каструля стоїть на плиті." }
  - { de: "Pfanne", ipa: "ˈpfanə", pos: noun, gender: f, plural: "die Pfannen", en: "pan; frying pan", ru: "сковорода", uk: "сковорода; пательня", example_de: "Die Pfanne ist neu.", example_en: "The pan is new.", example_ru: "Сковорода новая.", example_uk: "Пательня нова." }
  - { de: "Licht", ipa: "ˈlɪçt", pos: noun, gender: n, plural: "die Lichter", en: "light", ru: "свет", uk: "світло", example_de: "Das Licht ist an.", example_en: "The light is on.", example_ru: "Свет включён.", example_uk: "Світло ввімкнене." }
  - { de: "Strom", ipa: "ˈʃtʁoːm", pos: noun, gender: m, plural: "—", en: "electricity; power", ru: "электричество; ток", uk: "електрика; струм", example_de: "Der Strom ist teuer.", example_en: "Electricity is expensive.", example_ru: "Электричество дорогое.", example_uk: "Електрика дорога." }
  - { de: "Heizung", ipa: "ˈhaɪ̯tsʊŋ", pos: noun, gender: f, plural: "die Heizungen", en: "heating; radiator", ru: "отопление", uk: "опалення", example_de: "Die Heizung ist kaputt.", example_en: "The heating is broken.", example_ru: "Отопление сломано.", example_uk: "Опалення зламане." }
  - { de: "kaputt", ipa: "kaˈpʊt", pos: adj, en: "broken; out of order", ru: "сломанный; неисправный", uk: "зламаний; несправний", example_de: "Die Lampe ist kaputt.", example_en: "The lamp is broken.", example_ru: "Лампа сломана.", example_uk: "Лампа зламана." }
  - { de: "reparieren", ipa: "ʁepaˈʁiːʁən", pos: verb, en: "to repair; to fix", ru: "чинить, ремонтировать", uk: "лагодити, ремонтувати", example_de: "Er repariert den Kühlschrank.", example_en: "He repairs the fridge.", example_ru: "Он чинит холодильник.", example_uk: "Він лагодить холодильник.", partizip2: "repariert", aux: haben, praesens_3sg: "repariert", valence: "+ Akk" }
  - { de: "funktionieren", ipa: "fʊŋktsjoˈniːʁən", pos: verb, en: "to work; to function", ru: "работать, функционировать", uk: "працювати, функціонувати", example_de: "Der Herd funktioniert nicht.", example_en: "The stove doesn't work.", example_ru: "Плита не работает.", example_uk: "Плита не працює.", partizip2: "funktioniert", aux: haben, praesens_3sg: "funktioniert" }
  - { de: "Schlüssel", ipa: "ˈʃlʏsl̩", pos: noun, gender: m, plural: "die Schlüssel", en: "key", ru: "ключ", uk: "ключ", example_de: "Ich habe den Schlüssel für die Wohnung.", example_en: "I have the key to the apartment.", example_ru: "У меня есть ключ от квартиры.", example_uk: "У мене є ключ від квартири." }
  - { de: "Werkzeug", ipa: "ˈvɛʁkˌtsɔʏ̯k", pos: noun, gender: n, plural: "die Werkzeuge", en: "tools; equipment", ru: "инструменты", uk: "інструменти", example_de: "Ich brauche Werkzeug.", example_en: "I need tools.", example_ru: "Мне нужны инструменты.", example_uk: "Мені потрібні інструменти." }
  - { de: "mieten", ipa: "ˈmiːtn̩", pos: verb, en: "to rent (from someone)", ru: "снимать, арендовать (жильё)", uk: "наймати, орендувати (житло)", example_de: "Wir mieten eine Wohnung.", example_en: "We rent an apartment.", example_ru: "Мы снимаем квартиру.", example_uk: "Ми наймаємо квартиру.", partizip2: "gemietet", aux: haben, praesens_3sg: "mietet", valence: "+ Akk", note: { en: "mieten = you pay to live somewhere, as the tenant: Wir mieten eine Wohnung. Don't confuse it with vermieten (the owner renting it out to you).", ru: "mieten — вы платите и живёте там сами, как арендатор: Wir mieten eine Wohnung. Не путать с vermieten (хозяин сдаёт жильё вам).", uk: "mieten — ви платите й самі там живете, як орендар: Wir mieten eine Wohnung. Не плутайте з vermieten (власник здає житло вам)." } }
  - { de: "vermieten", ipa: "fɛɐ̯ˈmiːtn̩", pos: verb, en: "to rent out; to let", ru: "сдавать в аренду", uk: "здавати в оренду", example_de: "Er vermietet die Wohnung.", example_en: "He rents out the apartment.", example_ru: "Он сдаёт квартиру в аренду.", example_uk: "Він здає квартиру в оренду.", partizip2: "vermietet", aux: haben, praesens_3sg: "vermietet", valence: "+ Akk", note: { en: "vermieten = the owner's action of renting the place out to someone — the reverse of mieten (the tenant's action): Der Vermieter vermietet die Wohnung an uns.", ru: "vermieten — действие хозяина, который сдаёт жильё кому-то, обратное к mieten (действию арендатора): Der Vermieter vermietet die Wohnung an uns.", uk: "vermieten — дія власника, який здає житло комусь, протилежна до mieten (дії орендаря): Der Vermieter vermietet die Wohnung an uns." } }
