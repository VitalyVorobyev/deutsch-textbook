# Goethe-A2 Wortliste completion deck — owned by no topic.
# It drains the local and directional adverbs still missing from the
# `funktionswoerter-chunks` section of data/goethe-a2-wortliste.txt
# (hinten, vorn, drinnen, draußen, drüben, daneben, nebenan, überall,
# nirgends, raus, rein, vorbei, vorwärts, zurück, weiter, weg).
# Like the other completion decks it is deliberately unlisted in any topic's
# `vocab:` — its fresh cards are gated on the learner's level, not on a lesson
# having been opened.
id: richtung-position-a2
title_de: "Richtung & Position"
title_en: "Direction & position"
title_ru: "Направление и положение"
level: A2
entries:
  - de: hinten
    ipa: "ˈhɪntn̩"
    pos: adv
    en: at the back, behind
    ru: сзади, позади
    example_de: Im Bus sind hinten noch zwei Plätze frei.
    example_en: There are still two free seats at the back of the bus.
    example_ru: В автобусе сзади ещё есть два свободных места.
    note:
      en: 'hinten answers Wo? — the position at the back. The movement needs nach hinten: Geh bitte nach hinten.'
      ru: 'hinten отвечает на вопрос Wo? — это положение, а не направление. Для движения нужно nach hinten: Geh bitte nach hinten («пройдите, пожалуйста, назад»).'
  - de: vorn
    ipa: "ˈfɔʁn"
    pos: adv
    en: at the front, in front
    ru: впереди, спереди
    example_de: Der Lehrer steht vorn an der Tafel.
    example_en: The teacher is standing at the front by the board.
    example_ru: Учитель стоит впереди у доски.
    note:
      en: 'Position, not direction: Er sitzt vorn (Wo?), but Komm nach vorn! (Wohin?). The variant vorne is just as common.'
      ru: 'Это положение, а не направление: Er sitzt vorn (Wo?), но Komm nach vorn! (Wohin?). Вариант vorne употребляется так же часто.'
  - de: drinnen
    ipa: "ˈdʁɪnən"
    pos: adv
    en: inside, indoors
    ru: внутри, в помещении
    example_de: Es regnet, deshalb bleiben wir drinnen.
    example_en: It's raining, so we're staying indoors.
    example_ru: Идёт дождь, поэтому мы остаёмся в помещении.
    note:
      en: 'drinnen and draußen say where you are. For going in or out you need rein and raus: Wir sind drinnen. — Komm rein!'
      ru: 'drinnen и draußen говорят, где вы находитесь. Для движения внутрь или наружу нужны rein и raus: Wir sind drinnen. — Komm rein!'
  - de: draußen
    ipa: "ˈdʁaʊ̯sn̩"
    pos: adv
    en: outside, outdoors
    ru: снаружи, на улице
    example_de: Draußen ist es heute sehr kalt.
    example_en: It's very cold outside today.
    example_ru: Сегодня на улице очень холодно.
  - de: drüben
    ipa: "ˈdʁyːbn̩"
    pos: adv
    en: over there, on the other side
    ru: на той стороне, вон там
    example_de: Die Apotheke ist da drüben, neben der Bank.
    example_en: The pharmacy is over there, next to the bank.
    example_ru: Аптека вон там, рядом с банком.
    note:
      en: 'Usually da drüben: the other side of the street, the room or the counter. Plain dort is neutral about sides.'
      ru: 'Обычно говорят da drüben — «по ту сторону» улицы, комнаты, стойки. Простое dort такого оттенка не имеет.'
  - de: daneben
    ipa: "daˈneːbn̩"
    pos: adv
    en: next to it, beside it
    ru: рядом (с этим), возле этого
    example_de: Das ist das Rathaus, und daneben steht die Kirche.
    example_en: That's the town hall, and the church stands right beside it.
    example_ru: Это ратуша, а рядом с ней стоит церковь.
    note:
      en: 'daneben points back to a thing just mentioned ("next to it"). nebenan means "next door" — the neighbouring room or house.'
      ru: 'daneben указывает на только что названный предмет («рядом с ним»). nebenan значит «по соседству» — соседняя комната или соседний дом.'
  - de: nebenan
    ipa: "neːbn̩ˈʔan"
    pos: adv
    en: next door
    ru: по соседству, в соседнем помещении
    example_de: Meine Kollegin arbeitet im Büro nebenan.
    example_en: My colleague works in the office next door.
    example_ru: Моя коллега работает в соседнем кабинете.
    note:
      en: 'Stress on the last syllable: nebenAN. Compare daneben (next to that thing) with nebenan (in the room or house next door).'
      ru: 'Ударение на последнем слоге: nebenAN. Сравните: daneben — «рядом с этим предметом», nebenan — «в соседней комнате или в соседнем доме».'
  - de: überall
    ipa: "yːbɐˈʔal"
    pos: adv
    en: everywhere
    ru: везде, повсюду
    example_de: In dieser Stadt gibt es überall kleine Cafés.
    example_en: In this city there are little cafés everywhere.
    example_ru: В этом городе повсюду маленькие кафе.
  - de: nirgends
    ipa: "ˈnɪʁgn̩ts"
    pos: adv
    en: nowhere, not anywhere
    ru: нигде
    example_de: Ich finde meine Brille nirgends.
    example_en: I can't find my glasses anywhere.
    example_ru: Я нигде не могу найти свои очки.
    note:
      en: 'nirgends is already the negation — one negative word is enough: Ich finde sie nirgends. Never add nicht (❌ Ich finde sie nicht nirgends).'
      ru: 'nirgends уже содержит отрицание, и второго не нужно: Ich finde sie nirgends. Русское двойное «нигде не» на немецкий не переносится: ❌ Ich finde sie nicht nirgends.'
  - de: raus
    ipa: "ˈʁaʊ̯s"
    pos: adv
    en: out, outwards
    ru: наружу, на улицу
    example_de: Es ist warm, gehen wir raus!
    example_en: It's warm, let's go outside!
    example_ru: Тепло, пойдём на улицу!
    note:
      en: 'raus is the everyday spoken short form of heraus/hinaus (Geh raus!). The long forms sound formal or written.'
      ru: 'raus — обиходная разговорная краткая форма от heraus/hinaus (Geh raus!). Полные формы звучат официально или книжно.'
  - de: rein
    ipa: "ˈʁaɪ̯n"
    pos: adv
    en: in, inwards
    ru: внутрь, сюда (внутрь)
    example_de: Komm rein, die Tür ist offen!
    example_en: Come in, the door is open!
    example_ru: Заходи, дверь открыта!
    note:
      en: 'rein is the everyday spoken short form of herein/hinein (Komm rein!). At the door nobody says "Komm herein!" — that belongs to formal or written German.'
      ru: 'rein — обиходная разговорная краткая форма от herein/hinein (Komm rein!). В дверях никто не скажет «Komm herein!» — это официальный или книжный вариант.'
  - de: vorbei
    ipa: "foːɐ̯ˈbaɪ̯"
    pos: adv
    en: over, finished; past (something)
    ru: мимо; кончено, позади
    example_de: Der Sommer ist leider schon vorbei.
    example_en: Sadly, the summer is already over.
    example_ru: Лето, к сожалению, уже кончилось.
    note:
      en: 'Two everyday uses: something is finished (Die Pause ist vorbei) and moving past something, with an + Dativ (Gehen Sie an der Post vorbei).'
      ru: 'Два обиходных значения: что-то закончилось (Die Pause ist vorbei) и движение мимо чего-либо — an + Dativ (Gehen Sie an der Post vorbei).'
  - de: vorwärts
    ipa: "ˈfoːɐ̯vɛʁts"
    pos: adv
    en: forwards, ahead
    ru: вперёд
    example_de: Der Bus fährt ganz langsam vorwärts.
    example_en: The bus is moving forwards very slowly.
    example_ru: Автобус очень медленно едет вперёд.
    note:
      en: 'The opposite is rückwärts (backwards): Fahren Sie bitte rückwärts.'
      ru: 'Противоположность — rückwärts («назад, задним ходом»): Fahren Sie bitte rückwärts.'
  - de: zurück
    ipa: "tsuˈʁʏk"
    pos: adv
    en: back
    ru: обратно, назад
    example_de: Ich bin um sechs Uhr zurück.
    example_en: I'll be back at six o'clock.
    example_ru: Я вернусь в шесть часов.
    note:
      en: 'zurück also builds verbs: zurückkommen, zurückfahren, zurückgeben. They are separable — Ich gebe das Buch morgen zurück.'
      ru: 'От zurück образуются глаголы: zurückkommen, zurückfahren, zurückgeben. Они отделяемые: Ich gebe das Buch morgen zurück.'
  - de: weiter
    ipa: "ˈvaɪ̯tɐ"
    pos: adv
    en: further, on (keep going)
    ru: дальше, далее
    example_de: Gehen Sie geradeaus weiter, dann links.
    example_en: Keep going straight ahead, then turn left.
    example_ru: Идите дальше прямо, потом налево.
    note:
      en: 'weiter means "carry on doing it": Geh weiter! It also builds separable verbs — weitergehen, weiterfahren, weiterarbeiten.'
      ru: 'weiter означает «продолжай(те)»: Geh weiter! От него образуются отделяемые глаголы — weitergehen, weiterfahren, weiterarbeiten.'
  - de: weg
    ipa: "ˈvɛk"
    pos: adv
    en: away, gone
    ru: прочь; пропал, нет на месте
    example_de: Mein Schlüssel ist weg.
    example_en: My key is gone.
    example_ru: Мой ключ пропал.
    note:
      en: 'Two different words that only look alike. The adverb weg has a SHORT vowel and means "away, gone": Mein Handy ist weg. Geh weg! The noun der Weg has a LONG vowel and means "the path, the way": Der Weg zum Bahnhof ist kurz. Only the noun is capitalized.'
      ru: 'Это два разных слова, которые лишь похожи внешне. Наречие weg произносится с КРАТКИМ гласным и значит «прочь, пропал»: Mein Handy ist weg. Geh weg! Существительное der Weg произносится с ДОЛГИМ гласным и значит «путь, дорога»: Der Weg zum Bahnhof ist kurz. С большой буквы пишется только существительное.'
