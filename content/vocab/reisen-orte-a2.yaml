# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the travel/place words
# of reisen-verkehr-orte plus the Himmelsrichtungen section.
id: reisen-orte-a2
title_de: "Reisen & Orte"
title_en: "Travel & places"
title_ru: "Путешествия и места"
title_uk: "Подорожі та місця"
level: A2
entries:
  - de: Norden
    ipa: "ˈnɔʁdn̩"
    pos: noun
    gender: m
    plural: "—"
    en: north
    ru: север
    uk: північ
    example_de: Hamburg liegt im Norden von Deutschland.
    example_en: Hamburg is in the north of Germany.
    example_ru: Гамбург находится на севере Германии.
    example_uk: Гамбург розташований на півночі Німеччини.
    note:
      en: 'All four compass points are masculine: der Norden, der Süden, der Osten, der Westen. Two prepositions do the work: im Norden says where something is (Wo?), nach Norden says which way you go (Wohin?) — Wir fahren nach Norden.'
      ru: 'Все четыре стороны света — мужского рода: der Norden, der Süden, der Osten, der Westen. Работают два предлога: im Norden — где (Wo?), nach Norden — куда (Wohin?): Wir fahren nach Norden.'
      uk: 'Усі чотири сторони світу — чоловічого роду: der Norden, der Süden, der Osten, der Westen. Працюють два прийменники: im Norden — де (Wo?), nach Norden — куди (Wohin?): Wir fahren nach Norden.'
  - de: Süden
    ipa: "ˈzyːdn̩"
    pos: noun
    gender: m
    plural: "—"
    en: south
    ru: юг
    uk: південь
    example_de: Im Süden ist es im Sommer sehr warm.
    example_en: In the south it gets very warm in summer.
    example_ru: На юге летом очень тепло.
    example_uk: На півдні влітку дуже тепло.
    note:
      en: 'Masculine like the other three directions. Position takes im + Dat (im Süden), direction takes nach (nach Süden fahren). The adjective is südlich.'
      ru: 'Мужского рода, как и остальные три направления. Место — im + Dat (im Süden), направление — nach (nach Süden fahren). Прилагательное — südlich.'
      uk: 'Чоловічого роду, як і решта три напрямки. Місце — im + Dat (im Süden), напрямок — nach (nach Süden fahren). Прикметник — südlich.'
  - de: Osten
    ipa: "ˈɔstn̩"
    pos: noun
    gender: m
    plural: "—"
    en: east
    ru: восток
    uk: схід
    example_de: Dresden liegt im Osten von Deutschland.
    example_en: Dresden is in the east of Germany.
    example_ru: Дрезден находится на востоке Германии.
    example_uk: Дрезден розташований на сході Німеччини.
    note:
      en: 'der Osten — masculine, and used almost only in the singular. The sun comes up here: Die Sonne geht im Osten auf.'
      ru: 'der Osten — мужского рода, употребляется почти только в единственном числе. Здесь встаёт солнце: Die Sonne geht im Osten auf.'
      uk: 'der Osten — чоловічого роду, вживається майже тільки в однині. Тут сходить сонце: Die Sonne geht im Osten auf.'
  - de: Westen
    ipa: "ˈvɛstn̩"
    pos: noun
    gender: m
    plural: "—"
    en: west
    ru: запад
    uk: захід
    example_de: Der Wind kommt heute aus dem Westen.
    example_en: The wind is coming from the west today.
    example_ru: Ветер сегодня дует с запада.
    example_uk: Вітер сьогодні дме із заходу.
    note:
      en: 'Three prepositions, three questions: im Westen (Wo?), nach Westen (Wohin?), aus dem Westen (Woher?). All of them take der Westen, masculine.'
      ru: 'Три предлога — три вопроса: im Westen (Wo?), nach Westen (Wohin?), aus dem Westen (Woher?). Везде der Westen, мужской род.'
      uk: 'Три прийменники — три питання: im Westen (Wo?), nach Westen (Wohin?), aus dem Westen (Woher?). Скрізь der Westen, чоловічий рід.'
  - de: Doppelzimmer
    ipa: "ˈdɔpl̩ˌtsɪmɐ"
    pos: noun
    gender: n
    plural: die Doppelzimmer
    en: double room
    ru: двухместный номер
    uk: двомісний номер
    example_de: Wir möchten ein Doppelzimmer für drei Nächte.
    example_en: We would like a double room for three nights.
    example_ru: Мы хотели бы двухместный номер на три ночи.
    example_uk: Ми хотіли б двомісний номер на три ночі.
    note:
      en: 'A compound of Doppel- + das Zimmer, so it is neuter and the plural does not change: das Doppelzimmer, die Doppelzimmer. For one person it is das Einzelzimmer.'
      ru: 'Сложное слово Doppel- + das Zimmer, поэтому средний род, множественное не меняется: das Doppelzimmer, die Doppelzimmer. Одноместный — das Einzelzimmer.'
      uk: 'Складне слово Doppel- + das Zimmer, тому середній рід, множина не змінюється: das Doppelzimmer, die Doppelzimmer. Одномісний — das Einzelzimmer.'
  - de: Jugendherberge
    ipa: "ˈjuːgn̩tˌhɛʁbɛʁgə"
    pos: noun
    gender: f
    plural: die Jugendherbergen
    en: youth hostel
    ru: молодёжная турбаза, хостел
    uk: молодіжна турбаза, хостел
    example_de: In der Jugendherberge ist eine Nacht viel billiger als im Hotel.
    example_en: A night at the youth hostel is much cheaper than at a hotel.
    example_ru: Ночь в хостеле намного дешевле, чем в гостинице.
    example_uk: Ніч у хостелі набагато дешевша, ніж у готелі.
    note:
      en: 'Compound of Jugend + Herberge, so feminine like die Herberge. You stay there with in + Dat: Wir schlafen in der Jugendherberge.'
      ru: 'Сложное слово Jugend + Herberge, поэтому женского рода, как die Herberge. Останавливаются там — in + Dat: Wir schlafen in der Jugendherberge.'
      uk: 'Складне слово Jugend + Herberge, тому жіночого роду, як die Herberge. Зупиняються там — in + Dat: Wir schlafen in der Jugendherberge.'
  - de: Schloss
    ipa: "ˈʃlɔs"
    pos: noun
    gender: n
    plural: die Schlösser
    en: castle, palace; lock
    ru: замок (дворец); замок (на двери)
    uk: замок (палац); замок (на дверях)
    example_de: Am Sonntag besichtigen wir ein altes Schloss.
    example_en: On Sunday we are visiting an old castle.
    example_ru: В воскресенье мы осмотрим старый замок.
    example_uk: У неділю ми оглянемо старий замок.
    note:
      en: 'One word, two everyday meanings: a palace you visit, and the lock on a door or a suitcase. Neuter, with an umlaut plural: das Schloss, die Schlösser. The eye tells them apart from context alone — Das Schloss ist kaputt is about the lock, Das Schloss ist alt about the building.'
      ru: 'Одно слово, два обиходных значения: дворец, который осматривают, и замок на двери или чемодане — как и в русском. Среднего рода, во множественном умлаут: das Schloss, die Schlösser. Различает только контекст: Das Schloss ist kaputt — про замок на двери, Das Schloss ist alt — про здание.'
      uk: 'Одне слово, два звичні значення: палац, який оглядають, і замок на дверях чи валізі — так само, як в українській. Середнього роду, у множині умлаут: das Schloss, die Schlösser. Розрізняє лише контекст: Das Schloss ist kaputt — про замок на дверях, Das Schloss ist alt — про будівлю.'
  - de: Dorf
    ipa: "ˈdɔʁf"
    pos: noun
    gender: n
    plural: die Dörfer
    en: village
    ru: деревня, село
    uk: село
    example_de: Meine Großeltern wohnen in einem kleinen Dorf.
    example_en: My grandparents live in a small village.
    example_ru: Мои бабушка с дедушкой живут в маленькой деревне.
    example_uk: Мої бабуся з дідусем живуть у маленькому селі.
    note:
      en: 'Neuter, with an umlaut plural: das Dorf, die Dörfer. Auf dem Dorf leben means to live in the countryside — the preposition is auf, not in.'
      ru: 'Среднего рода, во множественном умлаут: das Dorf, die Dörfer. «Жить в деревне» в общем смысле — auf dem Dorf leben, с предлогом auf, а не in.'
      uk: 'Середнього роду, у множині умлаут: das Dorf, die Dörfer. «Жити на селі» в загальному значенні — auf dem Dorf leben, з прийменником auf, а не in.'
  - de: Hauptstadt
    ipa: "ˈhaʊ̯ptˌʃtat"
    pos: noun
    gender: f
    plural: die Hauptstädte
    en: capital (city)
    ru: столица
    uk: столиця
    example_de: Berlin ist die Hauptstadt von Deutschland.
    example_en: Berlin is the capital of Germany.
    example_ru: Берлин — столица Германии.
    example_uk: Берлін — столиця Німеччини.
    note:
      en: 'Compound of Haupt- (main) + die Stadt, so feminine, and the plural takes the umlaut of Stadt: die Hauptstädte. At A2, say the capital of a country with von + Dat: die Hauptstadt von Österreich.'
      ru: 'Сложное слово Haupt- (главный) + die Stadt, отсюда женский род, а множественное — с умлаутом, как у Stadt: die Hauptstädte. На уровне A2 «столица чего-то» — через von + Dat: die Hauptstadt von Österreich.'
      uk: 'Складне слово Haupt- (головний) + die Stadt, звідси жіночий рід, а множина — з умлаутом, як у Stadt: die Hauptstädte. На рівні A2 «столиця чогось» — через von + Dat: die Hauptstadt von Österreich.'
  - de: Ort
    ipa: "ˈɔʁt"
    pos: noun
    gender: m
    plural: die Orte
    en: place; small town
    ru: место; населённый пункт
    uk: місце; населений пункт
    example_de: Wir suchen einen ruhigen Ort für den Urlaub.
    example_en: We are looking for a quiet place for our holiday.
    example_ru: Мы ищем тихое место для отпуска.
    example_uk: Ми шукаємо тихе місце для відпустки.
    note:
      en: 'A place on the map — a spot, or a small town. On forms you will meet Ort as the field for your town: Ort und Datum. Masculine: der Ort, die Orte.'
      ru: 'Место на карте — точка или небольшой населённый пункт. В бланках Ort — графа «город»: Ort und Datum. Мужского рода: der Ort, die Orte.'
      uk: 'Місце на карті — точка чи невеликий населений пункт. У бланках Ort — графа «місто»: Ort und Datum. Чоловічого роду: der Ort, die Orte.'
  - de: Reisebüro
    ipa: "ˈʁaɪ̯zəbyˌʁoː"
    pos: noun
    gender: n
    plural: die Reisebüros
    en: travel agency
    ru: туристическое агентство
    uk: туристичне агентство
    example_de: Im Reisebüro haben wir eine Reise nach Spanien gebucht.
    example_en: We booked a trip to Spain at the travel agency.
    example_ru: В турагентстве мы забронировали поездку в Испанию.
    example_uk: У турагентстві ми забронювали поїздку до Іспанії.
    note:
      en: 'Compound of Reise + das Büro, so neuter: das Reisebüro. Like all -büro words it takes an -s plural: die Reisebüros.'
      ru: 'Сложное слово Reise + das Büro, поэтому средний род: das Reisebüro. Как и все слова на -büro, множественное на -s: die Reisebüros.'
      uk: 'Складне слово Reise + das Büro, тому середній рід: das Reisebüro. Як і всі слова на -büro, множина на -s: die Reisebüros.'
  - de: Reiseführer
    ipa: "ˈʁaɪ̯zəˌfyːʁɐ"
    pos: noun
    gender: m
    plural: die Reiseführer
    en: guidebook; tour guide (person)
    ru: путеводитель; экскурсовод, гид
    uk: путівник; екскурсовод, гід
    example_de: Der Reiseführer hat uns viel über die Stadt erzählt.
    example_en: The guide told us a lot about the city.
    example_ru: Гид много рассказал нам о городе.
    example_uk: Гід багато розповів нам про місто.
    note:
      en: 'One word for two things: the book you buy and read, and the person who shows you around. Both are masculine and the plural never changes: der Reiseführer, die Reiseführer. Only the sentence tells you which — Ich lese den Reiseführer is the book, Der Reiseführer spricht Englisch is the person. A woman doing the job is die Reiseführerin.'
      ru: 'Одно слово для двух вещей: книга-путеводитель и человек-гид. Оба мужского рода, множественное не меняется: der Reiseführer, die Reiseführer. Различает только предложение: Ich lese den Reiseführer — книга, Der Reiseführer spricht Englisch — человек. Женщина на этой работе — die Reiseführerin.'
      uk: 'Одне слово для двох речей: книжка-путівник і людина-гід. Обидва чоловічого роду, множина не змінюється: der Reiseführer, die Reiseführer. Розрізняє лише речення: Ich lese den Reiseführer — книжка, Der Reiseführer spricht Englisch — людина. Жінка на цій роботі — die Reiseführerin.'
  - de: Rucksack
    ipa: "ˈʁʊkˌzak"
    pos: noun
    gender: m
    plural: die Rucksäcke
    en: backpack, rucksack
    ru: рюкзак
    uk: рюкзак
    example_de: Nimm einen Rucksack mit, die Tasche ist zu klein.
    example_en: Take a backpack with you, the bag is too small.
    example_ru: Возьми с собой рюкзак, сумка слишком маленькая.
    example_uk: Візьми з собою рюкзак, сумка занадто мала.
    note:
      en: 'Compound of Rücken (back) + der Sack, so masculine, with an umlaut plural: die Rucksäcke. Note the spelling — Ruck-, without the umlaut of Rücken.'
      ru: 'Сложное слово Rücken (спина) + der Sack, отсюда мужской род, во множественном умлаут: die Rucksäcke. Обратите внимание на написание: Ruck-, без умлаута, хотя корень — Rücken.'
      uk: 'Складне слово Rücken (спина) + der Sack, звідси чоловічий рід, у множині умлаут: die Rucksäcke. Зверніть увагу на написання: Ruck-, без умлаута, хоча корінь — Rücken.'
  - de: Rundgang
    ipa: "ˈʁʊntˌgaŋ"
    pos: noun
    gender: m
    plural: die Rundgänge
    en: walk around, tour on foot
    ru: обход, прогулка по кругу
    uk: обхід, прогулянка по колу
    example_de: Nach dem Frühstück machen wir einen Rundgang durch die Altstadt.
    example_en: After breakfast we are taking a walk around the old town.
    example_ru: После завтрака мы пройдёмся по старому городу.
    example_uk: Після сніданку ми пройдемося старим містом.
    note:
      en: 'The walk itself — a route through a town or a building, with or without a guide. Compare die Führung, which is the guided tour as an event you can book. Masculine with an umlaut plural: der Rundgang, die Rundgänge.'
      ru: 'Сама прогулка — маршрут по городу или зданию, с гидом или без. Ср. die Führung — экскурсия как мероприятие, которое можно заказать. Мужского рода, во множественном умлаут: der Rundgang, die Rundgänge.'
      uk: 'Сама прогулянка — маршрут містом або будівлею, з гідом чи без. Пор. die Führung — екскурсія як захід, який можна замовити. Чоловічого роду, у множині умлаут: der Rundgang, die Rundgänge.'
  - de: Stadtplan
    ipa: "ˈʃtatˌplaːn"
    pos: noun
    gender: m
    plural: die Stadtpläne
    en: city map, street map
    ru: план города, карта города
    uk: план міста, карта міста
    example_de: Kann ich bitte einen Stadtplan haben?
    example_en: Could I have a city map, please?
    example_ru: Можно мне, пожалуйста, план города?
    example_uk: Можна мені, будь ласка, план міста?
    note:
      en: 'Compound of Stadt + der Plan, so masculine, and the plural takes the umlaut of Plan: die Stadtpläne. A map of a country or a region is die Karte.'
      ru: 'Сложное слово Stadt + der Plan, отсюда мужской род, множественное с умлаутом, как у Plan: die Stadtpläne. Карта страны или области — die Karte.'
      uk: 'Складне слово Stadt + der Plan, звідси чоловічий рід, множина з умлаутом, як у Plan: die Stadtpläne. Карта країни чи області — die Karte.'
  - de: Strand
    ipa: "ˈʃtʁant"
    pos: noun
    gender: m
    plural: die Strände
    en: beach
    ru: пляж
    uk: пляж
    example_de: Am Strand kann man gut spazieren gehen.
    example_en: The beach is a good place for a walk.
    example_ru: По пляжу хорошо гулять.
    example_uk: Пляжем добре гуляти.
    note:
      en: 'Two-way preposition, two cases: am Strand liegen (Wo? — Dativ) but an den Strand gehen (Wohin? — Akkusativ). Masculine, umlaut plural: die Strände.'
      ru: 'Предлог an — двойной, отсюда два падежа: am Strand liegen (Wo? — Dativ), но an den Strand gehen (Wohin? — Akkusativ). Мужского рода, во множественном умлаут: die Strände.'
      uk: 'Прийменник an — двобічний, звідси два відмінки: am Strand liegen (Wo? — Dativ), але an den Strand gehen (Wohin? — Akkusativ). Чоловічого роду, у множині умлаут: die Strände.'
  - de: Tour
    ipa: "ˈtuːɐ̯"
    pos: noun
    gender: f
    plural: die Touren
    en: tour, trip, ride
    ru: тур, поездка, вылазка
    uk: тур, поїздка, вилазка
    example_de: Am Wochenende machen wir eine Tour mit dem Fahrrad.
    example_en: At the weekend we are going on a bike ride.
    example_ru: На выходных мы отправимся в велосипедную поездку.
    example_uk: На вихідних ми вирушимо у велосипедну поїздку.
    note:
      en: 'A French loan, feminine, spoken with a long u — ˈtuːɐ̯, not the English way. You go on one with machen: eine Tour machen.'
      ru: 'Заимствование из французского, женского рода, произносится с долгим u — ˈtuːɐ̯, не по-английски. Устойчивое сочетание — eine Tour machen.'
      uk: 'Запозичення з французької, жіночого роду, вимовляється з довгим u — ˈtuːɐ̯, не по-англійськи. Стале сполучення — eine Tour machen.'
  - de: Tourist
    ipa: "tuˈʁɪst"
    pos: noun
    gender: m
    plural: die Touristen
    en: tourist (male)
    ru: турист
    uk: турист
    example_de: Im Sommer kommen viele Touristen in unsere Stadt.
    example_en: In summer a lot of tourists come to our city.
    example_ru: Летом в наш город приезжает много туристов.
    example_uk: Улітку до нашого міста приїжджає багато туристів.
    note:
      en: 'An n-noun: it adds -en everywhere except in the nominative singular — der Tourist, but den Touristen, dem Touristen, die Touristen. Ich sehe einen Touristen, never "einen Tourist". A woman is die Touristin.'
      ru: 'Слабое склонение (n-Deklination): -en во всех формах, кроме именительного единственного — der Tourist, но den Touristen, dem Touristen, die Touristen. Ich sehe einen Touristen, а не «einen Tourist». Женщина — die Touristin.'
      uk: 'Слабка відміна (n-Deklination): -en в усіх формах, крім називного однини — der Tourist, але den Touristen, dem Touristen, die Touristen. Ich sehe einen Touristen, а не «einen Tourist». Жінка — die Touristin.'
  - de: Touristin
    ipa: "tuˈʁɪstɪn"
    pos: noun
    gender: f
    plural: die Touristinnen
    en: tourist (female)
    ru: туристка
    uk: туристка
    example_de: Eine Touristin fragt mich nach dem Weg zum Museum.
    example_en: A tourist is asking me the way to the museum.
    example_ru: Туристка спрашивает у меня дорогу к музею.
    example_uk: Туристка запитує в мене дорогу до музею.
    note:
      en: 'The -in form for a woman, feminine, and the plural doubles the n: die Touristinnen. Same pattern as Arzt / Ärztin, Student / Studentin. Unlike der Tourist, it is not an n-noun.'
      ru: 'Форма на -in для женщины, женского рода, во множественном n удваивается: die Touristinnen. Та же модель, что Arzt / Ärztin, Student / Studentin. В отличие от der Tourist, слабого склонения здесь нет.'
      uk: 'Форма на -in для жінки, жіночого роду, у множині n подвоюється: die Touristinnen. Та сама модель, що Arzt / Ärztin, Student / Studentin. На відміну від der Tourist, слабкої відміни тут немає.'
  - de: Unterkunft
    ipa: "ˈʊntɐˌkʊnft"
    pos: noun
    gender: f
    plural: die Unterkünfte
    en: accommodation, place to stay
    ru: жильё, размещение (на время поездки)
    uk: житло, розміщення (на час поїздки)
    example_de: Wir haben die Unterkunft schon im Internet gebucht.
    example_en: We have already booked our accommodation online.
    example_ru: Жильё мы уже забронировали через интернет.
    example_uk: Житло ми вже забронювали через інтернет.
    note:
      en: 'The umbrella word for anywhere you sleep on a trip — a hotel, a hostel, a room, a flat. Feminine, umlaut plural: die Unterkünfte.'
      ru: 'Общее слово для любого места ночлега в поездке — гостиница, хостел, комната, квартира. Женского рода, во множественном умлаут: die Unterkünfte.'
      uk: 'Загальне слово для будь-якого місця ночівлі в поїздці — готель, хостел, кімната, квартира. Жіночого роду, у множині умлаут: die Unterkünfte.'
  - de: Insel
    ipa: "ˈɪnzl̩"
    pos: noun
    gender: f
    plural: die Inseln
    en: island
    ru: остров
    uk: острів
    example_de: Im Juli fahren wir auf eine Insel in der Nordsee.
    example_en: In July we are going to an island in the North Sea.
    example_ru: В июле мы едем на остров в Северном море.
    example_uk: У липні ми їдемо на острів у Північному морі.
    note:
      en: 'Feminine — die Insel, die Inseln. The preposition is auf, not in: auf eine Insel fahren (Wohin?) and auf einer Insel wohnen (Wo?).'
      ru: 'Женского рода — die Insel, die Inseln. Предлог — auf, а не in: auf eine Insel fahren (Wohin?) и auf einer Insel wohnen (Wo?).'
      uk: 'Жіночого роду — die Insel, die Inseln. Прийменник — auf, а не in: auf eine Insel fahren (Wohin?) і auf einer Insel wohnen (Wo?).'
  - de: Postleitzahl
    ipa: "ˈpɔstlaɪ̯tˌtsaːl"
    pos: noun
    gender: f
    plural: die Postleitzahlen
    en: postcode, zip code
    ru: почтовый индекс
    uk: поштовий індекс
    example_de: Meine Postleitzahl ist zehn zwei fünf null neun.
    example_en: My postcode is one zero two five zero nine.
    example_ru: Мой почтовый индекс — один ноль два пять ноль девять.
    example_uk: Мій поштовий індекс — один нуль два п’ять нуль дев’ять.
    note:
      en: 'Compound ending in die Zahl, so feminine. On forms it is shortened to PLZ, and Germans read the five digits out one by one, not as one big number.'
      ru: 'Сложное слово с die Zahl на конце, поэтому женского рода. В бланках сокращается до PLZ, а пять цифр немцы называют по одной, а не одним числом.'
      uk: 'Складне слово з die Zahl на кінці, тому жіночого роду. У бланках скорочується до PLZ, а п’ять цифр німці називають по одній, а не одним числом.'
  - de: übernachten
    ipa: "yːbɐˈnaxtn̩"
    pos: verb
    praesens_3sg: übernachtet
    partizip2: übernachtet
    aux: haben
    en: to stay the night, to spend the night
    ru: ночевать, останавливаться на ночь
    uk: ночувати, зупинятися на ніч
    example_de: In Berlin übernachten wir bei Freunden.
    example_en: In Berlin we are staying the night with friends.
    example_ru: В Берлине мы ночуем у друзей.
    example_uk: У Берліні ми ночуємо в друзів.
    note:
      en: 'Here über- is inseparable — the stress sits on the stem (yːbɐˈnaxtn̩), the prefix never splits off, and the Partizip II has no ge-: hat übernachtet. Where you sleep comes with in + Dat or bei + Dat.'
      ru: 'Приставка über- здесь неотделяемая: ударение на корне (yːbɐˈnaxtn̩), приставка не отходит, а Partizip II — без ge-: hat übernachtet. Место ночлега вводится через in + Dat или bei + Dat.'
      uk: 'Префікс über- тут невідокремлюваний: наголос на корені (yːbɐˈnaxtn̩), префікс не відходить, а Partizip II — без ge-: hat übernachtet. Місце ночівлі вводиться через in + Dat або bei + Dat.'
  - de: einpacken
    ipa: "ˈaɪ̯nˌpakn̩"
    pos: verb
    praesens_3sg: packt ein
    partizip2: eingepackt
    aux: haben
    valence: "+ Akk"
    en: to pack (into a bag); to wrap up
    ru: упаковывать, складывать (в сумку)
    uk: пакувати, складати (у сумку)
    example_de: Für den Urlaub packe ich nur einen Rucksack ein.
    example_en: For the holiday I am only packing a backpack.
    example_ru: В отпуск я беру с собой только рюкзак.
    example_uk: У відпустку я беру із собою тільки рюкзак.
    note:
      en: 'Separable ein-: the prefix goes to the end (Ich packe den Pullover ein) and the -ge- lands inside the participle: eingepackt. Its opposite is auspacken.'
      ru: 'Отделяемая приставка ein-: она уходит в конец (Ich packe den Pullover ein), а -ge- встаёт внутрь причастия: eingepackt. Противоположность — auspacken.'
      uk: 'Відокремлюваний префікс ein-: він іде в кінець (Ich packe den Pullover ein), а -ge- стає всередину дієприкметника: eingepackt. Протилежність — auspacken.'
  - de: auspacken
    ipa: "ˈaʊ̯sˌpakn̩"
    pos: verb
    praesens_3sg: packt aus
    partizip2: ausgepackt
    aux: haben
    valence: "+ Akk"
    en: to unpack; to unwrap
    ru: распаковывать, выкладывать (из сумки)
    uk: розпаковувати, викладати (із сумки)
    example_de: Im Hotel habe ich zuerst den Koffer ausgepackt.
    example_en: At the hotel I unpacked my suitcase first.
    example_ru: В гостинице я сначала распаковал чемодан.
    example_uk: У готелі я спершу розпакував валізу.
    note:
      en: 'The mirror image of einpacken, and separable in the same way: er packt aus, hat ausgepackt. It also works for presents — ein Geschenk auspacken.'
      ru: 'Зеркальная пара к einpacken, отделяемая так же: er packt aus, hat ausgepackt. Годится и о подарках — ein Geschenk auspacken.'
      uk: 'Дзеркальна пара до einpacken, відокремлювана так само: er packt aus, hat ausgepackt. Годиться й про подарунки — ein Geschenk auspacken.'
  - de: Führung
    ipa: "ˈfyːʁʊŋ"
    pos: noun
    gender: f
    plural: die Führungen
    en: guided tour
    ru: экскурсия (с гидом)
    uk: екскурсія (з гідом)
    example_de: Um vierzehn Uhr beginnt eine Führung durch das Museum.
    example_en: A guided tour of the museum starts at two p.m.
    example_ru: В четырнадцать часов начинается экскурсия по музею.
    example_uk: О чотирнадцятій годині починається екскурсія музеєм.
    note:
      en: 'The guided tour as an event — it has a time, a price and a guide, and you can book one: eine Führung buchen. The walk itself, guide or no guide, is der Rundgang. Every -ung noun is feminine.'
      ru: 'Экскурсия как мероприятие — у неё есть время, цена и экскурсовод, её можно заказать: eine Führung buchen. Сама прогулка, с гидом или без, — der Rundgang. Все существительные на -ung женского рода.'
      uk: 'Екскурсія як захід — у неї є час, ціна й екскурсовод, її можна замовити: eine Führung buchen. Сама прогулянка, з гідом чи без, — der Rundgang. Усі іменники на -ung жіночого роду.'
  - de: Sehenswürdigkeit
    ipa: "ˈzeːənsˌvʏʁdɪçkaɪ̯t"
    pos: noun
    gender: f
    plural: die Sehenswürdigkeiten
    en: sight, place worth seeing
    ru: достопримечательность
    uk: визначна пам’ятка
    example_de: In Köln gibt es viele Sehenswürdigkeiten.
    example_en: There are lots of sights to see in Cologne.
    example_ru: В Кёльне много достопримечательностей.
    example_uk: У Кельні багато визначних пам’яток.
    note:
      en: 'A long word with a simple build: sehen + würdig (worthy) + -keit — a thing worth seeing. Every -keit noun is feminine. The verb you use with it is besichtigen: eine Sehenswürdigkeit besichtigen.'
      ru: 'Длинное слово с простым составом: sehen + würdig (достойный) + -keit — «то, что достойно быть увиденным». Все существительные на -keit женского рода. Глагол при нём — besichtigen: eine Sehenswürdigkeit besichtigen.'
      uk: 'Довге слово з простим складом: sehen + würdig (гідний) + -keit — «те, що варто побачити». Усі іменники на -keit жіночого роду. Дієслово при ньому — besichtigen: eine Sehenswürdigkeit besichtigen.'
