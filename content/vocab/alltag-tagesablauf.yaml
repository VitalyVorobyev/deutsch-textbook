id: alltag-tagesablauf
title_de: "Alltag und Tagesablauf"
title_en: "Everyday life and daily routine"
title_ru: "Повседневная жизнь и распорядок дня"
level: A2
entries:
  # --- Separable verbs ---
  - de: aufstehen
    pos: verb
    praesens_3sg: steht auf
    partizip2: aufgestanden
    aux: sein
    en: to get up
    ru: вставать (с постели)
    example_de: Ich stehe jeden Morgen um sieben Uhr auf.
    example_en: I get up at seven o'clock every morning.
    example_ru: Я встаю каждое утро в семь часов.
    note:
      en: 'Separable; Perfekt with sein: ich bin aufgestanden.'
      ru: 'Отделяемая приставка; перфект с sein: ich bin aufgestanden.'
  - de: aufwachen
    pos: verb
    praesens_3sg: wacht auf
    partizip2: aufgewacht
    aux: sein
    en: to wake up
    ru: просыпаться
    example_de: Am Wochenende wache ich ohne Wecker auf.
    example_en: On the weekend I wake up without an alarm clock.
    example_ru: В выходные я просыпаюсь без будильника.
    note:
      en: 'aufwachen = your eyes open; aufstehen = you leave the bed. Perfekt with sein.'
      ru: 'aufwachen — проснуться; aufstehen — встать с постели. Перфект с sein.'
  - de: sich anziehen
    pos: verb
    praesens_3sg: zieht sich an
    partizip2: angezogen
    aux: haben
    en: to get dressed
    ru: одеваться
    example_de: Nach dem Duschen ziehe ich mich schnell an.
    example_en: After showering I get dressed quickly.
    example_ru: После душа я быстро одеваюсь.
    note:
      en: 'Reflexive and separable: ich ziehe mich an, du ziehst dich an.'
      ru: 'Возвратный глагол с отделяемой приставкой: ich ziehe mich an, du ziehst dich an.'
  - de: einkaufen
    pos: verb
    praesens_3sg: kauft ein
    partizip2: eingekauft
    aux: haben
    en: to shop, to do the shopping
    ru: делать покупки
    example_de: Am Samstag kaufen wir im Supermarkt ein.
    example_en: On Saturday we do the shopping at the supermarket.
    example_ru: В субботу мы делаем покупки в супермаркете.
  - de: aufräumen
    pos: verb
    praesens_3sg: räumt auf
    partizip2: aufgeräumt
    aux: haben
    en: to tidy up
    ru: убирать(ся), наводить порядок
    example_de: Am Abend räume ich die Küche auf.
    example_en: In the evening I tidy up the kitchen.
    example_ru: Вечером я убираю кухню.
  - de: fernsehen
    pos: verb
    praesens_3sg: sieht fern
    partizip2: ferngesehen
    aux: haben
    en: to watch TV
    ru: смотреть телевизор
    example_de: Nach dem Abendessen sehen wir eine Stunde fern.
    example_en: After dinner we watch TV for an hour.
    example_ru: После ужина мы час смотрим телевизор.
    note:
      en: 'One separable verb, not "TV schauen": ich sehe fern, er sieht fern.'
      ru: 'Один глагол с отделяемой приставкой, а не «смотреть ТВ»: ich sehe fern, er sieht fern.'
  - de: einschlafen
    pos: verb
    praesens_3sg: schläft ein
    partizip2: eingeschlafen
    aux: sein
    en: to fall asleep
    ru: засыпать
    example_de: Ich bin müde und schlafe sofort ein.
    example_en: I am tired and fall asleep immediately.
    example_ru: Я устал и сразу засыпаю.
    note:
      en: 'Change of state, so Perfekt with sein: ich bin eingeschlafen.'
      ru: 'Изменение состояния, поэтому перфект с sein: ich bin eingeschlafen.'
  # --- Plain verbs ---
  - de: frühstücken
    pos: verb
    praesens_3sg: frühstückt
    partizip2: gefrühstückt
    aux: haben
    en: to have breakfast
    ru: завтракать
    example_de: Wir frühstücken zusammen in der Küche.
    example_en: We have breakfast together in the kitchen.
    example_ru: Мы завтракаем вместе на кухне.
  - de: arbeiten
    pos: verb
    praesens_3sg: arbeitet
    partizip2: gearbeitet
    aux: haben
    en: to work
    ru: работать
    example_de: Er arbeitet von neun bis fünf im Büro.
    example_en: He works in the office from nine to five.
    example_ru: Он работает в офисе с девяти до пяти.
  - de: duschen
    pos: verb
    praesens_3sg: duscht
    partizip2: geduscht
    aux: haben
    en: to shower
    ru: принимать душ
    example_de: Ich dusche morgens nur fünf Minuten.
    example_en: In the morning I shower for only five minutes.
    example_ru: По утрам я принимаю душ всего пять минут.
  - de: putzen
    pos: verb
    praesens_3sg: putzt
    partizip2: geputzt
    aux: haben
    en: to clean
    ru: чистить, мыть (квартиру, ванную)
    example_de: Am Freitag putze ich das Bad.
    example_en: On Friday I clean the bathroom.
    example_ru: В пятницу я мою ванную.
  - de: schlafen
    pos: verb
    praesens_3sg: schläft
    partizip2: geschlafen
    aux: haben
    en: to sleep
    ru: спать
    example_de: Am Wochenende schlafe ich bis zehn Uhr.
    example_en: On the weekend I sleep until ten o'clock.
    example_ru: В выходные я сплю до десяти часов.
  # --- Nouns ---
  - de: Wecker
    pos: noun
    gender: m
    plural: die Wecker
    en: alarm clock
    ru: будильник
    example_de: Mein Wecker klingelt um halb sieben.
    example_en: My alarm clock rings at half past six.
    example_ru: Мой будильник звонит в половине седьмого.
  - de: Arbeit
    pos: noun
    gender: f
    plural: die Arbeiten
    en: work, job
    ru: работа
    example_de: Die Arbeit beginnt um neun Uhr.
    example_en: Work starts at nine o'clock.
    example_ru: Работа начинается в девять часов.
  - de: Büro
    pos: noun
    gender: n
    plural: die Büros
    en: office
    ru: офис
    example_de: Ich fahre mit dem Bus ins Büro.
    example_en: I take the bus to the office.
    example_ru: Я езжу в офис на автобусе.
  - de: Pause
    pos: noun
    gender: f
    plural: die Pausen
    en: break
    ru: перерыв, пауза
    example_de: Um zwölf Uhr machen wir eine Pause.
    example_en: At twelve o'clock we take a break.
    example_ru: В двенадцать часов мы делаем перерыв.
  - de: Feierabend
    pos: noun
    gender: m
    plural: die Feierabende
    en: end of the working day
    ru: конец рабочего дня
    example_de: Um fünf Uhr habe ich Feierabend.
    example_en: I finish work at five o'clock.
    example_ru: В пять часов я заканчиваю работу.
    note:
      en: 'No exact English word. "Feierabend haben" = to be done with work; "Schönen Feierabend!" is a common goodbye among colleagues.'
      ru: 'Точного русского слова нет. "Feierabend haben" = закончить рабочий день; "Schönen Feierabend!" — обычное прощание коллег.'
  - de: Freizeit
    pos: noun
    gender: f
    plural: "—"
    en: free time
    ru: свободное время
    example_de: In meiner Freizeit lese ich viel.
    example_en: In my free time I read a lot.
    example_ru: В свободное время я много читаю.
  - de: Alltag
    pos: noun
    gender: m
    plural: "—"
    en: everyday life, daily routine
    ru: будни, повседневная жизнь
    example_de: Mein Alltag beginnt sehr früh.
    example_en: My daily routine starts very early.
    example_ru: Мой обычный день начинается очень рано.
  - de: Wochenende
    pos: noun
    gender: n
    plural: die Wochenenden
    en: weekend
    ru: выходные
    example_de: Am Wochenende arbeite ich nicht.
    example_en: I don't work on the weekend.
    example_ru: В выходные я не работаю.
  - de: Woche
    pos: noun
    gender: f
    plural: die Wochen
    en: week
    ru: неделя
    example_de: Die Woche hat sieben Tage.
    example_en: The week has seven days.
    example_ru: В неделе семь дней.
  - de: Haushalt
    pos: noun
    gender: m
    plural: die Haushalte
    en: household, housework
    ru: домашнее хозяйство
    example_de: Wir machen den Haushalt zusammen.
    example_en: We do the housework together.
    example_ru: Мы вместе занимаемся домашним хозяйством.
    note:
      en: '"den Haushalt machen" = to do the housework (cleaning, washing, shopping).'
      ru: '"den Haushalt machen" = вести домашние дела (уборка, стирка, покупки).'
  # --- Time adverbs ---
  - de: früh
    pos: adv
    en: early
    ru: рано
    example_de: Ich stehe nicht gern früh auf.
    example_en: I don't like getting up early.
    example_ru: Я не люблю рано вставать.
  - de: spät
    pos: adv
    en: late
    ru: поздно
    example_de: Heute komme ich spät nach Hause.
    example_en: Today I'm coming home late.
    example_ru: Сегодня я приду домой поздно.
  - de: meistens
    pos: adv
    en: usually, mostly
    ru: обычно, чаще всего
    example_de: Meistens frühstücke ich um acht Uhr.
    example_en: I usually have breakfast at eight o'clock.
    example_ru: Обычно я завтракаю в восемь часов.
  - de: manchmal
    pos: adv
    en: sometimes
    ru: иногда
    example_de: Manchmal arbeite ich auch am Samstag.
    example_en: Sometimes I work on Saturday too.
    example_ru: Иногда я работаю и в субботу.
  - de: oft
    pos: adv
    en: often
    ru: часто
    example_de: Ich fahre oft mit dem Fahrrad zur Arbeit.
    example_en: I often ride my bike to work.
    example_ru: Я часто езжу на работу на велосипеде.
  - de: immer
    pos: adv
    en: always
    ru: всегда
    example_de: Er trinkt immer Kaffee zum Frühstück.
    example_en: He always drinks coffee for breakfast.
    example_ru: Он всегда пьёт кофе на завтрак.
  - de: nie
    pos: adv
    en: never
    ru: никогда
    example_de: Sie sieht nie am Morgen fern.
    example_en: She never watches TV in the morning.
    example_ru: Она никогда не смотрит телевизор по утрам.
    note:
      en: 'One negation is enough: "Ich stehe nie früh auf" — no extra "nicht" as in Russian.'
      ru: 'Достаточно одного отрицания: "Ich stehe nie früh auf" — без второго "nicht", как в русском «никогда не».'
  - de: zuerst
    pos: adv
    en: first, at first
    ru: сначала
    example_de: Zuerst dusche ich, dann frühstücke ich.
    example_en: First I shower, then I have breakfast.
    example_ru: Сначала я принимаю душ, потом завтракаю.
  - de: dann
    pos: adv
    en: then
    ru: потом, затем
    example_de: Dann fahre ich zur Arbeit.
    example_en: Then I go to work.
    example_ru: Потом я еду на работу.
  - de: danach
    pos: adv
    en: after that, afterwards
    ru: после этого
    example_de: Danach räume ich die Küche auf.
    example_en: After that I tidy up the kitchen.
    example_ru: После этого я убираю кухню.
  # --- Phrases ---
  - de: zur Arbeit fahren
    pos: phrase
    en: to go to work (by vehicle)
    ru: ехать на работу
    example_de: Ich fahre jeden Tag mit dem Bus zur Arbeit.
    example_en: I go to work by bus every day.
    example_ru: Я каждый день езжу на работу на автобусе.
  - de: Pause machen
    pos: phrase
    en: to take a break
    ru: делать перерыв
    example_de: Nach zwei Stunden machen wir Pause.
    example_en: After two hours we take a break.
    example_ru: Через два часа мы делаем перерыв.
  - de: ins Bett gehen
    pos: phrase
    en: to go to bed
    ru: ложиться спать
    example_de: Ich gehe meistens um elf Uhr ins Bett.
    example_en: I usually go to bed at eleven o'clock.
    example_ru: Я обычно ложусь спать в одиннадцать часов.
