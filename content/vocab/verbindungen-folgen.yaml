id: verbindungen-folgen
title_de: "Folgen, Häufigkeit & Erinnerungen"
title_en: "Consequences, frequency & memories"
title_ru: "Следствия, частотность и воспоминания"
title_uk: "Наслідки, частотність та спогади"
level: A2
entries:
  # Thin on purpose. The connectors this unit is *about* are mostly taught already
  # — deshalb and wenn are cards (nebensaetze-plaene, kernwortschatz-a2), dann,
  # danach, zuerst, damals, später and plötzlich are cards, and `als` is covered
  # in the Wortliste as grammar (`~als`, earned through komparativ-als), so it
  # must NOT gain a card here: this unit teaches its second, temporal job.
  #
  # What the deck owns is the language that makes the unit's two structures
  # usable: the consequence adverbs nobody has taught, and the frequency words
  # that decide between `als` (once) and `wenn` (every time).

  # --- Folgen ---
  - de: deswegen
    ipa: "dɛsˈveːgn̩"
    pos: adv
    en: that is why, for that reason
    ru: поэтому, из-за этого
    uk: тому, через це
    example_de: "Der Bus hatte Verspätung. Deswegen bin ich zu spät gekommen."
    example_en: "The bus was late. That is why I arrived late."
    example_ru: "Автобус опоздал. Поэтому я пришёл поздно."
    example_uk: "Автобус запізнився. Тому я прийшов пізно."
    note:
      en: "Interchangeable with deshalb in everyday German — pick either. Both are adverbs, not conjunctions, so they fill position 1 and the verb comes straight after: Deswegen bin ich … never Deswegen ich bin …"
      ru: "В обиходной речи взаимозаменяемо с deshalb — берите любое. Оба слова наречия, а не союзы, поэтому занимают первое место, и глагол идёт сразу за ними: Deswegen bin ich … и никогда Deswegen ich bin …"
      uk: "У побутовому мовленні взаємозамінне з deshalb — беріть будь-яке. Обидва слова прислівники, а не сполучники, тому займають перше місце, і дієслово йде одразу за ними: Deswegen bin ich … і ніколи Deswegen ich bin …"

  - de: trotzdem
    ipa: "ˈtʁɔtsdeːm"
    pos: adv
    en: nevertheless, all the same
    ru: тем не менее, всё равно
    uk: попри це, все одно
    example_de: "Es hat geregnet. Trotzdem sind wir spazieren gegangen."
    example_en: "It rained. We went for a walk all the same."
    example_ru: "Шёл дождь. Мы всё равно пошли гулять."
    example_uk: "Ішов дощ. Ми все одно пішли гуляти."
    note:
      en: "The opposite of deshalb: deshalb gives the expected consequence, trotzdem the unexpected one. Same syntax, though — position 1, verb second. Do not confuse it with obwohl (although), which is a conjunction and sends the verb to the end; that one comes at B1."
      ru: "Противоположность deshalb: deshalb вводит ожидаемое следствие, trotzdem — неожиданное. Синтаксис при этом тот же: первое место, глагол вторым. Не путайте с obwohl («хотя»), которое является союзом и отправляет глагол в конец, — оно относится к B1."
      uk: "Протилежність deshalb: deshalb вводить очікуваний наслідок, trotzdem — несподіваний. Синтаксис при цьому той самий: перше місце, дієслово другим. Не плутайте з obwohl («хоча»), яке є сполучником і відправляє дієслово в кінець, — воно належить до B1."

  - de: schließlich
    ipa: "ˈʃliːslɪç"
    pos: adv
    en: in the end, finally
    ru: в конце концов, в итоге
    uk: врешті-решт, зрештою
    example_de: "Wir haben lange gesucht. Schließlich haben wir die Wohnung gefunden."
    example_en: "We searched for a long time. In the end we found the flat."
    example_ru: "Мы долго искали. В конце концов мы нашли квартиру."
    example_uk: "Ми довго шукали. Врешті-решт ми знайшли квартиру."
    note:
      en: "Closes a sequence: zuerst … dann … danach … schließlich. Like the others in that chain it fills position 1 and the verb follows immediately."
      ru: "Закрывает последовательность: zuerst … dann … danach … schließlich. Как и остальные в этой цепочке, занимает первое место, и глагол идёт сразу за ним."
      uk: "Закриває послідовність: zuerst … dann … danach … schließlich. Як і решта в цьому ланцюжку, займає перше місце, і дієслово йде одразу за ним."

  - de: Folge
    ipa: "ˈfɔlgə"
    pos: noun
    gender: f
    plural: "die Folgen"
    en: consequence, result
    ru: следствие, последствие
    uk: наслідок
    example_de: "Er ist nicht zum Termin gekommen. Die Folge war ein neuer Brief vom Amt."
    example_en: "He did not come to the appointment. The consequence was another letter from the office."
    example_ru: "Он не пришёл на приём. Следствием стало новое письмо из ведомства."
    example_uk: "Він не прийшов на прийом. Наслідком став новий лист із відомства."
    note:
      en: "The noun for what deshalb expresses. Also means an episode of a series — eine neue Folge."
      ru: "Существительное для того, что выражает deshalb. Ещё означает серию сериала — eine neue Folge."
      uk: "Іменник для того, що виражає deshalb. Ще означає серію серіалу — eine neue Folge."

  # --- Wie oft? Diese Wörter entscheiden zwischen als und wenn ---
  - de: jedes Mal
    ipa: "ˈjeːdəs ˈmaːl"
    pos: phrase
    en: every time
    ru: каждый раз
    uk: щоразу
    example_de: "Jedes Mal, wenn ich nach Berlin fahre, besuche ich meine Tante."
    example_en: "Every time I go to Berlin, I visit my aunt."
    example_ru: "Каждый раз, когда я еду в Берлин, я навещаю тётю."
    example_uk: "Щоразу, коли я їду до Берліна, я відвідую тітку."
    note:
      en: "The clearest signal that a past clause needs wenn and not als: if every time could be added without changing the meaning, the event repeated, so wenn is right."
      ru: "Самый ясный признак того, что придаточное о прошлом требует wenn, а не als: если «каждый раз» можно вставить без изменения смысла, значит событие повторялось — нужен wenn."
      uk: "Найясніша ознака того, що підрядне про минуле вимагає wenn, а не als: якщо «щоразу» можна вставити без зміни змісту, отже подія повторювалася — потрібен wenn."

  - de: mehrmals
    ipa: "ˈmeːɐ̯maːls"
    pos: adv
    en: several times
    ru: несколько раз
    uk: кілька разів
    example_de: "Ich habe mehrmals angerufen, aber niemand ist rangegangen."
    example_en: "I called several times, but nobody picked up."
    example_ru: "Я звонил несколько раз, но никто не взял трубку."
    example_uk: "Я телефонував кілька разів, але ніхто не взяв слухавку."
    note:
      en: "Built from mehr + Mal, like einmal and zweimal. An event that happened mehrmals is a repeated one, so a clause about it takes wenn."
      ru: "Образовано из mehr + Mal, как einmal и zweimal. Событие, случившееся mehrmals, повторялось, поэтому придаточное о нём берёт wenn."
      uk: "Утворено з mehr + Mal, як einmal і zweimal. Подія, що сталася mehrmals, повторювалася, тому підрядне про неї бере wenn."

  - de: regelmäßig
    ipa: "ˈʁeːgl̩ˌmɛːsɪç"
    pos: adj
    en: regular, regularly
    ru: регулярный, регулярно
    uk: регулярний, регулярно
    example_de: "Ich gehe regelmäßig zum Sport, meistens dienstags."
    example_en: "I go to do sport regularly, usually on Tuesdays."
    example_ru: "Я регулярно хожу на спорт, обычно по вторникам."
    example_uk: "Я регулярно ходжу на спорт, зазвичай по вівторках."
    note:
      en: "From die Regel (rule). Works as both adjective and adverb without changing form when it stands after the verb."
      ru: "От die Regel (правило). Работает и прилагательным, и наречием — после глагола форма не меняется."
      uk: "Від die Regel (правило). Працює і прикметником, і прислівником — після дієслова форма не змінюється."

  - de: normalerweise
    ipa: "nɔʁˈmaːlɐˌvaɪ̯zə"
    pos: adv
    en: normally, usually
    ru: обычно, как правило
    uk: зазвичай, як правило
    example_de: "Normalerweise stehe ich um sechs auf, aber heute war ich müde."
    example_en: "I normally get up at six, but today I was tired."
    example_ru: "Обычно я встаю в шесть, но сегодня я был уставшим."
    example_uk: "Зазвичай я встаю о шостій, але сьогодні я був втомлений."
    note:
      en: "Standing in position 1 it triggers the same inversion as deshalb: Normalerweise stehe ich … — verb second, subject third."
      ru: "Стоя на первом месте, вызывает ту же инверсию, что и deshalb: Normalerweise stehe ich … — глагол вторым, подлежащее третьим."
      uk: "Стоячи на першому місці, викликає ту саму інверсію, що й deshalb: Normalerweise stehe ich … — дієслово другим, підмет третім."

  - de: selten
    ipa: "ˈzɛltn̩"
    pos: adv
    en: rarely, seldom
    ru: редко
    uk: рідко
    example_de: "Wir sehen uns leider nur selten."
    example_en: "Unfortunately we only see each other rarely."
    example_ru: "К сожалению, мы видимся редко."
    example_uk: "На жаль, ми бачимося рідко."
    note:
      en: "The counterpart to oft. The frequency scale worth having whole: nie – selten – manchmal – oft – immer."
      ru: "Пара к oft. Шкалу частотности стоит держать целиком: nie – selten – manchmal – oft – immer."
      uk: "Пара до oft. Шкалу частотності варто тримати цілою: nie – selten – manchmal – oft – immer."

  - de: ständig
    ipa: "ˈʃtɛndɪç"
    pos: adv
    en: constantly, all the time
    ru: постоянно, всё время
    uk: постійно, весь час
    example_de: "Mein Nachbar hört ständig laute Musik."
    example_en: "My neighbour plays loud music all the time."
    example_ru: "Мой сосед постоянно слушает громкую музыку."
    example_uk: "Мій сусід постійно слухає гучну музику."
    note:
      en: "Stronger than oft and usually a complaint. Neutral alternatives are immer or die ganze Zeit."
      ru: "Сильнее, чем oft, и обычно с оттенком жалобы. Нейтральные варианты — immer или die ganze Zeit."
      uk: "Сильніше, ніж oft, і зазвичай із відтінком скарги. Нейтральні варіанти — immer або die ganze Zeit."

  # --- Erzählen & erinnern ---
  - de: neulich
    ipa: "ˈnɔʏ̯lɪç"
    pos: adv
    en: the other day, recently
    ru: на днях, недавно
    uk: днями, нещодавно
    example_de: "Neulich habe ich im Bus einen alten Freund getroffen."
    example_en: "The other day I met an old friend on the bus."
    example_ru: "На днях я встретил в автобусе старого друга."
    example_uk: "Днями я зустрів в автобусі старого друга."
    note:
      en: "Opens a story about one occasion in the recent past — so the clause that follows it takes als, never wenn. Compare früher, which covers a whole stretch of time."
      ru: "Открывает рассказ об одном случае в недавнем прошлом — поэтому придаточное после него берёт als, а не wenn. Ср. früher, которое охватывает целый период."
      uk: "Відкриває розповідь про один випадок у недавньому минулому — тому підрядне після нього бере als, а не wenn. Пор. früher, яке охоплює цілий період."

  - de: irgendwann
    ipa: "ˈɪʁgn̩tˌvan"
    pos: adv
    en: sometime, at some point
    ru: когда-нибудь, когда-то
    uk: колись, у якийсь момент
    example_de: "Irgendwann möchte ich ein Jahr im Ausland leben."
    example_en: "At some point I would like to live abroad for a year."
    example_ru: "Когда-нибудь я хотел бы пожить год за границей."
    example_uk: "Колись я хотів би пожити рік за кордоном."
    note:
      en: "Works in both directions in time — irgendwann möchte ich … (future) and irgendwann habe ich … (past). One of the irgend- words: irgendwo, irgendwie, irgendetwas."
      ru: "Работает в обе стороны по времени — irgendwann möchte ich … (будущее) и irgendwann habe ich … (прошлое). Одно из слов на irgend-: irgendwo, irgendwie, irgendetwas."
      uk: "Працює в обидва боки в часі — irgendwann möchte ich … (майбутнє) та irgendwann habe ich … (минуле). Одне зі слів на irgend-: irgendwo, irgendwie, irgendetwas."

  - de: Erinnerung
    ipa: "ʔɛɐ̯ˈʔɪnəʁʊŋ"
    pos: noun
    gender: f
    plural: "die Erinnerungen"
    en: memory, recollection
    ru: воспоминание
    uk: спогад
    example_de: "An meine Schulzeit habe ich gute Erinnerungen."
    example_en: "I have good memories of my school days."
    example_ru: "О школьных годах у меня хорошие воспоминания."
    example_uk: "Про шкільні роки в мене гарні спогади."
    note:
      en: "From sich erinnern (to remember), and feminine like every -ung noun. eine Erinnerung an + Akkusativ — a memory of something."
      ru: "От sich erinnern (вспоминать), женского рода, как и все существительные на -ung. eine Erinnerung an + Akkusativ — воспоминание о чём-то."
      uk: "Від sich erinnern (згадувати), жіночого роду, як і всі іменники на -ung. eine Erinnerung an + Akkusativ — спогад про щось."
