id: gesundheit-arzttermin
title_de: "Gesundheit & Arzttermin"
title_en: "Health & the doctor"
title_ru: "Здоровье и приём у врача"
title_uk: "Здоров'я та візит до лікаря"
level: A2
entries:
  # A plural-only headword, so it is declared the way Eltern, Leute and Ferien are: pos: phrase,
  # no gender and no plural. As a noun it would describe itself (plural: "die Beschwerden"), and
  # the EN/RU→DE card — which requires the article for a noun — would demand one for a word that
  # has no singular to take it.
  - de: "Beschwerden"
    ipa: "bəˈʃveːɐ̯dn̩"
    pos: phrase
    en: "symptoms; complaints (medical)"
    ru: "жалобы; симптомы"
    uk: "скарги; симптоми"
    example_de: "Seit wann haben Sie die Beschwerden?"
    example_en: "How long have you had these symptoms?"
    example_ru: "С каких пор у вас эти жалобы?"
    example_uk: "Відколи у вас ці скарги?"
    note:
      en: "Almost always plural. It is the word a doctor uses for whatever is wrong with you — pain, a cough, dizziness — without naming an illness."
      ru: "Почти всегда во множественном числе. Так врач называет всё, что вас беспокоит — боль, кашель, слабость, — не давая при этом диагноза."
      uk: "Майже завжди у множині. Так лікар називає все, що вас турбує — біль, кашель, слабкість, — не даючи при цьому діагнозу."

  - de: "Husten"
    ipa: "ˈhuːstn̩"
    pos: noun
    gender: m
    plural: "—"
    en: "cough"
    ru: "кашель"
    uk: "кашель"
    example_de: "Ich habe seit drei Tagen Husten."
    example_en: "I have had a cough for three days."
    example_ru: "У меня уже три дня кашель."
    example_uk: "У мене вже три дні кашель."
    note:
      en: "Used without an article after haben: Ich habe Husten. The verb is husten — Das Kind hustet."
      ru: "После haben употребляется без артикля: Ich habe Husten. Есть и глагол husten — Das Kind hustet («ребёнок кашляет»)."
      uk: "Після haben уживається без артикля: Ich habe Husten. Є й дієслово husten — Das Kind hustet («дитина кашляє»)."

  - de: "Schnupfen"
    ipa: "ˈʃnʊpfn̩"
    pos: noun
    gender: m
    plural: "—"
    en: "runny nose; head cold"
    ru: "насморк"
    uk: "нежить"
    example_de: "Im Winter habe ich oft Schnupfen."
    example_en: "In winter I often have a runny nose."
    example_ru: "Зимой у меня часто насморк."
    example_uk: "Узимку в мене часто нежить."
    note:
      en: "Schnupfen is only the blocked, running nose. The whole illness, with a sore throat and a cough, is die Erkältung."
      ru: "Schnupfen — это только заложенный, текущий нос. Простуда целиком, с горлом и кашлем, называется die Erkältung."
      uk: "Schnupfen — це лише закладений ніс, що тече. Застуда цілком, із горлом і кашлем, називається die Erkältung."

  - de: "Rezept"
    ipa: "ʁeˈtsɛpt"
    pos: noun
    gender: n
    plural: "die Rezepte"
    en: "prescription"
    ru: "рецепт (на лекарство)"
    uk: "рецепт (на ліки)"
    example_de: "Die Ärztin schreibt ein Rezept für die Tabletten."
    example_en: "The doctor writes a prescription for the tablets."
    example_ru: "Врач выписывает рецепт на таблетки."
    example_uk: "Лікарка виписує рецепт на таблетки."
    note:
      en: "The same word also means a cooking recipe — ein Rezept für Apfelkuchen. Context decides which one it is."
      ru: "Это же слово означает и кулинарный рецепт — ein Rezept für Apfelkuchen. Какой именно рецепт имеется в виду, решает контекст."
      uk: "Це саме слово означає й кулінарний рецепт — ein Rezept für Apfelkuchen. Який саме рецепт мається на увазі, вирішує контекст."

  - de: "Salbe"
    ipa: "ˈzalbə"
    pos: noun
    gender: f
    plural: "die Salben"
    en: "ointment; cream"
    ru: "мазь"
    uk: "мазь"
    example_de: "Die Salbe für den Rücken bekomme ich in der Apotheke."
    example_en: "I get the ointment for my back at the pharmacy."
    example_ru: "Мазь для спины я получаю в аптеке."
    example_uk: "Мазь для спини я отримую в аптеці."

  - de: "Krankschreibung"
    ipa: "ˈkʁaŋkˌʃʁaɪ̯bʊŋ"
    pos: noun
    gender: f
    plural: "die Krankschreibungen"
    en: "sick note (for the employer)"
    ru: "больничный лист (для работодателя)"
    uk: "лікарняний лист (для роботодавця)"
    example_de: "Ich brauche eine Krankschreibung für meinen Chef."
    example_en: "I need a sick note for my boss."
    example_ru: "Мне нужен больничный для начальника."
    example_uk: "Мені потрібен лікарняний для начальника."
    note:
      en: "The doctor writes it, and it is what you send to work. Many employers ask for one from the third or fourth day of illness."
      ru: "Его выписывает врач, и именно его отправляют на работу. Многие работодатели требуют больничный начиная с третьего или четвёртого дня болезни."
      uk: "Його виписує лікар, і саме його надсилають на роботу. Багато роботодавців вимагають лікарняний починаючи з третього або четвертого дня хвороби."

  - de: "Sprechstunde"
    ipa: "ˈʃpʁɛçˌʃtʊndə"
    pos: noun
    gender: f
    plural: "die Sprechstunden"
    en: "consultation hours"
    ru: "часы приёма"
    uk: "години прийому"
    example_de: "Die Sprechstunde ist von acht bis zwölf Uhr."
    example_en: "Consultation hours are from eight until twelve."
    example_ru: "Приём с восьми до двенадцати часов."
    example_uk: "Прийом з восьмої до дванадцятої години."
    note:
      en: "The hours in which a doctor sees patients. You will hear it on every surgery's answerphone."
      ru: "Часы, в которые врач принимает пациентов. Это слово звучит на автоответчике любой поликлиники."
      uk: "Години, у які лікар приймає пацієнтів. Це слово звучить на автовідповідачі будь-якої поліклініки."

  - de: "Hausarzt"
    ipa: "ˈhaʊ̯sˌʔaːɐ̯tst"
    pos: noun
    gender: m
    plural: "die Hausärzte"
    en: "GP; family doctor"
    ru: "участковый (семейный) врач"
    uk: "сімейний (дільничний) лікар"
    example_de: "Mein Hausarzt hat am Montag Sprechstunde."
    example_en: "My GP has consultation hours on Monday."
    example_ru: "Мой участковый врач принимает в понедельник."
    example_uk: "Мій сімейний лікар приймає в понеділок."
    note:
      en: "Your first stop for almost everything: the Hausarzt treats you or sends you on to a specialist. The female form is die Hausärztin."
      ru: "Первая инстанция почти при любой проблеме: Hausarzt лечит сам или направляет к специалисту. Женская форма — die Hausärztin."
      uk: "Перша інстанція майже за будь-якої проблеми: Hausarzt лікує сам або направляє до фахівця. Жіноча форма — die Hausärztin."

  - de: "untersuchen"
    ipa: "ʊntɐˈzuːxn̩"
    pos: verb
    partizip2: "untersucht"
    aux: haben
    praesens_3sg: "untersucht"
    valence: "+ Akk"
    en: "to examine (a patient)"
    ru: "осматривать (пациента); обследовать"
    uk: "оглядати (пацієнта); обстежувати"
    example_de: "Die Ärztin untersucht mich und schreibt ein Rezept."
    example_en: "The doctor examines me and writes a prescription."
    example_ru: "Врач осматривает меня и выписывает рецепт."
    example_uk: "Лікарка оглядає мене й виписує рецепт."
    note:
      en: "The prefix unter- here is inseparable: nothing splits off, and the Partizip II has no ge- — Sie hat mich untersucht."
      ru: "Приставка unter- здесь неотделяемая: ничего не отрывается, а Partizip II образуется без ge- — Sie hat mich untersucht."
      uk: "Префікс unter- тут невідокремлюваний: нічого не відривається, а Partizip II утворюється без ge- — Sie hat mich untersucht."

  - de: "fühlen"
    ipa: "ˈfyːlən"
    pos: verb
    partizip2: "sich gefühlt"
    aux: haben
    praesens_3sg: "fühlt sich"
    valence: "sich + Akk"
    en: "to feel a certain way, to feel well or unwell"
    ru: "чувствовать себя (хорошо или плохо)"
    uk: "почуватися (добре чи погано)"
    example_de: "Ich fühle mich heute schon besser."
    example_en: "I already feel better today."
    example_ru: "Сегодня я чувствую себя уже лучше."
    example_uk: "Сьогодні я почуваюся вже краще."
    note:
      en: "To say how you are, the verb needs a reflexive pronoun in the accusative: ich fühle mich, du fühlst dich, er fühlt sich, Sie fühlen sich. Without it, fühlen means to feel something with your hands."
      ru: "Чтобы сказать о самочувствии, глаголу нужно возвратное местоимение в Akkusativ: ich fühle mich, du fühlst dich, er fühlt sich, Sie fühlen sich. Без него fühlen значит «щупать, ощущать рукой»."
      uk: "Щоб сказати про самопочуття, дієслову потрібен зворотний займенник в Akkusativ: ich fühle mich, du fühlst dich, er fühlt sich, Sie fühlen sich. Без нього fühlen означає «мацати, відчувати рукою»."

  - de: "ausruhen"
    ipa: "ˈaʊ̯sˌʁuːən"
    pos: verb
    partizip2: "sich ausgeruht"
    aux: haben
    praesens_3sg: "ruht sich aus"
    valence: "sich + Akk"
    en: "to rest"
    ru: "отдыхать"
    uk: "відпочивати"
    example_de: "Ich ruhe mich am Wochenende aus."
    example_en: "I rest at the weekend."
    example_ru: "На выходных я отдыхаю."
    example_uk: "На вихідних я відпочиваю."
    note:
      en: "Separable and reflexive at once: the pronoun follows the verb and the prefix aus- goes to the very end. In the imperative: Ruh dich aus! — Ruhen Sie sich aus!"
      ru: "И отделяемый, и возвратный сразу: местоимение идёт сразу за глаголом, а приставка aus- уходит в самый конец. В императиве: Ruh dich aus! — Ruhen Sie sich aus!"
      uk: "І відокремлюване, і зворотне водночас: займенник іде одразу за дієсловом, а префікс aus- іде в самий кінець. В імперативі: Ruh dich aus! — Ruhen Sie sich aus!"

  - de: "täglich"
    ipa: "ˈtɛːklɪç"
    pos: adv
    en: "daily; a day"
    ru: "ежедневно; в день"
    uk: "щодня; на день"
    example_de: "Nehmen Sie die Tabletten dreimal täglich."
    example_en: "Take the tablets three times a day."
    example_ru: "Принимайте таблетки три раза в день."
    example_uk: "Приймайте таблетки тричі на день."
    note:
      en: "Counted doses are built with -mal: einmal täglich, zweimal täglich, dreimal täglich. This is the phrase on every medicine label."
      ru: "Кратность приёма строится через -mal: einmal täglich, zweimal täglich, dreimal täglich. Именно эта формула стоит на упаковке любого лекарства."
      uk: "Кратність прийому будується через -mal: einmal täglich, zweimal täglich, dreimal täglich. Саме ця формула стоїть на упаковці будь-яких ліків."

  - de: "Seit wann haben Sie die Beschwerden?"
    pos: phrase
    en: "How long have you had these symptoms?"
    ru: "С каких пор у вас эти жалобы?"
    uk: "Відколи у вас ці скарги?"
    example_de: "Guten Tag! Seit wann haben Sie die Beschwerden?"
    example_en: "Good afternoon! How long have you had these symptoms?"
    example_ru: "Здравствуйте! С каких пор у вас эти жалобы?"
    example_uk: "Добрий день! Відколи у вас ці скарги?"
    note:
      en: "The first question in every surgery. Answer it with seit + Dativ: Seit Freitag. — Seit drei Tagen."
      ru: "Первый вопрос в любом кабинете. Отвечают через seit + Dativ: Seit Freitag. — Seit drei Tagen."
      uk: "Перше питання в будь-якому кабінеті. Відповідають через seit + Dativ: Seit Freitag. — Seit drei Tagen."

  - de: "Mir tut der Hals weh."
    pos: phrase
    en: "My throat hurts."
    ru: "У меня болит горло."
    uk: "У мене болить горло."
    example_de: "Ich fühle mich nicht gut. Mir tut der Hals weh."
    example_en: "I do not feel well. My throat hurts."
    example_ru: "Я чувствую себя нехорошо. У меня болит горло."
    example_uk: "Я почуваюся недобре. У мене болить горло."
    note:
      en: "Learn the frame whole and swap the body part: Mir tut der Kopf / der Bauch / der Rücken weh. Several parts take the plural verb — Mir tun die Füße weh."
      ru: "Заучите рамку целиком и меняйте только часть тела: Mir tut der Kopf / der Bauch / der Rücken weh. Если болит несколько мест, глагол во множественном числе — Mir tun die Füße weh."
      uk: "Завчіть рамку цілком і міняйте лише частину тіла: Mir tut der Kopf / der Bauch / der Rücken weh. Якщо болить кілька місць, дієслово у множині — Mir tun die Füße weh."

  - de: "Sie sollten viel Wasser trinken."
    pos: phrase
    en: "You should drink a lot of water."
    ru: "Вам следует много пить."
    uk: "Вам слід пити багато води."
    example_de: "Sie haben eine Erkältung. Sie sollten viel Wasser trinken."
    example_en: "You have a cold. You should drink a lot of water."
    example_ru: "У вас простуда. Вам следует много пить."
    example_uk: "У вас застуда. Вам слід пити багато води."
    note:
      en: "The doctor's advice formula. sollten holds position 2 and the infinitive waits at the end: Sie sollten zwei Tage zu Hause bleiben."
      ru: "Формула врачебного совета. sollten стоит на втором месте, а инфинитив ждёт в конце: Sie sollten zwei Tage zu Hause bleiben."
      uk: "Формула лікарської поради. sollten стоїть на другому місці, а інфінітив чекає в кінці: Sie sollten zwei Tage zu Hause bleiben."

  - de: "Gute Besserung!"
    ipa: "ˈguːtə ˈbɛsəʁʊŋ"
    pos: phrase
    en: "Get well soon!"
    ru: "Выздоравливайте!"
    uk: "Одужуйте!"
    example_de: "Auf Wiedersehen, Herr Vogel, und gute Besserung!"
    example_en: "Goodbye, Mr Vogel, and get well soon!"
    example_ru: "До свидания, господин Фогель, и выздоравливайте!"
    example_uk: "До побачення, пане Фоґель, і одужуйте!"
    note:
      en: "What everybody says to somebody who is ill — the doctor, the pharmacist, your colleagues. It needs no verb."
      ru: "То, что говорят заболевшему все — врач, аптекарь, коллеги. Глагол в этом обороте не нужен."
      uk: "Те, що кажуть хворому всі — лікар, аптекар, колеги. Дієслово в цьому звороті не потрібне."
