# Goethe-A2 Wortliste completion deck — unowned by any topic (gates its fresh cards
# on the learner's level, not on a topic being opened). Drains the Schule und
# Schulfächer section plus the school nouns of arbeit-schule-ausbildung.
id: schule-faecher-a2
title_de: "Schule & Schulfächer"
title_en: "School & school subjects"
title_ru: "Школа и школьные предметы"
level: A2
entries:
  - de: markieren
    ipa: "maʁˈkiːʁən"
    pos: verb
    praesens_3sg: markiert
    partizip2: markiert
    aux: haben
    valence: "+ Akk"
    en: to mark, to highlight
    ru: отмечать, выделять
    example_de: Markieren Sie die richtige Antwort.
    example_en: Mark the correct answer.
    example_ru: Отметьте правильный ответ.
    note:
      en: "The verb of exam rubrics: Markieren Sie die richtige Antwort. An -ieren verb, so the Partizip II carries no ge-: hat markiert. In a text you markieren the important words — with a pen or a highlighter."
      ru: "Глагол из экзаменационных заданий: Markieren Sie die richtige Antwort. Глагол на -ieren, поэтому Partizip II без ge-: hat markiert. В тексте markieren можно важные слова — ручкой или маркером."
  - de: Punkt
    ipa: "ˈpʊŋkt"
    pos: noun
    gender: m
    plural: "die Punkte"
    en: point (in a test score); dot, full stop
    ru: балл; точка
    example_de: Für die letzte Aufgabe gibt es zwei Punkte.
    example_en: There are two points for the last task.
    example_ru: За последнее задание дают два балла.
    note:
      en: "In an exam a Punkt is a point you score: Du hast achtzehn von zwanzig Punkten. The same word is the dot at the end of a sentence, and the dot you say in a web address."
      ru: "На экзамене Punkt — это балл: Du hast achtzehn von zwanzig Punkten. Тем же словом называют точку в конце предложения и точку в адресе сайта."
  - de: Teil
    ipa: "ˈtaɪ̯l"
    pos: noun
    gender: m
    plural: "die Teile"
    en: part, section
    ru: часть, раздел
    example_de: Lesen Sie den Text in Teil eins.
    example_en: Read the text in part one.
    example_ru: Прочитайте текст в первой части.
    note:
      en: "der Teil is a part of something bigger — an exam has Teil 1 and Teil 2, a town has Stadtteile. The verb behind it is teilen (to divide, to share)."
      ru: "der Teil — часть чего-то большего: у экзамена есть Teil 1 и Teil 2, у города — Stadtteile. От этого слова образован глагол teilen («делить»)."
  - de: Text
    ipa: "ˈtɛkst"
    pos: noun
    gender: m
    plural: "die Texte"
    en: text
    ru: текст
    example_de: Der Text ist kurz, aber nicht leicht.
    example_en: The text is short, but it is not easy.
    example_ru: Текст короткий, но нелёгкий.
    note:
      en: "The exam word: Lesen Sie den Text und markieren Sie die richtige Antwort. A text you write yourself is also a Text — einen Text schreiben."
      ru: "Экзаменационное слово: Lesen Sie den Text und markieren Sie die richtige Antwort. Текст, который пишете вы сами, тоже Text — einen Text schreiben."
  - de: Abitur
    ipa: "abiˈtuːɐ̯"
    pos: noun
    gender: n
    plural: "—"
    en: Abitur — the German school-leaving exam that opens the way to university
    ru: абитур — выпускной экзамен немецкой школы, дающий право поступать в университет
    example_de: Meine Tochter macht nächstes Jahr das Abitur.
    example_en: My daughter is taking the Abitur next year.
    example_ru: В следующем году моя дочь будет сдавать абитур.
    note:
      en: "There is no equivalent word: after twelve or thirteen years of school you take the Abitur, and only with it may you enrol at a university. The fixed phrase is das Abitur machen — not schreiben, not bekommen. Everybody shortens it to das Abi."
      ru: "Точного соответствия нет: после двенадцати-тринадцати лет школы сдают Abitur, и только с ним можно поступать в университет. Устойчивое выражение — das Abitur machen, а не schreiben или bekommen. В разговоре все сокращают до das Abi."
  - de: Direktor
    ipa: "diˈʁɛktoːɐ̯"
    pos: noun
    gender: m
    plural: "die Direktoren"
    en: head teacher, principal (of a school)
    ru: директор (школы)
    example_de: Der Direktor spricht heute mit den Eltern.
    example_en: The head teacher is speaking to the parents today.
    example_ru: Сегодня директор разговаривает с родителями.
    note:
      en: "The stress moves when the word grows: Di-REK-tor, but Di-rek-TO-ren in the plural — the same shift as Autor / Autoren. A woman in the job is die Direktorin."
      ru: "Ударение сдвигается, когда слово удлиняется: Di-REK-tor, но Di-rek-TO-ren во множественном числе — тот же сдвиг, что у Autor / Autoren. Женщина на этой должности — die Direktorin."
  - de: Klassenfahrt
    ipa: "ˈklasn̩ˌfaːɐ̯t"
    pos: noun
    gender: f
    plural: "die Klassenfahrten"
    en: school trip (the whole class travels together)
    ru: поездка класса, школьная поездка с ночёвкой
    example_de: Im Mai fahren wir auf Klassenfahrt nach Berlin.
    example_en: In May we are going on a school trip to Berlin.
    example_ru: В мае мы всем классом едем в Берлин.
    note:
      en: "Not an afternoon outing: on a Klassenfahrt the class travels away and stays for several days. The phrase is auf Klassenfahrt fahren, with no article."
      ru: "Это не прогулка на пару часов: на Klassenfahrt класс уезжает на несколько дней. Устойчивое выражение — auf Klassenfahrt fahren, без артикля."
  - de: Sekretariat
    ipa: "zekʁetaʁiˈaːt"
    pos: noun
    gender: n
    plural: "die Sekretariate"
    en: school office, secretary's office
    ru: секретариат, канцелярия (школы)
    example_de: Das Formular bekommst du im Sekretariat.
    example_en: You can get the form from the school office.
    example_ru: Бланк можно получить в секретариате.
    note:
      en: "Every German school has one: the room where you hand in forms, report an absence or ask for the head teacher. Stress on the last syllable: Se-kre-ta-ri-AT."
      ru: "Есть в каждой немецкой школе: комната, куда сдают бланки, сообщают о пропуске или обращаются к директору. Ударение на последнем слоге: Se-kre-ta-ri-AT."
  - de: Stundenplan
    ipa: "ˈʃtʊndn̩ˌplaːn"
    pos: noun
    gender: m
    plural: "die Stundenpläne"
    en: timetable, class schedule
    ru: расписание уроков
    example_de: Am Montag steht Mathematik auf dem Stundenplan.
    example_en: On Monday maths is on the timetable.
    example_ru: В понедельник в расписании стоит математика.
    note:
      en: "die Stunde here is a school lesson, not sixty minutes — a Stundenplan is the plan of the lessons. Umlaut in the plural: die Stundenpläne."
      ru: "die Stunde здесь — школьный урок, а не шестьдесят минут: Stundenplan — план уроков. Во множественном числе умлаут: die Stundenpläne."
  - de: Biologie
    ipa: "bioloˈgiː"
    pos: noun
    gender: f
    plural: "—"
    en: biology
    ru: биология
    example_de: In Biologie lernen wir heute etwas über Pflanzen.
    example_en: In biology today we are learning something about plants.
    example_ru: На биологии мы сегодня узнаём кое-что о растениях.
    note:
      en: "School subjects stand bare, with no article: Ich habe heute Biologie. In Biologie schreiben wir einen Test. Stress on the last syllable — Bi-o-lo-GIE — and in speech everybody says Bio."
      ru: "Названия предметов стоят без артикля: Ich habe heute Biologie. In Biologie schreiben wir einen Test. Ударение на последнем слоге — Bi-o-lo-GIE, а в речи все говорят Bio."
  - de: Chemie
    ipa: "çeˈmiː"
    pos: noun
    gender: f
    plural: "—"
    en: chemistry
    ru: химия
    example_de: Chemie ist mein Lieblingsfach.
    example_en: Chemistry is my favourite subject.
    example_ru: Химия — мой любимый предмет.
    note:
      en: "In standard German the Ch- at the front is the soft sound of ich: che-MIE, not ke-MIE. Stress on the last syllable, like almost every subject in -ie."
      ru: "В литературном произношении начальное Ch- звучит мягко, как в ich: che-MIE, а не ke-MIE. Ударение на последнем слоге, как почти у всех предметов на -ie."
  - de: Französisch
    ipa: "fʁanˈtsøːzɪʃ"
    pos: noun
    gender: n
    plural: "—"
    en: French (the language, the school subject)
    ru: французский язык (в том числе как школьный предмет)
    example_de: Mein Bruder lernt seit zwei Jahren Französisch.
    example_en: My brother has been learning French for two years.
    example_ru: Мой брат уже два года учит французский.
    note:
      en: "Language names are neuter: das Französisch, das Latein, das Deutsch. In an ordinary sentence they stand bare — Ich lerne Französisch, Er spricht gut Französisch — and the article only turns up with an adjective: Sein Französisch ist sehr gut."
      ru: "Названия языков — среднего рода: das Französisch, das Latein, das Deutsch. В обычной фразе они стоят без артикля — Ich lerne Französisch, Er spricht gut Französisch, — а артикль появляется только вместе с прилагательным: Sein Französisch ist sehr gut."
  - de: Geografie
    ipa: "geogʁaˈfiː"
    pos: noun
    gender: f
    # Both spellings are standard German.
    accept: ["die Geographie"]
    plural: "—"
    en: geography
    ru: география
    example_de: In Geografie sprechen wir über Flüsse und Berge.
    example_en: In geography we talk about rivers and mountains.
    example_ru: На географии мы говорим о реках и горах.
    note:
      en: "Both spellings are correct: Geografie and Geographie. Stress on the last syllable: Geo-gra-FIE."
      ru: "Верны оба написания: Geografie и Geographie. Ударение на последнем слоге: Geo-gra-FIE."
  - de: Geschichte
    ipa: "gəˈʃɪçtə"
    pos: noun
    gender: f
    plural: "—"
    en: history (the school subject); a story
    ru: история (школьный предмет); рассказ, история
    example_de: Geschichte finde ich interessanter als Physik.
    example_en: I find history more interesting than physics.
    example_ru: История мне интереснее физики.
    note:
      en: "One word, two meanings. As the school subject and as the past it has no plural: Geschichte war schon immer mein Fach. As a story it can be counted — Meine Oma erzählt gern Geschichten."
      ru: "Одно слово — два значения. Как школьный предмет и как прошлое оно не имеет множественного числа: Geschichte war schon immer mein Fach. В значении «рассказ» оно считается: Meine Oma erzählt gern Geschichten."
  - de: Kunst
    ipa: "ˈkʊnst"
    pos: noun
    gender: f
    plural: "—"
    en: art (the school subject; also art in general)
    ru: искусство; рисование (школьный предмет)
    example_de: In Kunst malen wir heute mit Wasserfarben.
    example_en: In art today we are painting with watercolours.
    example_ru: На уроке рисования мы сегодня рисуем акварелью.
    note:
      en: "At school Kunst is the lesson where you draw and paint; outside school it is art in the wide sense — pictures, museums, music. The person who makes it is der Künstler or die Künstlerin."
      ru: "В школе Kunst — урок рисования; вне школы это искусство в широком смысле: картины, музеи, музыка. Тот, кто им занимается, — der Künstler или die Künstlerin."
  - de: Latein
    ipa: "laˈtaɪ̯n"
    pos: noun
    gender: n
    plural: "—"
    en: Latin
    ru: латынь, латинский язык
    example_de: Latein ist eine alte Sprache, aber viele Schüler lernen sie noch.
    example_en: Latin is an old language, but many pupils still learn it.
    example_ru: Латынь — древний язык, но многие ученики всё ещё её учат.
    note:
      en: "Neuter, like every language name: das Latein. At a Gymnasium it is still a normal subject on the timetable, often chosen instead of French."
      ru: "Средний род, как у всех названий языков: das Latein. В гимназии это до сих пор обычный предмет в расписании, который часто выбирают вместо французского."
  - de: Mathematik
    ipa: "matemaˈtiːk"
    pos: noun
    gender: f
    plural: "—"
    en: mathematics, maths
    ru: математика
    example_de: Mathematik ist für viele Schüler das schwerste Fach.
    example_en: For a lot of pupils maths is the hardest subject.
    example_ru: Для многих учеников математика — самый трудный предмет.
    note:
      en: "In speech everybody says Mathe: Ich habe heute Mathe. The full form Mathematik is the written, official one, and it is stressed on the last syllable: Ma-the-ma-TIK."
      ru: "В речи все говорят Mathe: Ich habe heute Mathe. Полная форма Mathematik — письменная, официальная, с ударением на последнем слоге: Ma-the-ma-TIK."
  - de: Physik
    ipa: "fyˈziːk"
    pos: noun
    gender: f
    plural: "—"
    en: physics
    ru: физика
    example_de: In Physik machen wir oft Experimente.
    example_en: In physics we often do experiments.
    example_ru: На физике мы часто ставим опыты.
    note:
      en: "Stress on the last syllable — Phy-SIK — and the y sounds like the ü in Bücher. The subject is feminine: die Physik."
      ru: "Ударение на последнем слоге — Phy-SIK, а буква y читается как ü в слове Bücher. Предмет женского рода: die Physik."
  - de: Religion
    ipa: "ʁeliˈgi̯oːn"
    pos: noun
    gender: f
    plural: "—"
    en: religious education (the school subject); religion
    ru: религия; урок религии (школьный предмет)
    example_de: Am Freitag haben wir Religion und Sport.
    example_en: On Friday we have religious education and PE.
    example_ru: В пятницу у нас религия и физкультура.
    note:
      en: "In most German states Religion is a normal subject on the timetable; pupils who do not want it take Ethik instead. Stress on the last syllable: Re-li-gi-ON."
      ru: "В большинстве федеральных земель Religion — обычный предмет в расписании; кто не хочет его посещать, идёт на Ethik. Ударение на последнем слоге: Re-li-gi-ON."
  - de: Sozialkunde
    ipa: "zoˈtsi̯aːlˌkʊndə"
    pos: noun
    gender: f
    plural: "—"
    en: social studies, civics
    ru: обществознание
    example_de: In Sozialkunde sprechen wir über Politik.
    example_en: In social studies we talk about politics.
    example_ru: На обществознании мы говорим о политике.
    note:
      en: "The subject about society and the state: how a government works, how an election works. The name changes from state to state — Sozialkunde, Politik, Gemeinschaftskunde."
      ru: "Предмет об обществе и государстве: как устроена власть, как проходят выборы. Название меняется от земли к земле — Sozialkunde, Politik, Gemeinschaftskunde."
  - de: Zeugnis
    ipa: "ˈtsɔʏ̯knɪs"
    pos: noun
    gender: n
    plural: "die Zeugnisse"
    en: school report; certificate
    ru: табель, аттестат, свидетельство
    example_de: Am letzten Schultag bekommen alle Kinder ihr Zeugnis.
    example_en: On the last day of school all the children get their reports.
    example_ru: В последний учебный день все дети получают табель.
    note:
      en: "The sheet with all your Noten on it. German pupils get one twice a year, and the last one — das Abschlusszeugnis — is what an employer asks to see."
      ru: "Лист, на котором стоят все ваши Noten. Немецкие школьники получают его дважды в год, а последний — das Abschlusszeugnis — спрашивают работодатели."
  - de: Note
    ipa: "ˈnoːtə"
    pos: noun
    gender: f
    plural: "die Noten"
    en: mark, grade (at school)
    ru: оценка, отметка (в школе)
    example_de: Anna hat in Englisch eine gute Note bekommen.
    example_en: Anna got a good mark in English.
    example_ru: Анна получила хорошую оценку по английскому.
    note:
      en: "German grades run the other way round: 1 is the best and 6 the worst, so eine Eins is excellent and eine Fünf is a fail. Never ask for a high grade — ask for eine gute Note. The same word also means a note in music."
      ru: "Немецкие оценки идут в обратную сторону: 1 — лучшая, 6 — худшая. Поэтому eine Eins — это «отлично», а eine Fünf — «неуд»; привычная «пятёрка» здесь была бы плохой оценкой. Тем же словом называют и ноту в музыке."
  - de: Fach
    ipa: "ˈfax"
    pos: noun
    gender: n
    plural: "die Fächer"
    en: (school) subject
    ru: предмет (школьный)
    example_de: Mein Lieblingsfach ist Chemie.
    example_en: My favourite subject is chemistry.
    example_ru: Мой любимый предмет — химия.
    note:
      en: "Umlaut in the plural: das Fach, die Fächer. The word also names a compartment or a shelf — ein Fach im Schrank — and it lives inside das Lieblingsfach, your favourite subject."
      ru: "Умлаут во множественном числе: das Fach, die Fächer. Слово означает также «отделение, полку» — ein Fach im Schrank — и входит в состав das Lieblingsfach («любимый предмет»)."
  - de: Heft
    ipa: "ˈhɛft"
    pos: noun
    gender: n
    plural: "die Hefte"
    en: exercise book, notebook
    ru: тетрадь
    example_de: Schreibt den Satz bitte in euer Heft.
    example_en: Please write the sentence in your exercise books.
    example_ru: Запишите, пожалуйста, это предложение в тетрадь.
    note:
      en: "das Heft is the thin book you write in; das Buch is the printed one you read from. In class you hear Nehmt bitte eure Hefte heraus."
      ru: "das Heft — тонкая тетрадь, в которой пишут; das Buch — печатная книга, которую читают. На уроке звучит: Nehmt bitte eure Hefte heraus."
  - de: Bleistift
    ipa: "ˈblaɪ̯ˌʃtɪft"
    pos: noun
    gender: m
    plural: "die Bleistifte"
    en: pencil
    ru: карандаш
    example_de: Schreiben Sie bitte nicht mit Bleistift.
    example_en: Please do not write in pencil.
    example_ru: Пожалуйста, не пишите карандашом.
    note:
      en: "das Blei is lead, so a Bleistift is literally a lead-pen: a pencil, and only a pencil. Writing in pencil is mit Bleistift schreiben, with no article."
      ru: "das Blei — свинец, поэтому Bleistift буквально «свинцовый стержень», то есть именно карандаш. «Писать карандашом» — mit Bleistift schreiben, без артикля."
  - de: Stift
    ipa: "ˈʃtɪft"
    pos: noun
    gender: m
    plural: "die Stifte"
    en: pen, pencil (anything you write with)
    ru: ручка, карандаш (любая палочка для письма)
    example_de: Hast du einen Stift für mich?
    example_en: Have you got a pen I could borrow?
    example_ru: У тебя есть ручка для меня?
    note:
      en: "der Stift is the general word — a pen, a pencil, a felt tip, whatever writes. When you have to be exact, say der Bleistift (a pencil) or der Kugelschreiber (a ballpoint pen)."
      ru: "der Stift — общее слово: ручка, карандаш, фломастер — всё, чем пишут. Когда нужна точность, говорят der Bleistift (карандаш) или der Kugelschreiber (шариковая ручка)."
  - de: Blatt
    ipa: "ˈblat"
    pos: noun
    gender: n
    plural: "die Blätter"
    en: sheet (of paper); leaf
    ru: лист (бумаги); лист (на дереве)
    example_de: Nehmt bitte ein Blatt Papier und einen Stift.
    example_en: Please take a sheet of paper and a pen.
    example_ru: Возьмите, пожалуйста, лист бумаги и ручку.
    note:
      en: "Two meanings in one word: a sheet of paper, and a leaf on a tree — im Herbst fallen die Blätter. In ein Blatt Papier the second noun stands bare, with no article and no ending. Umlaut in the plural: die Blätter."
      ru: "Два значения у одного слова: лист бумаги и лист на дереве — im Herbst fallen die Blätter. В сочетании ein Blatt Papier второе существительное стоит без артикля и без окончания. Во множественном числе умлаут: die Blätter."
  - de: Papier
    ipa: "paˈpiːɐ̯"
    pos: noun
    gender: n
    plural: "die Papiere"
    en: paper
    ru: бумага
    example_de: Wir brauchen noch Papier für den Drucker.
    example_en: We still need paper for the printer.
    example_ru: Нам ещё нужна бумага для принтера.
    note:
      en: "As a material Papier takes no article and no plural: Ich brauche Papier. The plural die Papiere means documents — Zeigen Sie mir bitte Ihre Papiere."
      ru: "Как материал Papier не имеет ни артикля, ни множественного числа: Ich brauche Papier. Множественное die Papiere означает «документы»: Zeigen Sie mir bitte Ihre Papiere."
  - de: Kindergarten
    ipa: "ˈkɪndɐˌgaʁtn̩"
    pos: noun
    gender: m
    plural: "die Kindergärten"
    en: kindergarten, nursery school
    ru: детский сад
    example_de: Mein Sohn geht seit einem Jahr in den Kindergarten.
    example_en: My son has been going to nursery for a year.
    example_ru: Мой сын уже год ходит в детский сад.
    note:
      en: "German children go to the Kindergarten from about three until school starts at six — so it is not a school year, and not a classroom. Umlaut in the plural: die Kindergärten."
      ru: "В Германии дети ходят в Kindergarten примерно с трёх лет и до школы, то есть до шести: это ещё не школьный класс. Во множественном числе умлаут: die Kindergärten."
  - de: Notiz
    ipa: "noˈtiːts"
    pos: noun
    gender: f
    plural: "die Notizen"
    en: note (something written down)
    ru: заметка, запись
    example_de: Im Unterricht mache ich mir immer Notizen.
    example_en: I always take notes in class.
    example_ru: На уроке я всегда делаю заметки.
    note:
      en: "The fixed phrase is Notizen machen — very often with a dative pronoun: sich Notizen machen. Do not mix it up with die Note, which is a school grade."
      ru: "Устойчивое сочетание — Notizen machen, очень часто с местоимением в Dativ: sich Notizen machen. Не путайте с die Note — школьной оценкой."
  - de: Thema
    ipa: "ˈteːma"
    pos: noun
    gender: n
    plural: "die Themen"
    en: topic, subject (of a text or a conversation)
    ru: тема
    example_de: Unser Thema heute ist die Familie.
    example_en: Our topic today is the family.
    example_ru: Наша сегодняшняя тема — семья.
    note:
      en: "Irregular plural: das Thema, die Themen — never Themas. The same pattern as das Museum, die Museen. What a text is about is das Thema; the subject you have at nine o'clock is das Fach."
      ru: "Нерегулярное множественное число: das Thema, die Themen — но не Themas. Та же модель, что у das Museum, die Museen. То, о чём текст, — das Thema; школьный предмет в расписании — das Fach."
  - de: Satz
    ipa: "ˈzats"
    pos: noun
    gender: m
    plural: "die Sätze"
    en: sentence
    ru: предложение (грамматическое)
    example_de: Bitte lesen Sie den ersten Satz noch einmal.
    example_en: Please read the first sentence again.
    example_ru: Прочитайте, пожалуйста, первое предложение ещё раз.
    note:
      en: "Umlaut in the plural: der Satz, die Sätze. In tennis the same word is a set — Er hat den ersten Satz gewonnen. The verb behind it is setzen."
      ru: "Умлаут во множественном числе: der Satz, die Sätze. В теннисе то же слово означает «сет»: Er hat den ersten Satz gewonnen. Осторожно: русское «предложение» в смысле «оферта» — это das Angebot, а не der Satz."
  - de: Übersetzung
    ipa: "ˈyːbɐˌzɛtsʊŋ"
    pos: noun
    gender: f
    plural: "die Übersetzungen"
    en: translation
    ru: перевод
    example_de: Die Übersetzung von diesem Wort finde ich nicht.
    example_en: I cannot find the translation of this word.
    example_ru: Я не могу найти перевод этого слова.
    note:
      en: "From übersetzen (to translate), which in this meaning is inseparable: Er übersetzt den Text, Er hat den Text übersetzt — no ge-, and the prefix never splits off. Nouns ending in -ung are always feminine."
      ru: "Образовано от глагола übersetzen («переводить»), который в этом значении неотделяемый: Er übersetzt den Text, Er hat den Text übersetzt — без ge-, приставка не отделяется. Существительные на -ung всегда женского рода."
