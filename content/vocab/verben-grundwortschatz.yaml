id: verben-grundwortschatz
title_de: "Verben: Grundwortschatz"
title_en: "Core verbs"
title_ru: "Базовые глаголы"
level: A1
entries:
  - { de: "haben", ipa: "ˈhaːbn̩", pos: verb, en: "to have", ru: "иметь", example_de: "Ich habe einen Bruder.", example_en: "I have a brother.", example_ru: "У меня есть брат.", partizip2: "gehabt", aux: "haben", praesens_3sg: "hat" }
  - { de: "werden", ipa: "ˈveːɐ̯dn̩", pos: verb, en: "to become", ru: "становиться", example_de: "Sie wird Lehrerin.", example_en: "She is becoming a teacher.", example_ru: "Она становится учительницей.", partizip2: "geworden", aux: "sein", praesens_3sg: "wird", note: { en: "The Perfekt uses sein, not haben, even though nothing moves: Sie ist Lehrerin geworden — treat werden like the fixed sein-verbs (sein, bleiben, passieren).", ru: "В перфекте — sein, а не haben, хотя движения нет: Sie ist Lehrerin geworden — werden ведёт себя как sein, bleiben, passieren." } }
  - { de: "öffnen", ipa: "ˈœfnən", pos: verb, en: "to open", ru: "открывать", example_de: "Ich öffne das Fenster.", example_en: "I open the window.", example_ru: "Я открываю окно.", partizip2: "geöffnet", aux: "haben", praesens_3sg: "öffnet", valence: "+ Akk" }
  - { de: "schließen", ipa: "ˈʃliːsn̩", pos: verb, en: "to close", ru: "закрывать", example_de: "Er schließt die Tür.", example_en: "He closes the door.", example_ru: "Он закрывает дверь.", partizip2: "geschlossen", aux: "haben", praesens_3sg: "schließt", valence: "+ Akk" }
  - { de: "liegen", ipa: "ˈliːgn̩", pos: verb, en: "to lie; to be lying", ru: "лежать", example_de: "Der Schlüssel liegt hier.", example_en: "The key is lying here.", example_ru: "Ключ лежит здесь.", partizip2: "gelegen", aux: "haben", praesens_3sg: "liegt", note: { en: "A pure state verb: it describes something already lying somewhere and never takes a direct object. Compare legen (to lay/put), which is the action of placing it there.", ru: "Глагол состояния: предмет уже где-то лежит, прямого дополнения нет. Ср. legen (класть) — само действие укладывания." } }
  - { de: "sitzen", ipa: "ˈzɪtsn̩", pos: verb, en: "to sit; to be sitting", ru: "сидеть", example_de: "Die Katze sitzt dort.", example_en: "The cat is sitting there.", example_ru: "Кошка сидит там.", partizip2: "gesessen", aux: "haben", praesens_3sg: "sitzt", note: { en: "Another state verb, like liegen: someone is already sitting, no direct object. Its action counterpart is setzen (to sit someone/something down).", ru: "Ещё один глагол состояния, как liegen: кто-то уже сидит, дополнения нет. Глагол действия к нему — setzen (усадить, посадить)." } }
  - { de: "stellen", ipa: "ˈʃtɛlən", pos: verb, en: "to put, to place (upright)", ru: "ставить", example_de: "Sie stellt die Lampe auf den Tisch.", example_en: "She puts the lamp on the table.", example_ru: "Она ставит лампу на стол.", partizip2: "gestellt", aux: "haben", praesens_3sg: "stellt", valence: "+ Akk", note: { en: "The action counterpart of stehen (to stand): stellen means putting something into an upright/standing position, unlike legen, which is for flat objects.", ru: "Глагол действия к stehen (стоять): stellen — поставить что-то в стоячее положение, в отличие от legen, которое про плоские предметы." } }
  - { de: "legen", ipa: "ˈleːgn̩", pos: verb, en: "to lay, to put (flat)", ru: "класть", example_de: "Ich lege das Buch auf den Tisch.", example_en: "I put the book on the table.", example_ru: "Я кладу книгу на стол.", partizip2: "gelegt", aux: "haben", praesens_3sg: "legt", valence: "+ Akk", note: { en: "The action counterpart of liegen: legen describes putting something into a lying position (ich lege das Buch hin), while liegen describes it already being there.", ru: "Парный глагол действия к liegen: legen — положить что-то в лежачее положение, а liegen — уже лежать там." } }
  - { de: "holen", ipa: "ˈhoːlən", pos: verb, en: "to fetch, to get", ru: "приносить, доставать", example_de: "Er holt das Brot.", example_en: "He gets the bread.", example_ru: "Он идёт за хлебом.", partizip2: "geholt", aux: "haben", praesens_3sg: "holt", valence: "+ Akk" }
  - { de: "bringen", ipa: "ˈbʁɪŋən", pos: verb, en: "to bring", ru: "приносить, привозить", example_de: "Der Kellner bringt das Essen.", example_en: "The waiter brings the food.", example_ru: "Официант приносит еду.", partizip2: "gebracht", aux: "haben", praesens_3sg: "bringt", valence: "+ Akk" }
  - { de: "mitmachen", ipa: "ˈmɪtˌmaxn̩", pos: verb, en: "to join in, to take part", ru: "участвовать, присоединяться", example_de: "Wir spielen ein Spiel, und Tom macht mit.", example_en: "We are playing a game, and Tom is joining in.", example_ru: "Мы играем в игру, и Том присоединяется.", partizip2: "mitgemacht", aux: "haben", praesens_3sg: "macht mit", note: { en: "Separable: the prefix mit- splits off to the very end of the clause — Tom macht mit, not Tom mitmacht.", ru: "Отделяемый глагол: приставка mit- уходит в конец предложения — Tom macht mit, а не Tom mitmacht." } }
  - { de: "vergessen", ipa: "fɛɐ̯ˈgɛsn̩", pos: verb, en: "to forget", ru: "забывать", example_de: "Ich vergesse den Schlüssel.", example_en: "I forget the key.", example_ru: "Я забываю ключ.", partizip2: "vergessen", aux: "haben", praesens_3sg: "vergisst", valence: "+ Akk", note: { en: "The Partizip II vergessen looks identical to the infinitive — no ge-, because the stress never falls on the unstressed ver- prefix, just like verstehen → verstanden.", ru: "Partizip II vergessen выглядит так же, как инфинитив — без ge-, ведь ударение не падает на безударную приставку ver-, как и у verstehen → verstanden." } }
  - { de: "schauen", ipa: "ˈʃaʊ̯ən", pos: verb, en: "to look", ru: "смотреть, глядеть", example_de: "Er schaut auf die Uhr.", example_en: "He looks at the clock.", example_ru: "Он смотрит на часы.", partizip2: "geschaut", aux: "haben", praesens_3sg: "schaut", valence: "auf + Akk" }
  - { de: "gucken", ipa: "ˈgʊkn̩", pos: verb, en: "to look, to watch (colloquial)", ru: "смотреть, глядеть (разговорное)", example_de: "Die Kinder gucken einen Film.", example_en: "The kids are watching a film.", example_ru: "Дети смотрят фильм.", partizip2: "geguckt", aux: "haben", praesens_3sg: "guckt", valence: "+ Akk", note: { en: "Colloquial and regional (mainly northern/western Germany); schauen is the neutral word that works everywhere.", ru: "Разговорное и региональное слово (в основном на севере и западе Германии); schauen — нейтральное и уместно везде." } }
  - { de: "heiraten", ipa: "ˈhaɪ̯ʁaːtn̩", pos: verb, en: "to marry, to get married", ru: "жениться, выходить замуж", example_de: "Lena heiratet Tom.", example_en: "Lena is marrying Tom.", example_ru: "Лена выходит замуж за Тома.", partizip2: "geheiratet", aux: "haben", praesens_3sg: "heiratet", valence: "+ Akk", note: { en: "heiraten takes a direct object with no preposition: Er heiratet Anna, not heiratet mit Anna.", ru: "heiraten — без предлога, прямое дополнение в Akkusativ: Er heiratet Anna. По-русски «жениться НА ком-то» есть предлог, а в немецком его нет — типичная ловушка переноса из русского." } }
  - { de: "lachen", ipa: "ˈlaxn̩", pos: verb, en: "to laugh", ru: "смеяться", example_de: "Die Kinder lachen.", example_en: "The children are laughing.", example_ru: "Дети смеются.", partizip2: "gelacht", aux: "haben", praesens_3sg: "lacht" }
  - { de: "weinen", ipa: "ˈvaɪ̯nən", pos: verb, en: "to cry", ru: "плакать", example_de: "Das Baby weint.", example_en: "The baby is crying.", example_ru: "Малыш плачет.", partizip2: "geweint", aux: "haben", praesens_3sg: "weint" }
  - { de: "lieben", ipa: "ˈliːbn̩", pos: verb, en: "to love", ru: "любить", example_de: "Ich liebe Musik.", example_en: "I love music.", example_ru: "Я люблю музыку.", partizip2: "geliebt", aux: "haben", praesens_3sg: "liebt", valence: "+ Akk" }
