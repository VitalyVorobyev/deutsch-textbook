id: termine-zeit
title_de: "Termine und Zeit"
title_en: "Appointments and time"
title_ru: "Встречи и время"
title_uk: "Зустрічі та час"
level: A2
entries:
  - de: Termin
    ipa: "tɛɐ̯ˈmiːn"
    pos: noun
    gender: m
    plural: die Termine
    en: appointment
    ru: приём, деловая встреча
    uk: прийом, ділова зустріч
    example_de: Ich habe morgen einen Termin beim Arzt.
    example_en: I have a doctor's appointment tomorrow.
    example_ru: У меня завтра приём у врача.
    example_uk: У мене завтра прийом у лікаря.
  - de: Uhrzeit
    ipa: "ˈuːɐ̯ˌtsaɪ̯t"
    pos: noun
    gender: f
    plural: die Uhrzeiten
    en: time (of day)
    ru: время (по часам)
    uk: час (за годинником)
    example_de: Welche Uhrzeit passt Ihnen am besten?
    example_en: What time suits you best?
    example_ru: Какое время вам больше всего подходит?
    example_uk: Який час вам найбільше підходить?
  - de: Kalender
    ipa: "kaˈlɛndɐ"
    pos: noun
    gender: m
    plural: die Kalender
    en: calendar
    ru: календарь, ежедневник
    uk: календар, щоденник
    example_de: Ich schreibe den Termin in meinen Kalender.
    example_en: I write the appointment down in my calendar.
    example_ru: Я записываю встречу в свой ежедневник.
    example_uk: Я записую зустріч у свій щоденник.
  - de: Verabredung
    ipa: "fɛɐ̯ˈʔapʁeːdʊŋ"
    pos: noun
    gender: f
    plural: die Verabredungen
    en: arrangement to meet (private)
    ru: договорённость о встрече (личной)
    uk: домовленість про зустріч (особисту)
    example_de: Ich habe heute Abend eine Verabredung mit Anna.
    example_en: I am meeting Anna this evening.
    example_ru: Сегодня вечером я встречаюсь с Анной.
    example_uk: Сьогодні ввечері я зустрічаюся з Анною.
    note:
      en: A private arrangement with friends; an official appointment (doctor, office) is "der Termin".
      ru: Личная договорённость с друзьями; официальная запись (к врачу, в учреждение) — это "der Termin".
      uk: Особиста домовленість із друзями; офіційний запис (до лікаря, до установи) — це "der Termin".
  - de: Praxis
    ipa: "ˈpʁaksɪs"
    pos: noun
    gender: f
    plural: die Praxen
    en: doctor's practice / office
    ru: врачебная практика, приёмная врача
    uk: лікарська практика, приймальня лікаря
    example_de: Die Praxis ist am Freitag geschlossen.
    example_en: The practice is closed on Friday.
    example_ru: Приёмная врача в пятницу закрыта.
    example_uk: Приймальня лікаря в п'ятницю зачинена.
    note:
      en: 'Irregular plural: die Praxen.'
      ru: 'Нерегулярное множественное число: die Praxen.'
      uk: 'Нерегулярна множина: die Praxen.'
  - de: Arzt
    ipa: "ˈaːɐ̯tst"
    pos: noun
    gender: m
    plural: die Ärzte
    en: doctor (male)
    ru: врач (мужчина)
    uk: лікар
    example_de: Der Arzt hat heute leider keine Zeit.
    example_en: Unfortunately the doctor has no time today.
    example_ru: К сожалению, у врача сегодня нет времени.
    example_uk: На жаль, у лікаря сьогодні немає часу.
  - de: Ärztin
    ipa: "ˈɛːɐ̯tstɪn"
    pos: noun
    gender: f
    plural: die Ärztinnen
    en: doctor (female)
    ru: врач (женщина)
    uk: лікарка
    example_de: Die Ärztin kommt gleich zu Ihnen.
    example_en: The doctor will be with you in a moment.
    example_ru: Врач сейчас к вам подойдёт.
    example_uk: Лікарка зараз до вас підійде.
  - de: Wartezimmer
    ipa: "ˈvaʁtəˌtsɪmɐ"
    pos: noun
    gender: n
    plural: die Wartezimmer
    en: waiting room
    ru: комната ожидания, приёмная
    uk: кімната очікування, приймальня
    example_de: Bitte nehmen Sie im Wartezimmer Platz.
    example_en: Please take a seat in the waiting room.
    example_ru: Пожалуйста, присядьте в комнате ожидания.
    example_uk: Будь ласка, сідайте в кімнаті очікування.
  - de: Kollege
    ipa: "kɔˈleːgə"
    pos: noun
    gender: m
    plural: die Kollegen
    en: colleague (male)
    ru: коллега (мужчина)
    uk: колега (чоловік)
    example_de: Mein Kollege ist heute nicht im Büro.
    example_en: My colleague is not in the office today.
    example_ru: Мой коллега сегодня не в офисе.
    example_uk: Мій колега сьогодні не в офісі.
    note:
      en: 'Weak noun: all forms except the nominative singular add -n — den Kollegen, dem Kollegen.'
      ru: 'Слабое существительное: во всех формах, кроме именительного падежа единственного числа, добавляется -n — den Kollegen, dem Kollegen.'
      uk: 'Слабкий іменник: у всіх формах, крім називного відмінка однини, додається -n — den Kollegen, dem Kollegen.'
  - de: Besprechung
    ipa: "bəˈʃpʁɛçʊŋ"
    pos: noun
    gender: f
    plural: die Besprechungen
    en: meeting (at work)
    ru: совещание
    uk: нарада
    example_de: Die Besprechung beginnt um 10 Uhr.
    example_en: The meeting starts at 10 o'clock.
    example_ru: Совещание начинается в 10 часов.
    example_uk: Нарада починається о 10 годині.
  - de: vereinbaren
    ipa: "fɛɐ̯ˈʔaɪ̯nbaːʁən"
    pos: verb
    praesens_3sg: vereinbart
    partizip2: vereinbart
    aux: haben
    valence: "+ Akk"
    en: to arrange, to agree on
    ru: договариваться о, назначать (встречу)
    uk: домовлятися про, призначати (зустріч)
    example_de: Ich möchte einen Termin vereinbaren.
    example_en: I would like to make an appointment.
    example_ru: Я хотел бы записаться на приём.
    example_uk: Я хотів би записатися на прийом.
    note:
      en: 'Inseparable prefix ver-, so the Partizip II has no ge-: vereinbart.'
      ru: 'Неотделяемая приставка ver-, поэтому в Partizip II нет ge-: vereinbart.'
      uk: 'Невідокремлюваний префікс ver-, тому в Partizip II немає ge-: vereinbart.'
  - de: absagen
    ipa: "ˈapˌzaːgn̩"
    pos: verb
    praesens_3sg: sagt ab
    partizip2: abgesagt
    aux: haben
    valence: "+ Akk"
    en: to cancel
    ru: отменять
    uk: скасовувати
    example_de: Er ist krank und sagt die Besprechung ab.
    example_en: He is ill and is cancelling the meeting.
    example_ru: Он болен и отменяет совещание.
    example_uk: Він хворий і скасовує нараду.
    note:
      en: 'Separable verb: the prefix goes to the end — er sagt ab, er hat abgesagt.'
      ru: 'Глагол с отделяемой приставкой: приставка уходит в конец — er sagt ab, er hat abgesagt.'
      uk: 'Дієслово з відокремлюваним префіксом: префікс іде в кінець — er sagt ab, er hat abgesagt.'
  - de: verschieben
    ipa: "fɛɐ̯ˈʃiːbn̩"
    pos: verb
    praesens_3sg: verschiebt
    partizip2: verschoben
    aux: haben
    valence: "+ Akk"
    en: to postpone, to move (an appointment)
    ru: переносить (встречу)
    uk: переносити (зустріч)
    example_de: Wir verschieben den Termin auf nächste Woche.
    example_en: We are moving the appointment to next week.
    example_ru: Мы переносим встречу на следующую неделю.
    example_uk: Ми переносимо зустріч на наступний тиждень.
    note:
      en: 'The new day takes "auf + Akk": den Termin auf Freitag verschieben.'
      ru: 'Новый день вводится через "auf + Akk": den Termin auf Freitag verschieben.'
      uk: 'Новий день вводиться через "auf + Akk": den Termin auf Freitag verschieben.'
  - de: passen
    ipa: "ˈpasn̩"
    pos: verb
    praesens_3sg: passt
    partizip2: gepasst
    aux: haben
    valence: "+ Dat"
    en: to suit, to be convenient
    ru: подходить, устраивать
    uk: підходити, влаштовувати
    example_de: Der Termin am Freitag passt mir gut.
    example_en: The appointment on Friday suits me well.
    example_ru: Встреча в пятницу мне вполне подходит.
    example_uk: Зустріч у п'ятницю мені цілком підходить.
    note:
      en: 'The person is in the dative: Passt es dir? Passt es Ihnen?'
      ru: 'Человек стоит в дательном падеже: Passt es dir? Passt es Ihnen?'
      uk: 'Людина стоїть у давальному відмінку: Passt es dir? Passt es Ihnen?'
  - de: klappen
    ipa: "ˈklapn̩"
    pos: verb
    praesens_3sg: klappt
    partizip2: geklappt
    aux: haben
    en: to work out
    ru: получаться, удаваться
    uk: виходити, вдаватися
    example_de: Hoffentlich klappt es morgen mit dem Termin.
    example_en: Hopefully the appointment will work out tomorrow.
    example_ru: Надеюсь, завтра с приёмом всё получится.
    example_uk: Сподіваюся, завтра з прийомом усе вийде.
    note:
      en: 'Colloquial and usually impersonal: Es klappt. / Hat es geklappt?'
      ru: 'Разговорный глагол, обычно безличный: Es klappt. / Hat es geklappt?'
      uk: 'Розмовне дієслово, зазвичай безособове: Es klappt. / Hat es geklappt?'
  - de: warten
    ipa: "ˈvaʁtn̩"
    pos: verb
    praesens_3sg: wartet
    partizip2: gewartet
    aux: haben
    valence: "auf + Akk"
    en: to wait
    ru: ждать
    uk: чекати
    example_de: Ich warte schon zwanzig Minuten auf den Arzt.
    example_en: I have already been waiting for the doctor for twenty minutes.
    example_ru: Я уже двадцать минут жду врача.
    example_uk: Я вже двадцять хвилин чекаю на лікаря.
  - de: frei
    ipa: "ˈfʁaɪ̯"
    pos: adj
    en: free, available
    ru: свободный
    uk: вільний
    example_de: Haben Sie am Donnerstag noch einen Termin frei?
    example_en: Do you still have an appointment free on Thursday?
    example_ru: У вас есть ещё свободное время на приём в четверг?
    example_uk: У вас є ще вільний час на прийом у четвер?
  - de: beschäftigt
    ipa: "bəˈʃɛftɪçt"
    pos: adj
    en: busy
    ru: занятой, занят
    uk: зайнятий
    example_de: Ich bin diese Woche sehr beschäftigt.
    example_en: I am very busy this week.
    example_ru: Я очень занят на этой неделе.
    example_uk: Я дуже зайнятий цього тижня.
  - de: pünktlich
    ipa: "ˈpʏŋktlɪç"
    pos: adj
    en: punctual, on time
    ru: пунктуальный, вовремя
    uk: пунктуальний, вчасно
    example_de: Bitte kommen Sie pünktlich zum Termin.
    example_en: Please come to the appointment on time.
    example_ru: Пожалуйста, приходите на приём вовремя.
    example_uk: Будь ласка, приходьте на прийом вчасно.
  - de: dringend
    ipa: "ˈdʁɪŋənt"
    pos: adj
    en: urgent
    ru: срочный
    uk: терміновий
    example_de: Es ist dringend — ich brauche heute noch einen Termin.
    example_en: It is urgent — I need an appointment today.
    example_ru: Это срочно — мне нужен приём ещё сегодня.
    example_uk: Це терміново — мені потрібен прийом ще сьогодні.
  - de: leider
    ipa: "ˈlaɪ̯dɐ"
    pos: adv
    en: unfortunately
    ru: к сожалению
    uk: на жаль
    example_de: Am Montag kann ich leider nicht.
    example_en: Unfortunately I can't on Monday.
    example_ru: В понедельник я, к сожалению, не могу.
    example_uk: У понеділок я, на жаль, не можу.
  - de: Haben Sie am Montag Zeit?
    pos: phrase
    en: Do you have time on Monday?
    ru: У вас есть время в понедельник?
    uk: У вас є час у понеділок?
    example_de: Haben Sie am Montag Zeit? — Ja, am Nachmittag.
    example_en: Do you have time on Monday? — Yes, in the afternoon.
    example_ru: У вас есть время в понедельник? — Да, во второй половине дня.
    example_uk: У вас є час у понеділок? — Так, у другій половині дня.
  - de: Passt es Ihnen um 15 Uhr?
    pos: phrase
    en: Does 3 p.m. suit you?
    ru: Вам удобно в 15 часов?
    uk: Вам зручно о 15 годині?
    example_de: Passt es Ihnen um 15 Uhr? — Ja, das passt mir gut.
    example_en: Does 3 p.m. suit you? — Yes, that works well for me.
    example_ru: Вам удобно в 15 часов? — Да, мне вполне подходит.
    example_uk: Вам зручно о 15 годині? — Так, мені цілком підходить.
  - de: Ich möchte einen Termin vereinbaren.
    pos: phrase
    en: I would like to make an appointment.
    ru: Я хотел бы записаться на приём.
    uk: Я хотів би записатися на прийом.
    example_de: Guten Tag, ich möchte einen Termin vereinbaren.
    example_en: Good afternoon, I would like to make an appointment.
    example_ru: Добрый день, я хотел бы записаться на приём.
    example_uk: Добрий день, я хотів би записатися на прийом.
