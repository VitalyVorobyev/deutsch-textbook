# The atlas graph and curriculum spine.
#
# `groups:` — nested conceptual domains; order controls Atlas presentation.
# `nodes:` — one node per topic, kept consistent with topic frontmatter.
# `units:` — the ordered curriculum spine: file order IS the recommended path
# (A1 units before A2; insert new units, never renumber). Every topic lives in
# exactly one unit; `bun run validate` enforces all of it. The recommended-path
# engine (src/lib/curriculum.ts + recommendedNext in src/lib/mastery.ts) and the
# Atlas map render this file.
groups:
  - id: grundlagen
    strand: foundations
    title_de: Grundlagen
    title_en: Foundations
    title_ru: Основы
  - id: einstieg
    strand: foundations
    parent: grundlagen
    title_de: Einstieg
    title_en: Getting started
    title_ru: Начало
  - id: grammatik
    strand: grammar
    title_de: Grammatik
    title_en: Grammar
    title_ru: Грамматика
  - id: satzbau
    strand: grammar
    parent: grammatik
    title_de: Satzbau
    title_en: Sentence structure
    title_ru: Структура предложения
  - id: nomen-kasus
    strand: grammar
    parent: grammatik
    title_de: Nomen & Kasus
    title_en: Nouns & cases
    title_ru: Существительные и падежи
  - id: verbformen-zeit
    strand: grammar
    parent: grammatik
    title_de: Verbformen & Zeit
    title_en: Verb forms & tense
    title_ru: Формы глагола и время
  - id: kommunikation
    strand: communication
    title_de: Kommunikation
    title_en: Communication
    title_ru: Общение
  - id: person-alltag
    strand: communication
    parent: kommunikation
    title_de: Person & Alltag
    title_en: People & everyday life
    title_ru: Люди и повседневная жизнь
  - id: transaktionen-termine
    strand: communication
    parent: kommunikation
    title_de: Transaktionen & Termine
    title_en: Transactions & appointments
    title_ru: Покупки и договорённости
  - id: wortschatz
    strand: vocabulary
    title_de: Wortschatz
    title_en: Vocabulary
    title_ru: Лексика
  - id: essen-einkaufen
    strand: vocabulary
    parent: wortschatz
    title_de: Essen & Einkaufen
    title_en: Food & shopping
    title_ru: Еда и покупки
  - id: alltag-wortschatz
    strand: vocabulary
    parent: wortschatz
    title_de: Alltag
    title_en: Everyday life
    title_ru: Повседневная жизнь
  - id: wohnen-zuhause
    strand: vocabulary
    parent: wortschatz
    title_de: Wohnen & Zuhause
    title_en: Home & living
    title_ru: Дом и жильё
  - id: unterwegs
    strand: communication
    parent: kommunikation
    title_de: Unterwegs
    title_en: Out and about
    title_ru: В городе и в пути

nodes:
  # --- A1 ---
  - id: erste-schritte
    level: A1
    kind: phonetics
    strand: foundations
    group: einstieg
    related: [menschen-familie]
    prerequisites: []
    outcomes:
      - id: erste-sich-vorstellen
        mode: spoken-production
        domain: personal
        de: "Ich kann mich mit Name, Herkunft und Sprache kurz vorstellen."
        en: "I can briefly introduce myself with my name, origin and language."
        ru: "Я умею кратко представиться: назвать имя, страну и язык."
      - id: erste-buchstabieren
        mode: spoken-interaction
        domain: public
        de: "Ich kann meinen Namen und meine Adresse buchstabieren."
        en: "I can spell my name and address."
        ru: "Я умею продиктовать по буквам своё имя и адрес."
      - id: erste-zahlen-verstehen
        mode: listening
        domain: public
        de: "Ich kann einfache Zahlen und Telefonnummern verstehen."
        en: "I can understand simple numbers and telephone numbers."
        ru: "Я понимаю простые числа и номера телефонов."
  - id: praesens-wortstellung
    level: A1
    kind: grammar
    strand: grammar
    group: satzbau
    related: [trennbare-verben]
    prerequisites: []
    outcomes:
      - id: praesens-verbzweit
        mode: writing
        domain: personal
        de: "Ich kann einfache Sätze im Präsens bilden: Das Verb steht auf Position 2."
        en: "I can build simple present-tense sentences with the verb in second position."
        ru: "Я умею строить простые предложения в настоящем времени: глагол стоит на втором месте."
      - id: praesens-konjugation
        mode: writing
        domain: personal
        de: "Ich kann Verben im Präsens konjugieren: ich lerne, du lernst, er lernt."
        en: "I can conjugate present-tense verbs with the right personal endings (ich lerne, du lernst, er lernt)."
        ru: "Я умею спрягать глаголы в настоящем времени с правильными личными окончаниями (ich lerne, du lernst, er lernt)."
      - id: praesens-fragen
        mode: spoken-interaction
        domain: personal
        de: "Ich kann W-Fragen und Ja/Nein-Fragen stellen."
        en: "I can ask W-questions and yes/no questions."
        ru: "Я умею задавать вопросы с вопросительным словом и общие вопросы (да/нет)."
      - id: praesens-verneinung
        mode: writing
        domain: personal
        de: "Ich kann Sätze mit nicht verneinen und nicht an die richtige Stelle setzen."
        en: "I can negate sentences with nicht and place it in the right position."
        ru: "Я умею строить отрицание с nicht и ставить его на правильное место в предложении."
  - id: artikel-genus
    level: A1
    kind: grammar
    strand: grammar
    group: nomen-kasus
    related: [akkusativ]
    prerequisites: []
    outcomes:
      - id: artikel-richtig-verwenden
        mode: writing
        domain: personal
        de: "Ich kann Nomen mit dem richtigen Artikel benutzen: der, die oder das."
        en: "I can use nouns with the correct article: der, die or das."
        ru: "Я умею употреблять существительные с правильным артиклем: der, die или das."
      - id: artikel-genus-erkennen
        mode: reading
        domain: educational
        de: "Ich kann an der Endung oft das Genus erkennen: die -ung, das -chen."
        en: "I can often tell a noun's gender from its ending (die -ung, das -chen)."
        ru: "Я умею определять род существительного по окончанию (die -ung, das -chen)."
      - id: artikel-plural-verwenden
        mode: writing
        domain: personal
        de: "Ich weiß: Der Artikel im Plural ist immer die."
        en: "I know that the plural article is always die."
        ru: "Я знаю, что во множественном числе артикль всегда die."
      - id: artikel-kein-verwenden
        mode: writing
        domain: personal
        de: "Ich kann Nomen mit kein verneinen: Das ist kein Problem."
        en: "I can negate nouns with kein (Das ist kein Problem) and know when nicht is wrong."
        ru: "Я умею отрицать существительные с помощью kein (Das ist kein Problem) и знаю, когда nicht не подходит."
  - id: menschen-familie
    level: A1
    kind: communication
    strand: communication
    group: person-alltag
    related: [erste-schritte]
    prerequisites: [praesens-wortstellung, artikel-genus]
    outcomes:
      - id: familie-vorstellen
        mode: spoken-production
        domain: personal
        de: "Ich kann meine Familie und wichtige Personen kurz vorstellen."
        en: "I can briefly introduce my family and important people."
        ru: "Я умею кратко представить свою семью и близких людей."
      - id: menschen-beschreiben
        mode: writing
        domain: personal
        de: "Ich kann eine Person mit einfachen Angaben zu Aussehen und Beruf beschreiben."
        en: "I can describe a person with simple details about appearance and occupation."
        ru: "Я умею просто описать внешность и профессию человека."
      - id: familie-verstehen
        mode: listening
        domain: personal
        de: "Ich kann in einem kurzen Gespräch wichtige Informationen über eine Familie verstehen."
        en: "I can understand important information about a family in a short conversation."
        ru: "Я понимаю основную информацию о семье в коротком разговоре."
  - id: essen-trinken
    level: A1
    kind: vocab-field
    strand: vocabulary
    group: essen-einkaufen
    related: [alltag-tagesablauf]
    prerequisites: [praesens-wortstellung, artikel-genus, akkusativ]
    outcomes:
      - id: essen-vorlieben
        mode: spoken-production
        domain: personal
        de: "Ich kann sagen, was ich gern esse und trinke."
        en: "I can say what I like to eat and drink."
        ru: "Я умею говорить, что я люблю есть и пить."
      - id: essen-bestellen
        mode: spoken-interaction
        domain: public
        de: "Ich kann im Café oder Restaurant einfach bestellen."
        en: "I can place a simple order in a café or restaurant."
        ru: "Я умею делать простой заказ в кафе или ресторане."
      - id: essen-grundwortschatz
        mode: reading
        domain: public
        de: "Ich kann die wichtigsten Wörter für Essen und Getränke verstehen und benutzen."
        en: "I can understand and use the most important words for food and drinks."
        ru: "Я понимаю и умею употреблять самые нужные слова для еды и напитков."
      - id: essen-service-bezahlen
        mode: spoken-interaction
        domain: public
        de: "Ich kann Mengen nennen, nach Alternativen fragen und im Café bezahlen."
        en: "I can name quantities, ask for alternatives and pay in a café."
        ru: "Я умею называть количество, спрашивать о заменах и расплачиваться в кафе."
  - id: akkusativ
    level: A1
    kind: grammar
    strand: grammar
    group: nomen-kasus
    related: [artikel-genus, dativ]
    prerequisites: [artikel-genus]
    outcomes:
      - id: akkusativ-objekte
        mode: writing
        domain: personal
        de: "Ich kann den Akkusativ nach Verben wie haben, kaufen und sehen benutzen."
        en: "I can use the accusative after verbs like haben, kaufen and sehen."
        ru: "Я умею употреблять Akkusativ после глаголов вроде haben, kaufen, sehen."
      - id: akkusativ-artikel
        mode: writing
        domain: personal
        de: "Ich kann die Artikel im Akkusativ bilden: der wird den, ein wird einen."
        en: "I can form accusative articles: der becomes den, ein becomes einen."
        ru: "Я умею образовывать артикли в Akkusativ: der переходит в den, ein — в einen."
      - id: akkusativ-maskulin
        mode: writing
        domain: educational
        de: "Ich weiß: Nur der maskuline Artikel ändert sich im Akkusativ."
        en: "I know that only the masculine article changes in the accusative."
        ru: "Я знаю, что в Akkusativ меняется только артикль мужского рода."
      - id: akkusativ-praepositionen
        mode: writing
        domain: public
        de: "Ich kann die Präpositionen für, ohne und um mit dem Akkusativ benutzen."
        en: "I can use the prepositions für, ohne and um with the accusative."
        ru: "Я умею употреблять предлоги für, ohne и um с Akkusativ."
  - id: alltag-zeit
    level: A1
    kind: vocab-field
    strand: vocabulary
    group: alltag-wortschatz
    related: [alltag-tagesablauf, freizeit-koennen]
    prerequisites: [praesens-wortstellung, artikel-genus]
    outcomes:
      - id: zeit-uhrzeit-verstehen
        mode: listening
        domain: public
        de: "Ich kann Uhrzeiten, Wochentage und einfache Zeitansagen verstehen."
        en: "I can understand clock times, weekdays and simple time announcements."
        ru: "Я понимаю время по часам, дни недели и простые объявления о времени."
      - id: zeit-tagesablauf-beschreiben
        mode: spoken-production
        domain: personal
        de: "Ich kann meinen Tag mit Zeitangaben beschreiben: Um acht Uhr lerne ich Deutsch."
        en: "I can describe my day with time phrases: Um acht Uhr lerne ich Deutsch."
        ru: "Я умею описывать свой день с указанием времени: Um acht Uhr lerne ich Deutsch."
      - id: zeit-praepositionen
        mode: writing
        domain: personal
        de: "Ich kann um, am und im richtig benutzen: um acht Uhr, am Montag, im Juli."
        en: "I can use um, am and im correctly: um acht Uhr, am Montag, im Juli."
        ru: "Я умею правильно употреблять um, am и im: um acht Uhr, am Montag, im Juli."
      - id: zeit-wochenplan-lesen
        mode: reading
        domain: public
        de: "Ich kann einen Wochenplan und Öffnungszeiten verstehen."
        en: "I can understand a weekly schedule and opening hours."
        ru: "Я понимаю расписание на неделю и часы работы."
  - id: wohnen
    level: A1
    kind: vocab-field
    strand: vocabulary
    group: wohnen-zuhause
    related: [stadt-wege]
    prerequisites: [praesens-wortstellung, artikel-genus, akkusativ]
    outcomes:
      - id: wohnen-beschreiben
        mode: writing
        domain: personal
        de: "Ich kann meine Wohnung beschreiben: die Zimmer, einfache Adjektive, es gibt."
        en: "I can describe my home: its rooms, simple adjectives, es gibt."
        ru: "Я умею описывать свою квартиру: комнаты, простые прилагательные, оборот es gibt."
      - id: wohnen-anzeige-verstehen
        mode: reading
        domain: public
        de: "Ich kann eine einfache Wohnungsanzeige verstehen."
        en: "I can understand a simple housing advertisement."
        ru: "Я понимаю простое объявление о сдаче квартиры."
      - id: wohnen-lage-sagen
        mode: spoken-production
        domain: personal
        de: "Ich kann mit festen Wendungen sagen, wo etwas in der Wohnung ist: im Wohnzimmer, in der Küche."
        en: "I can say where things are at home using fixed phrases: im Wohnzimmer, in der Küche."
        ru: "Я умею готовыми выражениями говорить, где что находится дома: im Wohnzimmer, in der Küche."
  - id: stadt-wege
    level: A1
    kind: communication
    strand: communication
    group: unterwegs
    related: [wohnen]
    prerequisites: [praesens-wortstellung, artikel-genus, akkusativ]
    outcomes:
      - id: stadt-weg-erfragen
        mode: spoken-interaction
        domain: public
        de: "Ich kann höflich fragen, wo etwas ist und wie ich dorthin komme."
        en: "I can politely ask where something is and how to get there."
        ru: "Я умею вежливо спрашивать, где что находится и как туда добраться."
      - id: stadt-wegbeschreibung-verstehen
        mode: listening
        domain: public
        de: "Ich kann eine kurze Wegbeschreibung verstehen: links, rechts, geradeaus."
        en: "I can follow a short set of directions: links, rechts, geradeaus."
        ru: "Я понимаю короткое объяснение дороги: links, rechts, geradeaus."
      - id: stadt-verkehrsmittel-nennen
        mode: spoken-production
        domain: personal
        de: "Ich kann sagen, wie ich fahre: mit dem Bus, mit der U-Bahn, zu Fuß."
        en: "I can say how I get around: mit dem Bus, mit der U-Bahn, zu Fuß."
        ru: "Я умею говорить, как я добираюсь: mit dem Bus, mit der U-Bahn, zu Fuß."
      - id: stadt-schilder-verstehen
        mode: reading
        domain: public
        de: "Ich kann häufige Schilder und Hinweise in der Stadt verstehen."
        en: "I can understand common signs and notices around town."
        ru: "Я понимаю частые вывески и указатели в городе."
  - id: freizeit-koennen
    level: A1
    kind: communication
    strand: communication
    group: person-alltag
    related: [alltag-zeit, modalverben]
    prerequisites: [praesens-wortstellung, artikel-genus]
    outcomes:
      - id: freizeit-hobbys
        mode: spoken-production
        domain: personal
        de: "Ich kann sagen, was ich in meiner Freizeit mache und was ich gern tue."
        en: "I can say what I do in my free time and what I like doing."
        ru: "Я умею рассказывать, что я делаю в свободное время и что мне нравится делать."
      - id: freizeit-koennen-satz
        mode: writing
        domain: personal
        de: "Ich kann Sätze mit können bilden: können auf Position 2, der Infinitiv am Ende."
        en: "I can build sentences with können: können in second position, the infinitive at the end."
        ru: "Я умею строить предложения с können: können на втором месте, инфинитив в конце."
      - id: freizeit-gespraech-verstehen
        mode: listening
        domain: personal
        de: "Ich kann ein kurzes Gespräch über Freizeit und Verabredungen verstehen."
        en: "I can understand a short conversation about free time and meeting up."
        ru: "Я понимаю короткий разговор о свободном времени и встречах."
      - id: freizeit-verabredung
        mode: spoken-interaction
        domain: personal
        de: "Ich kann einen Vorschlag annehmen oder höflich ablehnen: Ja, gern. Nein, ich kann nicht."
        en: "I can accept a suggestion or politely turn it down: Ja, gern. Nein, ich kann nicht."
        ru: "Я умею принять предложение или вежливо отказаться: Ja, gern. Nein, ich kann nicht."
  # --- A2 ---
  - id: dativ
    level: A2
    kind: grammar
    strand: grammar
    group: nomen-kasus
    related: [akkusativ]
    prerequisites: [akkusativ]
    deepens: [stadt-wege]
    outcomes:
      - id: dativ-artikel
        mode: writing
        domain: personal
        de: "Ich kann die Artikel und Endungen im Dativ bilden: dem, der, den …-n."
        en: "I can form dative articles and endings: dem, der, den …-n."
        ru: "Я умею образовывать артикли и окончания в Dativ: dem, der, den …-n."
      - id: dativ-pronomen
        mode: writing
        domain: personal
        de: "Ich kann die Dativ-Pronomen benutzen: mir, dir, ihm, ihr, Ihnen."
        en: "I can use the dative pronouns mir, dir, ihm, ihr and Ihnen."
        ru: "Я умею употреблять местоимения в Dativ: mir, dir, ihm, ihr, Ihnen."
      - id: dativ-praepositionen
        mode: writing
        domain: public
        de: "Ich kann die Präpositionen aus, bei, mit, nach, seit, von und zu mit dem Dativ verwenden."
        en: "I can use the prepositions aus, bei, mit, nach, seit, von and zu with the dative."
        ru: "Я умею употреблять предлоги aus, bei, mit, nach, seit, von, zu с дательным падежом."
      - id: dativ-verben
        mode: writing
        domain: personal
        de: "Ich kann Verben wie helfen, danken und gefallen mit dem Dativ benutzen."
        en: "I can use verbs like helfen, danken and gefallen with a dative object."
        ru: "Я умею употреблять глаголы helfen, danken, gefallen с дополнением в Dativ."
  - id: trennbare-verben
    level: A2
    kind: grammar
    strand: grammar
    group: verbformen-zeit
    related: [praesens-wortstellung, modalverben]
    prerequisites: [praesens-wortstellung]
    outcomes:
      - id: trennbar-satz
        mode: writing
        domain: personal
        de: "Ich kann trennbare Verben im Satz benutzen: Die Vorsilbe geht ans Ende."
        en: "I can use separable verbs in a sentence: the prefix moves to the end."
        ru: "Я умею употреблять глаголы с отделяемой приставкой: приставка уходит в конец предложения."
      - id: trennbar-erkennen
        mode: reading
        domain: educational
        de: "Ich kann trennbare und untrennbare Vorsilben unterscheiden: auf- geht ans Ende, be- und ver- nie."
        en: "I can tell separable prefixes from inseparable ones: auf- splits off, be- and ver- never do."
        ru: "Я различаю отделяемые и неотделяемые приставки: auf- отделяется, be- и ver- — никогда."
      - id: trennbar-tagesablauf
        mode: spoken-production
        domain: personal
        de: "Ich kann über meinen Tag mit Verben wie aufstehen und einkaufen sprechen."
        en: "I can talk about my day using verbs like aufstehen and einkaufen."
        ru: "Я умею рассказывать о своём дне с глаголами вроде aufstehen и einkaufen."
  - id: alltag-tagesablauf
    level: A2
    kind: vocab-field
    strand: vocabulary
    group: alltag-wortschatz
    related: [essen-trinken, termine-vereinbaren, alltag-zeit]
    prerequisites: [praesens-wortstellung, trennbare-verben, perfekt-haben-sein]
    deepens: [alltag-zeit]
    outcomes:
      - id: alltag-beschreiben
        mode: spoken-production
        domain: personal
        de: "Ich kann meinen Tagesablauf beschreiben: aufstehen, arbeiten, einkaufen, schlafen gehen."
        en: "I can describe my daily routine: getting up, working, shopping, going to bed."
        ru: "Я умею описывать свой распорядок дня: подъём, работа, покупки, отход ко сну."
      - id: alltag-zeit-haeufigkeit
        mode: spoken-production
        domain: personal
        de: "Ich kann sagen, wann und wie oft ich etwas mache: um sieben Uhr, jeden Tag."
        en: "I can say when and how often I do something (um sieben Uhr, jeden Tag)."
        ru: "Я умею говорить, когда и как часто я что-то делаю (um sieben Uhr, jeden Tag)."
      - id: alltag-zeitpraepositionen
        mode: writing
        domain: personal
        de: "Ich kann die Zeitpräpositionen um, am und im richtig wählen."
        en: "I can choose the right time preposition: um, am or im."
        ru: "Я умею правильно выбирать предлоги времени um, am и im."
  - id: modalverben
    level: A2
    kind: grammar
    strand: grammar
    group: verbformen-zeit
    related: [trennbare-verben, termine-vereinbaren, freizeit-koennen]
    prerequisites: [praesens-wortstellung]
    deepens: [freizeit-koennen]
    outcomes:
      - id: modal-satzklammer
        mode: writing
        domain: personal
        de: "Ich kann Sätze mit Modalverben bilden: Das Modalverb steht auf Position 2, der Infinitiv am Ende."
        en: "I can build sentences with modal verbs: the modal in second position, the infinitive at the end."
        ru: "Я умею строить предложения с модальными глаголами: модальный глагол на втором месте, инфинитив в конце."
      - id: modal-konjugation
        mode: writing
        domain: educational
        de: "Ich kann Modalverben konjugieren: ich kann, er muss — ohne -t."
        en: "I can conjugate modal verbs: ich kann, er muss — no -t in the singular."
        ru: "Я умею спрягать модальные глаголы: ich kann, er muss — без окончания -t."
      - id: modal-erlaubnis-notwendigkeit
        mode: reading
        domain: public
        de: "Ich kann darf nicht und muss nicht unterscheiden."
        en: "I can tell darf nicht (not allowed) from muss nicht (not necessary)."
        ru: "Я различаю darf nicht («нельзя») и muss nicht («не обязательно»)."
      - id: modal-hoefliche-wuensche
        mode: spoken-interaction
        domain: public
        de: "Ich kann höflich sagen, was ich möchte."
        en: "I can say politely what I would like, using möchte."
        ru: "Я умею вежливо говорить, чего я хочу, с помощью möchte."
  - id: termine-vereinbaren
    level: A2
    kind: communication
    strand: communication
    group: transaktionen-termine
    related: [alltag-tagesablauf, modalverben]
    prerequisites: [modalverben, dativ, trennbare-verben, perfekt-haben-sein]
    outcomes:
      - id: termine-organisieren
        mode: spoken-interaction
        domain: public
        de: "Ich kann einen Termin vereinbaren, verschieben oder absagen."
        en: "I can make, move or cancel an appointment."
        ru: "Я умею договариваться о встрече, переносить и отменять её."
      - id: termine-zeit-verstehen
        mode: listening
        domain: public
        de: "Ich kann Uhrzeiten und Wochentage verstehen und nennen."
        en: "I can understand and give times and days of the week."
        ru: "Я понимаю и умею называть время и дни недели."
      - id: termine-hoeflich-telefonieren
        mode: spoken-interaction
        domain: public
        de: "Ich kann am Telefon höflich Sie sagen und passende Formeln benutzen."
        en: "I can use polite Sie forms and standard phrases on the phone."
        ru: "Я умею вежливо обращаться на Sie по телефону и использовать подходящие формулы."
  - id: perfekt-haben-sein
    level: A2
    kind: grammar
    strand: grammar
    group: verbformen-zeit
    related: []
    prerequisites: [praesens-wortstellung]
    outcomes:
      - id: perfekt-vergangenheit-erzaehlen
        mode: spoken-production
        domain: personal
        de: "Ich kann über gestern und die Vergangenheit im Perfekt sprechen."
        en: "I can talk about yesterday and the past using the Perfekt."
        ru: "Я умею рассказывать о вчерашнем дне и о прошлом в перфекте."
      - id: perfekt-hilfsverb
        mode: writing
        domain: personal
        de: "Ich kann das richtige Hilfsverb wählen: sein für Bewegung von A nach B, sonst haben."
        en: "I can pick the right auxiliary: sein for A-to-B movement, otherwise haben."
        ru: "Я умею выбирать вспомогательный глагол: sein для движения из точки А в точку Б, иначе haben."
      - id: perfekt-partizip
        mode: writing
        domain: educational
        de: "Ich kann das Partizip II bilden: ge-…-t, ge-…-en, -ieren ohne ge-."
        en: "I can form the Partizip II: ge-…-t, ge-…-en, and -ieren verbs without ge-."
        ru: "Я умею образовывать Partizip II: ge-…-t, ge-…-en, глаголы на -ieren — без ge-."
      - id: perfekt-satzklammer
        mode: writing
        domain: personal
        de: "Ich kann die Satzklammer im Perfekt bauen: haben oder sein auf Position 2, das Partizip am Ende."
        en: "I can build the Perfekt bracket: haben or sein in second position, the participle at the end."
        ru: "Я умею строить рамочную конструкцию в перфекте: haben или sein на втором месте, причастие в конце."

