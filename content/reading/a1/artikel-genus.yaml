topic: artikel-genus
title_de: "Ninas Zimmer"
text:
  - >-
    Nina wohnt jetzt in Hamburg. Ihr [[Zimmer::room::комната::кімната]] ist klein,
    aber [[hell::bright::светлая::світла]]. Das [[Fenster::window::окно::вікно]] ist groß,
    das Bett ist neu, und der [[Schrank::wardrobe::шкаф::шафа]] ist sehr alt.
  - >-
    Der Tisch steht am Fenster, und auf dem Tisch steht eine Lampe. Die
    Lampe ist alt, aber sehr schön: Sie ist ein
    [[Geschenk::present, gift::подарок::подарунок]] von Ninas [[Oma::grandma::бабушка::бабуся]].
  - >-
    Nina hat auch viele Bücher. Aber sie hat noch kein
    [[Regal::bookshelf::книжная полка::книжкова полиця]], und die Bücher
    [[liegen auf dem Boden::are lying on the floor::лежат на полу::лежать на підлозі]]. Morgen
    kauft Nina ein Regal. Das ist kein Problem: Der
    [[Laden::shop::магазин::крамниця]] ist nicht [[weit::far::далеко::далеко]].
questions:
  - id: frage-zimmer
    outcomes: [artikel-richtig-verwenden]
    type: mc
    prompt: "Wie ist Ninas Zimmer?"
    options:
      - "Klein, aber hell."
      - "Groß, aber alt."
      - "Neu und sehr groß."
    correct: 0
    translation:
      en: What is Nina's room like?
      ru: Какая у Нины комната?
      uk: Яка в Ніни кімната?
    explain:
      en: "„Ihr Zimmer ist klein, aber hell.“ — the room itself is small; only the window is big (Das Fenster ist groß)."
      ru: "„Ihr Zimmer ist klein, aber hell.“ — сама комната маленькая; большое в ней только окно (Das Fenster ist groß)."
      uk: "„Ihr Zimmer ist klein, aber hell.“ — сама кімната маленька; велике в ній лише вікно (Das Fenster ist groß)."
  - id: frage-geschenk
    outcomes: [artikel-richtig-verwenden]
    type: mc
    prompt: "Was ist ein Geschenk von Ninas Oma?"
    options:
      - "Das Bett."
      - "Die Lampe."
      - "Der Schrank."
    correct: 1
    translation:
      en: Which thing is a present from Nina's grandma?
      ru: Какой предмет — подарок бабушки Нины?
      uk: Яка річ — подарунок від бабусі Ніни?
    explain:
      en: "„Die Lampe ist alt, aber sehr schön: Sie ist ein Geschenk von Ninas Oma.“ — the bed is simply new, and the wardrobe is simply old."
      ru: "„Die Lampe ist alt, aber sehr schön: Sie ist ein Geschenk von Ninas Oma.“ — кровать просто новая, а шкаф просто старый."
      uk: "„Die Lampe ist alt, aber sehr schön: Sie ist ein Geschenk von Ninas Oma.“ — ліжко просто нове, а шафа просто стара."
  - id: frage-boden
    outcomes: [artikel-richtig-verwenden]
    type: mc
    prompt: "Warum liegen die Bücher auf dem Boden?"
    options:
      - "Nina hat noch kein Regal."
      - "Das Regal ist zu klein."
      - "Die Bücher sind ein Geschenk von Oma."
    correct: 0
    translation:
      en: Why are the books lying on the floor?
      ru: Почему книги лежат на полу?
      uk: Чому книжки лежать на підлозі?
    explain:
      en: "„Aber sie hat noch kein Regal, und die Bücher liegen auf dem Boden.“ — there is no shelf at all yet; Nina buys one tomorrow."
      ru: "„Aber sie hat noch kein Regal, und die Bücher liegen auf dem Boden.“ — полки пока вообще нет; Нина купит её завтра."
      uk: "„Aber sie hat noch kein Regal, und die Bücher liegen auf dem Boden.“ — полиці поки що взагалі немає; Ніна купить її завтра."
