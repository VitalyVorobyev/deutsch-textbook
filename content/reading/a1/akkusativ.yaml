topic: akkusativ
title_de: "Onkel Peter kommt zu Besuch"
text:
  - >-
    Heute kommt Onkel Peter [[zu Besuch::for a visit::в гости::в гості]]. Max macht
    das [[Abendessen::dinner::ужин::вечеря]]. Er hat einen Plan:
    [[Es gibt::there is / there will be::есть, будет (в меню)::є, буде (в меню)]] eine Suppe,
    einen Salat und einen [[Kuchen::cake::пирог::пиріг]].
  - >-
    Max geht in den Supermarkt. Er kauft
    [[Gemüse, Eier und Butter::vegetables, eggs and butter::овощи, яйца и
    масло::овочі, яйця і масло]]. Er sucht auch einen [[Saft::juice::сок::сік]],
    [[denn::because::потому что::бо, тому що]] Onkel Peter trinkt keinen Wein.
  - >-
    Zu Hause macht Max [[zuerst::first::сначала::спочатку]] den Kuchen, dann die Suppe
    und den Salat. Um sieben Uhr
    [[klingelt es::the doorbell rings::звонят в дверь::дзвонять у двері]]. Onkel Peter ist da!
    Er sieht den Tisch und ist sehr [[glücklich::happy::счастливый::щасливий]]. Die
    Suppe ist super, und der Kuchen ist auch sehr gut.
questions:
  - id: frage-besuch
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Wer kommt heute zu Besuch?"
    options:
      - "Onkel Peter."
      - "Der Bruder von Max."
      - "Eine Freundin von Max."
    correct: 0
    translation:
      en: Who is coming to visit today?
      ru: Кто сегодня приходит в гости?
      uk: Хто сьогодні приходить у гості?
    explain:
      en: "The very first sentence says it: „Heute kommt Onkel Peter zu Besuch.“ A brother or a friend are not in the text."
      ru: "Об этом говорит самое первое предложение: „Heute kommt Onkel Peter zu Besuch.“ Про брата или подругу в тексте ничего нет."
      uk: "Про це каже найперше речення: „Heute kommt Onkel Peter zu Besuch.“ Про брата чи подругу в тексті нічого немає."
  - id: frage-wein
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Was trinkt Onkel Peter nicht?"
    options:
      - "Wein."
      - "Saft."
      - "Kaffee."
    correct: 0
    translation:
      en: What does Uncle Peter not drink?
      ru: Чего дядя Петер не пьёт?
      uk: Чого дядько Петер не п'є?
    explain:
      en: "„Er sucht auch einen Saft, denn Onkel Peter trinkt keinen Wein.“ — that is exactly why Max buys juice. Coffee is not mentioned in the text."
      ru: "„Er sucht auch einen Saft, denn Onkel Peter trinkt keinen Wein.“ — именно поэтому Макс и покупает сок. Кофе в тексте вообще не упоминается."
      uk: "„Er sucht auch einen Saft, denn Onkel Peter trinkt keinen Wein.“ — саме тому Макс і купує сік. Кава в тексті взагалі не згадується."
  - id: frage-zuerst
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Was macht Max zuerst?"
    options:
      - "Den Kuchen."
      - "Die Suppe."
      - "Den Salat."
    correct: 0
    translation:
      en: What does Max make first?
      ru: Что Макс готовит сначала?
      uk: Що Макс готує спочатку?
    explain:
      en: "„Zu Hause macht Max zuerst den Kuchen, dann die Suppe und den Salat.“ — the cake comes first, the soup and the salad after it."
      ru: "„Zu Hause macht Max zuerst den Kuchen, dann die Suppe und den Salat.“ — сначала пирог, а суп и салат уже после него."
      uk: "„Zu Hause macht Max zuerst den Kuchen, dann die Suppe und den Salat.“ — спочатку пиріг, а суп і салат уже після нього."
