topic: akkusativ
title_de: "Ein Geschenk für Oma"
text:
  - >-
    Oma Erika hat am Sonntag [[Geburtstag::birthday::день рождения::день народження]]. Lena
    und ihr Bruder Jonas suchen ein [[Geschenk::present, gift::подарок::подарунок]]
    für die Oma. Sie gehen in die Stadt.
  - >-
    [[Im Laden::in the shop::в магазине::у крамниці]] sehen sie einen
    [[Schal::scarf::шарф::шарф]], eine Tasche und ein Buch. Der Schal ist schön,
    aber [[teuer::expensive::дорогой::дорогий]]. Die Tasche ist zu klein. Und das
    Buch? „Oma liest gern“, sagt Lena. „Wir kaufen das Buch!“ Jonas findet
    die [[Idee::idea::идея::ідея]] gut. Sie kaufen das Buch und auch
    [[Blumen::flowers::цветы::квіти]].
  - >-
    Am Sonntag besuchen Lena und Jonas die Oma. Oma Erika
    [[öffnet::opens::открывает::відчиняє]] das Geschenk. „Ein Buch! Danke!“ Sie ist
    sehr [[glücklich::happy::счастлива::щаслива]]. Dann trinken alle einen Tee und
    essen einen Kuchen. Der Kuchen schmeckt super.
questions:
  - id: frage-kaufen
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Was kaufen Lena und Jonas?"
    options:
      - "Den Schal."
      - "Das Buch und Blumen."
      - "Nur die Tasche."
    correct: 1
    translation:
      en: What do Lena and Jonas buy?
      ru: Что покупают Лена и Йонас?
      uk: Що купують Лена та Йонас?
    explain:
      en: "„Wir kaufen das Buch!“, says Lena, and then the text adds: „Sie kaufen das Buch und auch Blumen.“ The scarf is too expensive, and the bag is too small."
      ru: "„Wir kaufen das Buch!“ — говорит Лена, и дальше в тексте сказано: „Sie kaufen das Buch und auch Blumen.“ Шарф слишком дорогой, а сумка слишком маленькая."
      uk: "„Wir kaufen das Buch!“ — каже Лена, і далі в тексті сказано: „Sie kaufen das Buch und auch Blumen.“ Шарф задорогий, а сумка замала."
  - id: frage-schal
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Warum kaufen sie den Schal nicht?"
    options:
      - "Er ist teuer."
      - "Er ist zu klein."
      - "Oma hat schon einen Schal."
    correct: 0
    translation:
      en: Why do they not buy the scarf?
      ru: Почему они не покупают шарф?
      uk: Чому вони не купують шарф?
    explain:
      en: "The text says: „Der Schal ist schön, aber teuer.“ — it is the bag that is too small, and a second scarf is not mentioned at all."
      ru: "В тексте сказано: „Der Schal ist schön, aber teuer.“ — слишком маленькая там сумка, а про второй шарф в тексте вообще ничего нет."
      uk: "У тексті сказано: „Der Schal ist schön, aber teuer.“ — замала там сумка, а про другий шарф у тексті взагалі нічого немає."
  - id: frage-tee
    outcomes: [akkusativ-objekte]
    type: mc
    prompt: "Was trinken alle bei der Oma?"
    options:
      - "Kaffee."
      - "Saft."
      - "Tee."
    correct: 2
    translation:
      en: What does everyone drink at grandma's place?
      ru: Что все пьют у бабушки?
      uk: Що всі п'ють у бабусі?
    explain:
      en: "The last paragraph says: „Dann trinken alle einen Tee und essen einen Kuchen.“ Coffee and juice do not appear in the story."
      ru: "В последнем абзаце сказано: „Dann trinken alle einen Tee und essen einen Kuchen.“ Кофе и сок в тексте не упоминаются."
      uk: "В останньому абзаці сказано: „Dann trinken alle einen Tee und essen einen Kuchen.“ Кава і сік у тексті не згадуються."
