topic: freizeit-koennen
kind: extensive
title_de: "Lena in Bremen (1): Der erste Tag"

# The extensive-reader pilot. Read for meaning at volume, not worked through: sparse
# glosses, no line-by-line questions, and every structure at or below late A1 —
# Präsens, Akkusativ, kein-, können, separable verbs met as whole chunks.
# Lena is a recurring character; later episodes continue her week.

text:
  - "Lena kommt aus Polen. Sie ist vierundzwanzig Jahre alt und wohnt seit einer Woche in Bremen. Die Stadt ist nicht groß, aber sie ist schön. Lena hat ein Zimmer in der Bahnhofstraße. Das Zimmer ist klein und hell. Es gibt ein Bett, einen Tisch und einen Stuhl. Ein Balkon ist auch da. Lena trinkt dort am Morgen ihren Kaffee."
  - "Heute ist Montag. Lena hat keine Arbeit und keinen Kurs. Sie hat Zeit. „Ich kann die Stadt sehen“, denkt sie. Sie nimmt ihre Tasche und geht aus dem Haus. Draußen ist es kalt, aber die Sonne [[scheint::is shining::светит::світить]]. Lena geht zu Fuß. Sie kauft ein Brot und einen Apfel und isst im Park."
  - "Im Park sitzt eine Frau auf einer Bank. Sie liest ein Buch. „Entschuldigung, wo ist die Bibliothek?“, fragt Lena. Die Frau lächelt. „Gehen Sie geradeaus und dann links. Die Bibliothek ist neben der Post.“ Lena sagt danke. Die Frau fragt: „Sind Sie neu hier?“ — „Ja, ich komme aus Polen. Ich lerne Deutsch.“ — „Ihr Deutsch ist schon gut“, sagt die Frau. Lena [[freut sich::is pleased::радуется::радіє]]."
  - "In der Bibliothek ist es sehr [[ruhig::quiet::тихо::тихо]]. Die Bibliothek ist groß und hat viele Bücher. Lena findet ein Buch für Kinder. Die Sätze sind kurz und einfach. Sie kann fast alles verstehen. Nur ein Wort kennt sie nicht, und sie schreibt es in ihr Heft. Eine Studentin zeigt ihr den Computer. Man kann hier auch Filme sehen, aber Lena möchte heute nur lesen."
  - "Um sechs Uhr geht Lena nach Hause. Sie kauft noch Milch und Käse. In der Küche kocht sie eine Suppe und liest das Buch zu Ende. Das Zimmer ist warm. Morgen beginnt der Deutschkurs. Lena hat ein bisschen Angst, aber sie [[freut sich auch::is also looking forward to it::и радуется тоже::і радіє теж]]. Sie kann jetzt schon fragen, wo etwas ist. Das ist ein Anfang."

questions:
  - id: q-gist
    outcomes: [freizeit-hobbys]
    type: mc
    prompt: "Was macht Lena an diesem Tag?"
    options:
      - "Sie hat frei und sieht sich die Stadt an."
      - "Sie arbeitet den ganzen Tag im Büro."
      - "Sie bleibt krank zu Hause."
    correct: 0
    explain:
      en: "Lena has no work and no course on Monday, so she walks into town, eats in the park and visits the library."
      ru: "В понедельник у Лены нет ни работы, ни курса, поэтому она идёт в город, ест в парке и заходит в библиотеку."
      uk: "У понеділок у Лени немає ні роботи, ні курсу, тому вона йде в місто, їсть у парку і заходить до бібліотеки."
