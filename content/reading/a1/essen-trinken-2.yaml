topic: essen-trinken
title_de: "Im Restaurant"
text:
  - >-
    Am Freitagabend kocht Familie Weber nicht. Vater, Mutter und die
    Kinder Lisa und Paul gehen
    [[ins Restaurant::to the restaurant::в ресторан]]. Das Restaurant ist
    klein, aber sehr gut.
  - >-
    Der [[Kellner::waiter::официант]] bringt die
    [[Speisekarte::menu::меню]]. Die Familie bestellt: Der Vater
    [[nimmt::takes (= orders)::берёт (заказывает)]] Fisch mit Reis, die
    Mutter isst einen Salat und eine Suppe. Lisa und Paul essen Fleisch
    mit Kartoffeln. Der Vater trinkt ein Glas Wein, die Mutter Wasser,
    und die Kinder trinken Saft.
  - >-
    Das Essen kommt [[schnell::quickly::быстро]]. „Guten Appetit!“ Der
    Fisch ist frisch, und das Fleisch schmeckt Lisa und Paul sehr gut.
    „Alles ist lecker!“, sagt die Mutter. [[Am Ende::at the end::в
    конце]] bezahlt der Vater und gibt ein
    [[Trinkgeld::tip::чаевые]]. Dann geht die Familie nach Hause.
questions:
  - id: frage-mutter
    type: mc
    prompt: "Was isst die Mutter?"
    options:
      - "Fisch mit Reis."
      - "Einen Salat und eine Suppe."
      - "Fleisch mit Kartoffeln."
    correct: 1
    translation:
      en: What does the mother eat?
      ru: Что ест мама?
    explain:
      en: "The text says: „die Mutter isst einen Salat und eine Suppe.“ Fish with rice is the father's order, and meat with potatoes is what Lisa and Paul eat."
      ru: "В тексте сказано: „die Mutter isst einen Salat und eine Suppe.“ Рыбу с рисом заказывает папа, а мясо с картошкой едят Лиза и Пауль."
  - id: frage-kinder
    type: mc
    prompt: "Was trinken die Kinder?"
    options:
      - "Saft."
      - "Wasser."
      - "Wein."
    correct: 0
    translation:
      en: What do the children drink?
      ru: Что пьют дети?
    explain:
      en: "„Der Vater trinkt ein Glas Wein, die Mutter Wasser, und die Kinder trinken Saft.“ — each person gets a different drink, and the children get juice."
      ru: "„Der Vater trinkt ein Glas Wein, die Mutter Wasser, und die Kinder trinken Saft.“ — у каждого свой напиток, и детям достаётся сок."
  - id: frage-bezahlen
    type: mc
    prompt: "Wer bezahlt am Ende?"
    options:
      - "Die Mutter."
      - "Lisa und Paul."
      - "Der Vater."
    correct: 2
    translation:
      en: Who pays at the end?
      ru: Кто платит в конце?
    explain:
      en: "The last paragraph says: „Am Ende bezahlt der Vater und gibt ein Trinkgeld.“ — he also leaves a tip."
      ru: "В последнем абзаце сказано: „Am Ende bezahlt der Vater und gibt ein Trinkgeld.“ — он ещё и оставляет чаевые."
