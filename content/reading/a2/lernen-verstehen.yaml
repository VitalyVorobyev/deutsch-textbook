topic: lernen-verstehen
kind: intensive
title_de: "Elif fragt nach"
text:
  - >-
    Elif lernt [[seit zwei Monaten::for two months (and still is)::уже два месяца]]
    Deutsch. Ihr Kurs ist am Abend, dreimal in der Woche. Am Anfang hat sie fast
    nichts verstanden.
  - >-
    Heute erklärt der Kursleiter eine neue [[Regel::rule::правило]]. Er spricht
    schnell. Elif [[hebt die Hand::raises her hand::поднимает руку]]:
    „Entschuldigung, können Sie das bitte wiederholen? Ich weiß nicht, was das Wort
    [[Bedeutung::meaning::значение]] bedeutet.“
  - >-
    Der Kursleiter antwortet: „Das ist eine gute Frage. Fragen Sie immer, wenn Sie
    etwas nicht verstehen.“ Dann schreibt er ein [[Beispiel::example::пример]] an die
    [[Tafel::board::доска]]. Jetzt versteht Elif die Regel: [[Sie::it — the rule (die
    Regel is feminine)::оно — правило (die Regel женского рода)]] ist gar nicht
    schwer.
  - >-
    Am Ende sagt der Kursleiter: „Arbeiten Sie jetzt zu zweit und schreiben Sie fünf
    Sätze mit der neuen Regel.“ Elif [[notiert::writes down::записывает]] die Sätze
    in ihr [[Heft::exercise book::тетрадь]]. Zu Hause liest sie alles laut vor, weil
    sie die [[Aussprache::pronunciation::произношение]] üben möchte.
questions:
  - id: frage-warum-hand
    outcomes: [nachfragen-klaeren]
    type: mc
    prompt: "Warum hebt Elif die Hand?"
    options:
      - "Weil sie ein Wort nicht versteht."
      - "Weil sie eine Frage zur Prüfung hat."
      - "Weil sie zu spät gekommen ist."
    correct: 0
    translation:
      en: Why does Elif raise her hand?
      ru: Почему Элиф поднимает руку?
    explain:
      en: "Elif says it herself, and she says exactly which word is the problem: „Ich weiß nicht, was das Wort Bedeutung bedeutet.“ That is the habit the text is showing you — not a helpless Ich verstehe nicht, but a precise repair that can be answered in one move. Nobody in the text mentions an exam, and Elif is not late. Look at the shape of her question while you are there: the wrapper Ich weiß nicht is a statement, and the wrapped verb bedeutet still goes to the very end."
      ru: "Элиф говорит об этом сама и называет точно, какое слово ей мешает: «Ich weiß nicht, was das Wort Bedeutung bedeutet.» Именно эту привычку показывает текст: не беспомощное Ich verstehe nicht, а точный вопрос, на который можно ответить одним движением. Об экзамене в тексте не говорит никто, и опозданий там тоже нет. Заодно посмотрите на форму её вопроса: рамка Ich weiß nicht — утверждение, а «обёрнутый» глагол bedeutet всё равно уходит в самый конец."

  - id: frage-aufgabe
    outcomes: [kursanweisungen-verstehen]
    type: mc
    prompt: "Was sollen die Teilnehmer am Ende machen?"
    options:
      - "Zu zweit fünf Sätze schreiben."
      - "Die neue Regel auswendig lernen."
      - "Ein Beispiel an die Tafel schreiben."
    correct: 0
    translation:
      en: What are the participants supposed to do at the end?
      ru: Что участники должны сделать в конце?
    explain:
      en: "The instruction is in the last paragraph, and it is an imperative addressed to the whole group: „Arbeiten Sie jetzt zu zweit und schreiben Sie fünf Sätze mit der neuen Regel.“ Learning the rule by heart is nobody's idea in this text. And the example on the board is what the teacher wrote himself, to make the rule visible — it is not the task he set."
      ru: "Указание стоит в последнем абзаце, и это повелительное наклонение, обращённое ко всей группе: «Arbeiten Sie jetzt zu zweit und schreiben Sie fünf Sätze mit der neuen Regel.» Учить правило наизусть в тексте никто не предлагает. А пример на доске написал сам преподаватель — чтобы правило стало видно; это не то задание, которое он дал."

  - id: frage-lernstrategie
    outcomes: [lernstrategien-sagen]
    type: mc
    prompt: "Was macht Elif zu Hause?"
    options:
      - "Sie liest die Sätze laut vor."
      - "Sie schreibt dem Kursleiter eine E-Mail."
      - "Sie sucht die Wörter im Wörterbuch."
    correct: 0
    translation:
      en: What does Elif do at home?
      ru: Что Элиф делает дома?
    explain:
      en: "The last sentence says it, and it says why as well: „Zu Hause liest sie alles laut vor, weil sie die Aussprache üben möchte.“ That is a learning strategy, and it is the kind of thing you will be asked to talk about: not only what you do, but why. Notice the weil-clause — two verbs, and only the conjugated one (möchte) sits at the very end, behind the infinitive üben."
      ru: "Об этом говорит последнее предложение — и заодно называет причину: «Zu Hause liest sie alles laut vor, weil sie die Aussprache üben möchte.» Это учебная стратегия, и как раз о таком вас и будут спрашивать: не только что вы делаете, но и зачем. Обратите внимание на придаточное с weil: глаголов два, а в самом конце стоит только спрягаемый (möchte), уже за инфинитивом üben."
