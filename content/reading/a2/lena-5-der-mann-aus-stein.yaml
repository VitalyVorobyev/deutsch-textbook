topic: aemter-dienstleistungen
kind: extensive
title_de: "Lena in Bremen (5): Der Mann aus Stein"

# The fifth Lena episode: optional, level-controlled input rather than a mastery artifact.
# Civic details were checked against the official Bremen service portal; cultural facts against
# the German UNESCO Commission and Bremen's official World Heritage pages:
# https://www.service.bremen.de/die-senatorin-fuer-inneres-und-sport/buergeramt/buergerservicecenter-mitte-123042
# https://www.unesco.de/staette/rathaus-und-roland-in-bremen/
# https://www.welterbe.bremen.de/entdecken/rathaus-und-roland-unesco-welterbe/der-roland-das-bremische-symbol-der-freiheit-20500
# Read straight through for meaning: sparse glosses, two gist questions, no line-by-line mining.

text:
  - >-
    Am Montagmorgen hat Lena einen Termin im BürgerServiceCenter-Mitte. Ihre Bank
    braucht eine Meldebescheinigung. Am Abend vorher hat Lena noch einmal alles
    geprüft: den Pass, das Formular und die Terminbestätigung. „Dieses Mal fehlt
    nichts“, sagt sie zu Frau Kern. Die Nachbarin lacht. „Warte ab. Auf einem Amt
    kann immer etwas fehlen.“
  - >-
    Im BürgerServiceCenter meldet Lena sich an einem kleinen Bildschirm an. Sie
    bekommt eine Nummer und wartet. Nach zehn Minuten erscheint ihre Nummer über
    einem [[Schalter::service counter::окошко::віконце]]. Die Mitarbeiterin sagt: „Guten
    Morgen. Was kann ich für Sie tun?“ Lena antwortet: „Ich brauche eine
    Meldebescheinigung für meine Bank.“ Sie zeigt ihren Pass und bezahlt die
    Gebühr. Fünf Minuten später hält sie das Papier in der Hand. Frau Kern hatte
    diesmal nicht recht.
  - >-
    Draußen wartet Timo auf sie. Sie gehen zusammen zum
    [[Marktplatz::market square::рыночная площадь::ринкова площа]]. Vor dem Rathaus bleibt Lena
    stehen. Dort steht ein sehr großer Mann aus Stein. Er trägt ein
    [[Schwert::sword::меч::меч]] und sieht ernst aus. „Wer ist das?“, fragt Lena.
    „Das ist unser Roland“, sagt Timo. „Er steht schon seit 1404 hier.“
  - >-
    Neben der Statue lesen sie eine Information. Die Figur ist ungefähr
    fünfeinhalb Meter hoch. Früher war Roland ein Zeichen für die
    [[Rechte::rights::права::права]] der Stadt. Bremen durfte selbst einen Markt haben
    und wichtige Dinge selbst entscheiden. Deshalb steht Roland für
    [[Freiheit::freedom::свобода::свобода]] und [[Marktrecht::market rights::право проводить рынок::право проводити ринок]].
    Seit 2004 gehören das Rathaus und der Roland zum
    [[Welterbe::World Heritage::Всемирное наследие::Всесвітня спадщина]] der UNESCO.
  - >-
    „Ein Ritter aus Stein zeigt also, dass eine Stadt frei ist?“, fragt Lena.
    Timo nickt. „So kann man es sagen.“ Lena schaut auf ihre Bescheinigung und
    dann auf Roland. Am Schalter hat sie heute selbst erklärt, was sie braucht.
    Vor einem Jahr hätte sie dafür Frau Kern mitgenommen. Jetzt kann sie solche
    Dinge allein erledigen. „Dann ist das auch ein kleines Stück Freiheit“, sagt
    sie. Timo lächelt. „Genau. Und jetzt trinken wir einen Kaffee.“

questions:
  - id: q-amt
    outcomes: [formular-verstehen]
    type: mc
    prompt: "Was hat Lena für den Termin vorbereitet?"
    options:
      - "Ihren Pass, das Formular und die Terminbestätigung."
      - "Nur ihre Bankkarte und fünf Euro."
      - "Einen neuen Pass für Frau Kern."
    correct: 0
    translation:
      en: "What has Lena prepared for the appointment?"
      ru: "Что Лена подготовила к приёму?"
      uk: "Що Лена підготувала до прийому?"
    explain:
      en: "The evening before the appointment, Lena checks the three relevant documents: her passport, the form and the appointment confirmation."
      ru: "Вечером перед приёмом Лена проверяет три нужных документа: паспорт, формуляр и подтверждение записи."
      uk: "Увечері перед прийомом Лена перевіряє три потрібні документи: паспорт, формуляр і підтвердження запису."

  - id: q-selbststaendig
    outcomes: [anliegen-nennen]
    type: mc
    prompt: "Woran merkt Lena, dass sie selbstständiger geworden ist?"
    options:
      - "Sie erklärt am Schalter selbst, was sie braucht."
      - "Timo füllt das Formular für sie aus."
      - "Frau Kern begleitet sie zu jedem Termin."
    correct: 0
    translation:
      en: "How does Lena notice that she has become more independent?"
      ru: "Как Лена понимает, что стала самостоятельнее?"
      uk: "Як Лена розуміє, що стала самостійнішою?"
    explain:
      en: "A year earlier Lena would have taken Frau Kern with her. Now she can name her request, show the documents and complete the errand herself. That personal independence is why Roland's meaning stays with her."
      ru: "Год назад Лена взяла бы с собой фрау Керн. Теперь она сама называет цель, показывает документы и справляется с делом. Поэтому смысл Роланда связывается для неё с собственной самостоятельностью."
      uk: "Рік тому Лена взяла б із собою пані Керн. Тепер вона сама називає мету, показує документи й дає раду справі. Тому сенс Роланда пов’язується для неї з власною самостійністю."
