topic: biografie-erfahrungen
kind: intensive
title_de: "Amiras Weg"
text:
  - >-
    Amira ist 1994 in Casablanca geboren. Als Kind war sie sehr
    [[fleißig::hard-working::прилежная::працьовита]] und wollte immer Ärztin werden. Aber die
    Familie hatte wenig Geld, und nach der Schule konnte sie nicht studieren.
  - >-
    Vor neun Jahren hat sie ihre [[Heimat::home country::родина::батьківщина]]
    [[verlassen::left (a place)::покинула::покинула]]. Zuerst ist sie nach Frankreich
    gegangen, dann ist sie nach Deutschland gekommen. Am Anfang konnte sie kein
    Deutsch. „Damals hatte ich nur ein
    [[Wörterbuch::dictionary::словарь::словник]]“, sagt sie. „Ich musste jeden Tag lernen.“
  - >-
    Danach hat Amira eine [[Ausbildung::vocational training::профессиональное
    обучение::професійне навчання]] als [[Krankenschwester::nurse::медсестра::медсестра]] gemacht. Später hat sie
    ihren Mann [[kennengelernt::met, got to know::познакомилась (с кем-л.)::познайомилася (з кимось)]]. Heute
    arbeitet sie in einem [[Krankenhaus::hospital::больница::лікарня]] in Essen und hat viel
    [[Erfahrung::experience::опыт::досвід]]. „Der Anfang war schwer“, sagt sie, „aber ich
    wollte nie zurück.“
questions:
  - id: frage-berufswunsch
    outcomes: [praeteritum-war-hatte]
    type: mc
    prompt: "Was wollte Amira als Kind werden?"
    options:
      - "Ärztin."
      - "Lehrerin."
      - "Krankenschwester."
    correct: 0
    translation:
      en: What did Amira want to become as a child?
      ru: Кем Амира хотела стать в детстве?
      uk: Ким Аміра хотіла стати в дитинстві?
    explain:
      en: "The first paragraph says it with the Präteritum of a modal: Als Kind war sie sehr fleißig und wollte immer Ärztin werden. The trap is Krankenschwester — that is what she trained as later, after the money ran out, and it is what she does today. The childhood wish and the actual career are two different sentences in two different paragraphs, and the modal wollte is what marks the first one as a wish rather than a fact."
      ru: "В первом абзаце это сказано через Präteritum модального глагола: Als Kind war sie sehr fleißig und wollte immer Ärztin werden. Ловушка — Krankenschwester: на медсестру она выучилась позже, когда денег не хватило, и работает ею сегодня. Детская мечта и реальная профессия — это два разных предложения в двух разных абзацах, и именно модальный глагол wollte помечает первое как желание, а не как факт."
      uk: "У першому абзаці це сказано через Präteritum модального дієслова: Als Kind war sie sehr fleißig und wollte immer Ärztin werden. Пастка — Krankenschwester: на медсестру вона вивчилася пізніше, коли грошей не вистачило, і працює нею сьогодні. Дитяча мрія і реальна професія — це два різні речення у двох різних абзацах, і саме модальне дієслово wollte позначає перше як бажання, а не як факт."

  - id: frage-reihenfolge
    outcomes: [lebensstationen-ordnen]
    type: mc
    prompt: "Wohin ist Amira zuerst gegangen?"
    options:
      - "Nach Frankreich."
      - "Nach Deutschland."
      - "Nach Essen."
    correct: 0
    translation:
      en: Where did Amira go first?
      ru: Куда Амира поехала сначала?
      uk: Куди Аміра поїхала спершу?
    explain:
      en: "The order is spelled out by the connectors: Zuerst ist sie nach Frankreich gegangen, dann ist sie nach Deutschland gekommen. zuerst and dann carry the whole sequence, and each of them stands in position 1, so the auxiliary ist comes straight after it. Essen is where she lives now — it belongs to the last paragraph, together with heute."
      ru: "Порядок расставлен коннекторами: Zuerst ist sie nach Frankreich gegangen, dann ist sie nach Deutschland gekommen. Всю последовательность держат zuerst и dann, и каждый из них стоит на первом месте, поэтому вспомогательный глагол ist идёт сразу за ним. А Эссен — это то, где она живёт сейчас: он относится к последнему абзацу, вместе с heute."
      uk: "Порядок розставлений конекторами: Zuerst ist sie nach Frankreich gegangen, dann ist sie nach Deutschland gekommen. Усю послідовність тримають zuerst і dann, і кожен із них стоїть на першому місці, тому допоміжне дієслово ist іде одразу за ним. А Ессен — це те, де вона живе зараз: він належить до останнього абзацу, разом із heute."

  - id: frage-heute
    outcomes: [profil-schreiben]
    type: mc
    prompt: "Was macht Amira heute?"
    options:
      - "Sie arbeitet in einem Krankenhaus in Essen."
      - "Sie studiert Medizin in Frankreich."
      - "Sie lernt noch jeden Tag Deutsch."
    correct: 0
    translation:
      en: What does Amira do today?
      ru: Чем Амира занимается сегодня?
      uk: Чим Аміра займається сьогодні?
    explain:
      en: "A life story ends in the present, and this one ends with Heute arbeitet sie in einem Krankenhaus in Essen. Watch how the last line is built: heute fills position 1, so the verb arbeitet comes immediately after it and the subject follows the verb — that is the shape you need when you write a portrait of somebody else. The other two options belong to the past: she never got to study medicine, and the daily learning was the beginning (Ich musste jeden Tag lernen), not the present."
      ru: "Рассказ о жизни заканчивается настоящим временем, и этот заканчивается так: Heute arbeitet sie in einem Krankenhaus in Essen. Посмотрите, как построена последняя фраза: heute занимает первое место, поэтому глагол arbeitet идёт сразу за ним, а подлежащее — за глаголом. Именно эта конструкция понадобится вам, когда вы будете писать портрет другого человека. Два других варианта относятся к прошлому: медицину она так и не изучала, а ежедневная зубрёжка была в начале пути (Ich musste jeden Tag lernen), а не сейчас."
      uk: "Розповідь про життя закінчується теперішнім часом, і ця закінчується так: Heute arbeitet sie in einem Krankenhaus in Essen. Подивіться, як побудована остання фраза: heute займає перше місце, тому дієслово arbeitet іде одразу за ним, а підмет — за дієсловом. Саме ця конструкція знадобиться вам, коли ви писатимете портрет іншої людини. Два інші варіанти належать до минулого: медицину вона так і не вивчала, а щоденне зубріння було на початку шляху (Ich musste jeden Tag lernen), а не зараз."
