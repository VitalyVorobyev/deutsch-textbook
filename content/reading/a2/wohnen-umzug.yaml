topic: wohnen-umzug
kind: intensive
title_de: "Nina zieht um"
text:
  - >-
    Nina sucht eine Wohnung. Am Montag liest sie eine Anzeige: „Zwei Zimmer,
    Küche, Bad. Die Wohnung liegt [[im dritten Stock::on the third floor::на
    третьем этаже::на третьому поверсі]] und ist hell und ruhig. Miete: 620
    Euro plus [[Nebenkosten::utility costs on top of the rent::коммунальные
    платежи сверх аренды::комунальні платежі понад оренду]].
    [[Kaution::deposit paid to the landlord::залог за квартиру::застава за
    квартиру]]: 1240 Euro.“ Nina schreibt an den
    [[Vermieter::landlord::арендодатель, хозяин квартиры::орендодавець,
    господар квартири]].
  - >-
    Am Mittwoch zeigt Herr Weber ihr die Wohnung. Im Haus gibt es keinen
    [[Aufzug::lift, elevator::лифт::ліфт]], und die
    [[Treppe::staircase, stairs::лестница::сходи]] ist dunkel. Aber die Zimmer
    sind groß. Frau Kern wohnt
    [[im Erdgeschoss::on the ground floor::на первом этаже::на першому
    поверсі]]. „Die Fahrräder kommen in den
    [[Keller::cellar, basement::подвал::підвал]]“, sagt Herr Weber.
  - >-
    Am Samstag ist der [[Umzug::move into a new home::переезд::переїзд]].
    Tobias hilft. Er stellt den Schrank ins Schlafzimmer, und die Bücher
    kommen ins Regal. Nina legt den [[Teppich::carpet, rug::ковёр::килим]] ins
    Wohnzimmer und hängt ein Bild an die Wand. Am Abend steht alles an seinem
    Platz. Nur die Heizung im Schlafzimmer funktioniert nicht.
questions:
  - id: frage-anzeige
    outcomes: [wohnungsanzeige-lesen]
    type: mc
    prompt: "Was steht in der Anzeige?"
    options:
      - "Die Wohnung liegt im dritten Stock."
      - "Die Wohnung hat einen Balkon."
      - "Die Kaution kostet 620 Euro."
    correct: 0
    translation:
      en: What does the listing say?
      ru: Что написано в объявлении?
      uk: Що написано в оголошенні?
    explain:
      en: "The listing explicitly says that the flat is on the third floor. It gives no information about a balcony, and 620 euros is the rent, not the 1240-euro deposit."
      ru: "В объявлении прямо сказано, что квартира находится на третьем этаже. О балконе информации нет, а 620 евро — это аренда, не залог в 1240 евро."
      uk: "В оголошенні прямо сказано, що квартира розташована на третьому поверсі. Про балкон інформації немає, а 620 євро — це оренда, не застава у 1240 євро."

  - id: frage-schrank
    outcomes: [wo-wohin-position]
    type: mc
    prompt: "Wohin stellt Tobias den Schrank?"
    options:
      - "Ins Schlafzimmer."
      - "Ins Wohnzimmer."
      - "In den Keller."
    correct: 0
    translation:
      en: Where does Tobias put the wardrobe?
      ru: Куда Тобиас ставит шкаф?
      uk: Куди Тобіас ставить шафу?
    explain:
      en: "„Er stellt den Schrank ins Schlafzimmer“ — the accusative ins answers Wohin?. The living room is where the carpet goes (Nina legt den Teppich ins Wohnzimmer), and the cellar is for the bikes."
      ru: "«Er stellt den Schrank ins Schlafzimmer» — форма ins (Akkusativ) отвечает на вопрос Wohin?. В гостиную отправляется ковёр (Nina legt den Teppich ins Wohnzimmer), а подвал предназначен для велосипедов."
      uk: "«Er stellt den Schrank ins Schlafzimmer» — форма ins (Akkusativ, знахідний відмінок) відповідає на питання Wohin?. До вітальні потрапляє килим (Nina legt den Teppich ins Wohnzimmer), а підвал призначений для велосипедів."

  - id: frage-heizung
    outcomes: [wohnung-beschreiben]
    type: mc
    prompt: "Was funktioniert am Abend nicht?"
    options:
      - "Die Heizung im Schlafzimmer."
      - "Der Aufzug im Haus."
      - "Das Licht im Flur."
    correct: 0
    translation:
      en: What does not work in the evening?
      ru: Что вечером не работает?
      uk: Що ввечері не працює?
    explain:
      en: "The last sentence says: „Nur die Heizung im Schlafzimmer funktioniert nicht.“ The text says that there is no lift and gives no information about the hallway light. Note the dative im Schlafzimmer: it names the heating's location."
      ru: "В последнем предложении сказано: «Nur die Heizung im Schlafzimmer funktioniert nicht.» В тексте говорится, что лифта нет, а о свете в прихожей информации нет. Dativ в im Schlafzimmer называет место отопления."
      uk: "В останньому реченні сказано: «Nur die Heizung im Schlafzimmer funktioniert nicht.» У тексті йдеться, що ліфта немає, а про світло в передпокої інформації немає. Dativ в im Schlafzimmer називає місце опалення."
