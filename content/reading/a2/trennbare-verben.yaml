topic: trennbare-verben
title_de: "Nina steht früh auf"
text:
  - >-
    Um [[halb sieben::half past six (6:30)::полседьмого (6:30)]] steht Nina
    auf. Sie macht das Fenster auf und trinkt einen Kaffee. Um acht Uhr
    fängt ihre Arbeit an. Nina arbeitet zu Hause am Computer.
  - >-
    Am Nachmittag kauft sie im Supermarkt ein. Dann ruft sie ihre Freundin
    Marie an. „Ich gehe heute Abend ins Kino. Kommst du mit?“ — „Ja, gern!
    [[Holst du mich ab?::Will you pick me up?::Ты за мной зайдёшь?]]“ —
    „[[Natürlich::of course::конечно]]. Der Film fängt um acht an.“
  - >-
    Um sieben holt Nina ihre Freundin ab. Der Film ist
    [[lustig::funny::смешной]], und die zwei Freundinnen
    [[lachen viel::laugh a lot::много смеются]]. Um elf Uhr ist Nina wieder
    zu Hause. Sie ist müde und [[sieht nicht mehr fern::doesn't watch TV any
    more::уже не смотрит телевизор]]. Sie [[macht das Licht aus::turns off
    the light::выключает свет]] und [[schläft ein::falls asleep::засыпает]].
questions:
  - id: frage-nachmittag
    outcomes: [trennbar-erkennen]
    type: mc
    prompt: "Was macht Nina am Nachmittag?"
    options:
      - "Sie kauft im Supermarkt ein."
      - "Sie geht ins Kino."
      - "Sie sieht fern."
    correct: 0
    translation:
      en: What does Nina do in the afternoon?
      ru: Что Нина делает во второй половине дня?
    explain:
      en: "The text says: „Am Nachmittag kauft sie im Supermarkt ein.“ The cinema comes later, in the evening — and she does not watch TV at all that day."
      ru: "В тексте сказано: „Am Nachmittag kauft sie im Supermarkt ein.“ В кино она идёт позже, вечером, а телевизор в этот день вообще не смотрит."
  - id: frage-film
    outcomes: [trennbar-erkennen]
    type: mc
    prompt: "Wann fängt der Film an?"
    options:
      - "Um sieben."
      - "Um acht."
      - "Um elf."
    correct: 1
    translation:
      en: When does the film start?
      ru: Когда начинается фильм?
    explain:
      en: "Nina says it herself: „Der Film fängt um acht an.“ At seven she picks Marie up, and at eleven she is already back home."
      ru: "Нина говорит это сама: „Der Film fängt um acht an.“ В семь она заходит за Мари, а в одиннадцать уже снова дома."
  - id: frage-nach-dem-kino
    outcomes: [trennbar-erkennen]
    type: mc
    prompt: "Was macht Nina nach dem Kino?"
    options:
      - "Sie sieht noch lange fern."
      - "Sie macht das Licht aus und schläft ein."
      - "Sie ruft Marie an."
    correct: 1
    translation:
      en: What does Nina do after the cinema?
      ru: Что Нина делает после кино?
    explain:
      en: "The story ends: „Sie macht das Licht aus und schläft ein.“ The text explicitly says she does not watch TV any more („sieht nicht mehr fern“), and the phone call to Marie was in the afternoon."
      ru: "Текст заканчивается так: „Sie macht das Licht aus und schläft ein.“ Телевизор она уже не смотрит („sieht nicht mehr fern“), а Мари она звонила ещё днём."
