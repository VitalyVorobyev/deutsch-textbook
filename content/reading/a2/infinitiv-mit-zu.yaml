topic: infinitiv-mit-zu
kind: intensive
title_de: "Was Sara im Herbst vorhat"
text:
  - >-
    Sara ist seit zwei Jahren in Deutschland. Sie arbeitet in einem Café, aber
    sie hat vor, im Herbst wieder [[zu studieren::to study::учиться (в вузе)::навчатися (у виші)]].
    „Ich lerne jeden Abend Deutsch, um an der Uni Chemie zu studieren“, sagt sie.
    „Das ist mein [[Ziel::goal, aim::цель::мета]].“
  - >-
    Leicht ist das nicht. Sara muss oft bis acht Uhr arbeiten, und danach hat sie
    wenig [[Energie::energy::силы, энергия::сили, енергія]]. Trotzdem versucht sie, jeden Tag
    eine Stunde zu lernen. „Manchmal vergesse ich, meine
    [[Aufgaben::assignments, tasks::задания::завдання]] zu machen“, sagt sie und lacht. „Aber
    ich habe beschlossen, nicht [[aufzugeben::to give up::сдаваться::здаватися]].“
  - >-
    Im Juni hat Sara eine Prüfung. Um sich gut
    [[vorzubereiten::to prepare::подготовиться::підготуватися]], steht sie jetzt jeden Morgen um
    halb sechs auf. „Es lohnt sich, früh anzufangen“, meint sie. „Am Morgen ist
    der Kopf noch [[frisch::fresh, clear::свежий::свіжий]].“
  - >-
    Ihre Chefin im Café findet das gut. Sie hat Sara versprochen, ihr im Sommer
    [[frei::time off::отгул, свободное время::відгул, вільний час]] zu geben. „Ich hoffe, dass
    Sara die Prüfung besteht“, sagt sie. „Und dann kommt sie hoffentlich trotzdem
    manchmal auf einen Kaffee vorbei.“
questions:
  - id: q-warum-lernt-sara
    type: mc
    outcomes: [zweck-um-zu]
    prompt: "Wozu lernt Sara jeden Abend Deutsch?"
    options:
      - "Um an der Uni Chemie zu studieren."
      - "Um im Café besser zu arbeiten."
      - "Um eine neue Stelle zu finden."
      - "Um ihrer Chefin zu helfen."
    correct: 0
    explain:
      en: "Sara says it herself, in exactly the frame this topic teaches: Ich lerne jeden Abend Deutsch, um an der Uni Chemie zu studieren. The um-clause is what answers Wozu?, so it is the sentence to look for."
      ru: "Сара говорит это сама, ровно в той конструкции, которой посвящена тема: Ich lerne jeden Abend Deutsch, um an der Uni Chemie zu studieren. На вопрос Wozu? отвечает именно оборот с um — его и надо искать в тексте."
      uk: "Сара каже це сама, саме в тій конструкції, якій присвячена тема: Ich lerne jeden Abend Deutsch, um an der Uni Chemie zu studieren. На питання Wozu? відповідає саме зворот з um — його й треба шукати в тексті."

  - id: q-was-macht-sara-morgens
    type: mc
    outcomes: [plan-zu-infinitiv]
    prompt: "Warum steht Sara jetzt um halb sechs auf?"
    options:
      - "Weil sie sich auf die Prüfung vorbereiten will."
      - "Weil sie um sechs Uhr im Café anfangen muss."
      - "Weil ihre Chefin es von ihr verlangt."
      - "Weil sie am Morgen Sport machen möchte."
    correct: 0
    explain:
      en: "The text gives the purpose before the action: Um sich gut vorzubereiten, steht sie jetzt jeden Morgen um halb sechs auf. An um-clause can come first, and then the main clause follows straight after the comma — steht she, verb before subject."
      ru: "Текст называет цель раньше действия: Um sich gut vorzubereiten, steht sie jetzt jeden Morgen um halb sechs auf. Оборот с um может стоять первым, и тогда главное предложение идёт сразу после запятой — steht sie, глагол перед подлежащим."
      uk: "Текст називає мету раніше за дію: Um sich gut vorzubereiten, steht sie jetzt jeden Morgen um halb sechs auf. Зворот з um може стояти першим, і тоді головне речення йде одразу після коми — steht sie, дієслово перед підметом."

  - id: q-was-hofft-die-chefin
    type: mc
    outcomes: [plan-zu-infinitiv]
    prompt: "Was hat die Chefin Sara versprochen?"
    options:
      - "Sie gibt Sara im Sommer frei."
      - "Sie hilft Sara bei den Aufgaben."
      - "Sie bezahlt Sara die Prüfung."
      - "Sie gibt Sara eine neue Stelle."
    correct: 0
    explain:
      en: "Sie hat Sara versprochen, ihr im Sommer frei zu geben. Note the two different people in that sentence and the two shapes that follow: the promise itself is a zu-infinitive because the boss is the one who will give the time off, while her hope about Sara has a different subject and therefore needs dass — Ich hoffe, dass Sara die Prüfung besteht."
      ru: "Sie hat Sara versprochen, ihr im Sommer frei zu geben. Обратите внимание на двух разных людей в этом абзаце и на две разные формы: само обещание — инфинитивный оборот, потому что отгул даёт именно начальница; а её надежда относится к другому лицу, и поэтому там нужен dass — Ich hoffe, dass Sara die Prüfung besteht."
      uk: "Sie hat Sara versprochen, ihr im Sommer frei zu geben. Зверніть увагу на двох різних людей у цьому абзаці й на дві різні форми: сама обіцянка — інфінітивний зворот, бо відгул дає саме начальниця; а її надія стосується іншої особи, і тому там потрібен dass — Ich hoffe, dass Sara die Prüfung besteht."
