topic: einkaufen-reklamation
kind: intensive
title_de: "Zwei Jacken und ein Reißverschluss"
text:
  - >-
    Sara braucht eine Jacke. Im [[Kaufhaus::department
    store::универмаг]] Nordstern hängen zwei Jacken: Die Jacke hier kostet 95
    Euro, die Jacke dort nur 60 Euro. „Die Jacke dort ist
    [[günstiger::cheaper, better value::дешевле, выгоднее]]“, sagt ihr Bruder
    Timo. „Aber die Jacke hier ist wärmer“, sagt Sara, „und die
    [[Qualität::quality::качество]] ist besser.“ Größe 38 ist ihr zu eng,
    Größe 40 passt ihr gut. Sie bezahlt und nimmt den
    [[Bon::till slip, receipt::кассовый чек]] mit.
  - >-
    Zwei Wochen später ist der [[Reißverschluss::zip, zipper::молния
    (застёжка)]] kaputt gegangen. Sara fährt wieder ins Kaufhaus. Am Service
    steht ein Mann mit einem [[Gerät::device, appliance::прибор, устройство]].
    „Der Wasserkocher funktioniert nicht mehr“, sagt er. Er hat noch
    [[Garantie::warranty, guarantee::гарантия]] und geht in die
    [[Reparatur::repair::ремонт]].
  - >-
    „Ich möchte diese Jacke [[umtauschen::to exchange (a
    purchase)::обменять (покупку)]]“, sagt Sara. „Der Reißverschluss ist
    kaputt.“ Die Verkäuferin sieht die [[Quittung::receipt::квитанция, чек]] an.
    „Ein Fehler im Material — kein Problem.“ Sara bekommt eine Jacke ohne
    Fehler. Timo bekommt nichts.
questions:
  - id: frage-warum-teuer
    outcomes: [produkte-vergleichen]
    type: mc
    prompt: "Warum kauft Sara die Jacke für 95 Euro?"
    options:
      - "Sie ist wärmer, und die Qualität ist besser."
      - "Sie ist günstiger als die Jacke dort."
      - "Timo findet die Jacke am schönsten."
    correct: 0
    translation:
      en: Why does Sara buy the jacket for 95 euros?
      ru: Почему Сара покупает куртку за 95 евро?
    explain:
      en: "Sara names two reasons in one sentence: „Aber die Jacke hier ist wärmer … und die Qualität ist besser.“ The cheaper jacket is the one Timo prefers, and it is the other one — the 60-euro jacket. So the price is the one argument that speaks against Sara's choice, not for it."
      ru: "Сара называет сразу две причины в одном предложении: „Aber die Jacke hier ist wärmer … und die Qualität ist besser.“ Более дешёвая куртка — та самая, за 60 евро, которую предпочитает Тимо. Цена — единственный довод против выбора Сары, а не за него."
  - id: frage-was-ist-passiert
    outcomes: [umtausch-begruenden]
    type: mc
    prompt: "Warum geht Sara wieder ins Kaufhaus?"
    options:
      - "Der Reißverschluss ist kaputt gegangen."
      - "Die Jacke ist ihr zu eng."
      - "Die Farbe gefällt ihr nicht."
    correct: 0
    translation:
      en: Why does Sara go back to the department store?
      ru: Почему Сара снова едет в универмаг?
    explain:
      en: "„Zwei Wochen später ist der Reißverschluss kaputt gegangen.“ — that is the defect she brings back. The size was a problem only in the shop, and only with size 38: she bought 40, and „Größe 40 passt ihr gut.“ The colour is never mentioned at all."
      ru: "„Zwei Wochen später ist der Reißverschluss kaputt gegangen.“ — именно с этим дефектом она и возвращается. Размер был проблемой только в магазине и только у 38-го: она купила 40-й, и „Größe 40 passt ihr gut.“ О цвете в тексте вообще не говорится."
  - id: frage-verkaeuferin
    outcomes: [umtausch-begruenden]
    type: mc
    prompt: "Was macht die Verkäuferin?"
    options:
      - "Sie tauscht die Jacke um."
      - "Sie gibt Sara das Geld zurück."
      - "Sie schickt die Jacke in die Reparatur."
    correct: 0
    translation:
      en: What does the shop assistant do?
      ru: Что делает продавщица?
    explain:
      en: "„Sara bekommt eine Jacke ohne Fehler“ — she leaves with another jacket, which is what an Umtausch is. The repair belongs to the man in front of her in the queue: it is his kettle that goes „in die Reparatur“, because it still has a warranty. Nobody in the text gets money back."
      ru: "„Sara bekommt eine Jacke ohne Fehler“ — она уходит с другой курткой, а это и есть обмен (Umtausch). Ремонт относится к мужчине, стоявшему перед ней в очереди: это его чайник отправляется „in die Reparatur“, потому что на него ещё действует гарантия. Деньги в этом тексте никто не возвращает."
