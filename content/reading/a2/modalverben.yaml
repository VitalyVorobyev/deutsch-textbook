topic: modalverben
title_de: "Emma will einen Hund"
text:
  - >-
    Emma ist zehn Jahre alt und will einen Hund haben. Sie sagt: „Mama, alle
    meine Freunde haben ein [[Haustier::pet::домашнее животное]]. Ich möchte
    auch einen Hund!“ Aber die Familie wohnt in einer
    [[Mietwohnung::rented flat::съёмная квартира]], und dort darf man nicht
    einfach einen Hund [[halten::to keep (an animal)::держать (животное)]].
    Zuerst muss der Vater den [[Vermieter::landlord::арендодатель, хозяин
    квартиры]] fragen.
  - >-
    Der Vermieter sagt: „Ein kleiner Hund ist kein Problem. Aber er darf im
    [[Treppenhaus::stairwell::подъезд, лестничная клетка]] nicht
    [[bellen::to bark::лаять]].“ Die Mutter sagt: „Emma, ein Hund ist viel
    Arbeit. Du musst jeden Tag mit ihm spazieren gehen. Kannst du das?“
  - >-
    „Ja, das kann ich!“, sagt Emma. „Und ich soll auch mein Zimmer aufräumen,
    ich weiß.“ Die Eltern lachen. Am Samstag fährt die Familie ins
    [[Tierheim::animal shelter::приют для животных]]. Dort können sie viele
    Hunde sehen. Emma darf einen Hund
    [[aussuchen::to pick out, to choose::выбрать]]. Sie nimmt einen kleinen
    braunen Hund. Er heißt Bruno.
questions:
  - id: frage-vermieter-fragen
    type: mc
    prompt: "Warum muss der Vater zuerst den Vermieter fragen?"
    options:
      - "Der Hund bellt im Treppenhaus zu laut."
      - "Die Familie wohnt in einer Mietwohnung."
      - "Das Tierheim ist am Samstag geschlossen."
    correct: 1
    translation:
      en: Why does the father have to ask the landlord first?
      ru: Почему отец сначала должен спросить арендодателя?
    explain:
      en: "The family lives in a rented flat, and there you cannot simply keep a dog: „dort darf man nicht einfach einen Hund halten“. That is why the father must ask the landlord first. There is no dog barking yet, and the shelter visit happens on Saturday without any problem."
      ru: "Семья живёт в съёмной квартире, а там нельзя просто так завести собаку: „dort darf man nicht einfach einen Hund halten“. Поэтому отец сначала должен спросить арендодателя. Собаки у семьи пока нет, так что лаять некому, а в приют они спокойно едут в субботу."
  - id: frage-vermieter-antwort
    type: mc
    prompt: "Was sagt der Vermieter?"
    options:
      - "Ein kleiner Hund ist okay, aber er darf im Treppenhaus nicht bellen."
      - "Die Familie darf keinen Hund haben."
      - "Der Hund muss immer in der Wohnung bleiben."
    correct: 0
    translation:
      en: What does the landlord say?
      ru: Что говорит арендодатель?
    explain:
      en: "The landlord says: „Ein kleiner Hund ist kein Problem. Aber er darf im Treppenhaus nicht bellen.“ So a small dog is allowed — he does not forbid it, and he says nothing about staying in the flat."
      ru: "Арендодатель говорит: „Ein kleiner Hund ist kein Problem. Aber er darf im Treppenhaus nicht bellen.“ То есть маленькая собака разрешена — он её не запрещает и ничего не говорит о том, что собака должна всегда сидеть в квартире."
  - id: frage-jeden-tag
    type: mc
    prompt: "Was muss Emma jeden Tag machen?"
    options:
      - "Sie muss das Tierheim besuchen."
      - "Sie muss für die Familie kochen."
      - "Sie muss mit dem Hund spazieren gehen."
    correct: 2
    translation:
      en: What does Emma have to do every day?
      ru: Что Эмма должна делать каждый день?
    explain:
      en: "The mother says: „Du musst jeden Tag mit ihm spazieren gehen.“ The family goes to the shelter only once, on Saturday, and cooking is not mentioned in the text at all."
      ru: "Мама говорит: „Du musst jeden Tag mit ihm spazieren gehen.“ В приют семья едет только один раз, в субботу, а про готовку в тексте вообще ничего нет."
