topic: modalverben
title_de: "Herr Braun ist krank"
text:
  - >-
    Herr Braun wacht auf und [[fühlt sich schlecht::feels ill, feels
    bad::плохо себя чувствует]]. [[Der Kopf tut weh::his head
    hurts::болит голова]], und er hat [[Fieber::fever::температура,
    жар]]. Er kann heute nicht arbeiten. Er ruft seine [[Chefin::boss
    (female)::начальница]] an: „Ich bin krank. Ich muss leider zu Hause
    bleiben.“
  - >-
    Am Mittag geht er zum Arzt. Der Arzt sagt: „Sie haben eine
    [[Grippe::flu::грипп]]. Sie müssen viel trinken und sollen drei Tage
    im Bett bleiben. Sie dürfen nicht arbeiten — und Sport dürfen Sie
    auch nicht machen.“
  - >-
    Zu Hause trinkt Herr Braun Tee und schläft viel. Nach drei Tagen
    [[geht es ihm besser::he is feeling better::ему лучше]]. Er möchte
    wieder arbeiten, aber seine Frau sagt: „Du sollst noch einen Tag
    warten. [[Gesundheit::health::здоровье]] ist wichtig!“
questions:
  - id: frage-chefin
    type: mc
    prompt: "Warum ruft Herr Braun seine Chefin an?"
    options:
      - "Er möchte Urlaub machen."
      - "Er ist krank und muss zu Hause bleiben."
      - "Er will später zum Arzt gehen."
    correct: 1
    translation:
      en: Why does Herr Braun call his boss?
      ru: Почему господин Браун звонит своей начальнице?
    explain:
      en: "He calls her and says: „Ich bin krank. Ich muss leider zu Hause bleiben.“ He is not asking for a holiday, and the doctor's visit comes only later, at midday."
      ru: "Он звонит ей и говорит: „Ich bin krank. Ich muss leider zu Hause bleiben.“ Об отпуске речи нет, а к врачу он идёт только позже, в обед."
  - id: frage-arzt
    type: mc
    prompt: "Was sagt der Arzt?"
    options:
      - "Herr Braun darf Sport machen."
      - "Herr Braun muss sofort wieder arbeiten."
      - "Herr Braun soll drei Tage im Bett bleiben."
    correct: 2
    translation:
      en: What does the doctor say?
      ru: Что говорит врач?
    explain:
      en: "The doctor says: „Sie müssen viel trinken und sollen drei Tage im Bett bleiben.“ Working and sport are exactly what he is not allowed to do: „Sie dürfen nicht arbeiten — und Sport dürfen Sie auch nicht machen.“ Remember: darf nicht = is forbidden, must not."
      ru: "Врач говорит: „Sie müssen viel trinken und sollen drei Tage im Bett bleiben.“ Работа и спорт как раз запрещены: „Sie dürfen nicht arbeiten — und Sport dürfen Sie auch nicht machen.“ Помните: darf nicht = «нельзя»."
  - id: frage-frau
    type: mc
    prompt: "Was sagt seine Frau nach drei Tagen?"
    options:
      - "Er soll noch einen Tag warten."
      - "Er muss sofort zum Arzt gehen."
      - "Er darf keinen Tee mehr trinken."
    correct: 0
    translation:
      en: What does his wife say after three days?
      ru: Что говорит его жена через три дня?
    explain:
      en: "His wife says: „Du sollst noch einen Tag warten. Gesundheit ist wichtig!“ He already wants to work again (er möchte wieder arbeiten), but she asks him to wait one more day."
      ru: "Жена говорит: „Du sollst noch einen Tag warten. Gesundheit ist wichtig!“ Он уже хочет работать (er möchte wieder arbeiten), но она просит подождать ещё день."
