# Desktop installers, published to a GitHub Release on every semver tag.
#
# Cut a release with:  git tag v0.2.0 && git push origin v0.2.0
# Plain vX.Y.Z only — MSI (WiX) rejects pre-release suffixes like v1.0.0-beta.
#
# The version baked into the installers comes from the tag (stamped into
# tauri.conf.json below); the committed version field is a dev placeholder.
# Do NOT set SITE_URL/BASE_PATH here: tauri-action runs `bun run build`
# itself and the site base must stay `/` inside the app.
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libxdo-dev libssl-dev

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate content
        run: bun run validate

      - name: Test
        run: bun test

      - name: Stamp version from tag
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp src-tauri/tauri.conf.json

      # The release notes are the tag's own CHANGELOG section — everything between
      # its "## [x.y.z]" heading and the next "## [". Missing section: install
      # instructions only, rather than failing a release that is otherwise good.
      - name: Release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v v="$V" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }
            found && /^## \[/ { exit }          # the next release
            found && /^\[[0-9]/ { exit }        # the link definitions at the foot
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$BODY" | tr -d '[:space:]')" ]; then
            echo "::warning::no CHANGELOG section for $V — publishing install instructions only"
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            printf '%s\n' "$BODY"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Deutsch-Atlas ${{ github.ref_name }}'
          releaseBody: |
            ${{ steps.notes.outputs.body }}

            ---

            ### Installation

            **Windows:** download the `.exe` (NSIS installer) or `.msi`. SmartScreen may warn — choose *More info → Run anyway*.

            **Linux:** install the `.deb` (`sudo apt install ./deutsch-atlas_…_amd64.deb`) or `chmod +x` the `.AppImage` and run it. Note: text-to-speech needs `speech-dispatcher` with a German voice; without it, listening exercises stay silent.

            **macOS:** the app is unsigned. After moving it to Applications, run `xattr -cr /Applications/Deutsch-Atlas.app`, or right-click → Open (macOS 15+: System Settings → Privacy & Security → Open Anyway).
          releaseDraft: false
          prerelease: false
