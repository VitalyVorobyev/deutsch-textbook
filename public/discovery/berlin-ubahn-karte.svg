<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">Vereinfachte Karte der U6 im geteilten Berlin</title>
  <desc id="desc">Die U6 fährt von West-Berlin durch Ost-Berlin zurück nach West-Berlin. Fünf Stationen im Ostteil sind als geschlossen markiert. Nur Friedrichstraße ist als kontrollierte Ausnahme geöffnet.</desc>
  <rect width="1100" height="650" rx="24" fill="#f7f3e8"/>
  <text x="54" y="64" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#222">Eine Linie durch zwei Städte</text>
  <text x="54" y="96" font-family="system-ui, sans-serif" font-size="18" fill="#57534e">Vereinfachtes Schema der heutigen U6 · während der Teilung</text>

  <rect x="50" y="132" width="180" height="74" rx="10" fill="#dbeafe"/>
  <rect x="230" y="132" width="640" height="74" fill="#fee2e2"/>
  <rect x="870" y="132" width="180" height="74" rx="10" fill="#dbeafe"/>
  <text x="82" y="176" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">WEST-BERLIN</text>
  <text x="472" y="176" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#991b1b">OST-BERLIN</text>
  <text x="902" y="176" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">WEST-BERLIN</text>

  <line x1="230" y1="116" x2="230" y2="480" stroke="#292524" stroke-width="4" stroke-dasharray="12 10"/>
  <line x1="870" y1="116" x2="870" y2="480" stroke="#292524" stroke-width="4" stroke-dasharray="12 10"/>
  <path d="M90 340 H1010" stroke="#6d28d9" stroke-width="18" stroke-linecap="round"/>

  <g font-family="system-ui, sans-serif" font-size="14" fill="#292524" text-anchor="middle">
    <circle cx="120" cy="340" r="13" fill="white" stroke="#6d28d9" stroke-width="6"/>
    <text x="120" y="383">Reinickendorfer</text><text x="120" y="401">Straße</text>

    <circle cx="275" cy="340" r="13" fill="#44403c" stroke="#a8a29e" stroke-width="6"/>
    <text x="275" y="304">Schwartzkopffstraße</text>

    <circle cx="380" cy="340" r="13" fill="#44403c" stroke="#a8a29e" stroke-width="6"/>
    <text x="380" y="383">Nordbahnhof</text>

    <circle cx="485" cy="340" r="13" fill="#44403c" stroke="#a8a29e" stroke-width="6"/>
    <text x="485" y="304">Oranienburger Tor</text>

    <circle cx="590" cy="340" r="16" fill="white" stroke="#d97706" stroke-width="7"/>
    <text x="590" y="383" font-weight="700">Friedrichstraße</text>
    <text x="590" y="404" fill="#9a3412">Kontrolle · Ausnahme</text>

    <circle cx="695" cy="340" r="13" fill="#44403c" stroke="#a8a29e" stroke-width="6"/>
    <text x="695" y="304">Französische Straße</text>

    <circle cx="810" cy="340" r="13" fill="#44403c" stroke="#a8a29e" stroke-width="6"/>
    <text x="810" y="383">Stadtmitte</text>

    <circle cx="965" cy="340" r="13" fill="white" stroke="#6d28d9" stroke-width="6"/>
    <text x="965" y="304">Kochstraße</text>
  </g>

  <rect x="54" y="496" width="992" height="104" rx="12" fill="#fff" stroke="#d6d3d1"/>
  <circle cx="88" cy="530" r="10" fill="#44403c"/>
  <text x="112" y="537" font-family="system-ui, sans-serif" font-size="17" fill="#44403c">geschlossen: Züge fuhren langsam durch, hielten aber nicht</text>
  <circle cx="88" cy="568" r="10" fill="white" stroke="#d97706" stroke-width="5"/>
  <text x="112" y="575" font-family="system-ui, sans-serif" font-size="17" fill="#44403c">Friedrichstraße: Umsteigen oder Grenzkontrolle möglich</text>
</svg>
