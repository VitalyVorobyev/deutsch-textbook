  <text x="58" y="98" font-family="system-ui, sans-serif" font-size="17" fill="#4b5563">Dienstag, 14. Juli</text>
  <rect x="28" y="136" width="864" height="112" rx="12" fill="#fee2e2"/>
  <text x="58" y="174" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#991b1b">DIREKTE VERBINDUNG</text>
  <text x="58" y="212" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#172033">ICE 772 · Hamburg Hbf</text>
  <text x="570" y="212" font-family="system-ui, sans-serif" font-size="22" fill="#172033">11:22 · Gleis 7</text>
  <rect x="750" y="163" width="112" height="48" rx="8" fill="#b91c1c"/>
  <text x="806" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">FÄLLT AUS</text>
  <text x="28" y="286" font-family="system-ui, sans-serif" font-size="21" font-weight="700" fill="#f5f0e6">Ihre Alternativen</text>
  <rect x="28" y="306" width="864" height="142" rx="12" fill="#ffffff"/>
  <circle cx="66" cy="344" r="21" fill="#d97706"/>
  <text x="66" y="351" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">1</text>
  <text x="104" y="344" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#172033">11:35 · RE 8 nach Bremen</text>
  <text x="650" y="344" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#172033">Gleis 4</text>
  <path d="M104 371 H796" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="104" y="404" font-family="system-ui, sans-serif" font-size="18" fill="#334155">Bremen an 12:54 · ICE 610 ab 13:08, Gleis 9</text>
  <text x="104" y="432" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#166534">Hamburg an 14:02 · einmal umsteigen</text>
  <rect x="28" y="468" width="864" height="132" rx="12" fill="#ffffff"/>
  <circle cx="66" cy="506" r="21" fill="#2563eb"/>
  <text x="66" y="513" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">2</text>
  <text x="104" y="506" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#172033">12:05 · IC 2044 nach Hamburg</text>
  <text x="650" y="506" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#172033">Gleis 11</text>
  <text x="104" y="550" font-family="system-ui, sans-serif" font-size="18" fill="#334155">Hamburg an 14:21 · ohne Umstieg</text>
  <text x="104" y="579" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#9a3412">circa 20 Minuten Verspätung</text>
  <rect x="28" y="620" width="864" height="44" rx="9" fill="#fef3c7"/>
  <text x="50" y="649" font-family="system-ui, sans-serif" font-size="17" fill="#78350f">Hinweis: Fahrkarten gelten auch für die angegebenen Alternativen.</text>
