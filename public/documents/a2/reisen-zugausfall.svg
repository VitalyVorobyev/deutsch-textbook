<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 690" role="img" aria-labelledby="title description">
  <title id="title">Reiseinformation Hannover nach Hamburg</title>
  <desc id="description">Der ICE 772 fällt aus. Zwei alternative Verbindungen werden mit Abfahrt, Gleis, Umstieg und Ankunft gezeigt.</desc>
  <rect width="920" height="690" rx="24" fill="#172033"/>
  <rect x="28" y="28" width="864" height="88" rx="12" fill="#f5f0e6"/>
