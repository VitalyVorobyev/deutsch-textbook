  given: "Ich hilfe meinem Bruder"
  decision: accept
  note: "Endorsed, with a caveat: hilfe is plausibly a chosen stem-change overgeneralization (du hilfst → ✗ ich hilfe), not a pure typo. It is rightly unattributable here — the item grades verben-mit-dativ (meinem was right), and pinning the verb would create false attributions — so the signal lives in this note. Drill note: verb-endungen — stem change is singular du/er only, never ich."
