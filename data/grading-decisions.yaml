# Linguistic rulings on rejected translate renderings — the committed memory of the
# audit's grading-review queue (schema: gradingDecisionSchema in src/lib/schemas.ts;
# semantics: CLAUDE.md "Drills from progress" and .agents/skills/progress-review).
#
#   item:      <set-id>:<item-id> of the translate item
#   given:     the rendering as logged; matched via normalizeTranslation
#   decision:  accept    — correct, target-preserving German; must pass today's grader
#                          (slip-forgiveness, or the item's accept list gains it in the
#                          same change, with a revision bump)
#              constrain — good German that bypasses the target; paired with a bilingual
#                          instruction constraint and a revision bump
#              confirm   — the rejection was right; attempts re-enter the focus signals
#                          with attribution recomputed under today's grader
#   note:      the linguistic reason. Confusions worth a future drill item are recorded
#              here as "drill note: …" — drill authoring reads them.

- item: a2/biografie-erfahrungen-produktion:uebersetzen-interview-frage
  given: "Wo hast du aufgewachsend? Warst du dort glücklich?"
  decision: confirm
  note: "aufwachsen forms the Perfekt with sein and the participle aufgewachsen: Wo bist du aufgewachsen? The learner's auxiliary and participle are both wrong."
  decidedAt: 2026-07-18

- item: a2/biografie-erfahrungen-produktion:uebersetzen-konnte-nicht-besuchen
  given: "Vor zwei Jahren konnte ich meine Familia besuchen. Ich hatte keinen Urlaub"
  decision: confirm
  note: "The rendering omits nicht and reverses the first sentence's meaning; Familia is also not the German word Familie."
  decidedAt: 2026-07-18

- item: a2/biografie-erfahrungen:uebersetzen-damals-war-hatte
  given: "Ich war damals einen Student, und ich hatte kein Geld"
  decision: confirm
  note: "A profession or status after sein normally has no article: Ich war Student. einen Student is an accusative noun phrase and is ungrammatical here."
  decidedAt: 2026-07-18

- item: a2/probe-modalverben:variant-b
