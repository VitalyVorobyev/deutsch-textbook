- item: a2/einkaufen-reklamation:uebersetzen-passt-gefaellt
  given: "Die Jacke passt mir mit der Große, aber sie gefällt meinen Mann nicht"
  decision: confirm
  note: "gefallen governs the dative: sie gefällt meinem Mann nicht — meinen Mann is a real case error; mit der Große is garbled (die Größe). Drill note: verben-mit-dativ (gefallen + Dativ)."
  decidedAt: 2026-07-14

- item: a2/einkaufen-reklamation:uebersetzen-komparativ-jacke
  given: "Die Jacke ist wärmer als Pullover, aber sie ist teurer"
  decision: confirm
  note: "Dropped article after als — als der Pullover — and dropped auch. Drill note: komparativ-als plus artikel-pflicht (the article survives after als)."
  decidedAt: 2026-07-14

- item: a2/reisen-verkehr:uebersetzen-koennen-sie-helfen
  given: "Entschuldigung, können Sie mir helfen? Der Zug fählt aus"
  decision: confirm
  note: "The prompt asks Perfekt: Mein Zug ist ausgefallen. Der Zug fällt aus (misspelled fählt) shifts the tense to Präsens, and Der for Mein drops the possessive — meaning changed twice over."
  decidedAt: 2026-07-14

- item: a2/reisen-verkehr:uebersetzen-zug-hamburg
  given: "Ich bin nach Hamburg mit dem Zug gefahren"
  decision: confirm
  note: "Neutral adverbial order is modal before local: mit dem Zug nach Hamburg; the learner's order is marked. The haben-sein target (bin … gefahren) was met — re-enters unattributed."
  decidedAt: 2026-07-14

