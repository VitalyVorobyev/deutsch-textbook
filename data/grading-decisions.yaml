- item: a1/stadt-wege:translate-bahnhof
  given: "Entschuldigung, wo ist die Station?"
  decision: confirm
  note: "Wrong lexis: die Station is a stop (bus, tram, ward), not the taught word for a train station — der Bahnhof. The rejection was right."
  decidedAt: 2026-07-14

- item: a1/stadt-wege:translate-bahnhof
  given: "Entschudigung, wie komme ich zum Bahnhof?"
  decision: confirm
  note: "A different question: wie komme ich zum Bahnhof? asks for the way, the prompt asks where the station is. Meaning not preserved."
  decidedAt: 2026-07-14

- item: a1/wohnen:translate-balkon
  given: "Im Wohnung gibt es einen Balkon"
  decision: confirm
  note: "die Wohnung is feminine: in der Wohnung. im contracts in + dem and cannot stand before a feminine noun — a real genus/dative-article error. Drill note: dativ-artikel with feminine nouns (in der …)."
  decidedAt: 2026-07-14

- item: a1/menschen-familie:translate-person
  given: "Mein Vater ist Ingeneer. Er ist ruhig und freundlich"
  decision: confirm
  note: "Ingeneer is more than one edit from Ingenieur — beyond slip tolerance; a real spelling failure, not a typo."
  decidedAt: 2026-07-14

- item: a1/menschen-familie:translate-person
