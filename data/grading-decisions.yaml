- item: a2/probe-nebensaetze-plaene:variant-a
  given: "Lena geht heute ins Kino nicht, weil sie ihre Tochte abholen muss"
  decision: confirm
  note: "nicht follows the verb but must precede the prepositional complement it negates: geht heute nicht ins Kino. Tochte is also not Tochter. The weil-clause with muss at the end — what the probe measures — was correct. drill note: position of nicht before a directional prepositional phrase."
  decidedAt: 2026-07-20

- item: a1/probe-stadt-wege:variant-b
  given: "Entschuldigung, wie geht mann zur Kurche?"
  decision: confirm
  note: "mann is the noun, the indefinite pronoun is man; Kurche is not Kirche. wie geht man zu … is also not the idiomatic way to ask directions — wie komme ich zu …. The graded zur was right."
  decidedAt: 2026-07-20

- item: a1/probe-menschen-familie:variant-b
  given: "Mein Großvater ist Verkauver und meine Großmutter ist Ärztin"
  decision: confirm
  note: "Verkauver is well beyond one edit from Verkäufer and loses the umlaut the word turns on. Both graded possessives, Mein and meine, were correct, so nothing is attributed to possessivartikel. drill note: -äu- spellings in Beruf nouns (Verkäufer, Käufer)."
  decidedAt: 2026-07-20

- item: a1/probe-praesens-wortstellung:variant-b
  given: "Wo arbeitet deinen Bruder?"
  decision: confirm
  note: "The subject of the question is nominative: dein Bruder, not the accusative deinen Bruder. Verb-second placement — what the probe measures — was correct, so the miss belongs to the possessive, not to verbzweit. drill note: nominative possessive on a subject after a fronted W-word."
  decidedAt: 2026-07-20

