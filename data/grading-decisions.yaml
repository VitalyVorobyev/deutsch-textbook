- item: a2/arbeit-beruf-produktion:uebersetzen-verbot-und-freiheit
  given: "Du darfst hier nicht rauchen. Aber du musst heute nicht länge arbeiten"
  decision: accept
  note: "Subject-first Du darfst hier … is as good V2 as the authored fronted Hier darfst du …, and both modals stay in position 2 — the only thing duerfen-muessen grades. The sole remaining divergence, länge for länger, is a one-edit slip on an ungraded token. The accept list gains the subject-first renderings (revision 2)."
