- item: a2/verbindungen-folgen-produktion:uebersetzen-trotzdem
  given: "Der Film war lang. Trotzdem haben wir er zum Ende geschauen"
  decision: confirm
  note: "Three real errors: er for the accusative ihn, geschauen for the participle gesehen/geschaut, and zum Ende without bis. The graded inversion after Trotzdem is intact, so the miss is not attributed to konjunktionaladverb-inversion. drill note: accusative personal pronoun ihn in the Perfekt bracket."
  decidedAt: 2026-07-20

- item: a2/verbindungen-folgen-produktion:uebersetzen-wenn-wiederholt
  given: "Immer wenn es regnet war, haven wir zu Hause gebileben."
  decision: confirm
  note: "regnet war is not a German tense — the Perfekt is es geregnet hat — and bleiben takes sein, not haben. haven and gebileben are further misspellings. The wenn itself was right, so the error is not about als/wenn. drill note: haben/sein with bleiben."
  decidedAt: 2026-07-20

