- item: a2/infinitiv-mit-zu-produktion:uebersetzen-abzunehmen
  given: "Ich versuche, ein bishen abzunehmen"
  decision: confirm
  note: "bishen is two edits from bisschen, so it is not a forgivable slip. The graded abzunehmen — zu inside the separable verb — was correct, and nothing is attributed to zu-infinitiv."
  decidedAt: 2026-07-20

- item: a2/infinitiv-mit-zu:uebersetzen-um-zu-geschenk
  given: "Ich fahre in der Stadt um ein Geschenk zu kaufen"
  decision: confirm
  note: "fahren into town is a direction, so the two-way preposition takes the accusative: in die Stadt. The um … zu frame the item grades is complete and correct. drill note: wo-wohin after a movement verb — in die Stadt against in der Stadt."
  decidedAt: 2026-07-20

- item: a2/infinitiv-mit-zu:uebersetzen-vorhaben-wien
  given: "Ich have vor, im Sommer in Wien zu fahren"
  decision: confirm
  note: "have is not habe, and a city as destination takes nach, not in: nach Wien fahren. The zu-infinitive itself was placed correctly. drill note: nach + city/country for direction against in + Dativ for location."
  decidedAt: 2026-07-20

- item: a1/stadt-wege:translate-bahnhof
  given: "Entschuldigung, wie komme ich zum Bahnfoh?"
