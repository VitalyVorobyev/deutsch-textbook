# The grammar inventory the course measures itself against — the structural
# companion to data/goethe-<level>-wortliste.txt, which measures only lexis.
#
# It exists because "A1 and A2 are content-complete" was an *asserted* claim for
# months while six A2-standard structures (Infinitiv mit zu, Relativsätze,
# als/wenn, Konjunktionaladverbien, Futur I, Reflexiv im Dativ) sat undone —
# several of them scheduled to be taught in B1 units instead. A published figure
# has to be checked against content or it drifts toward flattery, so this file is
# read by `bun scripts/grammar-coverage.ts` and the point is not to be flattering.
#
# HOW A POINT IS COUNTED AS COVERED — the evidence channel is the focus-tag
# taxonomy in CLAUDE.md, exactly as the Wortliste's `~` is paid for in taught
# surface. A point is covered iff **every** tag in its `focus` list is registered
# in `focusIntroducedBy` (scripts/validate.ts) *and* is carried by at least one
# `practice` or `drill` item. Checkpoints, pretests and probes deliberately do
# not count: they test rather than teach.
#
# `reference_only: true` is for points that are real knowledge but name no
# confusion — the clock, ordinal numbers. They are paid for with `taught_in`,
# a topic or reference page that must exist. Use it sparingly: if a point can
# fail in a way worth drilling, it wants a tag, not this escape hatch.
#
# `standard_level` is where the exam standard puts the point; the report also
# prints where the course actually teaches it, so a point taught *late* (Perfekt
# is A1 in the Goethe list and A2 here) shows up as `late` rather than silently
# passing or silently failing. Late is a sequencing decision, not a gap.
#
# Sources: Goethe-Zertifikat A1/A2 Prüfungsziele, cross-checked against the
# structural progressions of Schritte plus A1/A2 and Menschen A1/A2. Where the
# coursebooks disagree with the exam list the entry carries a `note`.

